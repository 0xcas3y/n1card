<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>支持一下 · 日语动词速记</title>
  <link rel="stylesheet" href="styles.css?v=29">
  <style>
    .support { max-width: 540px; margin: 0 auto; padding: 32px 20px 60px; }
    .support .back { display: inline-block; color: #aaa; text-decoration: none; font-size: 13px; margin-bottom: 20px; }
    .support .back:hover { color: #fff; }
    .support h1 { font-size: 24px; font-weight: 600; margin-bottom: 10px; }
    .support .intro { opacity: 0.8; font-size: 14px; line-height: 1.7; margin-bottom: 28px; }
    .qr-grid { display: flex; gap: 16px; margin: 24px 0; }
    .qr-card {
      flex: 1; background: #1a1a1a; border: 1px solid #333; border-radius: 12px;
      padding: 20px; text-align: center;
    }
    .qr-card h3 { font-size: 14px; margin-bottom: 12px; font-weight: 500; }
    .qr-card .qr-img {
      width: 100%; aspect-ratio: 1 / 1; max-width: 200px; margin: 0 auto;
      background: #eee; border-radius: 8px; display: flex; align-items: center;
      justify-content: center; color: #666; font-size: 13px;
    }
    .qr-card .qr-img img { width: 100%; height: 100%; object-fit: contain; border-radius: 8px; }
    .qr-card .hint { font-size: 11px; opacity: 0.5; margin-top: 10px; }
    .alipay h3 { color: #1677ff; }
    .wechat h3 { color: #07c160; }
    .perks {
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px; padding: 18px 22px; margin-top: 30px; font-size: 13px; line-height: 1.9;
    }
    .perks .label { font-size: 11px; opacity: 0.5; letter-spacing: 2px; margin-bottom: 8px; }
    .contact { margin-top: 24px; font-size: 13px; opacity: 0.7; line-height: 1.7; }
    .contact a { color: #54a0ff; }
  </style>
  <script defer src="https://cloud.umami.is/script.js" data-website-id="8a6b752b-43bc-4150-a95c-24ab8f3fab09"></script>
</head>
<body>
  <div class="support">
    <a class="back" href="/">← 返回</a>

    <h1>🌹 支持一下</h1>
    <p class="intro">
      这个工具 <b>限时免费</b>，没有广告、没有登录、不收集数据。<br>
      如果帮你记住了几个单词，请扫码随心赞赏几块钱——
      你的支持会直接用来做新功能（N1 文法详解 / 近义词辨析 / 真人朗读）。
    </p>

    <div class="qr-grid">
      <div class="qr-card alipay">
        <h3>支付宝</h3>
        <div class="qr-img">
          <img src="assets/alipay.jpg" alt="支付宝收款码" onerror="this.parentElement.innerHTML='（二维码待上传）'">
        </div>
        <p class="hint">长按识别</p>
      </div>
      <div class="qr-card wechat">
        <h3>微信</h3>
        <div class="qr-img">
          <img src="assets/wechat.jpg" alt="微信收款码" onerror="this.parentElement.innerHTML='（二维码待上传）'">
        </div>
        <p class="hint">长按识别</p>
      </div>
    </div>

    <div class="perks">
      <div class="label">赞赏者福利</div>
      ✅ 备注你赞赏的金额 + 昵称（想要匿名就留空）<br>
      ✅ 我会记下来，扩展内容（N1 文法/近义词/真人朗读）上线先发给你<br>
      ✅ 对新功能有优先建议权<br>
      ✅ 吃水不忘挖井人 — 谢谢 🙇
    </div>

    <p class="contact">
      意见反馈、发现 bug、想要什么新内容，欢迎来信：<br>
      <a href="mailto:contact@jlptcards.app">contact@jlptcards.app</a><br>
      或小红书私信（主页简介里有）
    </p>
  </div>
</body>
</html>
