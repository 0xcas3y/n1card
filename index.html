    }
    .footer { margin-top: 40px; opacity: 0.5; font-size: 12px; text-align: center; }

    .streak-box {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 14px 18px;
      margin-bottom: 20px;
      display: flex;
      justify-content: space-around;
      align-items: center;
      text-align: center;
    }
    .streak-box .item .num { font-size: 22px; font-weight: 600; }
    .streak-box .item .lbl { font-size: 11px; opacity: 0.6; margin-top: 2px; letter-spacing: 1px; }
    .streak-cal {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 12px 14px 14px;
      margin-bottom: 20px;
    }
    .cal-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .cal-month { font-size: 13px; font-weight: 500; opacity: 0.85; }
    .cal-nav { background: none; border: 0; color: #888; font-size: 18px; cursor: pointer; padding: 2px 14px; line-height: 1; }
    .cal-nav:hover, .cal-nav:active { color: #fff; }
    .cal-weekdays { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; opacity: 0.45; font-size: 10px; margin-bottom: 6px; letter-spacing: 1px; }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
    .cal-day {
      aspect-ratio: 1; max-width: 36px; margin: 0 auto;
      width: 100%; display: flex; align-items: center; justify-content: center;
      font-size: 11px; opacity: 0.35; border-radius: 50%;
    }
    .cal-day.checked { background: #4FA896; color: #fff; opacity: 1; font-weight: 500; }
    .cal-day.today { box-shadow: 0 0 0 1px rgba(255,255,255,0.6); }
    .cal-day.empty { visibility: hidden; }
