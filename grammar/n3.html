<script>
const N3_BACK = {"1": {"analysis": "「〜ため（に）」是N3重要语法，既可表示原因也可表示目的。作原因时相当于「〜から」，但更正式；作目的时相当于「〜ように」。需要根据语境判断是原因还是目的用法。", "mistakes": "❌ 病気のために、学校を休んだ。（目的用法错误）→ ✅ 病気のため、学校を休んだ。（原因用法，表目的时才加に）", "similar": [{"form": "〜から", "diff": "「ため」更正式，多用于书面语；「から」更口语化"}, {"form": "〜ように", "diff": "「ように」只表目的；「ため（に）」可表原因和目的"}, {"form": "〜せいで", "diff": "「せいで」只表负面原因；「ため」可表中性或正面原因"}], "quiz": [{"q": "健康の____、毎日運動している。", "opts": ["A.ため", "B.ために", "C.せいで", "D.から"], "ans": "B", "exp": "表示目的时使用「ために」，这里是为了健康而运动"}, {"q": "台風の____、飛行機が欠航になった。", "opts": ["A.ために", "B.ように", "C.ため", "D.ので"], "ans": "C", "exp": "表示原因时使用「ため」，台风是飞机停飞的原因"}, {"q": "試験に合格する____、一生懸命勉強した。", "opts": ["A.ため", "B.ために", "C.せいで", "D.によって"], "ans": "B", "exp": "表示目的时使用「ために」，为了考试合格而努力学习"}]}, "2": {"analysis": "「せいで」和「おかげで」都表示原因，但感情色彩截然相反。「せいで」用于负面结果，表示责备或抱怨的语气；「おかげで」用于正面结果，表示感谢或庆幸的心情。两者在语法上完全相同，区别在于说话者对结果的主观评价。", "mistakes": "混淆使用场合：❌ 雨のおかげで、遠足が中止になった → ✅ 雨のせいで、遠足が中止になった（取消远足是坏事，用せいで）；❌ 先生のせいで、日本語が上手になった → ✅ 先生のおかげで、日本語が上手になった（进步是好事，用おかげで）", "similar": [{"form": "〜ために", "diff": "ために是客观说明原因目的，せいで/おかげで带有主观的感情色彩和评价"}, {"form": "〜から/ので", "diff": "から/ので是一般的因果关系表达，せいで/おかげで强调原因对结果的直接影响和责任归属"}], "quiz": [{"q": "彼の親切な指導（____）、試験に合格できた。", "opts": ["A. せいで", "B. おかげで", "C. ために", "D. によって"], "ans": "B", "exp": "考试合格是好结果，应该用「おかげで」表示感谢"}, {"q": "交通渋滞（____）、会議に遅れてしまった。", "opts": ["A. おかげで", "B. ために", "C. せいで", "D. によると"], "ans": "C", "exp": "开会迟到是坏结果，应该用「せいで」表示抱怨"}, {"q": "友達の励まし（____）、最後まで頑張ることができた。", "opts": ["A. せいで", "B. から", "C. ために", "D. おかげで"], "ans": "D", "exp": "能够坚持到最后是好结果，用「おかげで」表达对朋友鼓励的感谢"}]}, "3": {"analysis": "「〜ことから」表示根据某个事实或现象得出结论、进行命名或判断的依据。与「〜ので」不同，它更强调客观事实作为依据的逻辑关系，常用于解释命名由来、得出结论等场合。这个文法带有较强的书面语色彩。", "mistakes": "❌ 雨が降ったことから、出かけません。→ ✅ 雨が降ったので、出かけません。（表示单纯因果关系时不用ことから）❌ 彼は優しいことから好かれている。→ ✅ 彼は優しいということから好かれている。（需要加「という」）", "similar": [{"form": "〜ので", "diff": "ので表示一般因果关系，ことから强调以某事实为依据进行判断或命名"}, {"form": "〜から", "diff": "から表示主观理由，ことから表示客观事实作为依据"}, {"form": "〜ために", "diff": "ために表示目的或原因，ことから专指以事实为根据"}], "quiz": [{"q": "この花は香りがよい____、「においざくら」と名付けられた。", "opts": ["A. ので", "B. ことから", "C. ために", "D. として"], "ans": "B", "exp": "表示命名的依据，用「ことから」最合适"}, {"q": "彼の行動____判断すると、嘘をついているようだ。", "opts": ["A. ことから", "B. ので", "C. だから", "D. として"], "ans": "A", "exp": "以某个事实为依据进行判断，使用「ことから」"}, {"q": "今日は暑い____、エアコンをつけました。", "opts": ["A. ことから", "B. ので", "C. ために", "D. として"], "ans": "B", "exp": "表示单纯的因果关系，用「ので」而不是「ことから」"}]}, "4": {"analysis": "「〜だけに」表示基于前项理由，后项结果理所当然。与单纯的因果关系不同，它强调说话人对结果的认同感和合理性。常用于赞扬、理解或接受某种结果时。", "mistakes": "易错点：与「〜ので」「〜から」混用。❌ 雨が降っているだけに、外に出ない → ✅ 雨が降っているので、外に出ない（单纯因果用ので）。❌ 学生だけに、勉強しなければならない → ✅ プロだけに、技術が優れている（だけに用于积极评价）", "similar": [{"form": "〜ので", "diff": "ので表示客观因果，だけに强调理所当然的认同感"}, {"form": "〜から", "diff": "から表示主观理由，だけに表示基于身份地位的合理性"}, {"form": "〜からこそ", "diff": "からこそ强调「正因为」，だけに强调「毕竟」的理解"}], "quiz": [{"q": "彼は医者（　　）、病気のことがよくわかる。", "opts": ["A. だけに", "B. ので", "C. から", "D. ために"], "ans": "A", "exp": "医生身份使其了解疾病理所当然，体现认同感，用だけに"}, {"q": "子供（　　）、素直で可愛い。", "opts": ["A. なので", "B. だけに", "C. だから", "D. ために"], "ans": "B", "exp": "孩子天真可爱是理所当然的，表示认同用だけに"}, {"q": "ベテランの料理人（　　）、味が格別だ。", "opts": ["A. から", "B. ので", "C. だけに", "D. によって"], "ans": "C", "exp": "资深厨师做菜味道特别是理所当然的，表示合理认同用だけに"}]}, "5": {"analysis": "「〜のに」表示逆接转折，带有说话人的不满或意外情绪，相当于中文的「明明～却～」。与「〜けれど」等纯粹表示转折不同，「のに」强调结果与期待相反时的情感色彩。", "mistakes": "易错点：误用于客观陈述。❌お金があるのに、買わない → ✅お金があるけれど、買わない（客观转折用けれど）；❌雨が降っているのに、出かける → ✅雨が降っているのに、出かけるなんて（のに需要情感色彩）", "similar": [{"form": "〜けれど/〜が", "diff": "けれど是客观转折，のに带有主观不满或意外情绪"}, {"form": "〜ても", "diff": "ても表示假设让步，のに表示既成事实的转折"}], "quiz": [{"q": "薬を飲んだ（____）、まだ熱が下がらない。", "opts": ["A.のに", "B.ので", "C.から", "D.ために"], "ans": "A", "exp": "表示不满情绪的逆接转折，用「のに」"}, {"q": "彼は約束した（____）、来なかった。", "opts": ["A.ので", "B.のに", "C.ために", "D.だけ"], "ans": "B", "exp": "明明约定了却没来，表示意外和不满，用「のに」"}, {"q": "一生懸命勉強した（____）、試験に落ちてしまった。", "opts": ["A.ので", "B.から", "C.のに", "D.ために"], "ans": "C", "exp": "努力学习却落榜，表示结果与期待相反的不满，用「のに」"}]}, "6": {"analysis": "「〜くせに」是表示批判性逆接的文法，与「〜のに」相比带有更强烈的不满和批判情绪。说话者对前项事实感到不满，认为后项行为不合理或令人失望。", "mistakes": "❌ 彼は日本人くせに、日本語が下手だ。→ ✅ 彼は日本人のくせに、日本語が下手だ。（名词后需要加「の」）❌ 金持ちくせして、けちだ。→ ✅ 金持ちのくせに、けちだ。（「くせして」是口语用法，书面语用「くせに」）", "similar": [{"form": "〜のに", "diff": "「のに」是中性的逆接，「くせに」含批判情绪"}, {"form": "〜ながら", "diff": "「ながら」表示矛盾行为，「くせに」强调不满批判"}, {"form": "〜癖して", "diff": "「癖して」是「くせに」的口语形式，更随意"}], "quiz": [{"q": "彼は大学生____、漢字が読めない。", "opts": ["A. なのに", "B. のくせに", "C. ながら", "D. けれど"], "ans": "B", "exp": "批判大学生不会读汉字这一不合理现象，用「のくせに」最合适"}, {"q": "お金がない____、高い服ばかり買っている。", "opts": ["A. くせに", "B. のに", "C. から", "D. ので"], "ans": "A", "exp": "批判没钱却买贵衣服的矛盾行为，用「くせに」表达不满"}, {"q": "医者____、タバコを吸うなんて信じられない。", "opts": ["A. だくせに", "B. のくせに", "C. というくせに", "D. であるくせに"], "ans": "B", "exp": "名词「医者」后接「のくせに」，批判医生吸烟的不当行为"}]}, "7": {"analysis": "「にもかかわらず」是书面语的逆接表现，比「のに」更正式庄重，多用于正式文章、新闻报道等场合。它强调前后两个事实的对比性，表示后项结果出乎意料或与常理相反。", "mistakes": "❌ 雨が降るにもかかわらず → ✅ 雨にもかかわらず（名词直接接续，不需要「が降る」）\n❌ 忙しいですにもかかわらず → ✅ 忙しいにもかかわらず（接普通形，不用丁寧語）", "similar": [{"form": "〜のに", "diff": "口语常用，语气较轻松随意"}, {"form": "〜ものの", "diff": "书面语，含有「虽然如此，但还是...」的无奈语气"}], "quiz": [{"q": "彼は病気（____）、会議に出席した。", "opts": ["A. なのに", "B. にもかかわらず", "C. ものの", "D. けれど"], "ans": "B", "exp": "正式的书面语境中表达逆接关系，用「にもかかわらず」最合适"}, {"q": "困難（____）、プロジェクトは成功した。", "opts": ["A. にもかかわらず", "B. のにもかかわらず", "C. であるにもかかわらず", "D. A和C都对"], "ans": "D", "exp": "名词可以直接接「にもかかわらず」，也可以加「である」变成「であるにもかかわらず」"}, {"q": "次の中で最も書面語的な表現はどれですか。", "opts": ["A. 雨なのに出かけた", "B. 雨にもかかわらず出かけた", "C. 雨だけど出かけた", "D. 雨でも出かけた"], "ans": "B", "exp": "「にもかかわらず」は書面語の逆接表現で、最も正式で硬い表現"}]}, "8": {"analysis": "「〜とはいえ」表示承认前项事实，但后项呈现与此不符或相反的情况，体现了「让步逆接」的语法特征。与单纯的逆接「〜が」不同，此文法强调说话人对前项事实的认可态度，然后提出例外或相反情况。", "mistakes": "❌ 学生とはいえ、お金を持っている → ✅ 学生とはいえ、お金がない（逻辑要合理）\n❌ 冬とはいえるから、寒いです → ✅ 冬とはいえ、今日は暖かい（不可加「る」）\n❌ 忙しいとはいえで、手伝います → ✅ 忙しいとはいえ、手伝います（不可加「で」）", "similar": [{"form": "〜といっても", "diff": "更口语化，语气较轻松随意"}, {"form": "〜ものの", "diff": "书面语色彩更强，常用于正式文体"}, {"form": "〜けれども", "diff": "单纯逆接，不强调对前项的认可态度"}], "quiz": [{"q": "子供____、しっかりした考えを持っている。", "opts": ["A. とはいえ", "B. といえば", "C. というと", "D. といえる"], "ans": "A", "exp": "承认是孩子这一事实，但有相反的表现，用「とはいえ」表示让步逆接"}, {"q": "有名な店____、味はそれほどでもない。", "opts": ["A. といえば", "B. とはいえ", "C. というか", "D. といって"], "ans": "B", "exp": "承认是有名的店，但味道并不怎么样，典型的让步逆接用法"}, {"q": "安い____、品質は悪くない。", "opts": ["A. とはいえ", "B. といえば", "C. というと", "D. といっても"], "ans": "A", "exp": "承认价格便宜，但质量并不差，「とはいえ」表示让步转折"}]}, "9": {"analysis": "「〜さえ〜ば」表示最低限度的充分条件，强调只要满足这一个条件就足够了。与「〜だけで」不同，「さえ」带有更强的强调语气，暗示这个条件可能是意外的或者超出预期的最低要求。", "mistakes": "❌ 時間さえあったら、旅行したい → ✅ 時間さえあれば、旅行したい（「さえ」后面必须用「ば」形，不能用「たら」）；❌ 彼さえ来ますれば → ✅ 彼さえ来れば（动词时直接用ば形，不需要「ます」）", "similar": [{"form": "〜だけで", "diff": "「だけで」仅表示充分条件，「さえ〜ば」含有强调和意外性"}, {"form": "〜ばいい", "diff": "「ばいい」表示建议或最好的选择，「さえ〜ば」强调最低限度条件"}], "quiz": [{"q": "健康____あれば、他に何もいらない。", "opts": ["A.が", "B.を", "C.さえ", "D.でも"], "ans": "C", "exp": "表示最低限度的条件用「さえ」，健康是最重要的条件"}, {"q": "君____来てくれれば、安心だ。", "opts": ["A.さえ", "B.だけ", "C.も", "D.は"], "ans": "A", "exp": "强调只要你来就足够了，用「さえ」表示最低限度条件"}, {"q": "この薬____飲めば、すぐ治ります。", "opts": ["A.を", "B.が", "C.さえ", "D.でも"], "ans": "C", "exp": "「さえ〜ば」表示只要服用这个药就能治好，强调最低限度条件"}]}, "10": {"analysis": "「としたら/としても」是N3重要的假设表现，前者表示假设条件，后者表示让步假设。与「たら/ても」相比，「としたら/としても」更强调假设性，常用于现实可能性较低的情况。", "mistakes": "易混淆假设与现实：❌ 明日雨が降るとしたら、試合は中止です → ✅ 明日雨が降ったら、試合は中止です（现实可能性高用「たら」）", "similar": [{"form": "〜たら/〜ても", "diff": "たら/ても用于现实可能性较高的情况；としたら/としても用于假设性较强的情况"}, {"form": "〜ば/〜でも", "diff": "ば/でも更口语化；としたら/としても更正式，常用于书面语"}], "quiz": [{"q": "もし彼が来る____、一緒に映画を見ましょう。", "opts": ["A. としたら", "B. としても", "C. だったら", "D. なら"], "ans": "A", "exp": "假设彼来的话，用「としたら」表示假设条件"}, {"q": "お金がない____、この旅行はやめよう。", "opts": ["A. としたら", "B. としても", "C. だとしても", "D. とすれば"], "ans": "A", "exp": "假如没有钱的话，用「としたら」表示假设条件"}, {"q": "雨が降る____、試合は続けます。", "opts": ["A. としたら", "B. としても", "C. とすれば", "D. ならば"], "ans": "B", "exp": "就算下雨也要继续比赛，用「としても」表示让步假设"}]}, "11": {"analysis": "「〜かぎり（は）」表示在某种条件或范围内的限定，强调只要满足这个条件，后面的情况就会持续或成立。与中文「只要」相似，但更强调范围的限定性。动词辞書形+かぎり表示积极条件，ない形+かぎり表示消极条件的限定。", "mistakes": "❌ 時間があるかぎりは、勉強したい。（混淆条件） → ✅ 時間があるかぎり、勉強を続ける。❌ 元気なかぎりは働きます。（な形容词误用） → ✅ 元気なかぎり働きます。❌ お金がないかぎりは、買えません。（は的误用） → ✅ お金がないかぎり、買えません。", "similar": [{"form": "〜うちに", "diff": "うちに强调时间的变化过程，かぎり强调条 ff": "そう表示外观印象和推测，っぽい表示内在的性格倾向"}], "quiz": [{"q": "彼女は男____服装をしている。", "opts": ["A.っぽい", "B.らしい", "C.みたい", "D.そう"], "ans": "A", "exp": "「男っぽい服装」表示有男性化倾向的服装，っぽい最适合表达这种性质倾向"}, {"q": "この料理は____味がする。", "opts": ["A.忘れっぽい", "B.甘っぽい", "C.甘い", "D.甘らしい"], "ans": "C", "exp": "味觉形容词直接用「甘い」，不需要用っぽい。っぽい主要用于性格、外观等特征"}, {"q": "最近____ことが多くなった。", "opts": ["A.忘れるっぽい", "B.忘れっぽい", "C.忘れそう", "D.忘れらしい"], "ans": "B", "exp": "「忘れっぽい」是固定搭配，表示健忘的性格倾向。动词ます形去掉ます加っぽい"}]}, "19": {"analysis": "「〜だらけ」表示某种不好的事物到处都是、充满了的状态，带有明显的否定色彩。与中文的「到处是」「全是」相似，但更强调数量过多且令人困扰的负面情况。", "mistakes": "❌ 花だらけの庭がきれいです → ✅ 花がいっぱいの庭がきれいです（美好事物不用だらけ）\n❌ 間違いだらけを直した → ✅ 間違いだらけの作文を直した（需要连体修饰）", "similar": [{"form": "〜ばかり", "diff": "ばかり可用于好坏事物，だらけ只用于负面事物"}, {"form": "〜いっぱい", "diff": "いっぱい中性，だらけ带贬义色彩"}], "quiz": [{"q": "この作文は間違い____で、読みにくいです。", "opts": ["A.だらけ", "B.ばかり", "C.いっぱい", "D.ぐらい"], "ans": "A", "exp": "間違い（错误）是负面事物，用だらけ表示充满错误的状态"}, {"q": "子供の服が泥____になってしまった。", "opts": ["A.ばかり", "B.だらけ", "C.ぐらい", "D.ほど"], "ans": "B", "exp": "泥（泥土）弄脏衣服是负面情况，用だらけ表示全身都是泥"}, {"q": "彼の部屋は本____で足の踏み場もない。", "opts": ["A.だらけ", "B.ばかり", "C.いっぱい", "D.ぐらい"], "ans": "A", "exp": "房间乱得连下脚的地方都没有，是负面状况，用だらけ强调书太多造成的困扰"}]}, "20": {"analysis": "「〜気味」表示某种状态或倾向的轻微程度，相当于中文的「有点」「稍微」。与「〜すぎる」不同，「気味」强调的是一种趋势或倾向，而非过度的程度。常用于描述身体状态、情绪变化等，语气相对温和客观。", "mistakes": "❌ 今日は暑い気味です → ✅ 今日は暑めです（形容词不能直接接気味）；❌ 彼は怒る気味だった → ✅ 彼は怒り気味だった（动词要用ます形）", "similar": [{"form": "〜がち", "diff": "「がち」表示经常性的倾向，多含负面意味；「気味」表示当前的轻微状态，相对中性"}, {"form": "〜っぽい", "diff": "「っぽい」表示「像~样子」，更主观；「気味」表示客观的轻微倾向"}, {"form": "ちょっと〜", "diff": "「ちょっと」是副词修饰；「気味」作为后缀直接接在词后"}], "quiz": [{"q": "最近、風邪（____）で、体調がよくない。", "opts": ["A. 気味", "B. がち", "C. っぽい", "D. そう"], "ans": "A", "exp": "表示「有点感冒的倾向」，用「気味」最自然"}, {"q": "彼は遅刻（____）なので、早めに連絡したほうがいい。", "opts": ["A. 気味", "B. がち", "C. そう", "D. らしい"], "ans": "B", "exp": "表示「经常迟到的倾向」，用「がち」表示习惯性行为"}, {"q": "この料理は塩（____）ですね。", "opts": ["A. 気味", "B. っぽい", "C. 辛め", "D. がち"], "ans": "A", "exp": "表示「稍微有点咸」，「塩気味」是常用搭配"}]}, "22": {"analysis": "「わけにはいかない」表示由于道德、社会责任或义务等原因，在客观上不能做某事，带有强烈的责任感和无奈感。与单纯的「できない」不同，这个句型强调的是即使主观上想做或不想做，但基于外在的道德或社会压力而不得不如此。", "mistakes": "容易与「てはいけない」混淆。❌友達を裏切るわけにはいけない → ✅友達を裏切るわけにはいかない（不能背叛朋友）；❌約束を破るわけにはいきません → ✅約束を破るわけにはいかない（不能违背约定）", "similar": [{"form": "〜てはいけない", "diff": "「てはいけない」是禁止表现，「わけにはいかない」是基于责任感的不得已"}, {"form": "〜ことはできない", "diff": "「ことはできない」表示能力上做不到，「わけにはいかない」表示道义上不允许"}], "quiz": [{"q": "親の面倒を見ないわけには（　　）。", "opts": ["A.いけない", "B.いかない", "C.ならない", "D.できない"], "ans": "B", "exp": "「わけにはいかない」是固定表达，不能用其他形式替换"}, {"q": "借りたお金を（　　）わけにはいかない。", "opts": ["A.返さない", "B.返す", "C.返して", "D.返した"], "ans": "A", "exp": "「わけにはいかない」前接动词否定形，表示不能不做某事"}, {"q": "会社の秘密を他人に（　　）わけにはいかない。", "opts": ["A.話す", "B.話した", "C.話して", "D.話さない"], "ans": "A", "exp": "「わけにはいかない」接动词辞书形，表示不能做某事"}]}, "23": {"analysis": "「〜てよかった」表达对过去某个行为或状态的庆幸、满足情绪，强调结果的积极性。与单纯的「よかった」不同，这里的「て形+よかった」突出了行为的完成性和由此带来的安心感。", "mistakes": "易混淆时态和语境：❌「明日行ってよかった」→ ✅「昨日行ってよかった」（必须是已完成的事）；❌「雨が降ってよかった」（客观事实）→ ✅「傘を持ってきてよかった」（自己的行为）", "similar": [{"form": "〜なくてよかった", "diff": "表示没做某事的庆幸，如「行かなくてよかった」vs「行ってよかった」"}, {"form": "〜でよかった", "diff": "对状态的满足，如「晴れでよかった」vs「準備してよかった」（行为）"}], "quiz": [{"q": "早く家に帰っ____。雨が降り始めた。", "opts": ["A. てよかった", "B. でよかった", "C. なくてよかった", "D. ばよかった"], "ans": "A", "exp": "对自己提前回家这个行为感到庆幸，用「て形+よかった」"}, {"q": "あの映画を見____。とてもつまらなかった。", "opts": ["A. てよかった", "B. なくてよかった", "C. でよかった", "D. ばよかった"], "ans": "B", "exp": "庆幸没有看那部电影，用「なくてよかった」表示没做某事的庆幸"}, {"q": "薬を飲ん____。もう熱が下がった。", "opts": ["A. でよかった", "B. なくてよかった", "C. てよかった", "D. ばよかった"], "ans": "C", "exp": "对吃药这个行为感到庆幸，因为烧已经退了，用「て形+よかった」"}]}, "25": {"analysis": "「〜というのは」是用于定义和解释概念的重要句型，相当于中文的「所谓〜就是」。前接词语或概念，后面必须跟上解释说明，形成完整的定义句。常用于教学、说明和澄清概念的场合。", "mistakes": "❌「友情」というのは大切です → ✅「友情」というのは大切なものです（缺少解释内容）\n❌ 勉強するというのは → ✅ 勉強するというのは知識を身につけることです（动词后需要完整解释）", "similar": [{"form": "〜とは", "diff": "更简洁，多用于书面语定义"}, {"form": "〜ということは", "diff": "强调推论结果，不是单纯定义"}, {"form": "〜というもの", "diff": "带有感情色彩的解释说明"}], "quiz": [{"q": "「環境問題」____地球の自然を守ることです。", "opts": ["A. ということは", "B. というのは", "C. といえば", "D. について"], "ans": "B", "exp": "定义解释「環境問題」这个概念，用「というのは」最合适"}, {"q": "彼が言った「頑張る」____どういう意味ですか。", "opts": ["A. というのは", "B. ということは", "C. といったら", "D. について"], "ans": "A", "exp": "询问「頑張る」这个词的定义解释，使用「というのは」"}, {"q": "「時間を大切にする」____毎日を無駄にしない____です。", "opts": ["A. ということは...ということ", "B. というのは...ということ", "C. といえば...ということ", "D. について...ということ"], "ans": "B", "exp": "前半用「というのは」提出要解释的概念，后半用「ということ」完成解释"}]}, "26": {"analysis": "「〜べきだ」表示说话人认为某事在道德上、社会常识上或义务上应该做，语气比「〜ほうがいい」更强烈，带有强制性。它常用于表达社会规范、道德义务或理所当然的事情，不是个人建议而是客观判断。", "mistakes": "❌ 明日早く起きるべきだった。(过去形错误) → ✅ 明日早く起きるべきだ。❌ 学生はもっと勉強するべきがいい。(混用) → ✅ 学生はもっと勉強するべきだ。❌ 彼に謝るべきでした。(敬语使用错误) → ✅ 彼に謝るべきだった。", "similar": [{"form": "〜ほうがいい", "diff": "「べきだ」是义务性建议，「ほうがいい」是一般性建议，语气较温和"}, {"form": "〜なければならない", "diff": "「べきだ」强调应然性，「なければならない」强调必然性和义务"}, {"form": "〜はずだ", "diff": "「べきだ」表示义务，「はずだ」表示推测或理所当然的结果"}], "quiz": [{"q": "学生は時間を____守るべきだ。", "opts": ["A. に", "B. を", "C. で", "D. と"], "ans": "B", "exp": "「時間を守る」是固定搭配，表示遵守时间，用を表示对象"}, {"q": "そんな失礼なことを言う____。", "opts": ["A. べきだ", "B. べきではない", "C. べきでした", "D. べきだった"], "ans": "B", "exp": "失礼的事情不应该说，用否定形「べきではない」"}, {"q": "親は子供を____べきだ。", "opts": ["A. 大切にする", "B. 大切にした", "C. 大切にして", "D. 大切だ"], "ans": "A", "exp": "「べきだ」前接动词辞书形，「大切にする」是动词辞书形"}]}, "27": {"analysis": "「〜てはならない」是表示强烈禁止的文法，比「〜てはいけない」更加正式和严厉。常用于法律条文、规则说明等正式场合，带有绝对不允许的语气。相比口语化的「だめ」，这个表达更具权威性。", "mistakes": "❌ 遅刻してはならないです → ✅ 遅刻してはなりません（敬语形式应该统一）\n❌ ここで喫煙してはならないよ → ✅ ここで喫煙してはいけないよ（日常对话用「いけない」更自然）\n❌ 秘密を言ってはならない → ✅ 秘密を話してはならない（「言う」应该用「話す」）", "similar": [{"form": "〜てはいけない", "diff": "「ならない」更正式严厉，「いけない」更口语化温和"}, {"form": "〜禁止", "diff": "「禁止」是名词，「てはならない」是动词表达，语法功能不同"}], "quiz": [{"q": "学校の規則では、授業中に携帯電話を使用（____）。", "opts": ["A.してはならない", "B.してもいい", "C.しなければならない", "D.したほうがいい"], "ans": "A", "exp": "学校规则中禁止在上课时使用手机，应该用表示强烈禁止的「してはならない」"}, {"q": "この薬は子供が（____）ところに置いてはならない。", "opts": ["A.触れる", "B.触れられる", "C.触れた", "D.触れよう"], "ans": "B", "exp": "「触れられる」是可能形，表示「孩子能够触摸到的地方」，符合语境"}, {"q": "法律により、未成年者はお酒を（____）。", "opts": ["A.飲んではいけません", "B.飲んではなりません", "C.飲まなければなりません", "D.飲んでもいいです"], "ans": "B", "exp": "法律条文使用正式的「飲んではなりません」更合适，表示严格禁止"}]}, "28": {"analysis": "「〜ないといけない」表示义务或必要性，相当于中文的「必须」「得」。由动词ない形+といけない构成，是日常会话中最常用的义务表达。注意与「〜てはいけない」的区别：前者表示「必须做」，后者表示「不能做」。", "mistakes": "易错点：混淆肯定义务和否定禁止。❌ 宿題をしてはいけない（不能做作业）→ ✅ 宿題をしないといけない（必须做作业）。❌ 早く行かないといけない（语序错误）→ ✅ 早く行かないといけない（必须早点去）。", "similar": [{"form": "〜なければならない", "diff": "更正式，书面语色彩强"}, {"form": "〜なくてはいけない", "diff": "口语缩约形，更随意"}, {"form": "〜てはいけない", "diff": "表示禁止「不能做」，意思相反"}], "quiz": [{"q": "薬を____。", "opts": ["A. 飲んではいけない", "B. 飲まないといけない", "C. 飲むといけない", "D. 飲んでいけない"], "ans": "B", "exp": "根据语境「必须吃药」，用「飲まないといけない」表示义务"}, {"q": "子供は夜遅く____。", "opts": ["A. 寝ないといけない", "B. 起きないといけない", "C. 起きてはいけない", "D. 寝てはいけない"], "ans": "C", "exp": "「孩子晚上不能晚睡」表示禁止，用「起きてはいけない」"}, {"q": "明日のテストの準備を____。", "opts": ["A. してはいけない", "B. しないといけない", "C. するといけない", "D. していけない"], "ans": "B", "exp": "「必须准备明天的考试」表示义务，用「しないといけない」"}]}, "29": {"analysis": "「〜に比べて」是表示比较的重要语法，用于对比两个事物的差异。与中文「与~相比」意思相同，常用于描述变化或差异。注意「に比べて」和「に比べると」意思完全相同，可以互换使用。", "mistakes": "❌ 今年は去年に比べて暑くなった → ✅ 去年に比べて、今年は暑くなった（比较基准放在句首更自然）; ❌ 兄に比べて私が背が高い → ✅ 兄に比べて、私は背が高い（主语用は而非が）", "similar": [{"form": "〜より", "diff": "「より」更直接简洁，「に比べて」更正式，强调对比感"}, {"form": "〜と比べて", "diff": "意思相同，但「と比べて」稍显生硬，日常多用「に比べて」"}], "quiz": [{"q": "昨日____今日は涼しいですね。", "opts": ["A. に比べて", "B. によって", "C. について", "D. にとって"], "ans": "A", "exp": "表示与昨天相比的比较，用「に比べて」"}, {"q": "日本の物価は中国____高いと思います。", "opts": ["A. について", "B. に比べて", "C. によると", "D. に対して"], "ans": "B", "exp": "比较日本和中国的物价差异，用「に比べて」"}, {"q": "この店は他の店____、サービスがいいです。", "opts": ["A. に比べて", "B. に関して", "C. に向けて", "D. に基づいて"], "ans": "A", "exp": "与其他店铺进行服务质量的比较，使用「に比べて」"}]}, "30": {"analysis": "「〜にしては」表示基于某种身份、状况或标准的一般预期，实际情况却出乎意料地好或坏。常用于表达「虽然是~，但是~」的对比关系，暗含说话者的意外感。", "mistakes": "❌ 彼は学生にしては、お金を持っていない。→ ✅ 彼は学生にしては、お金を持っている。（应表达与预期相反的积极评价）\n❌ 初心者なのにしては上手だ。→ ✅ 初心者にしては上手だ。（不能加「なのに」）", "similar": [{"form": "〜のわりに", "diff": "「のわりに」更客观，「にしては」带有更强的意外感和主观评价"}, {"form": "〜にしても", "diff": "「にしても」表示即使如此，「にしては」强调与预期的对比"}], "quiz": [{"q": "子供____、よく考えて行動しますね。", "opts": ["A. なのに", "B. にしては", "C. について", "D. として"], "ans": "B", "exp": "表示对孩子来说出乎意料地成熟，用「にしては」"}, {"q": "この店は安い____、味がとてもいい。", "opts": ["A. にしては", "B. について", "C. に対して", "D. として"], "ans": "A", "exp": "便宜的店通常味道一般，但这家店味道很好，与预期相反"}, {"q": "彼は外国人____、日本語が下手だ。", "opts": ["A. として", "B. にしては", "C. について", "D. に対して"], "ans": "B", "exp": "外国人日语不好是正常的，但此句想表达「对外国人来说（意外地）不好」"}]}, "31": {"analysis": "「〜ないで/ずに」表示在不做某事的状态下进行另一个动作，强调两个动作的同时性。「ないで」是口语形式，「ずに」是书面语形式，意思完全相同。这个文法重点在于表达「未做A而做B」的逻辑关系。", "mistakes": "❌ 何も言わなくて出かけた → ✅ 何も言わないで出かけた（什么都没说就出门了）；❌ 宿題をしずに寝た → ✅ 宿題をしないで寝た/宿題をせずに寝た（没做作业就睡了）", "similar": [{"form": "〜なくて", "diff": "表示原因理由，不强调同时性"}, {"form": "〜ず", "diff": "古典语法，现代多用「ずに」"}, {"form": "〜ないまま", "diff": "强调状态的持续，含有遗憾语气"}], "quiz": [{"q": "彼は挨拶も（　　）帰ってしまった。", "opts": ["A. しなくて", "B. しないで", "C. しなかった", "D. しません"], "ans": "B", "exp": "「挨拶もしないで」表示没有打招呼就回去了，用「〜ないで」表示未做某事的状态下进行另一动作"}, {"q": "薬を（　　）病気が治った。", "opts": ["A. 飲まずに", "B. 飲まなくて", "C. 飲まないから", "D. 飲まないので"], "ans": "A", "exp": "「飲まずに」是「〜ずに」的形式，表示没吃药病就好了，书面语表达"}, {"q": "電気を（　　）本を読むのは目に悪い。", "opts": ["A. つけなくて", "B. つけないで", "C. つけずに", "D. つけないから"], "ans": "C", "exp": "「つけずに」表示不开灯看书，「する」的未然形是「せず」，所以是「つけずに」"}]}, "32": {"analysis": "「〜ずにはいられない」表示无法抑制的强烈冲动或感情，带有不由自主、情不自禁的含义。这是一种情感表达，强调内心的冲动强烈到无法控制的程度。接续时要注意「ない」去掉后加「ず」，特殊动词「する」变为「せず」，「来る」变为「こず」。", "mistakes": "❌ 面白い映画を見て、笑わないではいられない → ✅ 面白い映画を見て、笑わずにはいられない（接续错误，应该用「ず」而非「ないで」）❌ 彼の話を聞いて、感動しずにはいられない → ✅ 彼の話を聞いて、感動せずにはいられない（「する」的变化形是「せず」）", "similar": [{"form": "〜ないではいられない", "diff": "意思相同但较为口语化，「ずには」更正式书面"}, {"form": "〜てたまらない", "diff": "都表示强烈感情，但「てたまらない」侧重难以忍受的程度"}], "quiz": [{"q": "美しい景色を見ると、写真を撮ら____。", "opts": ["A. ないではいられない", "B. ずにはいられない", "C. てたまらない", "D. なければならない"], "ans": "B", "exp": "表示看到美景忍不住想拍照，用「ずにはいられない」表示无法抑制的冲动"}, {"q": "その悲しいニュースを聞いて、涙を流さ____。", "opts": ["A. ずにはいられない", "B. なくてもいい", "C. ねばならない", "D. ないことがある"], "ans": "A", "exp": "听到悲伤消息忍不住流泪，表示情感上的不由自主"}, {"q": "彼の優しさに触れて、感謝____。", "opts": ["A. しないではいられない", "B. しずにはいられない", "C. せずにはいられない", "D. さずにはいられない"], "ans": "C", "exp": "「する」的ない形是「しない」，去掉「ない」后变为「せず」"}]}, "33": {"analysis": "「〜わけではない」是部分否定表现，用来缓和否定语气，表达「并不是完全这样」的含义。与完全否定不同，它暗示存在其他可能性或程度上的差异，常用于委婉表达或为后续转折做铺垫。", "mistakes": "易错点：误用为完全否定。❌ 彼が悪いわけではない。（完全否定，不自然）→ ✅ 彼が悪いわけではないが、もう少し注意してほしい。（部分否定，后接转折更自然）", "similar": [{"form": "〜とは限らない", "diff": "「わけではない」重在否定断言，「とは限らない」重在表示不确定性"}, {"form": "〜というものではない", "diff": "「わけではない」口语化，「というものではない」更书面化和正式"}], "quiz": [{"q": "お金がない（　　）、ただ今は買う必要がないだけです。", "opts": ["A. わけではない", "B. ことではない", "C. ものではない", "D. はずではない"], "ans": "A", "exp": "表示部分否定「并不是没钱」，为后面的真实原因做铺垫"}, {"q": "彼女は美人（　　）が、とても優しい人だ。", "opts": ["A. というわけだが", "B. なわけではない", "C. のわけだが", "D. だというわけだが"], "ans": "B", "exp": "「美人なわけではない」表示「并不是美人」，后接「が」形成转折"}, {"q": "日本語が難しい（　　）、勉強方法が悪いのかもしれません。", "opts": ["A. わけではないが", "B. ものではないが", "C. ことではないが", "D. はずではないが"], "ans": "A", "exp": "表示「并不是日语难」，暗示可能是其他原因（学习方法）"}]}, "34": {"analysis": "「〜てもらう」表示说话者从他人那里得到恩惠或好处，强调接受帮助的一方（说话者）的受益感。与单纯的被动语态不同，这个语法带有感谢和受惠的情感色彩。「もらう」用于对同辈或晚辈，「いただく」用于对长辈或上级，体现了日语的敬语体系。", "mistakes": "❌ 先生は私に本を読んでもらった。(老师让我读了书) → ✅ 私は先生に本を読んでもらった。(我请老师给我读了书)。主语必须是受益者，不能是施惠者。❌ 友だちを荷物を持ってもらった。(助词错误) → ✅ 友だちに荷物を持ってもらった。施惠者用「に」标记。", "similar": [{"form": "〜てくれる", "diff": "强调他人主动给予恩惠，视点在施惠者；〜てもらう强调自己接受恩惠，视点在受益者"}, {"form": "〜てもらいたい", "diff": "表示希望得到他人帮助的愿望；〜てもらう表示已经得到帮助的事实"}, {"form": "〜ていただく", "diff": "〜てもらう的敬语形式，用于对长辈或地位高的人表达感谢"}], "quiz": [{"q": "昨日、母____料理を作ってもらいました。", "opts": ["A. が", "B. を", "C. に", "D. で"], "ans": "C", "exp": "施惠者（母亲）用助词「に」标记，表示从母亲那里得到做饭的帮助"}, {"q": "部長____この資料を確認していただきました。", "opts": ["A. は", "B. が", "C. を", "D. に"], "ans": "D", "exp": "对上级使用敬语「いただく」，部長是施惠者用「に」标记"}, {"q": "友だち____宿題を手伝ってもらって、とても助かりました。", "opts": ["A. は", "B. が", "C. を", "D. に"], "ans": "D", "exp": "朋友是提供帮助的人（施惠者），用「に」标记，表示从朋友那里得到帮助"}]}, "35": {"analysis": "「〜させられる」是使役受身形，表示被迫或不情愿地做某事。它结合了使役形「させる」和受身形「られる」，强调动作的非自愿性和被强制性。与单纯的受身不同，这个文法突出了说话人的不满或无奈情绪。", "mistakes": "❌ 友達に映画を見させられた → ✅ 友達に映画を見に行かせられた（注意动词的使役形变化）; ❌ 母に野菜を食べさせられる → ✅ 母に野菜を食べさせられた（时态要一致）; ❌ 先生に勉強させられている → ✅ 先生に勉強させられている（进行时正确，但要注意语境是否自然）", "similar": [{"form": "〜れる/られる（受身）", "diff": "单纯受身不强调被迫感，させられる强调不情愿和被强制"}, {"form": "〜させる（使役）", "diff": "使役是主动让别人做，させられる是被动被迫做"}, {"form": "〜なければならない", "diff": "表示义务必须，させられる强调外力强制和不情愿"}], "quiz": [{"q": "子供の頃、母に毎日ピアノを（____）。", "opts": ["A. 練習させた", "B. 練習させられた", "C. 練習された", "D. 練習しさせられた"], "ans": "B", "exp": "被母亲强迫练钢琴，用使役受身「練習させられた」表示被迫和不情愿"}, {"q": "会議で突然発表を（____）、とても困った。", "opts": ["A. させた", "B. された", "C. させられて", "D. させられた"], "ans": "C", "exp": "「させられて、困った」，て形连接两个动作，表示因为被迫发表而困扰"}, {"q": "昨日は友達に夜遅くまで付き合（____）。", "opts": ["A. わせた", "B. わされた", "C. わせられた", "D. われた"], "ans": "C", "exp": "「付き合わせられた」，う动词的使役受身形，表示被迫陪伴到很晚"}]}, "36": {"analysis": "「〜はずがない」表示说话人基于常识、经验或逻辑判断，认为某事绝对不可能发生。与单纯的否定不同，它强调的是「根据道理来说不应该」的强烈否定，常用于为某人辩护或表达确信。", "mistakes": "易错点：与「〜わけがない」混淆。❌彼が来るわけがない（强调结果的不合理）→ ✅彼が来るはずがない（基于了解判断不可能）；时态错误：❌彼が嘘をついたはずがない→ ✅彼が嘘をつくはずがない", "similar": [{"form": "〜わけがない", "diff": "「はずがない」基于常识判断，「わけがない」强调结果不合理"}, {"form": "〜ことはない", "diff": "「はずがない」表不可能，「ことはない」表不必要"}], "quiz": [{"q": "あの真面目な田中さんが遅刻する（　　）。", "opts": ["A.はずがない", "B.わけがない", "C.ことはない", "D.べきではない"], "ans": "A", "exp": "基于对田中认真性格的了解，判断他不可能迟到，用「はずがない」"}, {"q": "こんな簡単な問題が分から（　　）。", "opts": ["A.はずはない", "B.はずがない", "C.はずではない", "D.はずもない"], "ans": "B", "exp": "「はずがない」是固定搭配，不能说「はずはない」或「はずではない」"}, {"q": "彼女がそんなことを言う（　　）、きっと誤解だ。", "opts": ["A.わけがない", "B.ことがない", "C.はずがない", "D.べきがない"], "ans": "C", "exp": "基于对她的了解判断她不可能说那样的话，用「はずがない」最自然"}]}, "37": {"analysis": "「〜にちがいない」表示说话者基于某种根据或观察，对事物做出强烈确信的推测判断。与「〜はずだ」不同，它更强调内心的确信程度，常用于眼前能观察到的现象或已知信息的推理。接续时动词形容词用普通形，名词和な形容词词干直接加「にちがいない」。", "mistakes": "❌ 明日は雨が降るにちがいありません → ✅ 明日は雨が降るにちがいない（不能敬语化）\n❌ 彼は学生だにちがいない → ✅ 彼は学生にちがいない（名词后不加「だ」）\n❌ きれいだにちがいない → ✅ きれいにちがいない（な形容词词干直接接续）", "similar": [{"form": "〜はずだ", "diff": "はずだ基于逻辑推理，にちがいない基于直观确信"}, {"form": "〜だろう", "diff": "だろう表推测可能性，にちがいない表强烈确信"}, {"form": "きっと〜だ", "diff": "きっと是副词修饰，にちがいない是语法形式，确信度更强"}], "quiz": [{"q": "あの人は有名な俳優____。みんなが写真を撮っている。", "opts": ["A. にちがいない", "B. だろう", "C. かもしれない", "D. のようだ"], "ans": "A", "exp": "根据大家都在拍照这个现象，可以强烈确信那个人是有名演员，用「にちがいない」最合适"}, {"q": "この答え____。計算を三回も確認したから。", "opts": ["A. が正しいはずだ", "B. は正しいにちがいない", "C. を正しいだろう", "D. と正しいらしい"], "ans": "B", "exp": "基于三次确认计算这个事实，说话者对答案正确性有强烈确信，用「にちがいない」"}, {"q": "彼女は今頃家に____。もう8時だし、いつも早く帰るから。", "opts": ["A. いるはず", "B. いるだろう", "C. いるにちがいない", "D. いるらしい"], "ans": "C", "exp": "基于时间和她平时早回家的习惯，说话者确信她现在在家，用「にちがいない」表达强烈确信"}]}, "38": {"analysis": "「〜てある」表示他动词动作完成后的状态持续存在，强调这种状态是有人有意造成的结果。与中文'已经~了'、'~着'相对应，但必须体现人为性和持续性。", "mistakes": "易错点：❌自動詞：窓が開いてある → ✅他動詞：窓が開けてある（窗户开着）；❌非意图性：雨が降ってある → ✅意图性：傘が置いてある（伞放着）", "similar": [{"form": "〜ている", "diff": "〜ているは動作の継続や結果の状態、〜てあるは意図的な準備・配置の状態"}, {"form": "〜ておく", "diff": "〜ておくは事前準備の動作、〜てあるはその結果の状態"}], "quiz": [{"q": "壁に写真が（　　）。", "opts": ["A. 飾っている", "B. 飾ってある", "C. 飾っておく", "D. 飾っていく"], "ans": "B", "exp": "写真を飾るという他動詞の意図的な結果状態を表すので「飾ってある」が正解"}, {"q": "冷蔵庫にビールが（　　）。", "opts": ["A. 入っている", "B. 入ってある", "C. 買ってある", "D. 飲んである"], "ans": "B", "exp": "「入れる」という他動詞の結果状態で、意図的に入れられた状態を表す"}, {"q": "机の上に本が（　　）。", "opts": ["A. あってある", "B. いてある", "C. 置いてある", "D. なってある"], "ans": "C", "exp": "「置く」は他動詞で意図的な配置を表し、その結果状態が「置いてある」"}]}, "39": {"analysis": "「〜ことになっている」表示既定的规则、制度或预定，强调这是已经决定好的客观状态，而非个人意志。与「〜ことにする」（个人决定）形成对比，前者是被动接受的规定，后者是主观决定。", "mistakes": "易错点：与「〜ことにする」混淆。❌私は毎日運動することにしています（表达错误，应该是个人习惯）→ ✅私は毎日運動することにしている（我决定每天运动）；❌会議は来週することになります（未来的决定用错时态）→ ✅会議は来週することになっています（会议预定在下周举行）", "similar": [{"form": "〜ことにする", "diff": "主观决定vs客观规定，个人意志vs既定事实"}, {"form": "〜はずだ", "diff": "推测判断vs确定的规则预定"}, {"form": "〜予定だ", "diff": "单纯计划vs制度化的安排"}], "quiz": [{"q": "この会社では、毎朝9時に出勤する____。", "opts": ["A. ことにする", "B. ことになっている", "C. はずだ", "D. 予定だ"], "ans": "B", "exp": "公司规定的上班时间是既定制度，用「ことになっている」"}, {"q": "子供は12歳まで映画を一人で見る____。", "opts": ["A. ことができない", "B. ことにしない", "C. ことになっていない", "D. はずではない"], "ans": "C", "exp": "电影院的年龄限制规定，12岁以下不能单独观看"}, {"q": "来月から新しいシステムを使う____。", "opts": ["A. ことにする", "B. ことになっている", "C. つもりだ", "D. だろう"], "ans": "B", "exp": "公司已经决定的新系统导入计划，是既定安排"}]}, "40": {"analysis": "「〜ばかりでなく」表示不仅限于前项，还有后项的追加关系，强调两个或多个优点、特征的并存。与「〜だけでなく」意思相同但更书面化，常用于正式场合或书面语中，体现了日语表达的层次感。", "mistakes": "❌ 彼は日本語ばかりでなく、中国語を話せます → ✅ 彼は日本語ばかりでなく、中国語も話せます（后项需要用「も」呼应前项的否定）", "similar": [{"form": "〜だけでなく", "diff": "意思完全相同，但「ばかりでなく」更书面化、正式"}, {"form": "〜のみならず", "diff": "更加书面化和正式，多用于书面语或演讲"}], "quiz": [{"q": "この料理は美味しい____、栄養価も高い。", "opts": ["A. ばかりでなく", "B. ばかりに", "C. ばかりで", "D. ばかりを"], "ans": "A", "exp": "表示「不仅美味，营养价值也高」的追加关系，用「ばかりでなく」"}, {"q": "彼女は歌が上手____、踊りも得意だ。", "opts": ["A. だけに", "B. だけでなく", "C. だけで", "D. だけを"], "ans": "B", "exp": "「だけでなく」与「ばかりでなく」意思相同，表示不仅会唱歌，还会跳舞"}, {"q": "この本は内容が面白いばかりでなく、____安い。", "opts": ["A. でも", "B. そして", "C. 値段も", "D. 値段が"], "ans": "C", "exp": "使用「ばかりでなく」时，后项通常用「も」来呼应，表示价格也便宜"}]}, "41": {"analysis": "「といった」是用于举例说明的表现形式，相当于中文的「之类的」「等」。它将前面提到的具体例子概括为某一类别，强调这些只是众多同类事物中的代表性例子。使用时注意前面通常会有「や」等并列助词连接多个例子。", "mistakes": "❌ コーヒーといった飲み物 → ✅ コーヒーや紅茶といった飲み物（举例时需要多个例子）\n❌ 学生はといった人 → ✅ 学生や会社員といった人（接续错误，应该是名词+といった+名词）", "similar": [{"form": "〜など", "diff": "「など」更口语化，可单独使用；「といった」更书面语，强调分类概括"}, {"form": "〜のような", "diff": "「のような」表示相似性；「といった」表示同类别的举例"}], "quiz": [{"q": "野球____サッカーといったスポーツが人気です。", "opts": ["A. と", "B. や", "C. を", "D. に"], "ans": "B", "exp": "「といった」前面用「や」连接多个并列的例子"}, {"q": "このレストランでは、寿司____天ぷらといった日本料理が食べられます。", "opts": ["A. と", "B. や", "C. の", "D. で"], "ans": "B", "exp": "举例列举时用「や」连接具体例子"}, {"q": "彼は小説____エッセイといった文学作品をよく読みます。", "opts": ["A. と", "B. の", "C. や", "D. を"], "ans": "C", "exp": "「小説やエッセイといった」表示举例，用「や」连接"}]}, "42": {"analysis": "〜くなる/になる表示状态或性质的变化，是日语中最基础的变化表达。い形容词去い+くなる，な形容词直接+になる。重点在于理解变化的过程性，常与だんだん、もっと等副词搭配使用。", "mistakes": "易错点：❌ 元気くなる → ✅ 元気になる（な形容词不能用くなる）；❌ 寒いになる → ✅ 寒くなる（い形容词不能直接+になる）；❌ きれくなる → ✅ きれいになる（い结尾的な形容词仍用になる）", "similar": [{"form": "〜てくる", "diff": "强调变化的开始或持续过程"}, {"form": "〜ようになる", "diff": "表示能力或习惯的获得"}, {"form": "〜そうになる", "diff": "表示即将发生的变化"}], "quiz": [{"q": "秋になって、葉っぱが赤（____）。", "opts": ["A. になった", "B. くなった", "C. そうになった", "D. ようになった"], "ans": "B", "exp": "「赤い」是い形容词，变化时用「赤くなった」"}, {"q": "この町は最近（____）。", "opts": ["A. にぎやかくなりました", "B. にぎやかになりました", "C. にぎやかそうになりました", "D. にぎやかでなりました"], "ans": "B", "exp": "「にぎやか」是な形容词，变化时用「にぎやかになる」"}, {"q": "勉強して、数学が（____）。", "opts": ["A. 簡単くなった", "B. 簡単になった", "C. 簡単でなった", "D. 簡単そうになった"], "ans": "B", "exp": "「簡単」是な形容词，表示变化用「簡単になる」"}]}, "43": {"analysis": "「にしたがって/につれて」表示两个现象或状态的同步变化，强调前项变化时后项也相应地发生变化。这个文法特别适合描述自然规律、成长过程或时间推移带来的变化，体现了日语中对连动关系的精确表达。", "mistakes": "❌ 雨が降るにしたがって、気温が上がった → ✅ 雨が降るにしたがって、気温が下がった（随着下雨应该是温度下降而不是上升）；❌ 勉強したにしたがって、成績がよくなった → ✅ 勉強するにしたがって、成績がよくなった（动词要用辞书形）", "similar": [{"form": "〜とともに", "diff": "更强调同时性和伴随关系，常用于抽象概念；にしたがって更强调渐进的变化过程"}, {"form": "〜につれ", "diff": "是につれて的缩略形，多用于书面语；につれて在口语中更常见"}], "quiz": [{"q": "春が____、桜が咲き始めます。", "opts": ["A. 来るにしたがって", "B. 来たにしたがって", "C. 来るによって", "D. 来ることにしたがって"], "ans": "A", "exp": "动词辞书形＋にしたがって，表示随着春天到来，樱花开始开放的渐进变化"}, {"q": "経験を積む____、仕事が上手になった。", "opts": ["A. にしたがって", "B. につれて", "C. とともに", "D. 以上全部正确"], "ans": "D", "exp": "这三个表达都可以表示随着经验积累，工作技能提高的连动关系"}, {"q": "物価が上がる____、生活が苦しくなります。", "opts": ["A. について", "B. につれて", "C. によって", "D. にとって"], "ans": "B", "exp": "につれて表示随着物价上涨，生活变得困难的同步变化关系"}]}, "44": {"analysis": "「〜こそ」是表示强调的助词，用来突出说话人认为最重要或最符合条件的事物。与中文的「正是」、「就是」、「才是」相对应，但日语的强调语气更为强烈。常用于表达说话人的强烈主张或确信。", "mistakes": "易混淆强调对象和语序。❌ 友情こそが本当だ → ✅ これこそが本当の友情だ。注意「こそ」要紧跟被强调的词语，且多与「が」搭配使用。", "similar": [{"form": "〜にこそ", "diff": "「〜にこそ」用于强调动作的对象或场所，如「君にこそ話したい」"}, {"form": "〜でこそ", "diff": "「〜でこそ」强调条件或手段，如「努力してこそ成功する」"}, {"form": "〜ばこそ", "diff": "「〜ばこそ」表示「正因为...才...」的因果强调关系"}], "quiz": [{"q": "彼（　　）真の友達だ。", "opts": ["A. こそが", "B. はこそ", "C. をこそ", "D. でこそ"], "ans": "A", "exp": "强调主语时用「こそが」，表示「他才是真正的朋友」"}, {"q": "努力して（　　）成功できる。", "opts": ["A. こそが", "B. こそ", "C. はこそ", "D. にこそ"], "ans": "B", "exp": "动词て形后直接接「こそ」，表示「正是因为努力才能成功」"}, {"q": "今日（　　）頑張らなければならない。", "opts": ["A. でこそ", "B. をこそ", "C. こそ", "D. がこそ"], "ans": "C", "exp": "时间名词后用「こそ」强调，表示「今天正是要努力的时候」"}]}, "45": {"analysis": "「〜さえ」是表示极端例子的助词，强调连最不可能的情况都成立，其他情况更不用说。与中文「连...都」完全对应，用于突出意外性和强调效果。", "mistakes": "❌ 彼さえ来なかった。→ ✅ 彼でさえ来なかった。（连他都没来。）注意：人称代词后必须用「でさえ」而非「さえ」。", "similar": [{"form": "〜でも", "diff": "でも表示让步「即使」，さえ表示极端例子「连...都」"}, {"form": "〜まで", "diff": "まで表示范围扩大「甚至到」，さえ强调意外的极端情况"}], "quiz": [{"q": "先生（____）この問題がわからない。", "opts": ["A. さえ", "B. でさえ", "C. まで", "D. でも"], "ans": "B", "exp": "「先生」是名词，后接「でさえ」表示「连老师都不懂这个问题」，强调问题的难度"}, {"q": "雨（____）降っているのに、彼は来た。", "opts": ["A. さえ", "B. でさえ", "C. が", "D. まで"], "ans": "A", "diff": "「雨さえ」表示「连雨都在下」，强调恶劣天气条件下他还是来了"}, {"q": "時間（____）あれば、必ず成功する。", "opts": ["A. でさえ", "B. さえ", "C. まで", "D. でも"], "ans": "B", "exp": "「時間さえあれば」表示「只要有时间」，さえ在条件句中表示「只要...就」的意思"}]}, "46": {"analysis": "「〜ものだから」是带有辩解、撒娇或为自己找理由色彩的表达方式，比普通的「〜ので」更加主观且带有感情色彩。常用于解释失误、迟到等不利情况的原因，暗含「请理解我的处境」的语感。", "mistakes": "❌ 雨が降ったものだから、遅れました → ✅ 雨が降ったものですから、遅れました（敬语场合用「ものですから」）❌ 明日行くものだから → ✅ 明日行くものだから、準備が忙しい（需要完整表达因果关系）", "similar": [{"form": "〜ので", "diff": "「ので」较客观中性；「ものだから」带辩解撒娇色彩"}, {"form": "〜から", "diff": "「から」可表主观判断；「ものだから」专门用于辩解性说明"}, {"form": "〜ものですから", "diff": "「ものですから」是敬语形式，用于正式场合"}], "quiz": [{"q": "子供が熱を出した____、会議に出られませんでした。", "opts": ["A.ものだから", "B.ものですから", "C.もので", "D.ものだ"], "ans": "B", "exp": "对上司等正式场合应使用敬语形式「ものですから」"}, {"q": "時間がなかった____、タクシーで行ったんです。", "opts": ["A.ものだ", "B.ものですから", "C.ものだから", "D.ものでは"], "ans": "C", "exp": "非正式场合用「ものだから」表示带辩解色彩的理由说明"}, {"q": "この文法で適切でないのはどれですか。", "opts": ["A.疲れていたもので、早く寝ました", "B.明日のものだから、準備する", "C.急いでいたものですから、失礼しました", "D.風邪をひいたものだから、休みました"], "ans": "B", "exp": "「明日のものだから」は意味不完整，应该是「明日出発するものだから」等完整的因果关系表达"}]}, "47": {"analysis": "「〜かわりに」表示代替或交换，有两个主要用法：①表示代理「代わりに」，即某人代替另一人做某事；②表示代偿「引き換えに」，即以某事作为交换条件获得其他好处。此文法强调的是一种等价交换或替代关系，常用于日常交际中表达请求代理或说明交换条件。", "mistakes": "❌ 私は病気のかわりに、会社を休みます → ✅ 私は病気なので、会社を休みます（理由用「ので」不用「かわりに」）❌ お金のかわりに買い物をします → ✅ お金で買い物をします（手段用「で」）❌ 雨のかわりに傘を持ちます → ✅ 雨なので傘を持ちます（因果关系不用「かわりに」）", "similar": [{"form": "〜代わりに", "diff": "完全相同，「かわりに」是「代わりに」的平假名写法"}, {"form": "〜の代理で", "diff": "只表示代理意思，不能表示交换补偿"}, {"form": "〜と引き換えに", "diff": "只表示交换意思，更正式，不能表示代理"}], "quiz": [{"q": "父が病気なので、私が父の____出席します。", "opts": ["A. かわりに", "B. ために", "C. ことで", "D. として"], "ans": "A", "exp": "表示代替父亲出席，用「かわりに」"}, {"q": "高い給料をもらう____、残業が多いです。", "opts": ["A. ので", "B. かわりに", "C. ために", "D. けれども"], "ans": "B", "exp": "表示以多加班作为交换得到高工资，用「かわりに」"}, {"q": "今日は忙しい____、明日手伝ってもらえませんか。", "opts": ["A. かわりに", "B. ので", "C. のに", "D. から"], "ans": "B", "exp": "表示原因理由用「ので」，不是交换关系"}]}, "48": {"analysis": "「においては」和「にかけては」都表示在某个特定领域或方面的评价，但使用场合略有不同。「においては」更正式，常用于学术或正式场合；「にかけては」更口语化，强调在某方面的专长或突出表现。两者都比「について」更强调限定性，即仅在该特定方面的情况。", "mistakes": "❌ 日本語を勉強することにおいては難しい → ✅ 日本語の勉強においては難しい（接续错误，应接名词）; ❌ 彼は料理においては上手だ → ✅ 彼は料理にかけては上手だ（表示擅长时用「にかけては」更自然）", "similar": [{"form": "について", "diff": "「について」是一般的关于，「においては」更强调在特定领域内的限定"}, {"form": "に関して", "diff": "「に関して」表示与某事相关，「においては」更强调在该方面的具体评价或状况"}, {"form": "の点で", "diff": "「の点で」表示从某个角度看，「においては」更正式且强调领域性"}], "quiz": [{"q": "経済____、この国は発展途上国だ。", "opts": ["A. においては", "B. について", "C. に関して", "D. によって"], "ans": "A", "exp": "表示在经济方面的评价，用「においては」最合适"}, {"q": "彼女は語学____、誰にも負けない。", "opts": ["A. について", "B. においては", "C. にかけては", "D. に対して"], "ans": "C", "exp": "表示在语言学习方面很擅长，用「にかけては」更自然"}, {"q": "技術の面____、日本は世界一流だ。", "opts": ["A. にかけて", "B. について", "C. においては", "D. に関して"], "ans": "C", "exp": "「面において」是固定搭配，表示在某个方面"}]}, "49": {"analysis": "「〜にたいして」表示动作或态度的对象、方向，强调「针对」「面向」的概念。与「〜について」相比，更强调对立性或回应性，常用于表示对某事物的反应、态度或措施。", "mistakes": "易混淆对象选择：❌ 友達にたいして話した → ✅ 友達と話した（日常对话用「と」）；❌ 勉強にたいして頑張る → ✅ 勉強を頑張る（努力的对象用「を」）", "similar": [{"form": "〜について", "diff": "「について」表示话题内容，「にたいして」表示动作对象，更具对立性"}, {"form": "〜に向けて", "diff": "「に向けて」强调方向性，「にたいして」更强调回应性和对立关系"}], "quiz": [{"q": "市民の要求（____）、市長は新しい政策を発表した。", "opts": ["A. について", "B. にたいして", "C. によって", "D. として"], "ans": "B", "exp": "表示针对市民要求的回应，用「にたいして」表示对象"}, {"q": "この薬は風邪（____）効果がある。", "opts": ["A. にたいして", "B. について", "C. によって", "D. として"], "ans": "A", "exp": "表示药物针对感冒的效果，「にたいして」表示作用对象"}, {"q": "先生の質問（____）、学生は答えられなかった。", "opts": ["A. について", "B. として", "C. にたいして", "D. によって"], "ans": "C", "exp": "表示针对老师的提问，学生的反应，用「にたいして」"}]}, "50": {"analysis": "「〜にわたって」表示时间或空间的广泛延续，强调持续性和范围的广度。与中文「历时/遍及/长达」相对应，常用于描述长期持续的动作或覆盖广泛范围的状态。", "mistakes": "❌ 一日にわたって勉強した → ✅ 一日中勉強した（短时间用「中」）❌ 全国にわたった会議 → ✅ 全国にわたる会議（修饰名词用「わたる」）", "similar": [{"form": "〜を通じて", "diff": "通じて侧重「通过某种手段/媒介」，にわたって侧重「时空范围的延续」"}, {"form": "〜中（ちゅう）", "diff": "中用于相对短的时间段，にわたって用于较长时间或广泛范围"}], "quiz": [{"q": "この調査は5か国____行われた。", "opts": ["A. にわたって", "B. を通じて", "C. によって", "D. について"], "ans": "A", "exp": "表示调查范围遍及5个国家，用「にわたって」表示空间范围的广泛性"}, {"q": "10年間____続いた戦争がやっと終わった。", "opts": ["A. を通して", "B. にかけて", "C. にわたって", "D. において"], "ans": "C", "exp": "表示战争持续了长达10年，用「にわたって」强调时间的长期延续"}, {"q": "彼の影響は多くの分野____及んでいる。", "opts": ["A. にわたって", "B. に対して", "C. について", "D. において"], "ans": "A", "exp": "表示影响遍及多个领域，用「にわたって」表示范围的广泛性"}]}, "51": {"analysis": "「〜とは思えない」表示基于说话者的判断或观察，认为某事不太可能发生或不符合常理的否定推测。与单纯的「〜と思わない」相比，「〜とは思えない」语气更强烈，带有「无论如何都无法相信」的意味。这个句型常用于表达对他人行为、状况变化等的强烈质疑。", "mistakes": "❌ 彼は来ないとは思えない → ✅ 彼は来るとは思えない（否定推测应该针对肯定形式）; ❌ 雨が降ったとは思えない → ✅ 雨が降るとは思えない（表示推测时用非过去形）", "similar": [{"form": "〜と思わない", "diff": "単純な否定的意見，語気較温和"}, {"form": "〜はずがない", "diff": "基于逻辑推理的强烈否定，更客观"}, {"form": "〜わけがない", "diff": "表示绝对不可能，语气最强烈"}], "quiz": [{"q": "彼女がそんな嘘を（　　）。", "opts": ["A. つくとは思えない", "B. ついたとは思えない", "C. つくとは思わない", "D. つくと思えない"], "ans": "A", "exp": "表示否定推测时用非过去形「つく」，且「とは思えない」比「とは思わない」语气更强"}, {"q": "この問題がそう簡単に（　　）。", "opts": ["A. 解決するとは思わない", "B. 解決したとは思えない", "C. 解決するとは思えない", "D. 解決すると思えない"], "ans": "C", "exp": "对未来的否定推测用非过去形，「とは思えない」表达强烈的质疑"}, {"q": "彼がもう帰国（　　）。昨日会ったばかりなのに。", "opts": ["A. するとは思えない", "B. したとは思えない", "C. するとは思わない", "D. したと思えない"], "ans": "B", "exp": "已经发生的事情用过去形「した」，表示无法相信已经发生的事实"}]}, "52": {"analysis": "「〜に決まっている」表示说话人对某事的强烈确信，相当于中文的「肯定是〜」「一定是〜」。与单纯的推测不同，这个文法带有断定的语气，表示说话人认为这是理所当然的结果。常用于表达基于经验或常识的判断。", "mistakes": "❌ 雨が降るに決まります → ✅ 雨が降るに決まっている（不能用丁宁语）\n❌ 彼が学生であるに決まっている → ✅ 彼は学生に決まっている（名词直接接续）\n❌ きっと来るに決まっているでしょう → ✅ きっと来るに決まっている（不与推测表现重复使用）", "similar": [{"form": "〜はずだ", "diff": "「はずだ」是基于客观条件的合理推测；「に決まっている」是主观确信的断定"}, {"form": "〜違いない", "diff": "「違いない」强调没有疑问；「に決まっている」更强调理所当然性"}], "quiz": [{"q": "あの人は有名人____。みんなが写真を撮っている。", "opts": ["A. に決まっている", "B. はずである", "C. かもしれない", "D. だろう"], "ans": "A", "exp": "根据「みんなが写真を撮っている」这个明显的证据，说话人确信对方是名人，用「に決まっている」表达断定性确信"}, {"q": "こんな高い値段では、誰も買わない____。", "opts": ["A. はずです", "B. に決まっています", "C. でしょう", "D. と思います"], "ans": "B", "exp": "基于常识判断，这么高的价格当然没人买，表达理所当然的确信用「に決まっている」"}, {"q": "彼は忙しい人だから、今度のパーティーも来ない____。", "opts": ["A. に決まっている", "B. かもしれない", "C. と思う", "D. ようだ"], "ans": "A", "exp": "基于对其忙碌性格的了解，说话人断定他不会来参加聚会，用「に決まっている」表达确信"}]}, "53": {"analysis": "「〜だって」是口语中常用的助词，表示「〜でも」「〜も」的意思，带有强调语气。可以表示追加（补充说明）、反驳（反对某种观点）或强调等语感。相比书面语的「〜も」，「だって」更加生动自然，常用于日常会话中表达说话人的情感态度。", "mistakes": "❌ 私もだって行きたい。→ ✅ 私だって行きたい。（だって本身就包含「も」的意思，不需要重复使用）❌ 彼はだって学生です。→ ✅ 彼だって学生です。（だって直接接在名词后，不需要助词「は」）", "similar": [{"form": "〜も", "diff": "「も」是标准书面语表达，「だって」是口语化表达，语气更强烈"}, {"form": "〜でも", "diff": "「でも」多表示让步或举例，「だって」更偏向反驳或强调"}], "quiz": [{"q": "子供（____）できることなのに、大人ができないなんて。", "opts": ["A. でも", "B. だって", "C. ても", "D. なら"], "ans": "B", "exp": "此处表示反驳语气「连孩子都能做到」，用「だって」最自然"}, {"q": "A：君は若いからいいね。B：私（____）もう30歳ですよ。", "opts": ["A. には", "B. だって", "C. から", "D. として"], "ans": "B", "exp": "B在反驳A的话，表示「我也已经30岁了」，用「だって」表达反驳语气"}, {"q": "今度の旅行、田中さん（____）参加するそうです。", "opts": ["A. だって", "B. ばかり", "C. しか", "D. さえ"], "ans": "A", "exp": "表示追加信息「连田中也要参加」，「だって」用于口语中的追加说明"}]}, "54": {"analysis": "「〜かな」是表达自言自语、疑问或希望的终助词，语气比较柔和。与「〜だろうか」相比更加口语化，常用于内心独白或对他人的轻柔询问。可以接在普通形后面，名词后面通常加「だ」再接「かな」。", "mistakes": "❌ 明日は雨が降りますかな。（过于正式）→ ✅ 明日は雨が降るかな。（自然的自言自语）\n❌ 学生ですかな。（听起来古怪）→ ✅ 学生かな。（自然的疑问）", "similar": [{"form": "〜だろうか", "diff": "「だろうか」更正式，常用于书面语；「かな」更口语化，多用于日常对话"}, {"form": "〜かしら", "diff": "「かしら」主要是女性用语；「かな」男女都可以使用"}], "quiz": [{"q": "彼はもう帰った____。", "opts": ["A. かな", "B. ですかな", "C. だろうかな", "D. のかな"], "ans": "A", "exp": "「帰った」是过去形的普通形，直接接「かな」表示自言自语的疑问"}, {"q": "今日は暖かい____。", "opts": ["A. ですかな", "B. かな", "C. だかな", "D. のかな"], "ans": "B", "exp": "い形容词「暖かい」后面直接接「かな」，表示对天气的感叹疑问"}, {"q": "あの人は先生____。", "opts": ["A. ですかな", "B. のかな", "C. かな", "D. だかな"], "ans": "C", "exp": "名词「先生」后面直接接「かな」，表示对身份的推测疑问"}]}, "55": {"analysis": "「〜っけ」是表示努力回忆或向对方确认的句末助词，相当于中文的「来着」。它体现了说话人对某件事印象模糊，正在努力回想的心理状态。使用时语调通常上扬，带有疑问的语气。", "mistakes": "易错点：时态混乱和使用场合不当。❌ 明日の会議、何時だっけ？→ ✅ 明日の会議、何時だったっけ？（明天的会议几点来着？）❌ すみません、駅はどこですか？→ ✅ 駅はどこだったっけ？（车站在哪里来着？-用于自言自语）", "similar": [{"form": "〜かな", "diff": "「かな」表示推测或自问，「っけ」专门表示努力回忆确认"}, {"form": "〜でしたっけ", "diff": "「でしたっけ」是敬语形式，用于对上级或不熟悉的人"}], "quiz": [{"q": "昨日見た映画のタイトル、なん____？", "opts": ["A.だっけ", "B.だったっけ", "C.でしたっけ", "D.かな"], "ans": "B", "exp": "努力回忆过去的事情用「だったっけ」"}, {"q": "田中さんの電話番号____覚えていますか？", "opts": ["A.っけ", "B.だっけ", "C.を", "D.が"], "ans": "C", "exp": "这里不是回忆确认，而是询问，用「を」"}, {"q": "先生、宿題の締切____？", "opts": ["A.いつだっけ", "B.いつでしたっけ", "C.いつかな", "D.いつですか"], "ans": "B", "exp": "对老师用敬语形式「でしたっけ」"}]}, "56": {"analysis": "〜わ/�/な是日语中重要的终助词，用于表达说话者的感情和语气。「わ」多用于女性，表示轻柔的感情；「ぞ」多用于男性，表示强烈的意志或决心；「な」用于禁止或感叹，语气较强烈。这些终助词能够细腻地表达日语特有的语感和人际关系的微妙差别。", "mistakes": "易错点：混淆使用场合和性别差异。❌ 男性说「今日は暑いわ」→ ✅「今日は暑いぞ」；❌ 对上级说「頑張るぞ」→ ✅「頑張ります」；❌ 把「な」的禁止用法用错 ❌「勉強するな」(禁止学习) → ✅「勉強しなさい」(要学习)", "similar": [{"form": "〜よ", "diff": "「よ」比「ぞ」语气更轻，男女通用"}, {"form": "〜ね", "diff": "「ね」表示寻求同意，「な」表示感叹或禁止"}, {"form": "〜だ", "diff": "「だ」是断定，「ぞ」在断定基础上加强语气"}], "quiz": [{"q": "男性がよく使う終助詞はどれですか。明日は試験だ____。", "opts": ["A. わ", "B. ぞ", "C. ね", "D. の"], "ans": "B", "exp": "「ぞ」は男性がよく使う終助詞で、意志や決意を強く表します"}, {"q": "「危険だから近づく____」の____に入る適切な終助詞は？", "opts": ["A. わ", "B. ぞ", "C. な", "D. よ"], "ans": "C", "exp": "「な」は禁止を表す終助詞です。「近づくな」で「近づいてはいけない」という意味"}, {"q": "女性がよく使う終助詞で「きれい____」を完成させると？", "opts": ["A. ぞ", "B. な", "C. だ", "D. わ"], "ans": "D", "exp": "「わ」は女性がよく使う終助詞で、感嘆や軽い断定を表します"}]}, "57": {"analysis": "「〜ものだ」是N3重要语法，表达三种含义：①自然规律或常识（人はいつか老いるものだ），②应该做的事情或社会道德（年上の人を敬うものだ），③过去的习惯（子供の頃はよく川で泳いだものだ）。注意区分情感色彩：感慨用过去式动词，常识用现在式。", "mistakes": "❌ 昨日映画を見るものだった → ✅ 昨日映画を見たものだ（过去习惯用た形+ものだ）; ❌ 学生はもっと勉強するものです → ✅ 学生はもっと勉強するものだ（感慨・常识不用です形）; ❌ 子供の時、よく遊ぶものだった → ✅ 子供の時、よく遊んだものだ", "similar": [{"form": "〜べきだ", "diff": "べきだ强调义务责任，ものだ表达常识或感慨"}, {"form": "〜たものだ", "diff": "たものだ专指过去习惯回忆，ものだ含义更广"}, {"form": "〜はずだ", "diff": "はずだ表推测判断，ものだ表常识感慨"}], "quiz": [{"q": "人間は誰でも間違いを____。", "opts": ["A. するはずだ", "B. するものだ", "C. するべきだ", "D. したものだ"], "ans": "B", "exp": "表达人的本性或常识，用「するものだ」最合适"}, {"q": "子供の頃、祖母の家でよく昔話を____。", "opts": ["A. 聞くものだ", "B. 聞いたものだ", "C. 聞くべきだ", "D. 聞くはずだ"], "ans": "B", "exp": "回忆过去的习惯，用「聞いたものだ」表达怀念之情"}, {"q": "学生たるもの、勉強に励む____。", "opts": ["A. ものです", "B. はずだ", "C. ものだ", "D. べきだ"], "ans": "C", "exp": "表达作为学生应有的常识或道德观念，用「ものだ」"}]}, "58": {"analysis": "「〜もの/もん」是表示理由或辩解的口语表达，常用于为自己的行为或状态进行解释说明。「もん」是「もの」的缩略形，更加随意亲密，多用于女性和儿童。这个文法带有撒娇、辩解的语气，不适合正式场合使用。", "mistakes": "易错点：❌ 明日は雨だものから、行きません → ✅ 明日は雨だもの、行きません（不能加「から」重复表示理由）；❌ 先生、疲れているんだもん → ✅ 先生、疲れているんです（对长辈不宜使用撒娇语气）", "similar": [{"form": "〜から", "diff": "「から」是中性的理由表达，「もの/もん」带有撒娇、辩解的感情色彩"}, {"form": "〜ので", "diff": "「ので」较为客观礼貌，「もの/もん」更主观且带有辩解意味"}], "quiz": [{"q": "子供が泣いているのは、お腹が空いている____。", "opts": ["A. んだもの", "B. んだから", "C. ので", "D. によって"], "ans": "A", "exp": "表示为孩子哭泣进行辩解说明，用「んだもの」最合适"}, {"q": "「どうして宿題をしなかったの？」「だって、難し過ぎる____。」", "opts": ["A. から", "B. ので", "C. んだもん", "D. によると"], "ans": "C", "exp": "面对责问时的辩解，用撒娇语气的「んだもん」符合语境"}, {"q": "以下哪个场合不适合使用「〜もの/もん」？", "opts": ["A. 对朋友解释迟到原因", "B. 向上司汇报工作", "C. 孩子对父母撒娇", "D. 恋人间的对话"], "ans": "B", "exp": "「もの/もん」是口语化的撒娇表达，不适合正式的工作场合"}]}, "59": {"analysis": "「〜てやる」和「〜てくれる」是日语中表示授受关系的重要文法，体现了日语独特的「给予」概念。「〜てやる」表示说话者为他人做某事，带有恩惠色彩，口语中常显得有些居高临下；「〜てくれる」表示他人为说话者做某事，含感谢之意。两者都体现了日语中人际关系的微妙层次。", "mistakes": "❌ 先生が教えてやってくださった → ✅ 先生が教えてくださった（对上级不能用「てやる」）\n❌ 私が母に手伝ってくれた → ✅ 私が母に手伝ってやった（主语是「私」时不能用「てくれる」）\n❌ 友達が宿題を教えてやった → ✅ 友達が宿題を教えてくれた（他人为我做事用「てくれる」）", "similar": [{"form": "〜てあげる", "diff": "更礼貌正式，无居高临下感"}, {"form": "〜てもらう", "diff": "从接受者角度表达，「我让别人为我做」"}], "quiz": [{"q": "弟に宿題を手伝って____。", "opts": ["A. やった", "B. くれた", "C. もらった", "D. あげた"], "ans": "A", "exp": "「私が弟に」为弟弟做事，用「てやる」"}, {"q": "友達がノートを貸して____よ。", "opts": ["A. やった", "B. くれた", "C. もらった", "D. あげた"], "ans": "B", "exp": "朋友为我做事（借笔记），用「てくれる」表示感谢"}, {"q": "お金を貸して____よ。（请求帮助）", "opts": ["A. やって", "B. くれて", "C. もらって", "D. あげて"], "ans": "A", "exp": "口语中请求别人为自己做事，用「てやる」"}]}, "60": {"analysis": "「〜に関して」是正式的书面语表达，常用于学术论文、报告、正式文件等场合，表示「关于～」「有关～」的意思。与口语的「〜について」相比，显得更加正式和客观。该文法可以用「に関する」的形式作连体修饰语。", "mistakes": "❌ 友達に関して話しましょう → ✅ 友達について話しましょう（日常对话中不用过于正式的表达）\n❌ この件に関してる意見 → ✅ この件に関する意見（连体修饰时用「に関する」）\n❌ 天気に関して心配です → ✅ 天気について心配です（个人感情表达时用「について」更自然）", "similar": [{"form": "〜について", "diff": "口语化，日常会话中常用，较为随意"}, {"form": "〜に対して", "diff": "强调态度、意见、行为的对象，有对立或面对的语感"}, {"form": "〜をめぐって", "diff": "表示围绕某个问题展开讨论或争论，常含有争议性"}], "quiz": [{"q": "環境問題____、国際会議が開かれた。", "opts": ["A. について", "B. に関して", "C. に対して", "D. をめぐって"], "ans": "B", "exp": "正式的国际会议用书面语「に関して」最合适"}, {"q": "今度の旅行____相談がある。", "opts": ["A. に関して", "B. に関する", "C. について", "D. に対して"], "ans": "C", "exp": "日常对话中的相商用「について」更自然"}, {"q": "教育制度____論文を書いています。", "opts": ["A. についての", "B. に関する", "C. に対する", "D. をめぐる"], "ans": "B", "exp": "学术论文的正式表达，连体修饰用「に関する」"}]}, "61": {"analysis": "「〜にとって」表示从某个立场或角度进行价值判断，强调主观评价。与中文「对...来说」相似，但更偏重于表达个人立场的价值观念。常与形容词或价值评价词搭配使用。", "mistakes": "❌ 私は家族にとって大切だ → ✅ 私にとって家族が大切だ（主语搞错，应该是评价对象作主语）\n❌ 学生たちにとって勉強します → ✅ 学生たちにとって勉強は大変だ（不能直接接动词，需要接评价性表达）", "similar": [{"form": "〜にとって vs 〜について", "diff": "にとって表示立场的价值判断，について表示话题范围"}, {"form": "〜にとって vs 〜から見ると", "diff": "にとって强调个人价值观，から見ると强调客观视角"}], "quiz": [{"q": "子供____、このゲームはとても面白いらしい。", "opts": ["A. について", "B. にとって", "C. に対して", "D. として"], "ans": "B", "exp": "表示从孩子的立场来看的价值判断，用「にとって」"}, {"q": "彼____一番大切なのは仕事だ。", "opts": ["A. にとって", "B. について", "C. に関して", "D. によって"], "ans": "A", "exp": "表示从他的立场来看的价值判断，用「にとって」"}, {"q": "外国人の学生____、漢字を覚えるのは____。", "opts": ["A. にとって...簡単だ", "B. について...勉強する", "C. にとって...大変だ", "D. として...教える"], "ans": "C", "exp": "从外国学生的立场来看的价值判断，记汉字很辛苦"}]}, "62": {"analysis": "「〜によると」是表示信息来源的文法，相当于中文的「根据〜」「据〜」。它客观地引用他人或某种媒体、资料的信息，说话者通常不对信息的真实性负责，只是转述。与中文不同，日语中必须明确标出信息来源，体现了日语重视信息出处的特点。", "mistakes": "❌ テレビによると言った → ✅ テレビによると言っていた（转述时时态要对应）\n❌ 友達によると、彼は来ると言いました → ✅ 友達によると、彼は来るそうです（转述用そうです更自然）\n❌ 新聞によると書いてある → ✅ 新聞によると書いてあった（时态一致性）", "similar": [{"form": "〜によれば", "diff": "意思相同，但によれば更正式，多用于书面语"}, {"form": "〜そうです", "diff": "都表示传闻，但そうです不明示信息来源"}, {"form": "〜らしいです", "diff": "表推测传闻，によると更强调明确的信息来源"}], "quiz": [{"q": "ニュース____、台風が近づいているそうです。", "opts": ["A. によると", "B. について", "C. に対して", "D. において"], "ans": "A", "exp": "表示根据新闻的信息，用によると表示信息来源"}, {"q": "医者の話____、手術は成功したらしい。", "opts": ["A. による", "B. によると", "C. によって", "D. に関して"], "ans": "B", "exp": "根据医生的话这个信息来源，用によると"}, {"q": "天気予報____明日は晴れるそうだ。正しい時制はどれですか。", "opts": ["A. によると、", "B. によって、", "C. について、", "D. に関して、"], "ans": "A", "exp": "表示根据天气预报的信息来源，用によると"}]}, "63": {"analysis": "「〜という点で」表示从某个特定角度或方面来评价、比较事物的特征。与「〜について」不同，它强调的是具体的评价标准或判断基准。常用于客观分析和比较场景。", "mistakes": "❌ 彼は優しいという点では好きです。→ ✅ 彼は優しいという点で評価できます。（「という点で」多用于客观评价，不太适合表达个人喜好）", "similar": [{"form": "〜に関して", "diff": "「に関して」表示关于某话题，「という点で」强调从某角度评价"}, {"form": "〜について", "diff": "「について」表示关于某事，「という点で」专指从某方面来评判"}], "quiz": [{"q": "価格が安い____、このスマホは魅力的だ。", "opts": ["A. について", "B. という点で", "C. に対して", "D. によって"], "ans": "B", "exp": "从价格便宜这一点来评价，用「という点で」"}, {"q": "彼女は____優秀だが、コミュニケーション能力という点では課題がある。", "opts": ["A. 技術的に", "B. 技術的な", "C. 技術的", "D. 技術"], "ans": "A", "exp": "副词「技術的に」修饰「優秀」，与后文「という点では」形成对比"}, {"q": "この車は燃費がいい____は他社より劣っている。", "opts": ["A. という点では良いが、デザイン", "B. が、デザインという点で", "C. という点で良いが、デザインという点では", "D. けれど、デザインについて"], "ans": "C", "exp": "前半用「という点で良い」，后半用「という点では」形成完整的对比表达"}]}, "64": {"analysis": "「〜てたまらない」表达强烈到无法忍受的感情或感觉，常用于主观的内在体验。此文法强调感情的强烈程度已经超出了正常的承受范围，多用于第一人称的表达。与「〜てならない」在某些情况下可以互换，但「たまらない」更口语化，感情色彩更强烈。", "mistakes": "❌ 彼は嬉しくてたまらないと言った → ✅ 彼は嬉しくてたまらないようだ（他人の感情は推測表現を使う）\n❌ 暑いでたまらない → ✅ 暑くてたまらない（い形容詞は「くて」接続）\n❌ 静かでたまらない → ✅ 静かすぎる（な形容詞は通常「で」では接続しない）", "similar": [{"form": "〜てならない", "diff": "書面語色彩更强，多用于文学作品；たまらない更口语化"}, {"form": "〜てしょうがない", "diff": "表达困扰、麻烦的感情；たまらない强调无法忍受的程度"}, {"form": "〜てしかたがない", "diff": "与しょうがない同义，但更正式；たまらない感情色彩更强烈"}], "quiz": [{"q": "彼女のことが心配____。", "opts": ["A. してたまらない", "B. でたまらない", "C. くてたまらない", "D. でしかたがない"], "ans": "A", "exp": "動詞「心配する」的て形是「心配して」，所以用「心配してたまらない」"}, {"q": "今日は____たまらない。", "opts": ["A. 暑いで", "B. 暑くて", "C. 暑いく", "D. 暑いに"], "ans": "B", "exp": "い形容詞「暑い」的连接形是「暑くて」，后接「たまらない」"}, {"q": "子供の頃、母の料理が____たまらなかった。", "opts": ["A. 恋しく", "B. 恋しいで", "C. 恋しくて", "D. 恋しいくて"], "ans": "C", "exp": "い形容詞「恋しい」的て形是「恋しくて」，表达非常怀念母亲的料理"}]}, "65": {"analysis": "「〜ておく」表示维持某种状态或放置不管，强调让事物保持现有状态。与表示事前准备的「〜ておく」不同，这里重点是状态的持续性。常用于请求他人保持某种状态或表示暂时放置的意思。", "mistakes": "易错点：混淆准备用法和维持用法。❌ドアを開けておきます（表示准备）→ ✅ドアを開けておいてください（表示维持开着的状态）。注意「〜ておく」后接「ください」时通常表示维持状态的请求。", "similar": [{"form": "〜ておく（準備）", "diff": "表示事前准备，如「買い物をしておく」；而维持用法表示保持状态，如「そのままにしておく」"}, {"form": "〜たまま", "diff": "单纯表示状态持续，如「ドアが開いたまま」；「〜ておく」含有意图性，表示有意维持某状态"}], "quiz": [{"q": "荷物をここに（　　）ください。", "opts": ["A. 置いて", "B. 置いておいて", "C. 置かれて", "D. 置くように"], "ans": "B", "exp": "表示请求维持放置的状态，用「置いておいてください」"}, {"q": "問題があるかもしれませんが、今日はこのまま（　　）ましょう。", "opts": ["A. しておき", "B. しまい", "C. しておき", "D. やめ"], "ans": "A", "exp": "表示暂时维持现状不处理，用「このままにしておく」"}, {"q": "電気を（　　）ください。暗いですから。", "opts": ["A. 点けて", "B. 点けないで", "C. 点けておいて", "D. 点けられて"], "ans": "C", "exp": "请求保持电灯开着的状态，用「点けておいてください」"}]}, "66": {"analysis": "「もっとも」是表示最高级的副词，用来强调某事物在某方面达到了最高程度。与「一番」「最も」含义相近但更加正式，常用于书面语中表达绝对的最高级概念。", "mistakes": "❌ これが一番もっとも安全な方法だ → ✅ これがもっとも安全な方法だ（不能与「一番」重复使用）❌ もっとも早く行きます → ✅ もっとも早い方法で行きます（修饰形容词，不直接修饰动词）", "similar": [{"form": "一番", "diff": "「一番」更口语化，「もっとも」更正式书面"}, {"form": "最も", "diff": "「最も」是汉语词汇，「もっとも」是和语词汇，语感稍有不同"}], "quiz": [{"q": "この中で____難しい問題はどれですか。", "opts": ["A. 一番", "B. もっとも", "C. とても", "D. 大変"], "ans": "B", "exp": "表示最高级时用「もっとも」最自然正式"}, {"q": "彼は____優秀な学生の一人だ。", "opts": ["A. とても", "B. 大変", "C. もっとも", "D. かなり"], "ans": "C", "exp": "强调在所有学生中是最优秀的，用「もっとも」"}, {"q": "____重要なことは健康です。", "opts": ["A. 一番", "B. もっとも", "C. とても", "D. 非常に"], "ans": "B", "exp": "表达最重要的概念，「もっとも」更适合这种正式表达"}]}, "67": {"analysis": "「ずっと」表示动作状态的持续或程度的强烈对比。用于持续时，强调从过去到现在或将来的连续性；用于比较时，表示程度差异很大，相当于中文的「远比」「比...得多」。", "mistakes": "易错点：与「いつも」混淆。❌いつも勉強しています（表示习惯） → ✅ずっと勉強しています（表示持续状态）；时态搭配错误：❌昨日ずっと映画を見ました → ✅昨日映画をずっと見ました", "similar": [{"form": "いつも", "diff": "ずっと强调持续性，いつも强调习惯性"}, {"form": "ながく", "diff": "ながく客观描述时间长度，ずっと主观强调持续感"}, {"form": "もっと", "diff": "もっと表示「更加」，ずっと表示「远比/一直」"}], "quiz": [{"q": "彼は私____背が高い。", "opts": ["A. ずっと", "B. いつも", "C. もっと", "D. ながく"], "ans": "A", "exp": "表示程度差异很大，用「ずっと」表示「远比」"}, {"q": "子供の頃から____ピアノを習っています。", "opts": ["A. いつも", "B. ずっと", "C. よく", "D. たくさん"], "ans": "B", "exp": "从过去到现在的持续状态，用「ずっと」"}, {"q": "今日は____寒いですね。", "opts": ["A. ずっと", "B. とても", "C. いつも", "D. よく"], "ans": "A", "exp": "表示比平时寒冷程度高很多，用「ずっと」表示程度差异"}]}, "68": {"analysis": "「なかなか」是一个重要的副词，具有两种截然不同的用法：1）与否定形式搭配时表示「怎么也不～」「总是不～」，强调期待的结果迟迟不出现；2）与肯定形式（特别是形容词）搭配时表示「相当～」「挺～的」，含有超出预期的赞赏之意。这种双重性质使其成为日语中表达微妙语感的重要工具。", "mistakes": "❌ なかなか上手です → ✅ なかなか上手ですね（肯定用法需要感叹语气）\n❌ この問題はなかなか簡単ではありません → ✅ この問題はなかなか簡単ではないですね / なかなか解けません\n❌ なかなか美味しくないです → ✅ あまり美味しくないです（否定形容词不用なかなか）", "similar": [{"form": "ちっとも〜ない", "diff": "ちっとも更强调完全没有，なかなか强调过程漫长"}, {"form": "とても/すごく", "diff": "とても是纯粹的程度副词，なかなか含有意外、超出预期的语感"}, {"form": "全然〜ない", "diff": "全然强调完全没有，なかなか强调期待落空的过程"}], "quiz": [{"q": "日本語は難しくて、____覚えられません。", "opts": ["A. なかなか", "B. とても", "C. ちょっと", "D. きっと"], "ans": "A", "exp": "表示「怎么也记不住」，なかなか与否定形搭配表示期待的结果迟迟不出现"}, {"q": "この映画は____面白かったです。", "opts": ["A. あまり", "B. なかなか", "C. ぜんぜん", "D. ちっとも"], "ans": "B", "exp": "なかなか与肯定形容词搭配，表示「相当有趣」，含有超出预期的赞赏"}, {"q": "雨が____やみませんね。", "opts": ["A. きっと", "B. もう", "C. なかなか", "D. やっぱり"], "ans": "C", "exp": "表示「雨怎么也不停」，なかなか＋否定动词表示期待的状况迟迟不出现"}]}, "69": {"analysis": "「〜てしまっている」表示动作已经完成且其结果状态持续到现在，强调完成后的持续状态。与单纯的「〜てしまった」不同，它更注重结果的现在性和持续性。这个文法常用于描述不可逆转的状态或令人遗憾的既成事实。", "mistakes": "❌ 宿題をしてしまっています（作业做完了）→ ✅ 宿題をやってしまっています。❌ 電車は行ってしまっています（电车已经走了）→ ✅ 電車は出発してしまっています。注意动词选择要自然，避免直译中文思维。", "similar": [{"form": "〜てしまった", "diff": "表示完成，但不强调状态的持续性"}, {"form": "〜ている", "diff": "表示进行或结果状态，但无完了感和遗憾感"}, {"form": "〜てある", "diff": "表示他动词的结果状态保持，无完了感"}], "quiz": [{"q": "窓が（____）います。", "opts": ["A. 開けてしまって", "B. 開いてしまって", "C. 開けている", "D. 開いている"], "ans": "B", "exp": "窓が開く是自动词，表示窗户已经开着的状态持续中"}, {"q": "彼はもう帰国（____）います。", "opts": ["A. してしまって", "B. していて", "C. したて", "D. するて"], "ans": "A", "exp": "帰国してしまっている表示已经回国了，这个状态持续到现在"}, {"q": "大切な書類を（____）いて、困っています。", "opts": ["A. なくして", "B. なくしてしまって", "C. なくている", "D. なくしている"], "ans": "B", "exp": "なくしてしまっている表示重要文件已经丢失了，这个状态持续中，带有遗憾的语感"}]}, "70": {"analysis": "「〜ているところ」表示动作正在进行的瞬间状态，强调「正好在做某事的时刻」。与单纯的「〜ている」相比，更突出时间点的精确性和临场感。常用于说明当前正在进行的具体行为。", "mistakes": "❌ 昨日、勉強しているところでした → ✅ 昨日、勉強していました（过去不用ところ）\n❌ 毎日勉強しているところです → ✅ 毎日勉強しています（习惯性动作不用ところ）", "similar": [{"form": "〜ている", "diff": "ている是一般进行时，ているところ强调正在进行的瞬间"}, {"form": "〜ているうちに", "diff": "うちに表示在某动作持续期间发生其他事情"}], "quiz": [{"q": "A：何をしていますか。B：今、宿題を____。", "opts": ["A. しているところです", "B. するところです", "C. したところです", "D. しておくところです"], "ans": "A", "exp": "现在正在做作业，用しているところです表示正在进行中"}, {"q": "電話に出られませんでした。お風呂に____からです。", "opts": ["A. 入っているところ", "B. 入るところ", "C. 入ったところ", "D. 入っていたところ"], "ans": "D", "exp": "过去正在洗澡所以没接电话，用过去时ていたところ"}, {"q": "すみません、今____ので、後で電話します。", "opts": ["A. 会議するところ", "B. 会議しているところ", "C. 会議したところ", "D. 会議していたところ"], "ans": "B", "exp": "现在正在开会，所以稍后打电话，用现在进行时"}]}, "71": {"analysis": "「〜かどうか」是表示二择间接疑问的文法，用于询问某事是否成立，相当于中文的「是否」「会不会」。与直接疑问句不同，它将疑问内容作为名词性从句使用，常与「わからない」「知らない」「聞く」等动词搭配。", "mistakes": "❌ 彼が来るか来ないかどうか、わかりません → ✅ 彼が来るかどうか、わかりません（不能重复表达选择）❌ 何時に来るかどうか、教えてください → ✅ 何時に来るか、教えてください（疑问词疑问句不用かどうか）", "similar": [{"form": "〜か〜ないか", "diff": "意思相同但表达更明确，如「行くか行かないか」vs「行くかどうか」"}, {"form": "疑问词＋か", "diff": "用于具体疑问（何・誰・いつ等），かどうか用于是非疑问"}], "quiz": [{"q": "明日雨が降る____、天気予報を見てください。", "opts": ["A. かどうか", "B. かどこか", "C. かだれか", "D. かいつか"], "ans": "A", "exp": "「是否下雨」是二择疑问，用かどうか"}, {"q": "彼女が____知りません。", "opts": ["A. 元気かどうか", "B. 元気かどこか", "C. 元気はどうか", "D. 元気がどうか"], "ans": "A", "exp": "「是否健康」用かどうか表示间接疑问"}, {"q": "____、まだ決まっていません。", "opts": ["A. 誰が来るかどうか", "B. 参加するかどうか", "C. いつ行くかどうか", "D. どこで会うかどうか"], "ans": "B", "exp": "かどうか只能用于是非疑问，不能与疑问词（誰・いつ・どこ）一起使用"}]}, "72": {"analysis": "「〜ないかもしれない」表示对某事不发生的推测，语气比「〜ない」更委婉。这是「ない形＋かもしれない」的固定搭配，用于表达说话人认为某事有不发生的可能性。与中文「也许不」「可能不」相对应，常用于不确定的推测场合。", "mistakes": "❌ 彼は来るないかもしれない → ✅ 彼は来ないかもしれない（动词要用ない形再加かもしれない）\n❌ 雨が降らないじゃないかもしれない → ✅ 雨が降らないかもしれない（不要重复否定）", "similar": [{"form": "〜かもしれない", "diff": "表示肯定的可能性推测，而〜ないかもしれない表示否定的可能性推测"}, {"form": "〜ないでしょう", "diff": "ないでしょう语气更确定，ないかもしれない更不确定、更委婉"}], "quiz": [{"q": "明日は雨が（____）。", "opts": ["A. 降らないかもしれない", "B. 降るないかもしれない", "C. 降らないじゃないかもしれない", "D. 降らかもしれない"], "ans": "A", "exp": "动词「降る」的ない形是「降らない」，再加「かもしれない」"}, {"q": "田中さんはパーティーに（____）。", "opts": ["A. 参加するないかもしれない", "B. 参加しないかもしれない", "C. 参加ないかもしれない", "D. 参加しなかもしれない"], "ans": "B", "exp": "动词「参加する」的ない形是「参加しない」，再加「かもしれない」"}, {"q": "この料理は子供には（____）。", "opts": ["A. 食べるないかもしれない", "B. 食べかもしれない", "C. 食べないかもしれない", "D. 食べらないかもしれない"], "ans": "C", "exp": "动词「食べる」的ない形是「食べない」，表示孩子可能不吃这道菜"}]}, "73": {"analysis": "〜ように言う是表示间接命令或请求的重要文法，用于转述他人的要求或指示。与直接引用不同，它将命令句转换为客观的叙述形式，常用于正式场合或礼貌表达。注意动词需使用辞书形或ない形，体现了日语间接表达的特点。", "mistakes": "❌ 先生に早く提出してくださいように言われた → ✅ 先生に早く提出するように言われた（不能加敬语形式）\n❌ 母に薬を飲んだように言われた → ✅ 母に薬を飲むように言われた（使用辞书形而非过去式）", "similar": [{"form": "〜と言う", "diff": "直接引用原话，〜ように言う是间接转述"}, {"form": "〜ようにする", "diff": "表示自己努力做某事，〜ように言う是转述他人要求"}], "quiz": [{"q": "母は私に野菜を____食べるように言いました。", "opts": ["A. たくさん", "B. もっと", "C. よく", "D. いっぱい"], "ans": "B", "exp": "もっと表示'更多'，符合母亲要求多吃蔬菜的语境"}, {"q": "部長に____ように言われて、会議に参加した。", "opts": ["A. 出席した", "B. 出席して", "C. 出席する", "D. 出席しろ"], "ans": "C", "exp": "〜ように言う前的动词必须使用辞书形"}, {"q": "先生は学生に宿題を____ように言った。", "opts": ["A. 忘れる", "B. 忘れた", "C. 忘れない", "D. 忘れなかった"], "ans": "C", "exp": "表示'不要忘记作业'，使用动词ない形"}]}, "74": {"analysis": "「〜ために（原因）」表示客观原因或理由，相当于中文的「因为〜」「由于〜」。与目的用法不同，原因用法通常用于描述已经发生的事情或客观事实的因果关系。", "mistakes": "❌ 病気のために、学校を休みたいです。（目的混用）→ ✅ 病気のために、学校を休みました。（过去事实）/ 病気なので、学校を休みたいです。（现在理由用〜ので）", "similar": [{"form": "〜ために（目的）", "diff": "原因用法描述已发生事实的原因；目的用法表示行为的目的，常与意志动词搭配"}, {"form": "〜ので", "diff": "〜ので更主观，语气较软；〜ために更客观，多用于客观原因"}], "quiz": [{"q": "台風____、電車が止まった。", "opts": ["A. ために", "B. ように", "C. ことに", "D. ばかりに"], "ans": "A", "exp": "台风是电车停运的客观原因，用「ために（原因）」"}, {"q": "事故____、道路が渋滞している。", "opts": ["A. ように", "B. ために", "C. ことで", "D. として"], "ans": "B", "exp": "事故导致道路拥堵，表示客观原因用「ために」"}, {"q": "雪____、飛行機が遅れました。", "opts": ["A. によって", "B. として", "C. ために", "D. について"], "ans": "C", "exp": "下雪是飞机延误的原因，用「ために（原因）」表示客观因果关系"}]}, "75": {"analysis": "「〜ところに/へ」表示在某个时间点或时机发生的巧合，强调时间的微妙性。与「〜とき」不同，「ところに/へ」更强调恰好在那个瞬间发生的偶然性和时机的巧合。", "mistakes": "❌ 食べているところに友達が来た → ✅ 食べようとしたところに友達が来た（应该用意志形+とした）❌ 昨日行ったところに雨が降った → ✅ 出かけたところに雨が降り始めた（应该表示具体的时间点）", "similar": [{"form": "〜とき", "diff": "「とき」表示一般的时间，「ところに/へ」强调巧合的时机"}, {"form": "〜途中で", "diff": "「途中で」表示过程中，「ところに/へ」表示特定时间点的巧合"}], "quiz": [{"q": "家を____ところに、雨が降り始めた。", "opts": ["A. 出る", "B. 出た", "C. 出ている", "D. 出よう"], "ans": "B", "exp": "「た形+ところに」表示刚刚完成某动作的时候，这里指刚出家门就下雨了"}, {"q": "電話を____ところへ、母が部屋に入ってきた。", "opts": ["A. かける", "B. かけた", "C. かけている", "D. かけよう"], "ans": "A", "exp": "「辞書形+ところに/へ」表示正要做某事的时候，这里指正要打电话的时候"}, {"q": "寝____ところに、友達から連絡があった。", "opts": ["A. る", "B. た", "C. よう", "D. ようとした"], "ans": "D", "exp": "「〜ようとしたところに」是固定搭配，表示正要做某事的时候发生了其他事情"}]}, "77": {"analysis": "「〜のではないか」是表示推测或疑念的文法，说话者对某种情况有一定把握但不完全确定时使用。与「〜と思う」相比，这个表达更含蓄，带有征求对方意见或确认的语气。在敬语场合常用「〜のではないでしょうか」。", "mistakes": "❌ 雨が降るのではないかと思います。（重复表达推测） → ✅ 雨が降るのではないでしょうか。或 雨が降ると思います。；❌ 彼が来ないのではないかでしょう。（接续错误） → ✅ 彼が来ないのではないでしょうか。", "similar": [{"form": "〜と思う", "diff": "「〜と思う」直接表达个人想法，「〜のではないか」更含蓄，暗含征求意见"}, {"form": "〜だろう", "diff": "「〜だろう」纯粹推测，「〜のではないか」带有疑问和确认的语气"}], "quiz": [{"q": "もう時間が____のではないでしょうか。", "opts": ["A. ない", "B. なかった", "C. ある", "D. あった"], "ans": "A", "exp": "「時間がない」是固定搭配，表示没时间了，用否定形接续"}, {"q": "田中さんはもう____のではないかと思います。", "opts": ["A. 帰る", "B. 帰った", "C. 帰って", "D. 帰り"], "ans": "B", "exp": "表示推测已经完成的动作，用过去形「帰った」"}, {"q": "この問題は少し____のではないでしょうか。", "opts": ["A. 難しい", "B. 難しかった", "C. 難しく", "D. 難しいだ"], "ans": "A", "exp": "形容词直接用普通形接续，「難しい」表示现在的状态"}]}, "79": {"analysis": "「〜てあげる」表示为他人提供帮助或服务的敬语表现。当对象是上级时，使用「さしあげる」表示谦让；对同级或下级时使用「あげる」。这个文法体现了日语中重要的上下级关系和敬语系统。", "mistakes": "易错点：对象搞错敬语形式。❌友達にお茶を入れてさしあげました → ✅友達にお茶を入れてあげました（对朋友不用谦让语）。❌社長に資料をコピーしてあげました → ✅社長に資料をコピーしてさしあげました（对上级要用谦让语）。", "similar": [{"form": "〜てもらう", "diff": "接受他人帮助，视角相反"}, {"form": "〜てくれる", "diff": "他人为自己做某事，不涉及敬语选择"}], "quiz": [{"q": "部長に資料を____。", "opts": ["A. 作ってあげました", "B. 作ってさしあげました", "C. 作ってもらいました", "D. 作ってくれました"], "ans": "B", "exp": "对上级（部長）提供服务时，必须使用谦让语「さしあげる」"}, {"q": "弟に宿題を____。", "opts": ["A. 手伝ってさしあげました", "B. 手伝ってもらいました", "C. 手伝ってあげました", "D. 手伝ってくれました"], "ans": "C", "exp": "对家人或下级帮助时使用「あげる」，不需要谦让语"}, {"q": "お客様にお茶を____。", "opts": ["A. 入れてあげました", "B. 入れてさしあげました", "C. 入れてもらいました", "D. 入れてくださいました"], "ans": "B", "exp": "对客人（お客様）提供服务时必须使用谦让语「さしあげる」表示尊敬"}]}, "80": {"analysis": "「〜ながら（逆接）」表示逆接转折，与同态的「〜ながら（同时）」在语义上完全不同。常与「残念」「申し訳」等表达遗憾、歉意的词汇搭配使用，体现说话者的客观态度。「ながらも」比单纯的「ながら」语气更强，强调对比的鲜明性。", "mistakes": "❌ 学生ながら、お金持ちです。→ ✅ 学生ながら、よく勉強します。（逆接ながら不能表示身份对比，应该表示转折关系）❌ 忙しいながら来ました。→ ✅ 忙しいながらも来ました。（形容词后多用「ながらも」）", "similar": [{"form": "〜のに", "diff": "「のに」语气更强烈，带有不满；「ながら」更客观中性"}, {"form": "〜けれど", "diff": "「けれど」可用于各种场合；「ながら」多用于正式表达"}, {"form": "〜ながら（同时）", "diff": "同时ながら表并行动作；逆接ながら表转折关系"}], "quiz": [{"q": "彼は若い____、経験豊富だ。", "opts": ["A. ながら", "B. ながらも", "C. のに", "D. けれど"], "ans": "B", "exp": "形容词后的逆接转折多用「ながらも」，强调虽然年轻但经验丰富的对比"}, {"q": "____、お手伝いできません。", "opts": ["A. 残念ながら", "B. 残念ながらも", "C. 残念のに", "D. 残念だから"], "ans": "A", "exp": "「残念ながら」是固定搭配，表示遗憾地转折"}, {"q": "小さい会社____、技術力は高い。", "opts": ["A. ながら", "B. ながらも", "C. だから", "D. ので"], "ans": "B", "exp": "形容词＋ながらも表示逆接，虽然是小公司但技术力很高"}]}, "81": {"analysis": "「〜てしかたがない」表达强烈的感情状态，无法抑制或控制。多用于积极或消极的情感表达，强调程度之深。与「〜てたまらない」语感相近，但「しかたがない」更强调无可奈何的心情。", "mistakes": "❌ 忙しいてしかたがない → ✅ 忙しくてしかたがない（い形容词要变成くて形）\n❌ 心配してしかたがない → ✅ 心配でしかたがない（な形容词词干+で）\n❌ このケーキは美味しくてしかたがない → ✅ このケーキが美味しくてしかたがない（客观描述不用此句型）", "similar": [{"form": "〜てたまらない", "diff": "语感更强烈，多用于生理感觉和欲望；しかたがない更偏重无奈感"}, {"form": "〜てならない", "diff": "更文语化，多用于书面语；しかたがない更口语化"}], "quiz": [{"q": "彼女のことが心配（____）しかたがない。", "opts": ["A. して", "B. で", "C. くて", "D. に"], "ans": "B", "exp": "「心配」是な形容词，接续时用词干+で的形式"}, {"q": "試験の結果が気になって（____）。", "opts": ["A. しかたがない", "B. しかたがある", "C. しかたをない", "D. しかたはない"], "ans": "A", "exp": "「しかたがない」是固定表达，不能改变形式"}, {"q": "昨日見た映画が面白くて（____）。", "opts": ["A. たまらない", "B. しかたがない", "C. いけない", "D. だめだ"], "ans": "B", "exp": "表达强烈的感情无法抑制时用「しかたがない」"}]}, "82": {"analysis": "「〜とおり（に）」表示完全按照某种方式、标准或指示进行，强调严格遵循。「とおり」来源于「通り」，有「按照、依据」的含义。「に」可省略，但加上「に」语气更强调动作的方式。", "mistakes": "易混淆用法：❌ 彼の言うとおりをしました → ✅ 彼の言うとおりにしました（按照他说的做了）；❌ 計画のとおりで進んでいる → ✅ 計画のとおりに進んでいる（按照计划进行）", "similar": [{"form": "〜ように", "diff": "「ように」表示目标或希望，「とおりに」表示完全按照既定方式"}, {"form": "〜に従って", "diff": "「に従って」更正式，多用于书面语，「とおりに  "exp": "地震作为自然现象导致的客观结果，用「によって」表示原因"}]}, "85": {"analysis": "「わけだ」表示基于前述事实得出的必然结论，带有「原来如此」「难怪」的恍然大悟语感。与「はずだ」相比，「わけだ」更强调逻辑推导的过程和结果的合理性。常用于解释现象、表达理解或得出结论的场合。", "mistakes": "❌ 明日雨が降るわけだ → ✅ 雲が多いから、明日雨が降るわけだ（需要明确的逻辑依据）\n❌ 彼は学生なわけです → ✅ 彼は学生なんです（「わけだ」不用于单纯陈述事实）\n❌ 疲れたわけだから休みます → ✅ 疲れているから休みます（不能用于表达个人意愿）", "similar": [{"form": "はずだ", "diff": "「はずだ」表示基于常识的预测，「わけだ」表示基于逻辑的结论"}, {"form": "ものだ", "diff": "「ものだ」表示一般道理，「わけだ」表示具体情况的逻辑结论"}, {"form": "からだ", "diff": "「からだ」单纯表示原因，「わけだ」强调「原来如此」的理解感"}], "quiz": [{"q": "彼は10年間日本にいた____、日本語が上手なわけだ。", "opts": ["A. ので", "B. から", "C. わけで", "D. はずで"], "ans": "B", "exp": "「わけだ」前接普通形，这里需要用「から」连接原因，表示基于10年居住经验得出的合理结论"}, {"q": "A：なぜ田中さんは今日休んでいるの？ B：昨日熱があった____、今日も具合が悪いわけだ。", "opts": ["A. わけだから", "B. はずだから", "C. んだから", "D. ものだから"], "ans": "C", "exp": "对话中解释原因用「んだから」自然，「わけだ」用于得出结论部分，表示「难怪身体不好」"}, {"q": "毎日3時間勉強している。____合格できるわけだ。", "opts": ["A. だから", "B. ので", "C. それで", "D. そういう"], "ans": "A", "exp": "「だから」最适合连接前后句，强调因果关系，后句的「わけだ」表示基于努力得出合格的合理结论"}]}, "86": {"analysis": "「〜というのに」是「〜なのに」的强调形式，表示强烈的逆接关系和不满情绪。「という」起到强调作用，使说话者的不满和抱怨更加突出。常用于表达对现实与期待不符的强烈不满。", "mistakes": "❌ 雨が降るというのに、傘を持たない → ✅ 雨が降っているというのに、傘を持たない（需要用现在进行时表示持续状态）\n❌ 約束したというのには、来なかった → ✅ 約束したというのに、来なかった（不需要助词「は」）", "similar": [{"form": "〜なのに", "diff": "「というのに」比「なのに」语气更强烈，更突出说话者的不满情绪"}, {"form": "〜にもかかわらず", "diff": "「にもかかわらず」较正式客观，「というのに」更主观情感化"}], "quiz": [{"q": "毎日練習している____、上達しない。", "opts": ["A. というのに", "B. ということに", "C. というより", "D. というか"], "ans": "A", "exp": "表示明明每天练习，却不见进步的不满情绪，用「というのに」"}, {"q": "彼はお金持ち____、けちだ。", "opts": ["A. なので", "B. だから", "C. というのに", "D. ために"], "ans": "C", "exp": "表示明明很有钱却很小气的强烈对比和不满"}, {"q": "一生懸命説明した____、分かってもらえなかった。", "opts": ["A. ので", "B. というのに", "C. から", "D. ために"], "ans": "B", "exp": "表示明明认真说明了，却没有被理解的不满情绪"}]}, "87": {"analysis": "「おかげで」表示因某原因带来好结果，表达感激之意；「せいで」表示因某原因导致不好结果，表达责备或遗憾。两者都表示因果关系，但感情色彩截然相反，是典型的褒贬词对。", "mistakes": "容易搞混褒贬含义。❌雨のおかげで、試合が中止になった → ✅雨のせいで、試合が中止になった；❌友達のせいで、楽しい時間を過ごせた → ✅友達のおかげで、楽しい時間を過ごせた", "similar": [{"form": "〜ため（に）", "diff": "中性表达，可用于  {"q": "日本語の____が分からないので、辞書を引きます。", "opts": ["A. 読むかた", "B. 読みかた", "C. 読みますかた", "D. 読み方法"], "ans": "B", "exp": "动词「読む」的ます形是「読みます」，去掉「ます」得到「読み」，加上「かた」变成「読みかた」"}, {"q": "パソコンの____を友達に聞きました。", "opts": ["A. 直すかた", "B. 直しますかた", "C. 直しかた", "D. 直る方法"], "ans": "C", "exp": "动词「直す」的ます形是「直します」，去掉「ます」得到「直し」，加上「かた」变成「直しかた」"}]}, "93": {"analysis": "「〜ように」表达目的、愿望或指示，与「〜ために」不同，「ように」更侧重于期望、祈愿的语气，常用于无法完全控制的情况。接续动词辞书形或ない形时，表示说话人希望达到某种状态或避免某种情况发生。", "mistakes": "易错点：与「〜ために」混淆。❌健康のようにジョギングしています → ✅健康のためにジョギングしています（为了健康而慢跑）；❌試験に合格するために祈っています → ✅試験に合格するように祈っています（祈祷能考试合格）", "similar": [{"form": "〜ために", "diff": "「ために」表示明确目的，主观能控制；「ように」表示期望愿望，带有不确定性"}, {"form": "〜といい", "diff": "「といい」是「ように」的口语形式，意思相同但更随意"}], "quiz": [{"q": "明日の試験で失敗（____）、今日はしっかり勉強します。", "opts": ["A.しないように", "B.しないために", "C.しないでように", "D.しないことに"], "ans": "A", "exp": "表示为了不失败而努力，用「しないように」表达避免某种不希望发生的情况"}, {"q": "子供が風邪を引か（____）、暖かい服を着せました。", "opts": ["A.ないため", "B.ないように", "C.ないでように", "D.ないことで"], "ans": "B", "exp": "希望孩子不感冒，用「ないように」表达期望避免的状态"}, {"q": "皆さんが理解できる（____）、ゆっくり説明します。", "opts": ["A.ために", "B.ようで", "C.ように", "D.ことに"], "ans": "C", "exp": "希望大家能理解，用「ように」表达期望达到的状态"}]}, "94": {"analysis": "「たとえ〜ても」是表示强调让步假设的句型，比普通的「〜ても」更加强调说话者的坚定态度。「たとえ」起到强调作用，即使在最不利的假设条件下，后面的结论也不会改变，体现说话者的决心或客观事实的绝对性。", "mistakes": "❌ たとえ雨が降るでも、行きます → ✅ たとえ雨が降っても、行きます（动词过去式＋ても）\n❌ たとえお金がないても、買います → ✅ たとえお金がなくても、買います（い形容词否定形＋ても）", "similar": [{"form": "〜ても", "diff": "「たとえ〜ても」比「〜ても」语气更强，更突出说话者的坚定意志"}, {"form": "〜としても", "diff": "「〜としても」多用于客观分析，「たとえ〜ても」更强调主观意志"}], "quiz": [{"q": "たとえ（____）、最後まで頑張ります。", "opts": ["A. 難しいても", "B. 難しくても", "C. 難しいでも", "D. 難しければも"], "ans": "B", "exp": "い形容词的「ても」接续形是「〜くても」"}, {"q": "たとえ友達が反対（____）、私は留学する。", "opts": ["A. しても", "B. するでも", "C. すれば", "D. したら"], "ans": "A", "exp": "「たとえ〜ても」的基本句型，动词用普通形＋ても"}, {"q": "（____）時間がかかっても、丁寧に作ります。", "opts": ["A. いくら", "B. たとえ", "C. もし", "D. きっと"], "ans": "B", "exp": "「たとえ〜ても」表示强调的让步假设，符合语境"}]}, "95": {"analysis": "「〜というより」是表示否定前项而强调后项的表达方式，用于提出更准确、更贴切的说法。与中文「与其说...不如说...」完全对应，体现了说话人对事物认识的深化或修正。", "mistakes": "❌ 彼は学生というより、先生です。→ ✅ 彼は学生というより、研究者です。（前后项应该有逻辑关联，不能完全无关）", "similar": [{"form": "〜というか", "diff": "「というか」表示说法的修正或补充，「というより」表示否定前项而强调后项"}, {"form": "〜ではなく", "diff": "「ではなく」是单纯的否定，「というより」在否定的同时提出更准确的表达"}], "quiz": [{"q": "この映画は面白い____、感動的だ。", "opts": ["A. というより", "B. というか", "C. といえば", "D. ということ"], "ans": "A", "exp": "表示与其说有趣不如说感动，用「というより」"}, {"q": "彼の料理は上手____、芸術作品だ。", "opts": ["A. といって", "B. というより", "C. ということ", "D. といえば"], "ans": "B", "exp": "与其说做菜好不如说是艺术作品，表示更贴切的表达"}, {"q": "今日は暑い____、蒸し暑いですね。", "opts": ["A. というより", "B. ということ", "C. といって", "D. といえば"], "ans": "A", "exp": "与其说热不如说闷热，提出更准确的描述"}]}, "96": {"analysis": "「〜ついでに」表示在做某件事的同时顺便做另一件相关的事，强调附带性和便利性。与中文「顺便」含义相近，但使用场景更具体，通常指在同一地点或同一时间内完成的相关行为。", "mistakes": "易错点：时态搭配和逻辑关系。❌ 家に帰るついでに、昨日買い物をした → ✅ 家に帰るついでに、買い物をする。❌ 散歩するついでに、友達に会いました → ✅ 散歩したついでに、友達に会いました", "similar": [{"form": "〜とき", "diff": "「とき」单纯表示时间，「ついでに」强调顺便性和附带行为"}, {"form": "〜ながら", "diff": "「ながら」表示同时进行，「ついでに」表示主次关系的附带行为"}], "quiz": [{"q": "銀行に行く____、郵便局にも寄った。", "opts": ["A. ついでに", "B. ときに", "C. ながら", "D. あいだに"], "ans": "A", "exp": "去银行的时候顺便去了邮局，表示附带行为用「ついでに」"}, {"q": "コンビニで買い物した____、ATMでお金を下ろしました。", "opts": ["A. とき", "B. ついでに", "C. あいだ", "D. ながら"], "ans": "B", "exp": "在便利店购物的同时顺便取钱，用「ついでに」表示顺带行为"}, {"q": "散歩____、公園で友達に会った。", "opts": ["A. するついでに", "B. したついでに", "C. のついでに", "D. ているついでに"], "ans": "B", "exp": "散步时偶然遇到朋友，用过去式「したついでに」表示散步过程中的附带事件"}]}, "97": {"analysis": "「〜にかかわらず」表示不受某种条件或状况的影响，强调结果与预期相反或无关。与「〜にもかかわらず」在语义上相近，都表示逆接关系，但使用场景略有不同。此文法常用于正式场合，表达客观的逆接关系。", "mistakes": "❌ 天気が悪いにかかわらず、出かけた → ✅ 天気が悪いにもかかわらず、出かけた（天气状况用にもかかわらず更自然）；❌ 年齢にかかわって応募する → ✅ 年齢にかかわらず応募する（否定形式才正确）", "similar": [{"form": "〜にもかかわらず", "diff": "更强调意外性和对比性，常用于具体事实的逆接"}, {"form": "〜に関係なく", "diff": "更口语化，强调无关联性而非逆接性"}, {"form": "〜を問わず", "diff": "更正式，多用于书面语，强调不追究、不考虑"}], "quiz": [{"q": "この大学では、国籍____、優秀な学生を受け入れています。", "opts": ["A. にかかわらず", "B. にかかわって", "C. にかかわる", "D. にかかわった"], "ans": "A", "exp": "「にかかわらず」表示不管国籍如何，都接受优秀学生，符合逆接含义"}, {"q": "経験____、やる気があれば採用します。", "opts": ["A. にもかかわって", "B. にかかわらず", "C. をかかわらず", "D. でかかわらず"], "ans": "B", "exp": "「経験にかかわらず」表示不管有无经验，只要有干劲就录用"}, {"q": "性別や年齢____、誰でも参加できるイベントです。", "opts": ["A. にかかわって", "B. をかかわらず", "C. にかかわらず", "D. がかかわらず"], "ans": "C", "exp": "「性別や年齢にかかわらず」表示不分性别和年龄，任何人都可以参加"}]}, "98": {"analysis": "「〜前後」表示以某个数量为中心的大致范围，常用于时间、数量等的估算。与「くらい・ごろ」相比，「前後」更强调在基准点上下波动的概念，给人更精确的印象。", "mistakes": "❌ 3時前後に来ます → ✅ 3時頃に来ます（时刻用「頃」）\n❌ 値段は1000円前後ぐらいです → ✅ 値段は1000円前後です（不重复表达）", "similar": [{"form": "〜くらい/〜ぐらい", "diff": "「前後」更客观精确，「くらい」更主观模糊"}, {"form": "〜頃", "diff": "「頃」专用于时刻，「前後」用于数量范围"}, {"form": "〜程度", "diff": "「程度」更正式，「前後」更具体明确"}], "quiz": [{"q": "この作業は____時間かかります。", "opts": ["A. 2時間前後", "B. 2時頃", "C. 2時間程", "D. 2時間ばかり"], "ans": "A", "exp": "表示大约需要2小时左右的时间，用「前後」最合适"}, {"q": "参加者は____人でした。", "opts": ["A. 50人頃", "B. 50人前後", "C. 50人間", "D. 50人以内"], "ans": "B", "exp": "表示参加人数大约50人左右，用「前後」表示数量范围"}, {"q": "体重が____kg減りました。", "opts": ["A. 3kg頃", "B. 3kg程度", "C. 3kg前後", "D. 3kg以上"], "ans": "C", "exp": "表示体重减少了大约3公斤左右，「前後」最准确表达这个范围概念"}]}, "99": {"analysis": "「〜に対して」是N3核心语法，表示「针对某对象」或「与某事物形成对比」两种含义。作为对象时强调动作的指向性，作为对比时突出两者间的差异或对立关系。", "mistakes": "易错点：与「〜について」混淆。❌ 子どもについて優しくしてください → ✅ 子どもに対して優しくしてください（对孩子要温柔）。「について」仅表话题，「に対して」表动作对象。", "similar": [{"form": "〜について", "diff": "「について」仅表话题范围，「に対して」表动作对象或对比关系"}, {"form": "〜に向けて", "diff": "「に向けて」强调方向性目标，「に対して」更多表直接作用的对象"}], "quiz": [{"q": "先生は学生____厳しいです。", "opts": ["A. に対して", "B. について", "C. に向けて", "D. として"], "ans": "A", "exp": "表示老师对学生这个对象很严格，用「に対して」"}, {"q": "彼の意見____私は反対です。", "opts": ["A. について", "B. に対して", "C. として", "D. によって"], "ans": "B", "exp": "表示对他的意见持反对态度，用「に対して」表对比"}, {"q": "お客様____丁寧な対応をお願いします。", "opts": ["A. について", "B. として", "C. に対して", "D. によって"], "ans": "C", "exp": "表示针对顾客这个对象要有礼貌的应对，用「に対して」"}]}, "100": {"analysis": "「〜に基づいて」表示以某事物为根据或标准来进行判断、决定或行动。与中文「基于」「根据」对应，强调有明确的依据性。常用于正式场合和书面语中。", "mistakes": "❌ 経験に基づいて話します → ✅ 経験に基づいて話している（基于经验在说话，应用进行时）\n❌ 法律に基づいた決定する → ✅ 法律に基づいて決定する（动词前用て形）", "similar": [{"form": "〜によって", "diff": "によって更广泛，可表原因、手段等；に基づいて专指以某事为根据"}, {"form": "〜をもとに",
