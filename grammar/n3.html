 "exp": "表示网络便利性和隐私问题并存，用「一方で」，不加「は」"}]}, "103": {"analysis": "「どんなに〜ても」表示无论程度多么强烈也不改变结果，强调逆接关系。与「いくら〜ても」意思相近，但「どんなに」更偏重于情感色彩和主观感受的表达。常用于表达坚定意志或客观事实不受程度影响。", "mistakes": "❌ どんなに忙しいから、手伝ってください → ✅ どんなに忙しくても、手伝ってください（逆接用ても，不用から）❌ どんなに勉強したても → ✅ どんなに勉強しても（动词用基本形+ても）❌ どんなに元気でても → ✅ どんなに元気でも（ナ形容词用でも）", "similar": [{"form": "いくら〜ても", "diff": "意思基本相同，但「いくら」更客观理性，「どんなに」更主观情感"}, {"form": "たとえ〜ても", "diff": "「たとえ」表示假设极端情况，「どんなに」强调程度深浅"}], "quiz": [{"q": "どんなに____、合格できませんでした。", "opts": ["A. 勉強したても", "B. 勉強しても", "C. 勉強するても", "D. 勉強ても"], "ans": "B", "exp": "动词接续用基本形+ても，「勉強する」去掉「る」变成「勉強しても」"}, {"q": "どんなに高く____、買いたいです。", "opts": ["A. ても", "B. でも", "C. たって", "D. だって"], "ans": "A", "exp": "イ形容词接续用「形容词去い+くても」，「高い」变成「高くても」"}, {"q": "どんなに静か____、集中できない。", "opts": ["A. ても", "B. くても", "C. でも", "D. だても"], "ans": "C", "exp": "ナ形容词接续用「形容词+でも」，「静か」是ナ形容词，用「静かでも」"}]}, "104": {"analysis": "「〜てもかまわない」表示许可或不在意，比「〜てもいい」更正式客气。常用于表示对方的行为不会给自己造成困扰，或允许对方做某事。在商务场合和敬语表达中使用频率较高。", "mistakes": "❌ 食べなくてもかまわない → ✅ 食べなくてもかまいません（否定形式应该在动词上，不是在かまわない上）\n❌ 来るでもかまわない → ✅ 来てもかまわない（必须用て形接续）", "similar": [{"form": "〜てもいい", "diff": "「てもいい」更口语化随意，「てもかまわない」更正式客气"}, {"form": "〜ても差し支えない", "diff": "「差し支えない」更书面化正式，常用于公文或正式场合"}], "quiz": [{"q": "明日の会議に（____）。", "opts": ["A. 遅れてもかまわない", "B. 遅れるでもかまわない", "C. 遅れなくてもかまわない", "D. 遅れればかまわない"], "ans": "A", "exp": "动词て形＋てもかまわない的正确用法"}, {"q": "この資料は（____）。", "opts": ["A. コピーするもかまいません", "B. コピーしてもかまいません", "C. コピーでもかまいません", "D. コピーならかまいません"], "ans": "B", "exp": "需要使用动词て形「コピーして」接续"}, {"q": "窓を（____）。", "opts": ["A. 開けるもかまわない", "B. 開けでもかまわない", "C. 開けてもかまわない", "D. 開ければかまわない"], "ans": "C", "exp": "「開ける」的て形是「開けて」，正确接续形式"}]}, "105": {"analysis": "〜というか〜というか表达说话者对某种情况难以用单一词汇准确表达时的犹豫和迟疑。通常用于描述复杂、微妙的感情或状态，体现了日语表达的含蓄性。两个部分往往是相关但略有不同的形容词或状态描述。", "mistakes": "❌ 嬉しいというか、悲しいというか → ✅ 嬉しいというか、恥ずかしいというか（两个词应该有关联性，不能完全对立）❌ 彼は学生というか、会社員というか → ✅ 彼は学生というか、研修生というか（应该是相近或有重叠的概念）", "similar": [{"form": "〜たり〜たり", "diff": "〜たり〜たり列举多个动作或状态，而〜というか〜というか表达措辞上的犹豫迟疑"}, {"form": "〜とか〜とか", "diff": "〜とか〜とか随意列举例子，语气较轻松；〜というか〜というか表达复杂心情，语气更慎重"}], "quiz": [{"q": "今日の天気は暖かい____寒い____、よくわからない。", "opts": ["A. というか、というか", "B. たり、たり", "C. とか、とか", "D. ながら、ながら"], "ans": "A", "exp": "表达对天气的复杂感受，既不完全暖和也不完全寒冷的犹豫心情，用〜というか〜というか"}, {"q": "彼の態度は冷たい____、優しい____、判断に困る。", "opts": ["A. とか、とか", "B. というか、というか", "C. たり、たり", "D. し、し"], "ans": "B", "exp": "描述难以明确判断他人态度时的复杂感受，用〜というか〜というか表达措辞上的迷惑"}, {"q": "この映画は面白い____、つまらない____、微妙な作品だ。", "opts": ["A. し、し", "B. たり、たり", "C. というか、というか", "D. とか、とか"], "ans": "C", "exp": "对电影评价的复杂心情，既不完全有趣也不完全无趣，用〜というか〜というか表达这种微妙的感受"}]}, "106": {"analysis": "「〜に気づく」表示主观地意识到、发现某种状况或事实，强调从不知道到知道的认知转变过程。与中文「注意到」相比，日语更强调这种发现是自然而然产生的，不是刻意寻找的结果。", "mistakes": "❌ 財布がないに気づいた → ✅ 財布がないことに気づいた（名词性内容需要用「こと」）\n❌ 雨を降っていることに気づいた → ✅ 雨が降っていることに気づいた（注意助词使用）", "similar": [{"form": "〜に気がつく", "diff": "意思完全相同，「気づく」是「気がつく」的缩略形，现代日语中两者可互换使用"}, {"form": "〜を知る", "diff": "「知る」强调获得信息或知识，「気づく」强调意识到、察觉到的过程"}, {"form": "〜を発見する", "diff": "「発見する」多用于重大发现，「気づく」用于日常生活中的小发现或察觉"}], "quiz": [{"q": "彼女の変化____気づいた。", "opts": ["A. を", "B. に", "C. が", "D. で"], "ans": "B", "exp": "「〜に気づく」是固定搭配，必须使用助词「に」"}, {"q": "間違い____気づいて、すぐに訂正した。", "opts": ["A. をしたことに", "B. したことを", "C. をしたに", "D. したことに"], "ans": "D", "exp": "动词普通形+ことに気づく，表示意识到做了某事"}, {"q": "最近、日本語____上達していることに気づいた。", "opts": ["A. を", "B. に", "C. が", "D. の"], "ans": "C", "exp": "在「こと」从句中，主语用「が」标记，表示「日语在进步这件事」"}]}, "107": {"analysis": "「〜ことにする」表示主体主观的决定或意志，强调自己做出的选择；「〜ことになる」表示客观情况或外部因素导致的结果，主体往往是被动接受的。两者都用动词辞书形，但意志性完全不同。", "mistakes": "❌来年、日本に留学することになりました（自己决定时误用）→ ✅来年、日本に留学することにしました ❌会社の都合で転勤することにしました（被动情况误用）→ ✅会社の都合で転勤することになりました", "similar": [{"form": "〜ようにする/なる", "diff": "ようにする表示努力达成某种状态，ことにする表示明确决定做某事"}, {"form": "〜つもりだ", "diff": "つもりだ表示打算或意图，ことにする表示已经决定的事情"}], "quiz": [{"q": "会社の人事異動で大阪に転勤____。", "opts": ["A. することにしました", "B. することになりました", "C. するつもりです", "D. するようにしました"], "ans": "B", "exp": "人事异动是公司决定的，不是自己的意志，用「ことになる」"}, {"q": "健康のために禁煙____。", "opts": ["A. することになりました", "B. するつもりです", "C. することにしました", "D. するようになりました"], "ans": "C", "exp": "为了健康而戒烟是自己的决定，用「ことにする」"}, {"q": "新しい法律で、来月からマスク着用が義務____。", "opts": ["A. にすることにしました", "B. にすることになりました", "C. にするつもりです", "D. にするようにしました"], "ans": "B", "exp": "法律规定是外部决定的客观情况，用「ことになる」"}]}, "108": {"analysis": "「〜を中心に」表示以某事物作为核心或焦点进行活动，强调围绕某个重点展开。与中文「以...为中心」意思相近，但日语更强调动作或状态的展开方式。常用于描述地理位置、组织结构、活动范围等场景。", "mistakes": "易混淆「を中心に」和「を中心として」的使用场合。❌ 会議を中心に話し合った → ✅ 会議を中心として話し合った（会议本身不是中心，应该是围绕某话题）。❌ 私を中心に考える → ✅ 私を中心として考える（以我为主体思考时用として）", "similar": [{"form": "〜を中心として", "diff": "更正式，多用于书面语；を中心に更口语化，使用范围更广"}, {"form": "〜を軸に", "diff": "强调以某事物为轴心旋转发展；を中心に侧重于围绕展开"}, {"form": "〜をめぐって", "diff": "表示围绕某问题进行讨论或争论；を中心に更中性，不含争议色彩"}], "quiz": [{"q": "この地域は大学（____）発展してきた。", "opts": ["A. を中心に", "B. を中心で", "C. の中心に", "D. が中心に"], "ans": "A", "exp": "「を中心に」是固定搭配，表示以大学为中心发展"}, {"q": "家族（____）生活を考えています。", "opts": ["A. を中心で", "B. を中心に", "C. の中心で", "D. に中心を"], "ans": "B", "exp": "表示以家族为中心考虑生活，用「を中心に」"}, {"q": "駅（____）商店街が広がっている。", "opts": ["A. の中心に", "B. が中心に", "C. を中心に", "D. で中心に"], "ans": "C", "exp": "表示以车站为中心商店街向外扩展，用「を中心に」"}]}, "109": {"analysis": "「〜を通じて/を通して」表示通过某种媒介、手段或在某个期间内实现某种结果。两者基本同义，但「を通じて」更正式，常用于书面语；「を通して」更口语化。这个文法强调过程性和持续性，不是瞬间的动作。", "mistakes": "❌ 友達を通じて会った → ✅ 友達を通して紹介してもらった（经朋友介绍认识的）\n❌ 一日を通じて雨だった → ✅ 一日を通して雨だった（整天都在下雨）\n❌ テレビを通じて見た → ✅ テレビを通して知った（通过电视了解到）", "similar": [{"form": "〜によって", "diff": "「によって」强调原因、手段、作者；「を通じて」强调媒介和过程"}, {"form": "〜で", "diff": "「で」表示手段工具；「を通じて」强调通过某种渠道或媒介"}], "quiz": [{"q": "インターネット____、世界中の人と交流できる。", "opts": ["A. を通じて", "B. によって", "C. として", "D. について"], "ans": "A", "exp": "通过互联网这一媒介进行交流，用「を通じて」"}, {"q": "一年____の努力で、日本語が上手になった。", "opts": ["A. を通じて", "B. を通して", "C. によって", "D. から"], "ans": "B", "exp": "表示在一年这个期间内持续努力，「を通して」更自然"}, {"q": "友人の紹介____、この仕事を見つけました。", "opts": ["A. を通じて", "B. を通して", "C. で", "D. から"], "ans": "A", "exp": "通过朋友介绍这一渠道找到工作，用「を通じて」"}]}, "110": {"analysis": "「〜向けに/向きに」表示针对特定对象或群体而设计、制作或提供某事物，强调目标导向性。「向けに」多用于动作，「向きの」多修饰名词，两者在实际使用中意思基本相同，但语法功能略有不同。", "mistakes": "易混淆「向けに」和「向きに」的使用场合。❌子供向きにこの本を書きました → ✅子供向けにこの本を書きました（动作用「向けに」）；❌初心者向けな教材 → ✅初心者向けの教材（修饰名词用「向きの」）", "similar": [{"form": "〜のために", "diff": "「のために」表示目的或受益者，范围更广；「向けに」专指针对特定群体设计"}, {"form": "〜に対して", "diff": "「に対して」表示对象或态度；「向けに」强调为特定对象量身定制"}], "quiz": [{"q": "外国人____の日本語教材が人気です。", "opts": ["A.向けに", "B.向きの", "C.向いて", "D.向かって"], "ans": "B", "exp": "修饰名词「教材」用「向きの」"}, {"q": "この商品は高齢者____開発されました。", "opts": ["A.向きに", "B.向きの", "C.向けに", "D.向かいに"], "ans": "C", "exp": "动词「開発される」前用「向けに」表示针对对象"}, {"q": "女性____ファッション雑誌をよく読みます。", "opts": ["A.向けに", "B.向きな", "C.向きの", "D.向いた"], "ans": "C", "exp": "修饰名词「ファッション雑誌」用「向きの」"}]}, "111": {"analysis": "「〜について」是N3重要文法，表示话题或对象的指定。与中文「关于」相似，但日语中更强调明确指向性。常与「話す・発表する・議論する」等动词搭配，在正式场合使用频率很高。", "mistakes": "❌ 明日のことについて考えています → ✅ 明日のことを考えています（思考用「を」不用「について」）；❌ 彼について好きです → ✅ 彼が好きです（感情表达不用「について」）", "similar": [{"form": "〜に関して", "diff": "更正式，多用于书面语和正式场合"}, {"form": "〜のことを", "diff": "更口语化，强调具体事物"}, {"form": "〜をめぐって", "diff": "围绕某问题展开，带争议性"}], "quiz": [{"q": "環境問題____みんなで話し合いましょう。", "opts": ["A. について", "B. に対して", "C. によって", "D. にとって"], "ans": "A", "exp": "表示讨论的话题用「について」，其他选项语义不符"}, {"q": "先生は日本の歴史____詳しく説明してくれました。", "opts": ["A. に関する", "B. について", "C. によると", "D. に対する"], "ans": "B", "exp": "「説明する」常与「について」搭配，表示说明的内容"}, {"q": "この本は料理____書かれています。", "opts": ["A. について", "B. に対して", "C. によって", "D. として"], "ans": "A", "exp": "书籍内容主题用「について」表示，「書かれている」是被动形式"}]}, "112": {"analysis": "「〜において」是N3级别的书面语表达，表示在某个场所、场面或领域内，相当于「で」的敬语形式。多用于正式文章、报告或演讲中，带有庄重感。与「で」相比，「において」更强调抽象的场面或专业领域，而非具体的物理场所。", "mistakes": "易错点：❌ 家において勉強する → ✅ 家で勉強する（日常场所用「で」）; ❌ この問題において考える → ✅ この問題について考える（「について」表示关于某事）", "similar": [{"form": "〜で", "diff": "「で」日常用语，「において」书面语；「で」多指具体场所，「において」多指抽象场面"}, {"form": "〜について", "diff": "「について」表示关于某话题，「において」表示在某领域或场面内"}], "quiz": [{"q": "国際会議____、新しい提案が発表された。", "opts": ["A. において", "B. について", "C. に対して", "D. によって"], "ans": "A", "exp": "国际会议是正式场合，用「において」表示在该场面内"}, {"q": "この分野____研究は、まだ始まったばかりだ。", "opts": ["A. において", "B. における", "C. について", "D. に関する"], "ans": "B", "exp": "修饰名词「研究」时用连体形「における」"}, {"q": "教育____、先生の役割は重要である。", "opts": ["A. で", "B. に", "C. において", "D. として"], "ans": "C", "exp": "教育这个抽象领域，正式表达用「において」"}]}, "113": {"analysis": "「に際して」表示在重要的时机或场合，强调事态的正式性和重要性，常用于书面语。与「とき」不同，它专门用于描述具有特殊意义的时刻，如典礼、重要决定、人生转折点等。", "mistakes": "易错点：与普通的「とき」混用。❌ 昼ごはんを食べるに際して、手を洗った。 → ✅ 昼ごはんを食べるとき、手を洗った。（日常行为不用に際して）", "similar": [{"form": "〜に当たって", "diff": "意思基本相同，但「に当たって」更强调面临某种情况或承担责任"}, {"form": "〜とき", "diff": "「とき」用于一般时机，「に際して」专用于重要、正式的场合"}], "quiz": [{"q": "卒業____、先生にお礼を言いたいです。", "opts": ["A. に際して", "B. について", "C. に対して", "D. において"], "ans": "A", "exp": "卒业是重要时刻，用「に際して」表示在这个重要场合"}, {"q": "新製品の発売____、記者会見を行います。", "opts": ["A. とき", "B. に際して", "C. ながら", "D. ついでに"], "ans": "B", "exp": "新产品发售是公司的重要事件，用「に際して」表示在这个重要时机"}, {"q": "結婚____、両親に挨拶をしました。", "opts": ["A. に関して", "B. について", "C. に際して", "D. に向けて"], "ans": "C", "exp": "结婚是人生重要时刻，用「に際して」表示在这个重要场合"}]}, "114": {"analysis": "「〜に応じて」表示根据某种情况、条件或要求做出相应的调整或对应。与中文「根据」不同的是，它强调的是灵活的适应性调整，而非单纯的依据。这个文法常用于商务场合，体现出专业的服务态度和灵活应对的能力。", "mistakes": "易错点：与「〜によって」混淆。❌ 天気によって服装を変える → ✅ 天気に応じて服装を変える（根据天气调整服装）。「によって」表示原因理由，「に応じて」表示适应调整。", "similar": [{"form": "〜によって", "diff": "「によって」表示原因手段，「に応じて」表示适应调整"}, {"form": "〜に合わせて", "diff": "「に合わせて」侧重配合迎合，「に応じて」侧重灵活对应"}], "quiz": [{"q": "経験____、給料が決まります。", "opts": ["A. に応じて", "B. によって", "C. について", "D. として"], "ans": "A", "exp": "根据经验来决定工资，体现灵活调整，用「に応じて」"}, {"q": "この商品は年齢____デザインが違います。", "opts": ["A. によって", "B. に応じて", "C. に対して", "D. として"], "ans": "B", "exp": "根据年龄调整设计，表示适应性变化，用「に応じて」"}, {"q": "参加者の人数____会場を変更いたします。", "opts": ["A. について", "B. に対して", "C. に応じて", "D. に関して"], "ans": "C", "exp": "根据参加人数调整会场，表示灵活对应，用「に応じて」"}]}, "115": {"analysis": "「〜はもちろん」表示前项是理所当然的，重点强调后项的追加信息。常与「〜も」呼应使用，形成「AはもちろんBも」的句型，突出B项的意外性或补充性。这个文法体现了日语中层次递进的表达习惯。", "mistakes": "❌ 日本語はもちろん、英語は話せません。→ ✅ 日本語はもちろん、英語も話せます。（后项应该是肯定的追加信息）\n❌ 彼はもちろん来ました、私は来ませんでした。→ ✅ 彼はもちろん、私も来ました。（应该用「も」表示追加）", "similar": [{"form": "〜だけでなく〜も", "diff": "「だけでなく」单纯表示追加，「はもちろん」强调前项的理所当然性"}, {"form": "〜ばかりでなく〜も", "diff": "「ばかりでなく」较正式，「はもちろん」更口语化且带有理所当然的语气"}], "quiz": [{"q": "彼は数学____、物理も得意です。", "opts": ["A. はもちろん", "B. だけ", "C. しか", "D. ばかり"], "ans": "A", "exp": "表示数学理所当然，物理也很擅长的追加信息"}, {"q": "この店は料理はもちろん、サービス____良いです。", "opts": ["A. が", "B. は", "C. も", "D. を"], "ans": "C", "exp": "「はもちろん」后面通常用「も」表示追加"}, {"q": "日本の文化____、韓国の文化も勉強したいです。", "opts": ["A. はもちろん", "B. だけでなく", "C. ばかりか", "D. 以上都可以"], "ans": "A", "exp": "「はもちろん」最適合，表示日本文化是理所当然要学的"}]}, "116": {"analysis": "「より」是书面语中表示发信来源或比较的助词，相当于口语的「から」。作为发信来源时，常用于商务邮件、正式文件等场合，显得更加正式和礼貌。比较用法时，「より」比「から」更加书面化，常见于学术论文、报告等正式文体中。", "mistakes": "❌ 友達より電話がありました（朋友来电话了）→ ✅ 友達から電話がありました（口语场合应用から）\n❌ 会社よりメールを送ります（公司发送邮件）→ ✅ 会社からメールをお送りします（敬语搭配要完整）", "similar": [{"form": "〜から", "diff": "口语表达，日常会话中使用；より是书面语，正式文件中使用"}, {"form": "〜によって", "diff": "表示手段方法或原因；より主要表示发信来源或比较起点"}], "quiz": [{"q": "正式な文書では「田中____連絡があります」が適切です。", "opts": ["A. から", "B. より", "C. によって", "D. について"], "ans": "B", "exp": "正式文书中表示发信来源时，应使用书面语「より」而不是口语「から」"}, {"q": "「昨年____売上が10%向上しました」書面語として正しいのは？", "opts": ["A. から", "B. より", "C. について", "D. によって"], "ans": "B", "exp": "书面语中表示比较基准时使用「より」，这里是与昨年相比的意思"}, {"q": "日常会話で適切なのは「友達____プレゼントをもらった」", "opts": ["A. より", "B. から", "C. によって", "D. について"], "ans": "B", "exp": "日常会话中应使用口语形式「から」，「より」主要用于书面语"}]}, "117": {"analysis": "「〜という点で/点から」表示从某个特定的观点、角度或方面来评价事物，强调在某一具体方面的特征。常用于客观分析和比较，是书面语色彩较强的表达方式。", "mistakes": "易混淆用法：❌「この店は値段が安いの点で人気だ」→ ✅「この店は値段が安いという点で人気だ」（必须用「という点で」的完整形式）", "similar": [{"form": "〜において", "diff": "「において」更正式，多用于书面语；「という点で」口语和书面语都可用，更强调具体方面"}, {"form": "〜に関して", "diff": "「に関して」表示「关于」，范围更广；「という点で」专指某一具体观点或侧面"}], "quiz": [{"q": "彼は経験が豊富だ____優秀な社員です。", "opts": ["A. という点で", "B. の点で", "C. に点で", "D. と点で"], "ans": "A", "exp": "「という点で」是固定搭配，表示从经验丰富这一点来看"}, {"q": "このアプリは操作が簡単____、初心者にも使いやすい。", "opts": ["A. の点から", "B. という点から", "C. に点から", "D. で点から"], "ans": "B", "exp": "「という点から」表示从操作简单这个角度来看，必须用完整形式"}, {"q": "安全性____考えると、この方法がベストだ。", "opts": ["A. の点で", "B. に点で", "C. という点で", "D. と点で"], "ans": "C", "exp": "从安全性这一点来考虑，必须使用「という点で」的完整形式"}]}, "118": {"analysis": "「〜末（すえ）に」表示经过长时间的思考、努力或过程后得出的最终结果，强调这个过程是漫长且深思熟虑的。与简单的「〜て」不同，它暗示了一种经历困难或复杂情况后的决定性结果。这个文法常用于描述人生重大决定、长期努力的成果等正式场合。", "mistakes": "❌ 考えている末に決めた → ✅ 考えた末に決めた（必须用た形）\n❌ 短時間悩んだ末に → ✅ 長時間悩んだ末に（强调长期过程）\n❌ 末にすぐ決めた → ✅ 末にやっと決めた（不能表示迅速决定）", "similar": [{"form": "〜あげく（に）", "diff": "「末に」多为中性或积极结果，「あげく」常用于消极结果"}, {"form": "〜結果", "diff": "「結果」更客观，「末に」强调经历过程的艰难"}, {"form": "〜て", "diff": "「て」表示简单顺接，「末に」强调长期过程后的结果"}], "quiz": [{"q": "長い間検討した____、この案を採用することになった。", "opts": ["A. 末に", "B. あとで", "C. ときに", "D. まえに"], "ans": "A", "exp": "「末に」表示经过长期检讨后的最终决定结果"}, {"q": "家族と相談____、転職を決意した。", "opts": ["A. してから", "B. した末に", "C. するとき", "D. すれば"], "ans": "B", "exp": "「相談した末に」表示经过与家人商量这一过程后做出的重要决定"}, {"q": "何度も失敗した____、ついに成功した。", "opts": ["A. ために", "B. ので", "C. 末に", "D. から"], "ans": "C", "exp": "「失敗した末に」强调经历多次失败这一长期过程后终于成功"}]}, "119": {"analysis": "「〜かねる」是敬语表现，用于礼貌地表示某事难以实现或无法做到。比直接拒绝更加委婉，常用于商务场合和正式交流中。此文法带有「困難」和「不可能」的含义，同时保持礼貌的语气。", "mistakes": "易错点：与「〜にくい」混淆。❌ その仕事は難しくて、やりにくいです → ✅ その仕事はお引き受けしかねます（更礼貌）；❌ 理解しかねません → ✅ ご理解いただきかねます（敬语使用）", "similar": [{"form": "〜にくい", "diff": "「〜にくい」表示客观困难，「〜かねる」更礼貌，多用于拒绝"}, {"form": "〜られない", "diff": "「〜られない」直接表示不能，「〜かねる」是委婉的敬语表现"}], "quiz": [{"q": "申し訳ございませんが、その件については____。", "opts": ["A. お答えしかねます", "B. お答えしにくいです", "C. お答えできません", "D. お答えしないです"], "ans": "A", "exp": "商务场合中礼貌地拒绝回答，「しかねる」最适合"}, {"q": "予算の関係で、ご要望には____。", "opts": ["A. 応じられません", "B. お応えしかねます", "C. 応じにくいです", "D. 応じないです"], "ans": "B", "exp": "正式场合中委婉地表示无法满足要求"}, {"q": "そのような条件では契約を____。", "opts": ["A. 結べません", "B. 結びにくいです", "C. 結びかねます", "D. 結ばないです"], "ans": "C", "exp": "商务谈判中礼貌地表示难以签约"}]}, "120": {"analysis": "「〜かねない」是表示担心某种不好情况可能发生的文法，语感比较正式。与「〜かもしれない」相比，「〜かねない」专门用于负面结果，带有说话人的担忧和警告意味。常用于书面语或正式场合，表达对潜在风险的忧虑。", "mistakes": "易错点：误用于正面结果。❌彼は合格しかねない → ✅彼は合格するかもしれない。「かねない」只用于负面可能性，正面结果要用「かもしれない」等。另外要注意接续是动词ます形去掉「ます」，不是原形。", "similar": [{"form": "〜かもしれない", "diff": "「かもしれない」可用于正负面结果，「かねない」只用于负面结果"}, {"form": "〜恐れがある", "diff": "「恐れがある」更正式，多用于书面语，「かねない」相对口语化一些"}], "quiz": [{"q": "彼の行動は誤解を（　　）。", "opts": ["A. 招きかねない", "B. 招くかねない", "C. 招いかねない", "D. 招けかねない"], "ans": "A", "exp": "动词ます形去掉「ます」+「かねない」，「招く」的ます形是「招きます」，所以是「招きかねない」"}, {"q": "そんなことを言うと、相手を（　　）。", "opts": ["A. 怒らせるかねない", "B. 怒らせかねない", "C. 怒らせますかねない", "D. 怒らせたかねない"], "ans": "B", "exp": "「怒らせる」的ます形是「怒らせます」，去掉「ます」变成「怒らせかねない」"}, {"q": "次の文で「かねない」の使い方が正しいのはどれですか。", "opts": ["A. 明日は晴れかねない", "B. 試験に合格しかねない", "C. 遅刻しかねない", "D. プレゼントをもらいかねない"], "ans": "C", "exp": "「かねない」は負面的な可能性にのみ使用する。「遅刻」は負面的な結果なので正しい"}]}, "121": {"analysis": "「〜にもとづいて」表示以某事物为基础或依据进行行动，强调客观的根据性和权威性。与「〜をもとに」同义但更正式，常用于学术、商务等严肃场合。注意「もとづく」的汉字写作「基づく」。", "mistakes": "❌ 経験にもとづかない意見を言った → ✅ 経験にもとづいた意見を言った（基于经验发表了意见）\n❌ 法律をもとづいて判断する → ✅ 法律にもとづいて判断する（根据法律进行判断）", "similar": [{"form": "〜をもとに", "diff": "意思相同但更口语化，使用场合较随意"}, {"form": "〜によって", "diff": "表示手段方法，不强调基础依据的概念"}, {"form": "〜によると", "diff": "表示信息来源，多用于转述他人观点"}], "quiz": [{"q": "このレポートは調査結果____書かれています。", "opts": ["A. にもとづいて", "B. によると", "C. について", "D. に対して"], "ans": "A", "exp": "表示以调查结果为依据写成报告，用「にもとづいて」"}, {"q": "新しい計画は____データを分析して作成された。", "opts": ["A. 正確の", "B. 正確な", "C. 正確に", "D. 正確で"], "ans": "B", "exp": "修饰名词「データ」用连体形「正确な」"}, {"q": "法律____、この行為は違法です。", "opts": ["A. をもとに", "B. にもとづいて", "C. によって", "D. について"], "ans": "B", "exp": "根据法律进行判断，用正式的「にもとづいて」更合适"}]}, "122": {"analysis": "「〜限り」表示条件或范围的限制，相当于中文的「只要～」「除非～」。与动词辞书形连用时表示积极条件（只要做某事），与ない形连用时表示消极条件（除非不做某事）。这个文法强调在某个条件或范围内，后面的结果必然会发生。", "mistakes": "❌ 努力限り、結果はついてくる → ✅ 努力する限り、結果はついてくる（必须用动词辞书形+限り）❌ 雨が降らない限りに、出かけます → ✅ 雨が降らない限り、出かけます（限り后面不加に）", "similar": [{"form": "〜以上（は）", "diff": "以上更强调责任义务，限り更强调条件范围"}, {"form": "〜うちは/うちに", "diff": "うち强调时间范围内，限り强调条件或能力范围内"}], "quiz": [{"q": "私が生きている____、君を守る。", "opts": ["A. 限り", "B. 限りに", "C. 限りで", "D. 限りは"], "ans": "A", "exp": "「生きている限り」表示「只要活着」这个条件，限り前不需要助词"}, {"q": "彼が謝ら____、この問題は解決しない。", "opts": ["A. ない限り", "B. ない限りに", "C. なければ限り", "D. ないと限り"], "ans": "A", "exp": "「謝らない限り」表示「除非道歉」，用动词ない形+限り表示消极条件"}, {"q": "時間がある____、もう少し勉強したい。", "opts": ["A. 限りで", "B. 限りに", "C. 限り", "D. 限りは"], "ans": "C", "exp": "「時間がある限り」表示「只要有时间」，在时间允许的范围内想继续学习"}]}, "123": {"analysis": "「〜のではなく/ではなく」是表示否定前项、肯定后项的重要句型，强调「不是A而是B」的对比关系。「の」的有无决定了接续方式：动词、い形容词、な形容词词干+「のではなく」；名词+「ではなく」。这个句型常用于澄清误解、纠正错误认识或强调真实情况。", "mistakes": "❌ 彼は学生ではなく、働いている。→ ✅ 彼は学生ではなく、会社員だ。（后项应该是名词性表述，保持对比的平衡性）❌ 疲れたではなく、眠いのだ。→ ✅ 疲れたのではなく、眠いのだ。（い形容词需要加「の」）", "similar": [{"form": "〜というより（は）", "diff": "「のではなく」是明确否定前项；「というより」是相对比较，前项不完全错误"}, {"form": "〜ないで", "diff": "「ないで」表示不做某动作就做别的；「のではなく」强调纠正错误认识"}], "quiz": [{"q": "彼女は怒っている____、心配しているのだ。", "opts": ["A. のではなく", "B. ではなく", "C. じゃなくて", "D. なくて"], "ans": "A", "exp": "「怒っている」是动词て形＋いる，需要用「のではなく」"}, {"q": "これは問題____、チャンスなのです。", "opts": ["A. のではなく", "B. ではなく", "C. でなく", "D. じゃなく"], "ans": "B", "exp": "「問題」是名词，用「ではなく」，正式场合不省略「は」"}, {"q": "雨が降った____晴れていたので、ピクニックに行きました。", "opts": ["A. のではなく", "B. ではなく", "C. んじゃなくて", "D. でなくて"], "ans": "A", "exp": "「降った」是动词过去形，需要用「のではなく」来否定"}]}, "124": {"analysis": "这组文法用于表示数量范围，需要注意「以上」包含基准数，「以下」也包含基准数，「以内」表示不超过某个范围，而「を超える」则表示超过基准数但不包含基准数本身。在实际使用中，「を超える」前必须加助词「を」，这是与其他三个表达的重要区别。", "mistakes": "❌ 100名超える参加者が来た → ✅ 100名を超える参加者が来た（超过100名的参加者来了）\n❌ 3時間以内で完成してください → ✅ 3時間以内に完成してください（请在3小时以内完成）", "similar": [{"form": "〜未満", "diff": "「未満」表示小于某数值且不包含该数值，与「以下」的区别在于不包含基准数"}, {"form": "〜から〜まで", "diff": "表示从某数量到某数量的完整范围，而「以上/以下」只表示单方向的数量限制"}], "quiz": [{"q": "この仕事は経験が3年____の人を募集しています。", "opts": ["A. 以上", "B. 以下", "C. 以内", "D. 超える"], "ans": "A", "exp": "招聘3年以上经验的人，包含3年，用「以上」"}, {"q": "荷物の重量は20キロ____でお願いします。", "opts": ["A. 以上", "B. を超える", "C. 以下", "D. 以内"], "ans": "C", "exp": "行李重量请控制在20公斤以下（包含20公斤），用「以下」"}, {"q": "売上が予想____100万円____伸びました。", "opts": ["A. を・以上", "B. が・以下", "C. を・超える", "D. を・以内"], "ans": "A", "exp": "销售额比预想多增长了100万日元以上，「予想を超える」表示超过预想"}]}, "125": {"analysis": "「〜と同時に」表示两个动作或状态在时间上同时发生，强调时间的一致性。与中文「与~同时」相对应，但日语更强调两个事件的瞬间性同步。常用于描述人生重要节点的转换，如毕业就职、结婚搬家等场景。", "mistakes": "易错点：时态搭配和动词形式。❌ 卒業したと同時に、就職する → ✅ 卒業と同時に、就職した（两个动作应保持时态一致）；❌ 雨が降っていると同時に → ✅ 雨が降ると同時に（应使用辞書形而非进行时）", "similar": [{"form": "〜と共に", "diff": "更强调伴随关系，可表示「随着~」的变化过程"}, {"form": "〜ながら", "diff": "表示同时进行的动作，但主语必须相同"}, {"form": "〜際に", "diff": "表示「在~的时候」，更强调时机而非同时性"}], "quiz": [{"q": "大学を卒業____、アメリカに留学することになった。", "opts": ["A. と同時に", "B. ながら", "C. と共に", "D. ついでに"], "ans": "A", "exp": "表示毕业和留学两个事件同时发生，用「と同時に」最恰当"}, {"q": "電気が____と同時に、エアコンも止まった。", "opts": ["A. 消えている", "B. 消える", "C. 消えた", "D. 消して"], "ans": "C", "exp": "「と同時に」前接过去时，表示两个过去的事件同时发生"}, {"q": "結婚____と同時に、新しいマンションに引っ越した。", "opts": ["A. して", "B. すること", "C. する", "D. した"], "ans": "C", "exp": "名词+する动词时，应使用辞書形「する」+と同時に"}]}, "126": {"analysis": "「〜によると」是表示信息来源的文法，相当于中文的「根据〜」「据〜说」。它强调所述内容的信息来源，常用于转述从媒体、他人等处获得的信息。与「〜によれば」意思完全相同，但「によると」更常用于口语，「によれば」更正式。", "mistakes": "❌ 友達によると言いました → ✅ 友達によると、雨が降るそうです（不能直接加「言いました」）\n❌ テレビによるに → ✅ テレビによると（助词使用错误）\n❌ 天気予報によると晴れました → ✅ 天気予報によると晴れるそうです（时态搭配错误）", "similar": [{"form": "〜によれば", "diff": "意思相同，但更正式，多用于书面语"}, {"form": "〜そうです", "diff": "表示传闻，但不明确指出信息来源"}, {"form": "〜とのことです", "diff": "更正式的转述表达，常用于敬语场合"}], "quiz": [{"q": "天気予報（　　）、今日は雪が降るらしい。", "opts": ["A. によると", "B. について", "C. に対して", "D. にとって"], "ans": "A", "exp": "表示信息来源「根据天气预报」，用「によると」"}, {"q": "新聞（　　）、来月から電車の料金が上がるそうだ。", "opts": ["A. にとって", "B. によると", "C. について", "D. に関して"], "ans": "B", "exp": "「根据报纸」表示信息来源，使用「によると」"}, {"q": "母（　　）、兄は来週結婚するそうです。", "opts": ["A. について", "B. に対して", "C. によると", "D. にとって"], "ans": "C", "exp": "「据母亲说」表示从母亲那里得到的信息，用「によると」"}]}, "127": {"analysis": "「〜のもとで」表示在某种权威、指导或条件的影响下进行某项活动。这个文法强调的是受到某种力量或环境的支配、指导或影响，常用于正式场合。与「〜の下で」相比，「のもとで」更加书面化，多用于描述在权威人物的指导下或在特定制度、条件的框架内进行的活动。", "mistakes": "容易与「〜の下で」混淆使用。❌ 机の下でペンを見つけた → ✅ 机の下でペンを見つけた（物理位置用「下で」）。❌ 厳しい条件の下で働く → ✅ 厳しい条件のもとで働く（抽象条件用「のもとで」）。注意「のもとで」和「のもとに」意思相同但「のもとに」更强调目标性。", "similar": [{"form": "〜の下で", "diff": "「の下で」多用于物理位置或一般条件，「のもとで」更正式，多用于权威指导或制度框架"}, {"form": "〜によって", "diff": "「によって」表示手段方法，「のもとで」表示在某种影响或条件的支配下"}], "quiz": [{"q": "彼は有名な画家____絵を学んでいる。", "opts": ["A. のもとで", "B. によって", "C. について", "D. に対して"], "ans": "A", "exp": "在有名画家的指导下学画，用「のもとで」表示在权威人物的指导影响下"}, {"q": "新しい法律____、会社の制度が変わった。", "opts": ["A. について", "B. のもとで", "C. に関して", "D. として"], "ans": "B", "exp": "在新法律的条件下制度发生变化，用「のもとで」表示在法律条件的影响下"}, {"q": "厳しい監督____、選手たちは練習している。", "opts": ["A. によって", "B. として", "C. のもとで", "D. に対して"], "ans": "C", "exp": "在严格的监督指导下进行练习，用「のもとで」表示在监督的指导影响下"}]}, "128": {"analysis": "「〜からこそ」是强调原因的表达方式，比「〜から」的语气更强烈，突出前项是后项成立的重要原因。常用于积极的、有价值的事情，表达说话者对原因的重视和肯定态度。", "mistakes": "❌ 忙しいからこそ、何もできない。→ ✅ 忙しいから、何もできない。（消极结果不用からこそ）❌ 雨が降ったからこそ、出かけなかった。→ ✅ 雨が降ったから、出かけなかった。（单纯因果关系不需强调）", "similar": [{"form": "〜から", "diff": "から表示普通因果关系，からこそ强调原因的重要性"}, {"form": "〜ばこそ", "diff": "ばこそ多用于假定强调，からこそ用于事实强调"}], "quiz": [{"q": "親友____、本音で話し合える。", "opts": ["A. だから", "B. からこそ", "C. なので", "D. ために"], "ans": "B", "exp": "强调正因为是亲友这个重要原因，才能真心交流"}, {"q": "経験が豊富____、この仕事を任せられた。", "opts": ["A. だからこそ", "B. だから", "C. ので", "D. によって"], "ans": "A", "exp": "强调正因为经验丰富这个重要条件，才被委以重任"}, {"q": "失敗した____、成功の喜びがわかる。", "opts": ["A. から", "B. ので", "C. からこそ", "D. ために"], "ans": "C", "exp": "强调正是因为失败这个宝贵经历，才能理解成功的可贵"}]}, "129": {"analysis": "「〜に加えて」表示在已有的基础上再追加其他要素，强调累积性添加。与中文「除了…还…」不同，日语更强调在原有基础上的叠加概念，常用于积极的、建设性的语境中。", "mistakes": "❌ 病気に加えて、お金もない。→ ✅ 病気のうえに、お金もない。（消极情况用「〜うえに」更自然）", "similar": [{"form": "〜うえに", "diff": "「うえに」可用于积极和消极场合，「に加えて」主要用于积极的追加"}, {"form": "〜ばかりか", "diff": "「ばかりか」强调出乎意料的程度，「に加えて」强调有意识的追加"}], "quiz": [{"q": "彼は頭がいい____、努力家でもある。", "opts": ["A.に加えて", "B.に加え", "C.のうえに", "D.AとB両方正しい"], "ans": "D", "exp": "「に加えて」「に加え」は同じ意味で、両方とも正しい表現"}, {"q": "雨____、風も強くなってきた。", "opts": ["A.に加えて", "B.のうえに", "C.ばかりか", "D.すべて正しい"], "ans": "B", "exp": "悪天候という消極的な状況では「のうえに」が最も自然"}, {"q": "日本語____、中国語も勉強している。", "opts": ["A.に加えて", "B.に加え", "C.のほかに", "D.すべて正しい"], "ans": "D", "exp": "語学学習という積極的な文脈では、どの表現も使用可能"}]}, "130": {"analysis": "「〜にしたがって」表示两个事物同步变化或发展，强调伴随性和连动性。与「〜につれて」意思相近，但「にしたがって」更强调跟随、遵循的含义，常用于描述自然规律或社会变化。", "mistakes": "❌ 年をとるにしたがって、体が弱くなった → ✅ 年をとるにしたがって、体が弱くなっている（应用进行时表示持续变化）；❌ 先生の指示にしたがって勉強した → ✅ 先生の指示にしたがって勉强する（此处应用「に従う」而非「にしたがって」）", "similar": [{"form": "〜につれて", "diff": "「にしたがって」更强调跟随、遵循；「につれて」更中性地表示同步变化"}, {"form": "〜とともに", "diff": "「とともに」表示同时进行；「にしたがって」强调前项引起后项变化"}, {"form": "〜に従う", "diff": "「に従う」是动词，表示服从；「にしたがって」是副词性表现，表示连动变化"}], "quiz": [{"q": "経済が発展する____、環境問題も深刻になっている。", "opts": ["A. にしたがって", "B. によって", "C. について", "D. に対して"], "ans": "A", "exp": "表示经济发展与环境问题恶化的同步变化，用「にしたがって」"}, {"q": "子どもの成長____、親の心配も変わっていく。", "opts": ["A. によると", "B. にしたがって", "C. に関して", "D. に比べて"], "ans": "B", "exp": "表示孩子成长与父母担心内容变化的连动关系"}, {"q": "気温が上がる____、桜の開花が早くなった。", "opts": ["A. ために", "B. ので", "C. にしたがって", "D. として"], "ans": "C", "exp": "表示气温上升与樱花提前开放的自然变化规律"}]}, "131": {"analysis": "「それほど〜ない」表示程度没有预期或想象中那么高，相当于中文的「没那么〜/不那么〜」。这个句型通常用来表达实际情况比预想的要轻微，带有一种缓解或安慰的语气。需要注意它与完全否定不同，而是程度的相对降低。", "mistakes": "❌ この映画はそれほどおもしろくないです → ✅ この映画はそれほどおもしろくない（不需要です，因为ない本身就是丁寧语的否定形式）。❌ それほど高い → ✅ それほど高くない（必须用否定形式）。", "similar": [{"form": "あまり〜ない", "diff": "あまり更强调完全不怎么样，それほど则是相对于预期而言"}, {"form": "そんなに〜ない", "diff": "そんなに多用于对话中回应对方，それほど更多是客观描述"}, {"form": "たいして〜ない", "diff": "たいして带有轻视语气，それほど相对中性"}], "quiz": [{"q": "今日の天気は____暑くない。", "opts": ["A.それほど", "B.とても", "C.かなり", "D.非常に"], "ans": "A", "exp": "それほど与ない搭配表示程度没那么高，其他选项都是肯定的程度副词"}, {"q": "この料理は____辛くないから、子供でも食べられる。", "opts": ["A.とても", "B.それほど", "C.すごく", "D.かなり"], "ans": "B", "exp": "それほど辛くない表示没那么辣，符合后面孩子也能吃的语境"}, {"q": "彼の話は____面白くなかった。", "opts": ["A.それほど", "B.とても", "C.すごく", "D.非常に"], "ans": "A", "exp": "それほど面白くない表示没那么有趣，是程度的相对否定"}]}, "132": {"analysis": "「というふうに」表示采用某种具体的方法或方式来进行某事，强调按照前述内容的样子或方式来执行。与「ように」相比，「というふうに」更强调具体明确的方法步骤，常用于说明操作程序或工作方式。", "mistakes": "❌ 明日会議をするというふうにしましょう → ✅ 明日会議をするというふうに決めましょう（「〜というふうに」后面需要接表示决定、安排等的动词）", "similar": [{"form": "〜ように", "diff": "「ように」表示目标或状态，「というふうに」表示具体方法方式"}, {"form": "〜という方法で", "diff": "意思相近，但「というふうに」更口语化，使用范围更广"}], "quiz": [{"q": "会議では（　　）話し合いを進めていきます。", "opts": ["A. 自由に発言するというふうに", "B. 自由に発言するように", "C. 自由に発言したというふうに", "D. 自由に発言していたように"], "ans": "A", "exp": "表示采用自由发言的方式进行会议，用「というふうに」表示具体方法"}, {"q": "この問題は（　　）解決しましょう。", "opts": ["A. みんなで相談したように", "B. みんなで相談するように", "C. みんなで相談するというふうに", "D. みんなで相談していたように"], "ans": "C", "exp": "表示采用大家一起商量的方式来解决问题，强调具体方法"}, {"q": "今度のプロジェクトは（　　）進めることになりました。", "opts": ["A. チームを作って協力したように", "B. チームを作って協力するように", "C. チームを作って協力するというふうに", "D. チームを作って協力していたように"], "ans": "C", "exp": "表示决定采用组建团队合作的方式推进项目，用「というふうに」表示具体安排"}]}, "133": {"analysis": "「〜なければよかった」表示对过去已发生的事情感到后悔，意思是「要是没有做某事就好了」。这是一种虚拟语气的表达，用来表达说话人对过去行为的悔恨之情。", "mistakes": "易混淆肯定和否定含义。❌ もっと勉強なければよかった → ✅ もっと勉強しなければよかった（要是没有学习就好了）/ もっと勉強すればよかった（要是学习了就好了）", "similar": [{"form": "〜ばよかった", "diff": "表示「要是做了就好了」，与「なければよかった」意思相反"}, {"form": "〜なくてよかった", "diff": "表示「没做真好」，是庆幸的心情，不含后悔"}], "quiz": [{"q": "あの時、彼に本当のことを（　　）。", "opts": ["A. 言わなければよかった", "B. 言えばよかった", "C. 言わなくてよかった", "D. 言うなければよかった"], "ans": "A", "exp": "后悔告诉了他真相，用「言わなければよかった」"}, {"q": "昨日、あんなに食べ（　　）。今日お腹が痛い。", "opts": ["A. ればよかった", "B. なくてよかった", "C. なければよかった", "D. てよかった"], "ans": "C", "exp": "后悔昨天吃太多，用「食べなければよかった」"}, {"q": "雨が降ってきた。傘を（　　）。", "opts": ["A. 持って来なければよかった", "B. 持って来ればよかった", "C. 持って来なくてよかった", "D. 持って来るなければよかった"], "ans": "B", "exp": "后悔没带伞，应该用「持って来ればよかった」表示「要是带了就好了」"}]}, "134": {"analysis": "「〜ばよかった」是表达对过去没有做某事的后悔之情的文法。这个句型强调的是「如果当时做了某事就好了」的遗憾心情，常用于反省自己过去的行为或选择。与单纯的假设不同，这里包含了说话人真实的后悔情感。", "mistakes": "❌ 昨日勉強したばよかった → ✅ 昨日勉強すればよかった（动词必须用ば形）\n❌ もっと頑張ればよかったです → ✅ もっと頑張ればよかった（后面不加です）\n❌ 行けばよかった思います → ✅ 行けばよかったと思います（需要格助词と）", "similar": [{"form": "〜べきだった", "diff": "べきだった表示应该做却没做的义务感，ばよかった更多表达个人的后悔情感"}, {"form": "〜ばよい", "diff": "ばよい是现在的建议「这样做就好」，ばよかった是对过去的后悔"}], "quiz": [{"q": "あの時、彼に本当のことを____。", "opts": ["A. 言えばよかった", "B. 言ったばよかった", "C. 言うばよかった", "D. 言えればよかった"], "ans": "A", "exp": "动词「言う」的ば形是「言えば」，表达对过去没有说实话的后悔"}, {"q": "もっと____、試験に合格できたのに。", "opts": ["A. 勉強したばよかった", "B. 勉強ばよかった", "C. 勉強すればよかった", "D. 勉強するばよかった"], "ans": "C", "exp": "「勉強する」的ば形是「勉強すれば」，表达对学习不够的后悔"}, {"q": "天気予報を____、傘を持ってきたのに。", "opts": ["A. 見るばよかった", "B. 見ればよかった", "C. 見たばよかった", "D. 見てばよかった"], "ans": "B", "exp": "「見る」的ば形是「見れば」，表达对没看天气预报的后悔"}]}, "135": {"analysis": "「〜よりも〜ほうが」是N3重要比较句型，用于强调两者比较中更倾向的一方。「よりも」比单纯的「より」语气更强，「ほうが」明确指出比较的结果，整个句型突出说话者的主观判断和偏好。", "mistakes": "❌ 映画よりもテレビを見るほうが好きです → ✅ テレビよりも映画を見るほうが好きです（比较对象要正确对应）；❌ 本よりも雑誌のほうがおもしろかったです → ✅ 本よりも雑誌のほうがおもしろいです（形容词时态要与句末呼应）", "similar": [{"form": "AよりBのほうが", "diff": "「よりも」比「より」语气更强，更加强调比较"}, {"form": "AのほうがBより", "diff": "语序不同，「〜よりも〜ほうが」更突出比较结果"}], "quiz": [{"q": "バスよりも電車____早いです。", "opts": ["A. を", "B. の", "C. のほうが", "D. によって"], "ans": "C", "exp": "「AよりもBのほうが」句型中，「のほうが」用来表示比较的结果"}, {"q": "夏____冬のほうが好きです。", "opts": ["A. よりも", "B. ので", "C. から", "D. として"], "ans": "A", "exp": "「よりも」用于表示比较的基准，比单纯的「より」语气更强"}, {"q": "コーヒーよりも紅茶のほうが____。", "opts": ["A. 飲みます", "B. 好きです", "C. 飲みました", "D. 好きでした"], "ans": "B", "exp": "表示现在的喜好用现在时，「好きです」最自然"}]}, "136": {"analysis": "「〜ごとに」表示每次或每隔一定间隔重复发生某事，强调规律性和周期性。与「毎〜」相比，「ごとに」更强调逐一性和连续性，常用于表示空间、时间、数量等的规律间隔。", "mistakes": "❌ 毎日ごとに散歩する → ✅ 毎日散歩する / 一日ごとに散歩する（「毎日」已含「每天」意思，不需加「ごとに」）", "similar": [{"form": "毎〜", "diff": "「毎日・毎年」等固定表达vs「ごとに」可接各种名词表示间隔"}, {"form": "〜おきに", "diff": "「おきに」表示跳过间隔（如二日おきに=隔一天），「ごとに」表示连续间隔"}], "quiz": [{"q": "彼は本を読む（____）新しい単語を覚える。", "opts": ["A.ごとに", "B.たびに", "C.につれて", "D.にしたがって"], "ans": "A", "exp": "「本を読むごとに」表示每次读书都会记住新单词，强调每次的规律性"}, {"q": "この時計は一時間（____）音が鳴る。", "opts": ["A.おきに", "B.ごとに", "C.によって", "D.について"], "ans": "B", "exp": "「一時間ごとに」表示每隔一小时响一次，表示定期间隔"}, {"q": "学生は一人（____）自己紹介をした。", "opts": ["A.によって", "B.について", "C.ごとに", "D.に対して"], "ans": "C", "exp": "「一人ごとに」表示学生逐一进行自我介绍，强调逐个进行"}]}, "137": {"analysis": "「〜ものの」表示与期待相反的逆接，强调前后两个事实形成对比，常含有遗憾或不满的语气。与单纯的「けれど」相比，「ものの」更突出结果与期待的落差，语气更正式。", "mistakes": "易错点：不要与「〜もので」混淆。❌雨が降っているもので、出かけられない → ✅雨が降っているものの、出かけなければならない（表示逆接而非原因）", "similar": [{"form": "〜けれど/けれども", "diff": "「ものの」语气更正式，更强调与期待的落差；「けれど」更口语化，用途更广泛"}, {"form": "〜ながら", "diff": "「ながら」多用于矛盾的状态并存；「ものの」重点在结果与期待不符"}], "quiz": [{"q": "彼は有名な大学を卒業した____、なかなか就職できない。", "opts": ["A. ものの", "B. もので", "C. ものを", "D. ものに"], "ans": "A", "exp": "表示虽然毕业于名校但与期待相反找不到工作，用「ものの」表示逆接"}, {"q": "薬を飲んだ____、熱が下がらない。", "opts": ["A. ながら", "B. ものの", "C. ので", "D. から"], "ans": "B", "exp": "吃了药但烧不退，结果与期待相反，用「ものの」"}, {"q": "この料理は見た目はきれい____、味はいまいちだ。", "opts": ["A. ものを", "B. もので", "C. ものの", "D. ものに"], "ans": "C", "exp": "外观漂亮但味道不佳，与期待形成对比，用「ものの」表示逆接"}]}, "15": {"analysis": "「〜たびに」表示「每次〜都会」的反复发生的情况，强调某个动作或状态每次出现时都伴随着相同的结果。与中文的「每次〜就〜」完全对应，常用于描述个人的习惯性反应或自然现象的规律性。", "mistakes": "易错点：不能用于一次性事件。❌ 明日会うたびに話します → ✅ 彼に会うたびに元気になる。时态混乱：❌ 雨が降ったたびに → ✅ 雨が降るたびに。", "similar": [{"form": "〜度に", "diff": "「〜度に」更正式，多用于书面语；「〜たびに」更口语化，使用范围更广"}, {"form": "〜と", "diff": "「〜と」表示条件关系的必然结果；「〜たびに」强调反复性和习惯性"}], "quiz": [{"q": "彼女に____、心が痛む。", "opts": ["A. 会うたびに", "B. 会ったたびに", "C. 会うと", "D. 会えばたびに"], "ans": "A", "exp": "动词辞书形+たびに，表示每次见到她都心痛"}, {"q": "____、新しい発見がある。", "opts": ["A. 旅行したたびに", "B. 旅行のたびに", "C. 旅行すればたびに", "D. 旅行してたびに"], "ans": "B", "exp": "名词+のたびに，表示每次旅行都有新发现"}, {"q": "この写真を見る____、笑顔になる。", "opts": ["A. と", "B. たら", "C. たびに", "D. ば"], "ans": "C", "exp": "表示每次看照片都会笑，强调反复性，用「たびに」最合适"}]}, "17": {"analysis": "「〜ほど〜ない」是N3重要的比较文法，表示B在某方面的程度不如A。这个句型的核心在于「ほど」作为比较基准，后接否定形来表达程度的差异。与中文的「没有A那么B」完全对应，是日语中最常用的比较表达之一。", "mistakes": "❌ 今日は昨日ほど寒いです → ✅ 今日は昨日ほど寒くありません（必须用否定形）\n❌ 彼は私ほどではない上手です → ✅ 彼は私ほど上手ではありません（否定形位置错误）\n❌ この本はあの本ほど面白くないです → ✅ この本はあの本ほど面白くありません（い形容词否定形）", "similar": [{"form": "〜より〜", "diff": "「より」强调一方超过另一方，「ほど」强调一方不及另一方的程度"}, {"form": "〜ほど〜はない", "diff": "「ほど〜はない」表示最高程度，「ほど〜ない」表示比较程度不足"}], "quiz": [{"q": "今年の夏は去年____暑くありません。", "opts": ["A. より", "B. ほど", "C. まで", "D. から"], "ans": "B", "exp": "表示今年夏天没有去年那么热，用「ほど」进行程度比较"}, {"q": "この映画はあの映画____面白くないです。", "opts": ["A. ほど", "B. より", "C. と同じ", "D. について"], "ans": "A", "exp": "「ほど〜ない」表示程度比较，这部电影没有那部电影那么有趣"}, {"q": "彼は私____日本語が上手ではありません。", "opts": ["A. より", "B. と", "C. ほど", "D. まで"], "ans": "C", "exp": "「AほどBではない」的固定搭配，表示他的日语没有我那么好"}]}, "21": {"analysis": "「〜ようと思う」表达说话人的意志或计划，相当于中文的「打算~」「想要~」。这个文法强调的是内心的决定或意图，比单纯的「〜たい」更正式，更有决心。常用于表达将来的行动计划。", "mistakes": "❌ 明日早く起きたいと思います → ✅ 明日早く起きようと思います（表达意志用意向形）\n❌ 日本語を勉強するようと思います → ✅ 日本語を勉強しようと思います（动词要用意向形）\n❌ もっと頑張ろうと思っています → ✅ もっと頑張ろうと思います（一般现在时即可）", "similar": [{"form": "〜たいと思う", "diff": "表达愿望，较随意；〜ようと思う表达意志决定，更正式"}, {"form": "〜つもりだ", "diff": "つもり更强调计划的确定性；ようと思う更强调内心的意志"}, {"form": "〜予定だ", "diff": "予定表达既定安排；ようと思う表达个人意志决定"}], "quiz": [{"q": "今度の休みに友達と映画を（____）と思います。", "opts": ["A. 見る", "B. 見よう", "C. 見たい", "D. 見ている"], "ans": "B", "exp": "表达意志计划时用动词意向形，「見よう」是「見る」的意向形"}, {"q": "体重を減らすために、毎日運動（____）と思っています。", "opts": ["A. する", "B. したい", "C. しよう", "D. している"], "ans": "C", "exp": "「〜ようと思う」表达意志，需要用意向形「しよう」"}, {"q": "彼は来年大学院に（____）と言っていました。", "opts": ["A. 入る", "B. 入ろう", "C. 入りたい", "D. 入った"], "ans": "B", "exp": "表达他人的意志时也用意向形，「入ろう」是「入る」的意向形"}]}, "24": {"analysis": "「〜なんて/なんか」表达说话人的主观情感，包含意外、轻视、感叹等语气。常用于口语中，「なんか」比「なんて」更随意。这个文法体现了日语中丰富的情感表达层次。", "mistakes": "❌ 彼なんて来ないと思った → ✅ 彼なんて来ないと思っていた（过去持续的想法用ていた）；❌ そんなことなんてできません → ✅ そんなことなんてできない（口语中多用普通形）", "similar": [{"form": "〜なんか", "diff": "与なんて基本相同，但なんか更口语化随意"}, {"form": "〜だなんて", "diff": "だなんて语气更强烈，多用于断定句后"}, {"form": "〜とは", "diff": "とは更正式，多用于书面语表示意外"}], "quiz": [{"q": "あの人が社長（____）信じられない。", "opts": ["A.なんて", "B.なので", "C.ながら", "D.について"], "ans": "A", "exp": "表示对「あの人が社長」这一事实感到意外，用なんて"}, {"q": "宿題（____）後でやればいいよ。", "opts": ["A.なら", "B.なんか", "C.など", "D.なのに"], "ans": "B", "exp": "なんか表示对宿题的轻视态度，认为不重要"}, {"q": "彼が一番（____）思わなかった。", "opts": ["A.なんてことを", "B.なんてことは", "C.なんてことが", "D.なんてことも"], "ans": "B", "exp": "「〜なんてことは思わなかった」是固定表达，表示完全没想到"}]}, "76": {"analysis": "「〜のように」是表示比喻和例示的重要句型，通过将某事物比作另一事物来描述其性质或状态。与中文'像~一样'对应，但日语更注重形式的完整性。此句型既可用于具体的比喻（如例句中的美丽如花），也可用于抽象概念的类比。", "mistakes": "易错点：❌彼女は花ように美しい → ✅彼女は花のように美しい（名词后必须加の）；❌鳥ようによく歌う → ✅鳥のようによく歌う（不能重复よう）；❌彼のような人になりたい → ✅彼のような人になりたい（这里用な不是に）", "similar": [{"form": "〜のような", "diff": "「のような」修饰名词，「のように」修饰动词・形容词"}, {"form": "〜みたい（に）", "diff": "「みたい」更口语化，「のように」更正式书面"}], "quiz": [{"q": "彼は子供____よく泣く。", "opts": ["A.のように", "B.のような", "C.ように", "D.みたいな"], "ans": "A", "exp": "修饰动词「泣く」要用「のように」"}, {"q": "雪____白いドレスを着ている。", "opts": ["A.のように", "B.のような", "C.ように", "D.らしい"], "ans": "A", "exp": "修饰形容词「白い」用「のように」"}, {"q": "先生____優しい人になりたい。", "opts": ["A.のように", "B.のような", "C.ように", "D.みたいに"], "ans": "B", "exp": "修饰名词「人」要用「のような」"}]}, "78": {"analysis": "「〜に決まっている」表示说话者基于常识、经验或逻辑推理得出的强烈确信，语气比「〜はずだ」更加断定。这个文法常用于表达不容置疑的判断，带有「当然是这样」的语感。", "mistakes": "❌ 明日雨が降るに決まっている → ✅ 明日雨が降るはずだ（天气预测用「はずだ」更合适）\n❌ 彼は学生に決まっています → ✅ 彼は学生に決まっている（此文法不用敬语形式）", "similar": [{"form": "〜はずだ", "diff": "「はずだ」表示基于根据的推测，「に決まっている」表示绝对确信的断定，语气更强"}, {"form": "〜に違いない", "diff": "「に違いない」表示强烈推测但仍有推测色彩，「に決まっている」是绝对断定"}], "quiz": [{"q": "あの人は嘘をついている____。", "opts": ["A. に決まっている", "B. はずがない", "C. わけがない", "D. ことがない"], "ans": "A", "exp": "根据语境判断对方在撒谎，用「に決まっている」表示强烈断定最合适"}, {"q": "そんな高い車、学生が買える____。", "opts": ["A. に決まっている", "B. はずだ", "C. わけがない", "D. べきだ"], "ans": "C", "exp": "否定语境下表示「不可能」，应该用「わけがない」，而不是肯定断定的「に決まっている」"}, {"q": "彼は東京大学出身だから、頭が____。", "opts": ["A. いいに決まっている", "B. よくなるはずだ", "C. いいべきだ", "D. よかったに違いない"], "ans": "A", "exp": "基于「东京大学出身」这个事实进行强烈断定，用「いいに決まっている」最恰当"}]}};
</script>

.cnt-badge{background:var(--ml);color:var(--mint);font-size:12px;font-weight:700;padding:4px 12px;border-radius:20px;border:1.5px solid var(--mm)}

.vbtn{border:none;background:transparent;border-radius:7px;padding:5px 12px;font-size:12px;font-weight:700;color:var(--gr);cursor:pointer;font-family:inherit;transition:all .15s}
.vbtn.on{background:#fff;color:var(--navy);box-shadow:0 1px 4px rgba(0,0,0,.1)}
.cfg-btn{background:none;border:1.5px solid #ddd;border-radius:8px;padding:4px 10px;font-size:12px;cursor:pointer;color:var(--gr);font-family:inherit}
.cfg-btn:hover{border-color:var(--mint);color:var(--mint)}

/* filter bar */
.fbar{padding:10px 18px;display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;flex-wrap:wrap}
.fbar::-webkit-scrollbar{display:none}
.fbtn{background:rgba(255,255,255,.25);border:1.5px solid rgba(255,255,255,.5);color:#fff;font-family:inherit;font-size:11px;font-weight:700;padding:5px 12px;border-radius:20px;cursor:pointer;white-space:nowrap;transition:all .15s}
.fbtn:hover,.fbtn.on{background:#fff;border-color:#fff}

/* progress */
.prog-wrap{padding:6px 18px 4px;background:rgba(255,255,255,.1)}
.prog-info{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.prog-lbl{font-size:11px;font-weight:700;color:rgba(255,255,255,.85)}
.prog-stats{display:flex;gap:12px;font-size:11px;font-weight:700;color:rgba(255,255,255,.85)}
.prog-track{height:3px;background:rgba(255,255,255,.25);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:rgba(255,255,255,.8);border-radius:2px;transition:width .35s}

/* stats bar (grid) */
.sbar{display:flex;gap:14px;padding:8px 18px 2px;font-size:12px;color:rgba(255,255,255,.8);font-weight:600}

/* ═══ CARD STAGE ═══ */
.cstage{display:none;flex:1;align-items:flex-start;justify-content:center;padding:14px 18px 84px;overflow:visible}
.cstage.on{display:flex}
.fcard{width:100%;max-width:700px;background:#fff;border-radius:22px;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,.13);animation:cIn .22s ease}
@keyframes cIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.aL{animation:sL .18s ease forwards}
.aR{animation:sR .18s ease forwards}
@keyframes sL{to{opacity:0;transform:translateX(-50px)}}
@keyframes sR{to{opacity:0;transform:translateX(50px)}}

/* card head */
.chead{background:var(--ybg);padding:20px 24px 16px;border-bottom:2px dashed var(--mm);display:flex;align-items:flex-start;gap:14px;position:relative}
.cnum{color:#fff;font-size:11px;font-weight:900;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
.chead-info{flex:1}
.chead-row{display:flex;align-items:center;gap:8px;flex:1;flex-wrap:nowrap}

.c-gram{font-size:26px;font-weight:900;color:var(--navy);line-height:1.18}
.c-gram .hl{color:var(--red)}
.ctags{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;align-items:center}
.ctag{font-size:10px;font-weight:700;padding:2px 8px;border-radius:5px}
.cdiff{font-size:14px;letter-spacing:2px;color:#f5b942}
.cbtns{display:flex;gap:8px;align-items:flex-start;flex-shrink:0}
.cact{width:40px;height:40px;border-radius:12px;border:1.5px solid #e0e0e0;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:20px;transition:all .15s}
.cact:hover{border-color:var(--mint);transform:scale(1.06)}
.cact.fav{background:#fff9e6;border-color:#f5c518}
.cact.mst{background:var(--ml);border-color:var(--mint)}
.mst-rib{display:none;position:absolute;top:16px;right:110px;background:var(--ml);color:var(--mint);border:1.5px solid var(--mint);border-radius:20px;padding:3px 12px;font-size:11px;font-weight:900}
.mst-rib.on{display:block}

/* card body */
.cbody{padding:20px 24px 22px;display:flex;flex-direction:column;gap:12px}
.slbl{font-size:10px;font-weight:900;color:var(--mint);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:5px}
.c-meaning{font-size:15px;font-weight:700;color:var(--tx);line-height:1.65}
.c-mzh{font-size:13px;color:var(--gr);margin-top:4px}
.c-pat{background:var(--ml);border:1.5px solid var(--mm);border-radius:12px;padding:11px 15px;font-size:14px;font-weight:700;color:var(--navy);line-height:1.6}
.c-pat .gram{color:var(--red);font-weight:900}

/* ─── FURIGANA SYSTEM ─── */
.furi-wrap{display:flex;flex-wrap:wrap;align-items:flex-end;gap:0;line-height:2.8;font-size:15px}
.fw{display:inline-flex;flex-direction:column;align-items:center;margin:0 1px;border-radius:5px;padding:1px 3px 2px;cursor:default;position:relative}
.fw:hover{opacity:.72}
.fr{font-size:9.5px;line-height:1;color:#999;min-height:12px;text-align:center;white-space:nowrap;font-weight:400}
.ft{font-size:14px;font-weight:700;line-height:1.18;white-space:nowrap;border-radius:4px;padding:1px 3px}
.fpunc{display:inline-flex;flex-direction:column;align-items:center;margin-left:-2px}.fpunc .fr{min-height:12px;font-size:9.5px;line-height:1;display:block}.fpunc .ft{font-size:16px;font-weight:700;color:var(--tx);line-height:1.2;padding:1px 0}
/* grammar highlight */
.fw.isG .ft{color:var(--red)!important;background:rgba(232,70,74,.1)!important;font-weight:900}
.fw.isG .fr{color:var(--red)}
/* POS colors */
.pN .ft{color:var(--pnt);background:var(--pn)}
.pV .ft{color:var(--pvt);background:var(--pv)}
.pA .ft{color:var(--pat);background:var(--pa)}
.pD .ft{color:var(--padt);background:var(--pad)}
.pP .ft{color:var(--ppt);background:var(--pp)}
.pC .ft{color:var(--pct);background:var(--pc)}
.pX .ft{color:var(--pxt);background:var(--px)}
/* plain (not yet analyzed) */
.plain-ex{font-size:14px;font-weight:700;color:var(--tx);line-height:1.58}
.plain-ex .hl{color:var(--red);font-weight:900}

/* POS legend */
.pos-legend{display:none;gap:6px;flex-wrap:wrap;padding:8px 12px;background:#f8f8f8;border-radius:8px}
.pleg{display:flex;align-items:center;gap:3px;font-size:10.5px;font-weight:700}
.pleg-dot{width:9px;height:9px;border-radius:2px}

/* analyze btn */
.ana-btn{background:linear-gradient(135deg,#6dc9a8,#10ac84);color:#fff;border:none;border-radius:10px;padding:8px 16px;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;display:none;align-items:center;gap:6px;transition:opacity .15s}
.ana-btn:hover{opacity:.88}
.ana-btn:disabled{opacity:.45;cursor:wait}
.spin{display:inline-block;width:12px;height:12px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}

/* example blocks */
.exb{border-radius:12px;padding:12px 14px 8px;border:1.5px solid #eee;margin-bottom:8px;cursor:pointer;transition:border-color .16s ease,background-color .16s ease,box-shadow .16s ease}
.exb.main{background:#fafafa;border-color:#eee}
.exb.sub{background:#fafafa}
.ex-zh{font-size:11px;color:var(--gr);margin-top:4px;line-height:1.45;opacity:.76}
.exb.playing{border-color:var(--mint);background:var(--ml);box-shadow:0 0 0 2px rgba(109,201,168,.14)}

/* AI gen */
.ai-btn{border:none;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;font-family:inherit;font-size:12px;font-weight:700;padding:8px 16px;border-radius:10px;cursor:pointer;display:none;align-items:center;gap:6px;transition:opacity .15s}
.ai-btn:hover{opacity:.88}
.ai-btn:disabled{opacity:.45;cursor:wait}
.ai-res{background:var(--ml);border-radius:10px;padding:12px 14px;font-size:13px;line-height:1.8;color:#345;display:none;border:1.5px solid var(--mm)}
.ai-res.on{display:block}

/* bottom nav */
.bnav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #eee;padding:10px 20px;display:flex;align-items:center;justify-content:center;gap:10px;z-index:60;box-shadow:0 -4px 20px rgba(0,0,0,.07)}
.nbtn{width:50px;height:50px;border-radius:14px;border:1.5px solid #e0e0e0;background:#f7f7f7;color:var(--navy);font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s;user-select:none;font-weight:900}
.nbtn:hover{background:var(--ml);border-color:var(--mint);color:var(--mint)}
.nbtn:active{transform:scale(.9)}
.nbtn:disabled{opacity:.3;cursor:default;pointer-events:none}
.nctr{background:#f5f5f5;border:1px solid #eee;border-radius:10px;padding:8px 20px;font-size:15px;font-weight:900;color:var(--navy);min-width:100px;text-align:center;flex-shrink:0}
.nctr sub{font-size:11px;font-weight:400;color:var(--gr)}
.nextra{display:flex;gap:6px}
.nxbtn{border:1px solid #e0e0e0;background:#f7f7f7;color:var(--gr);font-family:inherit;font-size:11px;font-weight:700;padding:5px 12px;border-radius:20px;cursor:pointer;transition:all .12s}
.nxbtn:hover{border-color:var(--mint);color:var(--mint)}

/* ═══ GRID STAGE ═══ */
.gstage{display:none}
.gstage.on{display:block}
.srch-wrap{padding:12px 18px 0}
.srch{width:100%;max-width:560px;padding:9px 18px;border-radius:30px;border:none;background:rgba(255,255,255,.92);font-family:inherit;font-size:14px;color:var(--navy);box-shadow:0 2px 10px rgba(0,0,0,.08);outline:none}
.srch:focus{background:#fff}
.srch::placeholder{color:#aaa}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:18px;padding:16px 18px 80px;max-width:1400px;margin:0 auto}
.gc{background:#fff;border-radius:16px;overflow:hidden;box-shadow:var(--sh);transition:transform .2s,box-shadow .2s;display:flex;flex-direction:column}
.gc:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(0,0,0,.13)}
.gch{background:var(--ybg);border-bottom:2px dashed var(--mm);padding:10px 16px 9px;display:flex;align-items:center;gap:8px;cursor:pointer}
.gnum{color:#fff;font-size:10px;font-weight:900;min-width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.gt{font-size:17px;font-weight:900;color:var(--navy);flex:1;line-height:1.3}
.gt .hl{color:var(--red)}
.gd{font-size:12px;color:#f5b942;letter-spacing:1px;flex-shrink:0}
.gtag{font-size:9px;padding:2px 6px;border-radius:4px;font-weight:700;white-space:nowrap}
.gea{padding:13px 16px 10px;background:var(--cream)}
.gejp{font-size:15px;font-weight:700;color:var(--tx);line-height:1.7}
.gejp .hl{color:var(--red);font-weight:900}
.gezh{font-size:11.5px;color:var(--gr);margin-top:3px;line-height:1.5}
.gi{padding:7px 16px;display:flex;flex-direction:column;gap:5px}
.gmb{background:var(--ml);border-left:3px solid var(--mint);border-radius:0 7px 7px 0;padding:6px 11px;font-size:12px;color:#456}
.gmb .lb{font-size:9px;font-weight:900;color:var(--mint);letter-spacing:1px;text-transform:uppercase;display:block;margin-bottom:2px}
.gpb{background:#fff;border:1.5px solid var(--mm);border-radius:7px;padding:6px 11px;font-size:12px;color:var(--navy)}
.gpb .lb{font-size:9px;font-weight:900;color:var(--gr);letter-spacing:1px;text-transform:uppercase;display:block;margin-bottom:2px}
.gpb code{font-family:inherit;font-weight:700}
.gpb code .gram{color:var(--red);font-weight:900}
.gmt{padding:5px 16px;background:none;border:none;font-family:inherit;font-size:11px;color:var(--mint);font-weight:700;cursor:pointer;display:flex;align-items:center;gap:3px;width:100%;text-align:left}
.gme{display:none;padding:3px 16px 13px;flex-direction:column;gap:5px}
.gme.on{display:flex}
.gei{font-size:11.5px;color:#555;line-height:1.6;padding:5px 11px;background:#f5f5f5;border-radius:7px}
.gei .gm{color:var(--red);font-weight:900}
.gei .tr{font-size:10.5px;color:var(--gr);display:block;margin-top:1px}
.empty{grid-column:1/-1;text-align:center;padding:60px 20px;color:rgba(255,255,255,.7);font-size:16px}

/* modal */
.mov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center;padding:20px}
.mov.on{display:flex}
.mo{background:#fff;border-radius:18px;max-width:500px;width:100%;max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.25)}
.moh{background:var(--ybg);border-bottom:2px dashed var(--mm);padding:14px 18px;display:flex;align-items:center;gap:10px}
.moc{margin-left:auto;background:none;border:none;font-size:22px;cursor:pointer;color:var(--gr);line-height:1;padding:0 4px}
.mob{padding:14px 18px 22px;display:flex;flex-direction:column;gap:10px}
.mex{font-size:17px;font-weight:700;line-height:1.8;color:var(--tx)}
.mex .hl{color:var(--red);font-weight:900}
.mo::-webkit-scrollbar{width:4px}
.mo::-webkit-scrollbar-thumb{background:var(--mm);border-radius:4px}

/* ─── POS TOOLTIP ─── */
.pos-tip{position:fixed;z-index:99999;background:#2a3f6e;color:#fff;border-radius:8px;padding:4px 10px;font-size:11px;font-weight:700;pointer-events:none;display:none;white-space:nowrap}

@media(max-width:600px){
  .grid{grid-template-columns:1fr;padding:10px 12px 82px}
  .c-gram{font-size:20px}
  .cbody{padding:14px 16px 18px;gap:10px}
  .bnav{padding:6px 10px}
  .nbtn{width:40px;height:40px;font-size:18px}
  .nextra{display:flex}
  .topbar{padding:7px 10px;gap:7px}
  .tb-title{font-size:12px}
  .cnt-badge{display:none}
  .lvl-badge{font-size:9px;padding:3px 6px}
  .lvl-badge span{font-size:13px}
  .cfg-btn{padding:4px 7px;font-size:10px}
  .ft{font-size:13px}
  .plain-ex{font-size:14px;line-height:1.5}
  .exb{padding:10px 12px 8px}
  .ex-zh{font-size:10px}
}
/* ─── FLIP BUTTON & BACK PANEL ─── */
.flip-btn{width:100%;margin-top:14px;padding:11px;border-radius:12px;border:1.5px dashed var(--mm);background:var(--ml);color:var(--mint);font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s}
.flip-btn:hover:not(:disabled){background:var(--mint);color:#fff;border-style:solid}
.flip-btn:disabled{opacity:.4;cursor:default}
.fcard-back-panel{background:#fff;border-radius:22px;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,.13);width:100%;max-width:700px}
.back-header{background:var(--ybg);border-bottom:2px dashed var(--mm);padding:14px 20px;display:flex;align-items:center;gap:12px}
.flip-back-btn{border:none;background:rgba(0,0,0,.07);border-radius:8px;padding:5px 12px;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;color:var(--navy)}
.flip-back-btn:hover{background:rgba(0,0,0,.12)}
.back-title{font-size:14px;font-weight:900;color:var(--navy)}
.back-body{padding:18px 20px 24px;display:flex;flex-direction:column;gap:14px;max-height:70vh;overflow-y:auto}
.back-section{display:flex;flex-direction:column;gap:7px}
.back-label{font-size:10px;font-weight:900;letter-spacing:2px;color:var(--mint);text-transform:uppercase}
.back-analysis{font-size:13px;line-height:1.85;color:#345;background:var(--ml);border-left:3px solid var(--mint);border-radius:0 8px 8px 0;padding:10px 14px}
.back-mistakes{font-size:12.5px;line-height:1.9;color:#456;background:#fff9f0;border-left:3px solid #f5a030;border-radius:0 8px 8px 0;padding:10px 14px}
.back-similar{display:flex;flex-direction:column;gap:6px}
.similar-item{display:flex;gap:8px;font-size:12.5px;line-height:1.6;padding:5px 0;border-bottom:1px solid #f0f0f0}
.similar-item:last-child{border-bottom:none}
.similar-form{font-weight:900;color:var(--navy);white-space:nowrap;min-width:fit-content}
.similar-diff{color:var(--gr)}
.quiz-item{background:#f8f8f8;border-radius:12px;padding:13px 15px;border:1.5px solid #eee}
.quiz-q{font-size:13px;font-weight:700;color:var(--navy);margin-bottom:10px;line-height:1.6}
.quiz-opts{display:flex;flex-direction:column;gap:5px}
.quiz-opt{font-size:12.5px;padding:7px 11px;border-radius:8px;cursor:pointer;border:1.5px solid #e0e0e0;background:#fff;color:#456;transition:all .15s;text-align:left;font-family:inherit;width:100%}
.quiz-opt:hover:not(.correct):not(.wrong){border-color:var(--mint);background:var(--ml)}
.quiz-opt.correct{background:#e8f8f3;border-color:var(--mint);color:var(--mint);font-weight:900}
.quiz-opt.wrong{background:#fef0f0;border-color:#e84a4a;color:#c0392b}
.quiz-exp{font-size:11.5px;color:#666;margin-top:7px;padding:7px 10px;background:#efefef;border-radius:7px;display:none;line-height:1.6}
.quiz-exp.show{display:block}
.no-back{text-align:center;padding:40px 20px;color:var(--gr);font-size:13px}

`;

class GrammarApp {
  constructor(cfg) {
    this.level    = cfg.level;
    this.color    = cfg.color;
    this.bg       = cfg.bgGradient;
    this.G        = cfg.grammar;
    this.fgs      = cfg.filterGroups || [];
    this.label    = cfg.levelLabel || cfg.level;

    this.view     = 'card';
    this.filter   = 'all';
    this.search   = '';
    this.curMod   = null;
    this.deck     = [...this.G];
    this.cur      = 0;
    this.kCache   = {};
    this.kCur     = null;
    // per-card furigana cache  { cardId: [{text,reading,pos,isGram},...] }
    // 从 localStorage 加载已分析的注音缓存
    this._furiKey = 'jlpt_furi_' + (cfg.level || 'XX');
    try { this.furiCache = JSON.parse(localStorage.getItem(this._furiKey) || '{}'); }
    catch { this.furiCache = {}; }

    try { this.cs = JSON.parse(localStorage.getItem(CARD_ST_KEY) || '{}'); }
    catch { this.cs = {}; }
    if (!this.cs.favs)     this.cs.favs = {};
    if (!this.cs.mastered) this.cs.mastered = {};

    const s = document.createElement('style');
    s.textContent = SHARED_CSS;
    document.head.insertBefore(s, document.head.firstChild);
    document.body.style.background = this.bg;

    this._buildHTML();
    this._bind();
    this._setView('card');
    this._initSwipe();
    if (window.speechSynthesis)
      window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
  }

    const fg = this.fgs;
    document.body.innerHTML = `

<!-- GRID STAGE -->

  <div class="srch-wrap"><input class="srch" type="search" placeholder="🔍 搜索语法..." id="srch"></div>

</div>
<div class="mov" id="mov">
  <div class="mo">
    <div class="moh">
      <div class="gnum" id="mNum" style="background:${this.color}"></div>
      <div class="gt" id="mTit"></div>
      <button class="moc" id="mClose">✕</button>
    </div>
    <div class="mob">
      <div class="mex" id="mEx"></div>
      <div style="font-size:12px;color:#aaa" id="mZh"></div>
      <div class="tts-row">
        <button class="tts-b" id="mSpk1">🔊 正常</button>
        <button class="tts-b" id="mSpk2">🐢 慢速</button>
      </div>
      <div class="gmb"><span class="lb">意思</span><span id="mMean"></span></div>
      <div class="gpb"><span class="lb">接续</span><code id="mPat"></code></div>
      <div id="mMore" style="display:flex;flex-direction:column;gap:5px"></div>
    </div>
  </div>
</div>`;
  }

  /* ─────────── BIND ─────────── */
  _bind() {
    // view
    document.getElementById('vCard').addEventListener('click', () => this._setView('card'));
    document.getElementById('vGrid').addEventListener('click', () => this._setView('grid'));
    // filter
    document.getElementById('fbar').addEventListener('click', e => {
      const b = e.target.closest('.fbtn'); if (!b) return;
      document.querySelectorAll('.fbtn').forEach(x=>x.classList.remove('on'));
      b.classList.add('on');
      this.filter = b.dataset.f;
      this.deck = this._fDeck();
      this.cur = 0;
      if (this.view === 'card') this._renderCard();
      else this._renderGrid();
    });
    // card nav
    document.getElementById('prevBtn').addEventListener('click', () => this._go(-1));
    document.getElementById('nextBtn').addEventListener('click', () => this._go(1));
    document.getElementById('shuffleBtn').addEventListener('click', () => {
      this._hideBack();
      this._shuffle();
    });
    document.getElementById('rndBtn').addEventListener('click', () => {
      this._hideBack();
      this.cur=Math.floor(Math.random()*this.deck.length);
      this._renderCard();
    });
    document.addEventListener('keydown', e => {
      if (['INPUT','TEXTAREA'].includes(document.activeElement.tagName)) return;
      if (e.key==='ArrowLeft'||e.key==='a') this._go(-1);
      if (e.key==='ArrowRight'||e.key==='d') this._go(1);
      if (e.key==='f'||e.key==='F') this._toggleFav();
      if (e.key==='m'||e.key==='M') this._toggleMst();
    });
    document.getElementById('cStar').addEventListener('click', () => this._toggleFav());
    document.getElementById('cCheck').addEventListener('click', () => this._toggleMst());
    document.addEventListener('click', e => {
      const ex = e.target.closest('.exb[data-speak]');
      if (!ex) return;
      if (e.target.closest('.fw,.kword,button,input')) return;
      this._playExample(ex, ex.dataset.speak || '');
    });
    // modal
    document.getElementById('mClose').addEventListener('click', () => this._closeMod());
    document.getElementById('mov').addEventListener('click', e => { if(e.target===document.getElementById('mov'))this._closeMod(); });
    // 整句点击播放
    document.addEventListener('click', e => {
      const ex = e.target.closest('.exb[data-speak]');
      if (!ex) return;
      if (e.target.closest('.fw,.kword,button,input')) return;
      this._playExample(ex, ex.dataset.speak || '');
    });
    document.getElementById('mSpk1').addEventListener('click', () => this._spkMod(1.0));
    document.getElementById('mSpk2').addEventListener('click', () => this._spkMod(0.65));
  }

  /* ─────────── VIEW ─────────── */
  _setView(v) {
    this.view = v;
    document.getElementById('vCard').classList.toggle('on', v==='card');
    document.getElementById('vGrid').classList.toggle('on', v==='grid');
    document.getElementById('cstage').classList.toggle('on', v==='card');
    document.getElementById('gstage').classList.toggle('on', v==='grid');
    document.getElementById('progWrap').style.display = 'none';
    document.getElementById('fbar').style.display = v==='card'?'none':'flex';
    document.getElementById('bnav').style.display = v==='card'?'flex':'none';
    (document.getElementById('tbSub')||{textContent:''}).textContent = v==='card'
      ? '← → 键切换 ｜ F:收藏 M:已掌握'
      : '点击查看详情 ｜ 点击汉字查词';
    this.deck = this._fDeck();
    this.cur = 0;
    if (v==='card') this._renderCard();
    else this._renderGrid();
  }

  /* ─────────── FILTER ─────────── */
  _fDeck() {
    let arr = this.G;
    if (this.filter==='fav') arr=arr.filter(g=>this.cs.favs[g.id]);
    else if (this.filter==='unmastered') arr=arr.filter(g=>!this.cs.mastered[g.id]);
    else if (this.filter.startsWith('★')) arr=arr.filter(g=>g.d===this.filter);
    else if (this.filter!=='all') arr=arr.filter(g=>g.cat===this.filter);
    return arr;
  }
  _matchS(g) {
    if(!this.search)return true;
    const q=this.search.toLowerCase();
    return g.t.includes(q)||g.m.includes(q)||g.mz.includes(q)||g.e.includes(q)||g.ez.includes(q);
  }

  /* ─────────── CARD RENDER ─────────── */
  _renderCard(dir) {
    const g = this.deck[this.cur];
    if (!g) {
      document.getElementById('fcard').innerHTML='<div style="padding:60px;text-align:center;color:#aaa;font-size:16px">没有相关语法</div>';
      return;
    }
    const card = document.getElementById('fcard');
    const render = () => {
      if (!(document.getElementById('cNum'))) return;
      (document.getElementById('cNum')||{textContent:''}).textContent = g.id;
      document.getElementById('cGram').innerHTML = `～<span class="hl">${g.hl}</span>`;
      (document.getElementById('cMean')||{textContent:''}).textContent = g.m;
      (document.getElementById('cMzh')||{textContent:''}).textContent = g.mz;
      document.getElementById('cPat').innerHTML = g.p;

      const grp = this.fgs.find(x=>x.key===g.cat);
      document.getElementById('cTags').innerHTML =
        (grp?`<span class="ctag" style="background:${grp.color||'#e8f0ff'};color:${grp.fg||'#3a5bc7'}">${grp.label}</span>`:'') +
        `<span class="cdiff">${g.d}</span>`;

      const fav=!!this.cs.favs[g.id], mst=!!this.cs.mastered[g.id];
      (document.getElementById('cStar')||{textContent:''}).textContent=fav?'⭐':'☆';
      document.getElementById('cStar').className='cact'+(fav?' fav':'');
      (document.getElementById('cCheck')||{textContent:''}).textContent=mst?'✅':'◯';
      document.getElementById('cCheck').className='cact'+(mst?' mst':'');
      document.getElementById('mstRib').className='mst-rib'+(mst?' on':'');

      // Render examples
      // 优先用内置注音（已批量生成写入HTML的）
      const builtin = g.furi || null;
      const cached  = this.furiCache[g.id] || builtin;
      if (cached) {
        // 同步到内存cache（方便后续切换卡片不重读）
        if (!this.furiCache[g.id] && builtin) this.furiCache[g.id] = builtin;
        this._renderFuri(g, cached);
      } else {
        this._renderPlain(g);
      }

      // AI reset

      // Progress
      const pct=((this.cur+1)/this.deck.length*100).toFixed(1);
      (document.getElementById('navIdx')||{textContent:''}).textContent=this.cur+1;
      (document.getElementById('navTot')||{textContent:''}).textContent=this.deck.length;
      document.getElementById('prevBtn').disabled=this.cur===0;
      (document.getElementById('nextBtn')||{disabled:false}).disabled=this.cur===this.deck.length-1;
      this._renderBack(g);
    };

    if (dir) {
      card.classList.add(dir==='L'?'aL':'aR');
      setTimeout(()=>{ card.classList.remove('aL','aR'); render(); }, 160);
    } else { render(); }
  }

  /* render plain (no furigana yet) */
  _renderPlain(g) {
    (document.getElementById('posLegend')||{style:{}}).style.display='none';
    (document.getElementById('anaBtn')||{style:{}}).style.display='none';
    const allEx = [{j:g.eh,z:g.ez,main:true},...g.ex.map(e=>({j:e.j,z:e.z}))];
    document.getElementById('cExList').innerHTML = allEx.map(ex => {
      const plain = ex.j.replace(/<[^>]*>/g,'');
      const safe = plain.replace(/"/g,'&quot;');
      return `<div class="exb ${ex.main?'main':'sub'}" data-speak="${safe}">
        <div class="plain-ex">${ex.j}</div>
        <div class="ex-zh">${ex.z}</div>
      </div>`;
    }).join('');
  }

  /* render with furigana tokens */
  _renderFuri(g, tokenSets) {
    (document.getElementById('posLegend')||{style:{}}).style.display='flex';
    const allEx = [{j:g.eh,z:g.ez,main:true},...g.ex.map(e=>({j:e.j,z:e.z}))];
    const listEl = document.getElementById('cExList');
    listEl.innerHTML='';

    allEx.forEach((ex,i) => {
      const toks = tokenSets[i];
      const plain = ex.j.replace(/<[^>]*>/g,'').replace(/'/g,"\\'");
      const div = document.createElement('div');
      div.className = 'exb '+(ex.main?'main':'sub');

      const furiDiv = document.createElement('div');
      furiDiv.className='furi-wrap';

      if (toks && toks.length) {
        toks.forEach(t => {
          if (t.pos==='punc') {
            const sp=document.createElement('span');
            sp.className='fpunc';
            const ru=document.createElement('span'); ru.className='fr'; ru.textContent='';
            const ft=document.createElement('span'); ft.className='ft'; ft.textContent=t.text;
            sp.appendChild(ru); sp.appendChild(ft);
            furiDiv.appendChild(sp);
          } else {
            const POS_CLASS={noun:'pN',verb:'pV',adj:'pA',adv:'pD',part:'pP',conj:'pC',aux:'pX'};
            const w=document.createElement('span');
            w.className='fw '+(POS_CLASS[t.pos]||'')+(t.isGram?' isG':'');
            const ru=document.createElement('span'); ru.className='fr'; ru.textContent=t.reading||'';
            const ft=document.createElement('span'); ft.className='ft'; ft.textContent=t.text;
            w.appendChild(ru); w.appendChild(ft);
            furiDiv.appendChild(w);
            // tooltip
            const POS_LBL={noun:'名詞',verb:'動詞',adj:'形容詞',adv:'副詞',part:'助詞',conj:'接续詞',aux:'助動詞'};
            const lbl = t.isGram ? '🔴 文法ポイント' : (POS_LBL[t.pos]||t.pos);
            w.addEventListener('mouseenter', ev => {
              const tip=document.getElementById('posTip');
              tip.textContent=lbl+(t.reading?' · '+t.reading:'');
              tip.style.display='block';
              tip.style.left=(ev.clientX+10)+'px';
              tip.style.top=(ev.clientY-28)+'px';
            });
            w.addEventListener('mouseleave',()=>{ const _pt=document.getElementById('posTip'); if(_pt)_pt.style.display='none'; });
            w.addEventListener('mousemove',ev=>{ const t2=document.getElementById('posTip'); if(!t2)return; t2.style.left=(ev.clientX+10)+'px'; t2.style.top=(ev.clientY-28)+'px'; });
          }
        });
      } else {
        furiDiv.innerHTML=`<span class="plain-ex">${ex.j}</span>`;
      }

      const zh=document.createElement('div'); zh.className='ex-zh'; zh.textContent=ex.z;
      div.dataset.speak = ex.j.replace(/<[^>]*>/g,'');
      div.appendChild(furiDiv);
      div.appendChild(zh);
      listEl.appendChild(div);
    });
  }


  /* ─────────── NAV ─────────── */
  _go(d) {
    const n=this.cur+d;
    if(n<0||n>=this.deck.length)return;
    this._hideBack();
    this.cur=n;
    this._renderCard(d>0?'L':'R');
  }
  _shuffle() {
    for(let i=this.deck.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[this.deck[i],this.deck[j]]=[this.deck[j],this.deck[i]];}
    this.cur=0; this._renderCard();
  }
  _toggleFav() {
    const g=this.deck[this.cur]; if(!g)return;
    this.cs.favs[g.id]=!this.cs.favs[g.id];
    this._saveCS(); this._renderCard();
  }
  _toggleMst() {
    const g=this.deck[this.cur]; if(!g)return;
    this.cs.mastered[g.id]=!this.cs.mastered[g.id];
    this._saveCS(); this._renderCard();
  }
  _saveCS() { localStorage.setItem(CARD_ST_KEY, JSON.stringify(this.cs)); }

  /* ─────────── GRID ─────────── */
  _renderGrid() {
    const grid=document.getElementById('grid');
    grid.innerHTML='';
    let n=0;
    const src=this.filter!=='all'?this.deck:this.G;
    src.filter(g=>this._matchS(g)).forEach(g=>{ n++; grid.appendChild(this._makeGC(g)); });
    if(!n){const d=document.createElement('div');d.className='empty';d.textContent='🔍 没有找到相关语法';grid.appendChild(d);}
    (document.getElementById('visCt')||{textContent:''}).textContent=n;
    const _cb=document.getElementById('cntBadge'); if(_cb)_cb.textContent=`共 ${this.G.length} 项`;
  }
  _makeGC(g) {
    const d=document.createElement('div'); d.className='gc';
    const grp=this.fgs.find(x=>x.key===g.cat);
    const tb=grp?.color||'#e8f0ff', tf=grp?.fg||'#3a5bc7';
    const et=g.e.replace(/'/g,"\\'");
    d.innerHTML=`
    <div class="gch"><div class="gnum" style="background:${this.color}">${g.id}</div>
      <div class="gt">～<span class="hl">${g.hl}</span></div>
      ${grp?`<span class="gtag" style="background:${tb};color:${tf}">${grp.label}</span>`:''}
      <div class="gd">${g.d}</div></div>
    <div class="gea"><div class="gejp">${g.eh}</div><div class="gezh">${g.ez}</div>
      <div class="tts-row">
        <button class="tts-b" onclick="app.speak('${et}',1.0)">🔊 朗读</button>
        <button class="tts-b" onclick="app.speak('${et}',0.65)">🐢 慢速</button>
      </div></div>
    <div class="gi">
      <div class="gmb"><span class="lb">意思</span>${g.m}<br><span style="font-size:10.5px;color:#999">${g.mz}</span></div>
      <div class="gpb"><span class="lb">接续</span>${g.p}</div></div>
    <button class="gmt" onclick="const m=this.nextElementSibling;const o=m.classList.toggle('on');this.textContent=o?'▾ 收起':'▸ 更多例句'">▸ 更多例句</button>
    <div class="gme">${g.ex.map(e=>`<div class="gei">${e.j}<span class="tr">${e.z}</span></div>`).join('')}</div>`;
    d.querySelector('.gch').addEventListener('click',()=>{
      const idx=this.deck.findIndex(x=>x.id===g.id);
      if(idx!==-1){this.cur=idx;this._setView('card');window.scrollTo(0,0);}
      else{this._openMod(g.id);}
    });
    return d;
  }

  /* ─────────── MODAL ─────────── */
  _openMod(id) {
    const g=this.G.find(x=>x.id===id); if(!g)return;
    this.curMod=id;
    (document.getElementById('mNum')||{textContent:''}).textContent=g.id;
    document.getElementById('mTit').innerHTML=`～<span class="hl">${g.hl}</span> <span style="font-size:13px;color:#f5b942">${g.d}</span>`;
    document.getElementById('mEx').innerHTML=g.eh;
    (document.getElementById('mZh')||{textContent:''}).textContent=g.ez;
    document.getElementById('mMean').innerHTML=`${g.m}<br><span style="font-size:11px;color:#aaa">${g.mz}</span>`;
    document.getElementById('mPat').innerHTML=g.p;
    document.getElementById('mMore').innerHTML=g.ex.map(e=>`<div class="gei">${e.j}<span class="tr">${e.z}</span>
      <button class="tts-b" style="margin-top:5px;font-size:10px;padding:3px 9px"
        onclick="app.speak('${e.j.replace(/<[^>]*>/g,'').replace(/'/g,"\\'")}',1.0)">🔊</button></div>`).join('');
    document.getElementById('mov').classList.add('on');
    document.body.style.overflow='hidden';
  }
  _closeMod() {
    document.getElementById('mov').classList.remove('on');
    document.body.style.overflow='';
    window.speechSynthesis&&window.speechSynthesis.cancel();
    this.curMod=null;
  }
  _spkMod(r) {
    if(!this.curMod)return;
    const g=this.G.find(x=>x.id===this.curMod);
    if(g)this.speak(g.e,r);
  }

  /* ─────────── TTS ─────────── */
  _renderBack(g) {
    const BACK_DATA = (typeof N2_BACK !== 'undefined') ? N2_BACK :
                      (typeof N1_BACK !== 'undefined') ? N1_BACK :
                      (typeof N3_BACK !== 'undefined') ? N3_BACK :
                      (typeof N4_BACK !== 'undefined') ? N4_BACK :
                      (typeof N5_BACK !== 'undefined') ? N5_BACK : null;
    const back = BACK_DATA ? BACK_DATA[String(g.id)] : null;

    const fcard = document.getElementById('fcard');
    if (!fcard) return;

    // 确保fcardBack存在
    let el = document.getElementById('fcardBack');
    if (!el) {
      el = document.createElement('div');
      el.id = 'fcardBack';
      el.className = 'fcard-back-panel';
      fcard.parentNode.insertBefore(el, fcard.nextSibling);
    }
    el.style.display = 'none';

    // 翻转按钮（每次切换卡片时cbody被重建，需重新插入）
    const cbody = fcard.querySelector('.cbody');
    if (cbody) {
      let flipBtn = cbody.querySelector('.flip-btn');
      if (!flipBtn) {
        flipBtn = document.createElement('button');
        flipBtn.className = 'flip-btn';
        flipBtn.onclick = () => this._toggleFlip();
        cbody.appendChild(flipBtn);
      }
      flipBtn.textContent = back ? '📖 查看解析 & 练习题' : '📖 解析暂未收录';
      flipBtn.disabled = !back;
    }

    if (!back) { el.innerHTML = '<div class="no-back">此条文法解析暂未收录</div>'; return; }

    // 相似文法
    const mistakesHtml = (back.mistakes||'').split('\n').join('<br>');
    const similarHtml = (back.similar||[]).map(s =>
      `<div class="similar-item"><span class="similar-form">${s.form}</span><span class="similar-diff">— ${s.diff}</span></div>`
    ).join('');

    // 练习题
    const quizHtml = (back.quiz||[]).map((q, qi) => {
      const opts = (q.opts||[]).map((opt, oi) => {
        const letter = ['A','B','C','D'][oi];
        return `<button class="quiz-opt" data-qi="${qi}" data-letter="${letter}" data-ans="${q.ans}" onclick="window._quizClick(this)">${opt}</button>`;
      }).join('');
      return `<div class="quiz-item">
        <div class="quiz-q">${q.q}</div>
        <div class="quiz-opts">${opts}</div>
        <div class="quiz-exp" id="qexp-${qi}">${q.exp}</div>
      </div>`;
    }).join('');

    el.innerHTML = `
      <div class="back-header">
        <button class="flip-back-btn" onclick="window._flipBack()">← 返回正面</button>
        <span class="back-title">解析 · ${g.t}</span>
      </div>
      <div class="back-body">
        <div class="back-section">
          <div class="back-label">📌 深度解析</div>
          <div class="back-analysis">${back.analysis||''}</div>
        </div>
        <div class="back-section">
          <div class="back-label">⚠️ 易错点</div>
          <div class="back-mistakes">${mistakesHtml}</div>
        </div>
        ${similarHtml ? `<div class="back-section">
          <div class="back-label">🔀 相似文法</div>
          <div class="back-similar">${similarHtml}</div>
        </div>` : ''}
        ${quizHtml ? `<div class="back-section">
          <div class="back-label">✏️ 练习题</div>
          ${quizHtml}
        </div>` : ''}
      </div>`;
  }

  _hideBack() {
    const back = document.getElementById('fcardBack');
    const fcard = document.getElementById('fcard');
    if (back) back.style.display = 'none';
    if (fcard) fcard.style.display = '';
  }

  _toggleFlip() {
    const fcard = document.getElementById('fcard');
    const back = document.getElementById('fcardBack');
    if (!back) return;
    const showing = back.style.display === 'block';
    if (showing) {
      this._hideBack();
    } else {
      if (fcard) fcard.style.display = 'none';
      back.style.display = 'block';
    }
  }

  _playExample(el,text) {
    if(!window.speechSynthesis || !text) return;
    document.querySelectorAll('.exb.playing').forEach(x => x.classList.remove('playing'));
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'ja-JP';
    u.rate = 1.0;
    const vs = window.speechSynthesis.getVoices();
    const jp = vs.find(v => v.lang === 'ja-JP') || vs.find(v => v.lang && v.lang.startsWith('ja'));
    if (jp) u.voice = jp;
    this._playingExample = el;
    el.classList.add('playing');
    const clear = () => {
      if (this._playingExample === el) this._playingExample = null;
      el.classList.remove('playing');
    };
    u.onend = clear;
    u.onerror = clear;
    window.speechSynthesis.speak(u);
  }

  speak(text,rate) {
    if(!window.speechSynthesis)return;
    document.querySelectorAll('.exb.playing').forEach(x => x.classList.remove('playing'));
    this._playingExample = null;
    window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    u.lang='ja-JP'; u.rate=rate||1.0;
    const vs=window.speechSynthesis.getVoices();
    const jp=vs.find(v=>v.lang==='ja-JP')||vs.find(v=>v.lang.startsWith('ja'));
    if(jp)u.voice=jp;
    window.speechSynthesis.speak(u);
  }


  /* ─── SWIPE ─── */
  _initSwipe() {
    const el = document.getElementById('fcard');
    if (!el) return;
    let startX = 0, startY = 0;
    el.addEventListener('touchstart', e => {
      startX = e.touches[0].clientX;
      startY = e.touches[0].clientY;
    }, {passive: true});
    el.addEventListener('touchend', e => {
      const dx = e.changedTouches[0].clientX - startX;
      const dy = e.changedTouches[0].clientY - startY;
      if (Math.abs(dx) < 40 || Math.abs(dy) > Math.abs(dx)) return;
      if (dx < 0) this._go(1);
      else this._go(-1);
    }, {passive: true});
  }

// 练习题点击处理
window._quizClick = function(btn) {
  const qi = btn.dataset.qi;
  const container = btn.closest('.quiz-item');
  if (container.querySelector('.correct,.wrong')) return; // 已答
  const isCorrect = btn.dataset.letter === btn.dataset.ans;
  container.querySelectorAll('.quiz-opt').forEach(b => {
    if (b.dataset.letter === btn.dataset.ans) b.classList.add('correct');
    else if (b === btn) b.classList.add('wrong');
  });
  const exp = document.getElementById('qexp-'+qi);
  if (exp) exp.classList.add('show');
};
window._flipBack = function() {
  const fcard = document.getElementById('fcard');
  const back = document.getElementById('fcardBack');
  if (back) back.style.display = 'none';
  if (fcard) fcard.style.display = '';
};
