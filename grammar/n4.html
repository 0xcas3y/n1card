<script>
const N4_BACK = {"1": {"analysis": "「～てある」表示他动词的动作结果状态持续存在，强调这是有人有意为之的结果。与「～ている」不同，它突出动作的目的性和结果的保持状态。这个文法只能接他动词，因为需要体现「有人做了某事」的含义。", "mistakes": "易错点：与「～ている」混用。❌窓が開いてある → ✅窓が開けてある（窗户开着-有人开的）；❌本を読んである → ✅本が置いてある（书放着-有人放的）。注意：自动词用「～ている」，他动词表结果状态用「～てある」。", "similar": [{"form": "～ている", "diff": "「～てある」强调有意的结果状态，「～ている」表示自然的持续状态或动作进行"}, {"form": "～ておく", "diff": "「～ておく」表示为将来做准备的动作，「～てある」表示过去动作的现在结果状态"}], "quiz": [{"q": "机の上に本が（____）。", "opts": ["A.置いている", "B.置いてある", "C.置いておく", "D.置いていた"], "ans": "B", "exp": "表示书被有意放在桌上的结果状态，用「～てある」"}, {"q": "電気が（____）から、誰かいるようです。", "opts": ["A.つけている", "B.ついてある", "C.つけてある", "D.ついている"], "ans": "C", "exp": "电灯被有人有意打开的状态，他动词「つける」+「てある」"}, {"q": "レポートはもう（____）ので、安心してください。", "opts": ["A.書いている", "B.書いた", "C.書いてある", "D.書いておく"], "ans": "C", "exp": "报告已经写好并保持完成状态，用「書いてある」表示结果状态"}]}, "2": {"analysis": "「～ておく」表示为了将来的需要而提前做某事，体现了预先准备的意图。这个文法强调动作的预备性质，与单纯的现在完成时不同，它包含「为了以后」的目的性。口语中常缩略为「～とく」，是日常会话中的高频表达。", "mistakes": "易错点：混淆时态概念。❌「資料を準備してあります」（单纯表示已完成状态） → ✅「資料を準備しておきます」（为将来需要而准备）；❌「ドアを開けておく」用于表示现在状态 → ✅「ドアを開けておく」表示故意保持开启状态", "similar": [{"form": "～てある", "diff": "ている表示结果状态保持，ておく强调为将来的预备行为"}, {"form": "～ておる", "diff": "ておる是敬语形式，ておく是预备行为的普通表达"}], "quiz": [{"q": "パーティーの前に、飲み物を（____）。", "opts": ["A. 買ってあります", "B. 買っています", "C. 買っておきます", "D. 買いました"], "ans": "C", "exp": "为聚会提前购买饮料，表示预备行为，用「～ておく」"}, {"q": "雨が降りそうだから、傘を（____）。", "opts": ["A. 持ちました", "B. 持っています", "C. 持ってあります", "D. 持っておこう"], "ans": "D", "exp": "因为可能下雨而提前准备雨伞，表示预备行为"}, {"q": "明日の会議のため、今日中に報告書を（____）つもりです。", "opts": ["A. 書いてしまう", "B. 書いておく", "C. 書いてある", "D. 書いている"], "ans": "B", "exp": "为了明天的会议而提前准备报告书，典型的预备用法"}]}, "3": {"analysis": "「〜てしまう」是N4重要文法，表示动作的完全完成或带有遗憾情感的完成。当表示完了时强调动作彻底结束，当表示后悔时含有「不该做却做了」的遗憾心情。口语中常缩略为「〜ちゃう/〜じゃう」，使表达更自然流畅。", "mistakes": "易错点：混淆完了和后悔两种用法。❌宿題をしてしまいました（听起来像后悔做作业）→ ✅宿題をしました（单纯完成）；❌財布を忘れちゃいました（应表后悔）→ ✅財布を忘れてしまいました（正确表达遗憾）", "similar": [{"form": "〜てある", "diff": "〜てある强调结果状态的维持，〜てしまう强调动作的完全完成"}, {"form": "〜ている", "diff": "〜ている表示进行或状态，〜てしまう表示完了或遗憾的完成"}], "quiz": [{"q": "もう12時だ。電車に乗り遅れて（____）。", "opts": ["A. います", "B. しまいます", "C. あります", "D. います"], "ans": "B", "exp": "错过电车是令人后悔的事情，用「〜てしまう」表示遗憾"}, {"q": "やっと本を読み（____）ました。", "opts": ["A. 終わって", "B. 終えて", "C. 終わってしまい", "D. 終えてしまい"], "ans": "C", "exp": "「読み終わってしまう」表示完全读完，强调完了"}, {"q": "大切な写真を（____）。", "opts": ["A. なくしちゃいました", "B. なくしています", "C. なくしてあります", "D. なくしました"], "ans": "A", "exp": "弄丢重要照片是遗憾的事，口语「〜ちゃう」更自然地表达后悔"}]}, "4": {"analysis": "「～てみる」表示试验性地做某事，强调尝试的态度和过程。与中文「试试」不同，日语更注重通过实际行动来获得经验或确认结果。常用于想要体验新事物或验证某种想法的场合。", "mistakes": "易错点：时态混用。❌明日、映画を見てみました → ✅明日、映画を見てみます；助词遗漏：❌日本料理作ってみる → ✅日本料理を作ってみる", "similar": [{"form": "～てみたい", "diff": "「～てみる」是实际尝试，「～てみたい」是想要尝试的愿望"}, {"form": "～ようとする", "diff": "「～てみる」轻松尝试，「～ようとする」强调努力企图"}], "quiz": [{"q": "新しいレストランで____。", "opts": ["A.食べてみます", "B.食べています", "C.食べました", "D.食べるでしょう"], "ans": "A", "exp": "「食べてみます」表示试着在新餐厅吃饭，符合尝试新事物的语境"}, {"q": "この本を____から、面白いかどうかわかります。", "opts": ["A.読んで", "B.読んでみて", "C.読みたくて", "D.読もうと"], "ans": "B", "exp": "「読んでみて」表示通过试着读这本书来判断是否有趣"}, {"q": "日本語で手紙を____が、難しかったです。", "opts": ["A.書いて", "B.書こうとして", "C.書いてみた", "D.書きたくて"], "ans": "C", "exp": "「書いてみた」表示已经尝试用日语写信，过去时态"}]}, "5": {"analysis": "〜ていく表示动作的方向性和持续性，包含两个核心概念：1）空间上的离去（从说话者的位置向外移动）；2）时间上的持续变化（从现在向未来发展）。与〜てくる相对，形成「去」和「来」的方向对立，是日语表达时空概念的重要语法。", "mistakes": "易错点：混淆方向性。❌雨が降ってくる（应该表示雨开始下） → ✅雨が降っていく（雨继续下着离去）；❌だんだん寒くなってくる（从外向内变冷） → ✅だんだん寒くなっていく（持续变冷的过程）", "similar": [{"form": "〜てくる", "diff": "てくる表示「来」的方向（向说话者接近）或变化的开始，ていく表示「去」的方向（离开说话者）或变化的持续"}, {"form": "〜ている", "diff": "ている表示状态的持续，ていく强调动作的方向性和时间的推移过程"}], "quiz": [{"q": "友達が家から____。", "opts": ["A. 出ていく", "B. 出てくる", "C. 出ている", "D. 出ていた"], "ans": "A", "exp": "朋友从家里出去，表示离开说话者的方向，用ていく"}, {"q": "これから日本語がもっと上手____と思います。", "opts": ["A. になってくる", "B. になっていく", "C. になっている", "D. になった"], "ans": "B", "exp": "表示从现在向未来日语会越来越好的持续变化过程，用ていく"}, {"q": "電車が駅から____のが見えました。", "opts": ["A. 出てくる", "B. 出ている", "C. 出ていく", "D. 出ていた"], "ans": "C", "exp": "电车从车站开出去，表示离开的方向，用ていく"}]}, "6": {"analysis": "「てくる」表示两个核心概念：1）动作的往返性（去做某事然后回来）；2）变化的渐进性（某种状态或现象逐渐向说话者方向发展）。这个文法体现了日语独特的「向心性」表达，即以说话者为中心点来描述动作或变化的方向性。", "mistakes": "❌ 雨が降ってきた → 表示「雨开始下了」而非「雨下着回来了」。易误解为物理移动。✅ 理解：表示变化的开始或渐进过程。❌ 友達が来てくる → ✅ 友達が来る（朋友来）或 友達を連れてくる（带朋友来）。", "similar": [{"form": "〜ていく", "diff": "てくる：向说话者方向/渐近变化；ていく：远离说话者/渐远变化"}, {"form": "〜てもらう", "diff": "てくる：自己去做回来；てもらう：请别人做某事"}], "quiz": [{"q": "最近、日本語が上手（____）。", "opts": ["A. になってくる", "B. になっていく", "C. になってある", "D. になってもらう"], "ans": "A", "exp": "表示日语水平逐渐提高的变化过程，用「てくる」表示向好的方向发展"}, {"q": "コーヒーを（____）。", "opts": ["A. 買ってくる", "B. 買っていく", "C. 買ってある", "D. 買ってもらう"], "ans": "A", "exp": "表示去买咖啡然后回来，用「買ってくる」表示往返动作"}, {"q": "空が暗く（____）。", "opts": ["A. なっていく", "B. なってくる", "C. なってしまう", "D. なっておく"], "ans": "B", "exp": "天空逐渐变暗，表示变化向说话者感知方向发展，用「なってくる」"}]}, "7": {"analysis": "「〜てほしい」表达对他人行为的期望或愿望，主语通常是第三人称或对话中的「あなた」。与「〜たい」不同，它不能用于表达自己想做的事情。这个文法体现了日语中明确区分自己意愿和对他人期望的语言特征。", "mistakes": "❌ 私は早く帰ってほしい。（混淆主语）→ ✅ あなたに早く帰ってほしい。❌ 友達は来てほしい。（主语错误）→ ✅ 友達に来てほしい。❌ 私は勉強してほしい。（自己愿望误用）→ ✅ 私は勉強したい。", "similar": [{"form": "〜たい", "diff": "〜たい表示自己的愿望，〜てほしい表示对他人的期望"}, {"form": "〜てください", "diff": "〜てください是礼貌的请求，〜てほしい是个人愿望的表达"}], "quiz": [{"q": "両親___元気でいてほしい。", "opts": ["A. が", "B. を", "C. に", "D. は"], "ans": "C", "exp": "「〜てほしい」的对象用助词「に」标示，表示希望某人做某事"}, {"q": "私は彼___手伝ってほしい。", "opts": ["A. が", "B. を", "C. と", "D. に"], "ans": "D", "exp": "期望的对象用「に」，表示希望他来帮忙"}, {"q": "子供たち___静かにしてほしい。", "opts": ["A. は", "B. が", "C. に", "D. を"], "ans": "C", "exp": "希望孩子们安静，对象用「に」标示"}]}, "8": {"analysis": "授受表现是日语中表达「给予」和「接受」行为的重要语法，体现了日语敬语体系的核心。てあげる表示说话者为他人做事，てくれる表示他人为说话者做事，てもらう表示说话者接受他人的帮助，三者构成完整的授受关系体系。", "mistakes": "❌ 先生が宿題を手伝ってあげた → ✅ 先生が宿題を手伝ってくださった（对上级不能用あげる）\n❌ 友だちに写真を撮ってもらった → ✅ 友だちが写真を撮ってくれた（主语搞混）", "similar": [{"form": "〜てやる", "diff": "比あげる更随意，多用于对下级或动物"}, {"form": "〜ていただく", "diff": "もらう的敬语形式，用于对上级"}], "quiz": [{"q": "母が私に手紙を書いて____。", "opts": ["A. あげた", "B. くれた", "C. もらった", "D. やった"], "ans": "B", "exp": "母亲为说话者写信，应用くれる表示他人为自己做事"}, {"q": "弟に宿題を手伝って____。", "opts": ["A. くれた", "B. もらった", "C. あげた", "D. いただいた"], "ans": "C", "exp": "说话者帮助弟弟，为他人做事用あげる"}, {"q": "先生に漢字を教えて____。", "opts": ["A. あげた", "B. やった", "C. くれた", "D. いただいた"], "ans": "D", "exp": "接受老师的教导，对上级用もらう的敬语形いただく"}]}, "9": {"analysis": "「〜やすい/にくい」是表示动作难易程度的重要语法，将动词的ます形去掉ます后直接接续。やすい表示「容易做某事」，にくい表示「难以做某事」，这种表达方式体现了日语中通过形容词化来描述动作特征的语言特点。需注意这里描述的是客观的难易程度，而非主观意愿。", "mistakes": "常见错误是接续形式混淆：❌ 読むやすい → ✅ 読みやすい；❌ 食べるにくい → ✅ 食べにくい。另外容易与〜たい（想要）混淆：❌ この本を読みたい（想读这本书）当作容易读来理解。", "similar": [{"form": "〜がたい", "diff": "がたい更强调「难以忍受/难以接受」的情感色彩，如理解がたい（难以理解），而にくい只是客观描述困难程度"}, {"form": "〜たい", "diff": "たい表示主观愿望「想要做」，如食べたい（想吃），而やすい/にくい表示客观的难易程度"}], "quiz": [{"q": "この字は小さくて（　　）。", "opts": ["A. 見やすい", "B. 見にくい", "C. 見たい", "D. 見がたい"], "ans": "B", "exp": "字很小，所以「难以看清」，用見にくい表示客观上的困难"}, {"q": "新しいペンは（　　）です。", "opts": ["A. 書くやすい", "B. 書きやすい", "C. 書くにくい", "D. 書きにくい"], "ans": "B", "exp": "新笔应该「容易写」，動詞ます形去掉ます：書きます→書き＋やすい"}, {"q": "この問題は（　　）ので、時間がかかります。", "opts": ["A. 解きやすい", "B. 解きにくい", "C. 解きたい", "D. 解くやすい"], "ans": "B", "exp": "因为花时间，说明问题「难解」，用解きにくい；接续是解きます→解き＋にくい"}]}, "10": {"analysis": "可能形「〜（ら）れる」表示能力或可能性，相当于中文的「能～」「可以～」。一段动词加「られる」，五段动词将「ない形」的「ない」改为「れる」。注意助词使用：能力对象用「が」标记，而非「を」。", "mistakes": "助词混用：❌ 辛い食べ物を食べられます → ✅ 辛い食べ物が食べられます；动词活用错误：❌ 泳がれる → ✅ 泳げる；特殊动词：❌ するられる → ✅ できる", "similar": [{"form": "〜ことができる", "diff": "「られる」更口语化简洁，「ことができる」更正式书面"}, {"form": "〜（ら）れる（受身）", "diff": "可能形主语是能力者，受身形主语是动作接受者"}], "quiz": [{"q": "日本語の本____読めますか。", "opts": ["A. を", "B. が", "C. に", "D. で"], "ans": "B", "exp": "可能形的对象用助词「が」标记，不用「を」"}, {"q": "昨日は忙しくて、映画を____。", "opts": ["A. 見られませんでした", "B. 見えませんでした", "C. 見ませんでした", "D. 見られました"], "ans": "A", "exp": "表示因忙碌而没能看电影，用可能形的否定「見られませんでした」"}, {"q": "彼は英語____話せます。", "opts": ["A. を", "B. が", "C. に", "D. と"], "ans": "B", "exp": "可能形表示能力时，能力对象用「が」标记"}]}, "11": {"analysis": "受身形是日语中表示被动语态的重要文法，除了基本的被动含义外，还常用来表达受到他人行为影响的感受，包括积极和消极的情感。一段动词在ます形基础上加られる，五段动词在ない形基础上加れる，这种变化规律需要熟练掌握。", "mistakes": "❌ 私は友達に手紙を書かれました。→ ✅ 私は友達に手紙を書いてもらいました。（帮助时用てもらう而非受身）❌ 雨に降られました。→ ✅ 雨に降られました。（自然现象的迷惑受身是正确的）❌ 先生に教えられます。→ ✅ 先生に教えてもらいます。（接受好意用てもらう）", "similar": [{"form": "〜てもらう", "diff": "表示接受他人好意，主语受益；受身形可能表示迷惑"}, {"form": "〜てくれる", "diff": "他人为说话人做某事；受身形强调主语受到行为影响"}, {"form": "〜させられる", "diff": "使役受身，被迫做某事；单纯受身是承受他人行为"}], "quiz": [{"q": "私は母に____。", "opts": ["A. 叱れました", "B. 叱られました", "C. 叱りました", "D. 叱らせました"], "ans": "B", "exp": "五段动词「叱る」的受身形是「叱られる」，表示被妈妈骂了"}, {"q": "弟に大切な本を____しまいました。", "opts": ["A. 破れて", "B. 破られて", "C. 破って", "D. 破らせて"], "ans": "B", "exp": "五段动词「破る」的受身形「破られて」，表示重要的书被弟弟撕破了，含有迷惑的语感"}, {"q": "昨日、友達に秘密を____困りました。", "opts": ["A. 話されて", "B. 話してもらって", "C. 話させて", "D. 話くれて"], "ans": "A", "exp": "一段动词「話す」的受身形「話される」，秘密被说出去是迷惑受身的典型用法"}]}, "13": {"analysis": "「〜させてください」是使役形+てください的组合，表示谦逊地请求对方允许自己做某事。与直接的「〜します」相比，这种表达更加礼貌，体现了日语中重视对方感受的文化特点。使用时需要注意动词的使役形变化规则。", "mistakes": "易混淆使役形变化：❌ 食べさしてください → ✅ 食べさせてください；❌ 来らせてください → ✅ 来させてください；态度过于直接：❌ 私がやります → ✅ 私にやらせてください", "similar": [{"form": "〜していただけませんか", "diff": "させてください是请求许可让自己做，していただけませんか是请求对方为自己做"}, {"form": "〜させていただきます", "diff": "させてください是请求阶段，させていただきます是已获得许可后的表达"}], "quiz": [{"q": "私に荷物を（____）。", "opts": ["A. 持たせてください", "B. 持ってください", "C. 持たしてください", "D. 持たされてください"], "ans": "A", "exp": "「持つ」的使役形是「持たせる」，请求让自己拿行李用「持たせてください」"}, {"q": "すみません、質問を（____）。", "opts": ["A. 聞かしてください", "B. 聞いてください", "C. 聞かせてください", "D. 聞かれてください"], "ans": "C", "exp": "「聞く」的使役形是「聞かせる」，请求让自己提问用「聞かせてください」"}, {"q": "私に手伝わ（____）。", "opts": ["A. してください", "B. せてください", "C. させてください", "D. されてください"], "ans": "C", "exp": "「手伝う」的使役形是「手伝わせる」，请求让自己帮忙用「手伝わせてください」"}]}, "14": {"analysis": "〜させられる是使役形+受身形的复合形态，表达被强制做不愿意的事情。与单纯的使役形〜させる相比，这里的主体是被动的受害者，强调不情愿和无奈感。", "mistakes": "❌ 私は弟に宿題をさせられた（我被弟弟强迫做作业）→ ✅ 私は母に宿題をさせられた（我被妈妈强迫做作业）。注意逻辑关系，通常是地位高的人强迫地位低的人。", "similar": [{"form": "〜される（受身）", "diff": "単純受身，不强调强迫性；させられる强调被迫做不愿意的事"}, {"form": "〜させる（使役）", "diff": "主动让别人做；させられる是被动被强迫做"}], "quiz": [{"q": "子供の時、よく野菜を（　　）。", "opts": ["A. 食べさせた", "B. 食べさせられた", "C. 食べられた", "D. 食べした"], "ans": "B", "exp": "小时候被父母强迫吃蔬菜，用使役受身形"}, {"q": "部長に夜遅くまで（　　）。", "opts": ["A. 働かせた", "B. 働いた", "C. 働かせられた", "D. 働かれた"], "ans": "C", "exp": "被部长强迫工作到很晚，表示不情愿"}, {"q": "雨の中を1時間も（　　）。", "opts": ["A. 待たせた", "B. 待った", "C. 待たせられた", "D. 待たれた"], "ans": "C", "exp": "被迫在雨中等待1小时，使用使役受身形表达被强迫的无奈"}]}, "15": {"analysis": "「〜ば」是表示条件假设的重要句型，相当于中文的「如果~的话」。它强调前项是后项成立的必要条件，具有较强的假设性。与「〜と」不同，「〜ば」可以用于意志表现和请求，使用范围更广泛。", "mistakes": "❌ 雨が降るば、家にいます → ✅ 雨が降れば、家にいます（动词要用ば形）；❌ 元気ば、何でもできます → ✅ 元気であれば、何でもできます（な形容词需加「であれ」）；❌ 早いば、間に合います → ✅ 早ければ、間に合います（い形容词变「ければ」）", "similar": [{"form": "〜と", "diff": "「と」表示自然结果，不能用于意志表现；「ば」可用于意志和请求"}, {"form": "〜たら", "diff": "「たら」偏重时间顺序，「ば」偏重条件关系"}, {"form": "〜なら", "diff": "「なら」强调话题前提，「ば」强调条件假设"}], "quiz": [{"q": "時間が（____）、映画を見に行きましょう。", "opts": ["A. あると", "B. あれば", "C. あったら", "D. あるなら"], "ans": "B", "exp": "表示条件假设「如果有时间的话」，动词「ある」的ば形是「あれば」"}, {"q": "この薬を飲め（____）、すぐによくなります。", "opts": ["A. ば", "B. れば", "C. ならば", "D. たら"], "ans": "A", "exp": "动词「飲む」的命令形「飲め」后直接加「ば」，表示条件"}, {"q": "天気が（____）、ピクニックに行きます。", "opts": ["A. いいと", "B. いいば", "C. よければ", "D. いいなら"], "ans": "C", "exp": "い形容词「いい」的ば形是「よければ」，表示「如果天气好的话」"}]}, "16": {"analysis": "「〜たら」表示完成某个动作后的条件或假定，强调前项动作完成后再进行后项动作。与中文'~了之后'或'如果~'相似，但日语更强调时间的先后顺序和动作的完成性。", "mistakes": "易错点：时态混用和语序错误。❌ 宿題を終わるたら、遊びに行きます → ✅ 宿題が終わったら、遊びに行きます（必须用た形）；❌ たら雨が降る、家にいます → ✅ 雨が降ったら、家にいます（语序要正确）", "similar": [{"form": "〜てから", "diff": "「〜てから」纯粹表示时间顺序'~之后'，「〜たら」还可表示假定条件'如果~'"}, {"form": "〜と", "diff": "「〜と」表示客观必然结果，「〜たら」可表示主观意志或计划"}, {"form": "〜ば", "diff": "「〜ば」多用于假定条件，「〜たら」既可假定也可表示完成后的实际行动"}], "quiz": [{"q": "春になったら、桜を____に行きましょう。", "opts": ["A. 見る", "B. 見", "C. 見に", "D. 見て"], "ans": "C", "exp": "「見に行く」是固定搭配，表示'去看'的目的，用「見に」"}, {"q": "お金が____、新しい車を買います。", "opts": ["A. あるたら", "B. あったら", "C. ありたら", "D. あるなら"], "ans": "B", "exp": "「ある」的た形是「あった」，所以是「あったら」"}, {"q": "映画が____、感想を教えてください。", "opts": ["A. 終わるたら", "B. 終わってから", "C. 終わったら", "D. 終わると"], "ans": "C", "exp": "表示电影结束后的条件，用「終わったら」最自然"}]}, "18": {"analysis": "「〜そうだ（様態）」は視覚的印象に基づく推測を表す文法で、話し手が目で見た情報から判断する際に使用します。動詞のます形や形容詞の語幹に接続し、「見た感じでは〜だろう」という意味を表現します。この文法は主観的な印象を述べるため、実際の状態とは異なる場合もあります。", "mistakes": "❌ この本は難しいそうです → ✅ この本は難しそうです（い形容詞は語幹＋そうだ）\n❌ 雨が降るそうです → ✅ 雨が降りそうです（動詞はます形＋そうだ）\n❌ 元気そうだ → ✅ 元気そうだ（な形容詞は語幹のみ）", "similar": [{"form": "〜そうだ（伝聞）", "diff": "様態は見た目の判断、伝聞は他人から聞いた情報"}, {"form": "〜ようだ", "diff": "そうだは直接的な視覚印象、ようだはより推測的で間接的"}], "quiz": [{"q": "あの子は泣き____。", "opts": ["A. そうです", "B. ましそうです", "C. そうだった", "D. たそうです"], "ans": "A", "exp": "動詞「泣く」のます形「泣き」＋そうですが正解"}, {"q": "この問題は____そうですね。", "opts": ["A. 簡単い", "B. 簡単", "C. 簡単な", "D. 簡単に"], "ans": "B", "exp": "な形容詞「簡単」は語幹のみ＋そうだ"}, {"q": "空が暗くなって、雨が____。", "opts": ["A. 降るそうです", "B. 降りそうです", "C. 降りましそうです", "D. 降そうです"], "ans": "B", "exp": "動詞「降る」のます形「降り」＋そうですで見た目の判断を表す"}]}, "19": {"analysis": "伝聞の「そうだ」は他人から聞いた情報を伝える表現で、情報源を明示しない間接的な伝達方法です。普通形に直接接続し、話し手が直接確認していない事実や噂を表現する際に使用します。", "mistakes": "❌ 明日雨が降りそうです（様態の「そうだ」と混同）→ ✅ 明日雨が降るそうです（伝聞）/ ❌ 田中さんは病気だそうでした → ✅ 田中さんは病気だったそうです", "similar": [{"form": "〜そうだ（様態）", "diff": "伝聞は普通形接続で他人からの情報、様態は形容詞語幹・動詞ます形接続で外見からの推測"}, {"form": "〜ということだ", "diff": "より硬い表現で書き言葉的、「そうだ」は日常会話でよく使用"}], "quiz": [{"q": "田中さんは来月結婚____。", "opts": ["A. するそうです", "B. しそうです", "C. するということです", "D. するらしいです"], "ans": "A", "exp": "伝聞の「そうだ」は普通形に接続。「しそう」は様態、他も可能だが最も自然"}, {"q": "この店の料理は____。", "opts": ["A. おいしそうです", "B. おいしいそうです", "C. おいしいようです", "D. おいしいみたいです"], "ans": "B", "exp": "伝聞表現なら「おいしいそうです」。「おいしそう」は見た目からの判断（様態）"}, {"q": "昨日の会議は____。", "opts": ["A. 長そうでした", "B. 長いそうでした", "C. 長かったそうです", "D. 長くそうでした"], "ans": "C", "exp": "過去の伝聞は「過去形＋そうです」の形。「そうでした」は使わない"}]}, "20": {"analysis": "〜ようだ/みたいだ都表示推测或比喻，但接续方式不同：ようだ接普通形，みたいだ接名词和形容词词干。两者在口语中みたいだ更常用，书面语中ようだ更正式。", "mistakes": "❌雨が降るみたいです → ✅雨が降るようです（动词接ようだ）; ❌子供ようだ → ✅子供みたいだ（名词接みたいだ）; ❌静かようだ → ✅静かなようだ（な形容词要加な）", "similar": [{"form": "〜そうだ", "diff": "そうだ表示外观印象，ようだ/みたいだ可表推测和比喻"}, {"form": "〜らしい", "diff": "らしい基于传闻信息，ようだ/みたいだ基于直观判断"}], "quiz": [{"q": "彼女は学生____。", "opts": ["A.ようだ", "B.みたいだ", "C.そうだ", "D.らしい"], "ans": "B", "exp": "名词「学生」后面用みたいだ"}, {"q": "雨が降り____ですね。", "opts": ["A.そう", "B.みたい", "C.よう", "D.らしい"], "ans": "C", "exp": "动词普通形后接ようです"}, {"q": "この料理は美味し____です。", "opts": ["A.そう", "B.みたい", "C.よう", "D.いよう"], "ans": "C", "exp": "い形容词去い接ようです"}]}, "21": {"analysis": "「らしい」表示基于某种客观证据或信息的推测，与「そうだ」的区别在于更强调有具体根据。另外，「らしい」还可表示典型特征，如「男らしい」（有男子气概），此时不是推测而是评价。", "mistakes": "❌ 雨が降るらしそうです → ✅ 雨が降るらしいです（不能与そう重复使用）\n❌ 彼は学生らしくない → ✅ 彼は学生らしくありません（否定形用ありません）", "similar": [{"form": "〜そうだ", "diff": "そうだ基于视觉印象推测，らしい基于听到的信息或证据推测"}, {"form": "〜ようだ", "diff": "ようだ是说话人的主观判断，らしい更客观，基于外部信息"}], "quiz": [{"q": "田中さんは今日会社を休む____。", "opts": ["A. らしいです", "B. らしそうです", "C. らしくです", "D. らしいそうです"], "ans": "A", "exp": "らしい表示基于信息的推测，直接用らしいです"}, {"q": "彼女は本当に先生____。", "opts": ["A. らしそうです", "B. らしいです", "C. らしくありません", "D. らしいありません"], "ans": "B", "exp": "らしい表示符合典型特征，肯定形用らしいです"}, {"q": "この子は子供____。", "opts": ["A. らしいです", "B. らしくないです", "C. らしくありません", "D. らしそうじゃありません"], "ans": "C", "exp": "表示不符合典型特征时，否定形用らしくありません"}]}, "23": {"analysis": "「かもしれない」表示说话人对某种情况的不确定推测，可能性约为50%左右。与中文「也许、可能」相似，但更偏重于主观的不确定感。接续时动词、形容词、名词都用普通形，但な形容词和名词要去掉「だ」。", "mistakes": "❌ 雨だかもしれない → ✅ 雨かもしれない（名词直接接续，不要「だ」）\n❌ きれいだかもしれない → ✅ きれいかもしれない（な形容词去掉「だ」）\n❌ かもしれないです → ✅ かもしれません（敬语形式）", "similar": [{"form": "〜でしょう", "diff": "でしょう表示较确信的推测（70-80%），かもしれない表示不确定的推测（50%左右）"}, {"form": "〜と思う", "diff": "と思う表示个人主观想法，かもしれない强调可能性的不确定"}], "quiz": [{"q": "田中さんは今日来ない____。", "opts": ["A. かもしれない", "B. かもしれません", "C. でしょう", "D. と思います"], "ans": "B", "exp": "敬语场合用「かもしれません」，表示不确定的推测"}, {"q": "この映画は面白い____。", "opts": ["A. だかもしれない", "B. かもしれません", "C. かもしれない", "D. のかもしれない"], "ans": "C", "exp": "い形容词直接接「かもしれない」，不需要「だ」"}, {"q": "彼は学生____。", "opts": ["A. だかもしれない", "B. かもしれない", "C. でしょう", "D. かもしれません"], "ans": "B", "exp": "名词接「かもしれない」时要去掉「だ」，直接接续"}]}, "24": {"analysis": "「〜はずだ」表示基于客观事实或合理推理得出的确信判断，强调说话人有充分根据相信某事应该如此。与推测表现不同，它带有强烈的确信色彩，常用于对已知信息的逻辑推断。", "mistakes": "易错点：与推测混淆。❌明日は雨が降るはずです（仅凭天气预报）→ ✅明日は雨が降るでしょう；❌彼は来るはずです（无根据期待）→ ✅彼は約束したから、来るはずです", "similar": [{"form": "〜でしょう", "diff": "でしょう表示推测，はずだ表示有根据的确信"}, {"form": "〜に違いない", "diff": "に違いない更强调断定，はずだ强调合理性"}], "quiz": [{"q": "彼は日本に5年住んでいるから、日本語が____。", "opts": ["A.上手なはずです", "B.上手でしょう", "C.上手かもしれません", "D.上手になります"], "ans": "A", "exp": "基于5年居住经验这个客观事实，有根据地判断日语应该很好"}, {"q": "電車は10分前に出たから、もう____。", "opts": ["A.着くでしょう", "B.着いているはずです", "C.着くかもしれません", "D.着きます"], "ans": "B", "exp": "基于电车已发车10分钟这个事实，有根据地确信应该已经到达"}, {"q": "田中さんはいつも早く来るのに、今日は遅いですね。何か____。", "opts": ["A.あったはずです", "B.あるはずです", "C.あったでしょう", "D.あるでしょう"], "ans": "B", "exp": "基于平时早到但今天迟到这个反常现象，推断现在应该有什么事情"}]}, "25": {"analysis": "「〜に違いない」表示说话者基于某种根据或状况，对事实进行强烈的推测和断定，相当于中文的「一定是」「肯定」。与单纯的推测不同，这个句型带有很强的确信度，几乎等同于断言。常用于对客观事实的推断，而非主观愿望。", "mistakes": "❌ 雨が降るに違いありません（过度敬语）→ ✅ 雨が降るに違いない（固定形式不变化）\n❌ 彼は学生に違いないでしょう（重复推测）→ ✅ 彼は学生に違いない\n❌ 行くに違いない（意志表现）→ ✅ 彼は行くに違いない（客观推断）", "similar": [{"form": "〜はずだ", "diff": "「はずだ」是基于常理的推测，「に違いない」是基于证据的强烈确信"}, {"form": "〜だろう/でしょう", "diff": "表示不确定的推测，确信度比「に違いない」低很多"}], "quiz": [{"q": "あの人は日本人____。日本語がとても上手だから。", "opts": ["A. に違いない", "B. はずだ", "C. だろう", "D. かもしれない"], "ans": "A", "exp": "基于「日语很好」这个证据，说话者强烈确信对方是日本人，用「に違いない」最合适"}, {"q": "この問題は難し____。誰も答えられないから。", "opts": ["A. いでしょう", "B. いに違いない", "C. いはずだ", "D. いと思う"], "ans": "B", "exp": "形容词い形式+に違いない，基于「谁都答不出来」这个事实进行强烈断定"}, {"q": "彼は忙し____。最近全然会えないから。", "opts": ["A. いに違いない", "B. いでしょう", "C. いと思います", "D. いようです"], "ans": "A", "exp": "基于「最近完全见不到面」这个现象，强烈推断他很忙，使用「に違いない」"}]}, "26": {"analysis": "「〜こと」是形式名詞，用于将动词名词化，使其能充当句子的主语或宾语。与中文不同，日语必须通过「こと」将动词转换成名词性质才能作为主语使用。这个用法在表达习惯、能力、经验等抽象概念时极为重要。", "mistakes": "易混淆「こと」与「の」的用法。❌ 本を読むのが好きです（应该用の表示具体行为）→ ✅ 本を読むことが好きです（抽象的喜好）。❌ 泳ぐことを見ました（具体动作用の）→ ✅ 泳ぐのを見ました。", "similar": [{"form": "〜の（準体助詞）", "diff": "「の」用于具体可见的行为，「こと」用于抽象概念和一般性叙述"}, {"form": "〜とき", "diff": "「とき」表示时间点，「こと」表示事情本身"}], "quiz": [{"q": "毎朝ジョギング____が健康にいいです。", "opts": ["A. する", "B. すること", "C. するの", "D. した"], "ans": "B", "exp": "表达一般性的抽象概念时用「すること」"}, {"q": "彼女が歌____を聞きました。", "opts": ["A. うこと", "B. うの", "C. って", "D. った"], "ans": "B", "exp": "具体可见的行为用「の」，这里是听到具体的歌声"}, {"q": "日本語を勉強____は楽しいです。", "opts": ["A. する", "B. すること", "C. するの", "D. している"], "ans": "B", "exp": "学习日语这件事（抽象概念）很有趣，用「すること」"}]}, "27": {"analysis": "「〜の」是形式名詞「こと」的口语化表达，用于将动词名词化。相比「こと」更显亲近自然，常用于日常会话中表达喜好、能力、经验等。接续时动词保持辞书形，后接助词が/を/は等。", "mistakes": "❌ 音楽を聴くことが好きです（过于正式）→ ✅ 音楽を聴くのが好きです（自然口语）\n❌ 泳ぐのを上手です → ✅ 泳ぐのが上手です（用が不用を）\n❌ 読書するのは好きです → ✅ 本を読むのが好きです（避免サ变动词+する的重复感）", "similar": [{"form": "〜こと", "diff": "こと更正式书面，の更口语自然"}, {"form": "〜の（所有格）", "diff": "所有格表归属，形式名詞の表动作名词化"}], "quiz": [{"q": "映画を（____）が好きです。", "opts": ["A. 見る", "B. 見るの", "C. 見ること", "D. 見るに"], "ans": "B", "exp": "动词辞书形+の表示动作的名词化，口语中常用"}, {"q": "日本語を勉強する（____）は大変です。", "opts": ["A. の", "B. こと", "C. が", "D. を"], "ans": "A", "exp": "句尾用です时，の和こと都可以，但の更口语化"}, {"q": "料理を作る（____）上手ですね。", "opts": ["A. のを", "B. のに", "C. のが", "D. のは"], "ans": "C", "exp": "表示能力或状态时，用「〜のが+形容词」的句型"}]}, "28": {"analysis": "「〜ために」是N4重要文法，表示目的或原因。作目的时相当于中文「为了」，作原因时相当于「因为/由于」。需要根据语境判断是目的还是原因用法。", "mistakes": "易错点：目的和原因用法混淆。❌雨のために、散歩に行きました。→ ✅雨のために、散歩に行けませんでした。（原因用法应该是消极结果）", "similar": [{"form": "〜ように", "diff": "ために表直接目的，ように表期望的状态变化"}, {"form": "〜ので", "diff": "ために可表目的和原因，ので只表原因且更客观"}], "quiz": [{"q": "日本語を勉強____、日本に行きました。", "opts": ["A.するために", "B.したために", "C.しているために", "D.してために"], "ans": "A", "exp": "目的用法用辞書形，「勉強するために」表示「为了学习」"}, {"q": "事故____、電車が遅れました。", "opts": ["A.するために", "B.したために", "C.のために", "D.をために"], "ans": "C", "diff": "名詞+のために表原因，「事故のために」表示「因为事故」"}, {"q": "試験に合格____、一生懸命勉強しています。", "opts": ["A.したために", "B.するために", "C.しているために", "D.のために"], "ans": "B", "exp": "目的用法，「合格するために」表示「为了合格」这一目的"}]}, "29": {"analysis": "「〜ように」是N4重要文法，表示三种用法：①目的（为了达到某种结果）②样态（像某种状态一样）③指示（要求做到某种程度）。与「〜ために」不同，「ように」后接的动词通常是无意志动词或可能形，强调自然发生的状态或结果。", "mistakes": "❌ 合格するように、勉強したいです → ✅ 合格するために、勉強したいです（表目的用ために）❌ 静かなように話してください → ✅ 静かに話してください（副词修饰用に）❌ 忘れるようにしないでください → ✅ 忘れないようにしてください（否定形接续）", "similar": [{"form": "〜ために", "diff": "ために表主观目的，ように表客观结果或状态"}, {"form": "〜みたいに", "diff": "みたいに更口语化，主要表比喻样态"}, {"form": "〜そうに", "diff": "そうに表看起来的样子，ように表实际的方式"}], "quiz": [{"q": "風邪を____、気をつけてください。", "opts": ["A.ひかないように", "B.ひかないために", "C.ひかないそうに", "D.ひかないみたいに"], "ans": "A", "exp": "表示为了不感冒的目的，用「ひかないように」"}, {"q": "子供が____、静かに話しましょう。", "opts": ["A.起きるために", "B.起きないように", "C.起きそうに", "D.起きるみたいに"], "ans": "B", "exp": "为了不吵醒孩子，用「起きないように」表目的"}, {"q": "彼は鳥____自由に空を飛んでいる。", "opts": ["A.のように", "B.のために", "C.らしく", "D.について"], "ans": "A", "exp": "表示像鸟一样的样态，用「のように」"}]}, "30": {"analysis": "「〜ようになる」表示通过某种变化过程，获得了之前没有的能力或状态。与瞬间性的「できる」不同，它强调渐进的变化过程。常与「練習して」「慣れて」等表示过程的词语搭配使用。", "mistakes": "❌ 昨日からピアノが弾けるようになりました → ✅ 練習して、ピアノが弾けるようになりました（需要体现变化过程，不是突然获得能力）", "similar": [{"form": "〜ことができる", "diff": "表示现在的能力状态，不强调变化过程"}, {"form": "〜ようにする", "diff": "表示有意识的努力或决心，主观意志性强"}], "quiz": [{"q": "毎日練習して、やっと自転車に（____）ようになりました。", "opts": ["A. 乗る", "B. 乗れる", "C. 乗って", "D. 乗った"], "ans": "B", "exp": "表示获得能力用可能形＋ようになる"}, {"q": "子供の頃は野菜が嫌いでしたが、今は（____）ようになりました。", "opts": ["A. 食べない", "B. 食べる", "C. 食べられる", "D. 食べて"], "ans": "C", "exp": "从不喜欢到能吃，表示能力变化用可能形"}, {"q": "日本に来てから、箸を上手に（____）ようになりました。", "opts": ["A. 使う", "B. 使える", "C. 使って", "D. 使った"], "ans": "A", "exp": "「上手に使う」本身就表示能力，直接用辞書形即可"}]}, "31": {"analysis": "「〜ようにする」表示说话人有意识地努力做某事，强调主观意志和持续性努力。与单纯的「〜する」不同，它含有「努力去做」「注意做」的语感，常用于表达好习惯的养成或坏习惯的改正。", "mistakes": "易错点：与「〜ようになる」混淆。❌毎日運動するようになります → ✅毎日運動するようにします（表示自己的努力意志）；❌早く寝ないようになる → ✅早く寝ないようにする（表示努力不晚睡）", "similar": [{"form": "〜ようになる", "diff": "「ようになる」表示自然变化或能力获得，无主观意志；「ようにする」表示有意识的努力"}, {"form": "〜ことにする", "diff": "「ことにする」表示决定做某事，一次性决定；「ようにする」表示持续性的努力习惯"}], "quiz": [{"q": "健康のために、お酒を____。", "opts": ["A. 飲まないようにする", "B. 飲まないようになる", "C. 飲まないことになる", "D. 飲まないはずだ"], "ans": "A", "exp": "表示为了健康而努力不喝酒，是主观意志的体现，用「ようにする」"}, {"q": "子供の頃は野菜が嫌いでしたが、今は食べられる____。", "opts": ["A. ようにする", "B. ようになりました", "C. ことにしました", "D. はずです"], "ans": "B", "exp": "表示能力或状态的自然变化，从不能吃到能吃，用「ようになる」"}, {"q": "医者に言われて、塩分を少なく____。", "opts": ["A. するようになった", "B. することになった", "C. するようにしている", "D. するはずだった"], "ans": "C", "exp": "表示听从医生建议，努力减少盐分摄取，是持续性的努力行为"}]}, "32": {"analysis": "「〜すぎる」表示程度过度，超出正常范围，通常带有负面含义。动词接续时去掉「ます」，形容词去掉「い」或「な」后直接加「すぎる」。该文法强调的是「过头了」的概念，暗示这种过度状态会带来不良后果。", "mistakes": "❌ 美味しいすぎる → ✅ 美味しすぎる（い形容词去掉い）\n❌ 静かなすぎる → ✅ 静かすぎる（な形容词去掉な）\n❌ 勉強しますすぎる → ✅ 勉強しすぎる（动词去掉ます）", "similar": [{"form": "〜とても/すごく", "diff": "とても表示程度很高但不过度，すぎる强调超出正常限度"}, {"form": "〜ばかり", "diff": "ばかり表示只做某事，すぎる表示做得过度"}, {"form": "あまり〜", "diff": "あまり用于否定句表示不太，すぎる用于肯定句表示过于"}], "quiz": [{"q": "昨日は勉強____、今日は頭が痛いです。", "opts": ["A. しすぎて", "B. しますすぎて", "C. するすぎて", "D. すぎて"], "ans": "A", "exp": "动词「勉強します」去掉「ます」变成「勉強し」，再加「すぎて」"}, {"q": "この料理は辛____、食べられません。", "opts": ["A. いすぎて", "B. すぎて", "C. くすぎて", "D. なすぎて"], "ans": "B", "exp": "い形容词「辛い」去掉「い」变成「辛」，再加「すぎて」"}, {"q": "部屋が____、窓を開けました。", "opts": ["A. 暖かいすぎるから", "B. 暖かなすぎるから", "C. 暖かすぎるから", "D. 暖かくすぎるから"], "ans": "C", "exp": "い形容词「暖かい」去掉「い」加「すぎる」变成「暖かすぎる」"}]}, "33": {"analysis": "「〜し〜し」是N4重要的并列助词，用于列举多个理由或条件，强调这些因素都成立。与「〜て〜て」不同，「し」更强调理由性，常用于说明判断或决定的根据。语气比较随意，多用于口语。", "mistakes": "❌ 彼は優しいだし、頭もいいだし → ✅ 彼は優しいし、頭もいいし（「だし」是重复，直接用「し」）❌ 雨が降るし、寒いし、だから家にいます → ✅ 雨も降るし、寒いし、家にいます（避免「だから」重复表达因果关系）", "similar": [{"form": "〜て〜て", "diff": "「て」表示动作的连续或状态的并列，「し」更强调列举理由"}, {"form": "〜から〜から", "diff": "「から」明确表示因果关系，「し」语气更轻松，理由性稍弱"}], "quiz": [{"q": "今日は時間もない（____）、お金もない（____）、映画は見られない。", "opts": ["A. し、し", "B. て、て", "C. から、から", "D. けど、けど"], "ans": "A", "exp": "列举两个理由说明不能看电影，用「し」最自然"}, {"q": "この町は静か（____）、空気もきれい（____）、住みやすいです。", "opts": ["A. だから、だから", "B. し、し", "C. ので、ので", "D. けれど、けれど"], "ans": "B", "exp": "并列列举这个町的优点，用「し」表示多个积极因素"}, {"q": "彼女は料理も上手（____）、歌も上手（____）、本当にすごいですね。", "opts": ["A. で、で", "B. だし、だし", "C. し、し", "D. な、な"], "ans": "C", "exp": "形容动词词干后直接加「し」，不需要「だ」"}]}, "34": {"analysis": "〜ても表示逆接让步，即使前项条件成立，后项结果也不会改变。与中文'即使...也...'完全对应，是表达坚定意志或客观事实不受条件影响的重要句型。动词用て形+も，い形容词去い+くても，な形容词/名词+でも。", "mistakes": "时态混用：❌明日雨が降ったても行きます → ✅明日雨が降っても行きます；形容词接续错误：❌高いても買います → ✅高くても買います；な形容词接续：❌静かても勉強できません → ✅静かでも勉強できません", "similar": [{"form": "〜けれど/けど", "diff": "けれど表示轻微对比转折，ても表示强烈让步，语气更坚决"}, {"form": "〜のに", "diff": "のに表示意外的逆接结果，ても表示预设条件下的坚持"}], "quiz": [{"q": "どんなに忙し（____）、家族との時間を大切にします。", "opts": ["A.ても", "B.くても", "C.でも", "D.ので"], "ans": "B", "exp": "い形容词忙しい去い+くても，表示即使再忙也要珍惜家庭时间"}, {"q": "彼は病気（____）、毎日会社に来ています。", "opts": ["A.ても", "B.くても", "C.でも", "D.だから"], "ans": "C", "exp": "な形容词/名词病気+でも，表示即使生病也每天来公司"}, {"q": "いくら説明し（____）、彼は理解してくれません。", "opts": ["A.ても", "B.くても", "C.でも", "D.たら"], "ans": "A", "exp": "動詞説明するのて形+も，表示无论怎么解释他都不理解"}]}, "35": {"analysis": "「〜のに」表示期待与现实的落差，带有说话者的不满或意外情绪。与「〜けれど」等单纯逆接不同，「のに」强调结果与预期相反的遗憾心情。接续时，い形容词和な形容词词干直接加「のに」，动词和名词用普通形。", "mistakes": "时态混用：❌明日雨が降るのに、ピクニックに行きます → ✅明日雨が降るのに、ピクニックに行くつもりです（表达不满时应保持时态一致）；敬语误用：❌先生が来られたのに、誰もいません → ✅先生が来たのに、誰もいません（のに前不用敬语）", "similar": [{"form": "〜けれど", "diff": "けれど是中性逆接，のに带有不满情绪"}, {"form": "〜ても", "diff": "ても表示假设让步，のに表示既成事实的逆接"}, {"form": "〜くせに", "diff": "くせに含有轻蔑批判，のに是不满遗憾"}], "quiz": [{"q": "高い薬を飲んだ____、病気が治らない。", "opts": ["A. のに", "B. ので", "C. から", "D. けれど"], "ans": "A", "exp": "表示期待落空的不满情绪，用「のに」最恰当"}, {"q": "彼は約束した____、来なかった。", "opts": ["A. ので", "B. のに", "C. のは", "D. のを"], "ans": "B", "exp": "约定了却没来，表达说话者的不满，用「のに」"}, {"q": "天気がいい____、外に出たくない。", "opts": ["A. のに", "B. ので", "C. ために", "D. ように"], "ans": "A", "exp": "天气好却不想出门，表示与常理相反的情况，用「のに」"}]}, "36": {"analysis": "「〜間に」表示在某个时间段内发生动作，强调时间的界限性。「間に」后接瞬间动作，「間」后接持续状态。与中文「在...期间」相似，但日语更注重动作的完结性。", "mistakes": "易错点：时间表达混淆。❌ 勉強している間に、音楽を聞きます → ✅ 勉強している間、音楽を聞きます（持续状态用「間」）❌ 休憩の間、コーヒーを飲みました → ✅ 休憩の間に、コーヒーを飲みました（瞬间动作用「間に」）", "similar": [{"form": "〜うちに", "diff": "「うちに」强调趁某状态还存在时行动，带有紧迫感；「間に」是中性的时间表达"}, {"form": "〜時に", "diff": "「時に」表示具体时刻，「間に」表示时间段"}], "quiz": [{"q": "母が買い物に行っている____、掃除をしました。", "opts": ["A. 間に", "B. 間", "C. 時に", "D. うちに"], "ans": "A", "exp": "瞬间完成的「掃除」动作在持续状态中发生，用「間に」"}, {"q": "会議の____、ずっと資料を読んでいました。", "opts": ["A. 間に", "B. 間", "C. 時", "D. 頃"], "ans": "B", "exp": "持续状态「読んでいる」在时间段内进行，用「間」"}, {"q": "子供が寝ている____に、仕事を終わらせたいです。", "opts": ["A. 間", "B. 時", "C. 間に", "D. 頃に"], "ans": "C", "exp": "趁孩子睡觉的时间段内完成工作这个动作，用「間に」"}]}, "37": {"analysis": "「〜前に」和「〜後で」是表示时间顺序的重要文法，前者用动词辞书形，后者用动词た形。注意「前に」后面常用助词「に」，而「後で」用「で」，这是因为「前に」表示时间点，「後で」表示时间段或状态。", "mistakes": "易错点：❌ 寝た前に、歯を磨きます → ✅ 寝る前に、歯を磨きます（前に前面用辞书形）；❌ 食べる後で、薬を飲みます → ✅ 食べた後で、薬を飲みます（後で前面用た形）", "similar": [{"form": "〜てから", "diff": "〜てから强调前一动作完成后才进行后一动作，而〜た後で只是单纯表示时间先后"}, {"form": "〜ときに", "diff": "〜ときに表示某个时间点发生的事，不强调先后顺序关系"}], "quiz": [{"q": "学校に行く____、朝ごはんを食べます。", "opts": ["A. 前に", "B. 後で", "C. 前で", "D. 後に"], "ans": "A", "exp": "去学校之前吃早饭，表示先后顺序，用「前に」"}, {"q": "宿題を____、テレビを見ました。", "opts": ["A. する前に", "B. する後で", "C. した前に", "D. した後で"], "ans": "D", "exp": "做完作业后看电视，「後で」前面用动词た形"}, {"q": "映画を見る____、ポップコーンを買いましょう。", "opts": ["A. 前に", "B. 後で", "C. 前で", "D. 後に"], "ans": "A", "exp": "看电影之前买爆米花，表示先买后看的顺序"}]}, "38": {"analysis": "「〜時」是表示时间关系的重要文法，用于描述某个动作或状态发生的时间点。与中文「的时候」相对应，但日语中可以省略助词「に」。需要注意动词时态的呼应关系。", "mistakes": "❌ 困る時は、遠慮なく言ってください → ✅ 困った時は、遠慮なく言ってください（应使用过去形表示假定状况）", "similar": [{"form": "〜とき vs 〜ながら", "diff": "〜時是时间点，〜ながら表示同时进行的两个动作"}, {"form": "〜時 vs 〜間", "diff": "〜時表示时间点，〜間表示持续的时间段"}], "quiz": [{"q": "日本に____時、桜がきれいでした。", "opts": ["A. 行く", "B. 行った", "C. 行って", "D. 行き"], "ans": "B", "exp": "过去的具体经验用过去形，表示「去日本的时候」"}, {"q": "暇な____、本を読みます。", "opts": ["A. 時に", "B. 時で", "C. 時を", "D. 時は"], "ans": "A", "exp": "形容词词干+な+時に，表示「空闲的时候」"}, {"q": "子供の____、よく公園で遊びました。", "opts": ["A. 時に", "B. 時で", "C. 時が", "D. 時から"], "ans": "A", "exp": "名词+の+時に，表示「小时候」的习惯性动作"}]}, "39": {"analysis": "「〜ていただけますか」是敬语表达，表示对对方的礼貌请求。相比「〜てください」更加谦逊客气，适用于对长辈、客户、初次见面的人等需要表示敬意的场合。这个文法体现了日语敬语中「谦让语」的特点，通过降低自己的立场来提升对方的地位。", "mistakes": "易混淆敬语等级：❌「すみません、手伝ってください」（对上级太直接）→ ✅「恐れ入りますが、お手伝いいただけますか」；时态错误：❌「昨日来ていただけますか」→ ✅「明日来ていただけますか」（请求用于将来行为）", "similar": [{"form": "〜てください", "diff": "普通敬语，「いただけますか」更谦逊客气"}, {"form": "〜てもらえますか", "diff": "普通语体，「いただけますか」是敬语体"}, {"form": "〜ていただきたいのですが", "diff": "更加委婉间接的表达方式"}], "quiz": [{"q": "すみません、このかばんを____いただけますか。", "opts": ["A.持って", "B.持つ", "C.持った", "D.持ち"], "ans": "A", "exp": "「いただけますか」前面用动词て形，「持つ」的て形是「持って」"}, {"q": "会議に____いただけますか。", "opts": ["A.出席して", "B.出席を", "C.出席に", "D.出席が"], "ans": "A", "exp": "「出席する」的て形是「出席して」，构成「出席していただけますか」"}, {"q": "明日____いただけますか。", "opts": ["A.来る", "B.来て", "C.来た", "D.来ます"], "ans": "B", "exp": "「来る」的て形是「来て」，用于构成敬语请求表达"}]}, "40": {"analysis": "お〜になる/ご〜になる是日语中最基础的尊敬语表现形式，用来表示对方或第三者的动作，体现说话者的敬意。「お」多用于和语词汇，「ご」多用于汉语词汇，这种敬语形式在商务场合和日常礼貌用语中使用频率极高。", "mistakes": "易错点：词汇选择和语境使用。❌ 私はお帰りになります → ✅ 私は帰ります（不能对自己使用尊敬语）；❌ ご来店になる → ✅ お越しになる（部分词汇有固定搭配）；❌ お食べになる → ✅ 召し上がる（「食べる」的尊敬语是特殊形式）", "similar": [{"form": "〜れる/られる（尊敬）", "diff": "お〜になる更加郑重，多用于正式场合；れる/られる较为简洁，日常对话中常用"}, {"form": "いらっしゃる", "diff": "いらっしゃる是「いる・来る・行く」的特殊尊敬语，而お〜になる适用范围更广"}], "quiz": [{"q": "部長はもう____。", "opts": ["A. お帰りです", "B. お帰りになりました", "C. 帰りになりました", "D. 帰られました"], "ans": "B", "exp": "「お帰りになる」是「帰る」的正确尊敬语形式，过去时用「になりました」"}, {"q": "お客様は何を____ますか。", "opts": ["A. お飲みに", "B. 飲まれ", "C. 召し上がり", "D. お飲みになり"], "ans": "C", "exp": "「飲む」的尊敬语是「召し上がる」，不用お〜になる的形式"}, {"q": "田中さんは____いらっしゃいますか。", "opts": ["A. お元気で", "B. 元気に", "C. お元気に", "D. 元気で"], "ans": "A", "exp": "「元気」前加「お」表示尊敬，「元気でいる」的敬语是「お元気でいらっしゃる」"}]}, "41": {"analysis": "お〜する/ご〜する是日语谦让语的基本形式，表示说话者为对方做某事时的谦逊态度。「お」多用于和语动词，「ご」多用于汉语动词，这种敬语形式体现了日本文化中的上下级关系和礼貌意识。", "mistakes": "❌ 自分の荷物をお持ちします → ✅ お客様の荷物をお持ちします（谦让语不能用于自己的行为，必须是为他人做的事）❌ ご読書します → ✅ ご案内します（读书是自己的行为，不能用谦让语）", "similar": [{"form": "〜させていただく", "diff": "更加郑重的谦让表现，强调「让我做」的许可感"}, {"form": "〜て差し上げる", "diff": "给予的谦让语，强调为对方提供帮助或服务"}], "quiz": [{"q": "お客様の資料を（____）。", "opts": ["A. お作りします", "B. お作ります", "C. 作りお します", "D. お作るします"], "ans": "A", "exp": "お＋動詞ます形＋する的正确形式是「お作りします」"}, {"q": "明日、駅まで（____）。", "opts": ["A. お送りします", "B. ご送りします", "C. 送りおします", "D. お送ります"], "ans": "A", "exp": "「送る」是和语动词，用「お」，完整形式是「お送りします」"}, {"q": "会議室を（____）。", "opts": ["A. お準備します", "B. ご準備します", "C. 準備おします", "D. お準備ります"], "ans": "B", "exp": "「準備」是汉语词汇，应该用「ご」，正确答案是「ご準備します」"}]}, "42": {"analysis": "「〜ていただく」是「〜てもらう」的谦让语形式，用于谦逊地表示接受他人帮助或恩惠。与「〜てもらう」相比，「〜ていただく」体现了对帮助者的尊敬，常用于正式场合或对上级、长辈表达感谢。这个文法强调受益者（自己）的谦逊态度。", "mistakes": "容易与「〜てくださる」混淆。❌先生が作文を見ていただきました → ✅先生に作文を見ていただきました（助词用「に」不用「が」）；❌友達をていただく → ✅友達にしていただく（必须用动词て形）", "similar": [{"form": "〜てもらう", "diff": "普通语，不含敬语色彩，日常对话中使用"}, {"form": "〜てくださる", "diff": "尊敬语，强调给予者的行为，主语是帮助者"}, {"form": "〜ていただける", "diff": "可能形式，表示「能够承蒙~」，语气更加委婉"}], "quiz": [{"q": "部長に資料を（　　）いただきました。", "opts": ["A.作って", "B.作られて", "C.作らせて", "D.作るて"], "ans": "A", "exp": "「〜ていただく」前接动词て形，「作って」是「作る」的て形"}, {"q": "田中さん（　　）手伝っていただけませんか。", "opts": ["A.が", "B.を", "C.に", "D.で"], "ans": "C", "exp": "「〜ていただく」的帮助者用助词「に」标示"}, {"q": "以下哪个表达最谦逊？", "opts": ["A.教えてもらった", "B.教えていただいた", "C.教えてくれた", "D.教えられた"], "ans": "B", "exp": "「教えていただいた」是谦让语，最能体现说话者的谦逊态度"}]}, "43": {"analysis": "「〜ございます」是日语中最高级别的敬语表达，相当于「〜です」的最礼貌形式。主要用于服务行业、商务场合或对地位较高的人说话时。「ございます」本身是「あります」的敬语形式，与各种词汇结合使用时体现出说话者的谦逊态度和对听话者的尊重。", "mistakes": "❌ お忙しいですね。→ ✅ お忙しくていらっしゃいますね。（对客人说忙碌时不能用ございます）❌ 私は田中ございます。→ ✅ 私は田中でございます。（自我介绍时需要用でございます形式）❌ ありがとうございました。→ ✅ ありがとうございます/ありがとうございました。（两种都可以，但场合不同）", "similar": [{"form": "〜です", "diff": "普通礼貌语，日常会话使用"}, {"form": "〜であります", "diff": "军队、警察等特殊场合的敬语"}, {"form": "〜いらっしゃいます", "diff": "对他人行为的尊敬语表达"}], "quiz": [{"q": "店员对客人说「いらっしゃいませ。何か____」", "opts": ["A. お探しですか", "B. お探しございますか", "C. お探しでございますか", "D. 探していますか"], "ans": "C", "exp": "对客人使用最高敬语「でございます」表示礼貌，询问是否在寻找什么商品"}, {"q": "接待员自我介绍：「私、受付の山田____」", "opts": ["A. です", "B. であります", "C. でございます", "D. だ"], "ans": "C", "exp": "接待场合自我介绍时使用「でございます」表示谦逊和礼貌"}, {"q": "客服回应客人感谢：「____。またお越しください。」", "opts": ["A. どういたしまして", "B. とんでもございません", "C. いえいえ", "D. 大丈夫です"], "ans": "B", "exp": "「とんでもございません」是「とんでもない」的最高敬语形式，用于谦逊地回应感谢"}]}, "44": {"analysis": "「〜ほど」是表示程度或比喻的重要句型，有两种主要用法：①单独使用时表示「到了某种程度」，常用于夸张表达；②「〜ば〜ほど」形式表示「越...越...」的比例关系。需注意区分其程度表达和比例表达的不同语境。", "mistakes": "❌ 彼は天才ほど賢いです → ✅ 彼は天才ほど賢くはありません（否定形更自然）/ ❌ 勉強すればするほど、頭がよくなります → ✅ 勉強すればするほど、成績がよくなります（逻辑更合理）", "similar": [{"form": "〜くらい/〜ぐらい", "diff": "「ほど」多用于夸张表达和比例关系；「くらい」更多表示大概的程度"}, {"form": "〜につれて", "diff": "「につれて」强调伴随变化；「〜ば〜ほど」强调比例递增关系"}], "quiz": [{"q": "昨日は（____）忙しくて、昼ご飯を食べる時間もありませんでした。", "opts": ["A. 死ぬほど", "B. 死ぬくらい", "C. 死ぬまで", "D. 死ぬばかり"], "ans": "A", "exp": "表示程度极高的夸张表达，「死ぬほど」最适合"}, {"q": "練習すれば（____）、上手になります。", "opts": ["A. するたび", "B. するほど", "C. するばかり", "D. するまま"], "ans": "B", "exp": "「〜ば〜ほど」表示「越...越...」的比例关系"}, {"q": "彼女の歌声は天使の声（____）美しい。", "opts": ["A. ほど", "B. まで", "C. ばかり", "D. だけ"], "ans": "A", "exp": "「〜ほど」用于比喻表达，表示达到某种程度"}]}, "45": {"analysis": "「だけ」是N4重要助词，表示限定范围或程度。可接名词、动词辞书形等，常与「で」搭配使用。需区分限定用法（只有）和程度用法（...的程度）两种含义。", "mistakes": "❌ 私だけが行きます → ✅ 私だけ行きます（限定时不需要「が」）\n❌ できるだけで頑張ります → ✅ できるだけ頑張ります（程度表达时通常不加「で」）", "similar": [{"form": "〜しか", "diff": "「しか」必须与否定形搭配，「だけ」可用肯定形"}, {"form": "〜ばかり", "diff": "「ばかり」强调大致数量，「だけ」强调精确限定"}], "quiz": [{"q": "お金は1000円____持っていません。", "opts": ["A.だけ", "B.しか", "C.ばかり", "D.など"], "ans": "B", "exp": "否定文中表示限定用「しか」，不用「だけ」"}, {"q": "この本は____読みました。他の本は読んでいません。", "opts": ["A.だけを", "B.だけに", "C.だけ", "D.だけで"], "ans": "C", "exp": "限定范围时用「だけ」，不需要格助词"}, {"q": "食べられる____食べてください。", "opts": ["A.だけを", "B.だけ", "C.しか", "D.ばかり"], "ans": "B", "exp": "「食べられるだけ」表示能吃多少的程度范围"}]}, "46": {"analysis": "「〜しか〜ない」是表示限定的重要句型，强调数量少或范围窄，含有「不够、不足」的语感。与中文「只有」不同，日语这个句型必须与否定形「ない」搭配使用，体现了日语特有的否定表达习惯。", "mistakes": "易错点：忘记使用否定形。❌ お金が100円しかあります → ✅ お金が100円しかありません。助词误用：❌ 時間をしかない → ✅ 時間しかない。", "similar": [{"form": "〜だけ", "diff": "「だけ」是中性限定，可配肯定否定；「しか」必配否定，强调不足感"}, {"form": "〜のみ", "diff": "「のみ」较正式，中性限定；「しか」口语化，强调不够的感情色彩"}], "quiz": [{"q": "友達が二人____来ませんでした。", "opts": ["A. だけ", "B. しか", "C. のみ", "D. ばかり"], "ans": "B", "exp": "「しか」必须与否定形搭配，表示只有两个朋友没来，强调人数少"}, {"q": "この店は日曜日____開いていません。", "opts": ["A. しか", "B. だけで", "C. しかに", "D. ばかり"], "ans": "A", "exp": "表示只有周日不开门，「しか」与否定形「ていません」搭配使用"}, {"q": "漢字を10個____覚えていません。", "opts": ["A. だけ", "B. しかに", "C. しか", "D. のみ"], "ans": "C", "exp": "表示只记住了10个汉字，数量不够，用「しか」强调不足"}]}, "47": {"analysis": "「さえ」表示极端例子或最低条件，有两种用法：①「でさえ」表示「就连...都...」，强调连最不可能的情况都发生；②「さえ...ば」表示「只要...就...」，强调最低限度的条件。这个语法点体现了日语中通过举极端例子来强调程度的表达方式。", "mistakes": "易混淆「さえ」和「も」的区别。❌ 子どももこの問題は解けます → ✅ 子どもでさえこの問題は解けます（「さえ」比「も」更强调意外性和极端性）；❌ お金さえがあれば → ✅ お金さえあれば（「さえ」后不加助词「が」「を」等）", "similar": [{"form": "〜でも", "diff": "「でも」表示一般的举例，「でさえ」表示极端例子，语气更强"}, {"form": "〜だけ", "diff": "「だけ」表示限定范围，「さえ」表示最低条件或极端例子"}, {"form": "〜ば", "diff": "「ば」是一般条件，「さえ〜ば」强调最低限度的条件"}], "quiz": [{"q": "彼は忙しくて、食事を____時間がない。", "opts": ["A. する", "B. さえ", "C. とる", "D. さえとる"], "ans": "D", "exp": "「さえ」用于否定句中表示「连...都不...」，这里是「食事をとる時間さえない」（连吃饭的时间都没有）"}, {"q": "この薬は一日____飲めば、すぐ治ります。", "opts": ["A. 一度さえ", "B. 一度でも", "C. 一度だけ", "D. 一度も"], "ans": "A", "exp": "「さえ〜ば」表示最低条件，「一日一度さえ飲めば」意思是「一天只要吃一次就...」"}, {"q": "先生____知らない問題だから、私たちには無理だ。", "opts": ["A. も", "B. でさえ", "C. だけ", "D. ばかり"], "ans": "B", "exp": "「でさえ」用于举极端例子，「先生でさえ知らない」强调连老师都不知道，更别说学生了"}]}, "48": {"analysis": "「〜ながら」表示两个动作同时进行，前项是伴随动作，后项是主要动作。与中文'一边...一边...'完全对应，但日语中ながら前的动作通常是次要的背景动作。此文法强调动作的同时性和持续性。", "mistakes": "❌ 歩くながら話します → ✅ 歩きながら話します（必须用ます形去掉ます）\n❌ 食べながら本を読みました → ✅ 本を読みながら食べました（主要動作放后面更自然）", "similar": [{"form": "〜て", "diff": "て形表示动作顺序，ながら表示同时进行"}, {"form": "〜とき", "diff": "とき表示时间点，ながら表示持续的同时动作"}], "quiz": [{"q": "テレビを（　　）、夕食を食べます。", "opts": ["A.見ながら", "B.見てながら", "C.見るながら", "D.見ながらで"], "ans": "A", "exp": "動詞ます形去掉ます直接加ながら，見ます→見ながら"}, {"q": "彼は歌を（　　）、ギターを弾いています。", "opts": ["A.歌いて", "B.歌いながら", "C.歌ってながら", "D.歌うながら"], "ans": "B", "exp": "歌います→歌いながら，表示同时进行唱歌和弹吉他"}, {"q": "雨が（　　）、散歩しました。", "opts": ["A.降りながら", "B.降ってながら", "C.降るながら", "D.降っています"], "ans": "A", "exp": "降ります→降りながら，表示在下雨的同时散步"}]}, "49": {"analysis": "〜によって是N4级别的重要助词，具有三大核心用法：①表示手段方法（通过某种方式）②表示原因理由（由于某种原因）③构成被动句的施动者（被某人做）。需要注意によって可以直接修饰动词，而による则需要修饰名词，这是语法运用的关键区别点。", "mistakes": "❌ 地震によって建物は壊された → ✅ 地震によって建物が壊された（助词が不能省略）\n❌ 先生によるの説明 → ✅ 先生による説明（による后直接接名词）\n❌ 雨によって中止になった → ✅ 雨のために中止になった（自然现象导致的结果多用ため）", "similar": [{"form": "〜のために", "diff": "によって侧重客观原因/手段，のために侧重目的或主观原因"}, {"form": "〜で", "diff": "で表示具体工具手段，によって表示抽象方法手段"}, {"form": "〜から", "diff": "から强调直接原因起点，によって强调间接原因媒介"}], "quiz": [{"q": "この絵は有名な画家（　　）描かれました。", "opts": ["A.によって", "B.のために", "C.から", "D.まで"], "ans": "A", "exp": "被动句中表示动作的执行者用によって"}, {"q": "国（　　）文化が違います。", "opts": ["A.による", "B.によって", "C.のため", "D.について"], "ans": "B", "exp": "表示根据不同标准而产生差异，用によって"}, {"q": "コンピューター（　　）計算が速くなりました。", "opts": ["A.のために", "B.について", "C.によって", "D.までに"], "ans": "C", "exp": "表示通过某种手段工具实现某种结果，用によって"}]}, "51": {"analysis": "「〜てから」表示动作的先后顺序，强调必须先完成前一个动作，然后再进行后一个动作。与中文「先...再...」「...之后再...」对应，是表示时间顺序的重要语法。", "mistakes": "❌ 手を洗うから、食べてください → ✅ 手を洗ってから、食べてください（必须用て形+から，不能用辞书形+から）", "similar": [{"form": "〜あとで", "diff": "〜てから强调紧接着的顺序，〜あとで可以有时间间隔"}, {"form": "〜まえに", "diff": "〜まえに表示「在...之前」，〜てから表示「...之后」"}], "quiz": [{"q": "宿題を____、遊びましょう。", "opts": ["A. してから", "B. するから", "C. したから", "D. しているから"], "ans": "A", "exp": "表示先后顺序用「動詞て形+から」，所以是「してから」"}, {"q": "薬を____、寝てください。", "opts": ["A. 飲むから", "B. 飲んでから", "C. 飲んだから", "D. 飲んでいるから"], "ans": "B", "exp": "「飲む」的て形是「飲んで」，所以是「飲んでから」"}, {"q": "映画を____、レストランに行きました。", "opts": ["A. 見るから", "B. 見たから", "C. 見てから", "D. 見ているから"], "ans": "C", "exp": "表示「看完电影之后去餐厅」的顺序，用「見てから」"}]}, "52": {"analysis": "「〜たことがある」是表示过去经验的重要句型，强调某种行为或状态在过去发生过至少一次。与中文「有过~的经历」对应，但日语更侧重于经验的存在性而非具体时间。否定形「〜たことがない」表示从未有过某种经验，常用于描述人生阅历。", "mistakes": "时态混淆：❌ 明日富士山に登ったことがあります → ✅ 明日富士山に登る予定です（未来不用过去经验句型）；动词形式错误：❌ 食べることがある → ✅ 食べたことがある（必须用た形）", "similar": [{"form": "〜ことがある（習慣・可能性）", "diff": "表示习惯性动作或可能性，用动词原形；经验用法必须用た形"}, {"form": "〜たことがない", "diff": "表示从未有过的经验，是肯定形的否定表达"}], "quiz": [{"q": "私は一度も海外に（____）ことがありません。", "opts": ["A. 行く", "B. 行った", "C. 行き", "D. 行って"], "ans": "B", "exp": "表示经验时必须用动词た形，「行った」是「行く」的た形"}, {"q": "あなたは納豆を（____）ことがありますか。", "opts": ["A. 食べる", "B. 食べ", "C. 食べた", "D. 食べて"], "ans": "C", "exp": "询问是否有过吃纳豆的经验，需要用た形「食べた」"}, {"q": "彼は日本の映画を見た（____）がない。", "opts": ["A. こと", "B. もの", "C. の", "D. ところ"], "ans": "A", "exp": "「〜たことがない」是固定句型，表示从未有过某种经验"}]}, "53": {"analysis": "「〜たばかり」表示动作刚刚完成不久，强调时间的接近性。与中文「刚刚」相似，但日语更强调动作完成后的余韵。常与「です/である」搭配使用，表示客观陈述刚完成的事实。", "mistakes": "❌ 昼ご飯を食べるばかりです → ✅ 昼ご飯を食べたばかりです（必须用た形）；❌ 来たばかりの人 → ✅ 来たばかりの人です（句末需要谓语）", "similar": [{"form": "〜たところ", "diff": "「たところ」更强调时点的一致性，「たばかり」强调时间的接近性"}, {"form": "〜て間もない", "diff": "「て間もない」更正式，多用于书面语，「たばかり」更口语化"}], "quiz": [{"q": "彼は大学を____。", "opts": ["A. 卒業するばかりだ", "B. 卒業したばかりだ", "C. 卒業ばかりだ", "D. 卒業のばかりだ"], "ans": "B", "exp": "「たばかり」必须接在動詞た形后面，表示刚刚完成的动作"}, {"q": "赤ちゃんが____、まだ歩けません。", "opts": ["A. 生まれたばかりで", "B. 生まれるばかりで", "C. 生まれているばかりで", "D. 生まればかりで"], "ans": "A", "exp": "表示「刚出生」用「生まれたばかり」，で表示原因"}, {"q": "この本を____から、まだよくわかりません。", "opts": ["A. 読むばかり", "B. 読んでいるばかり", "C. 読んだばかり", "D. 読みばかり"], "ans": "C", "exp": "「読んだばかり」表示刚读完，与后句「还不太懂」形成逻辑关系"}]}, "54": {"analysis": "这三个文法是动词复合形式，表示动作的开始、结束和持续状态。接续时需要将前面的动词变为ます形后去掉ます，再加上始める/終わる/続ける。这类复合动词在日语中使用频率很高，是表达动作状态变化的重要语法点。", "mistakes": "易错点：❌雨が降る始めました → ✅雨が降り始めました（必须用ます形去掉ます）；❌本を読んで続けます → ✅本を読み続けます（不能用て形）；❌勉強が終わりました → ✅勉強を終わりました（注意助词使用）", "similar": [{"form": "〜出す", "diff": "出す强调突然开始的动作，始める强调动作的开端过程"}, {"form": "〜ている", "diff": "ている表示持续状态，続ける强调有意识地持续进行"}], "quiz": [{"q": "彼は昨日から日本語を（____）。", "opts": ["A. 習い始めました", "B. 習う始めました", "C. 習って始めました", "D. 習い出しました"], "ans": "A", "exp": "动词复合形需要用ます形去掉ます+始める的形式"}, {"q": "やっと宿題を（____）。", "opts": ["A. し終わります", "B. して終わります", "C. 終わりました", "D. し終わりました"], "ans": "D", "exp": "する的ます形是します，去掉ます后是し，所以是し終わりました"}, {"q": "毎日運動を（____）います。", "opts": ["A. し続け", "B. して続け", "C. 続き", "D. 続けて"], "ans": "A", "exp": "続ける是一段动词，ています形式是し続けています"}]}, "55": {"analysis": "〜でも具有双重功能：①例示用法表示「~之类的」，暗示还有其他选择，语气较随意；②让步用法表示「就算~也」，强调即使在某种情况下也成立。与疑問詞结合时多表示全面性，如「何でも」「誰でも」。", "mistakes": "❌ 何かでも食べましょう（redundant） → ✅ 何でも食べます（疑問詞+でも直接连接）; ❌ 雨が降ってもでも行きます → ✅ 雨でも行きます（不与ても重复使用）", "similar": [{"form": "〜ても", "diff": "でも更随意，例示性强；ても更正式，条件性强"}, {"form": "〜など", "diff": "でも口语化，带主观选择；など书面语，客观列举"}, {"form": "〜とか", "diff": "でも单一例示；とか多项列举"}], "quiz": [{"q": "今日は暑いですね。冷たいもの____飲みませんか。", "opts": ["A. でも", "B. ても", "C. など", "D. から"], "ans": "A", "exp": "例示用法，表示「冷饮之类的」，でも最自然"}, {"q": "彼は子供____知っている簡単な問題です。", "opts": ["A. ても", "B. でも", "C. など", "D. とか"], "ans": "B", "exp": "让步用法，表示「就算是孩子也知道」"}, {"q": "時間がないので、サンドイッチ____買って食べよう。", "opts": ["A. など", "B. とか", "C. でも", "D. ても"], "ans": "C", "exp": "例示用法，表示随意选择「三明治之类的」"}]}, "56": {"analysis": "「〜かどうか」是表示间接疑问的重要句型，用于表达不确定或询问某事是否成立。与直接疑问句不同，它将疑问内容嵌入到陈述句中，常与「わからない」「知らない」等表示不确定的词汇搭配使用。", "mistakes": "易错点：❌彼は来るですかどうかわからない → ✅彼は来るかどうかわからない（普通形接续，不用です/ます形）；❌雨が降るかどうかですか → ✅雨が降るかどうかわかりますか（间接疑问不直接用ですか）", "similar": [{"form": "〜か", "diff": "「〜か」可表示直接疑问，「〜かどうか」专门表示间接疑问的是否"}, {"form": "〜かもしれない", "diff": "「〜かもしれない」表示推测可能性，「〜かどうか」表示不确定是否"}], "quiz": [{"q": "田中さんが明日____、まだ分からない。", "opts": ["A. 来ますかどうか", "B. 来るかどうか", "C. 来るのかどうか", "D. 来ることかどうか"], "ans": "B", "exp": "「〜かどうか」前接普通形，所以用「来る」"}, {"q": "この薬が効く____試してみます。", "opts": ["A. かどうか", "B. かどうかを", "C. かどうかが", "D. かどうかに"], "ans": "A", "exp": "「〜かどうか」后面直接接动词，不需要助词"}, {"q": "彼女が本当のことを言っている____疑問だ。", "opts": ["A. かどうかは", "B. かどうかが", "C. かどうかを", "D. かどうか"], "ans": "A", "exp": "作为主题时用「かどうかは」，表示「是否~这一点」"}]}, "57": {"analysis": "「という」是N4核心语法，用于定义、引用或传达信息。它将前面的内容作为后面名词的说明或定义，相当于中文的「叫做」「名为」「所谓的」。常用于介绍新概念、引用他人话语或传达听到的信息。", "mistakes": "❌ 私は田中という人を知っています。（语序错误）→ ✅ 私は田中という人を知っています。; ❌ 明日雨が降るといういう天気予報です。（重复という）→ ✅ 明日雨が降るという天気予報です。; ❌ 彼は学生というです。（缺少名词）→ ✅ 彼は学生という人です。", "similar": [{"form": "〜といった", "diff": "という是特定指称，といった表示列举同类事物"}, {"form": "〜と言われている", "diff": "という直接引用定义，と言われている表示传闻或一般认知"}], "quiz": [{"q": "「寿司」____、日本の伝統的な料理です。", "opts": ["A. という", "B. といった", "C. というのは", "D. ということは"], "ans": "C", "exp": "定义说明用「というのは」，强调「寿司」这个概念的定义"}, {"q": "田中____先生に会ったことがありますか。", "opts": ["A. という", "B. といった", "C. というのは", "D. ということ"], "ans": "A", "exp": "「田中という先生」指名叫田中的老师，用という连接人名和身份"}, {"q": "彼は明日来ない____話を聞きました。", "opts": ["A. という", "B. といった", "C. というのは", "D. ということ"], "ans": "A", "exp": "传达听到的内容用「という話」，表示听说的消息"}]}, "58": {"analysis": "「まで」表示动作持续的终点，相当于中文的\"到...为止\"；「までに」表示截止期限，相当于\"在...之前\"。关键区别在于「まで」强调持续性，「までに」强调完成时限。", "mistakes": "❌ 5時まで来てください → ✅ 5時までに来てください（约定时间用までに）\n❌ 昨日までに働きました → ✅ 昨日まで働きました（持续动作用まで）", "similar": [{"form": "〜から〜まで", "diff": "表示从起点到终点的完整时间段，まで单独使用时只表终点"}, {"form": "〜前に", "diff": "前に仅表\"之前\"，までに含有截止期限的紧迫感"}], "quiz": [{"q": "会議は3時____始まります。", "opts": ["A. まで", "B. までに", "C. から", "D. で"], "ans": "C", "exp": "表示开始时间用「から」，3时开始会议"}, {"q": "レポートを来週の金曜日____出してください。", "opts": ["A. まで", "B. までに", "C. から", "D. に"], "ans": "B", "exp": "提交截止期限用「までに」，在周五之前提交"}, {"q": "図書館は夜9時____開いています。", "opts": ["A. まで", "B. までに", "C. から", "D. で"], "ans": "A", "exp": "表示营业持续到9点为止，用「まで」"}]}, "59": {"analysis": "「〜ように言う」是表示间接命令或请求传达的重要句型。与直接命令「〜なさい」不同，这个句型更委婉地传达他人的要求或指示。常用于第三人称转述场景，体现了日语中重视礼貌和间接表达的特点。", "mistakes": "易混淆直接命令与间接传达：❌ 先生は「静かにしなさい」と言いました → ✅ 先生は静かにするように言いました（间接传达更自然）；时态错配：❌ 母は早く寝るように言っています → ✅ 母は早く寝るように言いました（过去的传达用过去时）", "similar": [{"form": "〜と言う", "diff": "直接引用原话，「〜ように言う」是间接传达命令请求"}, {"form": "〜てください", "diff": "直接请求，「〜ように言う」是转述他人的请求"}], "quiz": [{"q": "医者は薬を____ように言いました。", "opts": ["A.飲む", "B.飲んで", "C.飲み", "D.飲んだ"], "ans": "A", "exp": "「〜ように言う」前接動詞辞書形，表示间接传达命令"}, {"q": "母は私に野菜を____ように言います。", "opts": ["A.食べない", "B.食べなくない", "C.食べる", "D.食べて"], "ans": "C", "exp": "肯定的间接命令用辞書形＋ように言う"}, {"q": "先生は学生に宿題を____ように言いました。", "opts": ["A.忘れる", "B.忘れない", "C.忘れて", "D.忘れた"], "ans": "B", "exp": "否定的间接命令用ない形＋ように言う，表示「不要忘记」"}]}, "60": {"analysis": "んです是のです的缩约形，用于解释说明现状、强调理由或为后续话题做铺垫。与单纯陈述不同，它带有「向对方说明情况」的语感，使表达更加委婉自然。んですが则在此基础上增加了转折或请求的预备性质。", "mistakes": "易错点：❌今日は暑いんですね → ✅今日は暑いですね（感叹不用んです）；❌彼は学生なんです → ✅彼は学生なんです（な形容词去な加んです）", "similar": [{"form": "〜ています", "diff": "ています表状态持续，んです表解释说明"}, {"form": "〜でしょう", "diff": "でしょう表推测，んです表确定的解释"}], "quiz": [{"q": "A：どうして遅れましたか。B：電車が遅れた____。", "opts": ["A.です", "B.んです", "C.でしょう", "D.ました"], "ans": "B", "exp": "解释迟到的理由，用んです表说明"}, {"q": "明日パーティーがある____、来ませんか。", "opts": ["A.んです", "B.んですが", "C.です", "D.ですが"], "ans": "B", "exp": "んですが用于邀请前的情况说明铺垫"}, {"q": "この料理はとても____んです。", "opts": ["A.おいしい", "B.おいしいな", "C.おいしく", "D.おいしかった"], "ans": "A", "exp": "い形容词直接加んです，表强调说明"}]}, "61": {"analysis": "「〜と思っている」表示说话人持续性的想法、意图或信念，强调这种想法从过去开始一直延续到现在。与「〜と思う」的瞬间判断不同，「〜と思っている」体现了思考状态的持续性。当接续意向形时表示持续的打算，接续普通形时表示持续的看法或信念。", "mistakes": "❌ 明日映画を見ると思っています → ✅ 明日映画を見ようと思っています（表意图用意向形）\n❌ 彼はいい人と思う → ✅ 彼はいい人だと思っている（持续看法用ている形）\n❌ 来年留学すると思っている → ✅ 来年留学しようと思っている（自己意图用意向形）", "similar": [{"form": "〜と思う", "diff": "瞬间的判断或想法，不强调持续性"}, {"form": "〜つもりだ", "diff": "更强烈的意志和决心，相当于'打定主意'"}, {"form": "〜ようと考えている", "diff": "更正式的表达，多用于书面语"}], "quiz": [{"q": "私は来月____。", "opts": ["A. 結婚すると思っている", "B. 結婚しようと思っている", "C. 結婚するつもりと思っている", "D. 結婚することと思っている"], "ans": "B", "exp": "表示自己的意图时，用意向形＋と思っている"}, {"q": "田中さんは____人だと思っています。", "opts": ["A. やさしい", "B. やさしく", "C. やさしかった", "D. やさしくて"], "ans": "A", "exp": "形容词的普通形接续と思っている，表示持续的看法"}, {"q": "彼女は____。", "opts": ["A. 医者になると思っている", "B. 医者になろうと思っている", "C. 医者になるつもりと思っている", "D. 医者になることと思っている"], "ans": "B", "exp": "表示第三人称的意图时也用意向形＋と思っている"}]}, "62": {"analysis": "「〜てほしい」表达对他人行为的愿望或期待，是自己希望别人做某事的表现。与「〜たい」不同，这个文法专门用于表达对他人的期望，不能用于自己想做的事情。使用时注意对象用「に」标记，体现了日语中他动性的语法特征。", "mistakes": "❌ 私は勉強してほしいです → ✅ 私は彼に勉強してほしいです（必须有明确的期望对象）\n❌ 母が料理したいです → ✅ 母に料理してほしいです（期望他人做某事用てほしい）\n❌ 友達を手伝ってほしいです → ✅ 友達に手伝ってほしいです（对象标记用に，不用を）", "similar": [{"form": "〜たい", "diff": "たい表达自己的愿望，てほしい表达对他人的期望"}, {"form": "〜てもらいたい", "diff": "てもらいたい更加敬语化，てほしい较为直接"}, {"form": "〜てください", "diff": "てください是请求，てほしい是愿望表达"}], "quiz": [{"q": "私は弟に宿題を____。", "opts": ["A. してほしいです", "B. したいです", "C. してくださいです", "D. してもらいます"], "ans": "A", "exp": "表达希望弟弟做作业的愿望，用「してほしい」"}, {"q": "田中さん____もっと頑張ってほしいと思います。", "opts": ["A. を", "B. が", "C. に", "D. で"], "ans": "C", "exp": "期望的对象用助词「に」来标记"}, {"q": "友達____一緒に映画を見てほしいです。", "opts": ["A. が", "B. に", "C. を", "D. と"], "ans": "B", "exp": "表达希望朋友一起看电影，期望对象用「に」"}]}, "63": {"analysis": "「〜ているところだ」は動作の進行状態を強調する文法で、「今まさに」のニュアンスを含む。単純な「〜ている」より具体的な時点での動作を表現し、話し手の「今この瞬間」という意識が強く反映される。", "mistakes": "❌今、勉強するところです。→ ✅今、勉強しているところです。（進行中は「ている」を使用）❌昨日、映画を見ているところでした。→ ✅昨日、映画を見ていたところでした。（過去は「ていた」）", "similar": [{"form": "〜ている", "diff": "「ところだ」は「今まさに」の強調があり、より具体的な時点を示す"}, {"form": "〜最中だ（さいちゅうだ）", "diff": "「最中」はより改まった表現で、長時間の動作に使用される傾向"}], "quiz": [{"q": "すみません、今食事を（____）ところです。", "opts": ["A. する", "B. した", "C. している", "D. していた"], "ans": "C", "exp": "進行中の動作なので「ている」を使用"}, {"q": "電話がかかってきた時、ちょうど宿題を（____）ところでした。", "opts": ["A. する", "B. している", "C. していた", "D. した"], "ans": "C", "exp": "過去の進行状態なので「ていた」を使用"}, {"q": "今、友達を（____）ところです。", "opts": ["A. 待つ", "B. 待った", "C. 待っている", "D. 待っていた"], "ans": "C", "exp": "現在進行中の動作を表すので「待っている」が正解"}]}, "64": {"analysis": "「〜がする」是表示感官感受的重要文法，主要用于描述嗅觉、听觉、味觉等感知体验。此句型的特点是主语必须是感官相关的名词（におい、音、味、気等），动词「する」在此处不是「做」的意思，而是「感受到、散发出」的含义。与中文「有...的感觉/散发...」相对应，是日语中描述感官体验的固定表达方式。", "mistakes": "❌ このケーキは甘い味をします（这个蛋糕有甜味）→ ✅ このケーキは甘い味がします。助词必须用「が」不能用「を」。❌ 花がいいにおいをしています → ✅ 花からいいにおいがします。表示来源时需要用「から」。", "similar": [{"form": "〜ている", "diff": "「〜ている」表示状态持续，而「〜がする」专门用于感官感受，不能互换"}, {"form": "〜を感じる", "diff": "「感じる」需要人作主语主动感受，「〜がする」是客观描述感官现象"}], "quiz": [{"q": "隣の部屋から変な音（____）。", "opts": ["A.をします", "B.がします", "C.にします", "D.でします"], "ans": "B", "exp": "感官动词「する」前必须用助词「が」，表示听到奇怪的声音"}, {"q": "この料理は（____）味がしますね。", "opts": ["A.から", "B.しょっぱい", "C.しょっぱく", "D.しょっぱいな"], "ans": "B", "exp": "「味がする」前需要用い形容词修饰，「しょっぱい」表示咸味"}, {"q": "ガスの（____）がしませんか。", "opts": ["A.音", "B.味", "C.におい", "D.気持ち"], "ans": "C", "exp": "ガス（煤气）通常用嗅觉感知，所以用「におい」（气味）最合适"}]}, "65": {"analysis": "「〜場合は」是表示假定条件或特定情况的句型，多用于正式场合和书面语。与「〜時」不同，「場合」强调的是某种状况或条件的设定，而非时间点。常用于规则说明、注意事项等正式文体中。", "mistakes": "❌ 雨が降る場合は、傘を持って行く。→ ✅ 雨が降った場合は、傘を持って行く。（应使用过去式表示假定条件）\n❌ 病気場合は、休んでください。→ ✅ 病気の場合は、休んでください。（名词后需要加の）", "similar": [{"form": "〜時は", "diff": "「時」表示时间点，「場合」表示条件或状况"}, {"form": "〜なら", "diff": "「なら」更口语化，「場合は」更正式"}, {"form": "〜ば", "diff": "「ば」是一般条件句，「場合は」强调特定情况"}], "quiz": [{"q": "火事の____は、すぐに119番に電話してください。", "opts": ["A. 時", "B. 場合", "C. とき", "D. 間"], "ans": "B", "exp": "表示紧急情况的条件设定，用「場合」最适合"}, {"q": "分からない____は、先生に聞いてください。", "opts": ["A. 場合に", "B. 場合を", "C. 場合は", "D. 場合が"], "ans": "C", "exp": "表示条件时用「場合は」，助词は表示主题提示"}, {"q": "この薬は、____場合は服用しないでください。", "opts": ["A. 妊娠する", "B. 妊娠した", "C. 妊娠している", "D. 妊娠の"], "ans": "C", "exp": "表示持续状态的条件，用「〜ている」形最恰当"}]}, "66": {"analysis": "「〜というのは」用于定义或解释概念，相当于中文的「所谓…是…」。常用于正式场合或学术语境中，对专业术语、概念进行客观说明。句型结构为「A というのは B ということだ/である」，其中A是被定义的对象，B是定义内容。", "mistakes": "❌「侘び寂び」ということは日本独自の美意識です。→ ✅「侘び寂び」というのは日本独自の美意識です。（定义句必须用「というのは」而非「ということは」）❌ 愛というのを大切な感情です。→ ✅ 愛というのは大切な感情です。（助词必须用「は」）", "similar": [{"form": "〜ということは", "diff": "表示推测判断「这意味着…」，而非定义说明"}, {"form": "〜とは", "diff": "更简洁的定义表达，「というのは」更正式详细"}, {"form": "〜って", "diff": "口语化的解释，非正式场合使用"}], "quiz": [{"q": "「環境問題」____地球全体に関わる大きな課題のことです。", "opts": ["A. ということは", "B. というのは", "C. といえば", "D. について"], "ans": "B", "exp": "定义「环境问题」这个概念，应该使用「というのは」"}, {"q": "「おもてなし」というのは日本の____精神です。", "opts": ["A. 伝統的な", "B. 伝統的", "C. 伝統", "D. 伝統の"], "ans": "A", "exp": "修饰名词「精神」需要形容动词的连体形「伝統的な」"}, {"q": "彼が遅刻したということ____、電車が遅れたからでしょう。", "opts": ["A. というのは", "B. は", "C. を", "D. が"], "ans": "B", "exp": "这里是推测原因，不是定义，所以用「は」而不是「というのは」"}]}, "67": {"analysis": "「〜に対して」是表示对象、方向或对比的重要文法，常用于正式场合。它既可以表示动作的对象（针对某人/某事），也可以表示对比关系（相对于）。与「〜について」相比，「に対して」更强调明确的目标性和对立性。", "mistakes": "❌ 友達に対して話しました → ✅ 友達と話しました（朋友间用「と」，不用「に対して」）\n❌ この問題について対して考える → ✅ この問題について考える 或 この問題に対して考える（不能重复使用）", "similar": [{"form": "〜について", "diff": "「について」仅表示话题，「に対して」还含有对立、针对的意味"}, {"form": "〜に向けて", "diff": "「に向けて」强调方向性，「に対して」更强调对象性和对比性"}], "quiz": [{"q": "政府の政策（____）国民が反対している。", "opts": ["A. について", "B. に対して", "C. に向けて", "D. によって"], "ans": "B", "exp": "表示针对政府政策的反对，用「に対して」表示对象"}, {"q": "先生は学生の質問（____）親切に答えてくれた。", "opts": ["A. に対して", "B. について", "C. に向かって", "D. に関して"], "ans": "A", "exp": "「質問に対して答える」是固定搭配，表示针对问题回答"}, {"q": "日本の人口は中国（____）少ない。", "opts": ["A. について", "B. によって", "C. に対して", "D. に関して"], "ans": "C", "exp": "表示与中国相比较，用「に対して」表示对比关系"}]}, "68": {"analysis": "「〜に気がつく/気づく」表示无意识中自然发现或意识到某事，强调发现的自然性和突然性。与中文'注意到'、'发现'相对应，但更强调非主观刻意的察觉过程。", "mistakes": "易错点：❌ 財布を忘れることに気がつきました → ✅ 財布を忘れたことに気がつきました（过去的事实用た形）；❌ 雨が降ることに気がつく → ✅ 雨が降っていることに気がつく（进行状态用ている形）", "similar": [{"form": "〜に気をつける", "diff": "気をつける是主观的注意、小心；気がつく是客观的发现、察觉"}, {"form": "〜を見つける", "diff": "見つける强调视觉上的找到；気がつく可以是各种感官的察觉"}], "quiz": [{"q": "彼が来ない____に気がつきました。", "opts": ["A. こと", "B. の", "C. と", "D. を"], "ans": "A", "exp": "普通形＋ことに気がつく的固定搭配"}, {"q": "間違い____気がついて、すぐに直しました。", "opts": ["A. を", "B. が", "C. に", "D. と"], "ans": "C", "exp": "気がつく后面接助词に，表示发现的对象"}, {"q": "友達が____ことに気がつきませんでした。", "opts": ["A. 泣く", "B. 泣いた", "C. 泣いている", "D. 泣こう"], "ans": "C", "exp": "表示当时朋友正在哭这个状态，用ている形"}]}, "69": {"analysis": "「〜によると」是表示信息来源的文法，用于引用从某处获得的信息。常与「〜そうだ」「〜とのことだ」等传闻表现搭配使用，表示所说内容并非亲身经历而是从他处得知的信息。", "mistakes": "易错点：❌ 友達によると、彼は来ます → ✅ 友達によると、彼は来るそうです（必须用传闻表现）；❌ テレビによると見ました → ✅ テレビによると見たそうです（时态错误）", "similar": [{"form": "〜によれば", "diff": "意思完全相同，但「によれば」更正式，多用于书面语"}, {"form": "〜によって", "diff": "表示手段方法或原因，不是引用信息来源"}], "quiz": [{"q": "ニュース（____）、地震があったそうです。", "opts": ["A. によって", "B. によると", "C. について", "D. に対して"], "ans": "B", "exp": "引用新闻作为信息来源，用「によると」"}, {"q": "先生（____）、明日テストがあるとのことです。", "opts": ["A. によると", "B. によって", "C. に関して", "D. として"], "ans": "A", "exp": "引用老师的话作为信息来源，用「によると」"}, {"q": "新聞（____）、新しい法律ができる（____）。", "opts": ["A. によると・です", "B. によって・そうです", "C. によると・そうです", "D. について・そうです"], "ans": "C", "exp": "「によると」引用信息源，必须搭配传闻表现「そうです」"}]}, "70": {"analysis": "「〜に慣れる」表示经过一段时间的接触和练习后，对某种环境、习惯或行为变得熟悉和适应。这是一个渐进性的过程，强调从不习惯到习惯的状态变化。与中文「习惯」不同，日语更强调适应的过程性。", "mistakes": "易错点：动词接续时忘记加「こと」。❌ 早く起きるに慣れました → ✅ 早く起きることに慣れました（习惯了早起）。另外容易与「〜を慣らす」（使~习惯）混淆。", "similar": [{"form": "〜を慣らす", "diff": "他动词，表示「使某人/某物习惯」，如「子供を早寝に慣らす」"}, {"form": "〜ようになる", "diff": "表示能力或状态的变化，如「日本語が話せるようになった」"}], "quiz": [{"q": "毎日残業____慣れてしまいました。", "opts": ["A. を", "B. に", "C. が", "D. で"], "ans": "B", "exp": "「慣れる」は「〜に慣れる」の形で使い、慣れる対象を「に」で表す"}, {"q": "一人で住む____慣れるまで時間がかかりました。", "opts": ["A. ことに", "B. のに", "C. ように", "D. ために"], "ans": "A", "exp": "動詞＋ことに慣れる の形。「住むことに慣れる」が正しい"}, {"q": "この会社の____にもう慣れました。", "opts": ["A. 働くこと", "B. 雰囲気", "C. 忙しいの", "D. 仕事する"], "ans": "B", "exp": "名詞の場合は直接「に」に接続。「雰囲気に慣れる」が自然"}]}, "71": {"analysis": "「〜まま」表示保持某种状态不变，强调在不改变当前状态的情况下进行某个动作。与中文「就这样」「保持...状态」相对应。接续时，动词た形表示已完成动作后保持该状态，ない形表示保持未做某事的状态，名词直接加まま。", "mistakes": "易混淆「まま」与「ながら」的用法。❌コーヒーを飲みながら、寝ました。→ ✅コーヒーを飲んだまま、寝ました。（喝着咖啡就睡了）❌電気をつけないで、勉強しています。→ ✅電気をつけないまま、勉強しています。（不开灯就在学习）", "similar": [{"form": "〜ながら", "diff": "ながら表示同时进行两个动作，まま表示保持某状态不变"}, {"form": "〜たまま", "diff": "たまま强调动作完成后状态的持续，单独のまま可接名词"}], "quiz": [{"q": "電気を（____）寝てしまいました。", "opts": ["A.つけたまま", "B.つけながら", "C.つけてから", "D.つけても"], "ans": "A", "exp": "「つけたまま」表示开着电灯的状态下睡觉，符合まま表示状态维持的用法"}, {"q": "子供の（____）大人になりました。", "opts": ["A.ときまま", "B.間まま", "C.ころまま", "D.頃のまま"], "ans": "D", "exp": "「子供の頃のまま」表示保持着孩童时期的样子，名詞＋のまま的用法"}, {"q": "宿題を（____）学校に来ました。", "opts": ["A.しながら", "B.しないまま", "C.しなくて", "D.しないで"], "ans": "B", "exp": "「しないまま」表示保持没做作业的状态来学校，ない形＋ままの用法"}]}, "73": {"analysis": "「わけだ」表示基于前述事实得出的合理结论或必然结果，相当于中文的「难怪」「原来如此」「理所当然」。它强调说话人通过逻辑推理得出的结论，具有恍然大悟的语气。常与「から」「ので」等原因表达搭配使用。", "mistakes": "❌ 明日雨が降るわけだ → ✅ 明日雨が降るそうだ（预测天气用そうだ而非わけだ）\n❌ 彼は学生なわけだ → ✅ 彼は学生だ（单纯陈述事实不用わけだ）\n❌ これは高いわけですね → ✅ これは高いんですね（感叹用んです而非わけだ）", "similar": [{"form": "はずだ", "diff": "はずだ表示基于常识的推测，わけだ表示基于事实的必然结论"}, {"form": "そうだ（样态）", "diff": "そうだ表示外观印象的推测，わけだ表示逻辑推理的结论"}], "quiz": [{"q": "彼は毎日３時間練習している。____上手なわけだ。", "opts": ["A. だから", "B. でも", "C. それに", "D. ただし"], "ans": "A", "exp": "わけだ前常用だから表示原因，强调基于前述事实得出的理所当然的结论"}, {"q": "一人暮らしを始めたばかりで、まだ慣れない____。", "opts": ["A. わけだ", "B. はずだ", "C. そうだ", "D. ようだ"], "ans": "A", "exp": "基于「刚开始独自生活」这个事实，得出「还不习惯是理所当然的」结论，用わけだ"}, {"q": "毎日コーヒーを10杯も飲む。それで眠れない____。", "opts": ["A. そうだ", "B. らしい", "C. わけだ", "D. かもしれない"], "ans": "C", "exp": "基于「每天喝10杯咖啡」的事实，得出「睡不着是理所当然的」结论"}]}, "74": {"analysis": "「〜のではないか」是表示委婉推测的文法，比直接断定更加礼貌和谦逊。它将说话者的推测以疑问的形式表达，给听者留有思考和反驳的余地。敬语形式「〜のではないでしょうか」在商务场合和正式对话中使用频率很高，体现了日语重视委婉表达的语言特征。", "mistakes": "易错点：时态和语气搭配。❌明日は雨が降るのではないかでした → ✅明日は雨が降るのではないでしょうか（推测不用过去式）。❌もっと頑張るのではないかと思います → ✅もっと頑張った方がいいのではないでしょうか（建议用法需要「た方がいい」）", "similar": [{"form": "〜かもしれない", "diff": "「かもしれない」是直接推测，「のではないか」是疑问形式的委婉推测，更礼貌"}, {"form": "〜と思う", "diff": "「と思う」表达个人想法，「のではないか」暗示希望得到对方认同"}], "quiz": [{"q": "彼は忙しくて来られない____。", "opts": ["A.のではないか", "B.かもしれない", "C.と思う", "D.はずだ"], "ans": "A", "exp": "委婉推测用「のではないか」最合适，比其他选项更礼貌"}, {"q": "もう帰った____でしょうか。", "opts": ["A.の", "B.のでは", "C.ので", "D.から"], "ans": "B", "exp": "敬语形式「のではないでしょうか」表示委婉推测"}, {"q": "この料理は少し塩辛い____。", "opts": ["A.のだ", "B.のではないか", "C.のです", "D.のでしょう"], "ans": "B", "exp": "对现状的委婉推测，暗示希望对方也同意这个看法"}]}, "75": {"analysis": "「〜てほしくない」表示对他人的否定性愿望，即希望他人不要做某事。这是「〜てほしい」的否定形式，用于表达说话人不希望某人做某种行为的心情。注意「ほしい」是形容词，所以否定时用「ほしくない」而不是「ほしいじゃない」。", "mistakes": "❌ 彼に来ないでほしくない → ✅ 彼に来てほしくない（不希望他来）❌ あなたが行かないほしくない → ✅ あなたに行ってほしくない（不希望你去）❌ 母に心配してほしくありません → ✅ 母に心配してほしくないです（不希望母亲担心）", "similar": [{"form": "〜ないでほしい", "diff": "两者意思相同但语感不同。「〜ないでほしい」更直接地表示「请不要做」，而「〜てほしくない」侧重表达说话人的心情和愿望"}, {"form": "〜てもらいたくない", "diff": "「〜てもらいたくない」更正式，常用于书面语；「〜てほしくない」更口语化，表达个人情感更强烈"}], "quiz": [{"q": "子どもには危険なゲームを（____）。", "opts": ["A. してほしい", "B. してほしくない", "C. しないでほしい", "D. BとCどちらも正しい"], "ans": "D", "exp": "「してほしくない」和「しないでほしい」都表示不希望孩子玩危险游戏，意思相同"}, {"q": "友達に秘密を他の人に（____）。", "opts": ["A. 話してほしい", "B. 話してほしくない", "C. 話さないほしくない", "D. 話すほしくない"], "ans": "B", "exp": "不希望朋友把秘密告诉别人，用「話してほしくない」。C和D的语法都不正确"}, {"q": "彼には無理を（____）と思います。", "opts": ["A. してほしくない", "B. しないでほしくない", "C. してほしい", "D. しないほしくない"], "ans": "A", "exp": "不希望他勉强自己，用「してほしくない」。B和D在语法上都不正确"}]}, "12": {"analysis": "使役形「～（さ）せる」表示主语让或使他人做某事，体现了动作的使动关系。一段动词词尾变化为「させる」，五段动词按照ない形去掉「ない」加「せる」的规律变化。这个文法强调的是主语的意志或强制力，使他人执行某个动作。", "mistakes": "易错点：动词变化规律混淆。❌ 食べる→食べせる → ✅ 食べる→食べさせる；❌ 読む→読ませる → ✅ 読む→読ませる；助词使用错误：❌ 子どもを野菜を食べさせる → ✅ 子どもに野菜を食べさせる", "similar": [{"form": "～（ら）れる（受身）", "diff": "使役是让别人做，受身是被别人做。使役：母が子どもに薬を飲ませる；受身：子どもが母に薬を飲まされる"}, {"form": "～てもらう", "diff": "使役带有强制性，～てもらう表示请求帮助。使役：子どもに掃除させる（让孩子打扫）；～てもらう：子どもに掃除してもらう（请孩子帮忙打扫）"}], "quiz": [{"q": "先生は学生に漢字を____。", "opts": ["A. 書かせます", "B. 書きせます", "C. 書かされます", "D. 書いてもらいます"], "ans": "A", "exp": "「書く」是五段动词，使役形是「書かせる」。老师让学生写汉字，使用使役形表示。"}, {"q": "母は私____早く寝させました。", "opts": ["A. が", "B. を", "C. に", "D. で"], "ans": "B", "exp": "使役句中，被使役者用「を」标示是常见用法，特别是在表示强制的语境下。"}, {"q": "「見る」の使役形は____ですか。", "opts": ["A. 見せる", "B. 見させる", "C. 見らせる", "D. 見させられる"], "ans": "B", "exp": "「見る」是一段动词，使役形是去掉「る」加「させる」，即「見させる」。注意「見せる」是「显示、给某人看」的意思。"}]}, "17": {"analysis": "「〜なら」表示基于对方提到的情况或假设提出建议、意见的条件表达。与单纯的假设条件不同，它强调「既然你这么说/如果是这样的话」的语境，常用于给出建议或表达个人看法。", "mistakes": "❌ 雨が降るなら、傘を持って行きます。（单纯假设）→ ✅ 雨が降るなら、家にいましょう。（基于情况的建议）/ ❌ 学生だなら、学割が使えます。→ ✅ 学生なら、学割が使えます。（名词后直接接なら）", "similar": [{"form": "〜たら", "diff": "たら表示时间顺序的条件，なら强调基于对方话题的条件"}, {"form": "〜ば", "diff": "ば表示一般性条件，なら更多用于给建议"}, {"form": "〜と", "diff": "と表示自然结果，なら表示主观判断和建议"}], "quiz": [{"q": "A：映画を見に行きたいんです。B：映画____、あの新作がおすすめですよ。", "opts": ["A. を見るなら", "B. を見たら", "C. を見ると", "D. を見れば"], "ans": "A", "exp": "基于A提到要看电影，B给出建议，用なら最自然"}, {"q": "時間____、もう少しゆっくり説明してください。", "opts": ["A. があったら", "B. があるなら", "C. があると", "D. があれば"], "ans": "B", "exp": "「如果有时间的话」，基于假设情况提出请求，用なら"}, {"q": "先生____、田中先生が一番やさしいです。", "opts": ["A. だなら", "B. であるなら", "C. なら", "D. だったら"], "ans": "C", "exp": "名词＋なら的形式，「如果说老师的话」"}]}, "22": {"analysis": "「でしょう」是N4重要的推量助动词，表示说话者基于一定根据的推测或征求对方同意。比「かもしれません」语气更强，含有「应该是这样」的确信度。在敬语场面多用「でしょう」，普通场面可用「だろう」。", "mistakes": "❌ 雨が降っているでしょう（看到正在下雨时） → ✅ 雨が降るでしょう（推测会下雨）；❌ な形容词＋だでしょう → ✅ な形容词＋でしょう", "similar": [{"form": "かもしれません", "diff": "でしょう确信度更高，かもしれません表示可能性较低的推测"}, {"form": "と思います", "diff": "でしょう可征求同意，と思います仅表达个人想法"}], "quiz": [{"q": "明日は雨が____。", "opts": ["A. 降るでしょう", "B. 降っているでしょう", "C. 降りでしょう", "D. 降るだでしょう"], "ans": "A", "exp": "对未来的推测用「普通形＋でしょう」"}, {"q": "田中さんはもう帰った____。", "opts": ["A. でしょう", "B. だでしょう", "C. かもしれません", "D. と思います"], "ans": "A", "exp": "た形＋でしょう表示对过去事实的推测"}, {"q": "この料理は____でしょう？", "opts": ["A. おいしいだ", "B. おいしい", "C. おいしくて", "D. おいしかった"], "ans": "B", "exp": "い形容词直接＋でしょう，征求对方同意"}]}, "50": {"analysis": "「について」是表示话题、内容的助词，相当于中文的「关于」「就」。常用于表示谈话、思考、学习等行为的对象或内容。与「に関して」意思相近，但「について」更口语化，使用频率更高。", "mistakes": "❌ 友達について話している → ✅ 友達のことについて話している（谈论朋友时需要加「のこと」）\n❌ 今日について天気 → ✅ 今日の天気について（「について」前不能直接接时间词修饰其他名词）", "similar": [{"form": "〜に関して", "diff": "「に関して」更正式，多用于书面语；「について」更口语化，日常会话常用"}, {"form": "〜のことで", "diff": "「のことで」强调因某事而产生的结果或影响；「について」单纯表示话题内容"}], "quiz": [{"q": "日本の文化____研究しています。", "opts": ["A. について", "B. にとって", "C. において", "D. に対して"], "ans": "A", "exp": "表示研究的内容话题，用「について」"}, {"q": "この問題____どう思いますか。", "opts": ["A. には", "B. について", "C. として", "D. による"], "ans": "B", "exp": "询问对某问题的看法，表示话题用「について」"}, {"q": "昨日の会議____報告します。", "opts": ["A. について", "B. によって", "C. に対して", "D. として"], "ans": "A", "exp": "报告会议的内容，表示报告的话题用「について」"}]}, "72": {"analysis": "「〜くらい/〜ぐらい」表示大概的程度或数量，是非常实用的日语表达。接在名词或数量词后，表示「大约～」的意思。两种形式意思完全相同，「くらい」稍显正式，「ぐらい」更口语化。", "mistakes": "❌ 三時間くらいで到着する予定です → ✅ 三時間ぐらいで到着する予定です（口语中更自然）；❌ 100円くらいです高い → ✅ 100円ぐらい高いです（语序错误）", "similar": [{"form": "〜ほど", "diff": "「ほど」强调程度上限，「くらい」仅表示大概数量"}, {"form": "〜だけ", "diff": "「だけ」表示限定范围，「くらい」表示大概估计"}], "quiz": [{"q": "映画は（____）見ましたか。", "opts": ["A. 何本くらい", "B. 何本だけ", "C. 何本ほど", "D. 何本まで"], "ans": "A", "exp": "询问大概数量用「何本くらい」最自然"}, {"q": "この本は（____）で読めます。", "opts": ["A. 一日ぐらい", "B. 一日だけ", "C. 一日まで", "D. 一日ずつ"], "ans": "A", "exp": "表示大概需要的时间用「一日ぐらい」"}, {"q": "りんごを（____）買いました。", "opts": ["A. 五個だけ", "B. 五個くらい", "C. 五個まで", "D. 五個ずつ"], "ans": "B", "exp": "表示大概的数量用「五個くらい」"}]}};
</script>

<!DOCTYPE html>

<head>

<title>JLPT N4 文法カード</title>
<script>
/* ═══════════════════════════════════════════════════════
   JLPT Grammar Card Engine v3
   • Card mode (flip cards, ← → keys)
   • Grid mode (search + filter)
   • Furigana + POS coloring (per-card AI analysis)
   • Vocab notebook (cross-level, localStorage)
   • API Key config (stored in localStorage)
   • Mac Mini proxy support (/api/claude)
   ═══════════════════════════════════════════════════════ */

const CARD_ST_KEY  = 'jlpt_card_state';

/* ─── CSS ─── */
const SHARED_CSS = `
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --mint:#6dc9a8;--ml:#e6f7f1;--mm:#a8ddc9;
  --cream:#fffef5;--ybg:#fffbe8;--red:#e8464a;--navy:#2a3f6e;
  --tx:#333;--gr:#888;--sh:0 4px 20px rgba(0,0,0,.09);
  --pn:#e3f2fd;--pnt:#1565c0;
  --pv:#e8f5e9;--pvt:#2e7d32;
  --pa:#fff3e0;--pat:#e65100;
  --pad:#f3e5f5;--padt:#6a1b9a;
  --pp:#fce4ec;--ppt:#c62828;
  --pc:#e0f7fa;--pct:#006064;
  --px:#fff8e1;--pxt:#f57f17;
}
body{font-family:'M PLUS Rounded 1c','Noto Sans JP',sans-serif;min-height:100vh;overflow-x:hidden;overflow-y:auto;display:flex;flex-direction:column}

/* topbar */
.topbar{background:#fff;box-shadow:0 2px 12px rgba(0,0,0,.08);padding:10px 18px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;flex-wrap:wrap}
.tb-back{background:rgba(0,0,0,.07);border:none;border-radius:8px;padding:5px 12px;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;color:var(--navy);text-decoration:none;display:flex;align-items:center;gap:4px}
.tb-back:hover{background:rgba(0,0,0,.12)}
.lvl-badge{color:#fff;font-weight:900;font-size:11px;line-height:1.1;padding:5px 9px;border-radius:7px;text-align:center}
.lvl-badge span{display:block;font-size:17px}
.tb-title{font-size:16px;font-weight:900;color:var(--navy)}
.tb-sub{font-size:11px;color:var(--gr)}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.cnt-badge{background:var(--ml);color:var(--mint);font-size:12px;font-weight:700;padding:4px 12px;border-radius:20px;border:1.5px solid var(--mm)}
.view-tog{display:flex;gap:3px;background:#f0f0f0;border-radius:10px;padding:3px}
.vbtn{border:none;background:transparent;border-radius:7px;padding:5px 12px;font-size:12px;font-weight:700;color:var(--gr);cursor:pointer;font-family:inherit;transition:all .15s}
.vbtn.on{background:#fff;color:var(--navy);box-shadow:0 1px 4px rgba(0,0,0,.1)}
.cfg-btn{background:none;border:1.5px solid #ddd;border-radius:8px;padding:4px 10px;font-size:12px;cursor:pointer;color:var(--gr);font-family:inherit}
.cfg-btn:hover{border-color:var(--mint);color:var(--mint)}

/* filter bar */
.fbar{padding:10px 18px;display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;flex-wrap:wrap}
.fbar::-webkit-scrollbar{display:none}
.fbtn{background:rgba(255,255,255,.25);border:1.5px solid rgba(255,255,255,.5);color:#fff;font-family:inherit;font-size:11px;font-weight:700;padding:5px 12px;border-radius:20px;cursor:pointer;white-space:nowrap;transition:all .15s}
.fbtn:hover,.fbtn.on{background:#fff;border-color:#fff}

/* progress */
.prog-wrap{padding:6px 18px 4px;background:rgba(255,255,255,.1)}
.prog-info{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.prog-lbl{font-size:11px;font-weight:700;color:rgba(255,255,255,.85)}
.prog-stats{display:flex;gap:12px;font-size:11px;font-weight:700;color:rgba(255,255,255,.85)}
.prog-track{height:3px;background:rgba(255,255,255,.25);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:rgba(255,255,255,.8);border-radius:2px;transition:width .35s}

/* stats bar (grid) */
.sbar{display:flex;gap:14px;padding:8px 18px 2px;font-size:12px;color:rgba(255,255,255,.8);font-weight:600}

/* ═══ CARD STAGE ═══ */
.cstage{display:none;flex-direction:column;align-items:center;justify-content:flex-start;padding:12px 16px 80px;overflow-y:auto;flex:1;min-height:0}
.cstage.on{display:flex}
.fcard{width:100%;max-width:700px;background:#fff;border-radius:22px;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,.13);animation:cIn .22s ease;display:flex;flex-direction:column}
@keyframes cIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.aL{animation:sL .18s ease forwards}
.aR{animation:sR .18s ease forwards}
@keyframes sL{to{opacity:0;transform:translateX(-50px)}}
@keyframes sR{to{opacity:0;transform:translateX(50px)}}

/* card head */
.chead{background:var(--ybg);padding:20px 24px 16px;border-bottom:2px dashed var(--mm);display:flex;align-items:flex-start;gap:14px;position:relative}
.cnum{color:#fff;font-size:11px;font-weight:900;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
.chead-info{flex:1}
.chead-row{display:flex;align-items:center;gap:8px;flex:1;flex-wrap:nowrap}

.c-gram{font-size:26px;font-weight:900;color:var(--navy);line-height:1.18}
.c-gram .hl{color:var(--red)}
.ctags{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;align-items:center}
.ctag{font-size:10px;font-weight:700;padding:2px 8px;border-radius:5px}
.cdiff{font-size:14px;letter-spacing:2px;color:#f5b942}
.cbtns{display:flex;gap:8px;align-items:flex-start;flex-shrink:0}
.cact{width:40px;height:40px;border-radius:12px;border:1.5px solid #e0e0e0;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:20px;transition:all .15s}
.cact:hover{border-color:var(--mint);transform:scale(1.06)}
.cact.fav{background:#fff9e6;border-color:#f5c518}
.cact.mst{background:var(--ml);border-color:var(--mint)}
.mst-rib{display:none;position:absolute;top:16px;right:110px;background:var(--ml);color:var(--mint);border:1.5px solid var(--mint);border-radius:20px;padding:3px 12px;font-size:11px;font-weight:900}
.mst-rib.on{display:block}

/* card body */
.cbody{padding:20px 24px 22px;display:flex;flex-direction:column;gap:12px}
.slbl{font-size:10px;font-weight:900;color:var(--mint);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:5px}
.c-meaning{font-size:15px;font-weight:700;color:var(--tx);line-height:1.65}
.c-mzh{font-size:13px;color:var(--gr);margin-top:4px}
.c-pat{background:var(--ml);border:1.5px solid var(--mm);border-radius:12px;padding:11px 15px;font-size:14px;font-weight:700;color:var(--navy);line-height:1.6}
.c-pat .gram{color:var(--red);font-weight:900}

/* ─── FURIGANA SYSTEM ─── */
.furi-wrap{display:flex;flex-wrap:wrap;align-items:flex-end;gap:0;line-height:2.8;font-size:15px}
.fw{display:inline-flex;flex-direction:column;align-items:center;margin:0 1px;border-radius:5px;padding:1px 3px 2px;cursor:default;position:relative}
.fw:hover{opacity:.72}
.fr{font-size:9.5px;line-height:1;color:#999;min-height:12px;text-align:center;white-space:nowrap;font-weight:400}
.ft{font-size:14px;font-weight:700;line-height:1.18;white-space:nowrap;border-radius:4px;padding:1px 3px}
.fpunc{display:inline-flex;flex-direction:column;align-items:center;margin-left:-2px}.fpunc .fr{min-height:12px;font-size:9.5px;line-height:1;display:block}.fpunc .ft{font-size:16px;font-weight:700;color:var(--tx);line-height:1.2;padding:1px 0}
/* grammar highlight */
.fw.isG .ft{color:var(--red)!important;background:rgba(232,70,74,.1)!important;font-weight:900}
.fw.isG .fr{color:var(--red)}
/* POS colors */
.pN .ft{color:var(--pnt);background:var(--pn)}
.pV .ft{color:var(--pvt);background:var(--pv)}
.pA .ft{color:var(--pat);background:var(--pa)}
.pD .ft{color:var(--padt);background:var(--pad)}
.pP .ft{color:var(--ppt);background:var(--pp)}
.pC .ft{color:var(--pct);background:var(--pc)}
.pX .ft{color:var(--pxt);background:var(--px)}
/* plain (not yet analyzed) */
.plain-ex{font-size:14px;font-weight:700;color:var(--tx);line-height:1.58}
.plain-ex .hl{color:var(--red);font-weight:900}

/* POS legend */
.pos-legend{display:none;gap:6px;flex-wrap:wrap;padding:8px 12px;background:#f8f8f8;border-radius:8px}
.pleg{display:flex;align-items:center;gap:3px;font-size:10.5px;font-weight:700}
.pleg-dot{width:9px;height:9px;border-radius:2px}

/* analyze btn */
.ana-btn{background:linear-gradient(135deg,#6dc9a8,#10ac84);color:#fff;border:none;border-radius:10px;padding:8px 16px;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;display:none;align-items:center;gap:6px;transition:opacity .15s}
.ana-btn:hover{opacity:.88}
.ana-btn:disabled{opacity:.45;cursor:wait}
.spin{display:inline-block;width:12px;height:12px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}

/* example blocks */
.exb{border-radius:12px;padding:12px 14px 8px;border:1.5px solid #eee;margin-bottom:8px;cursor:pointer;transition:border-color .16s ease,background-color .16s ease,box-shadow .16s ease}
.exb.main{background:#fafafa;border-color:#eee}
.exb.sub{background:#fafafa}
.ex-zh{font-size:11px;color:var(--gr);margin-top:4px;line-height:1.45;opacity:.76}
.exb.playing{border-color:var(--mint);background:var(--ml);box-shadow:0 0 0 2px rgba(109,201,168,.14)}

/* AI gen */
.ai-btn{border:none;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;font-family:inherit;font-size:12px;font-weight:700;padding:8px 16px;border-radius:10px;cursor:pointer;display:none;align-items:center;gap:6px;transition:opacity .15s}
.ai-btn:hover{opacity:.88}
.ai-btn:disabled{opacity:.45;cursor:wait}
.ai-res{background:var(--ml);border-radius:10px;padding:12px 14px;font-size:13px;line-height:1.8;color:#345;display:none;border:1.5px solid var(--mm)}
.ai-res.on{display:block}

/* bottom nav */
.bnav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #eee;padding:10px 20px;display:flex;align-items:center;justify-content:center;gap:10px;z-index:60;box-shadow:0 -4px 20px rgba(0,0,0,.07)}
.nbtn{width:50px;height:50px;border-radius:14px;border:1.5px solid #e0e0e0;background:#f7f7f7;color:var(--navy);font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s;user-select:none;font-weight:900}
.nbtn:hover{background:var(--ml);border-color:var(--mint);color:var(--mint)}
.nbtn:active{transform:scale(.9)}
.nbtn:disabled{opacity:.3;cursor:default;pointer-events:none}
.nctr{background:#f5f5f5;border:1px solid #eee;border-radius:10px;padding:8px 20px;font-size:15px;font-weight:900;color:var(--navy);min-width:100px;text-align:center;flex-shrink:0}
.nctr sub{font-size:11px;font-weight:400;color:var(--gr)}
.nextra{display:flex;gap:6px}
.nxbtn{border:1px solid #e0e0e0;background:#f7f7f7;color:var(--gr);font-family:inherit;font-size:11px;font-weight:700;padding:5px 12px;border-radius:20px;cursor:pointer;transition:all .12s}
.nxbtn:hover{border-color:var(--mint);color:var(--mint)}

/* ═══ GRID STAGE ═══ */
.gstage{display:none;flex:1;min-height:0;flex-direction:column;overflow:visible;padding:12px 16px 80px}
.gstage.on{display:block}
.srch-wrap{padding:12px 18px 0}
.srch{width:100%;max-width:560px;padding:9px 18px;border-radius:30px;border:none;background:rgba(255,255,255,.92);font-family:inherit;font-size:14px;color:var(--navy);box-shadow:0 2px 10px rgba(0,0,0,.08);outline:none}
.srch:focus{background:#fff}
.srch::placeholder{color:#aaa}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:18px;padding:16px 18px 80px;max-width:1400px;margin:0 auto}
.gc{background:#fff;border-radius:16px;overflow:hidden;box-shadow:var(--sh);transition:transform .2s,box-shadow .2s;display:flex;flex-direction:column}
.gc:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(0,0,0,.13)}
.gch{background:var(--ybg);border-bottom:2px dashed var(--mm);padding:10px 16px 9px;display:flex;align-items:center;gap:8px;cursor:pointer}
.gnum{color:#fff;font-size:10px;font-weight:900;min-width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.gt{font-size:17px;font-weight:900;color:var(--navy);flex:1;line-height:1.3}
.gt .hl{color:var(--red)}
.gd{font-size:12px;color:#f5b942;letter-spacing:1px;flex-shrink:0}
.gtag{font-size:9px;padding:2px 6px;border-radius:4px;font-weight:700;white-space:nowrap}
.gea{padding:13px 16px 10px;background:var(--cream)}
.gejp{font-size:15px;font-weight:700;color:var(--tx);line-height:1.7}
.gejp .hl{color:var(--red);font-weight:900}
.gezh{font-size:11.5px;color:var(--gr);margin-top:3px;line-height:1.5}
.gi{padding:7px 16px;display:flex;flex-direction:column;gap:5px}
.gmb{background:var(--ml);border-left:3px solid var(--mint);border-radius:0 7px 7px 0;padding:6px 11px;font-size:12px;color:#456}
.gmb .lb{font-size:9px;font-weight:900;color:var(--mint);letter-spacing:1px;text-transform:uppercase;display:block;margin-bottom:2px}
.gpb{background:#fff;border:1.5px solid var(--mm);border-radius:7px;padding:6px 11px;font-size:12px;color:var(--navy)}
.gpb .lb{font-size:9px;font-weight:900;color:var(--gr);letter-spacing:1px;text-transform:uppercase;display:block;margin-bottom:2px}
.gpb code{font-family:inherit;font-weight:700}
.gpb code .gram{color:var(--red);font-weight:900}
.gmt{padding:5px 16px;background:none;border:none;font-family:inherit;font-size:11px;color:var(--mint);font-weight:700;cursor:pointer;display:flex;align-items:center;gap:3px;width:100%;text-align:left}
.gme{display:none;padding:3px 16px 13px;flex-direction:column;gap:5px}
.gme.on{display:flex}
.gei{font-size:11.5px;color:#555;line-height:1.6;padding:5px 11px;background:#f5f5f5;border-radius:7px}
.gei .gm{color:var(--red);font-weight:900}
.gei .tr{font-size:10.5px;color:var(--gr);display:block;margin-top:1px}
.gea,.gei{cursor:pointer;transition:border-color .16s ease,background-color .16s ease,box-shadow .16s ease}
.gea.playing,.gei.playing{border-color:var(--mint);background:var(--ml);box-shadow:0 0 0 2px rgba(109,201,168,.14)}
.gea{border:1.5px solid transparent;border-radius:12px}
.gei{border:1.5px solid transparent}

.empty{grid-column:1/-1;text-align:center;padding:60px 20px;color:rgba(255,255,255,.7);font-size:16px}

/* modal */
.mov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center;padding:20px}
.mov.on{display:flex}
.mo{background:#fff;border-radius:18px;max-width:500px;width:100%;max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.25)}
.moh{background:var(--ybg);border-bottom:2px dashed var(--mm);padding:14px 18px;display:flex;align-items:center;gap:10px}
.moc{margin-left:auto;background:none;border:none;font-size:22px;cursor:pointer;color:var(--gr);line-height:1;padding:0 4px}
.mob{padding:14px 18px 22px;display:flex;flex-direction:column;gap:10px}
.mex{font-size:17px;font-weight:700;line-height:1.8;color:var(--tx)}
.mex .hl{color:var(--red);font-weight:900}
.mo::-webkit-scrollbar{width:4px}
.mo::-webkit-scrollbar-thumb{background:var(--mm);border-radius:4px}

/* ─── POS TOOLTIP ─── */
.pos-tip{position:fixed;z-index:99999;background:#2a3f6e;color:#fff;border-radius:8px;padding:4px 10px;font-size:11px;font-weight:700;pointer-events:none;display:none;white-space:nowrap}

@media(max-width:600px){
  #main-wrap,.cstage,.gstage{height:auto !important;min-height:auto !important;overflow:visible !important}
  .grid{grid-template-columns:1fr;padding:10px 12px 82px}
  .c-gram{font-size:20px}
  .cbody{padding:14px 16px 18px;gap:10px}
  .bnav{padding:6px 10px}
  .nbtn{width:40px;height:40px;font-size:18px}
  .nextra{display:flex}
  .topbar{padding:7px 10px;gap:7px}
  .tb-title{font-size:12px}
  .cnt-badge{display:none}
  .lvl-badge{font-size:9px;padding:3px 6px}
  .lvl-badge span{font-size:13px}
  .cfg-btn{padding:4px 7px;font-size:10px}
  .ft{font-size:13px}
  .plain-ex{font-size:14px;line-height:1.5}
  .exb{padding:10px 12px 8px}
  .ex-zh{font-size:10px}
}
/* ─── FLIP BUTTON & BACK PANEL ─── */
.flip-btn{width:100%;margin-top:14px;padding:11px;border-radius:12px;border:1.5px dashed var(--mm);background:var(--ml);color:var(--mint);font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s}
.flip-btn:hover:not(:disabled){background:var(--mint);color:#fff;border-style:solid}
.flip-btn:disabled{opacity:.4;cursor:default}
.fcard-back-panel{background:#fff;border-radius:22px;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,.13);width:100%;max-width:700px}
.back-header{background:var(--ybg);border-bottom:2px dashed var(--mm);padding:14px 20px;display:flex;align-items:center;gap:12px}
.flip-back-btn{border:none;background:rgba(0,0,0,.07);border-radius:8px;padding:5px 12px;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;color:var(--navy)}
.flip-back-btn:hover{background:rgba(0,0,0,.12)}
.back-title{font-size:14px;font-weight:900;color:var(--navy)}
.back-body{padding:18px 20px 24px;display:flex;flex-direction:column;gap:14px;max-height:70vh;overflow-y:auto}
.back-section{display:flex;flex-direction:column;gap:7px}
.back-label{font-size:10px;font-weight:900;letter-spacing:2px;color:var(--mint);text-transform:uppercase}
.back-analysis{font-size:13px;line-height:1.85;color:#345;background:var(--ml);border-left:3px solid var(--mint);border-radius:0 8px 8px 0;padding:10px 14px}
.back-mistakes{font-size:12.5px;line-height:1.9;color:#456;background:#fff9f0;border-left:3px solid #f5a030;border-radius:0 8px 8px 0;padding:10px 14px}
.back-similar{display:flex;flex-direction:column;gap:6px}
.similar-item{display:flex;gap:8px;font-size:12.5px;line-height:1.6;padding:5px 0;border-bottom:1px solid #f0f0f0}
.similar-item:last-child{border-bottom:none}
.similar-form{font-weight:900;color:var(--navy);white-space:nowrap;min-width:fit-content}
.similar-diff{color:var(--gr)}
.quiz-item{background:#f8f8f8;border-radius:12px;padding:13px 15px;border:1.5px solid #eee}
.quiz-q{font-size:13px;font-weight:700;color:var(--navy);margin-bottom:10px;line-height:1.6}
.quiz-opts{display:flex;flex-direction:column;gap:5px}
.quiz-opt{font-size:12.5px;padding:7px 11px;border-radius:8px;cursor:pointer;border:1.5px solid #e0e0e0;background:#fff;color:#456;transition:all .15s;text-align:left;font-family:inherit;width:100%}
.quiz-opt:hover:not(.correct):not(.wrong){border-color:var(--mint);background:var(--ml)}
.quiz-opt.correct{background:#e8f8f3;border-color:var(--mint);color:var(--mint);font-weight:900}
.quiz-opt.wrong{background:#fef0f0;border-color:#e84a4a;color:#c0392b}
.quiz-exp{font-size:11.5px;color:#666;margin-top:7px;padding:7px 10px;background:#efefef;border-radius:7px;display:none;line-height:1.6}
.quiz-exp.show{display:block}
.no-back{text-align:center;padding:40px 20px;color:var(--gr);font-size:13px}

`;

class GrammarApp {
  constructor(cfg) {
    this.level    = cfg.level;
    this.color    = cfg.color;
    this.bg       = cfg.bgGradient;
    this.G        = cfg.grammar;
    this.fgs      = cfg.filterGroups || [];
    this.label    = cfg.levelLabel || cfg.level;

    this.view     = 'card';
    this.filter   = 'all';
    this.search   = '';
    this.curMod   = null;
    this.deck     = [...this.G];
    this.cur      = 0;
    this.kCache   = {};
    this.kCur     = null;
    // per-card furigana cache  { cardId: [{text,reading,pos,isGram},...] }
    // 从 localStorage 加载已分析的注音缓存
    this._furiKey = 'jlpt_furi_' + (cfg.level || 'XX');
    try { this.furiCache = JSON.parse(localStorage.getItem(this._furiKey) || '{}'); }
    catch { this.furiCache = {}; }

    try { this.cs = JSON.parse(localStorage.getItem(CARD_ST_KEY) || '{}'); }
    catch { this.cs = {}; }
    if (!this.cs.favs)     this.cs.favs = {};
    if (!this.cs.mastered) this.cs.mastered = {};

    const s = document.createElement('style');
    s.textContent = SHARED_CSS;
    document.head.insertBefore(s, document.head.firstChild);
    document.body.style.background = this.bg;

    this._buildHTML();
    this._bind();
    this._setView('card');
    this._initSwipe();
    if (window.speechSynthesis)
      window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
  }

  /* ─────────── BUILD HTML ─────────── */

    const fg = this.fgs;
    document.body.innerHTML = `

  <button class="nbtn" id="prevBtn" disabled>←</button>
  <div class="nctr"><span id="navIdx">1</span><sub> / <span id="navTot">${this.G.length}</span></sub></div>
  <button class="nbtn" id="nextBtn">→</button>

    <button class="nxbtn" id="shuffleBtn">🔀 打乱顺序</button>

<!-- GRID STAGE -->
<div class="gstage" id="gstage">
  <div class="srch-wrap"><input class="srch" type="search" placeholder="🔍 搜索语法..." id="srch"></div>
  <div class="sbar"><span>📚 显示 <span id="visCt">0</span> 项</span></div>
