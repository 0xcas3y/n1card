どんな天気になることやら。", "similar": [{"form": "〜ものやら", "diff": "「ものやら」更多表示原因理由的不明，而「ことやら」侧重于结果状况的不确定"}, {"form": "〜だろうか", "diff": "「だろうか」是单纯疑问，「ことやら」含有更强的感慨和无奈情绪"}, {"form": "〜やら〜やら", "diff": "表示并列列举，与「ことやら」完全不同的用法"}], "quiz": [{"q": "この仕事がいつ____分からない。", "opts": ["A. 終わるだろうか", "B. 終わることやら", "C. 終わるものか", "D. 終わるわけだ"], "ans": "B", "exp": "表达对工作何时结束的困惑和无奈，用「ことやら」最合适"}, {"q": "彼女はどこで____心配だ。", "opts": ["A. 何をしていることやら", "B. 何をしているだろうか", "C. 何をしているものやら", "D. 何をしているのやら"], "ans": "A", "exp": "「何をしていることやら」表达对她在做什么的担忧和不知情"}, {"q": "この問題をどうやって____途方に暮れている。", "opts": ["A. 解決するものか", "B. 解決することやら", "C. 解決するだろう", "D. 解決するわけだ"], "ans": "B", "exp": "「どうやって〜ことやら」表达对解决方法的困惑和无从下手的心情"}]}, "94": {"analysis": "「〜でなくてなんだろう」是表达强烈断定的修辞疑问句型，通过反问的形式来强调「正是〜」的意思。这个句型常用于文学作品或正式场合，带有浓厚的感情色彩，表达说话者对某事物性质的强烈确信。", "mistakes": "❌ これは愛なくてなんだろう。→ ✅ これが愛でなくてなんだろう。（必须使用「でなくて」的否定形式）❌ 彼の行動は勇敢なくてなんだろう。→ ✅ 彼の行動は勇敢でなくてなんだろう。（形容动词需要加「で」）", "similar": [{"form": "〜にほかならない", "diff": "「にほかならない」是直接断定，而「でなくてなんだろう」通过反问表达更强烈的感情"}, {"form": "〜以外の何物でもない", "diff": "意思相近但「以外の何物でもない」更加正式，「でなくてなんだろう」带有更多感情色彩"}], "quiz": [{"q": "彼女の献身的な看護は愛情（____）。", "opts": ["A. なくてなんだろう", "B. でなくてなんだろう", "C. ではなくてなんだろう", "D. じゃなくてなんだろう"], "ans": "B", "exp": "名詞接続時は「でなくてなんだろう」を使用する"}, {"q": "このような美しい景色は絶景（____）。", "opts": ["A. なくてなんだろう", "B. じゃなくてなんだろう", "C. でなくてなんだろう", "D. ではなくてなんだろう"], "ans": "C", "exp": "「絶景」は名詞なので「でなくてなんだろう」が正解"}, {"q": "母の料理の味は（____）愛情でなくてなんだろう。", "opts": ["A. まさに", "B. きっと", "C. もしかして", "D. たぶん"], "ans": "A", "exp": "強い断定を表す文型なので「まさに」が最も適切"}]}, "95": {"analysis": "「ともすれば/ともすると」表示某种不良倾向或负面状况容易发生，强调稍不注意就会出现的习惯性倾向。常用于描述人的心理状态、行为习惯等容易偏向消极方面的情况，具有警示或自我反省的语气。", "mistakes": "❌ ともすれば、うれしくなってしまう。→ ✅ ともすれば、悲観的になってしまう。（该文法多用于消极倾向，不用于积极情感）", "similar": [{"form": "〜がちだ", "diff": "「がちだ」直接表示倾向性，「ともすれば」更强调稍不注意就会发生"}, {"form": "〜やすい", "diff": "「やすい」表示客观的容易性，「ともすれば」含有主观的不经意就会发生的语感"}], "quiz": [{"q": "最近忙しくて、____健康管理を怠ってしまう。", "opts": ["A.ともすれば", "B.たとえば", "C.もしくは", "D.それでも"], "ans": "A", "exp": "表示稍不注意就容易忽视健康管理，符合「ともすれば」的用法"}, {"q": "一人でいると、____マイナス思考に陥りがちだ。", "opts": ["A.おそらく", "B.ともすると", "C.きっと", "D.まさか"], "ans": "B", "exp": "「ともすると」表示一个人时容易陷入消极思考的倾向"}, {"q": "ストレスが溜まると、____他人に八つ当たりしてしまう。", "opts": ["A.必ず", "B.決して", "C.ともすれば", "D.まさに"], "ans": "C", "exp": "压力大时稍不注意就容易迁怒他人，体现了「ともすれば」的用法"}]}, "96": {"analysis": "「〜を皮切りに」表示以某个事件为开端，后续发生一系列相关事情，强调连续性和系统性。源自武士切腹时的「皮切り」（第一刀），比喻事情的开始。常用于正式场合，描述有组织、有计划的连续活动。", "mistakes": "易错点：❌ 一回だけのイベントを皮切りに → ✅ 連続するイベントの最初を皮切りに（必须是连续事件的开端，不能用于单独事件）", "similar": [{"form": "〜をはじめ（として）", "diff": "「を皮切りに」强调时间顺序的开端；「をはじめ」强调代表性的列举"}, {"form": "〜をきっかけに", "diff": "「を皮切りに」用于计划性连续事件；「をきっかけに」用于偶然的转机"}], "quiz": [{"q": "新商品の発表（____）、各地で展示会が開催される予定だ。", "opts": ["A.を皮切りに", "B.をきっかけに", "C.をはじめ", "D.について"], "ans": "A", "exp": "表示以新商品发表为开端，连续举办各地展示会，符合「を皮切りに」的用法"}, {"q": "北海道店（____）、来年までに全国に50店舗を展開する計画だ。", "opts": ["A.をきっかけに", "B.を皮切りに", "C.について", "D.に対して"], "ans": "B", "exp": "以北海道店为开端，连续开设全国店铺，是有计划的连续行动"}, {"q": "この事故（____）、安全対策の見直しが行われた。", "opts": ["A.を皮切りに", "B.をきっかけに", "C.をはじめ", "D.に関して"], "ans": "B", "exp": "事故是偶然发生的转机，不是计划性的开端，应用「をきっかけに」"}]}, "97": {"analysis": "「〜をよそに」表示无视、不顾某种状况或他人的心情而采取行动，带有批判性语气。常用于描述某人不考虑周围环境或他人感受的行为，暗示这种行为是不合适的。", "mistakes": "❌ 彼の反対をよそにして、計画を進めた → ✅ 彼の反対をよそに、計画を進めた（不要添加「して」）；❌ 忙しいことをよそに → ✅ 忙しさをよそに（用名词形式）", "similar": [{"form": "〜にかかわらず", "diff": "「にかかわらず」是中性表达，无批判色彩；「をよそに」带有批判性"}, {"form": "〜を無視して", "diff": "「を無視して」直接表达无视；「をよそに」更文雅，暗含批判"}], "quiz": [{"q": "世間の批判____、彼は自分の信念を貫いた。", "opts": ["A. をよそに", "B. にかかわらず", "C. を問わず", "D. を除いて"], "ans": "A", "exp": "表示不顾世人批判而坚持信念，带批判色彩，用「をよそに」"}, {"q": "家族の心配____、一人で海外に行ってしまった。", "opts": ["A. を除いて", "B. をよそに", "C. について", "D. に対して"], "ans": "B", "exp": "不顾家人担心独自出国，批判这种不考虑他人感受的行为"}, {"q": "経済の不況____、この会社は投資を続けている。", "opts": ["A. をよそに", "B. によって", "C. のために", "D. として"], "ans": "A", "exp": "不顾经济不景气继续投资，暗示这种做法值得商榷"}]}, "98": {"analysis": "「～にほど遠い」表示距离某个目标或标准还很遥远，远未达到期望的水平。这个表达带有谦逊或批评的语调，常用于评价技能、水平、理想状态等。与单纯的「遠い」不同，「ほど遠い」强调程度之深，含有「完全达不到」的含义。", "mistakes": "❌ 彼の日本語は上手にほど遠い → ✅ 彼の日本語は上手というにはほど遠い（需要加「という」）❌ 完璧にほど遠くない → ✅ 完璧にはほど遠い（否定形式不自然）❌ 目標にほど遠くなった → ✅ 目標からはほど遠い状態だ（不用过去式）", "similar": [{"form": "～には程遠い", "diff": "写法稍异，意思相同，「には」更强调对比"}, {"form": "～にはまだまだだ", "diff": "更口语化，含有继续努力的积极含义"}, {"form": "～とは言い難い", "diff": "更客观，不强调距离感，只是难以称为"}], "quiz": [{"q": "彼の演技はまだプロ____。", "opts": ["A. にほど遠い", "B. からほど遠い", "C. とほど遠い", "D. でほど遠い"], "ans": "A", "exp": "「～にほど遠い」は名詞に直接接続する固定表現"}, {"q": "私の料理の腕前は母の____。", "opts": ["A. ようにほど遠い", "B. レベルにほど遠い", "C. みたいにほど遠い", "D. らしくほど遠い"], "ans": "B", "exp": "具体的な基準「レベル」を示してから「にほど遠い」を使う"}, {"q": "この企業の利益は目標____。", "opts": ["A. にほど遠くない", "B. からほど遠い", "C. にほど遠い", "D. をほど遠い"], "ans": "C", "exp": "目標という基準に対して「にほど遠い」が正しい表現"}]}, "99": {"analysis": "「〜とは」是表达强烈惊讶、感叹或意外的语法形式，相当于中文的「竟然」「没想到」。它比单纯的「〜と」更加强调说话人的情感色彩，常与「思わなかった」「驚いた」等表达意外的词语搭配使用。这个语法在书面语和正式场合中使用较多，带有文语色彩。", "mistakes": "❌ こんなところで会うと思わなかった。→ ✅ こんなところで会うとは思わなかった。（「とは」更能体现惊讶感）❌ 彼が来るとはびっくりした。→ ✅ 彼が来るとは驚いた。（「驚く」比「びっくりする」更正式）", "similar": [{"form": "〜なんて", "diff": "「とは」更正式书面，「なんて」更口语化随意"}, {"form": "〜だなんて", "diff": "「だなんて」带有轻蔑或不屑的语气，「とは」相对中性"}], "quiz": [{"q": "まさか彼がそんなこと____思いませんでした。", "opts": ["A. を", "B. が", "C. とは", "D. なら"], "ans": "C", "exp": "表达「没想到他会做那样的事」的惊讶，用「とは」"}, {"q": "一人でこんな大きな仕事を成し遂げる____、さすがです。", "opts": ["A. とは", "B. ので", "C. から", "D. ため"], "ans": "A", "exp": "「竟然一个人完成了这么大的工作」表达感叹赞美"}, {"q": "雨が降る____天気予報で言っていなかった。", "opts": ["A. こと", "B. とは", "C. もの", "D. はず"], "ans": "B", "exp": "「没想到会下雨」表达意外，天气预报没预报到"}]}, "100": {"analysis": "「〜ようと/ようとも」是表示强烈逆接假设的文法，比普通的「〜ても」语气更强。「ようと」后面通常接续，而「ようとも」可以单独使用，多用于书面语和正式场合。此文法强调无论前项条件如何变化，后项的意志和决心都不会改变。", "mistakes": "❌ 何が起こってもとも、諦めない → ✅ 何が起ころうとも、諦めない（不能在「ても」后加「とも」）\n❌ 雨が降ろうと、行きます → ✅ 雨が降ろうとも、行きます（单独使用时应用「とも」）\n❌ どんなに忙しいようとも → ✅ どんなに忙しかろうとも（い形容词用「かろう」）", "similar": [{"form": "〜ても/でも", "diff": "「ようと/とも」语气更强烈，更正式"}, {"form": "〜といえども", "diff": "「といえども」更文语化，常用于「〜といえども」的形式"}, {"form": "たとえ〜ても", "diff": "「たとえ〜ても」前面加「たとえ」，「ようと/とも」本身就有强调意味"}], "quiz": [{"q": "どんなに困難____、最後まで頑張るつもりだ。", "opts": ["A. であろうと", "B. であろうとも", "C. でありとも", "D. でありと"], "ans": "B", "exp": "「だ/である」的意向形是「であろう」，表示强烈逆接时用「であろうとも」"}, {"q": "親に反対され____、彼女との結婚を諦めない。", "opts": ["A. ようと", "B. ようとも", "C. ようでも", "D. ようかとも"], "ans": "B", "exp": "动词被动形「反対される」的意向形是「反対されよう」，单独使用时用「とも」"}, {"q": "たとえ世界中が敵になろ____、君だけは信じている。", "opts": ["A. うと", "B. うとも", "C. うても", "D. うでも"], "ans": "B", "exp": "「なる」的意向形是「なろう」，「ようとも」形式，这里是「うとも」"}]}, "101": {"analysis": "「〜ものを」是表达后悔、遗憾、不满情绪的文法，常用于假设性的抱怨或感叹。与「〜のに」相比，「ものを」的感情色彩更强烈，带有明显的埋怨或惋惜语气。多用于口语，表达「如果...就好了」的遗憾心情。", "mistakes": "❌ 早く来るものを → ✅ 早く来ればよかったものを（需要用条件形或た形）\n❌ 勉強したものを、不合格だった → ✅ もっと勉強すればよかったものを（表达的是假设遗憾，不能用于既成事实的简单描述）", "similar": [{"form": "〜のに", "diff": "「のに」较客观，「ものを」主观感情更强，多含埋怨"}, {"form": "〜ばよかった", "diff": "「ばよかった」单纯表后悔，「ものを」还含有对他人的不满"}], "quiz": [{"q": "もう少し頑張って____、１位になれたのに。", "opts": ["A. いるものを", "B. いたものを", "C. いればよかったものを", "D. いるばよかったものを"], "ans": "C", "exp": "表达假设性后悔需要用条件形＋ばよかったものを"}, {"q": "彼に相談____、一人で悩んでしまった。", "opts": ["A. すればよかったものを", "B. するものを", "C. したものを", "D. していたものを"], "ans": "A", "exp": "表达「早知道商量就好了」的遗憾，用条件形＋ばよかったものを"}, {"q": "雨が降る前に____、洗濯物が濡れてしまった。", "opts": ["A. 取り込むものを", "B. 取り込んだものを", "C. 取り込めばよかったものを", "D. 取り込んでいるものを"], "ans": "C", "exp": "对没有及时收衣服的后悔，表达假设遗憾用条件形＋ばよかったものを"}]}, "102": {"analysis": "「〜たとて」是古典日语的残留表现，现代多用于书面语或正式场合，表示强烈的逆接假设。与「〜たとしても」相比，「〜たとて」带有更强的否定语气和不可能性，常暗示结果不会改变。", "mistakes": "❌ 雨が降ったとて、試合は続行する。→ ✅ 雨が降ったとて、試合は中止にはならない。（「〜たとて」后面通常接否定性结果）", "similar": [{"form": "〜たとしても", "diff": "「〜たとて」更书面化，否定语气更强；「〜たとしても」较口语化，语气相对温和"}, {"form": "〜ところで", "diff": "「〜たとて」强调假设的无意义性；「〜ところで」更侧重于现实的限制性"}], "quiz": [{"q": "いくら努力し____、才能がなければ成功は難しい。", "opts": ["A. たとて", "B. たとしても", "C. ところで", "D. としたら"], "ans": "A", "exp": "书面语语境下表示强烈的逆接假设，用「たとて」最适合"}, {"q": "今更後悔し____、時間は戻ってこない。", "opts": ["A. たところで", "B. たとて", "C. たとしても", "D. ばかりに"], "ans": "B", "exp": "「今更〜たとて」是固定搭配，表示现在做某事已经没有意义"}, {"q": "彼に頼み____、断られるのは目に見えている。", "opts": ["A. たとしても", "B. ところで", "C. たとて", "D. ばかりか"], "ans": "C", "exp": "强调即使做了某事，结果也是显而易见的否定结果，用「たとて」"}]}, "103": {"analysis": "「〜にあるまじき」是表示强烈批判的文语体文法，含有「不符合某种身份地位」的严厉谴责语气。此文法专用于批评违背社会期待或职业操守的行为，语气比一般的否定表达更加严厉正式。", "mistakes": "❌ 学生にあるまじき服装を着ている → ✅ 学生にあるまじき服装だ（后接名词，不用动词形式）\n❌ 彼はサラリーマンにあるまじきな人だ → ✅ 彼はサラリーマンにあるまじき人だ（不需要「な」）", "similar": [{"form": "〜らしくない", "diff": "「らしくない」是日常表达，语气较轻；「にあるまじき」是文语体，含强烈批判色彩"}, {"form": "〜にふさわしくない", "diff": "「ふさわしくない」表示不合适；「にあるまじき」专指违背道德操守，语气更严厉"}], "quiz": [{"q": "政治家（____）発言で国民の信頼を失った。", "opts": ["A. にあるまじき", "B. らしくない", "C. にふさわしい", "D. のような"], "ans": "A", "exp": "批评政治家违背职业操守的发言，用「にあるまじき」表示强烈谴责"}, {"q": "医師（____）行為として、医師会から処分を受けた。", "opts": ["A. らしくない", "B. にあるまじき", "C. みたいな", "D. にふさわしい"], "ans": "B", "exp": "医生违背职业道德的严重行为，使用「にあるまじき」表达强烈批判"}, {"q": "親（____）態度で子供を傷つけてしまった。", "opts": ["A. のような", "B. らしい", "C. にあるまじき", "D. みたいな"], "ans": "C", "exp": "批评作为父母不应有的态度行为，「にあるまじき」表达对违背亲职责任的谴责"}]}, "104": {"analysis": "「〜でなくてなんだろう」是表达强烈断定的修辞疑问句，通过反问的形式来强调「正是〜」「不就是〜吗」的意思。这种表达方式比直接断定更加感情充沛，常用于表达深深的感动、确信或赞叹。语法上是「でない」的否定形加上反问，营造出无可辩驳的语气效果。", "mistakes": "❌ この美しさは芸術でなくてなんですか → ✅ この美しさは芸術でなくてなんだろう（应使用「だろう」而非「ですか」来表达修辞疑问）\n❌ 彼が天才じゃなくてなんだろう → ✅ 彼が天才でなくてなんだろう（书面语应使用「でない」而非「じゃない」）", "similar": [{"form": "〜に他ならない", "diff": "直接断定形式，较为正式客观；「でなくてなんだろう」是反问形式，更加感情化主观"}, {"form": "〜にほかならない", "diff": "与「に他ならない」意思相同，都是直接断定；「でなくてなんだろう」通过反问强调，语气更强烈"}], "quiz": [{"q": "あの時の彼の行動は勇気の____。", "opts": ["A. 現れでなくてなんだろう", "B. 現れではなくてなんですか", "C. 現れでなければなんだろう", "D. 現れでないとなんだろう"], "ans": "A", "exp": "修辞疑问句应使用「でなくてなんだろう」，表达强烈的断定语气"}, {"q": "この絶景は自然の____。", "opts": ["A. 芸術品でなくてなんでしょう", "B. 芸術品でなくてなんだろう", "C. 芸術品じゃなくてなんだろう", "D. 芸術品でないならなんだろう"], "ans": "B", "exp": "正确形式是「でなくてなんだろう」，表达对自然美景的强烈赞叹"}, {"q": "彼女のその笑顔は天使の____。", "opts": ["A. 微笑みでなくてなんですか", "B. 微笑みではありませんか", "C. 微笑みでなくてなんだろう", "D. 微笑みでなければなんですか"], "ans": "C", "exp": "「でなくてなんだろう」通过修辞疑问表达强烈的感动和确信"}]}, "105": {"analysis": "「をもって」是N1级别的敬语表达，主要用于正式场合和书面语中，表示手段、方法或时间节点。与「で」「によって」意思相近但更加郑重，常见于公告、通知等正式文件中。", "mistakes": "❌ 今日をもって会社を辞める → ✅ 本日をもって退職させていただきます（正式场合需用敬语）；❌ 友達をもって解決する → ✅ 友達の力で解決する（不能用于人）", "similar": [{"form": "によって", "diff": "をもって更正式，多用于书面语；によって日常会话也可用"}, {"form": "で", "diff": "で是普通表达；をもって是敬语，用于正式场合"}, {"form": "をもとに", "diff": "をもとに表示「基于～」；をもって表示「以～」「凭～」"}], "quiz": [{"q": "この度、転勤に伴い、３月末日____退職いたします。", "opts": ["A. をもって", "B. によって", "C. において", "D. に対して"], "ans": "A", "exp": "正式的退职通知中，用「をもって」表示时间节点，更加郑重得体"}, {"q": "長年の経験____、この問題を解決できると思います。", "opts": ["A. をもって", "B. をもとに", "C. に関して", "D. について"], "ans": "A", "exp": "「经验をもって」表示凭借经验这一手段来解决问题"}, {"q": "弊社では、お客様の安全____最優先に考えております。", "opts": ["A. をもって", "B. に対して", "C. として", "D. について"], "ans": "A", "exp": "「安全をもって最優先」表示以安全作为最优先考虑的标准"}]}, "106": {"analysis": "「〜にして」表示在某个时间点或状态下就已经达到了令人惊讶的程度，强调时间早或程度高的意外性。与一般的时间表达不同，它带有强烈的感叹色彩，暗示这个时机超出了常人预期。常用于年龄、期间等数量词，突出「就在这个时候」的震撼感。", "mistakes": "❌ 彼は大学生にして結婚した → ✅ 彼は大学生にして結婚している（状态持续）/ 彼は20歳にして結婚した（具体年龄）。容易误用抽象身份而非具体时间点，或忽视句子时态的呼应关系。", "similar": [{"form": "〜ながら（逆接）", "diff": "ながら表示让步关系「虽然~但是」，にして强调时间点的惊讶「就在~时」"}, {"form": "〜にもかかわらず", "diff": "表示「尽管~」的逆接，にして不含逆接意味，纯粹强调时间早"}], "quiz": [{"q": "彼女は15歳____、小説家としてデビューした。", "opts": ["A. にして", "B. ながら", "C. として", "D. によって"], "ans": "A", "exp": "强调在15岁这个令人惊讶的年轻时就成为小说家，用「にして」表示时间早的感叹"}, {"q": "この会社は創立3年____、世界的企業になった。", "opts": ["A. として", "B. にして", "C. による", "D. までに"], "ans": "B", "exp": "强调仅仅3年就成为世界企业这一惊人速度，「にして」突出时间短的震撼"}, {"q": "彼は大学生____、この発見をした。正しい文は？", "opts": ["A. 彼は大学生にしてこの発見をした", "B. 彼は21歳にしてこの発見をした", "C. 彼は大学でにしてこの発見をした", "D. 彼は大学生としてこの発見をした"], "ans": "B", "exp": "「にして」需要具体的数量词，「大学生」是身份不是时间点，应用「21歳にして」"}]}, "107": {"analysis": "「〜とあって」表示因为某种特殊情况或特别的事情作为理由背景，强调这种情况的特殊性和必然性。与单纯表示原因的「〜ので」不同，「〜とあって」暗示这种情况是预料之中的、理所当然的结果。常用于描述因特殊时期、特别活动或重要场合而产生的必然现象。", "mistakes": "❌ 今日は雨とあって、外に出たくない。→ ✅ 今日は雨なので、外に出たくない。（普通的下雨不是特殊情况）❌ 彼は学生とあって、お金がない。→ ✅ 彼は学生なので、お金がない。（学生身份不是特殊事情）", "similar": [{"form": "〜だけあって", "diff": "「だけあって」强调「正因为是~才~」，突出能力或资格；「とあって」强调特殊情况带来的必然结果"}, {"form": "〜ので", "diff": "「ので」表示一般原因；「とあって」专指特殊情况作为背景原因，带有「理所当然」的语感"}], "quiz": [{"q": "年末____、デパートは大変混雑している。", "opts": ["A. だから", "B. とあって", "C. ために", "D. として"], "ans": "B", "exp": "年末是特殊时期，用「とあって」表示因为这个特殊背景而产生理所当然的结果"}, {"q": "有名な観光地____、外国人観光客が多い。", "opts": ["A. とあって", "B. について", "C. に対して", "D. として"], "ans": "A", "exp": "有名观光地是特殊情况，「とあって」表示因此特殊背景而必然出现外国游客多的现象"}, {"q": "彼は専門家____、説明がとても分かりやすい。", "opts": ["A. とあって", "B. だけあって", "C. について", "D. として"], "ans": "B", "exp": "这里强调「正因为是专家才~」，应用「だけあって」而不是「とあって」"}]}, "108": {"analysis": "「〜はいうにおよばず」是高雅的书面表达，相当于「〜はもちろん」的郑重形式。「いうにおよばず」意为「不需要特意说出来」，表示某事理所当然、不言而喻。常用于正式文章、演讲等场合，带有强调前项重要性并引出后项的修辞效果。", "mistakes": "❌ 彼はいうにおよばず、私も参加する → ✅ 彼はいうにおよばず、私も参加したい（需要避免过于口语化的表达）\n❌ お金はいうにおよばず → ✅ 資金はいうにおよばず（书面语应使用更正式的词汇）", "similar": [{"form": "〜はもちろん", "diff": "「はいうにおよばず」更加书面化、正式，多用于文章；「はもちろん」使用范围更广，口语书面语皆可"}, {"form": "〜は言うまでもなく", "diff": "意思相近但「はいうにおよばず」更简洁，且带有古典文体色彩"}], "quiz": [{"q": "学力____、人格も重視される。", "opts": ["A.はいうにおよばず", "B.というより", "C.にしては", "D.としても"], "ans": "A", "exp": "表示「学力自不必说」，强调学力理所当然重要，人格也同样重要"}, {"q": "専門知識____、基礎学力も必要だ。", "opts": ["A.にもかかわらず", "B.はいうにおよばず", "C.に対して", "D.について"], "ans": "B", "exp": "「专业知识自不必说」，表示专业知识的重要性不言而喻，基础学力也很必要"}, {"q": "健康____、精神面での充実も大切である。", "opts": ["A.といえども", "B.にかけては", "C.はいうにおよばず", "D.をもって"], "ans": "C", "exp": "表示「健康自不必说」，健康的重要性理所当然，精神层面的充实也很重要"}]}, "109": {"analysis": "「〜の極み」是表示某种状态或感情达到极致的书面语表达，带有强烈的感情色彩。与一般的程度副词不同，它强调的是达到了无法再超越的顶点状态，常用于描述奢侈、幸福、不幸等抽象概念的极端程度。", "mistakes": "❌ 今日は暑いの極みだ → ✅ 今日は暑さの極みだ（需要将形容词名词化）；❌ 彼は優秀の極みな学生だ → ✅ 彼は優秀の極みの学生だ（连体修饰时用「の」）", "similar": [{"form": "〜この上ない", "diff": "「この上ない」可接形容词词干，语感较「の極み」稍弱"}, {"form": "〜至上", "diff": "「至上」多用于固定搭配，表示最高地位，不如「の極み」感情色彩浓厚"}], "quiz": [{"q": "彼女の美しさは（____）と言っても過言ではない。", "opts": ["A. 美の極み", "B. 美しいの極み", "C. 美しさの極み", "D. 美麗の極み"], "ans": "C", "exp": "形容词需要名词化后才能接「の極み」，「美しさ」是正确形式"}, {"q": "その料理は（____）で、忘れられない味だった。", "opts": ["A. 美味の極み", "B. 美味しいの極み", "C. 美味しさの極み", "D. 味の極み"], "ans": "A", "exp": "「美味」本身就是名词，可直接接「の極み」"}, {"q": "戦争で家族を失った彼の心境は（____）だった。", "opts": ["A. 悲しいの極み", "B. 悲しみの極み", "C. 悲哀の極み", "D. 悲惨の極み"], "ans": "B", "exp": "表示内心的悲伤程度达到极致，用「悲しみの極み」最恰当"}]}, "110": {"analysis": "「〜がたい」表示主观上感到某事困难或不容易实现，带有强烈的情感色彩。与「〜にくい」相比，「〜がたい」更强调心理上的困难感，常用于抽象概念，语感更加正式和文语化。", "mistakes": "❌ この問題は解決しがたいです → ✅ この問題は解決しがたい（「がたい」后不接「です」等敬语形式）\n❌ 食べがたい料理 → ✅ 食べにくい料理（具体的物理困难用「にくい」）", "similar": [{"form": "〜にくい", "diff": "「にくい」表示客观的物理困难，「がたい」表示主观的心理困难感"}, {"form": "〜かねる", "diff": "「かねる」多用于拒绝表达，「がたい」纯粹表示困难"}], "quiz": [{"q": "彼の突然の決断は（____）。", "opts": ["A. 理解しがたい", "B. 理解しにくい", "C. 理解しかねる", "D. 理解しづらい"], "ans": "A", "exp": "突然的决断在心理上难以理解，用「がたい」最恰当"}, {"q": "この古い機械は（____）。", "opts": ["A. 使いがたい", "B. 使いにくい", "C. 使いかねる", "D. 使いがち"], "ans": "B", "exp": "机械操作困难是客观物理问题，应用「にくい」"}, {"q": "そんな失礼な申し出は（____）。", "opts": ["A. 受けがたい", "B. 受けにくい", "C. 受けかねる", "D. 受けやすい"], "ans": "C", "exp": "拒绝失礼提议的委婉表达，用「かねる」最合适"}]}, "111": {"analysis": "「〜かねる」是表示委婉拒绝的敬语表达，常用于商务场合。它比直接拒绝更礼貌，给对方留有面子。与「〜にくい」的客观困难不同，「かねる」更多表达主观上的不便或不愿意。", "mistakes": "❌ その提案は賛成しかねません → ✅ その提案には賛成しかねます（「に」を忘れやすい）\n❌ 今日は行くことかねます → ✅ 今日は参りかねます（動詞選択要適切）\n❌ ちょっと手伝いかねる → ✅ ちょっとお手伝いしかねます（敬語として使用）", "similar": [{"form": "〜にくい", "diff": "客観的困難；「かねる」は主観的な不便・拒否で敬語表現"}, {"form": "〜がたい", "diff": "感情的に困難；「かねる」はより実用的な拒否表現"}, {"form": "〜わけにはいかない", "diff": "道理上不可；「かねる」は礼儀上の委婉拒絶"}], "quiz": [{"q": "申し訳ございませんが、その件につきましては____。", "opts": ["A.お答えしかねます", "B.答えにくいです", "C.答えがたいです", "D.答えるわけにはいきません"], "ans": "A", "exp": "商務場合的委婉拒絶用「お答えしかねます」最適切"}, {"q": "今回の件は責任を____。", "opts": ["A.取りにくいです", "B.負いかねます", "C.取ることができません", "D.取りがたいです"], "ans": "B", "exp": "「責任を負いかねます」是委婉表達無法承擔責任的敬語表現"}, {"q": "恐れ入りますが、そのご要望にお応え____。", "opts": ["A.することは困難です", "B.しがたいです", "C.しかねます", "D.するわけにはいきません"], "ans": "C", "exp": "「お応えしかねます」是對顧客要求的標準委婉拒絶表達"}]}, "112": {"analysis": "「〜に堪える/堪えない」是N1级别的书面语文法，具有双重含义：一是表示「值得～」的积极评价，二是表示「无法忍受～」的消极意义。需要根据语境判断具体含义，常用于文学作品、评论等正式文体中。", "mistakes": "❌ この映画は見るに堪えません → ✅ この映画は鑑賞に堪えない（应使用汉语词汇而非和语动词）；❌ 痛みを堪えない → ✅ 痛みに堪えない（助词使用错误）", "similar": [{"form": "〜に値する", "diff": "「に値する」更直接表达价值判断，「に堪える」语感更文雅庄重"}, {"form": "〜に耐える", "diff": "「に耐える」主要指物理上的承受能力，「に堪える」多用于精神、品质层面"}], "quiz": [{"q": "彼の演技は____に堪える素晴らしいものだった。", "opts": ["A. 見る", "B. 鑑賞", "C. 観察", "D. 注目"], "ans": "B", "exp": "「鑑賞に堪える」是固定搭配，表示值得欣赏"}, {"q": "この騒音は____堪えない。", "opts": ["A. を", "B. が", "C. に", "D. で"], "ans": "C", "exp": "「〜に堪えない」中必须使用助词「に」"}, {"q": "その提案は____に堪えない愚策だ。", "opts": ["A. 検討", "B. 考慮", "C. 採用", "D. 実行"], "ans": "A", "exp": "「検討に堪えない」表示不值得考虑，符合语境"}]}, "113": {"analysis": "「〜ながらに」是表示维持某种状态进行动作的文语表现，多用于书面语和正式场合。与「〜ながら」不同，「ながらに」强调状态的保持性和不变性，常与感情、身份、年龄等抽象概念搭配使用。", "mistakes": "❌ 学生ながらに、アルバイトをしている → ✅ 学生ながら、アルバイトをしている（表示并列关系时用「ながら」）❌ 生まれながらにして天才だ → ✅ 生まれながらの天才だ（固定搭配「生まれながらの」）", "similar": [{"form": "〜ながら", "diff": "「ながら」表示并列或对比关系；「ながらに」表示保持某种状态"}, {"form": "〜のまま", "diff": "「のまま」用法更广泛；「ながらに」更加文语化，多用于抽象状态"}], "quiz": [{"q": "彼は病気（____）仕事を続けている。", "opts": ["A.ながらに", "B.ながら", "C.のまま", "D.として"], "ans": "B", "exp": "表示「虽然生病但仍工作」的对比关系，应使用「ながら」"}, {"q": "生まれ（____）の才能を持っている。", "opts": ["A.ながらに", "B.ながら", "C.ながらの", "D.ながらにして"], "ans": "C", "exp": "「生まれながらの」是固定搭配，表示「天生的」"}, {"q": "彼女は涙（____）謝罪した。", "opts": ["A.ながら", "B.ながらに", "C.のまま", "D.として"], "ans": "B", "exp": "「涙ながらに」表示含泪的状态，是「ながらに」的典型用法"}]}, "114": {"analysis": "「〜にもかかわらず」是N1级逆接表现的书面语强调形，比「〜のに」更正式庄重。「にも」的「も」表示强调，突出对比的强烈程度。常用于描述超出常识预期的情况，体现说话者对这种反差的惊讶或赞叹。", "mistakes": "❌ 雨が降っているにもかかわらず、散歩した。→ ✅ 雨が降っているにもかかわらず、散歩に出かけた。（应使用更正式的表达）❌ 忙しいにもかかわらずに来てくれた。→ ✅ 忙しいにもかかわらず来てくれた。（不能加「に」）", "similar": [{"form": "〜のに", "diff": "口语性较强，「にもかかわらず」更书面正式"}, {"form": "〜ものの", "diff": "同样书面语，但「にもかかわらず」强调程度更强"}, {"form": "〜とはいえ", "diff": "表让步，「にもかかわらず」表完全的逆接对比"}], "quiz": [{"q": "彼は病気____、毎日会社に通っている。", "opts": ["A. にもかかわらず", "B. にもかからず", "C. にもかかわって", "D. にもかかわり"], "ans": "A", "exp": "「にもかかわらず」表示逆接强调，符合语境。其他选项为错误形式。"}, {"q": "大雨____、試合は予定通り行われた。", "opts": ["A. であるのに", "B. にもかかわらず", "C. にもかからず", "D. にもかかって"], "ans": "B", "exp": "书面语正式表达用「にもかかわらず」最适当，强调恶劣天气与比赛照常进行的强烈对比。"}, {"q": "経済が不況____、この会社だけは利益を上げている。", "opts": ["A. なのに", "B. だから", "C. にもかかわらず", "D. について"], "ans": "C", "exp": "表达经济不景气与公司盈利的强烈反差，用「にもかかわらず」强调这种意外性。"}]}, "115": {"analysis": "「～に先立って」是N1高级语法，表示在某个重要事件发生之前进行另一个行为，多用于正式场合和书面语。与「～前に」相比，「～に先立って」更加正式，常用于仪式、会议等庄重场合，带有准备性或预备性的含义。", "mistakes": "易错点：❌ パーティーに先立って、買い物に行った。→ ✅ パーティーの前に、買い物に行った。（日常场合不宜使用过于正式的表达）❌ 会議に先立ち、資料を準備します。→ ✅ 会議に先立って、資料を準備いたします。（正式场合需用敬语）", "similar": [{"form": "～前に", "diff": "「～に先立って」更正式，用于重要场合；「～前に」是日常表达"}, {"form": "～を前にして", "diff": "「～に先立って」强调时间顺序；「～を前にして」强调面临某种情况时的心境"}], "quiz": [{"q": "卒業式____、記念写真を撮影した。", "opts": ["A. に先立って", "B. を前にして", "C. より前に", "D. に対して"], "ans": "A", "exp": "卒业典礼是正式场合，用「に先立って」最合适，表示在典礼开始前拍摄纪念照片"}, {"q": "新商品の発売____、試食会を開催いたします。", "opts": ["A. の前で", "B. に先立ち", "C. を控えて", "D. に関して"], "ans": "B", "exp": "商品发售前的试吃会是正式的商业活动，用「に先立ち」表示在发售之前举办"}, {"q": "手術____、医師から詳しい説明を受けた。", "opts": ["A. に先立って", "B. に関して", "C. について", "D. に対して"], "ans": "A", "exp": "手术是重要的医疗行为，在手术前接受医生详细说明，用「に先立って」表示正式的准备程序"}]}, "116": {"analysis": "「〜ないではおかない」是表示强烈意志或必然结果的文法，常用于口语中。它强调说话者对某种结果的确信，带有「必定会～」「一定会～」的语感。与书面语「〜ずにはおかない」意思相同但更口语化，常用于描述无法避免的结果或强烈的决心。", "mistakes": "❌ この映画は見る人を泣かせるないではおかない。→ ✅ この映画は見る人を泣かせないではおかない。（动词ない形去掉ない后直接接ないではおかない）❌ 彼の話は人を驚かないではおかない。→ ✅ 彼の話は人を驚かせないではおかない。（使役动词需要正确变形）", "similar": [{"form": "〜ずにはおかない", "diff": "书面语表达，意思相同但更正式"}, {"form": "〜に違いない", "diff": "表示推测确信，而非强调必然的结果或意志"}, {"form": "〜きっと〜だろう", "diff": "表示推测，语气比ないではおかない弱"}], "quiz": [{"q": "彼の演技は観客を（　　）ないではおかない。", "opts": ["A. 感動させ", "B. 感動し", "C. 感動", "D. 感動する"], "ans": "A", "exp": "使役形「感動させる」的ない形去掉ない，变成「感動させ」＋ないではおかない"}, {"q": "この小説は読む人の心を（　　）ないではおかない。", "opts": ["A. 揺らし", "B. 揺らが", "C. 揺らす", "D. 揺らさ"], "ans": "D", "exp": "「揺らす」的ない形是「揺らさない」，去掉ない变成「揺らさ」"}, {"q": "あの料理人の腕前なら、客を（　　）ないではおかない。", "opts": ["A. 唸らせ", "B. 唸ら", "C. 唸らさ", "D. 唸る"], "ans": "A", "exp": "使役形「唸らせる」的ない形去掉ない，「唸らせ」＋ないではおかない表示必定让客人赞叹"}]}, "117": {"analysis": "「〜んがため（に）」是古风书面语表达，用于表示强烈的目的意志。接续方式是动词ない形去掉「ない」加「んがため（に）」，如「勝つ→勝たない→勝たんがため」。此文法带有庄重、正式的语感，常用于文学作品或正式文书中。", "mistakes": "易错点：接续形式混淆。❌「勝つんがために練習した」→ ✅「勝たんがために練習した」；❌「食べんがために働く」→ ✅「食べんがために働く」（但现代多用「食べるために」）", "similar": [{"form": "〜ために", "diff": "「〜んがため」更古风正式，多用于书面语；「〜ために」现代通用表达"}, {"form": "〜べく", "diff": "「〜べく」也是书面语，但接续是动词辞书形；「〜んがため」接续是ない形去ない"}], "quiz": [{"q": "彼は故郷を守らんがため____、戦場に向かった。", "opts": ["A. を", "B. に", "C. で", "D. が"], "ans": "B", "exp": "「〜んがため」后面通常加助词「に」，表示目的"}, {"q": "正しい接続はどれですか。", "opts": ["A. 生きるんがため", "B. 生きんがため", "C. 生きないんがため", "D. 生きようんがため"], "ans": "B", "exp": "動詞ない形から「ない」を取って「んがため」を接続する。「生きる→生きない→生きんがため」"}, {"q": "次の文で最も自然なのは？", "opts": ["A. お金を稼ぐんがために働く", "B. お金を稼がんがために働く", "C. お金を稼ぐために働く", "D. お金を稼ごうんがために働く"], "ans": "C", "exp": "日常会話では「〜ために」が自然。「〜んがため」は古風な書面語表現"}]}, "118": {"analysis": "「〜ごとに」表示定期性或反复性的动作，强调每次某个动作或状态发生时，必然伴随另一个结果。与「〜たびに」相比，「〜ごとに」更偏重于规律性和周期性，常用于描述生理现象、自然规律或习惯性行为。", "mistakes": "❌ 雨が降るごとに出かけます → ✅ 雨が降るたびに家にいます（「ごとに」不适合偶发性事件）\n❌ 一回ごとに → ✅ 一度ごとに（数量词搭配要准确）\n❌ 彼に会うごとに嬉しくなった → ✅ 彼に会うたびに嬉しくなった（过去的不规律事件用「たびに」）", "similar": [{"form": "〜たびに", "diff": "「たびに」可用于不规律的反复，「ごとに」更强调规律性"}, {"form": "〜おきに", "diff": "「おきに」表示间隔（跳过），「ごとに」表示连续的每次"}, {"form": "〜につき", "diff": "「につき」表示比率基准，「ごとに」表示时间或动作的反复"}], "quiz": [{"q": "心臓が鼓動する____、血液が全身に送られる。", "opts": ["A. ごとに", "B. たびに", "C. おきに", "D. につき"], "ans": "A", "exp": "心脏跳动是规律的生理现象，用「ごとに」表示每次规律性的动作"}, {"q": "この薬は食事の____服用してください。", "opts": ["A. たびに", "B. ごとに", "C. おきに", "D. につれて"], "ans": "A", "exp": "用餐时间不完全规律，且强调每次用餐时都要服药，用「たびに」更自然"}, {"q": "地球は24時間____自転している。", "opts": ["A. たびに", "B. おきに", "C. ごとに", "D. につき"], "ans": "C", "exp": "地球自转是完全规律的自然现象，每24小时一次，用「ごとに」表示周期性"}]}, "119": {"analysis": "「〜ずじまい」表示带有遗憾色彩的「最终没能做成某事」，强调结果的未完成状态和说话者的后悔心情。与单纯的否定不同，这个文法暗含「本来想做但没做成」的心理状态。常用于回顾过去的情况，表达一种无奈和遗憾的情绪。", "mistakes": "❌ 彼に会わないずじまいだった → ✅ 彼に会えずじまいだった（要用可能形的ない形）\n❌ 宿題をやらずじまいになった → ✅ 宿題をやらずじまいだった（结尾用だった，不用になった）", "similar": [{"form": "〜ないまま", "diff": "单纯表示「没做就...」的状态，不含遗憾情绪；ずじまい强调遗憾和后悔"}, {"form": "〜なかった", "diff": "普通的过去否定，客观陈述；ずじまい带有主观的遗憾色彩"}], "quiz": [{"q": "約束の時間に間に合わず、結局彼女に謝る____。", "opts": ["A. ことずじまいだった", "B. ずじまいだった", "C. こともできずじまいだった", "D. ずじまいになった"], "ans": "C", "exp": "「謝ることもできず」の形で可能形+ことも+できずじまいの構造が正しい"}, {"q": "新しい技術を____、プロジェクトが終了してしまった。", "opts": ["A. 習得しずじまいで", "B. 習得できずじまいで", "C. 習得せずじまいで", "D. 習得しないずじまいで"], "ans": "B", "exp": "可能動詞「習得できる」のない形「習得でき」+「ずじまい」が正しい"}, {"q": "母の手料理を____、一人暮らしが続いている。", "opts": ["A. 食べずじまい", "B. 食べないずじまい", "C. 食べられずじまい", "D. 食べることずじまい"], "ans": "C", "exp": "「食べられる（可能）」のない形「食べられ」+「ずじまい」で遗憾の気持ちを表現"}]}, "120": {"analysis": "「〜たきり」表示做了某个动作之后就一直保持那种状态，没有发生变化或回到原来的状态。与「〜たまま」的区别在于，「たきり」更强调「从那以后就没有...」的含义，常用于消极或遗憾的语境。", "mistakes": "❌ 彼は家を出たきりに帰ってこない → ✅ 彼は家を出たきり帰ってこない（不需要「に」）\n❌ 本を読んだきり、まだ読んでいる → ✅ 本を読み始めたまま、まだ読んでいる（持续状态用「たまま」）", "similar": [{"form": "〜たまま", "diff": "「たまま」表示状态持续，「たきり」强调从那以后就没有变化"}, {"form": "〜て以来", "diff": "「て以来」是正式表达，「たきり」更口语化且含消极色彩"}], "quiz": [{"q": "彼女は結婚してから故郷に____、一度も帰っていない。", "opts": ["A. 帰ったきり", "B. 帰ったまま", "C. 帰って以来", "D. 帰ったところ"], "ans": "A", "exp": "「帰ったきり」表示回老家后就一直没再回来，符合语境"}, {"q": "息子は部屋に____出てこない。心配だ。", "opts": ["A. 入ったまま", "B. 入ったきりで", "C. 入って以来", "D. 入ったところで"], "ans": "B", "exp": "「入ったきりで」表示进入房间后就一直没出来，「で」可省略"}, {"q": "この本は一度____、もう二度と開いていない。", "opts": ["A. 読んだまま", "B. 読んで以来", "C. 読んだきり", "D. 読んだばかり"], "ans": "C", "exp": "「読んだきり」表示读了一次之后就再也没读过，强调没有重复动作"}]}, "121": {"analysis": "「〜てこそ」是N1级别的强调表现，表示「只有通过某种行为或条件，才能实现某种结果」，强调前项是后项成立的唯一或最重要条件。与单纯的条件表现不同，它带有强烈的价值判断和情感色彩，常用于表达人生哲理、经验教训等深层含义。", "mistakes": "易与其他条件表现混淆。❌ 雨が降ってこそ、試合が中止になった。→ ✅ 雨が降ったので、試合が中止になった。（单纯因果关系不用てこそ）❌ 勉強してこそ、時間がない。→ ✅ 勉強したいが、時間がない。（てこそ用于积极意义的强调）", "similar": [{"form": "〜からこそ", "diff": "からこそ强调原因理由，てこそ强调行为条件"}, {"form": "〜ばこそ", "diff": "ばこそ多用于假定，てこそ强调已发生的行为"}, {"form": "〜て初めて", "diff": "て初めて客观描述，てこそ主观强调价值"}], "quiz": [{"q": "真の友情は、困った時に助け合（____）深まるものだ。", "opts": ["A. てこそ", "B. たからこそ", "C. て初めて", "D. てはじめて"], "ans": "A", "exp": "强调只有在困难时相互帮助，友情才能加深，体现てこそ的价值强调用法"}, {"q": "失敗を経験（____）、本当の成功の価値がわかる。", "opts": ["A. したこそ", "B. してこそ", "C. するからこそ", "D. したので"], "ans": "B", "exp": "强调只有经历失败才能理解成功的价值，てこそ接动词て形表示条件强调"}, {"q": "両親の愛情は、子供を持（____）理解できるものだ。", "opts": ["A. ってこそ", "B. つからこそ", "C. って初めて", "D. ったので"], "ans": "A", "exp": "强调只有有了孩子才能真正理解父母的爱，持つ的て形是持って，てこそ强调唯一条件"}]}, "122": {"analysis": "「〜ないまでも」表示退让的语气，承认某个最理想的情况无法实现，但至少可以做到次一等的事情。这个文法体现了日语中委婉表达的特点，通过否定最高要求来突出实际能够实现的替代方案。", "mistakes": "❌ 完全に理解できないまでも、少しは分かる → ✅ 完全に理解はできないまでも、少しは分かる（「は」的省略容易造成语感不自然）", "similar": [{"form": "〜とまではいかなくても", "diff": "更强调程度上的差距，「ないまでも」更侧重于退让的语气"}, {"form": "〜ずとも", "diff": "古典语法，意思相近但语感更正式，现代 といったところだ"], "ans": "B", "exp": "といったところだ需要接具体的程度或状态，N2合格是具体的水平表现"}, {"q": "今回のテストの平均点は70点____。", "opts": ["A. くらいです", "B. といったところだ", "C. というものだ", "D. ということだ"], "ans": "B", "exp": "表示对平均分的大致评价估算，といったところだ最适合"}]}, "125": {"analysis": "「〜は別として」表示将某事物排除在外，不予考虑，专注于其他方面的讨论。与「〜はともかく」相比，「は別として」更强调明确排除某个特定事项，常用于正式场合。该句型体现了日语中先排除例外、再进行主要讨论的逻辑思维模式。", "mistakes": "❌ 彼の能力は別として、態度が問題だ → ✅ 彼の能力は別として、態度に問題がある。（「〜が問題だ」应为「〜に問題がある」）❌ 値段を別として、品質はいい → ✅ 値段は別として、品質はいい。（助词应使用「は」而非「を」）", "similar": [{"form": "〜はともかく", "diff": "「は別として」更正式，明确排除；「はともかく」较口语化，含有暂且不论的语感"}, {"form": "〜を除いて", "diff": "「を除いて」单纯表示排除；「は別として」含有转换话题、专注讨论其他方面的意图"}], "quiz": [{"q": "経験（____）、君の熱意は十分評価できる。", "opts": ["A.は別として", "B.を別として", "C.が別として", "D.に別として"], "ans": "A", "exp": "「〜は別として」是固定搭配，名词后接助词「は」"}, {"q": "価格は別として、このパソコンの（____）はどうですか。", "opts": ["A.値段", "B.性能", "C.コスト", "D.料金"], "ans": "B", "exp": "前文已提到「価格は別として」，后文应询问除价格外的其他方面，即「性能」"}, {"q": "見た目は別として、（____）美味しいケーキです。", "opts": ["A.とても", "B.あまり", "C.全然", "D.ちっとも"], "ans": "A", "exp": "「見た目は別として」表示外观不论，暗示外观可能不佳，但味道很好，用「とても」表示程度"}]}, "126": {"analysis": "〜というか〜というか用于表达说话者对某事物难以明确定义或分类的心理状态，体现了日语中含蓄表达的特点。此句型常用于描述复杂情感或模糊概念，通过并列两个相对或不同的词语来表达内心的犹豫和矛盾。使用时需注意两个词语应具有一定的对比性或关联性。", "mistakes": "❌ 彼は学生というか先生というか分からない。（语义逻辑不当，身份应该明确） → ✅ 彼は学生というか研究者というか、よく分からない立場にいる。❌ 美味しいというか美味しいというか → ✅ 美味しいというかまずいというか、微妙な味だ。（不能重复同一词语）", "similar": [{"form": "〜とも〜とも", "diff": "というか〜というか强调说话者的迷茫困惑，とも〜とも更客观地表示两种可能性并存"}, {"form": "〜やら〜やら", "diff": "やら〜やら多用于列举多个事物，というか〜というか专门表达定义上的模糊和犹豫"}], "quiz": [{"q": "今日の天気は暑い（____）寒い（____）、よく分からない。", "opts": ["A. というか...というか", "B. といえば...といえば", "C. とすれば...とすれば", "D. にしても...にしても"], "ans": "A", "exp": "表达对天气难以明确定义的困惑，用というか〜というか最合适"}, {"q": "彼の作品は芸術（____）商品（____）、判断に迷う。", "opts": ["A. だから...だから", "B. というか...というか", "C. なので...なので", "D. だけど...だけど"], "ans": "B", "exp": "对作品性质的模糊判断，体现了というか〜というか的典型用法"}, {"q": "この映画は面白い（____）つまらない（____）、微妙な感じだった。", "opts": ["A. けれど...けれど", "B. ながら...ながら", "C. というか...というか", "D. ところで...ところで"], "ans": "C", "exp": "表达对电影评价的犹豫和模糊感受，正是というか〜というか的使用场景"}]}, "127": {"analysis": "「ことといったら」是表示强烈感情的句型，用于强调说话者对某事物的深刻感受或印象。与单纯的形容不同，这个句型带有浓厚的主观色彩和感情投入，常用于回忆或描述令人印象深刻的体验。句末多用感叹表现或程度副词来呼应这种强调语气。", "mistakes": "❌ 昨日の暑さことといったら、大変でした。→ ✅ 昨日の暑さといったら、大変でした。（名词直接连接，不需要「の」）❌ 彼が怒ることといったら、すごかった。→ ✅ 彼の怒りようといったら、すごかった。（动词需要名词化）", "similar": [{"form": "〜たら〜たで", "diff": "「ことといったら」强调感情程度，「たら〜たで」表示无论哪种情况都有问题"}, {"form": "〜といえば", "diff": "「ことといったら」带强烈感情色彩，「といえば」是客观提及话题"}], "quiz": [{"q": "昨夜の雨の____、本当にひどかった。", "opts": ["A. ことといったら", "B. ことになったら", "C. ことがあったら", "D. ことにしたら"], "ans": "A", "exp": "表示对昨夜雨势的强烈印象，用「ことといったら」强调程度"}, {"q": "彼の料理の下手____、食べられたものじゃない。", "opts": ["A. ということは", "B. さといったら", "C. ことといったら", "D. ということで"], "ans": "B", "exp": "「下手さ」是名词，直接用「さといったら」，不需要「こと」"}, {"q": "子供の頃の夏休みの____、毎日が楽しくて仕方なかった。", "opts": ["A. 楽しさことといったら", "B. 楽しいことといったら", "C. 楽しさといったら", "D. 楽しみことといったら"], "ans": "C", "exp": "名词「楽しさ」直接连接「といったら」，不需要「こと」"}]}, "128": {"analysis": "「〜を経て」表示经过某个过程、阶段或时期后到达某种状态，强调时间的推移和过程的重要性。与单纯的时间推移不同，这个文法暗示经过的过程对结果产生了重要影响，常用于描述人生阶段、事业发展、历史变迁等正式场合。", "mistakes": "❌ 昨日を経て今日になった → ✅ 一日を経て状況が変わった（不能用于自然时间流逝，需要有意义的过程）\n❌ 5年間を経て → ✅ 5年間の研究を経て（需要具体的过程内容，不能只是时间段）\n❌ 彼を経て知った → ✅ 彼との出会いを経て知った（需要用具体的过程或经历）", "similar": [{"form": "〜を通じて/〜を通して", "diff": "「を通じて」强调手段、媒介；「を経て」强调时间过程和阶段性"}, {"form": "〜の末に/〜の末", "diff": "「の末に」强调努力的结果；「を経て」更注重过程本身的意义"}, {"form": "〜を踏まえて", "diff": "「を踏まえて」基于已有经验做判断；「を経て」强调经历过程后的变化"}], "quiz": [{"q": "数々の困難____、彼は一流の職人となった。", "opts": ["A. を経て", "B. を通じて", "C. に対して", "D. について"], "ans": "A", "exp": "表示经过各种困难的过程后成为一流工匠，用「を経て」表示过程"}, {"q": "この製品は厳しい検査____市場に出される。", "opts": ["A. を通して", "B. を経て", "C. によって", "D. に関して"], "ans": "B", "exp": "经过严格检查这个过程后才投入市场，强调检查过程的重要性"}, {"q": "長年の交渉____、ようやく合意に達した。", "opts": ["A. に対して", "B. を通じて", "C. を経て", "D. について"], "ans": "C", "exp": "经过长年交涉的过程最终达成一致，「を経て」强调谈判的时间过程"}]}, "18": {"analysis": "「〜ずにはおかない」表示强烈的必然性或意志，相当于中文的「必定会〜」「一定要〜」。这个文法强调某种结果或行为是不可避免的，带有强烈的确信语气。常用于描述具有强大影响力的事物必然会产生某种效果。", "mistakes": "易错点：容易与「〜ないではいられない」混淆。❌ この本は私を泣かないではいられない。→ ✅ この本は私を泣かせずにはおかない。前者表示主观上忍不住做某事，后者表示客观上必然产生某种结果。", "similar": [{"form": "〜ないではいられない", "diff": "主观情感驱动，表示忍不住要做某事；而〜ずにはおかない是客观必然，表示一定会产生某种结果"}, {"form": "〜に違いない", "diff": "表示推测的确信；而〜ずにはおかない表示必然的结果或强烈的意志"}], "quiz": [{"q": "彼の演技は観客を____。", "opts": ["A. 感動させないではいられない", "B. 感動させずにはおかない", "C. 感動させるに違いない", "D. 感動させることができない"], "ans": "B", "exp": "表示他的演技必定会让观众感动，强调客观必然性，用〜ずにはおかない"}, {"q": "この小説の結末は読者を____。", "opts": ["A. 驚かせないではすまない", "B. 驚かないではいられない", "C. 驚かせずにはおかない", "D. 驚かせるかもしれない"], "ans": "C", "exp": "表示小说结局必定会让读者吃惊，强调作品本身具有的强大冲击力"}, {"q": "あの政治家の発言は国民を____。", "opts": ["A. 怒らせるでしょう", "B. 怒らせずにはおかない", "C. 怒らないではいられない", "D. 怒らせるかもしれない"], "ans": "B", "exp": "表示那位政治家的发言必定会激怒国民，强调发言内容的必然影响"}]}, "21": {"analysis": "「〜そばから」表示某个动作刚完成就立即被另一个相反的动作抵消，强调徒劳无功的循环状态。与单纯的时间顺序不同，此文法带有强烈的无奈和挫败感，常用于描述重复性的、令人沮丧的情况。", "mistakes": "❌ 勉強するそばから忘れてしまう → ✅ 勉強したそばから忘れてしまう（必须用た形）\n❌ 雨が降ったそばから晴れた → ✅ 雨がやんだそばから晴れた（前后动作要有逻辑对立关系）", "similar": [{"form": "〜とたんに", "diff": "「とたんに」仅表示时间上的紧接，「そばから」强调行为的徒劳性和重复性"}, {"form": "〜や否や", "diff": "「や否や」表示瞬间发生，多用于书面语，「そばから」口语化且含无奈情感"}], "quiz": [{"q": "お金を貯める____から、すぐ使ってしまう。", "opts": ["A.そば", "B.ところ", "C.はず", "D.つもり"], "ans": "A", "exp": "「そばから」表示刚存钱就花掉，体现重复性的徒劳"}, {"q": "子供が片付けた____、また部屋を散らかしている。", "opts": ["A.とたんに", "B.そばから", "C.ところで", "D.あげく"], "ans": "B", "exp": "「そばから」强调刚收拾好又弄乱的重复循环，符合语境"}, {"q": "彼は教えた____忘れるので、何度も同じことを説明しなければならない。", "opts": ["A.そばから", "B.ばかりに", "C.からには", "D.にしても"], "ans": "A", "exp": "「そばから」表示刚教完就忘记的反复状况，体现教学的徒劳感"}]}, "25": {"analysis": "「〜だの〜だの」是表示不满或批评性列举的文法，相当于中文的「什么…啦…啦」。这个文法带有明显的负面感情色彩，说话者对所列举的事物持批评或不满态度。与单纯的列举不同，它强调对这些事物的厌烦或轻视情绪。", "mistakes": "易混淆为中性列举：❌ 今日は映画を見ただの、買い物をしただの、楽しかった。→ ✅ 今日は映画を見たり、買い物をしたりして、楽しかった。（应用「〜たり〜たり」表示中性列举）", "similar": [{"form": "〜たり〜たり", "diff": "中性列举，无感情色彩；「だの」带批评不满情绪"}, {"form": "〜やら〜やら", "diff": "可表示困惑或轻微不满；「だの」的批评色彩更强烈"}, {"form": "〜とか〜とか", "diff": "口语化的中性列举；「だの」专门用于批评性列举"}], "quiz": [{"q": "彼はいつも忙しい____、時間がない____、言い訳ばかりしている。", "opts": ["A. だの", "B. たり", "C. やら", "D. とか"], "ans": "A", "exp": "表示对他总是找借口的不满，用「だの」最合适"}, {"q": "「だの」の使い方として正しいものはどれですか。", "opts": ["A. 肯定的な例示", "B. 中性的な列挙", "C. 批判的な例示", "D. 丁寧な表現"], "ans": "C", "exp": "「だの」は批判的・不満な気持ちを込めた例示表現"}, {"q": "次の文で「だの」が適切でないのはどれですか。", "opts": ["A. 宿題が多いだの難しいだの", "B. 桜だの梅だの、きれいに咲いている", "C. 雨だの風だの、天気が悪い", "D. 高いだの遠いだの、文句を言う"], "ans": "B", "exp": "美しく咲いている桜や梅は肯定的内容なので「だの」は不適切"}]}, "27": {"analysis": "「〜た分だけ」表示按照前项的程度、数量，后项也相应地产生变化，强调比例关系和因果对应。与中文「付出多少就得到多少」的逻辑完全吻合，体现了日语中精确的量化表达。", "mistakes": "❌ 勉強する分だけ上手になる → ✅ 勉強した分だけ上手になる（必须用た形）❌ 食べる分だけお金を払う → ✅ 食べた分だけお金を払う（表示已完成的行为量）", "similar": [{"form": "〜ほど", "diff": "「〜ほど」表示程度递增，「〜た分だけ」强调具体的量化对应关系"}, {"form": "〜に応じて", "diff": "「〜に応じて」更正式，多用于规则制度，「〜た分だけ」更口语化，强调个人行为的对价"}], "quiz": [{"q": "練習____上達する。", "opts": ["A. する分だけ", "B. した分だけ", "C. している分だけ", "D. していた分だけ"], "ans": "B", "exp": "「〜た分だけ」必须接動詞た形，表示完成的行為量與結果的對應關係"}, {"q": "時間をかけた____、良い作品ができた。", "opts": ["A. 分だけ", "B. ほど", "C. につれて", "D. によって"], "ans": "A", "exp": "「時間をかけた分だけ」表示投入時間的量與作品質量成正比的關係"}, {"q": "働いた____給料がもらえるシステムだ。", "opts": ["A. から", "B. ので", "C. 分だけ", "D. ために"], "ans": "C", "exp": "「働いた分だけ」表示工作量與薪水的直接對應關係，體現按勞分配的概念"}]}, "30": {"analysis": "「〜たりとも〜ない」是表示绝对否定的N1文法，强调连最小的单位都毫无例外。与「〜でさえ〜ない」相比，「たりとも」语气更强烈，常用于时间、金钱等可量化概念。此文法体现了日语中通过助词「たり」和「とも」的组合来加强否定语气的特点。", "mistakes": "❌ 一人たりとも来なかった → ✅ 一人たりとも来ませんでした（敬语场合应用丁寧語）❌ 一円たりともお金がない → ✅ 一円たりともない（避免重复「お金」概念）❌ たった一秒たりとも → ✅ 一秒たりとも（不与「たった」重复使用）", "similar": [{"form": "〜ひとつたりとも〜ない", "diff": "只用于可数名词，「たりとも」可用于时间金钱等"}, {"form": "〜でさえ〜ない", "diff": "语气较弱，「たりとも」表示更强烈的绝对否定"}, {"form": "〜すら〜ない", "diff": "文语色彩浓，「たりとも」多用于口语和现代文"}], "quiz": [{"q": "試験まで____無駄にする時間はない。", "opts": ["A. 一分たりとも", "B. 一分でさえ", "C. 一分すら", "D. 一分ばかり"], "ans": "A", "exp": "强调连一分钟都不能浪费的紧迫感，用「たりとも」最合适"}, {"q": "この計画では____失敗は許されない。", "opts": ["A. 一回たりとも", "B. 一回でも", "C. 一回だけ", "D. 一回くらい"], "ans": "A", "exp": "表示绝对不允许失败，连一次都不行，用「たりとも」表示强烈否定"}, {"q": "彼は約束を破ったことが____。", "opts": ["A. 一度たりともない", "B. 一度たりともある", "C. 一度もない", "D. 一度でもない"], "ans": "A", "exp": "「たりとも」必须与否定形搭配，表示连一次都没有违背过约定"}]}};
</script>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JLPT N1 文法カード</title>
<script>
/* ═══════════════════════════════════════════════════════
   JLPT Grammar Card Engine v3
   • Card mode (flip cards, ← → keys)
   • Grid mode (search + filter)
   • Furigana + POS coloring (per-card AI analysis)
   • Vocab notebook (cross-level, localStorage)
   • API Key config (stored in localStorage)
   • Mac Mini proxy support (/api/claude)
   ═══════════════════════════════════════════════════════ */

const CARD_ST_KEY  = 'jlpt_card_state';

/* ─── CSS ─── */
const SHARED_CSS = `
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --mint:#6dc9a8;--ml:#e6f7f1;--mm:#a8ddc9;
  --cream:#fffef5;--ybg:#fffbe8;--red:#e8464a;--navy:#2a3f6e;
  --tx:#333;--gr:#888;--sh:0 4px 20px rgba(0,0,0,.09);
  --pn:#e3f2fd;--pnt:#1565c0;
  --pv:#e8f5e9;--pvt:#2e7d32;
  --pa:#fff3e0;--pat:#e65100;
  --pad:#f3e5f5;--padt:#6a1b9a;
  --pp:#fce4ec;--ppt:#c62828;
  --pc:#e0f7fa;--pct:#006064;
  --px:#fff8e1;--pxt:#f57f17;
}
body{font-family:'M PLUS Rounded 1c','Noto Sans JP',sans-serif;min-height:100%;overflow-y:auto;overflow-x:hidden;overscroll-behavior-y:contain}

/* topbar */
.topbar{background:#fff;box-shadow:0 2px 12px rgba(0,0,0,.08);padding:10px 18px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;flex-wrap:wrap}
.tb-back{background:rgba(0,0,0,.07);border:none;border-radius:8px;padding:5px 12px;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;color:var(--navy);text-decoration:none;display:flex;align-items:center;gap:4px}
.tb-back:hover{background:rgba(0,0,0,.12)}
.lvl-badge{color:#fff;font-weight:900;font-size:11px;line-height:1.1;padding:5px 9px;border-radius:7px;text-align:center}
.lvl-badge span{display:block;font-size:17px}
.tb-title{font-size:16px;font-weight:900;color:var(--navy)}
.tb-sub{font-size:11px;color:var(--gr)}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.cnt-badge{background:var(--ml);color:var(--mint);font-size:12px;font-weight:700;padding:4px 12px;border-radius:20px;border:1.5px solid var(--mm)}
.view-tog{display:flex;gap:3px;background:#f0f0f0;border-radius:10px;padding:3px}
.vbtn{border:none;background:transparent;border-radius:7px;padding:5px 12px;font-size:12px;font-weight:700;color:var(--gr);cursor:pointer;font-family:inherit;transition:all .15s}
.vbtn.on{background:#fff;color:var(--navy);box-shadow:0 1px 4px rgba(0,0,0,.1)}
.cfg-btn{background:none;border:1.5px solid #ddd;border-radius:8px;padding:4px 10px;font-size:12px;cursor:pointer;color:var(--gr);font-family:inherit}
.cfg-btn:hover{border-color:var(--mint);color:var(--mint)}

/* filter bar */
.fbar{padding:10px 18px;display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;flex-wrap:wrap}
.fbar::-webkit-scrollbar{display:none}
.fbtn{background:rgba(255,255,255,.25);border:1.5px solid rgba(255,255,255,.5);color:#fff;font-family:inherit;font-size:11px;font-weight:700;padding:5px 12px;border-radius:20px;cursor:pointer;white-space:nowrap;transition:all .15s}
.fbtn:hover,.fbtn.on{background:#fff;border-color:#fff}

/* progress */
.prog-wrap{padding:6px 18px 4px;background:rgba(255,255,255,.1)}
.prog-info{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.prog-lbl{font-size:11px;font-weight:700;color:rgba(255,255,255,.85)}
.prog-stats{display:flex;gap:12px;font-size:11px;font-weight:700;color:rgba(255,255,255,.85)}
.prog-track{height:3px;background:rgba(255,255,255,.25);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:rgba(255,255,255,.8);border-radius:2px;transition:width .35s}

/* stats bar (grid) */
.sbar{display:flex;gap:14px;padding:8px 18px 2px;font-size:12px;color:rgba(255,255,255,.8);font-weight:600}

/* ═══ CARD STAGE ═══ */
.cstage{display:none;flex:1;align-items:flex-start;justify-content:center;padding:14px 18px 90px;overflow:visible}
.cstage.on{display:flex}
.fcard{width:100%;max-width:700px;background:#fff;border-radius:22px;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,.13);animation:cIn .22s ease}
@keyframes cIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.aL{animation:sL .18s ease forwards}
.aR{animation:sR .18s ease forwards}
@keyframes sL{to{opacity:0;transform:translateX(-50px)}}
@keyframes sR{to{opacity:0;transform:translateX(50px)}}

/* card head */
.chead{background:var(--ybg);padding:20px 24px 16px;border-bottom:2px dashed var(--mm);display:flex;align-items:flex-start;gap:14px;position:relative}
.cnum{color:#fff;font-size:11px;font-weight:900;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
.chead-info{flex:1}
.chead-row{display:flex;align-items:center;gap:8px;flex:1;flex-wrap:nowrap}

.c-gram{font-size:28px;font-weight:900;color:var(--navy);line-height:1.2}
.c-gram .hl{color:var(--red)}
.ctags{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;align-items:center}
.ctag{font-size:10px;font-weight:700;padding:2px 8px;border-radius:5px}
.cdiff{font-size:14px;letter-spacing:2px;color:#f5b942}
.cbtns{display:flex;gap:8px;align-items:flex-start;flex-shrink:0}
.cact{width:40px;height:40px;border-radius:12px;border:1.5px solid #e0e0e0;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:20px;transition:all .15s}
.cact:hover{border-color:var(--mint);transform:scale(1.06)}
.cact.fav{background:#fff9e6;border-color:#f5c518}
.cact.mst{background:var(--ml);border-color:var(--mint)}
.mst-rib{display:none;position:absolute;top:16px;right:110px;background:var(--ml);color:var(--mint);border:1.5px solid var(--mint);border-radius:20px;padding:3px 12px;font-size:11px;font-weight:900}
.mst-rib.on{display:block}

/* card body */
.cbody{padding:22px 26px 26px;display:flex;flex-direction:column;gap:16px}
.slbl{font-size:10px;font-weight:900;color:var(--mint);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:5px}
.c-meaning{font-size:15px;font-weight:700;color:var(--tx);line-height:1.65}
.c-mzh{font-size:13px;color:var(--gr);margin-top:4px}
.c-pat{background:var(--ml);border:1.5px solid var(--mm);border-radius:12px;padding:11px 15px;font-size:14px;font-weight:700;color:var(--navy);line-height:1.6}
.c-pat .gram{color:var(--red);font-weight:900}

/* ─── FURIGANA SYSTEM ─── */
.furi-wrap{display:flex;flex-wrap:wrap;align-items:flex-end;gap:0;line-height:2.8;font-size:15px}
.fw{display:inline-flex;flex-direction:column;align-items:center;margin:0 1px;border-radius:5px;padding:1px 3px 2px;cursor:default;position:relative}
.fw:hover{opacity:.72}
.fr{font-size:9.5px;line-height:1;color:#999;min-height:12px;text-align:center;white-space:nowrap;font-weight:400}
.ft{font-size:16px;font-weight:700;line-height:1.2;white-space:nowrap;border-radius:4px;padding:1px 3px}

/* ═══════════════════════════════════════════════
   GrammarApp

class GrammarApp {
  constructor(cfg) {
    this.level    = cfg.level;
    this.color    = cfg.color;
    this.bg       = cfg.bgGradient;
    this.G        = cfg.grammar;
    this.fgs      = cfg.filterGroups || [];
    this.label    = cfg.levelLabel || cfg.level;

    this.view     = 'card';
    this.filter   = 'all';
    this.search   = '';
    this.curMod   = null;
    this.deck     = [...this.G];
    this.cur      = 0;
    this.kCache   = {};
    this.kCur     = null;
    // per-card furigana cache  { cardId: [{text,reading,pos,isGram},...] }
    // 从 localStorage 加载已分析的注音缓存
    this._furiKey = 'jlpt_furi_' + (cfg.level || 'XX');
    try { this.furiCache = JSON.parse(localStorage.getItem(this._furiKey) || '{}'); }
    catch { this.furiCache = {}; }

    try { this.cs = JSON.parse(localStorage.getItem(CARD_ST_KEY) || '{}'); }
    catch { this.cs = {}; }
    if (!this.cs.favs)     this.cs.favs = {};
    if (!this.cs.mastered) this.cs.mastered = {};

    const s = document.createElement('style');
    s.textContent = SHARED_CSS;
    document.head.insertBefore(s, document.head.firstChild);
    document.body.style.background = this.bg;

    this._buildHTML();
    this._bind();
    this._setView('card');
    this._initSwipe();
    if (window.speechSynthesis)
      window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
  }

  /* ─────────── BUILD HTML ─────────── */
  _buildHTML() {
    const fg = this.fgs;
    document.body.innerHTML = `
</div>
  </div>
</div>
  </div>
</div>
<div class="topbar">
  <a href="index.html" class="tb-back">← 返回</a>
  <div class="lvl-badge" style="background:${this.color}">JLPT<span>${this.level}</span></div>
  <div class="tb-title" style="flex:1">语法卡片 — ${this.label}</div>
  <div class="view-tog">
    <button class="vbtn on" id="vCard">🃏 卡片</button>
    <button class="vbtn" id="vGrid">☰ 一览</button>
  </div>
  <div class="tb-sub" id="tbSub" style="display:none"></div>
</div>
</div>
<div class="fbar" id="fbar" style="background:rgba(255,255,255,.15);backdrop-filter:blur(10px)">
  <button class="fbtn on" data-f="all">全部</button>
  <button class="fbtn" data-f="fav">⭐ 收藏</button>
  <button class="fbtn" data-f="unmastered">未掌握</button>
  ${fg.map(g=>`<button class="fbtn" data-f="${g.key}">${g.label}</button>`).join('')}
  <button class="fbtn" data-f="★">★</button>
  <button class="fbtn" data-f="★★">★★</button>

</div>
<div class="prog-wrap" id="progWrap">
  <div class="prog-info">
    <span class="prog-lbl" id="progLbl">1/${this.G.length}</span>
    <div class="prog-stats"><span>⭐<span id="favCt">0</span></span><span>✅<span id="mstCt">0</span></span></div>
  </div>
  <div class="prog-track"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
</div>
<!-- CARD STAGE -->
<div id="main-wrap" style="flex:1 1 auto;min-height:auto;display:block;overflow:visible">
<div class="cstage" id="cstage">
  <div class="fcard" id="fcard">
    <div class="chead">
      <div class="cnum" id="cNum" style="background:${this.color}">1</div>

        <div class="chead-row">

</div>
<div class="mov" id="mov">

      <div style="font-size:12px;color:#aaa" id="mZh"></div>

      <div class="gpb"><span class="lb">接续</span><code id="mPat"></code></div>

  }

  /* ─────────── BIND ─────────── */
  _bind() {
    // view
    document.getElementById('vCard').addEventListener('click', () => this._setView('card'));
    document.getElementById('vGrid').addEventListener('click', () => this._setView('grid'));
    // filter
    document.getElementById('fbar').addEventListener('click', e => {
      const b = e.target.closest('.fbtn'); if (!b) return;
      document.querySelectorAll('.fbtn').forEach(x=>x.classList.remove('on'));
      b.classList.add('on');
      this.filter = b.dataset.f;
      this.deck = this._fDeck();
      this.cur = 0;
      if (this.view === 'card') this._renderCard();
      else this._renderGrid();
    });
    // card nav
    document.getElementById('prevBtn').addEventListener('click', () => this._go(-1));
    document.getElementById('nextBtn').addEventListener('click', () => this._go(1));
    document.getElementById('shuffleBtn').addEventListener('click', () => {
      this._hideBack();
      this._shuffle();
    });
    document.getElementById('rndBtn').addEventListener('click', () => {
      this._hideBack();
      this.cur=Math.floor(Math.random()*this.deck.length);
      this._renderCard();
    });
    document.addEventListener('keydown', e => {
      if (['INPUT','TEXTAREA'].includes(document.activeElement.tagName)) return;
      if (e.key==='ArrowLeft'||e.key==='a') this._go(-1);
      if (e.key==='ArrowRight'||e.key==='d') this._go(1);
      if (e.key==='f'||e.key==='F') this._toggleFav();
      if (e.key==='m'||e.key==='M') this._toggleMst();
    });
    document.getElementById('cStar').addEventListener('click', () => this._toggleFav());
    document.getElementById('cCheck').addEventListener('click', () => this._toggleMst());
    // modal
    document.getElementById('mClose').addEventListener('click', () => this._closeMod());
    document.getElementById('mov').addEventListener('click', e => { if(e.target===document.getElementById('mov'))this._closeMod(); });
    // 整句点击播放
    document.addEventListener('click', e => {
      const ex = e.target.closest('.exb[data-speak]');
      if (!ex) return;
      if (e.target.closest('.fw,.kword,button,input')) return;
      this._playExample(ex, ex.dataset.speak || '');
    });
  }

  /* ─────────── VIEW ─────────── */
  _setView(v) {
    this.view = v;
    document.getElementById('vCard').classList.toggle('on', v==='card');
    document.getElementById('vGrid').classList.toggle('on', v==='grid');
    document.getElementById('cstage').classList.toggle('on', v==='card');
    document.getElementById('gstage').classList.toggle('on', v==='grid');
    document.getElementById('progWrap').style.display = 'none';
    document.getElementById('fbar').style.display = v==='card'?'none':'flex';
    document.getElementById('bnav').style.display = v==='card'?'flex':'none';
    (document.getElementById('tbSub')||{textContent:''}).textContent = v==='card'
      ? '← → 键切换 ｜ F:收藏 M:已掌握'
      : '点击查看详情 ｜ 点击汉字查词';
    this.deck = this._fDeck();
    this.cur = 0;
    if (v==='card') this._renderCard();
    else this._renderGrid();
  }

  /* ─────────── FILTER ─────────── */
  _fDeck() {
    let arr = this.G;
    if (this.filter==='fav') arr=arr.filter(g=>this.cs.favs[g.id]);
    else if (this.filter==='unmastered') arr=arr.filter(g=>!this.cs.mastered[g.id]);
    else if (this.filter.startsWith('★')) arr=arr.filter(g=>g.d===this.filter);
    else if (this.filter!=='all') arr=arr.filter(g=>g.cat===this.filter);
    return arr;
  }
  _matchS(g) {
    if(!this.search)return true;
    const q=this.search.toLowerCase();
    return g.t.includes(q)||g.m.includes(q)||g.mz.includes(q)||g.e.includes(q)||g.ez.includes(q);
  }

  /* ─────────── CARD RENDER ─────────── */
  _renderCard(dir) {
    const g = this.deck[this.cur];
    if (!g) {
      document.getElementById('fcard').innerHTML='<div style="padding:60px;text-align:center;color:#aaa;font-size:16px">没有相关语法</div>';
      return;
    }
    const card = document.getElementById('fcard');
    const render = () => {
      if (!(document.getElementById('cNum'))) return;
      (document.getElementById('cNum')||{textContent:''}).textContent = g.id;
      document.getElementById('cGram').innerHTML = `～<span class="hl">${g.hl}</span>`;
      (document.getElementById('cMean')||{textContent:''}).textContent = g.m;
      (document.getElementById('cMzh')||{textContent:''}).textContent = g.mz;
      document.getElementById('cPat').innerHTML = g.p;

      const grp = this.fgs.find(x=>x.key===g.cat);
      document.getElementById('cTags').innerHTML =
        (grp?`<span class="ctag" style="background:${grp.color||'#e8f0ff'};color:${grp.fg||'#3a5bc7'}">${grp.label}</span>`:'') +
        `<span class="cdiff">${g.d}</span>`;

      const fav=!!this.cs.favs[g.id], mst=!!this.cs.mastered[g.id];
      (document.getElementById('cStar')||{textContent:''}).textContent=fav?'⭐':'☆';
      document.getElementById('cStar').className='cact'+(fav?' fav':'');
      (document.getElementById('cCheck')||{textContent:''}).textContent=mst?'✅':'◯';
      document.getElementById('cCheck').className='cact'+(mst?' mst':'');
      document.getElementById('mstRib').className='mst-rib'+(mst?' on':'');

      // Render examples
      // 优先用内置注音（已批量生成写入HTML的）
      const builtin = g.furi || null;
      const cached  = this.furiCache[g.id] || builtin;
      if (cached) {
        // 同步到内存cache（方便后续切换卡片不重读）
        if (!this.furiCache[g.id] && builtin) this.furiCache[g.id] = builtin;
        this._renderFuri(g, cached);
      } else {
        this._renderPlain(g);
      }

      // AI reset

      // Progress
      const pct=((this.cur+1)/this.deck.length*100).toFixed(1);
      (document.getElementById('navIdx')||{textContent:''}).textContent=this.cur+1;
      (document.getElementById('navTot')||{textContent:''}).textContent=this.deck.length;
      document.getElementById('prevBtn').disabled=this.cur===0;
      (document.getElementById('nextBtn')||{disabled:false}).disabled=this.cur===this.deck.length-1;
      this._renderBack(g);
    };

    if (dir) {
      card.classList.add(dir==='L'?'aL':'aR');
      setTimeout(()=>{ card.classList.remove('aL','aR'); render(); }, 160);
    } else { render(); }
  }

  /* render plain (no furigana yet) */
  _renderPlain(g) {
    (document.getElementById('posLegend')||{style:{}}).style.display='none';
    (document.getElementById('anaBtn')||{style:{}}).style.display='none';
    const allEx = [{j:g.eh,z:g.ez,main:true},...g.ex.map(e=>({j:e.j,z:e.z}))];
    document.getElementById('cExList').innerHTML = allEx.map(ex => {
      const plain = ex.j.replace(/<[^>]*>/g,'').replace(/'/g,"\\'");
      return `<div class="exb playable-ex ${ex.main?'main':'sub'}" data-speak="${plain}">
        <div class="plain-ex">${ex.j}</div>
        <div class="ex-zh">${ex.z}</div>
      </div>`;
    }).join('');
  }

  /* render with furigana tokens */
  _renderFuri(g, tokenSets) {
    (document.getElementById('posLegend')||{style:{}}).style.display='flex';
    const allEx = [{j:g.eh,z:g.ez,main:true},...g.ex.map(e=>({j:e.j,z:e.z}))];
    const listEl = document.getElementById('cExList');
    listEl.innerHTML='';

    allEx.forEach((ex,i) => {
      const toks = tokenSets[i];
      const plain = ex.j.replace(/<[^>]*>/g,'').replace(/'/g,"\\'");
      const div = document.createElement('div');
      div.className = 'exb playable-ex '+(ex.main?'main':'sub');
      div.dataset.speak = plain;

      const furiDiv = document.createElement('div');
      furiDiv.className='furi-wrap';

      if (toks && toks.length) {
        toks.forEach(t => {
          if (t.pos==='punc') {
            const sp=document.createElement('span');
            sp.className='fpunc';
            const ru=document.createElement('span'); ru.className='fr'; ru.textContent='';
            const ft=document.createElement('span'); ft.className='ft'; ft.textContent=t.text;
            sp.appendChild(ru); sp.appendChild(ft);
            furiDiv.appendChild(sp);
          } else {
            const POS_CLASS={noun:'pN',verb:'pV',adj:'pA',adv:'pD',part:'pP',conj:'pC',aux:'pX'};
            const w=document.createElement('span');
            w.className='fw '+(POS_CLASS[t.pos]||'')+(t.isGram?' isG':'');
            const ru=document.createElement('span'); ru.className='fr'; ru.textContent=t.reading||'';
            const ft=document.createElement('span'); ft.className='ft'; ft.textContent=t.text;
            w.appendChild(ru); w.appendChild(ft);
            furiDiv.appendChild(w);
            // tooltip
            const POS_LBL={noun:'名詞',verb:'動詞',adj:'形容詞',adv:'副詞',part:'助詞',conj:'接续詞',aux:'助動詞'};
            const lbl = t.isGram ? '🔴 文法ポイント' : (POS_LBL[t.pos]||t.pos);
            w.addEventListener('mouseenter', ev => {
              const tip=document.getElementById('posTip');
              tip.textContent=lbl+(t.reading?' · '+t.reading:'');
              tip.style.display='block';
              tip.style.left=(ev.clientX+10)+'px';
              tip.style.top=(ev.clientY-28)+'px';
            });
            w.addEventListener('mouseleave',()=>{ const _pt=document.getElementById('posTip'); if(_pt)_pt.style.display='none'; });
            w.addEventListener('mousemove',ev=>{ const t2=document.getElementById('posTip'); if(!t2)return; t2.style.left=(ev.clientX+10)+'px'; t2.style.top=(ev.clientY-28)+'px'; });
          }
        });
      } else {
        furiDiv.innerHTML=`<span class="plain-ex">${ex.j}</span>`;
      }

      const zh=document.createElement('div'); zh.className='ex-zh'; zh.textContent=ex.z;

      div.appendChild(furiDiv);
      div.appendChild(zh);
      // click handled by global listener
      listEl.appendChild(div);
    });
  }


  /* ─────────── NAV ─────────── */
  _go(d) {
    const n=this.cur+d;
    if(n<0||n>=this.deck.length)return;
    this._hideBack();
    this.cur=n;
    this._renderCard(d>0?'L':'R');
  }
  _shuffle() {
    for(let i=this.deck.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[this.deck[i],this.deck[j]]=[this.deck[j],this.deck[i]];}
    this.cur=0; this._renderCard();
  }
  _toggleFav() {
    const g=this.deck[this.cur]; if(!g)return;
    this.cs.favs[g.id]=!this.cs.favs[g.id];
    this._saveCS(); this._renderCard();
  }
  _toggleMst() {
    const g=this.deck[this.cur]; if(!g)return;
    this.cs.mastered[g.id]=!this.cs.mastered[g.id];
    this._saveCS(); this._renderCard();
  }
  _saveCS() { localStorage.setItem(CARD_ST_KEY, JSON.stringify(this.cs)); }

  /* ─────────── GRID ─────────── */
  _renderGrid() {
    const grid=document.getElementById('grid');
    grid.innerHTML='';
    let n=0;
    const src=this.filter!=='all'?this.deck:this.G;
    src.filter(g=>this._matchS(g)).forEach(g=>{ n++; grid.appendChild(this._makeGC(g)); });
    if(!n){const d=document.createElement('div');d.className='empty';d.textContent='🔍 没有找到相关语法';grid.appendChild(d);}
    (document.getElementById('visCt')||{textContent:''}).textContent=n;
    const _cb=document.getElementById('cntBadge'); if(_cb)_cb.textContent=`共 ${this.G.length} 项`;
  }
  _makeGC(g) {
    const d=document.createElement('div'); d.className='gc';
    const grp=this.fgs.find(x=>x.key===g.cat);
    const tb=grp?.color||'#e8f0ff', tf=grp?.fg||'#3a5bc7';
    const et=g.e.replace(/'/g,"\\'");
    d.innerHTML=`
    <div class="gch"><div class="gnum" style="background:${this.color}">${g.id}</div>
      <div class="gt">～<span class="hl">${g.hl}</span></div>
      ${grp?`<span class="gtag" style="background:${tb};color:${tf}">${grp.label}</span>`:''}
      <div class="gd">${g.d}</div></div>
    <div class="gea"><div class="gejp playable-ex" data-speak="${et}">${g.eh}</div><div class="gezh">${g.ez}</div></div>
    <div class="gi">
      <div class="gmb"><span class="lb">意思</span>${g.m}<br><span style="font-size:10.5px;color:#999">${g.mz}</span></div>
      <div class="gpb"><span class="lb">接续</span>${g.p}</div></div>
    <button class="gmt" onclick="const m=this.nextElementSibling;const o=m.classList.toggle('on');this.textContent=o?'▾ 收起':'▸ 更多例句'">▸ 更多例句</button>
    <div class="gme">${g.ex.map(e=>`<div class="gei">${e.j}<span class="tr">${e.z}</span></div>`).join('')}</div>`;
    d.querySelector('.gch').addEventListener('click',()=>{
      const idx=this.deck.findIndex(x=>x.id===g.id);
      if(idx!==-1){this.cur=idx;this._setView('card');window.scrollTo(0,0);}
      else{this._openMod(g.id);}
    });
    const mainEx=d.querySelector('.gejp.playable-ex');
    if(mainEx) mainEx.addEventListener('click',ev=>{ev.stopPropagation();this.speakExample(mainEx.dataset.speak, mainEx, 1.0);});
    d.querySelectorAll('.gme .gei').forEach(el=>{
      el.classList.add('playable-ex');
      const txt=el.textContent.replace(el.querySelector('.tr')?.textContent||'','').trim();
      el.dataset.speak=txt;
      el.addEventListener('click',ev=>{ev.stopPropagation();this.speakExample(el.dataset.speak, el, 1.0);});
    });
    return d;
  }

  /* ─────────── MODAL ─────────── */
  _openMod(id) {
    const g=this.G.find(x=>x.id===id); if(!g)return;
    this.curMod=id;
    (document.getElementById('mNum')||{textContent:''}).textContent=g.id;
    document.getElementById('mTit').innerHTML=`～<span class="hl">${g.hl}</span> <span style="font-size:13px;color:#f5b942">${g.d}</span>`;
    const mEx=document.getElementById('mEx');
    mEx.innerHTML=g.eh;
    mEx.classList.add('playable-ex');
    mEx.dataset.speak=g.e.replace(/<[^>]*>/g,'');
    mEx.onclick=()=>this.speakExample(mEx.dataset.speak,mEx,1.0);
    (document.getElementById('mZh')||{textContent:''}).textContent=g.ez;
    document.getElementById('mMean').innerHTML=`${g.m}<br><span style="font-size:11px;color:#aaa">${g.mz}</span>`;
    document.getElementById('mPat').innerHTML=g.p;
    document.getElementById('mMore').innerHTML=g.ex.map(e=>`<div class="gei playable-ex" data-speak="${e.j.replace(/<[^>]*>/g,'').replace(/"/g,'&quot;')}">${e.j}<span class="tr">${e.z}</span></div>`).join('');
    document.querySelectorAll('#mMore .playable-ex').forEach(el=>{
      el.onclick=()=>this.speakExample(el.dataset.speak,el,1.0);
    });
    document.getElementById('mov').classList.add('on');
    document.body.style.overflow='hidden';
  }
  _closeMod() {
    document.getElementById('mov').classList.remove('on');
    document.body.style.overflow='';
    window.speechSynthesis&&window.speechSynthesis.cancel();
    this.curMod=null;
  }
  _spkMod(r) {
    if(!this.curMod)return;
    const g=this.G.find(x=>x.id===this.curMod);
    if(g)this.speakExample(g.e,null,r);
  }

  _renderBack(g) {
    const BACK_DATA = (typeof N2_BACK !== 'undefined') ? N2_BACK :
                      (typeof N1_BACK !== 'undefined') ? N1_BACK :
                      (typeof N3_BACK !== 'undefined') ? N3_BACK :
                      (typeof N4_BACK !== 'undefined') ? N4_BACK :
                      (typeof N5_BACK !== 'undefined') ? N5_BACK : null;
    const back = BACK_DATA ? BACK_DATA[String(g.id)] : null;

    const fcard = document.getElementById('fcard');
    if (!fcard) return;

    // 确保fcardBack存在
    let el = document.getElementById('fcardBack');
    if (!el) {
      el = document.createElement('div');
      el.id = 'fcardBack';
      el.className = 'fcard-back-panel';
      fcard.parentNode.insertBefore(el, fcard.nextSibling);
    }
    el.style.display = 'none';

    // 翻转按钮（每次切换卡片时cbody被重建，需重新插入）
    const cbody = fcard.querySelector('.cbody');
    if (cbody) {
      let flipBtn = cbody.querySelector('.flip-btn');
      if (!flipBtn) {
        flipBtn = document.createElement('button');
        flipBtn.className = 'flip-btn';
        flipBtn.onclick = () => this._toggleFlip();
        cbody.appendChild(flipBtn);
      }
      flipBtn.textContent = back ? '📖 查看解析 & 练习题' : '📖 解析暂未收录';
      flipBtn.disabled = !back;
    }

    if (!back) { el.innerHTML = '<div class="no-back">此条文法解析暂未收录</div>'; return; }

    // 相似文法
    const mistakesHtml = (back.mistakes||'').split('\n').join('<br>');
    const similarHtml = (back.similar||[]).map(s =>
      `<div class="similar-item"><span class="similar-form">${s.form}</span><span class="similar-diff">— ${s.diff}</span></div>`
    ).join('');

    // 练习题
    const quizHtml = (back.quiz||[]).map((q, qi) => {
      const opts = (q.opts||[]).map((opt, oi) => {
        const letter = ['A','B','C','D'][oi];
        return `<button class="quiz-opt" data-qi="${qi}" data-letter="${letter}" data-ans="${q.ans}" onclick="window._quizClick(this)">${opt}</button>`;
      }).join('');
      return `<div class="quiz-item">
        <div class="quiz-q">${q.q}</div>
        <div class="quiz-opts">${opts}</div>
        <div class="quiz-exp" id="qexp-${qi}">${q.exp}</div>
      </div>`;
    }).join('');

    el.innerHTML = `
      <div class="back-header">
        <button class="flip-back-btn" onclick="window._flipBack()">← 返回正面</button>
        <span class="back-title">解析 · ${g.t}</span>
      </div>
      <div class="back-body">
        <div class="back-section">
          <div class="back-label">📌 深度解析</div>
          <div class="back-analysis">${back.analysis||''}</div>
        </div>
        <div class="back-section">
          <div class="back-label">⚠️ 易错点</div>
          <div class="back-mistakes">${mistakesHtml}</div>
        </div>
        ${similarHtml ? `<div class="back-section">
          <div class="back-label">🔀 相似文法</div>
          <div class="back-similar">${similarHtml}</div>
        </div>` : ''}
        ${quizHtml ? `<div class="back-section">
          <div class="back-label">✏️ 练习题</div>
          ${quizHtml}
        </div>` : ''}
      </div>`;
  }

  _hideBack() {
    const back = document.getElementById('fcardBack');
    const fcard = document.getElementById('fcard');
    if (back) back.style.display = 'none';
    if (fcard) fcard.style.display = '';
  }

  _toggleFlip() {
    const fcard = document.getElementById('fcard');
    const back = document.getElementById('fcardBack');
    if (!back) return;
    const showing = back.style.display === 'block';
    if (showing) {
      this._hideBack();
    } else {
      if (fcard) fcard.style.display = 'none';
      back.style.display = 'block';
    }
  }

  _playExample(el, text) {
    if (!window.speechSynthesis || !text) return;
    document.querySelectorAll('.exb.playing').forEach(x => x.classList.remove('playing'));
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'ja-JP'; u.rate = 1.0;
    const vs = window.speechSynthesis.getVoices();
    const jp = vs.find(v => v.lang === 'ja-JP') || vs.find(v => v.lang && v.lang.startsWith('ja'));
    if (jp) u.voice = jp;
    el.classList.add('playing');
    const clear = () => el.classList.remove('playing');
    u.onend = clear; u.onerror = clear;
    window.speechSynthesis.speak(u);
  }
  _clearPlaying() {
    document.querySelectorAll('.playing').forEach(el=>el.classList.remove('playing'));
    this.playingEl = null;
  }
  speakExample(text, el, rate=1.0) {
    if (!text) return;
    this._clearPlaying();
    if (el) { el.classList.add('playing'); this.playingEl = el; }
    this.speak(text, rate, () => this._clearPlaying(), () => this._clearPlaying());
  }

  /* ─────────── TTS ─────────── */
  speak(text,rate,onend,onerror) {
    if(!window.speechSynthesis)return;
    window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    u.lang='ja-JP'; u.rate=rate||1.0;
    const vs=window.speechSynthesis.getVoices();
    const jp=vs.find(v=>v.lang==='ja-JP')||vs.find(v=>v.lang.startsWith('ja'));
    if(jp)u.voice=jp;
    if(onend)u.onend=onend;
    if(onerror)u.onerror=onerror;
    window.speechSynthesis.speak(u);
  }


  /* ─── SWIPE ─── */
  _initSwipe() {
    const el = document.getElementById('fcard');
    if (!el) return;
    let startX = 0, startY = 0;
    el.addEventListener('touchstart', e => {
      startX = e.touches[0].clientX;
      startY = e.touches[0].clientY;
    }, {passive: true});
    el.addEventListener('touchend', e => {
      const dx = e.changedTouches[0].clientX - startX;
      const dy = e.changedTouches[0].clientY - startY;
      if (Math.abs(dx) < 40 || Math.abs(dy) > Math.abs(dx)) return;
      if (dx < 0) this._go(1);
      else this._go(-1);
    }, {passive: true});
  }

  /* ─────────── AI GEN ─────────── */









}

</script>
<script>
const N1_FURI = {
// 1 あっての e:ファンあってのアイドルだ。 ex0:健康あっての仕事だ。 ex1:信頼あっての関係だ。
1:[
  [{text:'ファン',reading:'',pos:'noun',isGram:false},{text:'あっての',reading:'',pos:'other',isGram:true},{text:'アイドル',reading:'',pos:'noun',isGram:false},{text:'だ',reading:'',pos:'aux',isGram:false},{text:'。',reading:'',pos:'punc',isGram:false}],
  [{text:'健康',reading:'けんこう',pos:'noun',isGram:false},{text:'あっての',reading:'',pos:'other',isGram:true},{text:'仕事',reading:'しごと',pos:'noun',isGram:false},{text:'だ',reading:'',pos:'aux',isGram:false},{text:'。',reading:'',pos:'punc',isGram:false}],
  [{text:'信頼',reading:'しんらい',pos:'noun',isGram:false},{text:'あっての',reading:'',pos:'other',isGram:true},{text:'関係',reading:'かんけい',pos:'noun',isGram:false},{text:'だ',reading:'',pos:'aux',isGram:false},{text:'。',reading:'',pos:'punc',isGram:false}]
],
// 2 いかんだ e:結果は努力のいかんだ。 ex0:天候いかんでは、中止になることもある。 ex1:やる気いかんによっては、成功できる。
2:[

   <script>
(function restoreSentenceTTS(){
  function wait(){
    if (typeof app === 'undefined') return setTimeout(wait, 80);

    // 防止重复绑定
    if (app.__ttsPatched) return;
    app.__ttsPatched = true;

    function bind(){
      document.querySelectorAll('.exb').forEach(el => {
        if (el.__ttsBound) return;
        el.__ttsBound = true;

        el.addEventListener('click', (e) => {

          // 👉 如果点到词（查词用），就不要朗读
          if (e.target.closest('.kword') || e.target.closest('.fw')) return;

          // 清掉之前高亮
          document.querySelectorAll('.exb.playing').forEach(x=>{
            x.classList.remove('playing');
          });

          el.classList.add('playing');

          const text = el.innerText.trim();
          if (!text) return;

          speechSynthesis.cancel();

          const u = new SpeechSynthesisUtterance(text);
          u.lang = 'ja-JP';

          u.onend = () => {
            el.classList.remove('playing');
          };

          speechSynthesis.speak(u);
        });
      });
    }

    // 首次绑定
    bind();

    // 如果页面有翻页/切换，需要重新绑定
    const observer = new MutationObserver(bind);
    observer.observe(document.body, { childList: true, subtree: true });

  }

  wait();
})();

// 练习题点击处理
window._quizClick = function(btn) {
  const qi = btn.dataset.qi;
  const container = btn.closest('.quiz-item');
  if (container.querySelector('.correct,.wrong')) return; // 已答
  const isCorrect = btn.dataset.letter === btn.dataset.ans;
  container.querySelectorAll('.quiz-opt').forEach(b => {
    if (b.dataset.letter === btn.dataset.ans) b.classList.add('correct');
    else if (b === btn) b.classList.add('wrong');
  });
  const exp = document.getElementById('qexp-'+qi);
  if (exp) exp.classList.add('show');
};
window._flipBack = function() {
  const fcard = document.getElementById('fcard');
  const back = document.getElementById('fcardBack');
  if (back) back.style.display = 'none';
  if (fcard) fcard.style.display = '';
};
