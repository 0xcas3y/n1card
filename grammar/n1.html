<script>
const N1_BACK = {"1": {"analysis": "「〜あっての」表示某事物是另一事物存在的必要条件和前提，强调没有前者就不可能有后者的依存关系。这个文法体现了日语中重视相互依存关系的文化特点，常用于表达感谢或强调重要性。", "mistakes": "易与「〜のおかげで」混淆。❌健康のおかげでの仕事だ → ✅健康あっての仕事だ（有健康才有工作）。「あっての」后必须接名词，不能接动词或形容词。", "similar": [{"form": "〜のおかげで", "diff": "「のおかげで」表示感谢的原因，「あっての」强调存在的前提条件"}, {"form": "〜があるからこそ", "diff": "意思相近，但「あっての」更简洁，多用于固定搭配"}, {"form": "〜なくしては", "diff": "从否定角度表达，「あっての」从肯定角度强调依存关系"}], "quiz": [{"q": "お客様____の商売ですから、サービスを大切にしています。", "opts": ["A. あっての", "B. のおかげでの", "C. によっての", "D. に対しての"], "ans": "A", "exp": "表示「有顾客才有生意」的前提关系，用「あっての」"}, {"q": "平和____発展はありえない。", "opts": ["A. のため", "B. あっての", "C. による", "D. として"], "ans": "B", "exp": "「有和平才有发展」，强调和平是发展的前提条件"}, {"q": "家族____自分だということを忘れてはいけない。", "opts": ["A. に対して", "B. について", "C. あっての", "D. に関して"], "ans": "C", "exp": "「有家人才有自己」，表示家人是自己存在的前提"}]}, "2": {"analysis": "「〜いかんだ/〜いかんによっては」是表示「根据某种情况，结果会发生变化」的正式文法表现。「いかん」本身含有「如何、怎样」的意思，常用于书面语或正式场合。与「〜によって」相比，语感更加庄重严肃，多用于重要决定或正式文件中。", "mistakes": "❌ 天気いかんによっては、ピクニックを中止する。→ ✅ 天気のいかんによっては、ピクニックを中止する。（「いかん」前必须加「の」）❌ 努力いかんだから頑張ろう。→ ✅ 結果は努力のいかんだから、頑張ろう。（不能单独使用，需要完整表达）", "similar": [{"form": "〜によって", "diff": "「いかん」更正式庄重，多用于书面语；「によって」更口语化通用"}, {"form": "〜次第で", "diff": "「次第で」侧重于顺序或依存关系；「いかん」更强调判断标准"}, {"form": "〜如何で", "diff": "「如何で」是「いかん」的另一种写法，意思完全相同但更古典"}], "quiz": [{"q": "この計画の成否は、予算の____。", "opts": ["A. いかんだ", "B. いかんによる", "C. いかんでは", "D. いかんによっては"], "ans": "A", "exp": "「成否は〜いかんだ」是固定表达，表示成败取决于某个因素"}, {"q": "相手の出方の____、交渉を打ち切ることもある。", "opts": ["A. いかんだ", "B. いかんでは", "C. いかんによっては", "D. いかんによる"], "ans": "C", "exp": "「〜によっては」表示「根据情况，有可能...」，符合语境中的可能性表达"}, {"q": "試験の結果____、進路を変更しなければならない。", "opts": ["A. のいかんでは", "B. がいかんだ", "C. をいかんによって", "D. にいかんでは"], "ans": "A", "exp": "名词后接「の」再接「いかん」，「結果のいかんでは」表示根据结果情况而定"}]}, "3": {"analysis": "「〜いかんにかかわらず」是N1级别的正式书面语表达，强调无论何种情况或条件都不影响结果。「いかん」来源于汉语「如何」，在现代日语中主要用于固定搭配，体现了强烈的客观性和绝对性。此文法常用于规则、方针等正式场合。", "mistakes": "❌ 年齢いかんにかかわらず参加できる → ✅ 年齢のいかんにかかわらず参加できる（必须加「の」）\n❌ どんな理由いかんにかかわらず → ✅ 理由のいかんにかかわらず（不能与「どんな」重复使用）", "similar": [{"form": "〜にかかわらず", "diff": "「いかんに」更正式，强调程度、方式等抽象概念；「に」可接具体名词"}, {"form": "〜を問わず", "diff": "可单独使用「いかんを問わず」，语感更加正式庄重"}], "quiz": [{"q": "成績の____参加資格がある。", "opts": ["A.いかんにかかわらず", "B.いかんにもかかわらず", "C.いかんについて", "D.いかんによって"], "ans": "A", "exp": "表示无论成绩如何都有参加资格，用「いかんにかかわらず」"}, {"q": "この規則は理由の____適用される。", "opts": ["A.いかんによらず", "B.いかんにかかわらず", "C.いかんといわず", "D.いかんとして"], "ans": "B", "exp": "表示无论什么理由规则都适用，用「いかんにかかわらず」"}, {"q": "経験____、やる気のある人を募集します。", "opts": ["A.いかんにかかわらず", "B.のいかんにかかわらず", "C.をいかんにかかわらず", "D.がいかんにかかわらず"], "ans": "B", "exp": "名词「経験」后需要加助词「の」，构成「経験のいかんにかかわらず」"}]}, "4": {"analysis": "「〜かたがた」是表示兼做两件事的敬语表现，常用于正式场合。与「ついでに」不同，它强调两个目的都很重要，不存在主次关系。多用于拜访、致谢等社交场合，体现日语重视礼仪的文化特征。", "mistakes": "易错点：误用于随意场合或非敬语语境。❌ 買い物かたがた、友達に会った → ✅ お礼かたがた、ご挨拶に参りました。注意只能接特定的敬语名词如「お礼」「ご挨拶」「お見舞い」等。", "similar": [{"form": "〜ついでに", "diff": "「ついでに」表示顺便，有主次之分；「かたがた」表示兼做，两目的同等重要且更正式"}, {"form": "〜を兼ねて", "diff": "「を兼ねて」可接各种名词；「かたがた」只接特定的敬语名词，更加正式"}], "quiz": [{"q": "お見舞い____、近況をお聞きしたいと思います。", "opts": ["A. かたがた", "B. ついでに", "C. として", "D. において"], "ans": "A", "exp": "表示探病兼了解近况，两个目的同等重要，用正式的「かたがた」"}, {"q": "新年の____、今年もよろしくお願いいたします。", "opts": ["A. お祝いかたがた", "B. お祝いついでに", "C. お祝いとして", "D. お祝いにおいて"], "ans": "A", "exp": "新年祝贺兼表达今年也请多关照，正式场合用「かたがた」"}, {"q": "次の文で「かたがた」の使い方が正しいのはどれですか。", "opts": ["A. 散歩かたがた、コンビニに行った", "B. ご報告かたがた、お礼申し上げます", "C. 勉強かたがた、図書館に行く", "D. 運動かたがた、ジムに通う"], "ans": "B", "exp": "「かたがた」は敬語名詞にのみ接続し正式な場面で使用。B以外は不適切"}]}, "5": {"analysis": "「〜かたわら」表示在主要活动的同时兼做其他事情，强调主次关系明确，主业为重，副业为辅。与单纯的并列不同，它暗示说话人有明确的主要职责或身份，在此基础上从事其他活动。", "mistakes": "❌ 学生のかたわら、バイトをしている。→ ✅ 学生をしながら、バイトをしている。（学生是身份而非活动，不适用かたわら）❌ 料理のかたわら、掃除をした。→ ✅ 料理をしながら、掃除をした。（同时进行的日常活动，非主副业关系）", "similar": [{"form": "〜ながら", "diff": "单纯表示同时进行，无主次之分；かたわら强调主副业关系"}, {"form": "〜一方で", "diff": "表示对比或转折；かたわら专指兼业关系"}, {"form": "〜とともに", "diff": "表示伴随或共同；かたわら强调在主业基础上的副业"}], "quiz": [{"q": "彼は会社員として働く____、週末は音楽活動をしている。", "opts": ["A. かたわら", "B. ながら", "C. ついでに", "D. おかげで"], "ans": "A", "exp": "表示在主业（会社員）之外兼做音乐活动，符合かたわら的主副业用法"}, {"q": "主婦業の____、在宅でデザインの仕事をしている。", "opts": ["A. あいだに", "B. かたわら", "C. ために", "D. として"], "ans": "B", "exp": "主婦業为主要身份，在家做设计工作为副业，典型的かたわら用法"}, {"q": "歩く____、考え事をしていた。", "opts": ["A. かたわら", "B. ながら", "C. ついでに", "D. とともに"], "ans": "B", "exp": "同时进行的动作，无主副之分，应用ながら而非かたわら"}]}, "6": {"analysis": "「〜がてら」表示在进行某个主要活动（通常是外出、移动）的同时顺便做另一件事，强调两个动作的同时性和便利性。与「〜ついでに」相比，「がてら」更多用于移动性动作，且语气更加文雅正式。", "mistakes": "❌ 家にいがてら、掃除をした。（在家时顺便打扫了。）→ ✅ 散歩がてら、掃除道具を買いに行った。（散步时顺便去买了打扫工具。）「がてら」不能用于静止状态的动作。", "similar": [{"form": "〜ついでに", "diff": "「ついでに」使用范围更广，可用于各种场合；「がてら」主要用于外出移动时的顺便行为"}, {"form": "〜かたがた", "diff": "「かたがた」更加敬语化，常用于书面语；「がてら」相对口语化一些"}], "quiz": [{"q": "買い物____、友達に会ってきた。", "opts": ["A. がてら", "B. について", "C. に対して", "D. において"], "ans": "A", "exp": "表示购物的同时顺便见朋友，符合「がてら」的用法"}, {"q": "運動____、公園を走った。", "opts": ["A. として", "B. がてら", "C. による", "D. にして"], "ans": "B", "exp": "以运动为目的在公园跑步，同时可能还有其他目的，使用「がてら」"}, {"q": "テレビを見____、宿題をした。", "opts": ["A. がてら", "B. ながら", "C. つつ", "D. て"], "ans": "B", "exp": "看电视的同时做作业是同时进行的动作，应用「ながら」；「がてら」不适用于室内静止的同时动作"}]}, "7": {"analysis": "「かと思いきや」表示前项情况刚出现，后项就发生了出乎意料的相反或不同情况，强调转折的突然性和意外性。该文法常用于描述现实与预期不符的情况，带有说话人的惊讶或失望情感。与「と思ったら」相比，「かと思いきや」更加文语化，转折感更强烈。", "mistakes": "❌ 彼は優しいかと思いきや、実は冷たい人だった。→ ✅ 彼は優しいかと思いきや、意外と厳しい一面もあった。（不能用于描述人的本质特征，应用于具体行为或状况的转变）", "similar": [{"form": "〜と思ったら", "diff": "「と思ったら」更口語化，「かと思いきや」更文語化且转折感更强"}, {"form": "〜たとたん（に）", "diff": "「たとたん」单纯表示时间上的紧接，「かと思いきや」强调意外转折"}], "quiz": [{"q": "息子が勉強するようになった____、今度はゲームばかりしている。", "opts": ["A. かと思いきや", "B. と思って", "C. かもしれない", "D. に違いない"], "ans": "A", "exp": "表示「以为儿子开始学习了，没想到现在只顾着玩游戏」，符合意外转折的语境"}, {"q": "この問題は簡単____、意外と複雑だった。", "opts": ["A. だと思って", "B. かと思いきや", "C. らしくて", "D. のようで"], "ans": "B", "exp": "「以为这个问题很简单，没想到意外地复杂」，表示预期与现实的反差"}, {"q": "やっと電車が来た____、満員で乗れなかった。", "opts": ["A. と思うと", "B. ように見えて", "C. かと思いきや", "D. はずなのに"], "ans": "C", "exp": "「以为电车终于来了，没想到是满员无法上车」，表现出乎意料的转折"}]}, "8": {"analysis": "「〜が早いか」表示两个动作几乎同时发生，强调后续动作的迅速性和意外性。与「〜とすぐに」不同，这个文法带有强烈的惊讶色彩，常用于描述令人意想不到的快速反应。多用于书面语，具有文学色彩。", "mistakes": "❌ 彼が来たが早いか、帰った。→ ✅ 彼が来るが早いか、また帰った。（接续必须是辞书形，且后续动作要有意外性）", "similar": [{"form": "〜や否や", "diff": "同样表示「刚一~就~」，但「や否や」更强调动作的连续性，「が早いか」更强调速度的惊人"}, {"form": "〜なり", "diff": "也表示「一~就~」，但「なり」多用于正式文体，「が早いか」带有更强的感情色彩"}], "quiz": [{"q": "電話が（　　）、彼は家を飛び出した。", "opts": ["A. 鳴るが早いか", "B. 鳴ったが早いか", "C. 鳴るのが早いか", "D. 鳴ることが早いか"], "ans": "A", "exp": "「〜が早いか」は動詞辞書形に接続する。Aが正解。"}, {"q": "授業が終わる（　　）、学生たちは教室から消えた。", "opts": ["A. とすぐに", "B. が早いか", "C. ばすぐに", "D. 次第"], "ans": "B", "exp": "学生たちの素早い行動に驚きを表現するには「が早いか」が最適。"}, {"q": "「〜が早いか」の特徴として正しいのは？", "opts": ["A. 日常会話でよく使う", "B. 動作の同時性と驚きを表現", "C. 過去形に接続", "D. 原因理由を表す"], "ans": "B", "exp": "「〜が早いか」は動作の同時性と、その速さに対する驚きを表現する文法である。"}]}, "9": {"analysis": "「〜からある/からする/からの」是N1级别的数量强调表达，用于突出数量之大超乎寻常。与单纯的数量表述不同，这个句型带有说话人的主观评价，暗示该数量远超预期或常理。三种形式在语感上略有差异：「からある」最为正式庄重，「からする」稍显口语化，「からの」则更加自然流畅。", "mistakes": "❌ 10人からあるパーティー → ✅ 100人からあるパーティー（数量太小无法体现「多达」的强调意义）\n❌ 高いからある値段 → ✅ 1万円からある値段（需要具体数量词，不能用形容词）\n❌ 昨日からある話 → ✅ 3時間からある話（不能表示时间起点，只能表示数量程度）", "similar": [{"form": "〜も", "diff": "「も」表示超出预期但较温和，「からある」更强调数量惊人"}, {"form": "〜にも及ぶ", "diff": "「及ぶ」偏重客观描述达到某程度，「からある」主观色彩更浓"}, {"form": "〜以上", "diff": "「以上」是客观的最低限度，「からある」强调超乎寻常的多"}], "quiz": [{"q": "彼は（　　）借金を抱えている。", "opts": ["A. 1000円からある", "B. 1000万円からある", "C. 高いからある", "D. 多いからある"], "ans": "B", "exp": "借金语境下需要大额数字才能体现「多达」的强调效果，A选项数额太小，C、D不能用形容词"}, {"q": "この小説は（　　）大作だ。", "opts": ["A. 長いからの", "B. 1000ページからの", "C. 厚いからの", "D. 重いからの"], "ans": "B", "exp": "需要具体的数量词「1000ページ」来强调篇幅之长，其他选项都是形容词无法使用"}, {"q": "会場には（　　）人が集まった。", "opts": ["A. 10人からする", "B. 少ないからする", "C. 1万人からする", "D. 大勢からする"], "ans": "C", "exp": "「1万人からする」表示多达一万人的惊人数量，A选项数量太少，B、D不是具体数量词"}]}, "10": {"analysis": "「〜かれ〜かれ」是一个固定搭配，用于表示两种相对或相反的情况，强调无论哪种情况结果都相同。此文法只能用于形容词，且多数情况下使用对义词组合，如「多かれ少なかれ」「遅かれ早かれ」等。这是一种较为文语化的表达，在正式文章中较为常见。", "mistakes": "❌ 高いかれ安いかれ、買わなければならない → ✅ 高かろうが安かろうが、買わなければならない（应该使用「〜かろうが」）\n❌ 早いかれ遅いかれ → ✅ 早かれ遅かれ（形容词去掉い加かれ）\n❌ 好きかれ嫌いかれ → ✅ 好きであれ嫌いであれ（な形容词不能用此文法）", "similar": [{"form": "〜であれ〜であれ", "diff": "可用于名词和な形容词，语气较「かれ〜かれ」温和"}, {"form": "〜にしろ〜にしろ", "diff": "可用于各种词类，表示让步，语气更加口语化"}, {"form": "〜を問わず", "diff": "表示不问条件，但不强调两种相反情况"}], "quiz": [{"q": "____、準備はしっかりとしておくべきだ。", "opts": ["A. 多かれ少なかれ", "B. 長かれ短かれ", "C. 遅かれ早かれ", "D. 高かれ安かれ"], "ans": "A", "exp": "「多かれ少なかれ」是固定搭配，表示「或多或少」，符合语境"}, {"q": "この問題は____解決しなければならない。", "opts": ["A. 難しかれ易しかれ", "B. 遅かれ早かれ", "C. 大きかれ小さかれ", "D. 新しかれ古かれ"], "ans": "B", "exp": "「遅かれ早かれ」表示「迟早」，最符合「必须解决问题」的语境"}, {"q": "彼の実力なら、____成功するだろう。", "opts": ["A. 速いかれ遅いかれ", "B. 多かれ少なかれ", "C. 遅かれ早かれ", "D. 高かれ低かれ"], "ans": "C", "exp": "A选项语法错误（应为「早かれ遅かれ」），C「遅かれ早かれ」表示凭他的实力迟早会成功"}]}, "11": {"analysis": "「きっての」表示在某个范围内的最高程度，具有强烈的推崇和赞美色彩。与一般最高级不同，它暗含「众所周知」的含义，即被公认的最优秀者。常用于正面评价，如才能、美貌、技艺等方面。", "mistakes": "❌ 彼は会社きっての怠け者だ → ✅ 彼は会社一の怠け者だ（负面评价不用きっての）\n❌ この店はきっての美味しい → ✅ この店は町きっての美味しい店だ（必须是名词修饰名词）", "similar": [{"form": "〜一の", "diff": "一の更中性客观，きっての带有赞美推崇色彩"}, {"form": "〜随一の", "diff": "随一の更正式书面，きっての更口语化"}], "quiz": [{"q": "彼女は学校____の美人だ。", "opts": ["A. きっての", "B. 一番の", "C. 最高の", "D. トップの"], "ans": "A", "exp": "きっての表示众所周知的最高程度，适合修饰美人等正面特质"}, {"q": "この地方は日本____米どころとして有名だ。", "opts": ["A. 一の", "B. きっての", "C. 最大の", "D. 代表的な"], "ans": "B", "exp": "きっての强调在日本范围内公认的最优秀产米地"}, {"q": "彼は業界____の____だ。", "opts": ["A. きっての・問題児", "B. きっての・実力者", "C. 一の・天才", "D. 随一の・努力家"], "ans": "B", "exp": "きっての用于正面评价，实力者是正面词汇，问题児是负面词汇不适用"}]}, "12": {"analysis": "「〜きらいがある」表示对某种不良倾向的客观批判，语气较为正式，常用于书面语。与单纯的「傾向がある」不同，该文法带有明显的负面评价色彩，暗示说话人对这种倾向持不赞成态度。使用时需注意主语通常是第三人称，很少用于自我批评。", "mistakes": "易错点：误用于正面倾向 ❌彼は勉強熱心なきらいがある → ✅彼は勉強熱心な傾向がある；混淆接续形式 ❌完璧主義きらいがある → ✅完璧主義のきらいがある", "similar": [{"form": "〜傾向がある", "diff": "中性表达，可用于正面或负面倾向；きらいがある专指负面倾向且带批判色彩"}, {"form": "〜がちだ", "diff": "主观性较强，可用于自己；きらいがある更客观，多用于评价他人"}], "quiz": [{"q": "最近の若者は物事を____きらいがある。", "opts": ["A. 簡単に考える", "B. 深く考える", "C. 表面的に捉える", "D. 真剣に取り組む"], "ans": "C", "exp": "きらいがあるは否定的な傾向を表すため、「表面的に捉える」が適切"}, {"q": "彼女は自分の意見を____のきらいがある。", "opts": ["A. 積極的に述べる", "B. 他人に押し付ける", "C. 慎重に考える", "D. 素直に受け入れる"], "ans": "B", "exp": "批判的なニュアンスを持つ「他人に押し付ける」が文法的に正しい"}, {"q": "この会社は利益を____きらいがある。", "opts": ["A. 適切に分配する", "B. 社員に還元する", "C. 優先しすぎる", "D. 計画的に使う"], "ans": "C", "exp": "きらいがあるは好ましくない傾向を示すため「優先しすぎる」が適切"}]}, "13": {"analysis": "「〜極まる/極まりない」是N1级别的书面语表达，用于极端程度的强调，比一般的「とても」「非常に」语气更强烈。「極まる」作为动词可以活用，而「極まりない」是形容词形式，在句中作定语时更常用。这个文法多出现在正式文章、评论或批判性文章中。", "mistakes": "❌ 彼は親切極まりないです → ✅ 彼は親切極まりない人だ（不能直接接「です」）\n❌ この料理は美味しい極まる → ✅ この料理は美味極まる（い形容词不能直接接続）\n❌ 危険極まりない状況になります → ✅ 危険極まりない状況になる（书面语避免使用丁寧語）", "similar": [{"form": "〜この上ない", "diff": "「極まる/極まりない」更书面化，带有批判色彩；「この上ない」更中性，可用于褒贬"}, {"form": "〜至極", "diff": "「至極」更古典文雅，「極まる/極まりない」现代书面语色彩更强"}], "quiz": [{"q": "彼女の発言は（　　）極まりない。", "opts": ["A. 無責任", "B. 無責任な", "C. 無責任に", "D. 無責任で"], "ans": "A", "exp": "「極まる/極まりない」前接な形容词词干，所以是「無責任」"}, {"q": "この小説の結末は（　　）。", "opts": ["A. 感動極まりないです", "B. 感動極まりない", "C. 感動的極まりない", "D. 感動極まる"], "ans": "B", "exp": "书面语不用丁寧語，且「感動」是な形容词词干形式"}, {"q": "次のうち、「極まりない」と同じ意味で使えるものはどれか。", "opts": ["A. とても", "B. この上ない", "C. かなり", "D. 少し"], "ans": "B", "exp": "「この上ない」も極端な程度を表す書面語表現で、「極まりない」と同様の意味"}]}, "14": {"analysis": "「ごとき・ごとく・ごとし」是古典日语的比喻表现，现代多用于书面语或正式场合，带有庄重、文雅的语感。三种形式中，「ごとし」是终止形，「ごとく」是连用形，「ごとき」是连体形，用法上略有区别但意思相同。", "mistakes": "❌ 彼は神様ごとき存在だ → ✅ 彼は神のごとき存在だ（接续错误，应该用「の」连接名词）\n❌ 美しいごとく花 → ✅ 花のごとく美しい（语序错误，应该是比喻对象+ごとく+被比喻内容）", "similar": [{"form": "〜のように/ような", "diff": "现代常用的比喻表现，语感较为日常，而ごとき等更加古雅正式"}, {"form": "〜さながら", "diff": "同样是书面语的比喻表现，但さながら更强调「完全像」的意思"}], "quiz": [{"q": "伝説に聞く____、この山には神が住んでいるという。", "opts": ["A. ごとき", "B. ごとく", "C. ごとし", "D. ごとくに"], "ans": "B", "exp": "「聞くごとく」是固定用法，表示「正如所听说的那样」"}, {"q": "彼女は天使の____美しい人だった。", "opts": ["A. ごとき", "B. ごとく", "C. ごとし", "D. ごとくな"], "ans": "A", "exp": "修饰名词「人」时使用连体形「ごとき」"}, {"q": "風の____、彼は突然現れて突然消えた。", "opts": ["A. ごときに", "B. ごとく", "C. ごとし", "D. ごとくで"], "ans": "B", "exp": "「風のごとく」表示「像风一样」，用连用形修饰后面的动词"}]}, "15": {"analysis": "「〜こととて」是一个极为正式的文语表现，主要用于正式场合的道歉或弁解。它比「〜ので」「〜から」更加谦逊和郑重，常用于向上级或重要人士表达歉意时的理由说明。此文法带有强烈的自谦色彩，暗示说话者承认自己的不足并请求对方理解。", "mistakes": "❌ 初めてのこととて、うまくできませんでした → ✅ 初めてのこととて、うまくできず申し訳ありませんでした（需要配合道歉表现）\n❌ 忙しいこととて、手伝えない → ✅ 忙しいこととて、お手伝いできず恐縮です（过于直接，缺乏谦逊语气）", "similar": [{"form": "〜ゆえに", "diff": "同样正式但更偏向客观理由，不含自谦意味"}, {"form": "〜につき", "diff": "正式理由表现但更偏向事务性说明，较少用于道歉"}, {"form": "〜ばかりに", "diff": "表示因某事导致不好结果，含有后悔意味"}], "quiz": [{"q": "年配のこととて、新しい技術についていけず____。", "opts": ["A. すみません", "B. 申し訳ございません", "C. ごめんなさい", "D. 悪いです"], "ans": "B", "exp": "「こととて」是极正式表现，需要配合最敬语的道歉形式「申し訳ございません」"}, {"q": "____こととて、ご迷惑をおかけして恐縮です。", "opts": ["A. 未熟な", "B. 未熟である", "C. 未熟だった", "D. 未熟で"], "ans": "A", "exp": "「こととて」前接连体形，形容动词的连体形是「〜な」"}, {"q": "この度は新人のこととて、至らぬ点がございましたら____。", "opts": ["A. すみません", "B. 悪かったです", "C. お許しください", "D. 謝ります"], "ans": "C", "exp": "正式场合的道歉需要使用敬语「お許しください」，与「こととて」的正式语体相匹配"}]}, "16": {"analysis": "「〜始末だ」表示经过一系列过程后，最终导致了不好的结果或令人意想不到的糟糕局面。重点在于强调事态的恶化和最终的不良后果，带有说话人的感慨或无奈情绪。常用于描述本来可以避免但最终还是发生了的坏结果。", "mistakes": "❌ 彼は合格する始末だった（他最终合格了）→ ✅ 彼は不合格になる始末だった（他最终不合格了）。「始末だ」只用于描述坏的结果，不能用于好的结果。❌ 始末だったので嬉しい（因为是始末所以高兴）→ ✅ 始末だったので困った（因为是这种结果所以很困扰）", "similar": [{"form": "〜羽目になる", "diff": "「羽目になる」强调陷入困境或不得不做某事的状况；「始末だ」更强调最终的坏结果和对整个过程的总结"}, {"form": "〜ことになる", "diff": "「ことになる」是中性的结果表达，可用于好坏结果；「始末だ」专门用于坏的结果，带有感慨色彩"}], "quiz": [{"q": "彼は借金を重ねて、ついに家を売る____。", "opts": ["A. ことになった", "B. 始末だった", "C. 羽目になった", "D. はずだった"], "ans": "B", "exp": "「始末だった」表示最终落得卖房子这样的坏结果，符合语境中借债导致的恶劣后果"}, {"q": "準備不足で、当日は大失敗する____。", "opts": ["A. 始末だった", "B. ことになった", "C. つもりだった", "D. 予定だった"], "ans": "A", "exp": "「始末だった」强调准备不足最终导致大失败这个坏结果，带有对整个过程的感慨"}, {"q": "優勝する____で、みんな大喜びだった。", "opts": ["A. 始末だった", "B. ことになって", "C. 羽目になって", "D. はずで"], "ans": "B", "exp": "优胜是好结果，不能用「始末だった」。「ことになって」可以用于好的结果"}]}, "17": {"analysis": "「〜ずくめ」表示某种状态或事物完全占据、充满的情况，强调「全是」「清一色」的概念。与「〜だらけ」不同，「ずくめ」通常用于积极或中性的事物，且语感更加正式。该文法多用于书面语或正式场合。", "mistakes": "❌ 今日は悪いことずくめだった → ✅ 今日は悪いことだらけだった（负面事物用だらけ）\n❌ 白いずくめの服装 → ✅ 白ずくめの服装（不需要い形容词形式）\n❌ 彼は嘘ずくめの人だ → ✅ 彼は嘘だらけの人だ（负面特征用だらけ）", "similar": [{"form": "〜だらけ", "diff": "だらけは負面的な意味で使われることが多く、ずくめは中性・積極的"}, {"form": "〜まみれ", "diff": "まみれは物理的に付着している状態、ずくめは抽象的な充満状態"}, {"form": "〜ばかり", "diff": "ばかりは範囲限定、ずくめは完全に占有している状態"}], "quiz": [{"q": "彼女は今日、黒____の服装で現れた。", "opts": ["A. だらけ", "B. ずくめ", "C. まみれ", "D. ばかり"], "ans": "B", "exp": "「黒ずくめ」は全身黒い服装という意味で、中性的な表現として使われる"}, {"q": "今年は____いいニュースの年だった。", "opts": ["A. ずくめ", "B. だらけの", "C. いいニュースずくめの", "D. まみれの"], "ans": "C", "exp": "「いいニュースずくめ」で好いニュースばかりという積極的な意味を表す"}, {"q": "その部屋は埃____で掃除が大変だった。", "opts": ["A. ずくめ", "B. だらけ", "C. まみれ", "D. ばかり"], "ans": "B", "exp": "埃は汚れで負面的なので「だらけ」を使い、物理的な付着状態なので「まみれ」も可能だが、この文脈では「だらけ」が適切"}]}, "19": {"analysis": "「〜ずにはすまない」表示因义务感或社会压力而不得不做某事，常用于正式场合。「ず」是「ない」的古典形式，「すまない」表示无法了结、不能置之不理的状态。此文法强调的是外在压力或道德义务迫使必须采取行动。", "mistakes": "❌ 行かないずにはすまない → ✅ 行かずにはすまない（「ない」要去掉变成「ず」）\n❌ 食べずにすまない → ✅ 食べずにはすまない（不能省略「には」）\n❌ するずにはすまない → ✅ せずにはすまない（「する」的否定形是「しない」，去掉「ない」变「せず」）", "similar": [{"form": "〜ないわけにはいかない", "diff": "意思基本相同，但「〜ずにはすまない」更强调道德义务感，语感更正式古典"}, {"form": "〜ざるを得ない", "diff": "同样表示不得不做，但更强调客观必然性，而非道德压力"}], "quiz": [{"q": "彼に迷惑をかけた以上、____。", "opts": ["A. 謝らずにはすまない", "B. 謝らないずにはすまない", "C. 謝るずにはすまない", "D. 謝らずにすまない"], "ans": "A", "exp": "動詞「謝る」的ない形去掉「ない」変成「謝らず」，加上「にはすまない」"}, {"q": "この問題について、真剣に____。", "opts": ["A. 考えずにすまない", "B. 考えないずにはすまない", "C. 考えずにはすまない", "D. 考えるずにはすまない"], "ans": "C", "exp": "「考える」的ない形是「考えない」，去掉「ない」変「考えず」，必须加「には」"}, {"q": "責任者として、この件に関して何か____。", "opts": ["A. するずにはすまない", "B. せずにはすまない", "C. しないずにはすまない", "D. しずにはすまない"], "ans": "B", "exp": "「する」的ない形是「しない」，去掉「ない」変「せず」，「せずにはすまない」是正确形式"}]}, "20": {"analysis": "「すら」是「さえ」的书面语形式，表示极端的例示，强调连最不可能的情况都发生。常用于强调意外性或程度之深，语气比「さえ」更加庄重正式。", "mistakes": "❌ 彼はひらがなすら読めません → ✅ 彼はひらがなすら読めない（书面语多用否定形式）; ❌ 名前すら覚えている → ✅ 名前すら忘れている（多用于否定或困难的语境）", "similar": [{"form": "〜さえ", "diff": "すら是书面语，さえ是口语，すら语气更强烈"}, {"form": "〜でも", "diff": "でも表示让步，すら强调极端例示的意外性"}, {"form": "〜まで", "diff": "まで表示范围延伸，すら强调连最基本的都如此"}], "quiz": [{"q": "彼は自分の名前____書けない。", "opts": ["A. すら", "B. さえ", "C. でも", "D. まで"], "ans": "A", "exp": "书面语语境中表示连最基本的事情都不会，用「すら」最合适"}, {"q": "一円____持っていない貧しい生活をしている。", "opts": ["A. でも", "B. さえ", "C. すら", "D. まで"], "ans": "C", "exp": "强调连一円这样微小的金额都没有，用「すら」表示极端状况"}, {"q": "この問題は専門家____解けないほど難しい。", "opts": ["A. まで", "B. すら", "C. でも", "D. から"], "ans": "B", "exp": "表示连专家这样最有能力的人都解不了，「すら」强调意外性"}]}, "22": {"analysis": "「〜たためしがない」是N1级别的强调表现，用于表达从未有过某种经验，语气比单纯的「〜たことがない」更加强烈。「ためし」原意为「试验、尝试」，在此文法中表示「先例、经验」，强调连一次都没有过的绝对否定。此表现多用于批评或感慨的语境中。", "mistakes": "易混淆点：❌彼が約束を守るためしがない → ✅彼が約束を守ったためしがない（必须用た形）；❌雨が降ったためしはない → ✅雨が降ったためしがない（固定搭配用「がない」）", "similar": [{"form": "〜たことがない", "diff": "「ためしがない」语气更强，带有批评或强烈感慨色彩"}, {"form": "〜ば〜ほど", "diff": "完全不同用法，「ためしがない」表示从未经验过"}], "quiz": [{"q": "彼女が時間通りに来た____。", "opts": ["A. ためしがない", "B. ためしはない", "C. ことがない", "D. はずがない"], "ans": "A", "exp": "表示「从来没有按时来过」，强调从未有过的经验，用「ためしがない」"}, {"q": "この店の料理がまずかった____。", "opts": ["A. ことはない", "B. ためしがない", "C. わけがない", "D. はずはない"], "ans": "B", "exp": "「从来没有觉得这家店的料理难吃过」，表示从未有过的经验"}, {"q": "父が家事を手伝う____から、母は驚いている。", "opts": ["A. ためしがない", "B. ことがない", "C. ためしがなかった", "D. A和C都可以"], "ans": "C", "exp": "语境表示过去从未有过，现在突然开始帮忙，所以用过去时「ためしがなかった」更自然"}]}, "23": {"analysis": "「〜たところで」表示即使做了某事也不会有积极结果，带有强烈的否定或消极含义。这个语法强调行为的徒劳性，常用于劝阻或表达无奈。与「〜ても」相比，「〜たところで」的否定色彩更浓，更强调结果的无意义。", "mistakes": "❌ 今から勉強したところで、合格する。→ ✅ 今から勉強したところで、合格しない。（「〜たところで」后必须接否定结论）❌ 雨が降るところで、出かけない。→ ✅ 雨が降ったところで、出かける。（必须用た形）", "similar": [{"form": "〜ても", "diff": "「〜ても」表示一般的让步，结果可正可负；「〜たところで」专门表示否定结果，徒劳无功"}, {"form": "〜としても", "diff": "「〜としても」多用于假设；「〜たところで」强调实际行为的无效性"}], "quiz": [{"q": "今から____、間に合わないでしょう。", "opts": ["A. 急いだところで", "B. 急ぐところで", "C. 急げばところで", "D. 急ぐとしても"], "ans": "A", "exp": "「〜たところで」必须用动词た形，表示即使急也来不及"}, {"q": "彼に何度説明したところで、____。", "opts": ["A. よく理解する", "B. 理解してくれる", "C. 理解してくれない", "D. 理解するはず"], "ans": "C", "exp": "「〜たところで」后面必须接否定性结论，表示徒劳"}, {"q": "この値段では、いくら宣伝したところで____。", "opts": ["A. 売れるでしょう", "B. 売れないでしょう", "C. 売れたい", "D. 売れそう"], "ans": "B", "exp": "「〜たところで」表示即使宣传也不会有积极结果，必须用否定表达"}]}, "24": {"analysis": "「〜だに」是古典日语残留的表现，现代日语中主要用于书面语，表示「仅仅〜就」的意思。常与「想像」「夢」「聞く」等词汇搭配，强调即使是最轻微的行为或状态都会产生强烈的感情或反应。这个文法带有文语色彩，使用频率不高但在文学作品中经常出现。", "mistakes": "❌ 見るだに美しい → ✅ 見るだに美しい（正确，但现代更常用「見ただけで美しい」）\n❌ 食べるだに美味しい → ✅ 想像するだに美味しそうだ（だに多用于想象、梦境等抽象概念）\n❌ 考えるだにうれしい → ✅ 考えるだに楽しい（感情表达要符合语境）", "similar": [{"form": "〜ただけで", "diff": "だには古典語法，更文雅；ただけでは現代口語，使用範囲更廣"}, {"form": "〜だけでも", "diff": "だけでもは「至少」的意思；だには「僅僅就」，強調程度之輕微"}], "quiz": [{"q": "その事故の様子を____恐ろしい。", "opts": ["A. 想像するだに", "B. 想像しただけに", "C. 想像するばかりに", "D. 想像したために"], "ans": "A", "exp": "「想像するだに」表示光是想象就感到恐怖，符合语境要求"}, {"q": "彼女との再会を____うれしい。", "opts": ["A. 聞くだに", "B. 夢見るだに", "C. 見るだに", "D. 話すだに"], "ans": "B", "exp": "「夢見るだに」表示光是梦想就感到高兴，「だに」常与「夢」搭配使用"}, {"q": "その話を____身震いがする。", "opts": ["A. 言うだに", "B. 考えるだに", "C. 聞くだに", "D. 読むだに"], "ans": "C", "exp": "「聞くだに」表示光是听到就让人发抖，是「だに」的典型用法之一"}]}, "26": {"analysis": "「〜た弾みに/た拍子に」表示在做某动作的瞬间，偶然发生了预期外的事情，强调时机的巧合性和结果的偶发性。两个表达在语感上略有不同：「弾みに」更强调动作的反作用力或惯性，「拍子に」更强调时机的巧合。这个文法常用于描述意外事故或偶然发现等情况。", "mistakes": "❌ 考えた弾みに、いいアイデアが浮かんだ → ✅ 考えているうちに、いいアイデアが浮かんだ（思考不是瞬间动作）\n❌ 毎日散歩する拍子に、友達に会う → ✅ 散歩した拍子に、友達に会った（不能用于习惯性动作）", "similar": [{"form": "〜たとたん（に）", "diff": "「とたん」强调紧接着发生，「弾みに/拍子に」强调偶然性"}, {"form": "〜た途端", "diff": "「途端」多用于书面语，「弾みに/拍子に」更口语化"}, {"form": "〜たきっかけで", "diff": "「きっかけ」可用于积极结果，「弾みに/拍子に」多用于意外事件"}], "quiz": [{"q": "階段を駆け上がった____、転んでしまった。", "opts": ["A. 弾みに", "B. ついでに", "C. おかげで", "D. せいで"], "ans": "A", "exp": "跑上楼梯的瞬间摔倒，是典型的偶发事件，用「弾みに」最合适"}, {"q": "振り返った____、昔の恋人と目が合った。", "opts": ["A. ところで", "B. 拍子に", "C. ために", "D. によって"], "ans": "B", "exp": "回头的瞬间偶然与前恋人四目相对，用「拍子に」表示偶然的时机"}, {"q": "本を____弾みに、重要な資料を見つけた。", "opts": ["A. 読む", "B. 読んだ", "C. 読んでいる", "D. 読もうとした"], "ans": "B", "exp": "「弾みに」前必须用动词た形，表示在读书的过程中偶然发现了重要资料"}]}, "28": {"analysis": "「〜たまでだ」表示说话人对自己的行为进行辩解、谦逊或强调理所当然，常用于为自己的行为进行轻描淡写的解释。这个文法带有一定的主观色彩，暗示「只是做了应该做的事情，没什么特别的」。使用时要注意语境，通常用于回应他人的质疑或赞扬。", "mistakes": "❌ 彼を助けるまでだった（过去时用法错误） → ✅ 彼を助けたまでだ（た形+まで正确）\n❌ 言うまでのことだ（动词辞书形接续错误） → ✅ 言ったまでのことだ（必须用た形接续）", "similar": [{"form": "〜だけだ", "diff": "「だけだ」单纯表示限定，「たまでだ」含有辩解谦逊的主观色彩"}, {"form": "〜にすぎない", "diff": "「にすぎない」更书面化，「たまでだ」更口语化且带有为自己辩护的语感"}], "quiz": [{"q": "A：なぜそんなことを言ったんですか。B：事実を（____）。", "opts": ["A. 話すまでだ", "B. 話したまでだ", "C. 話すまでのことだ", "D. 話していたまでだ"], "ans": "B", "exp": "「たまでだ」必须接动词た形，表示为自己的行为进行辩解"}, {"q": "約束を（____）、特別なことではない。", "opts": ["A. 守るまでだ", "B. 守ったまでだ", "C. 守るまでのことだ", "D. 守っているまでだ"], "ans": "B", "exp": "表示「只是遵守了约定」的谦逊态度，用た形+まで"}, {"q": "彼の間違いを指摘（____）、余計なお世話だったかもしれません。", "opts": ["A. するまでだが", "B. したまでだが", "C. するまでのことだが", "D. していたまでだが"], "ans": "B", "exp": "对自己指出错误的行为进行辩解，带有一定的后悔语气"}]}, "29": {"analysis": "「たら最後/たが最後」表示一旦发生某种行为或状态，就会导致不可挽回的严重后果。这个文法强调的是「不可逆转性」和「负面结果的必然性」。与一般的条件表达不同，它暗示着一种警告或担忧的语气，后续必定是消极的结果。", "mistakes": "❌ 彼に会ったら最後、楽しい時間を過ごせる → ✅ 彼に会ったら最後、帰してくれない（后果必须是负面的）; ❌ この薬を飲んだが最後、元気になる → ✅ この薬を飲んだが最後、副作用で苦しむ（不能表达积极结果）", "similar": [{"form": "〜たが最後vs〜たら最後", "diff": "「が最後」更文语化，「ら最后」更口语化，意思完全相同"}, {"form": "〜たら最後vs〜ば", "diff": "「たら最後」强调不可挽回的严重后果，「ば」只是一般条件"}, {"form": "〜たら最後vs〜と", "diff": "「たら最後」含有警告意味，「と」是客观的恒常条件"}], "quiz": [{"q": "あの店に入った____、店員に勧められて高い物を買わされる。", "opts": ["A.ら最後", "B.ばかり", "C.ところで", "D.にしても"], "ans": "A", "exp": "表示进入那家店后会有不好的后果（被推销买贵东西），符合「たら最後」的用法"}, {"q": "彼女に秘密を話した____、みんなに知れ渡ってしまう。", "opts": ["A.ために", "B.が最後", "C.ことには", "D.わけには"], "ans": "B", "exp": "一旦告诉她秘密就会传遍所有人，表示不可挽回的负面后果"}, {"q": "この仕事を引き受けた____、休む暇もなくなる。", "opts": ["A.おかげで", "B.せいで", "C.たら最後", "D.くらいなら"], "ans": "C", "exp": "接受这份工作后就再也没有休息时间，强调不可逆转的严重后果"}]}, "31": {"analysis": "「〜たるもの」是表示对某种身份、地位或立场的期待与要求的文语表现，含有强烈的道德责任感和使命感。此句型强调「身为某种身份的人理应如何行动」，常与「〜べきだ」等表示义务的表现搭配使用。", "mistakes": "❌ 学生たるものは、勉強するべきだ（多余的「は」） → ✅ 学生たるもの、勉強するべきだ ❌ リーダーたるものに、責任を持つ（错误的格助词） → ✅ リーダーたるもの、責任を持つべきだ", "similar": [{"form": "〜として", "diff": "「として」是一般的身份表现，「たるもの」更强调道德期待和责任"}, {"form": "〜である以上", "diff": "「である以上」表示逻辑必然性，「たるもの」更强调身份的尊严和使命"}], "quiz": [{"q": "医者____、患者の命を最優先に考えるべきだ。", "opts": ["A. たるもの", "B. として", "C. である以上", "D. に関して"], "ans": "A", "exp": "强调医生这一身份的道德责任和使命感，用「たるもの」最合适"}, {"q": "親____、子供の将来を真剣に考えなければならない。", "opts": ["A. として", "B. たるもの", "C. であるから", "D. に対して"], "ans": "B", "exp": "表示作为父母应尽的责任和义务，「たるもの」体现身份期待"}, {"q": "政治家____、国民のために働くのは当然のことだ。", "opts": ["A. である以上", "B. として", "C. たるもの", "D. に関して"], "ans": "C", "exp": "强调政治家这一身份应承担的道德责任，「たるもの」最恰当"}]}, "32": {"analysis": "「〜尽くす」表示彻底、完全地做某个动作直到极限，强调行为的彻底性和完全性。此文法常用于表达将某事做到极致或耗尽的状态，带有强烈的完成感。", "mistakes": "❌ この映画を見尽くした。→ ✅ この映画は見尽くした。（助词使用：完全消费类动词多用「は」）❌ 食べ尽くしている。→ ✅ 食べ尽くした。（时态：尽くす多用完了形表示彻底完成）", "similar": [{"form": "〜切る", "diff": "「切る」侧重动作的完成，「尽くす」侧重彻底性和极限状态"}, {"form": "〜終える", "diff": "「終える」仅表示结束，「尽くす」强调做到极致、耗尽"}], "quiz": [{"q": "彼は財産を____。", "opts": ["A.使い尽くした", "B.使い尽くしている", "C.使い尽くすだろう", "D.使い尽くせば"], "ans": "A", "exp": "表示财产已经完全用完，用完了时态最适合"}, {"q": "その問題について____。", "opts": ["A.考え尽くすこと", "B.考え尽くした", "C.考え尽くして", "D.考え尽くしたい"], "ans": "B", "exp": "表示对问题已经彻底思考完毕，用过去完了形"}, {"q": "子供たちはおもちゃで____。", "opts": ["A.遊び尽くした", "B.遊び尽くす", "C.遊び尽くして", "D.遊び尽くそう"], "ans": "A", "exp": "表示孩子们已经彻底玩够了玩具，强调完全性"}]}, "33": {"analysis": "「〜つ〜つ」是表示两个动作交替反复进行的古典文法形式，多用于固定搭配和成语中。与现代语「〜たり〜たり」相比，更具文学性和正式感，常见于谚语、慣用句中。", "mistakes": "❌ 行きつ戻りつしている → ✅ 行きつ戻りつしている（正确，但需注意这是固定表达）❌ 食べつ飲みつした → ✅ 食べたり飲んだりした（应用现代语法）", "similar": [{"form": "〜たり〜たり", "diff": "现代语法，使用范围更广；〜つ〜つ多限于固定表达"}, {"form": "〜ては〜ては", "diff": "强调反复动作的困扰感；〜つ〜つ更中性描述交替"}], "quiz": [{"q": "「持ちつ____つの関係」の空欄に入る適切な語は？", "opts": ["A. 持た", "B. 持ち", "C. 持て", "D. 持ろ"], "ans": "A", "exp": "「持ちつ持たれつ」は互相依存关系的固定表达，第二个动词用未然形+れ+つ"}, {"q": "「行きつ戻りつ」の意味として最も適切なのは？", "opts": ["A. 一方的に進む", "B. 往復を繰り返す", "C. 迷子になる", "D. 急いで移動する"], "ans": "B", "exp": "「行きつ戻りつ」は行ったり戻ったりを繰り返すという意味の慣用表現"}, {"q": "現代語で「〜つ〜つ」と同じ意味を表すのは？", "opts": ["A. 〜ながら〜ながら", "B. 〜たり〜たり", "C. 〜ては〜ては", "D. 〜つつ〜つつ"], "ans": "B", "exp": "「〜たり〜たり」が現代語で交替・反復を表す最も一般的な文法形式"}]}, "34": {"analysis": "「〜であれ〜であれ」表示无论是前者还是后者，结论都相同，强调两种对立或不同情况的普遍性。与「〜でも〜でも」相比，「であれ」更加正式庄重，常用于书面语或正式场合。此文法强调说话者对两种情况都持同样态度或得出相同结论。", "mistakes": "❌ 学生であれ先生であれ、この規則を守らなければなりません → ✅ 学生であれ先生であれ、この規則を守らなければならない（应使用更正式的表达）\n❌ 雨であれ雪であれ、行きます → ✅ 雨であれ雪であれ、行くつもりです（后句应与前句的正式程度保持一致）", "similar": [{"form": "〜にしても〜にしても", "diff": "「にしても」更口语化，「であれ」更正式庄重"}, {"form": "〜であろうと〜であろうと", "diff": "「であろうと」带有推测语气，「であれ」更直接断定"}, {"form": "〜を問わず", "diff": "「を問わず」后接一个词汇，「であれ」需要两个对比项"}], "quiz": [{"q": "社長____平社員____、この会社では実力が評価される。", "opts": ["A. であれ...であれ", "B. にしても...にしても", "C. だったら...だったら", "D. といえば...といえば"], "ans": "A", "exp": "表示无论是社长还是普通员工都一样，强调两种身份地位的对比，用「であれ...であれ」最合适"}, {"q": "この問題について、賛成_ 定「赤ちゃん（婴儿）」来批评不应该过分溺爱，逻辑合理"}, {"q": "今時、携帯電話を____、連絡が取れないなんて。", "opts": ["A. 持っているではあるまいし", "B. 持っていないではあるまいし", "C. 持たないではあるまいし", "D. 持つではあるまいし"], "ans": "B", "exp": "「持っていないではあるまいし」表示「又不是没有手机」，批评联系不上的情况"}]}, "37": {"analysis": "「〜てまえ」表示基于体面、立场或道德义务而不得不做某事的语法。强调因为之前的行为或状态，现在必须承担相应的责任或采取行动，带有「不得已」的语感。", "mistakes": "❌ 約束したてまえ、行かなければならない。→ ✅ 約束した手前、行かなければならない。（「てまえ」必须写成汉字「手前」）", "similar": [{"form": "〜からには", "diff": "「からには」强调既然决定了就要彻底执行；「〜てまえ」更强调顾及面子立场的不得已感"}, {"form": "〜以上（は）", "diff": "「以上は」强调基于立场地位的义务；「〜てまえ」更侧重于维护体面的心理压力"}], "quiz": [{"q": "部下の____、最後まで責任を持たなければならない。", "opts": ["A. 手前", "B. 前で", "C. 面前", "D. 立場"], "ans": "A", "exp": "「部下の手前」表示在部下面前要维护威信，所以必须负责到底"}, {"q": "一度引き受けた____、途中で投げ出すわけにはいかない。", "opts": ["A. 以上", "B. 手前", "C. からには", "D. ために"], "ans": "B", "exp": "「引き受けた手前」表示既然接受了就要顾及面子，不能半途而废"}, {"q": "みんなの前で宣言した____、必ず実現させる。", "opts": ["A. 結果", "B. ので", "C. 手前", "D. ため"], "ans": "C", "exp": "「宣言した手前」表示既然在大家面前宣布了，就必须顾及面子实现承诺"}]}, "38": {"analysis": "「〜てやまない」是表示持续强烈感情的敬语表现，主要用于书面语和正式场合。该文法强调感情的深度和持续性，常用于表达敬意、祈愿、感谢等正面情感。与一般的持续表现不同，它带有庄重、正式的语感，多出现在致辞、信函等正式文体中。", "mistakes": "❌ 彼を尊敬してやまない気持ちがある → ✅ 彼を尊敬してやまない（感情表现不需要「気持ちがある」等冗余表达）❌ 毎日勉強してやまない → ✅ 毎日勉強している（日常行为不适用此文法，应该表达感情）", "similar": [{"form": "〜てならない", "diff": "表示无法抑制的感情，更强调情不自禁；やまない强调持续性"}, {"form": "〜ずにはいられない", "diff": "表示不得不做某事的心情；やまない专门表达持续的强烈感情"}], "quiz": [{"q": "先生のご指導に感謝（____）。", "opts": ["A.してやまない", "B.してならない", "C.せずにはいられない", "D.してはならない"], "ans": "A", "exp": "表达对老师指导的持续感谢之情，用「してやまない」最合适"}, {"q": "彼の才能を（____）。", "opts": ["A.羨ましくてやまない", "B.羨ましんでやまない", "C.羨ましがってやまない", "D.羨んでやまない"], "ans": "D", "exp": "「羨む」的て形是「羨んで」，表达持续羡慕的感情"}, {"q": "平和な世界の実現を（____）。", "opts": ["A.望みてやまない", "B.望んでやまない", "C.望むてやまない", "D.望めてやまない"], "ans": "B", "exp": "「望む」的て形是「望んで」，表达对和平世界的持续期望"}]}, "39": {"analysis": "「〜と相まって」表示两个或多个因素相互结合产生相辅相成的效果，强调多重因素的协同作用。与单纯的并列不同，它暗示各因素之间存在相互促进的关系，通常用于积极的结果。", "mistakes": "❌ 雨と風と相まって、寒くなった。→ ✅ 雨と風が重なって、寒くなった。（天气恶化等消极情况不用「相まって」）", "similar": [{"form": "〜に加えて", "diff": "单纯添加，无相互促进之意"}, {"form": "〜と  演技", "C. ストーリー", "D. 全部"], "ans": "C", "exp": "「ストーリーといい音楽といい」通过故事和音乐两个方面来评价电影整体无聊"}]}, "42": {"analysis": "「〜といえども」是N1级别的书面语表达，表示承认前项事实的前提下，提出逆接的内容，相当于「〜であっても」。与口语的「〜でも」不同，带有更强的对比色彩和正式语感。常用于论述文、新闻报道等正式文体中，强调即使是某种权威或理所当然的情况，也存在例外或限制。", "mistakes": "❌ 子供といえども、大人の話を理解できる → ✅ 子供といえども、大人の話を理解できることがある（需要表达可能性，不是绝对判断）；❌ 雨が降るといえども → ✅ 雨といえども（「といえども」前不接动词句，需要名词化）", "similar": [{"form": "〜であっても", "diff": "「といえども」更书面化，语气更郑重"}, {"form": "〜でも", "diff": "「でも」是口语，「といえども」是书面语"}, {"form": "〜といっても", "diff": "「といっても」表示轻微转折，「といえども」表示强烈对比"}], "quiz": [{"q": "専門家（____）、完璧ではない。", "opts": ["A.といえども", "B.といっても", "C.としても", "D.だとしても"], "ans": "A", "exp": "承认专家身份的前提下表示逆接，用书面语「といえども」最恰当"}, {"q": "親（____）、子供のプライバシーを尊重すべきだ。", "opts": ["A.だから", "B.といえども", "C.なので", "D.によって"], "ans": "B", "exp": "即使是父母也应该尊重孩子隐私，表示让步的逆接关系"}, {"q": "法律（____）、時代とともに変わっていく必要がある。", "opts": ["A.でも", "B.から", "C.といえども", "D.として"], "ans": "C", "exp": "在正式文体中表达即使是法律也需要改变，「といえども」符合书面语语境"}]}, "43": {"analysis": "「〜というもの」是N1级别的时间表现文法，用于强调某个较长时间段内状态或动作的持续性。其特征在于「という」的重复使用，前一个「という」修饰时间词，后一个「もの」起到强调作用。这种表现方式比单纯的时间表达更具有感情色彩，常含有说话人的感慨或强调意图。", "mistakes": "❌ この一年もの、忙しかった。→ ✅ この一年というもの、忙しかった。（必须使用「という」连接时间词和「もの」）❌ 三日間というもの勉強した。→ ✅ 三日間というもの、勉強していた。（通常与持续性动词搭配，表示状态的延续）", "similar": [{"form": "〜間（あいだ）", "diff": "「間」是客观描述时间段，「というもの」带有主观强调和感慨色彩"}, {"form": "〜にわたって", "diff": "「にわたって」多用于正式场合，「というもの」更口语化且带感情色彩"}], "quiz": [{"q": "彼はこの半年____、一度も笑ったことがない。", "opts": ["A. というもの", "B. にかけて", "C. をもって", "D. において"], "ans": "A", "exp": "表示这半年期间持续的状态，用「というもの」强调时间的长度"}, {"q": "一週間____、雨が降り続いている。", "opts": ["A. にわたり", "B. というもの", "C. を通じて", "D. のうちに"], "ans": "B", "exp": "强调一周这个时间段内雨一直在下的持续状态"}, {"q": "この十年____、故郷に帰っていない。", "opts": ["A. の間に", "B. を通して", "C. というもの", "D. にして"], "ans": "C", "exp": "表示十年这个长时间段内一直没有回故乡，带有感慨的语气"}]}, "44": {"analysis": "「〜ときたら」是表达说话者对某人或某事的不满、无奈、批评等负面情感的文法。它强调说话者对提及对象的失望或抱怨，常用于日常对话中表达内心的不满情绪。", "mistakes": "❌ 彼ときたら、とても優秀です → ✅ 彼ときたら、全然だめです（不能用于褒奖，只能表达负面情感）; ❌ 勉強するときたら → ✅ 彼の勉強ときたら（必须接名词，不能接动词）", "similar": [{"form": "〜といったら", "diff": "两者都表不满，但「といったら」语气更强烈，「ときたら」相对温和一些"}, {"form": "〜について言えば", "diff": "「について言えば」是中性表达，可用于各种语境；「ときたら」专门表达负面情感"}], "quiz": [{"q": "うちの夫____、家事を全然手伝わない。", "opts": ["A.ときたら", "B.について", "C.に関して", "D.によると"], "ans": "A", "exp": "表达对丈夫不满的情感，应该用「ときたら」"}, {"q": "最近の若者____、マナーがなっていない。", "opts": ["A.といえば", "B.ときたら", "C.について", "D.に対して"], "ans": "B", "exp": "对年轻人表达批评和不满的情感，用「ときたら」最合适"}, {"q": "彼の仕事____、いつも中途半端だ。", "opts": ["A.について", "B.に関して", "C.ときたら", "D.によって"], "ans": "C", "exp": "对他工作态度的不满和批评，应该使用「ときたら」"}]}, "45": {"analysis": "「〜ところを」是N1级别的敬语表达，用于在对方正在进行某种状态时表示打扰、救助或感谢。这个文法带有强烈的敬意色彩，常用于商务场合和正式交流中。与普通的时间表达不同，它特别强调对对方当前状态的尊重和歉意。", "mistakes": "❌ 忙しいところをすみません → ✅ お忙しいところをすみません（缺少敬语前缀「お」）\n❌ 休んでいるところを起こしてしまった → ✅ お休みのところをお呼び立てしてしまった（敬语程度不够）\n❌ 疲れているところを手伝ってくれた → ✅ お疲れのところをお手伝いいただいた（应使用敬语表达）", "similar": [{"form": "〜ときに", "diff": "「ときに」是中性的时间表达，「ところを」带有敬意，用于特定的社交场合"}, {"form": "〜最中に", "diff": "「最中に」强调正在进行中的状态，「ところを」更侧重于对对方状态的敬意表达"}], "quiz": [{"q": "会議中の____、申し訳ございません。", "opts": ["A. とき", "B. ところを", "C. 間に", "D. 最中で"], "ans": "B", "exp": "在正式场合打扰对方开会时，应使用带有敬意的「ところを」"}, {"q": "お疲れの____、ご足労をおかけして恐縮です。", "opts": ["A. ところを", "B. ときに", "C. 間で", "D. 最中に"], "ans": "A", "exp": "表达对疲劳中的对方的歉意和感谢时使用「ところを」"}, {"q": "危険な____、助けていただき、ありがとうございました。", "opts": ["A. とき", "B. 間に", "C. ところを", "D. 最中に"], "ans": "C", "exp": "对在危险时刻得到救助表示感谢，使用敬语表达「ところを」"}]}, "46": {"analysis": "「〜ともあろう」表示对特定身份地位的人做出不符合其身份行为时的失望、批判或惊讶。强调说话者对该人物的期待落空，暗含「本来不应该这样的」的语气。常用于对权威人士、专业人士或地位较高者的批评。", "mistakes": "❌ 学生ともあろう人がそんなことをした → ✅ 先生ともあろう人がそんなことをした（需要有一定社会地位的人）\n❌ あなたともあろう人はそんな失敗をする → ✅ あなたともあろう人がそんな失敗をするとは（需要配合とは等感叹表现）", "similar": [{"form": "〜にしては", "diff": "にしては表示「作为~来说」的客观评价，ともあろう带有强烈的失望批判语气"}, {"form": "〜らしくない", "diff": "らしくない表示不符合特征，ともあろう专门用于批评有地位者的不当行为"}], "quiz": [{"q": "社長____人がそんな無責任な発言をするなんて。", "opts": ["A. ともあろう", "B. にしては", "C. らしく", "D. について"], "ans": "A", "exp": "对社长这样有地位的人做出不当行为表示失望批判，用ともあろう"}, {"q": "医者____あなたがタバコを吸うとは驚きました。", "opts": ["A. らしい", "B. ともあろう", "C. にしても", "D. として"], "ans": "B", "exp": "对医生这样的专业人士做出与职业不符行为表示惊讶，用ともあろう"}, {"q": "弁護士____人が法律を破るなんて信じられない。", "opts": ["A. について", "B. らしく", "C. ともあろう", "D. として"], "ans": "C", "exp": "对律师这样应该遵守法律的人违法表示不信与批判，用ともあろう"}]}, "47": {"analysis": "「～ともなく/ともなしに」表示无明确目的或意识的行为状态，强调动作的无意识性和自然性。此文法常用于描述心理状态下的自发行为，如「見るともなく」（无意识地看）、「聞くともなく」（无意识地听）等，体现了日语中对微妙心理状态的精确表达。", "mistakes": "❌ 目的を持って見るともなく観察した → ✅ 見るともなく外の景色に目をやった（不能与有意识的目的性行为搭配）❌ 彼は意識的に聞くともなく話を聞いた → ✅ 聞くともなく隣の会話が耳に入った（「意識的に」与此文法矛盾）", "similar": [{"form": "～つもりで", "diff": "「つもりで」表示有意识的打算，而「ともなく」强调无意识"}, {"form": "～ないでもない", "diff": "「ないでもない」表示可能性，「ともなく」表示无目的状态"}, {"form": "～ながら", "diff": "「ながら」表示同时进行，「ともなく」强调无意识的状态"}], "quiz": [{"q": "彼女は本を（____）ページをめくっていた。", "opts": ["A. 読むともなく", "B. 読むつもりで", "C. 読みながら", "D. 読むために"], "ans": "A", "exp": "无意识地翻书页，符合「ともなく」表达无目的行为的含义"}, {"q": "音楽を（____）作業を続けた。", "opts": ["A. 聞くために", "B. 聞くともなく", "C. 聞こうとして", "D. 聞くはずで"], "ans": "B", "exp": "无意识地听音乐的同时工作，「聞くともなく」表示非有意识的听"}, {"q": "窓の外を（____）時間が過ぎていった。", "opts": ["A. 眺めるために", "B. 眺めようとして", "C. 眺めるともなく", "D. 眺めるつもりで"], "ans": "C", "exp": "无目的地望向窗外，时间流逝，「眺めるともなく」符合无意识状态"}]}, "48": {"analysis": "「〜ともなると/ともなれば」表达在特定立场或状况下理所当然会产生的结果。重点在于强调身份地位的变化带来的必然影响，常用于描述社会角色、年龄阶段等变化的自然后果。与单纯的条件句不同，这个句型暗含「当然会这样」的语感。", "mistakes": "❌ 学生ともなると、勉强しなければならない。→ ✅ 大学生ともなると、自分で勉强しなければならない。（需要明确具体的身份地位变化）❌ 雨ともなると、傘が必要だ。→ ✅ 大雨ともなると、傘では防げない。（不能用于单纯的自然现象，需体现程度变化）", "similar": [{"form": "〜となると", "diff": "更口语化，不强调身份地位，可用于各种状况变化"}, {"form": "〜ようになると", "diff": "强调变化过程，「ともなると」强调变化后的状态"}, {"form": "〜からには", "diff": "强调既然如此就应该，「ともなると」强调自然结果"}], "quiz": [{"q": "父親____、家族のことを第一に考えなければならない。", "opts": ["A. ともなると", "B. となると", "C. ようになると", "D. からには"], "ans": "A", "exp": "「父親」是身份地位，用「ともなると」表示成为父亲后理所当然的责任"}, {"q": "彼も50歳____、体力の衰えを感じるようになった。", "opts": ["A. となると", "B. ともなれば", "C. になると", "D. からには"], "ans": "B", "exp": "年龄达到50岁这个阶段，用「ともなれば」表示到了这个年纪自然会有的变化"}, {"q": "国際会議の司会____、英語力だけでは不十分だ。", "opts": ["A. になると", "B. となると", "C. ともなると", "D. ようになると"], "ans": "C", "exp": "「国際会議の司会」是特定的重要职位，用「ともなると」强调担任这个职位必然需要的条件"}]}, "49": {"analysis": "この「ながら」は逆接の意味を持つ特殊な用法で、「本来の状態・期待と異なる結果」を表現する。「残念ながら」「不本意ながら」など決まった表現で使われることが多く、話者の心情や態度を含んだ上品な表現として用いられる。", "mistakes": "❌ 学生ながら、勉強しない → ✅ 学生でありながら、勉強しない（身分・立場には「でありながら」）\n❌ 忙しいながら、手伝う → ✅ 忙しいながらも、手伝う（形容詞には「も」を付けることが多い）", "similar": [{"form": "〜ものの", "diff": "「ながら」は固定表現が多く上品、「ものの」はより自由に使える"}, {"form": "〜にもかかわらず", "diff": "「ながら」は内在的な矛盾、「にもかかわらず」は外的な障害への対比"}], "quiz": [{"q": "（　　）ながら、お役に立てず申し訳ございません。", "opts": ["A. 微力", "B. 無力", "C. 力不足", "D. 非力"], "ans": "A", "exp": "「微力ながら」は謙遜表現の決まった形。自分の力の小ささを表現する。"}, {"q": "医者（　　）ながら、病気を治せなかった。", "opts": ["A. の", "B. で", "C. であり", "D. として"], "ans": "C", "exp": "職業・身分を表す名詞には「でありながら」の形を使う。"}, {"q": "（　　）ながらも、最後まで諦めなかった。", "opts": ["A. 困難", "B. 大変", "C. 苦しい", "D. つらい"], "ans": "A", "exp": "「困難ながらも」は名詞+ながら+もの形。形容詞の場合は「つらいながらも」となる。"}]}, "50": {"analysis": "「〜なくしては」是表示不可或缺条件的文语表现，相当于「〜がなければ」但语气更加郑重和强调。常用于表达某种要素对于达成目标或结果的绝对必要性，多出现在正式文章、演讲等场合。", "mistakes": "❌ 彼なくしては、この仕事は完成できない。→ ✅ 彼がいなくては、この仕事は完成できない。（「なくしては」不用于指人的存在，应该用「がいなくては」）", "similar": [{"form": "〜がなければ", "diff": "「なくしては」更正式庄重，多用于抽象概念；「がなければ」更口语化，适用范围更广"}, {"form": "〜抜きには", "diff": "「抜きには」更强调排除某要素就无法进行；「なくしては」更强调该要素的不可或缺性"}], "quiz": [{"q": "真の友情____、人生は寂しいものになる。", "opts": ["A. なくしては", "B. なしには", "C. ぬきには", "D. がなければ"], "ans": "A", "exp": "表达抽象概念「真の友情」的不可或缺性，用「なくしては」最恰当且正式"}, {"q": "努力と忍耐____、目標達成は困難だ。", "opts": ["A. ぬきでは", "B. なくしては", "C. なしでは", "D. をおいて"], "ans": "B", "exp": "「努力と忍耐」是达成目标不可缺少的条件，用「なくしては」强调其必要性"}, {"q": "国民の支持____、政治家は何もできない。", "opts": ["A. なくしては", "B. ぬきでは", "C. がなくては", "D. 以上のすべて"], "ans": "D", "exp": "三个选项在此语境下都可以使用，但「なくしては」最为正式庄重"}]}, "51": {"analysis": "「〜なくもない」是典型的双重否定表现，通过否定的否定来表达微弱的肯定意思。这种表达方式体现了日语中委婉、含蓄的语言特色，避免直接肯定表态。相比直接说「できる」，使用「できなくもない」显得更加谦逊和保守，常用于表示有条件的可能性或不太确定的判断。", "mistakes": "容易与单纯否定混淆：❌「時間がないから、行けなくもない」（时间不够所以也不是不能去）→ ✅「時間があれば、行けなくもない」（如果有时间的话，也不是不能去）。注意双重否定表示的是微弱肯定，需要配合适当的条件或语境。", "similar": [{"form": "〜ないでもない", "diff": "「なくもない」用于动词，表示行为的可能性；「ないでもない」用于形容词和名词，表示状态或性质的肯定"}, {"form": "〜ないこともない", "diff": "意思相同但「ないこともない」更正式，多用于书面语；「なくもない」更口语化"}], "quiz": [{"q": "彼の提案、賛成し____。", "opts": ["A.なくもない", "B.ないでもない", "C.なくてもない", "D.ないともない"], "ans": "A", "exp": "「賛成する」是动词，用「なくもない」表示也不是不赞成的微弱肯定"}, {"q": "その話、信じ____けど、証拠が欲しい。", "opts": ["A.ないでもない", "B.なくもない", "C.なくはない", "D.ないこともない"], "ans": "B", "exp": "「信じる」是动词，「なくもない」表示也不是不相信，但需要证据"}, {"q": "条件が揃えば、参加し____。", "opts": ["A.ないともない", "B.ないでもない", "C.なくもない", "D.なくはない"], "ans": "C", "exp": "「参加する」是动词，用「なくもない」表示条件具备的话也不是不参加"}]}, "52": {"analysis": "「〜なしに/なしで」是表示「没有某种条件或状态就进行某动作」的书面语表现。「なしに」比「なしで」更加正式，常用于法律条文、规章制度等场合。这个文法强调缺少必要条件的状态下进行某行为，带有不当或不可能的语感。", "mistakes": "❌ 許可をなしに入った → ✅ 許可なしに入った（名词直接接続）❌ 勉強することなしに → ✅ 勉強なしに（动词时用「動詞辞書形＋こと」形式）❌ 何もなしにで成功した → ✅ 何もなしに成功した（不要重复助词）", "similar": [{"form": "〜ずに", "diff": "口语表现，接动词；なしに是书面语，接名词"}, {"form": "〜ことなく", "diff": "更文雅的书面语，语感相近但更加郑重"}, {"form": "〜抜きで", "diff": "口语化，表示省略某事物；なしに更正式严肃"}], "quiz": [{"q": "事前の連絡____、突然訪問するのは失礼だ。", "opts": ["A.なしに", "B.なしで", "C.なくに", "D.なしと"], "ans": "A", "exp": "正式な文章なので「なしに」が適切。「なしで」も可能だが、よりフォーマル"}, {"q": "彼は努力____、成功を手に入れることはできない。", "opts": ["A.することなしに", "B.なしに", "C.をなしに", "D.がなしに"], "ans": "B", "exp": "名詞「努力」に直接「なしに」を接続。動詞の場合は「することなしに」となる"}, {"q": "____、この薬を服用してはいけません。", "opts": ["A.医師の指示なしに", "B.医師を指示なしに", "C.医師が指示なしに", "D.医師に指示なしに"], "ans": "A", "exp": "「医師の指示」という名詞句全体に「なしに」が接続する形が正しい"}]}, "53": {"analysis": "「〜ならでは」表示某事物独有的特征或只有特定对象才能实现的事情，强调独特性和不可替代性。与中文的「独有的」「特有的」相对应，但日语更强调这种独特性的珍贵价值。常用于赞美或强调某地、某人、某事物的独特魅力。", "mistakes": "❌ 彼ならではな考え方 → ✅ 彼ならではの考え方（他独有的思考方式）\n❌ このレストランならではで料理 → ✅ このレストランならではの料理（这家餐厅独有的料理）\n❌ 日本ならではに文化 → ✅ 日本ならではの文化（日本独有的文化）", "similar": [{"form": "〜だけの", "diff": "「だけの」仅表示限定，「ならでは」强调独特价值和不可替代性"}, {"form": "〜特有の", "diff": "「特有の」较客观描述特征，「ならでは」带有赞赏和珍视的感情色彩"}], "quiz": [{"q": "この町____美しい風景に感動した。", "opts": ["A. ならでは", "B. ならではの", "C. ならではな", "D. ならではに"], "ans": "B", "exp": "修饰名词「風景」需要用「ならではの」"}, {"q": "プロ____技術で問題を解決した。", "opts": ["A. ならでは", "B. ならではの", "C. ならではな", "D. だけの"], "ans": "B", "exp": "强调专业人士独有的高超技术，用「ならではの」"}, {"q": "彼女____アイデアで企画が成功した。", "opts": ["A. ならでは", "B. しかない", "C. ならではの", "D. だけの"], "ans": "C", "exp": "强调她独有的创意想法的价值，用「ならではの」"}]}, "54": {"analysis": "「〜ないまでも」表示让步和妥协，前项是理想状态但难以实现，后项是退而求其次的现实选择。这个语法体现了日语中委婉表达和渐进思维的特点，常用于表达「虽然达不到最高标准，但至少要做到某种程度」的语气。", "mistakes": "❌完璧とは言えないまでも、まあまあの出来だ。→ ✅完璧とは言わないまでも、まあまあの出来だ。（动词要用「言わない」而不是「言えない」）\n❌高いまでも、品質はいい。→ ✅高くないまでも、品質はいい。（形容词需要变成否定形「高くない」）", "similar": [{"form": "〜とまではいかないが/〜とまではいかなくても", "diff": "「〜ないまでも」更强调退让妥协，「〜とまではいかないが」更强调程度不足"}, {"form": "〜までして", "diff": "「〜ないまでも」表示不做某事但做其他，「〜までして」表示为了目的不惜做某事"}], "quiz": [{"q": "毎日____、せめて週末だけでも家族と過ごしたい。", "opts": ["A. とはいわないまでも", "B. とはいえないまでも", "C. というまでも", "D. とはならないまでも"], "ans": "A", "exp": "「〜とはいわないまでも」是「〜ないまでも」的常用表现形式，表示虽然不说每天，但至少..."}, {"q": "プロ____、人並み程度には歌えるようになりたい。", "opts": ["A. にならないまでも", "B. にはないまでも", "C. になれないまでも", "D. でないまでも"], "ans": "A", "exp": "「プロにならないまでも」表示虽然成不了专业人士，但至少要达到一般水平"}, {"q": "一番____、上位には入りたい。", "opts": ["A. でないまでも", "B. にないまでも", "C. になれないまでも", "D. とはないまでも"], "ans": "C", "exp": "「一番になれないまでも」表示虽然拿不了第一，但至少要进入前几名"}]}, "55": {"analysis": "「〜なり」表示前后两个动作紧密连续发生，强调时间间隔极短的直接性。与「〜とすぐに」不同，「なり」更强调动作的突然性和连贯性，常用于描述情感爆发或本能反应的场面。", "mistakes": "❌ 家に帰ったなり、すぐシャワーを浴びた。→ ✅ 家に帰るなり、シャワーを浴びた。（「なり」前通常用辞書形，不用た形表示连续动作）", "similar": [{"form": "〜や否や", "diff": "「や否や」更文语化，多用于书面语；「なり」更口语化，常用于日常会话"}, {"form": "〜とたんに", "diff": "「とたんに」后常接意外或突发事件；「なり」更强调动作的直接连续性"}], "quiz": [{"q": "彼は会社に着く____、会議室に向かった。", "opts": ["A. なり", "B. ので", "C. から", "D. ために"], "ans": "A", "exp": "表示到达公司后立刻去会议室，强调动作的连续性，用「なり」"}, {"q": "母は私の顔を見る____、心配そうに声をかけた。", "opts": ["A. ところ", "B. なり", "C. うちに", "D. まで"], "ans": "B", "exp": "看到脸后立刻担心地搭话，表示瞬间反应的连续动作"}, {"q": "試験が終わった____、学生たちは教室を出て行った。", "opts": ["A. なり", "B. とたんに", "C. あとで", "D. ながら"], "ans": "B", "exp": "这里用过去式「終わった」，应该用「とたんに」；「なり」通常接辞书形"}]}, "56": {"analysis": "「〜なりとも」是表示强烈希望的文法，强调即使是微小的量或时间也非常渴望得到。与单纯的「でも」相比，「なりとも」带有更强的情感色彩和迫切感，常用于表达在困难情况下的最低要求或期望。", "mistakes": "❌ 一円なりとも貸してください → ✅ 一円なりとも貸していただけませんか（过于直接，应用敬语）\n❌ 彼なりとも来てほしい → ✅ 一人なりとも来てほしい（需要数量词修饰）", "similar": [{"form": "〜でも", "diff": "「でも」是普通表达，「なりとも」更强调迫切性和情感"}, {"form": "〜だけでも", "diff": "「だけでも」表示退而求其次，「なりとも」更强调最低限度的渴望"}], "quiz": [{"q": "忙しくて時間がないが、十分____見たい映画がある。", "opts": ["A. なりとも", "B. だけでも", "C. でも", "D. といっても"], "ans": "A", "exp": "表示哪怕十分钟也想看，强调时间珍贵和强烈愿望"}, {"q": "災害で困っている人たちに、わずか____力になりたい。", "opts": ["A. でも", "B. なりとも", "C. だけは", "D. ばかり"], "ans": "B", "exp": "强调哪怕微小的力量也想贡献，体现强烈的助人愿望"}, {"q": "今日は一分____無駄にしたくない大切な日だ。", "opts": ["A. だけ", "B. でも", "C. なりとも", "D. ほど"], "ans": "C", "exp": "强调连一分钟都不想浪费，表达对时间的极度珍惜"}]}, "57": {"analysis": "「〜なり〜なり」是N1级别的选择表达文法，用于提示两个或多个选择项，带有「どちらでもいい」的含义。与「〜か〜か」相比，「なり」更加随意和口语化，常用于建议或指示场合。注意这个文法强调的是「任选其一」的态度，而非严格的二选一。", "mistakes": "❌ 本なり雑誌なりを読んでいる → ✅ 本なり雑誌なり読んでください（「なり」用于提示选择，不用于描述正在进行的动作）\n❌ 彼は医者なり教師なりです → ✅ 彼は医者なり教師なりになりたい（身份确定时不用「なり」，用于表达愿望或建议时才用）", "similar": [{"form": "〜か〜か", "diff": "「か」更正式客观，「なり」更随意主观，带有建议色彩"}, {"form": "〜でも〜でも", "diff": "「でも」语气更强，「なり」更温和，常用于具体建议"}, {"form": "〜にしろ〜にしろ", "diff": "「にしろ」带有让步意味，「なり」纯粹表示选择"}], "quiz": [{"q": "困ったときは、先生____先輩____、誰かに相談しなさい。", "opts": ["A. なり...なり", "B. か...か", "C. でも...でも", "D. にしろ...にしろ"], "ans": "A", "exp": "建议选择时用「なり...なり」最自然，表示「不管是老师还是前辈都可以」"}, {"q": "彼は映画____音楽____、芸術に興味がある。", "opts": ["A. なり...なり", "B. にしろ...にしろ", "C. か...か", "D. でも...でも"], "ans": "B", "exp": "描述客观事实时用「にしろ...にしろ」，表示「无论是...还是...都」"}, {"q": "急いでいるなら、タクシー____電車____、早い方法で行きなさい。", "opts": ["A. か...か", "B. でも...でも", "C. なり...なり", "D. にしろ...にしろ"], "ans": "C", "exp": "建议选择交通方式时，「なり...なり」表达「随便选哪个都行」的随意建议"}]}, "58": {"analysis": "「なりに/なりの」表示按照某种标准或以某种方式行动，强调虽然可能不完美，但在各自的条件下尽力而为。「なりに」修饰动词，「なりの」修饰名词，体现了说话人对努力程度的认可和理解。", "mistakes": "❌ 子供なりの一生懸命頑張った → ✅ 子供なりに一生懸命頑張った（修饰动词用なりに）\n❌ 彼は学生なりの考え方をしている → ✅ 彼は学生なりの考え方を持っている（なりの修饰名词「考え方」）", "similar": [{"form": "〜らしく/〜らしい", "diff": "らしく强调典型特征，なりに强调在各自条件下的努力"}, {"form": "〜にふさわしい", "diff": "ふさわしい表示适合匹配，なりに表示以某种方式尽力"}], "quiz": [{"q": "初心者（____）頑張ってみます。", "opts": ["A. なりに", "B. なりの", "C. として", "D. による"], "ans": "A", "exp": "修饰动词「頑張る」，应使用「なりに」"}, {"q": "彼には彼（____）事情があるだろう。", "opts": ["A. なりに", "B. なりの", "C. らしい", "D. みたいな"], "ans": "B", "exp": "修饰名词「事情」，应使用「なりの」"}, {"q": "子供たちは子供たち（____）考えて行動している。", "opts": ["A. なりの", "B. として", "C. なりに", "D. による"], "ans": "C", "exp": "修饰动词「考えて」和「行動している」，应使用「なりに」"}]}, "59": {"analysis": "「～にあって」は書面語的表現で、特殊な状況や立場を表す格式張った文法です。単なる場所や時間ではなく、困難・危機・重要な局面など、特別な意味を持つ状況に使用されます。「～において」より文語的で重厚感があり、正式な文書や演説などで用いられることが多いです。", "mistakes": "❌ 学校にあって勉強する → ✅ 学校で勉強する（単純な場所には使わない）\n❌ 昨日にあって会った → ✅ 昨日会った（時間には使わない）\n❌ 平常時にあっても → ✅ 非常時にあっても（特別な状況でないと不自然）", "similar": [{"form": "～において", "diff": "「にあって」は書面語でより格式的、特別な状況に限定。「において」は一般的で場所・時・場面全般に使用可能"}, {"form": "～の中で", "diff": "「にあって」は書面語で重厚、「の中で」は日常会話でも使える一般的表現"}], "quiz": [{"q": "危機的状況____、冷静な判断が求められる。", "opts": ["A. にあって", "B. において", "C. の中で", "D. にとって"], "ans": "A", "exp": "「危機的状況」という特別な状況なので、書面語的な「にあって」が最適"}, {"q": "戦時中____、多くの芸術家が困難に直面した。", "opts": ["A. の間", "B. にあって", "C. のとき", "D. には"], "ans": "B", "exp": "「戦時中」という特殊な状況・時代背景を表すため「にあって」が適切"}, {"q": "このような試練____も、彼の信念は揺らがなかった。", "opts": ["A. にあって", "B. において", "C. の中", "D. でも"], "ans": "A", "exp": "「試練」という困難な状況で「も」が付いているため、「にあっても」の形が自然"}]}, "60": {"analysis": "「に至る/に至るまで」表示从某个起点到终点的整个范围或过程，强调涵盖性和连续性。与中文的「到~为止/直到~」相比，日语更侧重表达范围的完整覆盖，常用于描述年龄段、地域范围、程度等的全面涉及。", "mistakes": "❌ 朝から夜に至るまで働いた（时间点用法错误）→ ✅ 朝から夜まで働いた / 新人からベテランに至るまで参加した（正确的范围表达）", "similar": [{"form": "〜から〜まで", "diff": "单纯表示起点到终点，「に至る」更正式，强调涵盖整个范围"}, {"form": "〜に至って", "diff": "表示「到了某种地步/程度」，强调结果而非范围"}, {"form": "〜に及ぶ", "diff": "表示「达到/涉及」，多用于影响范围，不如「に至る」正式"}], "quiz": [{"q": "老若男女問わず、子どもから老人____楽しめるイベントです。", "opts": ["A. に至って", "B. に至るまで", "C. に及んで", "D. について"], "ans": "B", "exp": "表示从儿童到老人整个年龄范围都能享受，用「に至るまで」"}, {"q": "この問題は個人の問題____、社会全体の問題になっている。", "opts": ["A. に至るまで", "B. に至らず", "C. に至って", "D. に至っては"], "ans": "B", "exp": "「に至らず」表示「还没到~的程度」，个人问题还没发展到社会问题的程度就已经成为社会问题了"}, {"q": "軽い風邪から重篤な病気____、様々な症状が報告されている。", "opts": ["A. に至って", "B. に至っては", "C. に至るまで", "D. に至らず"], "ans": "C", "exp": "从轻微感冒到严重疾病整个范围，表示涵盖各种程度的症状"}]}, "61": {"analysis": "「〜に言わせれば」表示引用某人的观点或立场，强调从特定人物的角度来看待问题。这个文法带有一定的主观色彩，常用于表达不同立场的意见。与「〜によれば」相比，「に言わせれば」更强调说话者的主观判断和个人色彩。", "mistakes": "❌ 専門家に言わせれば、この問題が簡単です。→ ✅ 専門家に言わせれば、この問題は簡単だ。（断定表现不用「です」）❌ 私たちに言わせれば → ✅ 私に言わせれば / 我々に言わせれば（人称表达要准确）", "similar": [{"form": "〜によれば", "diff": "「によれば」较客观地引用信息源，「に言わせれば」更主观，强调个人观点"}, {"form": "〜から言えば", "diff": "「から言えば」表示从某角度分析，「に言わせれば」特指某人的主观意见"}], "quiz": [{"q": "母____、息子はまだ子供だ。", "opts": ["A. に言わせれば", "B. によれば", "C. について", "D. に対して"], "ans": "A", "exp": "表示母亲的主观看法，用「に言わせれば」最合适"}, {"q": "医者____、この薬は効果がある。", "opts": ["A. に言わせると", "B. に言って", "C. を言えば", "D. が言うと"], "ans": "A", "exp": "「に言わせると」是「に言わせれば」的另一种表现形式"}, {"q": "彼____、今の政策は失敗だそうだ。", "opts": ["A. によると", "B. に言わせれば", "C. に言って", "D. から言うと"], "ans": "B", "exp": "表示某人的主观判断和意见，使用「に言わせれば」"}]}, "62": {"analysis": "「〜にかかわる」表示与某事物有重大关系或影响，语气比单纯的「関係する」更强烈，常用于描述涉及重要事项的情况。此文法强调影响的严重性和重要性，多用于正式文体中。", "mistakes": "易错点：容易与「〜に関する」混淆。❌「健康に関わる食事に気をつける」→ ✅「健康にかかわる食事に気をつける」（涉及健康的重要饮食）；❌「この件は私にかかわりません」→ ✅「この件は私には関係ありません」（一般关系用「関係」）", "similar": [{"form": "〜に関する", "diff": "「に関する」表示一般性关联，「にかかわる」强调重大影响或严重后果"}, {"form": "〜に関して", "diff": "「に関して」多用于话题引入，「にかかわる」强调事态的严重性"}], "quiz": [{"q": "国家の安全____問題として議論された。", "opts": ["A. にかかわる", "B. に関する", "C. について", "D. において"], "ans": "A", "exp": "涉及国家安全的重大问题，应用「にかかわる」表示严重影响"}, {"q": "この薬の副作用は生命____可能性がある。", "opts": ["A. に関する", "B. にかかわる", "C. について", "D. に対する"], "ans": "B", "exp": "药物副作用关系到生命安全，是重大影响，用「にかかわる」"}, {"q": "会社の存続____重要な決定を下さなければならない。", "opts": ["A. について", "B. に関して", "C. にかかわる", "D. における"], "ans": "C", "exp": "公司存续的重大决定，影响严重，应使用「にかかわる」"}]}, "63": {"analysis": "「〜にかたくない」是一个表示「不难推测/容易想象」的文语表达，多用于书面语。「かたくない」是「かたい」的否定形，这里的「かたい」意为「困难」，整体表达「不困难」之意。常与「想像」「推察」等词汇搭配使用。", "mistakes": "❌ その結果を予想することにかたくない → ✅ その結果を予想するにかたくない（动词后直接接「に」）❌ 彼の気持ちが理解にかたくない → ✅ 彼の気持ちを理解するのにかたくない（需要用动词形式）", "similar": [{"form": "〜ことは難しくない", "diff": "「〜にかたくない」更文语化、正式；「〜ことは難しくない」更口语化、直接"}, {"form": "〜やすい", "diff": "「〜にかたくない」强调推测容易；「〜やすい」强调动作本身容易进行"}], "quiz": [{"q": "彼女の怒りは____。", "opts": ["A. 理解することにかたくない", "B. 理解するにかたくない", "C. 理解にかたくない", "D. 理解するのかたくない"], "ans": "B", "exp": "动词辞书形后直接接「にかたくない」，不需要「こと」"}, {"q": "この状況では、彼が諦めるのも____。", "opts": ["A. 想像かたくない", "B. 想像することにかたくない", "C. 想像にかたくない", "D. 想像するかたくない"], "ans": "C", "exp": "名词「想像」后直接接「にかたくない」"}, {"q": "その結末は____。", "opts": ["A. 予想にかたくない", "B. 予想することかたくない", "C. 予想するにかたい", "D. 予想にかたい"], "ans": "A", "exp": "名词「予想」接「にかたくない」表示「不难预想」"}]}, "64": {"analysis": "「～にかまけて」表示过分专注于某事而忽略其他重要事项的状态。这个语法带有明显的批评色彩，暗示因为沉迷于某事导致应该做的事情被疏忽。常与「おろそかにする」等表示疏忽的词语搭配使用。", "mistakes": "❌ 仕事にかまけて、家族を大切にしている → ✅ 仕事にかまけて、家族をおろそかにしている（只顾工作，疏忽了家人）。注意此语法必须体现「顾此失彼」的负面结果。", "similar": [{"form": "～に夢中になって", "diff": "「夢中になって」仅表示专注投入，不含批评意味；「かまけて」则暗示因过度专注而产生的负面后果"}, {"form": "～ばかりで", "diff": "「ばかりで」强调只做某事的状态；「かまけて」更强调因此而造成的疏忽和不良影响"}], "quiz": [{"q": "彼は趣味____、本業をおろそかにしがちだ。", "opts": ["A. にかまけて", "B. に夢中で", "C. ばかりして", "D. について"], "ans": "A", "exp": "「趣味にかまけて本業をおろそかに」表示因沉迷爱好而疏忽本职工作，符合「かまけて」的用法"}, {"q": "最近、SNS____、読書の時間が全然ない。", "opts": ["A. について", "B. にかまけて", "C. に関して", "D. において"], "ans": "B", "exp": "因为沉迷社交媒体而没有时间读书，体现了「顾此失彼」的含义，应使用「にかまけて」"}, {"q": "子育て____、自分の健康管理を忘れていた。", "opts": ["A. に対して", "B. について", "C. にかまけて", "D. に関して"], "ans": "C", "exp": "因为忙于育儿而忽略了自己的健康管理，「にかまけて」恰当地表达了这种疏忽的状态"}]}, "65": {"analysis": "「～にして」表示同时具备两种性质或身份的高雅表现，常用于书面语。与「～であり～でもある」相比更加正式典雅。另一用法表示「直到某个时点才」，强调时机的重要性。", "mistakes": "❌ 彼は学生にして働いている → ✅ 彼は学生にして社長でもある（需要表示身份或性质的并存，不是动作）", "similar": [{"form": "～であり～でもある", "diff": "「にして」更正式典雅，多用于书面语；「であり～でもある」更口语化"}, {"form": "～ながら", "diff": "「ながら」可接动词表示逆接；「にして」主要接名词表示身份性质的并存"}], "quiz": [{"q": "彼女は女優____歌手としても活躍している。", "opts": ["A.にして", "B.ながら", "C.として", "D.であり"], "ans": "A", "exp": "表示同时具备女演员和歌手两种身份，用「にして」最恰当"}, {"q": "この問題は専門家____解決が困難だった。", "opts": ["A.として", "B.にして", "C.であり", "D.ながら"], "ans": "B", "exp": "「専門家にして」表示「连专家都觉得困难」，强调程度之深"}, {"q": "彼は教師____研究者でもある優秀な人材だ。", "opts": ["A.として", "B.ながら", "C.にして", "D.であり"], "ans": "C", "exp": "表示同时具备教师和研究者两种身份，「にして」用于正式文体"}]}, "66": {"analysis": "「〜に即して」表示严格按照某种基准、方针或实际情况来行动，强调完全符合、贴合实际。与「〜に従って」相比，「に即して」更强调与现实情况的密切贴合，常用于政策制定、计划实施等正式场合。", "mistakes": "❌ 彼の意見に即して決めましょう → ✅ 彼の意見に従って決めましょう（个人意见用「に従って」更自然）❌ 時代に即して考える → ✅ 時代に即した考え方をする（形容词修饰时用「に即した」）", "similar": [{"form": "〜に従って", "diff": "「に従って」更通用，可用于人的指示；「に即して」专指按实际情况、客观标准"}, {"form": "〜に基づいて", "diff": "「に基づいて」强调以某事为根据；「に即して」强调与实情的贴合度"}], "quiz": [{"q": "現在の状況（____）新しい計画を立てる必要がある。", "opts": ["A. に即して", "B. に従って", "C. について", "D. に対して"], "ans": "A", "exp": "按照现在的状况制定计划，强调贴合实际情况，用「に即して」"}, {"q": "時代の変化（____）教育方法も見直すべきだ。", "opts": ["A. に従った", "B. に即した", "C. に基づいた", "D. による"], "ans": "B", "exp": "修饰名词「教育方法」时用「に即した」，表示符合时代变化的教育方法"}, {"q": "地域の実情（____）政策を実施することが重要だ。", "opts": ["A. に従って", "B. について", "C. に即して", "D. に関して"], "ans": "C", "exp": "按照地域的实际情况实施政策，强调政策与实情的贴合，用「に即して」"}]}, "67": {"analysis": "「〜にたえない/にたえる」基于动词「耐える」的可能表现，否定形表示「无法忍受、不忍直视」，肯定形表示「值得、配得上」。需注意这是书面语表达，多用于正式场合，且肯定形「にたえる」使用频率远低于否定形。", "mistakes": "❌ 彼の態度は見るに耐えない → ✅ 彼の態度は見るにたえない（「に」与「たえない」连写）；❌ この映画は見るにたえないほどつまらない → ✅ この映画は見るにたえないほどひどい（程度副词搭配要恰当）", "similar": [{"form": "〜に値する", "diff": "「値する」更强调价值判断，「たえる」偏重承受能力；「値する」常用肯定，「たえる」否定形更常用"}, {"form": "〜きれない", "diff": "「きれない」表示能力不足无法完成，「たえない」表示心理上无法承受"}], "quiz": [{"q": "あまりにも残酷な場面で、____。", "opts": ["A. 見るにたえない", "B. 見るにたえる", "C. 見ることにたえない", "D. 見るのにたえない"], "ans": "A", "exp": "「残酷な場面」无法直视，用否定形「見るにたえない」，且是固定搭配"}, {"q": "彼女の演技は____素晴らしかった。", "opts": ["A. 見るにたえないほど", "B. 見るにたえるほど", "C. 鑑賞にたえるほど", "D. 感動にたえるほど"], "ans": "C", "exp": "「素晴らしい」是褒义，需用肯定形，且「鑑賞にたえる」是固定表达，表示值得欣赏"}, {"q": "この小説は何度読んでも____作品だ。", "opts": ["A. 読むにたえない", "B. 読むにたえる", "C. 再読にたえる", "D. 精読にたえない"], "ans": "C", "exp": "「何度読んでも」暗示好作品，用肯定形，「再読にたえる」表示值得反复阅读"}]}, "68": {"analysis": "「〜に足る/に足りない」是表示价值判断的古典文法，多用于书面语和正式场合。「足る」来源于古语「足りる」，表示充分、足够的意思，因此「〜に足る」表示「足以〜」「值得〜」的评价。此文法常与抽象概念搭配，体现说话者的客观判断。", "mistakes": "❌ 彼は尊敬に足ります → ✅ 彼は尊敬に足る人だ（不能活用变形）\n❌ この本は読むに足りないです → ✅ この本は読むに足りない（书面语不用丁寧語）\n❌ 注意するに足る → ✅ 注意に足する（某些动词需要名词形）", "similar": [{"form": "〜に値する", "diff": "「に値する」更常用于口语，「に足る」更正式古雅"}, {"form": "〜価値がある", "diff": "「価値がある」是现代表达，「に足る」带有古典文学色彩"}, {"form": "〜だけの価値がある", "diff": "意思相近但「に足る」表达更简洁有力"}], "quiz": [{"q": "彼の意見は検討____。", "opts": ["A. に足る", "B. に足ります", "C. に足りる", "D. に足した"], "ans": "A", "exp": "书面语用「に足る」，不进行活用变化，也不加丁寧語"}, {"q": "この問題は心配____ほどではない。", "opts": ["A. に足りない", "B. するに足る", "C. するに足りない", "D. に足らない"], "ans": "C", "exp": "「心配する」+「に足りない」，动词辞書形+に足りない的形式"}, {"q": "その提案は採用に____内容だった。", "opts": ["A. 足る", "B. 足りない", "C. 足りる", "D. 足らない"], "ans": "B", "exp": "「採用に足りない」表示不值得采用，「に足りない」是固定形式"}]}, "69": {"analysis": "「～につけ（ても）」表示「无论在什么方面/情况下都...」，强调某种倾向或状态在任何场合都一致。与「～にしても」不同，这个文法更侧重于「方面、角度」的概念，常用于描述人的性格特征或行为模式。", "mistakes": "❌ 仕事につけても勉強につけても頑張る → ✅ 仕事につけ勉強につけ頑張る（并列时省略ても）❌ 何につけて完璧主義だ → ✅ 何につけても完璧主義だ（需要ても形式）", "similar": [{"form": "～にしても", "diff": "にしても侧重假设对比，につけても侧重方面角度"}, {"form": "～を問わず", "diff": "を問わず更正式，につけても更口语化"}], "quiz": [{"q": "彼女は何____完璧を求める性格だ。", "opts": ["A. につけ", "B. につけても", "C. にしても", "D. を問わず"], "ans": "B", "exp": "「何につけても」是固定搭配，表示无论什么事情都..."}, {"q": "仕事____遊び____真剣に取り組む。", "opts": ["A. につけても・につけても", "B. につけ・につけ", "C. にしても・にしても", "D. を問わず・を問わず"], "ans": "B", "exp": "并列使用时通常省略ても，用「につけ・につけ」的形式"}, {"q": "あの人は何____文句を言う。", "opts": ["A. について", "B. に関して", "C. につけても", "D. にしても"], "ans": "C", "exp": "表示无论什么事情都要抱怨，用「何につけても」最合适"}]}, "70": {"analysis": "「～にひきかえ」是表示强烈对比的文法，强调两个事物之间鲜明的反差。与单纯的比较不同，这个文法带有明显的价值判断色彩，通常暗示后项不如前项。常用于正式文体中。", "mistakes": "易错点：误用为单纯比较。❌彼は背が高いにひきかえ、私は普通だ → ✅彼の真面目さにひきかえ、私はだらしない（他很认真，相比之下我很邋遢）", "similar": [{"form": "～に対して", "diff": "「に対して」是中性比较，「にひきかえ」带有价值判断，暗示优劣对比"}, {"form": "～に比べて", "diff": "「に比べて」是客观比较量的差异，「にひきかえ」是主观的质的对比"}], "quiz": [{"q": "父の几帳面さ____、息子はルーズで困っている。", "opts": ["A.にひきかえ", "B.に対して", "C.と比べて", "D.について"], "ans": "A", "exp": "表示父亲认真与儿子松散的强烈对比，带有价值判断色彩，用「にひきかえ」"}, {"q": "去年の不況____、今年は景気が回復している。", "opts": ["A.について", "B.にひきかえ", "C.に関して", "D.によって"], "ans": "B", "exp": "去年萧条与今年景气回复形成鲜明对比，用「にひきかえ」表示对照"}, {"q": "姉の社交的な性格____、私は人付き合いが苦手だ。", "opts": ["A.に比べて", "B.と違って", "C.にひきかえ", "D.に対して"], "ans": "C", "exp": "姐姐善于社交与我不善社交形成强烈反差，「にひきかえ」最适合表达这种对比"}]}, "71": {"analysis": "「〜にもほどがある」用于表达对过度行为的强烈批评和不满，强调某种状态或行为已经超出了合理的限度。该句型带有明显的感情色彩，通常用于批评、抱怨的场面。「ほど」在此表示程度、限度，整个句型相当于中文的「也太...了」「也有个限度」。", "mistakes": "❌ 遅刻するにもほどがある。→ ✅ 遅刻にもほどがある。（名词形式）❌ いい加減にもほどがある。→ ✅ いい加減にするにもほどがある。（动词时需要用て形）❌ 親切にもほどがある。→ ✅ 親切すぎるにもほどがある。（形容动词需要调整表达）", "similar": [{"form": "〜もいい加減にしろ", "diff": "更直接的命令语气，「にもほどがある」更多是感叹批评"}, {"form": "〜すぎる", "diff": "单纯表示过度，「にもほどがある」含有批评不满的语气"}, {"form": "〜もたいがいにしろ", "diff": "带有警告意味，「にもほどがある」更偏向于抱怨表达"}], "quiz": [{"q": "この暑さ____。もう我慢できない。", "opts": ["A. にもほどがある", "B. にもほどだ", "C. でもほどがある", "D. をほどがある"], "ans": "A", "exp": "「暑さ」是名词，后接「にもほどがある」表示对过度炎热的批评抱怨"}, {"q": "息子の____、注意しなければならない。", "opts": ["A. 怠けるにもほどがある", "B. 怠けてにもほどがある", "C. 怠けにもほどがある", "D. 怠ける事にもほどがある"], "ans": "C", "exp": "动词连接时需要变成名词形，「怠ける」→「怠け」，或使用「怠けることにもほどがある」"}, {"q": "彼の____、みんなが困っている。", "opts": ["A. わがまま言うにもほどがある", "B. わがままにもほどがある", "C. わがままを言ってにもほどがある", "D. わがまま過ぎるにもほどがある"], "ans": "B", "exp": "「わがまま」本身就是名词，可以直接接「にもほどがある」，表示任性过度的批评"}]}, "72": {"analysis": "「〜の至り」是表达感情极限状态的敬语表现，多用于道歉、感谢等正式场合。该文法强调感情达到顶点，常与「若気」「恐縮」「光栄」等词汇搭配，体现说话者的谦逊态度。", "mistakes": "易错点：不能用于日常会话。❌ 今日は忙しいの至りです → ✅ 今日はとても忙しいです。注意只能接表示感情、状态的抽象名词，不能接具体名词。", "similar": [{"form": "〜極まりない", "diff": "同样表示程度极高，但「極まりない」更强调客观状态，「の至り」更注重主观感情表达"}, {"form": "〜このうえない", "diff": "「このうえない」语气较温和，「の至り」更正式庄重，多用于书面语"}], "quiz": [{"q": "会議で失言してしまい、恥ずかしい（____）です。", "opts": ["A. の至り", "B. ところ", "C. ばかり", "D. きり"], "ans": "A", "exp": "表达极度羞愧的心情，用「の至り」最恰当"}, {"q": "このような賞をいただき、光栄（____）でございます。", "opts": ["A. なこと", "B. の至り", "C. すぎる", "D. きわまる"], "ans": "B", "exp": "在正式场合表达最高程度的荣幸之情，应使用「の至り」"}, {"q": "若気（____）とはいえ、取り返しのつかないことをしてしまった。", "opts": ["A. による", "B. として", "C. の至り", "D. に対して"], "ans": "C", "exp": "「若気の至り」是固定搭配，表示因年轻气盛而犯错"}]}, "73": {"analysis": "「〜のみならず」是N1级别的书面语表达，表示递进关系，相当于「〜だけでなく」的正式用法。该句型强调不仅限于前项，还包括更广范围的后项，常用于正式文章、演讲等场合。接续时动词、形容词用普通形，名词直接接续。", "mistakes": "易错点：❌彼は優秀のみならず、性格もいい → ✅彼は優秀であるのみならず、性格もいい（形容动词需要加「である」）；❌この問題は難しいのみならず、複雑だ → ✅この問題は難しいのみならず、複雑でもある（后项建议加「も」呼应）", "similar": [{"form": "〜ばかりか", "diff": "更强调意外性和程度加深，语气更强烈"}, {"form": "〜だけでなく", "diff": "日常口语表达，正式度较低"}, {"form": "〜に加えて", "diff": "单纯表示追加，无递进语气"}], "quiz": [{"q": "彼女は美しい____、知的でもある。", "opts": ["A.のみならず", "B.ばかりに", "C.だけで", "D.として"], "ans": "A", "exp": "表示递进关系「不仅美丽，而且聪明」，用「のみならず」最合适"}, {"q": "この製品は国内____海外でも人気がある。", "opts": ["A.だけに", "B.のみならず", "C.について", "D.に対して"], "ans": "B", "exp": "「不仅在国内，在海外也很受欢迎」，表示范围的扩大和递进"}, {"q": "彼は医者____、作家としても有名だ。", "opts": ["A.のみならず", "B.に関して", "C.によって", "D.に比べて"], "ans": "A", "exp": "「不仅是医生，作为作家也很有名」，表示身份的追加和递进关系"}]}, "74": {"analysis": "「〜はいざしらず」是N1高级语法，表示暂时搁置某事不谈，转而讨论另一方面的情况，常用于时间对比或条件对比。「いざしらず」来自古语「いざ知らず」，意为「不知道如何」，现代日语中作为固定搭配使用。此语法带有一定的文语色彩，多用于书面语或正式场合。", "mistakes": "❌ 学生はいざしらず、先生も来なかった → ✅ 学生はいざしらず、先生まで来なかった（应突出意外性或对比性）； ❌ 昔のことはいざしらず → ✅ 昔はいざしらず（直接用名词，不需要「のこと」）", "similar": [{"form": "〜はともかく", "diff": "更口语化，使用范围更广，没有文语色彩"}, {"form": "〜はさておき", "diff": "更强调「暂且不论」的意思，常用于正式文体"}, {"form": "〜はどうあれ", "diff": "表示「无论如何」，语气更强烈"}], "quiz": [{"q": "子供____大人なら分かるはずだ。", "opts": ["A.はいざしらず", "B.については", "C.に対して", "D.として"], "ans": "A", "exp": "表示「孩子先不说，大人应该明白」的对比关系"}, {"q": "平日____、休日くらいはゆっくりしたい。", "opts": ["A.について", "B.はいざしらず", "C.に関して", "D.において"], "ans": "B", "exp": "平日暂且不论，休日至少想要悠闲地度过"}, {"q": "昔____、今はそんなことはない。", "opts": ["A.はいざしらず", "B.については", "C.において", "D.に対して"], "ans": "A", "exp": "过去的情况先不说，现在没有那样的事情了"}]}, "75": {"analysis": "「〜はおろか」表示递进式否定，强调连程度较低的事物都无法实现，更别说程度更高的事物了。与「〜どころか」意思相近，但「はおろか」更多用于书面语，语气更正式。结构上强调从低级向高级的递进关系。", "mistakes": "❌ 日本語はおろか、英語が話せない。→ ✅ 英語はおろか、日本語も話せない。（应该是从高难度到低难度的顺序）❌ 走るはおろか、歩くこともできない。→ ✅ 走ることはおろか、歩くこともできない。（动词需要加「こと」名词化）", "similar": [{"form": "〜どころか", "diff": "「どころか」口语化，可用于肯定句；「はおろか」书面语，主要用于否定句"}, {"form": "〜ばかりか", "diff": "「ばかりか」表示追加，可用于肯定句；「はおろか」表示递进否定"}], "quiz": [{"q": "大学はおろか、高校____卒業していない。", "opts": ["A. を", "B. も", "C. が", "D. は"], "ans": "B", "exp": "「はおろか」的后项通常用「も」表示「连...都」的含义"}, {"q": "彼は泳ぐことはおろか、____こともできない。", "opts": ["A. 歩いて", "B. 歩く", "C. 歩くの", "D. 歩くこと"], "ans": "D", "exp": "与前项保持一致，都使用「〜こと」的名词形式"}, {"q": "以下哪个句子使用「はおろか」最恰当？", "opts": ["A. 中国語はおろか、日本語も上手だ", "B. 野菜はおろか、肉も食べられない", "C. 本はおろか、雑誌も読まない", "D. 電車はおろか、バスも来た"], "ans": "B", "exp": "「はおろか」主要用于否定句，表示递进式的否定含义"}]}, "76": {"analysis": "「べからず」是极为正式的古典文语表达，专用于法律条文、告示牌等庄重场合的禁止表现。与现代语「てはいけない」相比，语气更加严肃权威，具有不容违抗的强制性。", "mistakes": "易错点：动词活用混乱。❌「することべからず」→ ✅「すべからず」；时态理解错误。❌「入ったべからず」→ ✅「入るべからず」（只用辞书形）", "similar": [{"form": "〜てはならない", "diff": "べからず更古典正式，多用于条文告示；てはならない是现代标准禁止表现"}, {"form": "〜禁止", "diff": "禁止是直接的汉语词汇；べからず是和语的文语表达，更具传统权威感"}], "quiz": [{"q": "以下哪个是「べからず」的正确用法？____", "opts": ["A. ここで騒ぐべからず", "B. ここで騒いだべからず", "C. ここで騒ぐことべからず", "D. ここで騒がないべからず"], "ans": "A", "exp": "べからず接续动词辞书形，A正确。B是过去形错误，C多了「こと」，D是否定形错误"}, {"q": "「立入禁止」用「べからず」表达应该是____", "opts": ["A. 立ち入ったべからず", "B. 立ち入るなべからず", "C. 立ち入るべからず", "D. 立ち入りべからず"], "ans": "C", "exp": "「立ち入る」的辞书形+べからず=「立ち入るべからず」。其他选项活用形式都不正确"}, {"q": "下列场合最适合使用「べからず」的是____", "opts": ["A. 朋友间的日常对话", "B. 学校的校规条文", "C. 电视综艺节目", "D. 儿童绘本故事"], "ans": "B", "exp": "べからず是文语的正式表达，适用于法律条文、校规等正式文件，不适合日常对话或娱乐场合"}]}, "77": {"analysis": "「〜べく」是古典日语文法在现代的书面语形式，表示强烈的目的意图，语气比「〜ために」更加郑重正式。特别注意「する」变为「すべく」的特殊变化形式，这是固定用法不可改变。", "mistakes": "❌ 成功するべく頑張る → ✅ 成功すべく頑張る（する动词必须变为すべく）\n❌ 勝利をするべく練習する → ✅ 勝利すべく練習する（避免冗余的を格助词）", "similar": [{"form": "〜んがため（に）", "diff": "更古典，现代几乎不用，「べく」相对常见"}, {"form": "〜ために", "diff": "口语书面语都可用，「べく」仅限书面语且更郑重"}, {"form": "〜ようと（して）", "diff": "表意图努力，「べく」强调目的性更明确"}], "quiz": [{"q": "優勝（　　）、チーム一丸となって練習に励んでいる。", "opts": ["A. するべく", "B. すべく", "C. をするべく", "D. についてべく"], "ans": "B", "exp": "「する」は「すべく」に変化する特殊形。A、Cは誤った活用形"}, {"q": "世界平和を（　　）、多くの人々が活動している。", "opts": ["A. 実現べく", "B. 実現するべく", "C. 実現すべく", "D. 実現のべく"], "ans": "C", "exp": "「実現する」→「実現すべく」。「する」動詞は「すべく」に変化"}, {"q": "この問題を解決（　　）、専門家チームが結成された。", "opts": ["A. べく", "B. するべく", "C. すべく", "D. をすべく"], "ans": "C", "exp": "「解決する」→「解決すべく」。動詞の辞書形に直接接続するため「を」は不要"}]}, "78": {"analysis": "「まじき」是古典语法「まじ」的连体形，表示强烈的否定判断和道德谴责。多用于批评某种行为有悖身份、地位或道德标准，语调严厉正式。现代日语中主要出现在「あるまじき」这一固定表达中。", "mistakes": "❌ 学生としてするまじき行為 → ✅ 学生としてあるまじき行為（现代日语中主要用「あるまじき」的固定形式）", "similar": [{"form": "〜べきではない", "diff": "「まじき」更古典正式，带强烈谴责；「べきではない」现代常用，语调相对温和"}, {"form": "〜てはならない", "diff": "「まじき」强调道德批判；「てはならない」更多表示禁止规则"}], "quiz": [{"q": "教師として____行為に及んだ。", "opts": ["A. あるまじき", "B. するまじき", "C. いうまじき", "D. やるまじき"], "ans": "A", "exp": "「あるまじき」是现代日语中「まじき」的主要用法，表示有悖身份的行为"}, {"q": "次の文で「まじき」の意味として最も適切なのは？「親として____態度だ」", "opts": ["A. 禁止されている", "B. 有悖身份的", "C. 不可能な", "D. 嫌いな"], "ans": "B", "exp": "「まじき」表示有悖某种身份、地位应有的品格或行为标准"}, {"q": "「まじき」について正しい説明は？", "opts": ["A. 現代の話し言葉でよく使う", "B. 軽い注意を表す", "C. 古典語法で道德的批判を表す", "D. 未来の推測を表す"], "ans": "C", "exp": "「まじき」は古典語法由来で、道徳的な批判や強い否定判断を表す書面語"}]}, "79": {"analysis": "「〜までもない」表示某事不值得特意去做或没必要做到那种程度，常用于表达「理所当然」或「不必多此一举」的语气。「言うまでもなく」是最常见的固定搭配，意为「不用说/理所当然」，在句中起到强调后面内容的作用。", "mistakes": "❌ 説明までもないほど簡単だ → ✅ 説明するまでもないほど簡単だ（动词必须用辞书形）；❌ そんなことまでもない → ✅ そんなことをするまでもない（需要明确动作内容）", "similar": [{"form": "〜ほどのことはない", "diff": "意思相近但「までもない」更强调不必要性，而「ほどのことはない」更强调程度不够"}, {"form": "〜に及ばない", "diff": "「に及ばない」多用于正式场合表示不需要做某事，而「までもない」使用范围更广"}], "quiz": [{"q": "彼の実力は（　　）、誰もが認めている。", "opts": ["A. 言うまでもなく", "B. 言うまでもない", "C. 言うまでもなくて", "D. 言うまでもないで"], "ans": "A", "exp": "「言うまでもなく」是副词形式，修饰后面的句子内容"}, {"q": "そんな簡単な問題なら、私が（　　）。", "opts": ["A. 教えるまでもなく", "B. 教えるまでもない", "C. 教えまでもない", "D. 教えるまでもなくて"], "ans": "B", "exp": "句末用「までもない」，表示不值得特意去教这么简单的问题"}, {"q": "今更（　　）、もう手遅れだ。", "opts": ["A. 後悔までもなく", "B. 後悔するまでもなく", "C. 後悔するまでもない", "D. 後悔までもない"], "ans": "C", "exp": "表示现在后悔也没有意义了，用「するまでもない」的形式"}]}, "80": {"analysis": "「〜もさることながら」是N1级别的高级表现文法，用于强调前项已经很突出，但后项更值得关注。「さる」是「去る」的连体形，整体意思是「某事物姑且不论/固然如此」，带有「前面提到的当然重要，但更重要的是后面要说的」这种递进强调的语感。常用于正式文体中。", "mistakes": "❌ 彼の能力もさることながら、性格がいい。→ ✅ 彼の能力もさることながら、性格もいい。（后项需要用「も」呼应前项的强调）", "similar": [{"form": "〜はもとより", "diff": "「もとより」更正式，常用于书面语；「もさることながら」口语书面语都可用，语感更生动"}, {"form": "〜ばかりでなく", "diff": "「ばかりでなく」是普通的并列添加；「もさることながら」带有前项理所当然、后项更突出的强调语感"}], "quiz": [{"q": "彼女の美貌もさることながら、知性____魅力的だ。", "opts": ["A. が", "B. も", "C. は", "D. を"], "ans": "B", "exp": "「もさることながら」后项通常用「も」呼应，表示两者都很突出但后者更值得强调"}, {"q": "この料理は味もさることながら、見た目____美しい。", "opts": ["A. が", "B. を", "C. も", "D. に"], "ans": "C", "exp": "「もさることながら」的典型用法是前后都用「も」，形成呼应关系，强调两个方面都很出色"}, {"q": "値段もさることながら、品質____問題だ。", "opts": ["A. も", "B. が", "C. を", "D. は"], "ans": "A", "exp": "虽然价格也是问题，但品质更是问题。后项用「も」与前项的「も」呼应，强调两方面都有问题"}]}, "81": {"analysis": "「〜もの」作为终助词表示理由或辩解，带有撒娇、任性的语气，主要用于女性和儿童的口语中。与理由的「〜から」不同，「〜もの」更强调情感色彩和主观性，常用于为自己的行为或想法进行辩护。口语中经常缩略为「〜もん」。", "mistakes": "❌ 明日会社に行かないものだから、今日準備する → ✅ 明日会社に行かないから、今日準備する（正式场合不用もの）❌ 疲れているもの、早く寝よう → ✅ 疲れているもん、早く寝よう（应该用もん或省略）", "similar": [{"form": "〜から", "diff": "から表客观理由，もの表主观辩解，带撒娇语气"}, {"form": "〜んだもん", "diff": "んだもん更强调理由的正当性，语气更强烈"}], "quiz": [{"q": "子：お母さん、なぜ泣いているの？母：嬉しい____、合格したのよ。", "opts": ["A. もの", "B. から", "C. ので", "D. もん"], "ans": "A", "exp": "母亲对孩子说话，表达感情理由，用「もの」合适"}, {"q": "今日は映画を見に行かない____、お金がないの。", "opts": ["A. から", "B. もの", "C. ので", "D. だって"], "ans": "B", "exp": "女性撒娇式的理由说明，用「もの」表示辩解"}, {"q": "会議で部長が「忙しいもんですから」と言った。この使い方は____。", "opts": ["A. 正しい", "B. 不自然", "C. 丁寧すぎる", "D. 普通"], "ans": "B", "exp": "正式商务场合男性使用「もん」不自然，应该用「ので」等"}]}, "82": {"analysis": "「〜や否や」是表示两个动作几乎同时发生的高级书面语表现，强调前一动作刚完成，后一动作立即发生。与口语的「〜とすぐに」不同，「や否や」更具文学色彩，常用于正式文章、小说等书面语中，给人以动作连贯、节奏紧凑的印象。", "mistakes": "❌ 家に帰ったや否や、電話が鳴った。→ ✅ 家に帰るや否や、電話が鳴った。（必须用动词辞书形，不能用过去形）\n❌ 静かになるや否や → ✅ 静かになったとたん（い形容词变化不接「や否や」）", "similar": [{"form": "〜とたん（に）", "diff": "「とたん」可接过去形，语气稍温和；「や否や」只接辞书形，更文语化"}, {"form": "〜なり", "diff": "「なり」也是书面语，但更强调后续动作的突然性；「や否や」强调时间的紧密性"}], "quiz": [{"q": "彼は部屋に入る____、大声で叫んだ。", "opts": ["A. や否や", "B. や否やで", "C. や否やに", "D. や否やと"], "ans": "A", "exp": "「や否や」是固定表现，后面不需要添加助词"}, {"q": "授業が____や否や、学生たちは教室から飛び出した。", "opts": ["A. 終わった", "B. 終わる", "C. 終わって", "D. 終わり"], "ans": "B", "exp": "「や否や」前必须接动词辞书形，不能接过去形或其他变化形"}, {"q": "次の文で最も自然なのはどれか。", "opts": ["A. 静かや否や、眠ってしまった", "B. 目を覚ますや否や、仕事を始めた", "C. 美しいや否や、見とれた", "D. 元気や否や、走り出した"], "ans": "B", "exp": "「や否や」は動詞の辞書形にのみ接続するため、「目を覚ます」が正しい。形容詞には接続しない"}]}, "83": {"analysis": "「〜ゆえ（に）」是表示原因理由的书面语表达，比「〜から」更加正式庄重。多用于文学作品、正式文件或演讲中，带有深刻反思的语感。常与抽象概念搭配，如「無知ゆえに」「愛ゆえに」等。", "mistakes": "❌ 忙しいゆえに来れません → ✅ 忙しいので来れません（日常会话不用ゆえに）\n❌ 病気だったゆえに休んだ → ✅ 病気だったので休んだ（过去事实用ので更自然）\n❌ 雨ゆえに中止です → ✅ 雨のため中止です（具体原因用ため较好）", "similar": [{"form": "〜ため（に）", "diff": "ためは客観的理由、ゆえは主観的感慨が強い"}, {"form": "〜によって", "diff": "によっ orm": "〜でさえ", "diff": "口语化，「をして」更书面正式，且常用于使役句型"}, {"form": "〜すら", "diff": "「すら」更文语化，「をして」多与特定动词搭配"}, {"form": "〜さえ", "diff": "「をして」专用于人，且语感更庄重正式"}], "quiz": [{"q": "ベテランの医師（____）首をかしげるほど珍しい症例だった。", "opts": ["A. をして", "B. にして", "C. として", "D. でして"], "ans": "A", "exp": "表示连经验丰富的医生都感到困惑，用「をして」强调程度之深"}, {"q": "この作品は批評家（____）絶賛させるほどの出来栄えだ。", "opts": ["A. でさえ", "B. をして", "C. にして", "D. として"], "ans": "B", "exp": "「をして」与使役动词「させる」搭配，表示连批评家都赞不绝口"}, {"q": "専門家（____）理解できないほど複雑な理論だった。", "opts": ["A. をして", "B. にして", "C. として", "D. でして"], "ans": "A", "exp": "强调连专家都无法理解，「をして」用于极端举例"}]}, "89": {"analysis": "「〜をものともせず」表达了无视困难、障碍或不利条件的强烈意志。这是一个文学色彩较浓的表达方式，强调主体不畏艰难、勇往直前的精神状态。接续时要注意动词后面可以加「に」形成「〜をものともせずに」。", "mistakes": "❌ 雨が降るをものともせず出かけた。 → ✅ 雨をものともせず出かけた。（不能接续动词句，只能接续名词）\n❌ 危険なことをものともせず → ✅ 危険をものともせず（要用名词形式）", "similar": [{"form": "〜にもかかわらず", "diff": "「にもかかわらず」表示客观的对比转折，「をものともせず」强调主观的无视态度"}, {"form": "〜を恐れず", "diff": "「を恐れず」仅表示不害怕，「をものともせず」含有轻视、无视的强烈态度"}], "quiz": [{"q": "彼は病気____、仕事を続けた。", "opts": ["A. をものともせず", "B. にもかかわらず", "C. を恐れず", "D. AとB両方正しい"], "ans": "D", "exp": "病気という困難を無視して働き続けたという意味で「をものともせず」、病気という事実があるにもかかわらずという意味で「にもかかわらず」、両方とも文法的に正しい"}, {"q": "登山家は悪天候____頂上を目指した。", "opts": ["A. をものともしないで", "B. をものともせずに", "C. をものともしなくて", "D. をものとしないで"], "ans": "B", "exp": "正しい形は「をものともせず（に）」で、「せず」の否定形を使う。「しない」「しなくて」「としない」は不正確"}, {"q": "次の文で正しいものはどれか。", "opts": ["A. 批判されることをものともせず発言した", "B. 批判をものともせず発言した", "C. 批判的な意見をものともせず発言した", "D. BとC両方正しい"], "ans": "D", "exp": "「批判」「批判的な意見」のように名詞で接続するのが正しい。「批判されること」は動詞句なので不適切"}]}, "90": {"analysis": "「〜を余儀なくされる」表示由于外部环境或不可抗力因素，被迫做出某种决定或行动，强调被动性和无奈性。与「〜せざるを得ない」相比，更强调外部压力的强制性，常用于正式场合描述不得已的情况。", "mistakes": "❌ 彼は病気で会社を余儀なくされた → ✅ 彼は病気で会社を休むことを余儀なくされた（必须加「こと」使动词名词化）", "similar": [{"form": "〜せざるを得ない", "diff": "主观上的不得不；余儀なくされる强调外力强制的被动"}, {"form": "〜ざるを得ない", "diff": "书面语，主观判断；余儀なくされる更强调客观环境的强制"}], "quiz": [{"q": "経済危機により、会社は人員____を余儀なくされた。", "opts": ["A. 削減", "B. 削減を", "C. 削減の", "D. 削減に"], "ans": "A", "exp": "「人員削減を余儀なくされる」，名词直接接续，不需要助词"}, {"q": "台風の接近で、____を余
