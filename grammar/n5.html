<script>
const N5_BACK = {"1": {"analysis": "「は」是日语中最重要的助词之一，用于提示句子的主题。注意发音读作「wa」而非「ha」。与格助词「が」不同，「は」强调的是对主题的说明或描述，常用于介绍、说明某事物的性质或状态。", "mistakes": "易错点：❌ 私が学生は。→ ✅ 私は学生です。（主题助词は不能与格助词が同时使用）；❌ これわ本です。→ ✅ これは本です。（は读作wa但写作は）", "similar": [{"form": "〜が", "diff": "「が」表示主语，强调动作的执行者；「は」表示主题，强调要说明的对象"}, {"form": "〜も", "diff": "「も」表示「也」的意思，可以替换「は」表示追加信息"}], "quiz": [{"q": "私（　　）田中です。", "opts": ["A. が", "B. は", "C. を", "D. に"], "ans": "B", "exp": "自我介绍时用「は」提示主题，说明自己是田中"}, {"q": "あれ（　　）車です。", "opts": ["A. が", "B. を", "C. は", "D. で"], "ans": "C", "exp": "指出远处的东西是什么时，用「は」提示主题进行说明"}, {"q": "今日（　　）日曜日です。", "opts": ["A. に", "B. は", "C. が", "D. を"], "ans": "B", "exp": "说明今天是什么日子时，用「は」提示时间主题"}]}, "2": {"analysis": "「〜が」是日语中最基本的格助词，主要用于标记句子的主语。与中文不同，日语必须用格助词明确标示语法成分的关系。「が」还可以标记某些动词的对象，如「日本語が分かります」中标记理解的对象。", "mistakes": "易错点：❌ 私は日本語が好きです → ✅ 私は日本語が好きです（正确，但要注意「は」标记话题，「が」标记对象的区别）；❌ 雨降っています → ✅ 雨が降っています（缺少主语标记）", "similar": [{"form": "〜は", "diff": "「は」标记话题，「が」标记主语；「は」用于已知信息，「が」用于新信息或强调"}, {"form": "〜を", "diff": "「を」标记动作的直接对象，「が」标记主语或某些动词的对象"}], "quiz": [{"q": "誰____来ましたか。", "opts": ["A. は", "B. が", "C. を", "D. に"], "ans": "B", "exp": "疑问词「誰」后面用「が」标记主语，询问新信息"}, {"q": "私____中国語____分かりません。", "opts": ["A. は・を", "B. が・が", "C. は・が", "D. を・は"], "ans": "C", "exp": "「私は」标记话题，「中国語が」标记理解动词「分かる」的对象"}, {"q": "今日____天気____いいですね。", "opts": ["A. は・を", "B. が・が", "C. は・が", "D. の・は"], "ans": "C", "exp": "「今日は」标记时间话题，「天気が」标记形容词「いい」的主语"}]}, "3": {"analysis": "「を」是日语最基本的格助词，表示动作的直接对象，相当于中文的宾语标记。与中文不同，日语通过助词明确标示语法关系，使语序更加灵活。", "mistakes": "易错点：混淆を和は的用法。❌ 水は飲みます（强调水这个话题） → ✅ 水を飲みます（表示喝水这个动作的对象）", "similar": [{"form": "〜は", "diff": "は表示主题，を表示动作对象。水は好きです（喜欢水）vs 水を飲みます（喝水）"}, {"form": "〜が", "diff": "が表示主语，を表示宾语。私が水を飲みます（我喝水）"}], "quiz": [{"q": "コーヒー____飲みます。", "opts": ["A.を", "B.は", "C.が", "D.に"], "ans": "A", "exp": "「コーヒーを飲みます」表示喝咖啡，コーヒー是動詞「飲む」的直接対象，用を"}, {"q": "毎日新聞____読みます。", "opts": ["A.は", "B.を", "C.が", "D.で"], "ans": "B", "exp": "「新聞を読みます」表示看报纸，新聞是動詞「読む」的直接対象，用を"}, {"q": "映画____見ました。", "opts": ["A.に", "B.で", "C.を", "D.は"], "ans": "C", "exp": "「映画を見ました」表示看了电影，映画是動詞「見る」的直接対象，用を"}]}, "4": {"analysis": "「に」是日语中最基础且用途最广的助词之一，主要表示时间点、地点、方向和目的。与中文不同，日语必须明确标记这些语法关系，「に」就是这个标记。需要注意的是，「に」表示的是具体的时间点（如7時）而非时间段。", "mistakes": "时间表达易错：❌ 今日に行きます → ✅ 今日行きます（今日不用に）；❌ 3時間に勉強します → ✅ 3時間勉強します（时间长度不用に）；地点易错：❌ 日本に住んでいます → ✅ 日本に住んでいます（正确，但要区分に和で的用法）", "similar": [{"form": "で", "diff": "に表地点时是静态存在，で表动作发生场所"}, {"form": "へ", "diff": "に强调到达目标，へ强调方向移动"}, {"form": "の", "diff": "に表时间点，の表时间的修饰关系"}], "quiz": [{"q": "毎日8時____学校に行きます。", "opts": ["A. に", "B. で", "C. を", "D. は"], "ans": "A", "exp": "8時是具体时间点，用に表示"}, {"q": "図書館____本を読みます。", "opts": ["A. に", "B. で", "C. を", "D. が"], "ans": "B", "exp": "图书馆是读书这个动作的场所，用で"}, {"q": "友達____プレゼントをあげます。", "opts": ["A. を", "B. が", "C. に", "D. で"], "ans": "C", "exp": "朋友是给予的对象（目标），用に表示"}]}, "5": {"analysis": "「で」是N5最重要的格助词之一，表示动作发生的场所、使用的手段工具以及原因理由。与「に」的场所用法不同，「で」强调动作进行的范围或背景，而「に」表示移动的目的地或存在的具体位置。", "mistakes": "❌ 学校に勉強します → ✅ 学校で勉強します（动作进行场所用で）\n❌ バスに行きます → ✅ バスで行きます（交通手段用で）\n❌ 病気に休みます → ✅ 病気で休みます（原因理由用で）", "similar": [{"form": "〜に", "diff": "に表示目的地或存在位置，で表示动作进行的场所范围"}, {"form": "〜を", "diff": "を表示移动通过的场所，で表示动作发生的场所"}], "quiz": [{"q": "私は毎日コンビニ____アルバイトをしています。", "opts": ["A.で", "B.に", "C.を", "D.が"], "ans": "A", "exp": "アルバイトをする场所用で表示"}, {"q": "友達と電話____話しました。", "opts": ["A.に", "B.を", "C.で", "D.が"], "ans": "C", "exp": "电话是交流的手段，用で表示"}, {"q": "雨____試合が中止になりました。", "opts": ["A.を", "B.で", "C.に", "D.は"], "ans": "B", "exp": "雨是试合中止的原因，用で表示"}]}, "6": {"analysis": "「へ」是表示移动方向和目的地的基本助词，读作「え」。与「に」相比，「へ」更强调移动的方向性，常用于「行く・来る・帰る」等移动动词。注意「へ」只能接在表示场所的名词后面。", "mistakes": "❌ 家へいます → ✅ 家にいます（存在用に不用へ）\n❌ 友達へ会います → ✅ 友達に会います（对象用に不用へ）\n❌ 図書館への勉強します → ✅ 図書館で勉強します（动作场所用で）", "similar": [{"form": "〜に", "diff": "に表示到达点，へ表示方向；存在、时间只能用に"}, {"form": "〜で", "diff": "で表示动作进行的场所，へ表示移动的目的地"}], "quiz": [{"q": "明日、東京（____）行きます。", "opts": ["A. へ", "B. で", "C. を", "D. が"], "ans": "A", "exp": "表示移动的目的地用「へ」"}, {"q": "毎日学校（____）勉強します。", "opts": ["A. へ", "B. に", "C. で", "D. と"], "ans": "C", "exp": "表示动作进行的场所用「で」，不用「へ」"}, {"q": "友達は日本（____）帰りました。", "opts": ["A. を", "B. へ", "C. が", "D. は"], "ans": "B", "exp": "「帰る」表示移动，目的地用「へ」"}]}, "7": {"analysis": "「と」是N5最基础的助词之一，主要有三大用法：共同动作的对象标记、并列连接和引用标记。作为共同动作标记时，表示「一起做某事的对象」；作为并列助词连接同类名词；作为引用助词引出直接引语，常与「言う・思う・聞く」等动词搭配。", "mistakes": "易错点：❌ 私は友だちと一緒に映画を見ます → ✅ 私は友だちと映画を見ます（と本身含有「一緒に」意思，不需重复）；❌ 田中さんは「元気です」と言いました → ✅ 田中さんは「元気です」と言いました（引用句要加引号）", "similar": [{"form": "〜や", "diff": "「と」表示完全列举，「や」表示部分列举举例"}, {"form": "〜に", "diff": "「と」强调共同参与，「に」表示单方面动作的对象"}], "quiz": [{"q": "私は毎日母____電話で話します。", "opts": ["A. と", "B. に", "C. で", "D. を"], "ans": "A", "exp": "表示共同动作的对象，「母と話す」意为「和母亲说话」"}, {"q": "先生は「明日は休みです」____言いました。", "opts": ["A. を", "B. と", "C. に", "D. で"], "ans": "B", "exp": "引用助词，「〜と言う」表示「说〜」，引用直接话语"}, {"q": "りんご____みかんを買いました。", "opts": ["A. や", "B. と", "C. に", "D. で"], "ans": "B", "exp": "并列助词，「りんごとみかん」表示完全列举这两样水果"}]}, "8": {"analysis": "「〜や〜」是N5级别表示不完全列举的助词，用于列举多个事物中的部分代表性例子，暗示还有其他同类事物未提及。与中文的「和」不同，「や」强调列举的不完整性，常与「など」搭配使用加强这种语感。", "mistakes": "❌ 私は犬や猫を飼っています。（想表达只养狗和猫）→ ✅ 私は犬と猫を飼っています。（确实只养这两种）/ ✅ 私は犬や猫などを飼っています。（还可能养其他宠物）", "similar": [{"form": "〜と〜", "diff": "「と」表示完全列举，把所有项目都说完；「や」表示不完全列举，只是举例"}, {"form": "〜とか〜とか", "diff": "「とか」更口语化，表示随意列举；「や」更书面化，表示有选择性的列举"}], "quiz": [{"q": "コンビニで（____）を買いました。", "opts": ["A. パンやお茶など", "B. パンとお茶など", "C. パンやお茶だけ", "D. パンお茶など"], "ans": "A", "exp": "「や」用于不完全列举，与「など」搭配表示还买了其他东西"}, {"q": "教室に学生（____）先生がいます。", "opts": ["A. や", "B. と", "C. も", "D. を"], "ans": "B", "exp": "这里是完全列举教室里的人，用「と」连接所有成员"}, {"q": "果物屋でりんご（____）買い物をしました。", "opts": ["A. やみかんなどを", "B. とみかんなどを", "C. やみかんなどが", "D. やみかんなどに"], "ans": "A", "exp": "不完全列举用「や」，作为购买的对象用「を」标记"}]}, "9": {"analysis": "「ね」和「よ」是日语中最基础的终助词，体现了日语重视交流中的情感表达特点。「ね」表示寻求对方同意或确认，营造共鸣氛围；「よ」则表达说话者的强调或向对方传达新信息，体现断定语气。", "mistakes": "易错点：语气强弱混淆。❌ このケーキ、おいしいよ！（对已知情况用よ） → ✅ このケーキ、おいしいね！（寻求共鸣用ね）。❌ 明日雨が降るね。（对新信息用ね） → ✅ 明日雨が降るよ。（告知新信息用よ）", "similar": [{"form": "〜でしょう", "diff": "でしょう更正式，ね更亲近随意"}, {"form": "〜だ", "diff": "だ是断定，よ是强调断定给对方听"}], "quiz": [{"q": "A：今日は暑いです____。B：そうですね。", "opts": ["A.ね", "B.よ", "C.か", "D.の"], "ans": "A", "exp": "寻求对方同感，用ね表示确认"}, {"q": "電車が来ました____。急ぎましょう。", "opts": ["A.ね", "B.よ", "C.な", "D.を"], "ans": "B", "exp": "告知新情况并强调，用よ表示断定"}, {"q": "この映画、面白かった____。", "opts": ["A.よ", "B.ね", "C.は", "D.を"], "ans": "B", "exp": "对共同体验寻求共鸣，用ね确认对方感受"}]}, "12": {"analysis": "「〜ません」是动词ます形的礼貌否定形式，通过将ます形的「ます」替换为「ません」构成。这是日语中最基础且最常用的礼貌否定表达方式，广泛用于日常对话和正式场合中表达否定意思。", "mistakes": "❌ 私は学生じゃません → ✅ 私は学生ではありません（形容动词/名词用ではありません）; ❌ 今日は寒いません → ✅ 今日は寒くありません（い形容词用くありません）; ❌ 行きますません → ✅ 行きません（不要重复ます）", "similar": [{"form": "〜ないです", "diff": "ません更正式礼貌，ないです更口语化随意"}, {"form": "〜ではありません", "diff": "用于名词和な形容词的否定，ません用于动词否定"}], "quiz": [{"q": "毎朝コーヒーを____。", "opts": ["A. 飲みません", "B. 飲まません", "C. 飲みないです", "D. 飲むません"], "ans": "A", "exp": "动词「飲む」的ます形是「飲みます」，否定形是「飲みません」"}, {"q": "田中さんは今日____。", "opts": ["A. 来るません", "B. 来ません", "C. 来ないません", "D. 来ますません"], "ans": "B", "exp": "动词「来る」的ます形是「来ます」，否定形是「来ません」"}, {"q": "私は肉を____。", "opts": ["A. 食べません", "B. 食べないません", "C. 食べるません", "D. 食べますません"], "ans": "A", "exp": "动词「食べる」的ます形是「食べます」，否定形是「食べません」"}]}, "15": {"analysis": "〜ませんでした是动词丁寧语的过去否定形式，表示过去没有进行某个动作，语气礼貌正式。它是ます形去掉ます后加上ませんでした构成，相当于普通形的なかった的敬语表达。", "mistakes": "时间搭配错误：❌ 明日、映画を見ませんでした → ✅ 昨日、映画を見ませんでした（过去否定不能用将来时间词）；动词形式错误：❌ 食べるませんでした → ✅ 食べませんでした（要用ます形去掉ます）", "similar": [{"form": "〜ません", "diff": "現在否定 vs 過去否定の違い"}, {"form": "〜なかった", "diff": "普通形過去否定 vs 丁寧語過去否定"}], "quiz": [{"q": "昨日、宿題を____。", "opts": ["A. しませんでした", "B. しません", "C. しなかった", "D. します"], "ans": "A", "exp": "過去の否定で丁寧語なので「しませんでした」が正解"}, {"q": "先週、友達に____。", "opts": ["A. 会いません", "B. 会いませんでした", "C. 会わない", "D. 会います"], "ans": "B", "exp": "「先週」は過去を表すので過去否定の「会いませんでした」"}, {"q": "昨日の夜、テレビを____。", "opts": ["A. 見ます", "B. 見ません", "C. 見ませんでした", "D. 見ない"], "ans": "C", "exp": "「昨日の夜」過去時間なので丁寧な過去否定「見ませんでした」"}]}, "16": {"analysis": "「〜ではありません」是「だ/である」的丁寧语否定形式，用于正式场合的否定表达。与「〜ではない」意思相同，但更加礼貌。注意「では」可以缩略为「じゃ」，变成「〜じゃありません」，但正式程度略低。", "mistakes": "容易与「〜でありません」混淆。❌彼は学生でありません → ✅彼は学生ではありません。还要注意不能用于い形容词：❌高いではありません → ✅高くありません", "similar": [{"form": "〜じゃありません", "diff": "「では」的缩略形，稍微不正式，口语中常用"}, {"form": "〜ではない", "diff": "普通形否定，不如「ではありません」礼貌"}], "quiz": [{"q": "田中さんは先生____。", "opts": ["A. ではありません", "B. でありません", "C. じゃないです", "D. ではないです"], "ans": "A", "exp": "丁寧な否定は「ではありません」が最も適切"}, {"q": "この本は____。", "opts": ["A. おもしろいではありません", "B. おもしろくありません", "C. おもしろいじゃありません", "D. おもしろくではありません"], "ans": "B", "exp": "い形容詞の否定は「〜くありません」"}, {"q": "ここは図書館____。", "opts": ["A. ではありません", "B. くありません", "C. でありません", "D. ないです"], "ans": "A", "exp": "名詞の丁寧な否定形は「ではありません」"}]}, "17": {"analysis": "「〜てください」是N5最重要的敬语表达之一，用于礼貌地请求对方做某事。相比直接的命令形，它体现了日语重视礼貌和上下级关系的文化特点。动词必须先变成て形再加ください，这个变形规则是初学者的重点难点。", "mistakes": "易错点：动词て形变形错误。❌ 食べってください → ✅ 食べてください；❌ 来ってください → ✅ 来てください；❌ してくれ → ✅ してください（敬语程度不够）", "similar": [{"form": "〜てくれる/くれませんか", "diff": "てください是直接请求，てくれませんか更加委婉客气"}, {"form": "〜なさい", "diff": "なさい多用于上级对下级或父母对孩子，てください更礼貌"}], "quiz": [{"q": "「手伝う」を使って丁寧に頼む時：手伝（____）ください。", "opts": ["A. い", "B. って", "C. え", "D. おう"], "ans": "B", "exp": "「手伝う」のて形は「手伝って」。う動詞なので「って」になる"}, {"q": "最も丁寧な依頼表現はどれですか？", "opts": ["A. 来て", "B. 来い", "C. 来てください", "D. 来る"], "ans": "C", "exp": "「来てください」が最も丁寧な依頼表現。AとBは命令調、Dは依頼ではない"}, {"q": "「読む」を使った依頼文：この本を（____）。", "opts": ["A. 読んでください", "B. 読めてください", "C. 読むでください", "D. 読みでください"], "ans": "A", "exp": "「読む」のて形は「読んで」。む動詞なので「んで」になり「読んでください」が正しい"}]}, "18": {"analysis": "〜ている是日语最重要的基础文法之一，表示动作的进行、状态的持续或结果的存续。与中文的「正在～」「一直～」对应，但覆盖面更广。需要掌握动词て形的变化规则，这是使用该文法的前提。", "mistakes": "易错点：❌ 今、音楽を聞いてです → ✅ 今、音楽を聞いています（助动词いる必须变位）；❌ 毎日テレビを見ています → ✅ 毎日テレビを見ます（习惯性动作用现在时）", "similar": [{"form": "〜ます", "diff": "〜ますは現在・未来・習慣，〜ているは進行・継続・状態"}, {"form": "〜た", "diff": "〜たは完了，〜ているは結果の状態が続く"}], "quiz": [{"q": "父は新聞を（　　）。", "opts": ["A.読みます", "B.読んでいます", "C.読みました", "D.読んでした"], "ans": "B", "exp": "「今、父が新聞を読んでいる」という進行中の動作を表すので「読んでいます」が正解"}, {"q": "田中さんは結婚（　　）。", "opts": ["A.します", "B.しました", "C.しています", "D.していました"], "ans": "C", "exp": "結婚という状態が現在も続いていることを表すので「しています」が正解"}, {"q": "雨が（　　）から、傘を持って行きます。", "opts": ["A.降ります", "B.降っています", "C.降りました", "D.降っていました"], "ans": "B", "exp": "現在雨が降り続いている状態を表すので「降っています」が正解"}]}, "19": {"analysis": "〜たい是表示说话人主观愿望的文法，只能用于第一人称的愿望表达。它将动词转换为い形容词性质，可以进行否定、过去等变化。需要注意的是，〜たい不能直接用来询问或描述他人的愿望。", "mistakes": "易错点：❌ あなたは何を食べたいですか。→ ✅ あなたは何を食べたいんですか。/ 何が食べたいですか。（询问他人愿望时需要用んです或が助词）", "similar": [{"form": "〜たがる", "diff": "たがる用于描述第三人称的愿望，たい只能表达说话人自己的愿望"}, {"form": "〜てほしい", "diff": "てほしい表示希望他人做某事，たい表示自己想做某事"}], "quiz": [{"q": "私は新しい車を____です。", "opts": ["A.買いたい", "B.買いたがる", "C.買ってほしい", "D.買いたかった"], "ans": "A", "exp": "表示说话人自己的愿望用たい，买车是现在的愿望所以用たい"}, {"q": "弟は毎日ゲームを____います。", "opts": ["A.したい", "B.したがって", "C.してほしい", "D.したかった"], "ans": "B", "exp": "描述第三人称（弟弟）的愿望要用たがる，且要用て形+います表示持续状态"}, {"q": "昨日は映画を____でした。", "opts": ["A.見たい", "B.見たかった", "C.見たがった", "D.見てほしかった"], "ans": "B", "exp": "表示过去的愿望用たかった，昨日表示过去时间"}]}, "20": {"analysis": "「〜に行く/来る」表示移动的目的，是N5阶段最重要的目的表现之一。动词ます形去掉ます后接に，强调「为了做某事而去/来」。与中文「去/来做~」完全对应，理解相对简单。", "mistakes": "❌ 食べるに行く → ✅ 食べに行く（不能用辞书形）\n❌ 勉強しに行く → ✅ 勉強に行く（する动词特殊变化）\n❌ 買い物に行きます → ✅ 買い物をしに行く（名词需要加をし）", "similar": [{"form": "〜ために行く/来る", "diff": "ために更正式，に更口语化，意思基本相同"}, {"form": "〜をしに行く/来る", "diff": "名词+をしに，动词直接+に"}], "quiz": [{"q": "映画を（____）行きませんか。", "opts": ["A. 見るに", "B. 見に", "C. 見てに", "D. 見りに"], "ans": "B", "exp": "动词ます形（見ます）去掉ます变成見に"}, {"q": "友達が遊び（____）来ました。", "opts": ["A. に", "B. を", "C. で", "D. と"], "ans": "A", "exp": "遊びます→遊び，表示目的用に"}, {"q": "コンビニに何を（____）行きますか。", "opts": ["A. 買うに", "B. 買いに", "C. 買ってに", "D. 買いで"], "ans": "B", "exp": "買います→買い，目的表现用に行く"}]}, "23": {"analysis": "「〜なければなりません」表示客观的义务或必要性，是N5中最重要的义务表达。它由动词否定形去掉「ない」加「なければなりません」构成，语气比较正式。与中文「必须」对应，强调不做就不行的客观要求。", "mistakes": "易错点：动词变形错误。❌ 行くなければなりません → ✅ 行かなければなりません；❌ するなければなりません → ✅ しなければなりません；❌ 来るなければなりません → ✅ 来なければなりません", "similar": [{"form": "〜なくてはいけません", "diff": "意思相同，但「なければなりません」更正式，多用于书面语；「なくてはいけません」更口语化"}, {"form": "〜ないといけません", "diff": "意思相同，但「ないといけません」是最口语的表达方式，日常会话中常用"}], "quiz": [{"q": "明日早く____。", "opts": ["A. 起きなければなりません", "B. 起きるなければなりません", "C. 起きないなければなりません", "D. 起きなければありません"], "ans": "A", "exp": "「起きる」的ない形是「起きない」，去掉「ない」加「なければなりません」"}, {"q": "宿題を____。", "opts": ["A. するなければなりません", "B. しなければなりません", "C. したなければなりません", "D. してなければなりません"], "ans": "B", "exp": "「する」的ない形是「しない」，去掉「ない」加「なければなりません」"}, {"q": "図書館で静かに____。", "opts": ["A. してなければなりません", "B. するなければなりません", "C. しなければなりません", "D. していなければなりません"], "ans": "C", "exp": "这里省略了动词，完整句子是「静かにしなければなりません」，表示「必须保持安静」"}]}, "24": {"analysis": "「〜ことができます」是表示能力或可能性的重要句型，相当于中文的「能～/会～」。它将动词的辞书形转换为名词性表达，强调具备某种技能或在某种条件下能够完成某个动作。这个句型比动词可能形更正式，常用于书面语和礼貌表达中。", "mistakes": "❌ 日本語を話せることができます → ✅ 日本語を話すことができます（不能同时使用可能形和ことができます）\n❌ 泳ぐのことができます → ✅ 泳ぐことができます（动词辞书形直接接ことができます，不用の）\n❌ 漢字を書くことできます → ✅ 漢字を書くことができます（不能省略が）", "similar": [{"form": "動詞可能形", "diff": "話せます更简洁口语化，話すことができます更正式书面化"}, {"form": "〜ことができません", "diff": "否定形，表示不能做某事"}], "quiz": [{"q": "私は中国料理を____。", "opts": ["A. 作ることができます", "B. 作れることができます", "C. 作るのことができます", "D. 作ることできます"], "ans": "A", "exp": "动词辞书形＋ことができます，B项重复使用可能表现，C项多了の，D项缺少が"}, {"q": "田中さんは英語を____ことができません。", "opts": ["A. 読める", "B. 読む", "C. 読んだ", "D. 読み"], "ans": "B", "exp": "ことができます前必须用动词辞书形，A项是可能形不能用，C项是过去形，D项是动词连用形"}, {"q": "子供の時、自転車に____ことができませんでした。", "opts": ["A. 乗れる", "B. 乗った", "C. 乗る", "D. 乗り"], "ans": "C", "exp": "表示过去不能做某事用ことができませんでした，前接动词辞书形乗る"}]}, "26": {"analysis": "な形容詞是日语形容词的两大类型之一，词干固定，通过词尾变化表达不同时态和肯否定。与い形容詞不同，な形容詞修饰名词时需要加「な」，作谓语时用「だ/である」。", "mistakes": "❌ 彼女はきれいだな人です → ✅ 彼女はきれいな人です（修饰名词用な，不用だ）\n❌ この部屋は静かいです → ✅ この部屋は静かです（な形容词不能直接加い）", "similar": [{"form": "い形容詞", "diff": "い形容词词尾可直接变化（高い→高くない），な形容词需要借助だ/である系统变化"}, {"form": "名詞＋だ", "diff": "名词加だ表判断，な形容词加だ表性质状态描述"}], "quiz": [{"q": "この映画は____おもしろかったです。", "opts": ["A. とても", "B. とてもな", "C. とてもだ", "D. とてもに"], "ans": "A", "exp": "副词とても直接修饰な形容词，不需要加助词"}, {"q": "田中さんは____人です。", "opts": ["A. 親切", "B. 親切だ", "C. 親切な", "D. 親切に"], "ans": "C", "exp": "な形容词修饰名词时必须加な"}, {"q": "昨日の天気は____。", "opts": ["A. よくなかった", "B. よくない", "C. よかった", "D. よくありませんでした"], "ans": "D", "exp": "いい的な形容词形式是よい，过去否定形是よくありませんでした"}]}, "27": {"analysis": "〜くて/で是形容词的连接形，用于连接两个或多个形容词来描述同一事物的多个特征。い形容词去掉い加くて，な形容词直接加で。这个文法强调并列关系，前后形容词地位平等。", "mistakes": "❌ この本は安くて、きれいで → ✅ この本は安くて、きれいです（句尾需要完整谓语） / ❌ 彼はハンサムくて → ✅ 彼はハンサムで（な形容词用で）", "similar": [{"form": "〜し、〜し", "diff": "し更强调理由列举，くて/で单纯表示并列特征"}, {"form": "〜て、〜", "diff": "动词连接用て，形容词连接用くて/で"}], "quiz": [{"q": "この部屋は広____、明るいです。", "opts": ["A. いて", "B. くて", "C. で", "D. って"], "ans": "B", "exp": "広い是い形容词，连接时去い加くて"}, {"q": "田中さんは親切____、やさしいです。", "opts": ["A. くて", "B. いて", "C. で", "D. だて"], "ans": "C", "exp": "親切是な形容词，连接时直接加で"}, {"q": "この料理は美味し____、安いです。", "opts": ["A. で", "B. いて", "C. だて", "D. くて"], "ans": "D", "exp": "美味しい是い形容词，去い加くて变成連接形"}]}, "28": {"analysis": "「AよりBの方が～」是表示比较的基本句型，强调B比A更具有某种性质。「より」表示比较基准，「の方が」突出被比较对象，整体结构体现了日语比较表达的完整性和逻辑性。", "mistakes": "❌ 電車の方がバスより便利です → ✅ 電車よりバスの方が便利です（比较基准「より」必须在前，被强调对象「の方が」在后）", "similar": [{"form": "AはBより～", "diff": "「AはBより～」较简洁，「AよりBの方が～」更强调对比效果"}, {"form": "AよりもBの方が～", "diff": "加「も」使比较语气更强烈，意思相同"}], "quiz": [{"q": "コーヒー____紅茶の方が好きです。", "opts": ["A. が", "B. を", "C. より", "D. で"], "ans": "C", "exp": "比较句型中，比较基准后用「より」"}, {"q": "今日は昨日____暖かいです。", "opts": ["A. より", "B. よりの方が", "C. の方がより", "D. がより"], "ans": "A", "exp": "简单比较可省略「の方が」，直接用「昨日より」"}, {"q": "映画____本____面白いと思います。", "opts": ["A. が、より", "B. より、の方が", "C. の方が、より", "D. を、が"], "ans": "B", "exp": "完整比较句型：「映画より本の方が面白い」"}]}, "29": {"analysis": "「〜の中で一番」是表示最高级的重要句型，用于在特定范围内进行比较。「の中で」表示比较的范围，「一番」表示第一、最高程度。这个句型强调在某个群体或范围内某事物具有最高的程度或地位。", "mistakes": "❌ 友達の中で田中さんは一番高いです → ✅ 友達の中で田中さんが一番高いです（注意助词「が」的使用）; ❌ 季節中で春が一番好きです → ✅ 季節の中で春が一番好きです（「の中で」不能省略「の」）", "similar": [{"form": "〜より〜", "diff": "「より」用于两者比较，「の中で一番」用于三者以上的最高级比较"}, {"form": "〜で一番〜", "diff": "「で」表示场所范围，「の中で」表示事物范围，如「学校で一番」vs「学生の中で一番」"}], "quiz": [{"q": "果物（____）りんごが一番好きです。", "opts": ["A. で", "B. の中で", "C. より", "D. から"], "ans": "B", "exp": "表示在果物这个范围内进行最高级比较，用「の中で一番」"}, {"q": "この三つ（____）どれが一番安いですか。", "opts": ["A. の中で", "B. で", "C. に", "D. を"], "ans": "A", "exp": "在三个物品中进行最高级比较，使用「の中で一番」"}, {"q": "家族の中で妹（____）一番背が高いです。", "opts": ["A. は", "B. を", "C. が", "D. に"], "ans": "C", "exp": "在最高级句型中，比较的主体用助词「が」标示"}]}, "30": {"analysis": "「から」是N5最重要的理由表达文法，表示「因为～所以～」的因果关系。与中文不同，日语的「から」必须放在理由句末尾，后面接结果句。可接普通形和丁寧形，使用频率极高。", "mistakes": "常见错误：❌雨が降るから、傘を持ちましょうから → ✅雨が降るから、傘を持ちましょう（后句不能再加から）；❌からお腹が空いた、何か食べたい → ✅お腹が空いたから、何か食べたい（から不能放句首）", "similar": [{"form": "ので", "diff": "ので更客观礼貌，から较主观直接"}, {"form": "ため", "diff": "ため更书面正式，から口语化"}], "quiz": [{"q": "明日は雨だ____、ピクニックはやめます。", "opts": ["A.から", "B.ので", "C.ため", "D.けれど"], "ans": "A", "exp": "表示理由，「から」最适合，意为「因为明天下雨，所以取消野餐」"}, {"q": "____お金がないから、映画を見に行けません。", "opts": ["A.ので", "B.だから", "C.×（不填）", "D.ため"], "ans": "C", "exp": "「から」不能放在句首，理由句直接以「お金がないから」开始即可"}, {"q": "時間がありません____、急いでください。", "opts": ["A.ので", "B.から", "C.けれど", "D.AとB両方可"], "ans": "D", "exp": "「から」和「ので」都可表示理由，但「ので」更礼貌客观"}]}, "31": {"analysis": "「が」和「けど」都表示逆接关系，相当于中文的「但是」「虽然」。「が」较正式，常用于书面语和正式场合；「けど」较随意，多用于口语。两者都连接前后相反或对比的内容，前句通常是预期或一般情况，后句是实际结果或转折。", "mistakes": "❌ 日本語は難しいから、楽しいです → ✅ 日本語は難しいが、楽しいです（逆接用が，不用から）；❌ 雨が降っているが、出かけません → ✅ 雨が降っているから、出かけません（因果关系用から，不用が）", "similar": [{"form": "〜から（因果）", "diff": "から表原因理由，が/けど表转折对比"}, {"form": "〜ので（因果）", "diff": "ので表客观原因，が/けど表主观转折"}], "quiz": [{"q": "この本は高い____、とても面白いです。", "opts": ["A.から", "B.が", "C.ので", "D.と"], "ans": "B", "exp": "前后是转折关系（贵但有趣），用が表示逆接"}, {"q": "今日は忙しい____、映画を見に行きます。", "opts": ["A.けど", "B.から", "C.ので", "D.て"], "ans": "A", "exp": "虽然忙但还是要去看电影，表转折用けど"}, {"q": "日本語の勉強は大変____、頑張っています。", "opts": ["A.ので", "B.から", "C.ですが", "D.たら"], "ans": "C", "exp": "学习虽然辛苦但在努力，正式表达用ですが"}]}, "32": {"analysis": "て形表示继起和因果关系，是N5最重要的语法之一。继起用法表示动作的先后顺序，前一个动作完成后进行后一个动作；因果用法表示前句是后句的原因或理由。动词变て形、い形容词变くて、な形容词和名词变で。", "mistakes": "时间顺序混乱：❌昨日映画を見て、宿題をしました → ✅昨日宿題をして、映画を見ました（应按实际顺序）；て形误用：❌雨が降ってから、傘を持ちました → ✅雨が降って、濡れました（因果关系不用から）", "similar": [{"form": "〜てから", "diff": "てから强调前一动作完全结束后才进行后一动作，て形可以是同时或紧接着"}, {"form": "〜ので", "diff": "ので专门表示原因理由，て形的因果用法较自然随意"}], "quiz": [{"q": "朝ご飯を____、学校へ行きました。", "opts": ["A. 食べて", "B. 食べてから", "C. 食べで", "D. 食べた"], "ans": "A", "exp": "动词て形表示顺序，「食べる」的て形是「食べて」"}, {"q": "今日は暑____、エアコンをつけました。", "opts": ["A. いて", "B. くて", "C. で", "D. から"], "ans": "B", "exp": "い形容词「暑い」变て形时去い加くて，表示因为热所以开空调"}, {"q": "友だちに会____、映画を見ました。", "opts": ["A. って", "B. いて", "C. て", "D. で"], "ans": "A", "exp": "「会う」的て形是「会って」，う变音动词う→って"}]}, "33": {"analysis": "「〜ので」是N5重要文法，表示客观原因理由，比「から」更正式礼貌。接续时动词形容词用普通形，名词和な形容词需加「な」，语气委婉不突兀。常用于向上级说明理由或书面语中。", "mistakes": "易错点：名词接续时忘记加「な」。❌雨ので、出かけません → ✅雨なので、出かけません。形容词词尾变化错误：❌忙しいですので → ✅忙しいので。", "similar": [{"form": "〜から", "diff": "から更主观直接，ので更客观礼貌正式"}, {"form": "〜て", "diff": "て表示单纯连接动作，ので专门表示因果关系"}], "quiz": [{"q": "雨が降って____、傘を持って行きます。", "opts": ["A. いるので", "B. いたので", "C. いますので", "D. いくので"], "ans": "A", "exp": "「雨が降っている」的普通形是「降っている」，所以用「いるので」"}, {"q": "今日は日曜日____、銀行は休みです。", "opts": ["A. ので", "B. だので", "C. なので", "D. であるので"], "ans": "C", "exp": "名词接续「ので」时需要加「な」，所以是「日曜日なので」"}, {"q": "この本は面白く____、友達にも勧めました。", "opts": ["A. ないので", "B. ないから", "C. なので", "D. ありませんので"], "ans": "C", "exp": "い形容词「面白い」的普通形+ので，所以是「面白いので」变成「面白く」+「なので」"}]}, "34": {"analysis": "「〜と」表示自然发生的条件，强调客观规律或必然结果。与中文「一~就~」相似，但更强调条件成立时结果的自然性和客观性。常用于描述自然现象、习惯性行为等。", "mistakes": "❌ 明日雨が降ると、出かけません → ✅ 明日雨が降ったら、出かけません（未来假定用たら）❌ このボタンを押すと、押してください → ✅ このボタンを押してください（命令句不用と）", "similar": [{"form": "〜たら", "diff": "と表示自然条件，たら可表示假定条件；と不能用于命令・意志・依赖表现"}, {"form": "〜ば", "diff": "と强调客观必然性，ば可表示主观假定；と的条件更加客观自然"}], "quiz": [{"q": "夏に____、暑くなります。", "opts": ["A. なると", "B. なったら", "C. なれば", "D. なるなら"], "ans": "A", "exp": "表示季节变化的自然条件，用と最自然"}, {"q": "この薬を____、眠くなります。", "opts": ["A. 飲むと", "B. 飲んだと", "C. 飲むから", "D. 飲むので"], "ans": "A", "exp": "表示服药后的自然反应，用飲む+と"}, {"q": "電気を消す____、暗くなります。", "opts": ["A. ので", "B. から", "C. と", "D. たら"], "ans": "C", "exp": "关电灯就变暗是客观必然的结果，用と表示自然条件"}]}, "35": {"analysis": "「がある/いる」是表示存在的基本文法，ある用于无生命物体，いる用于有生命的人和动物。这是日语中最基础但也最重要的存在表现，与中文的「有」概念相同但使用规则更严格。", "mistakes": "易错点：生命体区分不当。❌ 犬があります → ✅ 犬がいます（狗是动物用いる）；❌ 友達があります → ✅ 友達がいます（朋友是人用いる）；❌ 花がいます → ✅ 花があります（花是植物用ある）", "similar": [{"form": "〜にある/いる", "diff": "强调位置「どこにありますか」，がある/いる单纯表存在"}, {"form": "〜を持っています", "diff": "表示拥有「本を持っています」，がある/いる表示客观存在"}], "quiz": [{"q": "教室に学生が____。", "opts": ["A. あります", "B. います", "C. できます", "D. します"], "ans": "B", "exp": "学生是人，有生命体用います"}, {"q": "冷蔵庫にビールが____。", "opts": ["A. います", "B. きます", "C. あります", "D. なります"], "ans": "C", "exp": "ビール（啤酒）是物品，无生命体用あります"}, {"q": "公園に猫が____。", "opts": ["A. あります", "B. できます", "C. します", "D. います"], "ans": "D", "exp": "猫（猫）是动物，有生命体用います"}]}, "10": {"analysis": "「です」是日语中最基础的敬语断定助动词，相当于「だ」的敬语形式。它用于对听话人表示礼貌，是日常会话和正式场合的必备表达。「です」不仅表达断定意义，更重要的是体现说话人对听话人的尊重态度。", "mistakes": "易错点：❌ これは本だです。→ ✅ これは本です。（「だ」和「です」不能同时使用）；❌ 元気ですか？はい、元気だです。→ ✅ 元気ですか？はい、元気です。（回答时也要保持敬语一致性）", "similar": [{"form": "である", "diff": "「である」是书面语的断定表达，比「です」更正式，多用于论文、报告等书面文体"}, {"form": "だ", "diff": "「だ」是普通体的断定助动词，用于非敬语场合，朋友间或独白时使用"}], "quiz": [{"q": "私は学生____。", "opts": ["A.だです", "B.です", "C.である", "D.だ"], "ans": "B", "exp": "对听话人要使用敬语形式「です」，「だ」是普通体，「だです」是错误表达"}, {"q": "これは____ペンですか。", "opts": ["A.だ", "B.である", "C.○（什么都不填）", "D.です"], "ans": "C", "exp": "疑问句中，名词后直接接「ですか」，不需要添加其他助动词"}, {"q": "田中さんは先生____。", "opts": ["A.だ", "B.です", "C.である", "D.だです"], "ans": "B", "exp": "谈论他人时也要使用敬语「です」来体现礼貌，这是日语敬语的基本原则"}]}, "11": {"analysis": "〜ます是日语中最基础的丁宁语（敬语）形式，用于表示对听者的尊重和礼貌。它是动词的礼貌形，适用于正式场合、对长辈、初次见面等情况。与动词原形相比，ます形显得更加客气和正式。", "mistakes": "❌ 私は学校に行くです → ✅ 私は学校に行きます（动词原形不能直接加です）\n❌ 毎日テレビを見るます → ✅ 毎日テレビを見ます（る动词去る加ます）\n❌ 友達と話しますた → ✅ 友達と話しました（过去式是ました不是ますた）", "similar": [{"form": "〜である/だ", "diff": "ます是动词丁宁形，である/だ是断定助动词，ます更礼貌"}, {"form": "〜ています", "diff": "ています表示进行或状态，ます表示一般现在或习惯性动作"}, {"form": "〜でしょう", "diff": "でしょう表示推测，ます表示确定的礼貌陈述"}], "quiz": [{"q": "毎日学校に____。", "opts": ["A.行くます", "B.行きます", "C.行くです", "D.行きだ"], "ans": "B", "exp": "く动词去く加きます，行く→行きます"}, {"q": "私は本を____。", "opts": ["A.読むます", "B.読みます", "C.読むです", "D.読みだ"], "ans": "B", "exp": "む动词去む加みます，読む→読みます"}, {"q": "田中さんは____帰りました。", "opts": ["A.もう", "B.まだ", "C.これから", "D.今から"], "ans": "A", "exp": "もう表示已经，与过去式ました搭配表示已经完成的动作"}]}, "13": {"analysis": "「でした」是「です」的过去式，表示对过去事实的礼貌陈述。与「だった」相比，「でした」更加正式礼貌，适用于正式场合或对长辈、上级的对话。", "mistakes": "时态混淆：❌今日は雨でした（今天下雨了-应用现在时）→ ✅今日は雨です；动词误用：❌昨日食べるでした → ✅昨日食べました", "similar": [{"form": "〜だった", "diff": "「だった」是普通体过去式，「でした」是丁宁体过去式，后者更礼貌正式"}, {"form": "〜ました", "diff": "「ました」接续动词表过去，「でした」接续名词・な形容词表过去"}], "quiz": [{"q": "昨日は____忙しかったです。", "opts": ["A.とても", "B.とてもでした", "C.とてもだった", "D.とてもです"], "ans": "A", "exp": "「とても忙しかった」中「忙しい」是い形容词，过去式用「忙しかった」，不需要「でした」"}, {"q": "去年の夏は____。", "opts": ["A.暑いでした", "B.暑かったです", "C.暑いです", "D.暑かった"], "ans": "B", "exp": "「暑い」是い形容词，过去式礼貌体是「暑かったです」，不是「暑いでした」"}, {"q": "先生は昨日____。", "opts": ["A.元気だった", "B.元気です", "C.元気でした", "D.元気だ"], "ans": "C", "exp": "「元気」是な形容词，过去式礼貌体用「元気でした」，普通体是「元気だった」"}]}, "14": {"analysis": "「〜ました」是动词的礼貌过去式，表示过去已完成的动作或状态。它是「です・ます调」的核心文法，通过将动词ます形去掉「ます」后加「ました」构成。这个文法在日常会话中使用频率极高，是表达过去事件的基本句型。", "mistakes": "时间词搭配错误：❌ 明日、勉強しました → ✅ 昨日、勉強しました（明天不能用过去式）；动词变形错误：❌ 食べるました → ✅ 食べました（应该用ます形去掉ます）", "similar": [{"form": "〜ます", "diff": "ます是现在・未来时的礼貌形，ました是过去时的礼貌形"}, {"form": "〜た", "diff": "た是普通体过去式，ました是礼貌体过去式，使用场合不同"}], "quiz": [{"q": "昨日、友達と映画を（____）。", "opts": ["A. 見ます", "B. 見ました", "C. 見る", "D. 見て"], "ans": "B", "exp": "「昨日」表示过去时间，需要用过去式「見ました」"}, {"q": "朝ごはんを（____）か。", "opts": ["A. 食べます", "B. 食べる", "C. 食べました", "D. 食べて"], "ans": "C", "exp": "询问是否已经吃了早饭，用过去式「食べました」"}, {"q": "先週、日本語を（____）。", "opts": ["A. 勉強します", "B. 勉強しました", "C. 勉強する", "D. 勉強して"], "ans": "B", "exp": "「先週」表示过去时间，需要用过去式「勉強しました」"}]}, "21": {"analysis": "「〜てもいいですか」是请求许可的敬语表达，通过动词て形+もいいですか的结构，礼貌地询问对方是否允许自己做某事。这个句型体现了日语中重视礼貌和谦逊的文化特征，比直接命令或陈述更加委婉得体。", "mistakes": "易错点：❌ 飲んでもいいですか → ✅ 飲んでもいいですか（て形要正确），❌ 食べるもいいですか → ✅ 食べてもいいですか（不能省略て），❌ 行きてもいいですか → ✅ 行ってもいいですか（不规则动词て形要记准）", "similar": [{"form": "〜てください", "diff": "「てください」是请求对方做某事，「てもいいですか」是请求许可自己做某事"}, {"form": "〜ませんか", "diff": "「ませんか」是邀请一起做，「てもいいですか」是请求许可"}], "quiz": [{"q": "写真を（____）もいいですか。", "opts": ["A. 撮り", "B. 撮って", "C. 撮る", "D. 撮った"], "ans": "B", "exp": "动词て形+もいいですか，撮る的て形是撮って"}, {"q": "すみません、トイレに（____）もいいですか。", "opts": ["A. 行き", "B. 行く", "C. 行って", "D. 行った"], "ans": "C", "exp": "行く是不规则动词，て形是行って"}, {"q": "この本を（____）もいいですか。", "opts": ["A. 借りて", "B. 借り", "C. 借りる", "D. 貸して"], "ans": "A", "exp": "借りる的て形是借りて，表示请求许可借书"}]}, "22": {"analysis": "「〜てはいけません」是表示禁止的重要句型，相当于中文的'不可以~'或'禁止~'。动词变为て形后接「はいけません」，语气比较正式和严厉。「はだめです」是更口语化的表达，意思相同但语气稍缓和。", "mistakes": "易混淆否定形式。❌ここで写真を撮らないではいけません → ✅ここで写真を撮ってはいけません（这里不可以拍照）", "similar": [{"form": "〜ないでください", "diff": "「〜てはいけません」更强调规则禁止，「〜ないでください」是礼貌请求"}, {"form": "〜てはだめです", "diff": "意思相同，但「はだめです」更口语化，语气较温和"}], "quiz": [{"q": "図書館で大きな声で____はいけません。", "opts": ["A. 話して", "B. 話さないで", "C. 話すて", "D. 話して"], "ans": "A", "exp": "动词「話す」的て形是「話して」，表示禁止在图书馆大声说话"}, {"q": "この部屋に____はだめです。", "opts": ["A. 入らないで", "B. 入って", "C. 入るて", "D. 入りて"], "ans": "B", "exp": "动词「入る」的て形是「入って」，「〜てはだめです」表示禁止进入这个房间"}, {"q": "夜遅く音楽を____はいけません。", "opts": ["A. 聞いて", "B. 聞かないで", "C. 聞くて", "D. 聞きて"], "ans": "A", "exp": "动词「聞く」的て形是「聞いて」，表示禁止夜晚很晚听音乐"}]}, "25": {"analysis": "い形容詞是日语中最基础的形容词类型，词尾以「い」结束，具有固定的活用规则。掌握其四种基本变形（现在肯定、现在否定、过去肯定、过去否定）是N5语法的核心基础。", "mistakes": "❌ この本は高いくありません → ✅ この本は高くありません（否定形要去掉い加く）❌ きのうは暑いかったです → ✅ きのうは暑かったです（过去形要去掉い加かった）", "similar": [{"form": "な形容詞", "diff": "な形容詞用だ/である活用，い形容詞用い段活用"}, {"form": "動詞の活用", "diff": "動詞有更多活用形式，い形容詞只有4种基本形"}], "quiz": [{"q": "この映画は____です。", "opts": ["A. つまらない", "B. つまらなく", "C. つまらなかった", "D. つまらなくない"], "ans": "A", "exp": "现在时肯定形，直接使用い形容詞原形"}, {"q": "昨日は天気が____。", "opts": ["A. よい", "B. よかった", "C. よくない", "D. よくなかった"], "ans": "B", "exp": "昨日表示过去，要用过去肯定形かった"}, {"q": "この問題は____ありません。", "opts": ["A. 難しい", "B. 難し", "C. 難しく", "D. 難しかった"], "ans": "C", "exp": "否定形要去掉い加くない，这里省略了ない只保留く"}]}};
</script>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JLPT N5 文法カード</title>
<script>
/* ═══════════════════════════════════════════════════════
   JLPT Grammar Card Engine v3
   • Card mode (flip cards, ← → keys)
   • Grid mode (search + filter)
   • Furigana + POS coloring (per-card AI analysis)
   • Vocab notebook (cross-level, localStorage)
   • API Key config (stored in localStorage)
   • Mac Mini proxy support (/api/claude)
   ═══════════════════════════════════════════════════════ */

const CARD_ST_KEY  = 'jlpt_card_state';

/* ─── CSS ─── */
const SHARED_CSS = `
@import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;900&family=Noto+Sans+JP:wght@400;500;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --mint:#6dc9a8;--ml:#e6f7f1;--mm:#a8ddc9;
  --cream:#fffef5;--ybg:#fffbe8;--red:#e8464a;--navy:#2a3f6e;
  --tx:#333;--gr:#888;--sh:0 4px 20px rgba(0,0,0,.09);
  --pn:#e3f2fd;--pnt:#1565c0;
  --pv:#e8f5e9;--pvt:#2e7d32;
  --pa:#fff3e0;--pat:#e65100;
  --pad:#f3e5f5;--padt:#6a1b9a;
  --pp:#fce4ec;--ppt:#c62828;
  --pc:#e0f7fa;--pct:#006064;
  --px:#fff8e1;--pxt:#f57f17;
}
body{font-family:'M PLUS Rounded 1c','Noto Sans JP',sans-serif;min-height:100vh}

/* topbar */
.topbar{background:#fff;box-shadow:0 2px 12px rgba(0,0,0,.08);padding:10px 18px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;flex-wrap:wrap}
.tb-back{background:rgba(0,0,0,.07);border:none;border-radius:8px;padding:5px 12px;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;color:var(--navy);text-decoration:none;display:flex;align-items:center;gap:4px}
.tb-back:hover{background:rgba(0,0,0,.12)}
.lvl-badge{color:#fff;font-weight:900;font-size:11px;line-height:1.1;padding:5px 9px;border-radius:7px;text-align:center}
.lvl-badge span{display:block;font-size:17px}
.tb-title{font-size:16px;font-weight:900;color:var(--navy)}
.tb-sub{font-size:11px;color:var(--gr)}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.cnt-badge{background:var(--ml);color:var(--mint);font-size:12px;font-weight:700;padding:4px 12px;border-radius:20px;border:1.5px solid var(--mm)}
.view-tog{display:flex;gap:3px;background:#f0f0f0;border-radius:10px;padding:3px}
.vbtn{border:none;background:transparent;border-radius:7px;padding:5px 12px;font-size:12px;font-weight:700;color:var(--gr);cursor:pointer;font-family:inherit;transition:all .15s}
.vbtn.on{background:#fff;color:var(--navy);box-shadow:0 1px 4px rgba(0,0,0,.1)}
.cfg-btn{background:none;border:1.5px solid #ddd;border-radius:8px;padding:4px 10px;font-size:12px;cursor:pointer;color:var(--gr);font-family:inherit}
.cfg-btn:hover{border-color:var(--mint);color:var(--mint)}

/* filter bar */
.fbar{padding:10px 18px;display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;flex-wrap:wrap}
.fbar::-webkit-scrollbar{display:none}
.fbtn{background:rgba(255,255,255,.2);border:1.5px solid rgba(255,255,255,.4);color:#fff;font-family:inherit;font-size:11px;font-weight:700;padding:5px 12px;border-radius:20px;cursor:pointer;white-space:nowrap;transition:all .15s}
.fbtn:hover{background:rgba(255,255,255,.35);border-color:rgba(255,255,255,.7)}
.fbtn.on{background:rgba(255,255,255,.8);border-color:#fff;color:#333;font-weight:900}

/* progress */
.prog-wrap{padding:6px 18px 4px;background:rgba(255,255,255,.1)}
.prog-info{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.prog-lbl{font-size:11px;font-weight:700;color:rgba(255,255,255,.85)}
.prog-stats{display:flex;gap:12px;font-size:11px;font-weight:700;color:rgba(255,255,255,.85)}
.prog-track{height:3px;background:rgba(255,255,255,.25);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:rgba(255,255,255,.8);border-radius:2px;transition:width .35s}

/* stats bar (grid) */
.sbar{display:flex;gap:14px;padding:8px 18px 2px;font-size:12px;color:rgba(255,255,255,.8);font-weight:600}

/* ═══ CARD STAGE ═══ */
.cstage{display:none;flex:1;align-items:flex-start;justify-content:center;padding:14px 18px 84px;overflow:visible}
.cstage.on{display:flex}
.fcard{width:100%;max-width:700px;background:#fff;border-radius:22px;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,.13);animation:cIn .22s ease}
@keyframes cIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.aL{animation:sL .18s ease forwards}
.aR{animation:sR .18s ease forwards}
@keyframes sL{to{opacity:0;transform:translateX(-50px)}}
@keyframes sR{to{opacity:0;transform:translateX(50px)}}

/* card head */
.chead{background:var(--ybg);padding:14px 24px 12px;border-bottom:2px dashed var(--mm);display:flex;align-items:center;gap:12px;position:relative}
.cnum{color:#fff;font-size:11px;font-weight:900;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.chead-info{flex:1;display:flex;align-items:center}
.chead-row{display:flex;align-items:center;gap:8px;flex:1;flex-wrap:nowrap}
.c-gram{font-size:22px;font-weight:900;color:var(--navy);line-height:1.2;white-space:nowrap}
.c-gram .hl{color:var(--red)}
.ctags{display:flex;gap:6px;flex-wrap:nowrap;align-items:center;margin-top:0;margin-right:auto}
.ctag{font-size:10px;font-weight:700;padding:2px 8px;border-radius:5px;white-space:nowrap}
.cdiff{font-size:12px;letter-spacing:1px;color:#f5b942;white-space:nowrap}
.ccard-fav{background:none;border:none;font-size:16px;cursor:pointer;padding:0 4px;color:#ccc;transition:all .15s;flex-shrink:0}

.cbtns{display:none;gap:8px;align-items:flex-start;flex-shrink:0}
.cact{width:40px;height:40px;border-radius:12px;border:1.5px solid #e0e0e0;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:20px;transition:all .15s}
.cact:hover{border-color:var(--mint);transform:scale(1.06)}
.cact.fav{background:#fff9e6;border-color:#f5c518}
.cact.mst{background:var(--ml);border-color:var(--mint)}
.mst-rib{display:none;position:absolute;top:16px;right:110px;background:var(--ml);color:var(--mint);border:1.5px solid var(--mint);border-radius:20px;padding:3px 12px;font-size:11px;font-weight:900}
.mst-rib.on{display:block}

/* card body */
.cbody{padding:20px 24px 22px;display:flex;flex-direction:column;gap:12px}
.slbl{font-size:10px;font-weight:900;color:var(--mint);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:5px}
.c-meaning{font-size:15px;font-weight:700;color:var(--tx);line-height:1.65}
.c-mzh{font-size:13px;color:var(--gr);margin-top:4px}
.c-pat{background:var(--ml);border:1.5px solid var(--mm);border-radius:12px;padding:11px 15px;font-size:14px;font-weight:700;color:var(--navy);line-height:1.6}
.c-pat .gram{color:var(--red);font-weight:900}

/* ─── FURIGANA SYSTEM ─── */
.furi-wrap{display:flex;flex-wrap:wrap;align-items:flex-end;gap:0;line-height:2.8;font-size:15px}
.fw{display:inline-flex;flex-direction:column;align-items:center;margin:0 1px;border-radius:5px;padding:1px 3px 2px;cursor:default;position:relative}
.fw:hover{opacity:.72}
.fr{font-size:9.5px;line-height:1;color:#999;min-height:12px;text-align:center;white-space:nowrap;font-weight:400}
.ft{font-size:14px;font-weight:700;line-height:1.18;white-space:nowrap;border-radius:4px;padding:1px 3px}
.fpunc{display:inline-flex;flex-direction:column;align-items:center;margin-left:-2px}.fpunc .fr{min-height:12px;font-size:9.5px;line-height:1;display:block}.fpunc .ft{font-size:16px;font-weight:700;color:var(--tx);line-height:1.2;padding:1px 0}
/* grammar highlight */
.fw.isG .ft{color:var(--red)!important;background:rgba(232,70,74,.1)!important;font-weight:900}
.fw.isG .fr{color:var(--red)}
/* POS colors */
.pN .ft{color:var(--pnt);background:var(--pn)}
.pV .ft{color:var(--pvt);background:var(--pv)}
.pA .ft{color:var(--pat);background:var(--pa)}
.pD .ft{color:var(--padt);background:var(--pad)}
.pP .ft{color:var(--ppt);background:var(--pp)}
.pC .ft{color:var(--pct);background:var(--pc)}
.pX .ft{color:var(--pxt);background:var(--px)}
/* plain (not yet analyzed) */
.plain-ex{font-size:14px;font-weight:700;color:var(--tx);line-height:1.58}
.plain-ex .hl{color:var(--red);font-weight:900}

/* POS legend */
.pos-legend{display:flex;gap:6px;flex-wrap:wrap;padding:8px 12px;background:#f8f8f8;border-radius:8px}
.pleg{display:flex;align-items:center;gap:3px;font-size:10.5px;font-weight:700}
.pleg-dot{width:9px;height:9px;border-radius:2px}

/* analyze btn */
.ana-btn{background:linear-gradient(135deg,#6dc9a8,#10ac84);color:#fff;border:none;border-radius:10px;padding:8px 16px;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;display:none;align-items:center;gap:6px;transition:opacity .15s}
.ana-btn:hover{opacity:.88}
.ana-btn:disabled{opacity:.45;cursor:wait}
.spin{display:inline-block;width:12px;height:12px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}

/* example blocks */
.exb{border-radius:12px;padding:12px 14px 8px;border:1.5px solid #eee;margin-bottom:8px;cursor:pointer;transition:border-color .16s ease,background-color .16s ease,box-shadow .16s ease}
.exb.main{background:#fafafa;border-color:#eee}
.exb.sub{background:#fafafa}
.ex-zh{font-size:11px;color:var(--gr);margin-top:4px;line-height:1.45;opacity:.76}
.exb.playing{border-color:var(--mint);background:var(--ml);box-shadow:0 0 0 2px rgba(109,201,168,.14)}

/* AI gen */
.ai-btn{border:none;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;font-family:inherit;font-size:12px;font-weight:700;padding:8px 16px;border-radius:10px;cursor:pointer;display:flex;align-items:center;gap:6px;transition:opacity .15s}
.ai-btn:hover{opacity:.88}
.ai-btn:disabled{opacity:.45;cursor:wait}
.ai-res{background:var(--ml);border-radius:10px;padding:12px 14px;font-size:13px;line-height:1.8;color:#345;display:none;border:1.5px solid var(--mm)}
.ai-res.on{display:block}

/* bottom nav */
.bnav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #eee;padding:10px 20px;display:flex;align-items:center;justify-content:center;gap:10px;z-index:60;box-shadow:0 -4px 20px rgba(0,0,0,.07)}
.nbtn{width:40px;height:40px;border-radius:12px;border:1.5px solid #e0e0e0;background:#f7f7f7;color:var(--navy);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s;user-select:none;font-weight:900}
.nbtn:hover{background:var(--ml);border-color:var(--mint);color:var(--mint)}
.nbtn:active{transform:scale(.9)}
.nbtn:disabled{opacity:.3;cursor:default;pointer-events:none}
.nctr{background:#f5f5f5;border:1px solid #eee;border-radius:10px;padding:6px 14px;font-size:13px;font-weight:900;color:var(--navy);min-width:70px;text-align:center;flex-shrink:0}
.nctr sub{font-size:11px;font-weight:400;color:var(--gr)}
.nextra{display:flex;gap:6px}
.nxbtn{border:1px solid #e0e0e0;background:#f7f7f7;color:var(--gr);font-family:inherit;font-size:11px;font-weight:700;padding:5px 12px;border-radius:20px;cursor:pointer;transition:all .12s}
.nxbtn:hover{border-color:var(--mint);color:var(--mint)}
.nfav-btn{background:none;border:none;color:#f5a030;font-size:20px;cursor:pointer;padding:0 8px;transition:all .12s}
.nfav-btn:hover{transform:scale(1.1)}

/* ═══ GRID STAGE ═══ */
.gstage{display:none}
.gstage.on{display:block}
.srch-wrap{padding:12px 18px 0}
.srch{width:100%;max-width:560px;padding:9px 18px;border-radius:30px;border:none;background:rgba(255,255,255,.92);font-family:inherit;font-size:14px;color:var(--navy);box-shadow:0 2px 10px rgba(0,0,0,.08);outline:none}
.srch:focus{background:#fff}
.srch::placeholder{color:#aaa}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:18px;padding:16px 18px 80px;max-width:1400px;margin:0 auto}
.gc{background:#fff;border-radius:16px;overflow:hidden;box-shadow:var(--sh);transition:transform .2s,box-shadow .2s;display:flex;flex-direction:column}
.gc:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(0,0,0,.13)}
.gch{background:var(--ybg);border-bottom:2px dashed var(--mm);padding:8px 12px 6px;display:flex;align-items:center;gap:6px;cursor:pointer}
.gnum{color:#fff;font-size:9px;font-weight:900;min-width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.gt{font-size:15px;font-weight:900;color:var(--navy);flex:1;line-height:1.3}
.gt .hl{color:var(--red)}
.gd{font-size:12px;color:#f5b942;letter-spacing:1px;flex-shrink:0}
.gtag{font-size:9px;padding:2px 6px;border-radius:4px;font-weight:700;white-space:nowrap}
.gc-fav{background:none;border:none;font-size:16px;cursor:pointer;padding:0 4px;transition:all .15s;flex-shrink:0}
.gc-fav:hover{transform:scale(1.15)}
.gea{padding:13px 16px 10px;background:var(--cream)}
.gejp{font-size:15px;font-weight:700;color:var(--tx);line-height:1.7}
.gejp .hl{color:var(--red);font-weight:900}
.gezh{font-size:11.5px;color:var(--gr);margin-top:3px;line-height:1.5}
.gi{padding:7px 16px;display:flex;flex-direction:column;gap:5px}
.gmb{background:var(--ml);border-left:3px solid var(--mint);border-radius:0 7px 7px 0;padding:6px 11px;font-size:12px;color:#456}
.gmb .lb{font-size:9px;font-weight:900;color:var(--mint);letter-spacing:1px;text-transform:uppercase;display:block;margin-bottom:2px}
.gpb{background:#fff;border:1.5px solid var(--mm);border-radius:7px;padding:6px 11px;font-size:12px;color:var(--navy)}
.gpb .lb{font-size:9px;font-weight:900;color:var(--gr);letter-spacing:1px;text-transform:uppercase;display:block;margin-bottom:2px}
.gpb code{font-family:inherit;font-weight:700}
.gpb code .gram{color:var(--red);font-weight:900}
.gmt{padding:5px 16px;background:none;border:none;font-family:inherit;font-size:11px;color:var(--mint);font-weight:700;cursor:pointer;display:flex;align-items:center;gap:3px;width:100%;text-align:left}
.gme{display:none;padding:3px 16px 13px;flex-direction:column;gap:5px}
.gme.on{display:flex}
.gei{font-size:11.5px;color:#555;line-height:1.6;padding:5px 11px;background:#f5f5f5;border-radius:7px}
.gei .gm{color:var(--red);font-weight:900}
.gei .tr{font-size:10.5px;color:var(--gr);display:block;margin-top:1px}
.empty{grid-column:1/-1;text-align:center;padding:60px 20px;color:rgba(255,255,255,.7);font-size:16px}

/* modal */
.mov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center;padding:20px}
.mov.on{display:flex}
.mo{background:#fff;border-radius:18px;max-width:500px;width:100%;max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.25)}
.moh{background:var(--ybg);border-bottom:2px dashed var(--mm);padding:14px 18px;display:flex;align-items:center;gap:10px}
.moc{margin-left:auto;background:none;border:none;font-size:22px;cursor:pointer;color:var(--gr);line-height:1;padding:0 4px}
.mob{padding:14px 18px 22px;display:flex;flex-direction:column;gap:10px}
.mex{font-size:17px;font-weight:700;line-height:1.8;color:var(--tx)}
.mex .hl{color:var(--red);font-weight:900}
.mo::-webkit-scrollbar{width:4px}
.mo::-webkit-scrollbar-thumb{background:var(--mm);border-radius:4px}

/* ─── POS TOOLTIP ─── */
.pos-tip{position:fixed;z-index:99999;background:#2a3f6e;color:#fff;border-radius:8px;padding:4px 10px;font-size:11px;font-weight:700;pointer-events:none;display:none;white-space:nowrap}

@media(max-width:600px){
  .grid{grid-template-columns:1fr;padding:10px 12px 82px}
  .c-gram{font-size:20px}
  .cbody{padding:14px 16px 18px;gap:10px}
  .bnav{padding:6px 10px}
  .nbtn{width:40px;height:40px;font-size:18px}
  .nextra{display:flex}
  .topbar{padding:7px 10px;gap:7px}
  .tb-title{font-size:12px}
  .cnt-badge{display:none}
  .lvl-badge{font-size:9px;padding:3px 6px}
  .lvl-badge span{font-size:13px}
  .cfg-btn{padding:4px 7px;font-size:10px}
  .ft{font-size:13px}
  .plain-ex{font-size:14px;line-height:1.5}
  .exb{padding:10px 12px 8px}
  .ex-zh{font-size:10px}
}
/* ─── FLIP BUTTON & BACK PANEL ─── */
.flip-btn{width:100%;margin-top:14px;padding:11px;border-radius:12px;border:1.5px dashed var(--mm);background:var(--ml);color:var(--mint);font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s}
.flip-btn:hover:not(:disabled){background:var(--mint);color:#fff;border-style:solid}
.flip-btn:disabled{opacity:.4;cursor:default}
.fcard-back-panel{background:#fff;border-radius:22px;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,.13);width:100%;max-width:700px}
.back-header{background:var(--ybg);border-bottom:2px dashed var(--mm);padding:14px 20px;display:flex;align-items:center;gap:12px}
.flip-back-btn{border:none;background:rgba(0,0,0,.07);border-radius:8px;padding:5px 12px;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;color:var(--navy)}
.flip-back-btn:hover{background:rgba(0,0,0,.12)}
.back-title{font-size:14px;font-weight:900;color:var(--navy)}
.back-body{padding:18px 20px 24px;display:flex;flex-direction:column;gap:14px;max-height:70vh;overflow-y:auto}
.back-section{display:flex;flex-direction:column;gap:7px}
.back-label{font-size:10px;font-weight:900;letter-spacing:2px;color:var(--mint);text-transform:uppercase}
.back-analysis{font-size:13px;line-height:1.85;color:#345;background:var(--ml);border-left:3px solid var(--mint);border-radius:0 8px 8px 0;padding:10px 14px}
.back-mistakes{font-size:12.5px;line-height:1.9;color:#456;background:#fff9f0;border-left:3px solid #f5a030;border-radius:0 8px 8px 0;padding:10px 14px}
.back-similar{display:flex;flex-direction:column;gap:6px}
.similar-item{display:flex;gap:8px;font-size:12.5px;line-height:1.6;padding:5px 0;border-bottom:1px solid #f0f0f0}
.similar-item:last-child{border-bottom:none}
.similar-form{font-weight:900;color:var(--navy);white-space:nowrap;min-width:fit-content}
.similar-diff{color:var(--gr)}
.quiz-item{background:#f8f8f8;border-radius:12px;padding:13px 15px;border:1.5px solid #eee}
.quiz-q{font-size:13px;font-weight:700;color:var(--navy);margin-bottom:10px;line-height:1.6}
.quiz-opts{display:flex;flex-direction:column;gap:5px}
.quiz-opt{font-size:12.5px;padding:7px 11px;border-radius:8px;cursor:pointer;border:1.5px solid #e0e0e0;background:#fff;color:#456;transition:all .15s;text-align:left;font-family:inherit;width:100%}
.quiz-opt:hover:not(.correct):not(.wrong){border-color:var(--mint);background:var(--ml)}
.quiz-opt.correct{background:#e8f8f3;border-color:var(--mint);color:var(--mint);font-weight:900}
.quiz-opt.wrong{background:#fef0f0;border-color:#e84a4a;color:#c0392b}
.quiz-exp{font-size:11.5px;color:#666;margin-top:7px;padding:7px 10px;background:#efefef;border-radius:7px;display:none;line-height:1.6}
.quiz-exp.show{display:block}
.no-back{text-align:center;padding:40px 20px;color:var(--gr);font-size:13px}

`;

class GrammarApp {
  constructor(cfg) {
    this.level    = cfg.level;
    this.color    = cfg.color;
    this.bg       = cfg.bgGradient;
    this.G        = cfg.grammar;
    this.fgs      = cfg.filterGroups || [];
    this.label    = cfg.levelLabel || cfg.level;

    this.view     = 'card';
    this.filter   = 'all';
    this.search   = '';
    this.curMod   = null;
    this.deck     = [...this.G];
    this.cur      = 0;
    this.kCache   = {};
    this.kCur     = null;
    // per-card furigana cache  { cardId: [{text,reading,pos,isGram},...] }
    // 从 localStorage 加载已分析的注音缓存
    this._furiKey = 'jlpt_furi_' + (cfg.level || 'XX');
    try { this.furiCache = JSON.parse(localStorage.getItem(this._furiKey) || '{}'); }
    catch { this.furiCache = {}; }

    try { this.cs = JSON.parse(localStorage.getItem(CARD_ST_KEY) || '{}'); }
    catch { this.cs = {}; }
    if (!this.cs.favs)     this.cs.favs = {};
    if (!this.cs.mastered) this.cs.mastered = {};

    const s = document.createElement('style');
    s.textContent = SHARED_CSS;
    document.head.insertBefore(s, document.head.firstChild);
    document.body.style.background = this.bg;

    this._buildHTML();
    this._bind();
    this._setView('card');
    this._initSwipe();
    if (window.speechSynthesis)
      window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
  }

<div class="bnav" id="bnav">
  <button class="nbtn" id="prevBtn" disabled>←</button>
  <div class="nctr"><span id="navIdx">1</span><sub> / <span id="navTot">${this.G.length}</span></sub></div>
  <button class="nbtn" id="nextBtn">→</button>
  <div class="nextra">
    <button class="nxbtn" id="shuffleBtn">🔀 打乱顺序</button>
  </div>
  <button class="nfav-btn" id="nFavBtn" title="收藏">☆</button>
</div>
<!-- GRID STAGE -->
<div class="gstage" id="gstage">
  <div class="srch-wrap"><input class="srch" type="search" placeholder="🔍 搜索文法..." id="srch"></div>
  <div class="sbar"><span>📚 显示 <span id="visCt">0</span> 项</span></div>
  <div class="grid" id="grid"></div>
</div>
<div class="mov" id="mov">
  <div class="mo">
    <div class="moh">
      <div class="gnum" id="mNum" style="background:${this.color}"></div>
      <div class="gt" id="mTit"></div>
      <button class="moc" id="mClose">✕</button>
    </div>
    <div class="mob">
      <div class="mex" id="mEx"></div>
      <div style="font-size:12px;color:#aaa" id="mZh"></div>
      <div class="tts-row">
        <button class="tts-b" id="mSpk1">🔊 正常</button>
        <button class="tts-b" id="mSpk2">🐢 慢速</button>
      </div>
      <div class="gmb"><span class="lb">意味</span><span id="mMean"></span></div>
      <div class="gpb"><span class="lb">接続</span><code id="mPat"></code></div>
      <div id="mMore" style="display:flex;flex-direction:column;gap:5px"></div>
    </div>
  </div>
</div>`;
  }

  /* ─────────── BIND ─────────── */
  _bind() {
    // view
    document.getElementById('vCard').addEventListener('click', () => this._setView('card'));
    document.getElementById('vGrid').addEventListener('click', () => this._setView('grid'));
    // filter
    document.getElementById('fbar').addEventListener('click', e => {
      const b = e.target.closest('.fbtn'); if (!b) return;
      document.querySelectorAll('.fbtn').forEach(x=>{x.classList.remove('on');x.style.background='';x.style.color='#fff'});
      b.classList.add('on');
      // 设置选中按钮的背景色
      const filterKey = b.dataset.f;
      if(filterKey !== 'all' && filterKey !== 'fav' && filterKey !== 'unmastered' && !filterKey.startsWith('★')){
        const grp = this.fgs.find(x=>x.key===filterKey);
        if(grp){
          b.style.background = grp.color;
          b.style.color = grp.fg;
        }
      }
      this.filter = filterKey;
      this.deck = this._fDeck();
      this.cur = 0;
      if (this.view === 'card') this._renderCard();
      else this._renderGrid();
    });
    // card nav
    document.getElementById('prevBtn').addEventListener('click', () => this._go(-1));
    document.getElementById('nextBtn').addEventListener('click', () => this._go(1));
    document.getElementById('shuffleBtn').addEventListener('click', () => {
      this._hideBack();
      this._shuffle();
    });
    document.getElementById('nFavBtn').addEventListener('click', () => this._toggleFav());
    document.addEventListener('keydown', e => {
      if (['INPUT','TEXTAREA'].includes(document.activeElement.tagName)) return;
      if (e.key==='ArrowLeft'||e.key==='a') this._go(-1);
      if (e.key==='ArrowRight'||e.key==='d') this._go(1);
      if (e.key==='f'||e.key==='F') this._toggleFav();
      if (e.key==='m'||e.key==='M') this._toggleMst();
    });
    document.getElementById('cStar').addEventListener('click', () => this._toggleFav());
    document.getElementById('cCheck').addEventListener('click', () => this._toggleMst());
    const cCardFav = document.getElementById('cCardFav');
    if(cCardFav) cCardFav.addEventListener('click', () => this._toggleFav());
    document.getElementById('anaBtn').addEventListener('click', () => this._analyzeCard());
    // grid
    document.getElementById('srch').addEventListener('input', e => { this.search=e.target.value.trim(); this._renderGrid(); });
    // modal
    document.getElementById('mClose').addEventListener('click', () => this._closeMod());
    document.getElementById('mov').addEventListener('click', e => { if(e.target===document.getElementById('mov'))this._closeMod(); });
    // 整句点击播放
    document.addEventListener('click', e => {
      const ex = e.target.closest('.exb[data-speak]');
      if (!ex) return;
      if (e.target.closest('.fw,.kword,button,input')) return;
      this._playExample(ex, ex.dataset.speak || '');
    });
    document.getElementById('mSpk1').addEventListener('click', () => this._spkMod(1.0));
    document.getElementById('mSpk2').addEventListener('click', () => this._spkMod(0.65));
  }

  /* ─────────── VIEW ─────────── */
  _setView(v) {
    this.view = v;
    document.getElementById('vCard').classList.toggle('on', v==='card');
    document.getElementById('vGrid').classList.toggle('on', v==='grid');
    document.getElementById('cstage').classList.toggle('on', v==='card');
    document.getElementById('gstage').classList.toggle('on', v==='grid');
    document.getElementById('progWrap').style.display = 'none';
    document.getElementById('fbar').style.display = v==='card'?'none':'flex';
    document.getElementById('bnav').style.display = v==='card'?'flex':'none';
    (document.getElementById('tbSub')||{textContent:''}).textContent = v==='card'
      ? '← → 键切换 ｜ F:收藏 M:已学'
      : '点击查看详情 ｜ 点击汉字查询';
    this.deck = this._fDeck();
    this.cur = 0;
    if (v==='card') this._renderCard();
    else this._renderGrid();
  }

  /* ─────────── FILTER ─────────── */
  _fDeck() {
    let arr = this.G;
    if (this.filter==='fav') arr=arr.filter(g=>this.cs.favs[g.id]);
    else if (this.filter==='unmastered') arr=arr.filter(g=>!this.cs.mastered[g.id]);
    else if (this.filter.startsWith('★')) arr=arr.filter(g=>g.d===this.filter);
    else if (this.filter!=='all') arr=arr.filter(g=>g.cat===this.filter);
    return arr;
  }
  _matchS(g) {
    if(!this.search)return true;
    const q=this.search.toLowerCase();
    return g.t.includes(q)||g.m.includes(q)||g.mz.includes(q)||g.e.includes(q)||g.ez.includes(q);
  }

  /* ─────────── CARD RENDER ─────────── */
  _renderCard(dir) {
    const g = this.deck[this.cur];
    if (!g) {
      document.getElementById('fcard').innerHTML='<div style="padding:60px;text-align:center;color:#aaa;font-size:16px">没有相关语法</div>';
      return;
    }
    const card = document.getElementById('fcard');
    const render = () => {
      if (!(document.getElementById('cNum'))) return;
      (document.getElementById('cNum')||{textContent:''}).textContent = g.id;
      document.getElementById('cGram').innerHTML = `～<span class="hl">${g.hl}</span>`;
      (document.getElementById('cMean')||{textContent:''}).textContent = g.m;
      (document.getElementById('cMzh')||{textContent:''}).textContent = g.mz;
      document.getElementById('cPat').innerHTML = g.p;

      const grp = this.fgs.find(x=>x.key===g.cat);
      document.getElementById('cTags').innerHTML =
        (grp?`<span class="ctag" style="background:${grp.color||'#e8f0ff'};color:${grp.fg||'#3a5bc7'}">${grp.label}</span>`:'') +
        `<span class="cdiff">${g.d}</span>`;

      const fav=!!this.cs.favs[g.id], mst=!!this.cs.mastered[g.id];
      (document.getElementById('cStar')||{textContent:''}).textContent=fav?'⭐':'☆';
      document.getElementById('cStar').className='cact'+(fav?' fav':'');
      (document.getElementById('cCheck')||{textContent:''}).textContent=mst?'✅':'◯';
      document.getElementById('cCheck').className='cact'+(mst?' mst':'');
      document.getElementById('mstRib').className='mst-rib'+(mst?' on':'');
      // Update card head star button
      const cardFavBtn = document.getElementById('cCardFav');
      if(cardFavBtn) {
        cardFavBtn.textContent = fav?'⭐':'☆';
        cardFavBtn.className = 'ccard-fav'+(fav?' fav':'');
        cardFavBtn.style.display = 'block';
      }
      // Hide bottom nav star button
      document.getElementById('nFavBtn').style.display = 'none';

      // Render examples
      // 优先用内置注音（已批量生成写入HTML的）
      const builtin = g.furi || null;
      const cached  = this.furiCache[g.id] || builtin;
      if (cached) {
        // 同步到内存cache（方便后续切换卡片不重读）
        if (!this.furiCache[g.id] && builtin) this.furiCache[g.id] = builtin;
        this._renderFuri(g, cached);
      } else {
        this._renderPlain(g);
      }

      // AI reset

      // Progress
      const pct=((this.cur+1)/this.deck.length*100).toFixed(1);
      document.getElementById('progFill').style.width=pct+'%';
      (document.getElementById('progLbl')||{textContent:''}).textContent=`${this.cur+1}/${this.deck.length}`;
      (document.getElementById('navIdx')||{textContent:''}).textContent=this.cur+1;
      (document.getElementById('navTot')||{textContent:''}).textContent=this.deck.length;
      document.getElementById('prevBtn').disabled=this.cur===0;
      document.getElementById('nextBtn').disabled=this.cur===this.deck.length-1;
      (document.getElementById('favCt')||{textContent:''}).textContent=Object.values(this.cs.favs).filter(Boolean).length;
      (document.getElementById('mstCt')||{textContent:''}).textContent=Object.values(this.cs.mastered).filter(Boolean).length;
      this._renderBack(g);
    };

    if (dir) {
      card.classList.add(dir==='L'?'aL':'aR');
      setTimeout(()=>{ card.classList.remove('aL','aR'); render(); }, 160);
    } else { render(); }
  }

  /* render plain (no furigana yet) */
  _renderPlain(g) {
    document.getElementById('posLegend').style.display='none';
    document.getElementById('anaBtn').innerHTML='✨ 注音·词性分析';
    document.getElementById('anaBtn').disabled=false;
    const allEx = [{j:g.eh,z:g.ez,main:true},...g.ex.map(e=>({j:e.j,z:e.z}))];
    document.getElementById('cExList').innerHTML = allEx.map(ex => {
      const plain = ex.j.replace(/<[^>]*>/g,'');
      const safe = plain.replace(/"/g,'&quot;');
      return `<div class="exb ${ex.main?'main':'sub'}" data-speak="${safe}">
        <div class="plain-ex">${ex.j}</div>
        <div class="ex-zh">${ex.z}</div>
      </div>`;
    }).join('');
  }

  /* render with furigana tokens */
  _renderFuri(g, tokenSets) {
    document.getElementById('posLegend').style.display='flex';
    document.getElementById('anaBtn').innerHTML='✅ 已分析';
    document.getElementById('anaBtn').disabled=true;

    const allEx = [{j:g.eh,z:g.ez,main:true},...g.ex.map(e=>({j:e.j,z:e.z}))];
    const listEl = document.getElementById('cExList');
    listEl.innerHTML='';

    allEx.forEach((ex,i) => {
      const toks = tokenSets[i];
      const plain = ex.j.replace(/<[^>]*>/g,'').replace(/'/g,"\\'");
      const div = document.createElement('div');
      div.className = 'exb '+(ex.main?'main':'sub');

      const furiDiv = document.createElement('div');
      furiDiv.className='furi-wrap';

      if (toks && toks.length) {
        toks.forEach(t => {
          if (t.pos==='punc') {
            const sp=document.createElement('span');
            sp.className='fpunc';
            const ru=document.createElement('span'); ru.className='fr'; ru.textContent='';
            const ft=document.createElement('span'); ft.className='ft'; ft.textContent=t.text;
            sp.appendChild(ru); sp.appendChild(ft);
            furiDiv.appendChild(sp);
          } else {
            const POS_CLASS={noun:'pN',verb:'pV',adj:'pA',adv:'pD',part:'pP',conj:'pC',aux:'pX'};
            const w=document.createElement('span');
            w.className='fw '+(POS_CLASS[t.pos]||'')+(t.isGram?' isG':'');
            const ru=document.createElement('span'); ru.className='fr'; ru.textContent=t.reading||'';
            const ft=document.createElement('span'); ft.className='ft'; ft.textContent=t.text;
            w.appendChild(ru); w.appendChild(ft);
            furiDiv.appendChild(w);
            // tooltip
            const POS_LBL={noun:'名詞',verb:'動詞',adj:'形容詞',adv:'副詞',part:'助詞',conj:'接続詞',aux:'助動詞'};
            const lbl = t.isGram ? '🔴 文法ポイント' : (POS_LBL[t.pos]||t.pos);
            w.addEventListener('mouseenter', ev => {
              const tip=document.getElementById('posTip');
              tip.textContent=lbl+(t.reading?' · '+t.reading:'');
              tip.style.display='block';
              tip.style.left=(ev.clientX+10)+'px';
              tip.style.top=(ev.clientY-28)+'px';
            });
            w.addEventListener('mouseleave',()=>{ const _pt=document.getElementById('posTip'); if(_pt)_pt.style.display='none'; });
            w.addEventListener('mousemove',ev=>{ const t2=document.getElementById('posTip'); if(!t2)return; t2.style.left=(ev.clientX+10)+'px'; t2.style.top=(ev.clientY-28)+'px'; });
          }
        });
      } else {
        furiDiv.innerHTML=`<span class="plain-ex">${ex.j}</span>`;
      }

      const zh=document.createElement('div'); zh.className='ex-zh'; zh.textContent=ex.z;
      div.dataset.speak = ex.j.replace(/<[^>]*>/g,'');
      div.appendChild(furiDiv);
      div.appendChild(zh);
      listEl.appendChild(div);
    });
  }

  /* ─────────── FURIGANA ANALYSIS ─────────── */
  async _analyzeCard() {
    const g = this.deck[this.cur]; if (!g) return;
    // 已有内置注音或缓存，直接展示无需重新分析
    if (g.furi || this.furiCache[g.id]) {
      const data = this.furiCache[g.id] || g.furi;
      this.furiCache[g.id] = data;
      this._renderFuri(g, data);
      return;
    }

    const btn=document.getElementById('anaBtn');
    btn.disabled=true;
    btn.innerHTML='<span class="spin"></span> 分析中...';

    const allEx=[{j:g.e,z:g.ez},...g.ex.map(e=>({j:e.j.replace(/<[^>]*>/g,''),z:e.z}))];

    const prompt = `以下の日本語文を形態素解析してください。各トークンのJSONを返してください。
文法ポイント「${g.hl}」の語はisGram:trueにしてください。
posは必ず: noun/verb/adj/adv/part/conj/aux/punc/other のどれか。
readingは漢字のみひらがなで、ひらがな・カタカナ・英数字・記号は""にしてください。
JSONのみ返し、マークダウン不要。

形式:
{"results":[
  {"idx":0,"tokens":[{"text":"例","reading":"れい","pos":"noun","isGram":false},...]}
]}

${allEx.map((ex,i)=>`文${i}(idx:${i}): ${ex.j}`).join('\n')}`;

    try {
      const data = await this._api([{role:'user',content:prompt}], 2000);
      const raw = data.content?.[0]?.text||'';
      const m = raw.match(/\{[\s\S]*\}/);
      if (!m) throw new Error('JSON not found in response');
      const parsed = JSON.parse(m[0]);

      // Store ordered by idx
      const sets = [];
      parsed.results.sort((a,b)=>a.idx-b.idx).forEach(r => { sets[r.idx]=r.tokens; });
      this.furiCache[g.id] = sets;
      // 持久化保存到 localStorage
      try { localStorage.setItem(this._furiKey, JSON.stringify(this.furiCache)); } catch(e) {}
      this._renderFuri(g, sets);
    } catch(err) {
      btn.innerHTML='⚠️ 重试';
      btn.disabled=false;
      // show error briefly
      const errDiv=document.createElement('div');
      errDiv.style.cssText='color:#e84040;font-size:12px;margin-top:4px';
      errDiv.textContent='错误: '+err.message;
      btn.parentNode.insertBefore(errDiv, btn.nextSibling);
      setTimeout(()=>errDiv.remove(),4000);
    }
  }

  /* ─────────── NAV ─────────── */
  _go(d) {
    const n=this.cur+d;
    if(n<0||n>=this.deck.length)return;
    this._hideBack();
    this.cur=n;
    this._renderCard(d>0?'L':'R');
  }
  _shuffle() {
    for(let i=this.deck.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[this.deck[i],this.deck[j]]=[this.deck[j],this.deck[i]];}
    this.cur=0; this._renderCard();
  }
  _toggleFav() {
    const g=this.deck[this.cur]; if(!g)return;
    this.cs.favs[g.id]=!this.cs.favs[g.id];
    this._saveCS(); this._renderCard();
  }
  _toggleGridFav(id) {
    this.cs.favs[id]=!this.cs.favs[id];
    this._saveCS();
    // Update grid card button
    const btn = document.querySelector(`.gc-fav[data-id="${id}"]`);
    if(btn) {
      const fav = this.cs.favs[id];
      btn.textContent = fav?'⭐':'☆';
      btn.style.color = fav?'#f5a030':'#ccc';
    }
  }
  _toggleMst() {
    const g=this.deck[this.cur]; if(!g)return;
    this.cs.mastered[g.id]=!this.cs.mastered[g.id];
    this._saveCS(); this._renderCard();
  }
  _saveCS() { localStorage.setItem(CARD_ST_KEY, JSON.stringify(this.cs)); }

  /* ─────────── GRID ─────────── */
  _renderGrid() {
    const grid=document.getElementById('grid');
    grid.innerHTML='';
    let n=0;
    const src=this.filter!=='all'?this.deck:this.G;
    src.filter(g=>this._matchS(g)).forEach(g=>{ n++; grid.appendChild(this._makeGC(g)); });
    if(!n){const d=document.createElement('div');d.className='empty';d.textContent='🔍 没有找到相关文法';grid.appendChild(d);}
    (document.getElementById('visCt')||{textContent:''}).textContent=n;
    (document.getElementById('cntBadge')||{textContent:''}).textContent=`共 ${this.G.length} 项`;
  }
  _makeGC(g) {
    const d=document.createElement('div'); d.className='gc';
    const grp=this.fgs.find(x=>x.key===g.cat);
    const tb=grp?.color||'#e8f0ff', tf=grp?.fg||'#3a5bc7';
    const et=g.e.replace(/'/g,"\\'");
    const fav=!!this.cs.favs[g.id];
    d.innerHTML=`
    <div class="gch"><div class="gnum" style="background:${this.color}">${g.id}</div>
      <div class="gt">～<span class="hl">${g.hl}</span></div>
      ${grp?`<span class="gtag" style="background:${tb};color:${tf}">${grp.label}</span>`:''}
      <button class="gc-fav" data-id="${g.id}" style="color:${fav?'#f5a030':'#ccc'}">${fav?'⭐':'☆'}</button></div>
    <div class="gea"><div class="gejp">${g.eh}</div><div class="gezh">${g.ez}</div>
      <div class="tts-row">
        <button class="tts-b" onclick="app.speak('${et}',1.0)">🔊 朗读</button>
        <button class="tts-b" onclick="app.speak('${et}',0.65)">🐢 慢速</button>
      </div></div>
    <div class="gi">
      <div class="gmb"><span class="lb">意思</span>${g.m}<br><span style="font-size:10.5px;color:#999">${g.mz}</span></div>
      <div class="gpb"><span class="lb">接续</span>${g.p}</div></div>
    <button class="gmt" onclick="const m=this.nextElementSibling;const o=m.classList.toggle('on');this.textContent=o?'▾ 关闭':'▸ 更多例句'">▸ 更多例句</button>
    <div class="gme">${g.ex.map(e=>`<div class="gei">${e.j}<span class="tr">${e.z}</span></div>`).join('')}</div>`;
    d.querySelector('.gch').addEventListener('click',()=>{
      const idx=this.deck.findIndex(x=>x.id===g.id);
      if(idx!==-1){this.cur=idx;this._setView('card');window.scrollTo(0,0);}
      else{this._openMod(g.id);}
    });
    d.querySelector('.gc-fav').addEventListener('click',(e)=>{e.stopPropagation();this._toggleGridFav(g.id);});
    return d;
  }

  /* ─────────── MODAL ─────────── */
  _openMod(id) {
    const g=this.G.find(x=>x.id===id); if(!g)return;
    this.curMod=id;
    (document.getElementById('mNum')||{textContent:''}).textContent=g.id;
    document.getElementById('mTit').innerHTML=`～<span class="hl">${g.hl}</span> <span style="font-size:13px;color:#f5b942">${g.d}</span>`;
    document.getElementById('mEx').innerHTML=g.eh;
    (document.getElementById('mZh')||{textContent:''}).textContent=g.ez;
    document.getElementById('mMean').innerHTML=`${g.m}<br><span style="font-size:11px;color:#aaa">${g.mz}</span>`;
    document.getElementById('mPat').innerHTML=g.p;
    document.getElementById('mMore').innerHTML=g.ex.map(e=>`<div class="gei">${e.j}<span class="tr">${e.z}</span>
      <button class="tts-b" style="margin-top:5px;font-size:10px;padding:3px 9px"
        onclick="app.speak('${e.j.replace(/<[^>]*>/g,'').replace(/'/g,"\\'")}',1.0)">🔊</button></div>`).join('');
    document.getElementById('mov').classList.add('on');
    document.body.style.overflow='hidden';
  }
  _closeMod() {
    document.getElementById('mov').classList.remove('on');
    document.body.style.overflow='';
    window.speechSynthesis&&window.speechSynthesis.cancel();
    this.curMod=null;
  }
  _spkMod(r) {
    if(!this.curMod)return;
    const g=this.G.find(x=>x.id===this.curMod);
    if(g)this.speak(g.e,r);
  }

  /* ─────────── TTS ─────────── */
  _renderBack(g) {
    const BACK_DATA = (typeof N2_BACK !== 'undefined') ? N2_BACK :
                      (typeof N1_BACK !== 'undefined') ? N1_BACK :
                      (typeof N3_BACK !== 'undefined') ? N3_BACK :
                      (typeof N4_BACK !== 'undefined') ? N4_BACK :
                      (typeof N5_BACK !== 'undefined') ? N5_BACK : null;
    const back = BACK_DATA ? BACK_DATA[String(g.id)] : null;

    const fcard = document.getElementById('fcard');
    if (!fcard) return;

    // 确保fcardBack存在
    let el = document.getElementById('fcardBack');
    if (!el) {
      el = document.createElement('div');
      el.id = 'fcardBack';
      el.className = 'fcard-back-panel';
      fcard.parentNode.insertBefore(el, fcard.nextSibling);
    }
    el.style.display = 'none';

    // 翻转按钮（每次切换卡片时cbody被重建，需重新插入）
    const cbody = fcard.querySelector('.cbody');
    if (cbody) {
      let flipBtn = cbody.querySelector('.flip-btn');
      if (!flipBtn) {
        flipBtn = document.createElement('button');
        flipBtn.className = 'flip-btn';
        flipBtn.onclick = () => this._toggleFlip();
        cbody.appendChild(flipBtn);
      }
      flipBtn.textContent = back ? '📖 查看解析 & 练习题' : '📖 解析暂未收录';
      flipBtn.disabled = !back;
    }

    const mistakesHtml = (back.mistakes||'').split('\n').join('<br>');

      `<div class="similar-item"><span class="similar-form">${s.form}</span><span class="similar-diff">— ${s.diff}</span></div>`
    ).join('');

    // 练习题
    const quizHtml = (back.quiz||[]).map((q, qi) => {
      const opts = (q.opts||[]).map((opt, oi) => {
        const letter = ['A','B','C','D'][oi];
        return `<button class="quiz-opt" data-qi="${qi}" data-letter="${letter}" data-ans="${q.ans}" onclick="window._quizClick(this)">${opt}</button>`;
      }).join('');
      return `<div class="quiz-item">
        <div class="quiz-q">${q.q}</div>
        <div class="quiz-opts">${opts}</div>
        <div class="quiz-exp" id="qexp-${qi}">${q.exp}</div>
      </div>`;
    }).join('');

    el.innerHTML = `
      <div class="back-header">
        <button class="flip-back-btn" onclick="window._flipBack()">← 返回正面</button>
        <span class="back-title">解析 · ${g.t}</span>
      </div>
      <div class="back-body">
        <div class="back-section">
          <div class="back-label">📌 深度解析</div>
          <div class="back-analysis">${back.analysis||''}</div>
        </div>
        <div class="back-section">
          <div class="back-label">⚠️ 易错点</div>
          <div class="back-mistakes">${mistakesHtml}</div>
        </div>
        ${similarHtml ? `<div class="back-section">
          <div class="back-label">🔀 相似文法</div>
          <div class="back-similar">${similarHtml}</div>
        </div>` : ''}
        ${quizHtml ? `<div class="back-section">
          <div class="back-label">✏️ 练习题</div>
          ${quizHtml}
        </div>` : ''}
      </div>`;
  }

  _hideBack() {
    const back = document.getElementById('fcardBack');
    const fcard = document.getElementById('fcard');
    if (back) back.style.display = 'none';
    if (fcard) fcard.style.display = '';
  }

  _toggleFlip() {
    const fcard = document.getElementById('fcard');
    const back = document.getElementById('fcardBack');
    if (!back) return;
    const showing = back.style.display === 'block';
    if (showing) {
      this._hideBack();
    } else {
      if (fcard) fcard.style.display = 'none';
      back.style.display = 'block';
    }
  }

  _playExample(el,text) {
    if(!window.speechSynthesis || !text) return;
    document.querySelectorAll('.exb.playing').forEach(x => x.classList.remove('playing'));
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'ja-JP';
    u.rate = 1.0;
    const vs = window.speechSynthesis.getVoices();
    const jp = vs.find(v => v.lang === 'ja-JP') || vs.find(v => v.lang && v.lang.startsWith('ja'));
    if (jp) u.voice = jp;
    this._playingExample = el;
    el.classList.add('playing');
    const clear = () => {
      if (this._playingExample === el) this._playingExample = null;
      el.classList.remove('playing');
    };
    u.onend = clear;
    u.onerror = clear;
    window.speechSynthesis.speak(u);
  }

  speak(text,rate) {
    if(!window.speechSynthesis)return;
    document.querySelectorAll('.exb.playing').forEach(x => x.classList.remove('playing'));
    this._playingExample = null;
    window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    u.lang='ja-JP'; u.rate=rate||1.0;
    const vs=window.speechSynthesis.getVoices();
    const jp=vs.find(v=>v.lang==='ja-JP')||vs.find(v=>v.lang.startsWith('ja'));
    if(jp)u.voice=jp;
    window.speechSynthesis.speak(u);
  }


  /* ─── SWIPE ─── */
  _initSwipe() {
    const el = document.getElementById('fcard');
    if (!el) return;
    let startX = 0, startY = 0;
    el.addEventListener('touchstart', e => {
      startX = e.touches[0].clientX;
      startY = e.touches[0].clientY;
    }, {passive: true});
    el.addEventListener('touchend', e => {
      const dx = e.changedTouches[0].clientX - startX;
      const dy = e.changedTouches[0].clientY - startY;
      if (Math.abs(dx) < 40 || Math.abs(dy) > Math.abs(dx)) return;
      if (dx < 0) this._go(1);
      else this._go(-1);
    }, {passive: true});
  }

// 练习题点击处理
window._quizClick = function(btn) {
  const qi = btn.dataset.qi;
  const container = btn.closest('.quiz-item');
  if (container.querySelector('.correct,.wrong')) return; // 已答
  const isCorrect = btn.dataset.letter === btn.dataset.ans;
  container.querySelectorAll('.quiz-opt').forEach(b => {
    if (b.dataset.letter === btn.dataset.ans) b.classList.add('correct');
    else if (b === btn) b.classList.add('wrong');
  });
  const exp = document.getElementById('qexp-'+qi);
  if (exp) exp.classList.add('show');
};
window._flipBack = function() {
  const fcard = document.getElementById('fcard');
  const back = document.getElementById('fcardBack');
  if (back) back.style.display = 'none';
  if (fcard) fcard.style.display = '';
};
