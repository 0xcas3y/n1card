(function attachSimpleLemmaPatch() {
  function waitApp() {
    if (typeof app === 'undefined' || !app || typeof app._lookupWord !== 'function') {
      return setTimeout(waitApp, 80);
    }

    if (app.__simpleLemmaPatched) return;
    app.__simpleLemmaPatched = true;

    app._simpleLemma = function(word) {
      if (!word || typeof word !== 'string') return word;
      const w = word.trim();
      if (!w) return w;

      // 已经像辞书形
      if (
        /する$/.test(w) ||
        /くる$/.test(w) ||
        /来る$/.test(w) ||
        /[うくぐすつぬぶむる]$/.test(w) ||
        /[えけげせてねべめれ][る]$/.test(w) ||
        /[いきぎしちにびみり][る]$/.test(w)
      ) {
        return w;
      }

      // する
      const suruRules = [
        ['しませんでした', 'する'],
        ['しません', 'する'],
        ['しました', 'する'],
        ['します', 'する'],
        ['しなかった', 'する'],
        ['しない', 'する'],
        ['していた', 'する'],
        ['している', 'する'],
        ['してる', 'する'],
        ['して', 'する'],
        ['した', 'する'],
      ];
      for (const [end, lemma] of suruRules) {
        if (w.endsWith(end) && w.length > end.length) {
          return w.slice(0, -end.length) + lemma;
        }
      }

      // 来る
      const kuruRules = [
        ['きませんでした', 'くる'],
        ['きません', 'くる'],
        ['きました', 'くる'],
        ['きます', 'くる'],
        ['こなかった', 'くる'],
        ['こない', 'くる'],
        ['きていた', 'くる'],
        ['きている', 'くる'],
        ['きて', 'くる'],
        ['きた', 'くる'],
        ['こられる', 'くる'],
        ['こられた', 'くる'],
      ];
      for (const [end, lemma] of kuruRules) {
        if (w.endsWith(end) && w.length > end.length) {
          return w.slice(0, -end.length) + lemma;
        }
      }

      // ます形
      const masuRules = [
        ['いました', 'う'], ['います', 'う'],
        ['きました', 'く'], ['きます', 'く'],
        ['ぎました', 'ぐ'], ['ぎます', 'ぐ'],
        ['しました', 'す'], ['します', 'す'],
        ['ちました', 'つ'], ['ちます', 'つ'],
        ['にました', 'ぬ'], ['にます', 'ぬ'],
        ['びました', 'ぶ'], ['びます', 'ぶ'],
        ['みました', 'む'], ['みます', 'む'],
        ['りました', 'る'], ['ります', 'る'],

        ['えました', 'える'], ['えます', 'える'],
        ['けました', 'ける'], ['けます', 'ける'],
        ['げました', 'げる'], ['げます', 'げる'],
        ['せました', 'せる'], ['せます', 'せる'],
        ['てました', 'てる'], ['てます', 'てる'],
        ['ねました', 'ねる'], ['ねます', 'ねる'],
        ['べました', 'べる'], ['べます', 'べる'],
        ['めました', 'める'], ['めます', 'める'],
        ['れました', 'れる'], ['れます', 'れる'],
      ];
      for (const [end, lemma] of masuRules) {
        if (w.endsWith(end) && w.length > end.length) {
          return w.slice(0, -end.length) + lemma;
        }
      }

      // ない形
      const naiRules = [
        ['わなかった', 'う'], ['わない', 'う'],
        ['かなかった', 'く'], ['かない', 'く'],
        ['がなかった', 'ぐ'], ['がない', 'ぐ'],
        ['さなかった', 'す'], ['さない', 'す'],
        ['たなかった', 'つ'], ['たない', 'つ'],
        ['ななかった', 'ぬ'], ['なない', 'ぬ'],
        ['ばなかった', 'ぶ'], ['ばない', 'ぶ'],
        ['まなかった', 'む'], ['まない', 'む'],
        ['らなかった', 'る'], ['らない', 'る'],
        ['なかった', 'る'], ['ない', 'る'], // 一段 fallback
      ];
      for (const [end, lemma] of naiRules) {
        if (w.endsWith(end) && w.length > end.length) {
          return w.slice(0, -end.length) + lemma;
        }
      }

      // て形・た形
      const taTeRules = [
        ['っていた', 'う'], ['っている', 'う'], ['ってる', 'う'], ['った', 'う'], ['って', 'う'],
        ['いていた', 'く'], ['いている', 'く'], ['いてる', 'く'], ['いた', 'く'], ['いて', 'く'],
        ['いでいた', 'ぐ'], ['いでいる', 'ぐ'], ['いでる', 'ぐ'], ['いだ', 'ぐ'], ['いで', 'ぐ'],
        ['していた', 'す'], ['している', 'す'], ['してる', 'す'], ['した', 'す'], ['して', 'す'],
        ['んでいた', 'む'], ['んでいる', 'む'], ['んでる', 'む'], ['んだ', 'む'], ['んで', 'む'],
        ['んでいた', 'ぶ'], ['んでいる', 'ぶ'], ['んでる', 'ぶ'], ['んだ', 'ぶ'], ['んで', 'ぶ'],
        ['んでいた', 'ぬ'], ['んでいる', 'ぬ'], ['んでる', 'ぬ'], ['んだ', 'ぬ'], ['んで', 'ぬ'],
        ['ていた', 'る'], ['ている', 'る'], ['てる', 'る'], ['た', 'る'], ['て', 'る'], // 一段 fallback
      ];
      for (const [end, lemma] of taTeRules) {
        if (w.endsWith(end) && w.length > end.length) {
          return w.slice(0, -end.length) + lemma;
        }
      }

      // 可能・受身・使役の軽量 fallback
      const extraRules = [
        ['られて', 'る'], ['られた', 'る'], ['られる', 'る'],
        ['れて', 'る'], ['れた', 'る'], ['れる', 'る'],
        ['せて', 'す'], ['せた', 'す'], ['せる', 'す'],
        ['させて', 'する'], ['させた', 'する'], ['させる', 'する'],
        ['てる', 'つ'], // 勝てる -> 勝つ の軽量 fallback
      ];
      for (const [end, lemma] of extraRules) {
        if (w.endsWith(end) && w.length > end.length) {
          return w.slice(0, -end.length) + lemma;
        }
      }

      return w;
    };

    const origLookup = app._lookupWord.bind(app);

    app._lookupWord = async function(surface, ev, tokenData, targetEl) {
      const lemma = (tokenData && tokenData.lemma) || this._simpleLemma(surface) || surface;

      // 给原逻辑一个 lemma
      if (tokenData && typeof tokenData === 'object') {
        tokenData = { ...tokenData, lemma };
      } else {
        tokenData = { lemma };
      }

      const result = await origLookup(surface, ev, tokenData, targetEl);

      // 原逻辑跑完后，尽量把原形写进弹层
      const kro = document.getElementById('kro');
      if (kro) {
        kro.textContent = lemma && lemma !== surface ? '原形：' + lemma : '';
      }

      // 保留到当前词对象里，方便后续保存/发音/调试
      if (this.kCur && typeof this.kCur === 'object') {
        this.kCur.lemma = lemma;
        this.kCur.surface = this.kCur.surface || surface;
      }

      return result;
    };

    console.log('[simpleLemmaPatch] attached');
  }

  waitApp();
})();
</script>
   <script>
(function restoreTTSAndWordSpeak() {
  function speakJa(text, onend) {
    if (!text) return;
    try { speechSynthesis.cancel(); } catch(e) {}
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'ja-JP';
    u.onend = function () {
      if (typeof onend === 'function') onend();
    };
    speechSynthesis.speak(u);
  }

  function bindSentenceTTS() {
    document.querySelectorAll('.exb').forEach(el => {
      if (el.__sentenceTTSBound) return;
      el.__sentenceTTSBound = true;

      el.style.cursor = 'pointer';

      el.addEventListener('click', function (e) {
        // 点到词本身时，不触发整句朗读
        if (e.target.closest('.kword') || e.target.closest('.fw')) return;

        document.querySelectorAll('.exb.playing').forEach(x => {
          x.classList.remove('playing');
        });

        el.classList.add('playing');

        // 优先取日文句子
        const ft = el.querySelector('.ft');
        const plain = el.querySelector('.plain-ex');
        const text = (ft ? ft.textContent : (plain ? plain.textContent : el.innerText)).trim();

        speakJa(text, () => {
          el.classList.remove('playing');
        });
      });
    });
  }

  function bindPopupSpeak() {
    const btn = document.getElementById('kspeak');
    if (!btn || btn.__popupSpeakBound) return;
    btn.__popupSpeakBound = true;

    btn.addEventListener('click', function (e) {
      e.stopPropagation();

      let text = '';
      if (window.app && app.kCur) {
        text = app.kCur.reading || app.kCur.lemma || app.kCur.word || '';
      }

      if (!text) {
        const kr = document.getElementById('kr');
        const kro = document.getElementById('kro');
        const kw = document.getElementById('kw');
        text =
          (kr && kr.textContent && kr.textContent !== '—' ? kr.textContent : '') ||
          ((kro && kro.textContent || '').replace(/^原形：/, '')) ||
          (kw ? kw.textContent : '');
      }

      speakJa(text);
    });
  }

  function patchLookupWord() {
    if (typeof app === 'undefined' || !app || typeof app._lookupWord !== 'function') return;
    if (app.__lookupWordSpeakPatched) return;
    app.__lookupWordSpeakPatched = true;

    const origLookup = app._lookupWord.bind(app);

    app._lookupWord = async function(surface, ev, tokenData, targetEl) {
      const result = await origLookup(surface, ev, tokenData, targetEl);

      // 查词弹层打开后，重新绑定🔊
      setTimeout(() => {
        bindPopupSpeak();

        // 如果当前词对象没有 lemma，就补一个轻量原形
        if (this.kCur && !this.kCur.lemma && typeof this._simpleLemma === 'function') {
          this.kCur.lemma = this._simpleLemma(surface);
        }
      }, 0);

      return result;
    };
  }

  function injectPlayingStyle() {
    if (document.getElementById('playing-style-patch')) return;
    const style = document.createElement('style');
    style.id = 'playing-style-patch';
    style.textContent = `
      .exb.playing{
        border-color:#6dc9a8 !important;
        box-shadow:0 0 0 2px rgba(109,201,168,.14) !important;
        background:rgba(109,201,168,.06) !important;
      }
    `;
    document.head.appendChild(style);
  }

  function boot() {
    injectPlayingStyle();
    bindSentenceTTS();
    bindPopupSpeak();
    patchLookupWord();

    // 页面翻页/切换/重渲染后自动补绑
    if (!window.__ttsObserverAdded) {
      window.__ttsObserverAdded = true;
      const observer = new MutationObserver(() => {
        bindSentenceTTS();
        bindPopupSpeak();
      });
      observer.observe(document.body, { childList: true, subtree: true });
    }
  }

  function wait() {
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', boot, { once: true });
    } else {
      boot();
    }
  }

  wait();
})();

// 练习题点击处理
window._quizClick = function(btn) {
  const qi = btn.dataset.qi;
  const container = btn.closest('.quiz-item');
  if (container.querySelector('.correct,.wrong')) return; // 已答
  const isCorrect = btn.dataset.letter === btn.dataset.ans;
  container.querySelectorAll('.quiz-opt').forEach(b => {
    if (b.dataset.letter === btn.dataset.ans) b.classList.add('correct');
    else if (b === btn) b.classList.add('wrong');
  });
  const exp = document.getElementById('qexp-'+qi);
  if (exp) exp.classList.add('show');
};
window._flipBack = function() {
  const fcard = document.getElementById('fcard');
  const back = document.getElementById('fcardBack');
  if (back) back.style.display = 'none';
  if (fcard) fcard.style.display = '';
};
