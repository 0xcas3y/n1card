<script>
const N2_BACK = {"1": {"analysis": "「～につき」是书面语专用的理由表达，多用于公告、通知等正式场合，表示客观的理由或原因。相比口语的「～から」，语感更加正式庄重，常见于「工事中につき」「都合により」等固定搭配中。", "mistakes": "❌ 雨が降っているにつき、試合を中止します → ✅ 雨のため、試合を中止します（口语场合不用につき）；❌ 病気につき休みます → ✅ 病気のため休みます（个人请假等非正式场合避免使用）", "similar": [{"form": "～のため", "diff": "につき更书面正式，のため可用于口语"}, {"form": "～により", "diff": "により强调手段方法，につき强调理由原因"}, {"form": "～から", "diff": "から是口语，につき是书面语专用"}], "quiz": [{"q": "台風接近____、本日の授業は休講とします。", "opts": ["A.につき", "B.について", "C.に対して", "D.において"], "ans": "A", "exp": "表示台风接近这一客观理由，书面通知用「につき」"}, {"q": "設備点検中____、エレベーターはご利用できません。", "opts": ["A.に関して", "B.につき", "C.に向けて", "D.に際して"], "ans": "B", "exp": "设备检查是客观原因，正式通告用「につき」"}, {"q": "個人的な都合____、今日は早退させていただきます。", "opts": ["A.につき", "B.により", "C.のため", "D.について"], "ans": "B", "exp": "个人请假等场合，「により」比「につき」更自然适当"}]}, "2": {"analysis": "「～を問わず」表示不区分对待、不加区别的意思，常用于正式场合或规定中。与「～に関係なく」相比，语感更正式、更强调制度性的一视同仁。多用于年龄、性别、国籍等可明确分类的属性，体现公平公正的态度。", "mistakes": "易错点：不能用于主观情感或抽象概念。❌ 気持ちを問わず参加する → ✅ 気持ちに関係なく参加する。「を問わず」只能用于客观可分类的属性，主观状态用「に関係なく」。", "similar": [{"form": "～に関係なく", "diff": "「を問わず」更正式，多用于规定；「に関係なく」更口语化，使用范围更广"}, {"form": "～にかかわらず", "diff": "「を問わず」强调不区分对待；「にかかわらず」强调不受影响或妨碍"}], "quiz": [{"q": "経験____、新人を歓迎します。", "opts": ["A.を問わず", "B.に問わず", "C.と問わず", "D.で問わず"], "ans": "A", "exp": "「経験を問わず」是固定搭配，表示不管有无经验都欢迎"}, {"q": "国籍や宗教____、全ての人に平等な権利がある。", "opts": ["A.に関して", "B.を問わず", "C.について", "D.として"], "ans": "B", "exp": "强调不区分国籍宗教，一律平等对待，用「を問わず」最合适"}, {"q": "この商品は男女____人気があります。", "opts": ["A.を問わず", "B.に限らず", "C.だけでなく", "D.ばかりでなく"], "ans": "A", "exp": "「男女を問わず」表示不分男女都有人气，是常用表达"}]}, "3": {"analysis": "「～に限り」表示严格的时间、对象、条件限定，带有正式、郑重的语感，常用于商业、公告等正式场合。与「だけ」相比更加庄重，强调限定范围的绝对性和排他性。", "mistakes": "❌今日に限って、送料無料です → ✅本日に限り、送料無料です（「に限り」不能用「て形」；正式场合用「本日」更得体）", "similar": [{"form": "～だけ", "diff": "「に限り」更正式庄重，「だけ」更口语化随意"}, {"form": "～のみ", "diff": "「に限り」强调排他性限定，「のみ」单纯表示唯一性"}, {"form": "～に限って", "diff": "「に限って」表示偏偏、恰好，「に限り」表示仅限于"}], "quiz": [{"q": "会員____、特別価格で提供いたします。", "opts": ["A.に限り", "B.だけで", "C.ばかり", "D.しか"], "ans": "A", "exp": "正式商业场合的限定表达用「に限り」最合适"}, {"q": "この商品は数量____販売しております。", "opts": ["A.に限り", "B.限定で", "C.を限って", "D.限りで"], "ans": "B", "exp": "「数量限定で」是固定搭配，表示限量销售"}, {"q": "お一人様一点____とさせていただきます。", "opts": ["A.に限り", "B.だけに", "C.のみで", "D.ばかり"], "ans": "A", "exp": "购买限制的正式表达用「に限り」，体现郑重感"}]}, "4": {"analysis": "「〜に応じて」表示根据某种标准或情况的变化而相应地调整或改变，强调适应性和灵活性。与「〜に従って」相比，更突出「对应变化」的动态感，常用于能力、需求、状况等会变化的事物。语感上显得更加专业和正式。", "mistakes": "❌年齢に応じた → ✅年齢に応じて（应じて是副词形，不能直接修饰名词）❌能力に応じた指導をする → ✅能力に応じて指導をする/能力に応じた指導（要么用副词形修饰动词，要么用连体形修饰名词）", "similar": [{"form": "〜に従って", "diff": "従って强调遵循既定规则，応じて强调灵活对应变化"}, {"form": "〜に合わせて", "diff": "合わせて侧重主动迎合，応じて更客观地根据情况调整"}, {"form": "〜によって", "diff": "によって表示手段方法，応じて表示根据标准进行相应调整"}], "quiz": [{"q": "収入（____）、税金を払います。", "opts": ["A.に応じて", "B.について", "C.に対して", "D.において"], "ans": "A", "exp": "根据收入多少缴纳相应税金，体现对应变化关系"}, {"q": "天候（____）、イベントの内容を変更します。", "opts": ["A.によると", "B.に応じて", "C.に関して", "D.に向けて"], "ans": "B", "exp": "根据天气情况相应调整活动内容，强调灵活应对"}, {"q": "経験（____）、給料が決まります。", "opts": ["A.に基づいて", "B.に応じて", "C.に反して", "D.に関わらず"], "ans": "B", "exp": "根据经验多少决定相应工资，体现按标准对应调整"}]}, "5": {"analysis": "「～次第」表示某个动作完成后立即进行下一个动作，强调时间上的紧密衔接和即时性。常用于正式场合，带有郑重的语感，多用于表示计划或承诺。与「～たらすぐ」相比，「～次第」更加书面化，常见于商务、公告等正式文体中。", "mistakes": "❌ 到着次第で連絡します → ✅ 到着次第連絡します（「次第」后不加「で」）；❌ 結果を知った次第、報告します → ✅ 結果を知り次第、報告します（用ます形去掉ます，不用た形）", "similar": [{"form": "～たらすぐ", "diff": "「次第」更正式书面，「たらすぐ」更口语化"}, {"form": "～や否や", "diff": "「や否や」更强调瞬间性，多用于文学表现"}, {"form": "～とすぐに", "diff": "「とすぐに」偏口语，「次第」更郑重正式"}], "quiz": [{"q": "会議が終わり____、資料を配布いたします。", "opts": ["A.次第", "B.次第で", "C.次第に", "D.次第と"], "ans": "A", "exp": "「～次第」は助詞を付けずに使用する"}, {"q": "試験の結果が____連絡します。", "opts": ["A.出た次第", "B.出次第", "C.出る次第", "D.出て次第"], "ans": "B", "exp": "動詞のます形からますを取った形に次第を付ける"}, {"q": "詳細が____お知らせいたします。", "opts": ["A.決まる次第", "B.決まった次第", "C.決まり次第", "D.決める次第"], "ans": "C", "exp": "「決まります」から「ます」を取って「決まり次第」となる"}]}, "6": {"analysis": "「～向け」表示以某个特定群体或对象为目标，强调针对性和方向性。常用于商品、服务、内容的定位描述，语感正式且客观。与中文「面向～」「针对～」对应，多用于书面语和商业场合。", "mistakes": "❌ 子供向けに本を買った → ✅ 子供向けの本を買った（向け后直接接名词，不用に）；❌ 学生向けで教える → ✅ 学生向けに教える（表示动作方向用に）", "similar": [{"form": "～に対して", "diff": "対して强调面对面的关系，向け强调目标导向"}, {"form": "～用", "diff": "用强调用途功能，向け强调目标群体"}, {"form": "～宛て", "diff": "宛て专指邮寄地址等具体对象，向け指抽象目标群体"}], "quiz": [{"q": "この雑誌は主に女性____作られています。", "opts": ["A. 向けに", "B. 向けで", "C. 向けを", "D. 向けと"], "ans": "A", "exp": "表示动作的方向性用「向けに」"}, {"q": "____向けの商品が最近よく売れている。", "opts": ["A. 老人", "B. 高齢者", "C. お年寄り", "D. 年上"], "ans": "B", "exp": "高齢者是正式的表达，适合商业语境"}, {"q": "海外____日本語教材を開発中です。", "opts": ["A. 向けの", "B. 向けに", "C. 向けを", "D. 向けで"], "ans": "A", "exp": "修饰名词用「向けの」"}]}, "7": {"analysis": "「〜にあたり／にあたって」表示在重要场合或转折点的正式表达，强调时机的重要性和庄重感。多用于商务、仪式等正式场合的开场白或重要节点的表态。与一般的时间表达不同，它带有特殊意义和仪式感。", "mistakes": "❌ 毎日学校に行くにあたって → ✅ 毎日学校に行くとき（日常行为不用此文法）；❌ 卒業するにあたり → ✅ 卒業するにあたって（动词多用「にあたって」）", "similar": [{"form": "〜に際して", "diff": "几乎同义，但「に際して」更正式，「にあたって」使用频率更高"}, {"form": "〜とき", "diff": "一般时间，无特殊庄重感"}, {"form": "〜に当たり", "diff": "汉字写法，意思完全相同"}], "quiz": [{"q": "新年度____、社員一同気持ちを新たにします。", "opts": ["A.になって", "B.にあたり", "C.について", "D.において"], "ans": "B", "exp": "新年度开始是重要时机，用「にあたり」表示庄重感"}, {"q": "この____開店にあたって、特別セールを行います。", "opts": ["A.たび", "B.とき", "C.度", "D.際"], "ans": "A", "exp": "「このたび」（这次）常与「にあたって」搭配，表示正式语气"}, {"q": "プロジェクト完成にあたって、関係者に____いたします。", "opts": ["A.感謝", "B.お礼", "C.謝意", "D.感謝の意を表し"], "ans": "D", "exp": "正式场合用「感謝の意を表する」，与「にあたって」的庄重语气相符"}]}, "8": {"analysis": "「～こと」在规则・指示的书面语中表示「必须～」「应该～」的意思，相当于命令句的书面表达。「～のこと」则用于表示「关于～的事情」「～这件事」，多用于谈论某个话题或事项。两者都是书面语，但语感和用途不同。", "mistakes": "❌廊下を走ってはいけないこと → ✅廊下を走らないこと（规则指示用否定辞书形+こと）❌彼のことを聞いたこと → ✅彼のことを聞いた（谈论某人不用こと结尾）", "similar": [{"form": "～てはいけない", "diff": "口语禁止表达，～こと更正式书面"}, {"form": "～について", "diff": "のこと更强调具体事项，について更抽象"}], "quiz": [{"q": "学校の規則：教室で食事を____。", "opts": ["A.しないこと", "B.してはいけない", "C.しなければならない", "D.するな"], "ans": "A", "exp": "学校规则的书面表达用「しないこと」"}, {"q": "昨日の会議____、詳しく教えてください。", "opts": ["A.こと", "B.のこと", "C.について", "D.に関して"], "ans": "B", "exp": "「のこと」表示关于某个具体事项"}, {"q": "図書館での注意事項：本を____こと。", "opts": ["A.返す", "B.返して", "C.返した", "D.返そう"], "ans": "A", "exp": "规则指示用辞书形+こと的形式"}]}, "37": {"analysis": "「～きり」表示某动作发生后状态持续至今，强调「那之后就没有变化」的语感。常用于描述人际关系中断、物品放置不动等情况，带有一定的遗憾或无奈色彩。与中文「自从...之后就...」相近，但更强调状态的持续性和不变性。", "mistakes": "❌ 昨日食べたきり、何も食べていません → ✅ 昨日食べたきり、何も食べていません（正确，表示昨天吃过之后就没再吃）。注意不要与「～だけ」的限定用法混淆，「きり」强调时间的持续性而非数量限制。", "similar": [{"form": "～まま", "diff": "「まま」强调保持原状，「きり」强调那之后没有变化"}, {"form": "～っぱなし", "diff": "「っぱなし」强调放任不管的状态，「きり」更中性客观"}], "quiz": [{"q": "彼は3年前に故郷を出た____、帰ってこない。", "opts": ["A.きり", "B.まま", "C.ばかり", "D.だけ"], "ans": "A", "exp": "表示3年前离开故乡后就没回来过，强调时间持续性用「きり」"}, {"q": "この本は一度読んだ____、もう開いていない。", "opts": ["A.ばかり", "B.きり", "C.ところ", "D.ほど"], "ans": "B", "exp": "表示读过一次后就再没打开过，用「きり」表示那之后的状态持续"}, {"q": "母からの手紙は去年もらった____、その後は何の音沙汰もない。", "opts": ["A.だけ", "B.ほど", "C.きり", "D.くらい"], "ans": "C", "exp": "表示去年收到母亲来信后就没有任何消息，「きり」强调那之后没有变化的状态"}]}, "9": {"analysis": "「以来」表示从某个过去的时点开始，某种状态或行为一直持续到现在，强调连续性和持久性。多用于正式场合，带有回顾性的语感，常与「ずっと」「全然」等副词搭配使用。", "mistakes": "❌ 来日本以来、日本語を勉強したい → ✅ 来日本以来、日本語を勉強している（以来后面应该用持续性的表达，不能用意志形）", "similar": [{"form": "〜てから", "diff": "「てから」仅表示时间顺序，「以来」强调持续性"}, {"form": "〜から", "diff": "「から」表示起点，「以来」更强调从那时起至今的连续状态"}], "quiz": [{"q": "彼と知り合って____、親友です。", "opts": ["A.以来", "B.以前", "C.以後", "D.以内"], "ans": "A", "exp": "表示从认识他开始一直到现在都是好朋友，用「以来」"}, {"q": "事故____、車の運転が怖くなった。", "opts": ["A.以前", "B.以来", "C.以外", "D.以下"], "ans": "B", "exp": "从事故发生后一直持续害怕开车的状态"}, {"q": "結婚以来、____料理を作っている。", "opts": ["A.時々", "B.たまに", "C.ずっと", "D.急に"], "ans": "C", "exp": "「以来」强调持续性，最适合搭配「ずっと」"}]}, "10": {"analysis": "「〜をはじめ（として）」用于列举多个事物时，以最具代表性或最重要的事物作为开头例子，暗示还有其他同类事物。常用于正式场合，表达范围的广泛性。与中文「以〜为首」「包括〜在内」相对应，强调代表性和包含关系。", "mistakes": "❌田中をはじめ、私も参加した。→ ✅田中をはじめ、多くの学生が参加した。原因：应该列举同类多个事物，不能只提一个追加例子。❌日本をはじめとして韓国で人気だ。→ ✅日本をはじめとして韓国、中国でも人気だ。原因：需要明确表示多个同类事物。", "similar": [{"form": "〜など", "diff": "「など」更随意，「をはじめ」更正式且强调代表性"}, {"form": "〜といった", "diff": "「といった」侧重列举典型例子，「をはじめ」强调以重要例子为首"}, {"form": "〜をはじめとする", "diff": "「をはじめとする」后接名词修饰，「をはじめ」后直接接句子"}], "quiz": [{"q": "中国____多くの国でこの商品が売られている。", "opts": ["A.をはじめ", "B.をはじめに", "C.をはじめた", "D.をはじめる"], "ans": "A", "exp": "表示以中国为 pts": ["A.ながらに", "B.ながらで", "C.ながら", "D.ながらと"], "ans": "C", "exp": "形容词＋ながら的基本用法，表示虽然小但很有活力"}, {"q": "学生____、アルバイトで生活費を稼いでいる。", "opts": ["A.ながら", "B.でありながら", "C.としながら", "D.になりながら"], "ans": "B", "exp": "名词需要用「でありながら」的形式，表示虽然是学生身份但要打工赚生活费"}]}, "16": {"analysis": "「～をきっかけに」表示以某个事件或机会为契机，由此引发了新的变化或开始了新的行动。强调转折点的作用，后续内容通常是积极的变化。多用于回顾性叙述，语感较为正式。", "mistakes": "❌友達に誘われたをきっかけに、テニスを始めた。→ ✅友達に誘われたことをきっかけに、テニスを始めた。（动词过去式后需加「こと」）", "similar": [{"form": "～がきっかけで", "diff": "更口语化，「で」比「に」语感更轻松自然"}, {"form": "～をもとに", "diff": "强调以某事为基础或根据，不含转机意味"}, {"form": "～によって", "diff": "表示原因手段，不强调契机的转折性"}], "quiz": [{"q": "友人の紹介____、この会社に入社しました。", "opts": ["A.をきっかけに", "B.をきっかけで", "C.がきっかけに", "D.できっかけに"], "ans": "A", "exp": "名词后直接接「をきっかけに」"}, {"q": "病気になった____、健康の大切さがわかった。", "opts": ["A.をきっかけに", "B.ことをきっかけに", "C.のをきっかけに", "D.というをきっかけに"], "ans": "B", "exp": "动词过去式+ことをきっかけに的形式"}, {"q": "彼との出会い____人生が変わりました。", "opts": ["A.できっかけに", "B.にきっかけを", "C.をきっかけに", "D.からきっかけに"], "ans": "C", "exp": "名词+をきっかけに表示以此为契机"}]}, "17": {"analysis": "「～からには」表示基于已确定的事实或状态，自然产生的义务、责任或决心。与单纯的因果关系不同，它强调说话人的主观态度和道德责任感。常用于表达决心、承诺或对他人的期待，语感较为郑重和正式。", "mistakes": "易错点：不要与单纯的原因理由混淆。❌「雨が降ったからには、傘を持った」→ ✅「雨が降ったから、傘を持った」。「からには」不用于客观事实的简单因果，而用于主观的义务决心。", "similar": [{"form": "～以上（は）", "diff": "更正式，多用于书面语，强调客观义务"}, {"form": "～上は", "diff": "语感稍轻，多用于口语，强调处境导致的必然性"}, {"form": "～からは", "diff": "只表示时间起点，无义务决心含义"}], "quiz": [{"q": "日本に留学に来た____、日本語をマスターしたい。", "opts": ["A.からには", "B.ために", "C.ので", "D.けれど"], "ans": "A", "exp": "表示既然来留学就有掌握日语的决心，体现主观义务感"}, {"q": "プロになる____、毎日練習を続けなければならない。", "opts": ["A.ので", "B.から", "C.からには", "D.ために"], "ans": "C", "exp": "既然要成为职业选手，就有持续练习的义务和决心"}, {"q": "約束した____、必ず守ります。", "opts": ["A.から", "B.ので", "C.ために", "D.からには"], "ans": "D", "exp": "既然约定了，就有遵守的义务，体现说话人的决心和责任感"}]}, "18": {"analysis": "「～以上は/上は」表示既成事实基础上的逻辑必然性，强调「既然已经这样，就理应那样」。常用于表达责任、义务或决心，语感庄重正式。与中文「既然...就...」相似，但更强调道德责任感。", "mistakes": "❌日本に来た以上、日本語を勉強しなければならない → ✅日本に来た以上は、日本語をしっかり勉強すべきだ。原因：「以上は」比「以上」语气更强，且后项多用「べきだ/なければならない」等表义务的表达", "similar": [{"form": "～からには", "diff": "同样表逻辑必然，但「からには」更强调说话人的决心意志"}, {"form": "～限り", "diff": "「限り」侧重条件持续期间，「以上は」侧重既成事实的后果"}, {"form": "～て以来", "diff": "「て以来」表时间起点，「以上は」表逻辑起点"}], "quiz": [{"q": "プロになった____は、ファンを裏切るわけにはいかない。", "opts": ["A.以上", "B.以上は", "C.上で", "D.上に"], "ans": "B", "exp": "既成事实「プロになった」的逻辑后果，用「以上は」强调责任"}, {"q": "一度約束した____、必ず守らなければならない。", "opts": ["A.上は", "B.以上に", "C.以上は", "D.限り"], "ans": "C", "exp": "「約束した」这一既成事实导致的义务，「以上は」最恰当"}, {"q": "この仕事を____、最後まで頑張ります。", "opts": ["A.引き受けた以上は", "B.引き受ける以上は", "C.引き受けて以上は", "D.引き受けた上で"], "ans": "A", "exp": "過去完了的既成事实「引き受けた」+「以上は」表决心"}]}, "19": {"analysis": "「わけではない」表示部分否定，用于澄清误解或避免绝对化表达。不是完全否定某事，而是否定某种理解或推测，常含有「并非如你所想的那样」的语感。多用于解释、辩解或委婉表达场合。", "mistakes": "❌ 彼は馬鹿わけではない → ✅ 彼は馬鹿なわけではない（形容动词需要用连体形「な」）；❌ 行かないわけではない → ✅ 行かないわけでもない（否定句后常用「でもない」更自然）", "similar": [{"form": "～というわけではない", "diff": "更强调「并不是说～」，语气更郑重"}, {"form": "～わけでもない", "diff": "用于否定句，表示「也不是不～」"}, {"form": "～とは限らない", "diff": "表示「不一定」，强调例外可能性"}], "quiz": [{"q": "彼女は美人____、性格もいい。", "opts": ["A.なわけではないが", "B.というわけでもないし", "C.だというわけだし", "D.なわけだし"], "ans": "D", "exp": "「わけだし」表示理由或理所当然，符合「既漂亮性格又好」的逻辑"}, {"q": "お金がない____、ただ節約したいだけです。", "opts": ["A.わけでもない", "B.わけではない", "C.というわけでもない", "D.わけだ"], "ans": "B", "exp": "否定误解「不是没钱」，用「わけではない」最恰当"}, {"q": "勉強しない____、時間がないんです。", "opts": ["A.わけではない", "B.わけでもない", "C.というわけではない", "D.わけだ"], "ans": "A", "exp": "澄清「并不是不学习」的误解，解释真实原因是没时间"}]}, "20": {"analysis": "「～ことなく」表示在不做某事的状态下进行其他动作，常用于书面语中强调坚持或持续性。与口语「～ないで」相比，语感更加正式、庄重，多用于描述克服困难、坚持不懈的场面。", "mistakes": "❌ 休憩することなく働いている → ✅ 休憩することなく働き続けている。理由：「ことなく」多与表示持续的动词搭配，如「続ける」「進む」等", "similar": [{"form": "～ないで", "diff": "口语表达，日常对话中使用"}, {"form": "～ずに", "diff": "书面语，但比「ことなく」稍显古典"}, {"form": "～なしに", "diff": "强调完全没有某物或某事"}], "quiz": [{"q": "彼は一度も____、最後まで走り抜いた。", "opts": ["A. 止まることなく", "B. 止まらないで", "C. 止まることを", "D. 止まるなく"], "ans": "A", "exp": "书面语场景下「ことなく」比「ないで」更合适"}, {"q": "____進歩し続けることが大切だ。", "opts": ["A. 諦めないことなく", "B. 諦めることなく", "C. 諦めることを", "D. 諦めなくて"], "ans": "B", "exp": "动词辞书形+ことなく的正确接续形式"}, {"q": "____この問題を解決した。", "opts": ["A. 誰にも相談しないことなく", "B. 誰にも相談することなく", "C. 誰にも相談せずことなく", "D. 誰にも相談なくて"], "ans": "B", "exp": "「相談する」的辞书形+ことなく，表示没有商量就解决了问题"}]}, "21": {"analysis": "「～にもかかわらず」是书面语色彩浓厚的逆接表达，比「～のに」更正式庄重。强调前后对比的意外性和矛盾性，常用于描述克服困难、违背常理的情况。多见于新闻报道、论文等正式文体中，表达说话人对结果的意外感。", "mistakes": "❌ 雨が降っているにもかかわらず → ✅ 雨にもかかわらず（名词直接+にもかかわらず，不需要连体形修饰）❌ 彼は学生にもかかわらず、お金持ちだ → ✅ 彼は学生であるにもかかわらず、お金持ちだ（名词需要加「である」）", "similar": [{"form": "～のに", "diff": "口语化，情感色彩更强，带有不满、遗憾的语气"}, {"form": "～ものの", "diff": "书面语，但语气相对温和，不强调意外性"}, {"form": "～といえども", "diff": "更文语化，多用于「たとえ～といえども」句型中"}], "quiz": [{"q": "大雨____、試合は予定通り行われた。", "opts": ["A.であるにもかかわらず", "B.にもかかわらず", "C.をにもかかわらず", "D.がにもかかわらず"], "ans": "B", "exp": "名词「大雨」直接+「にもかかわらず」，不需要其他助词或连接词"}, {"q": "彼は初心者____、とても上手に弾けた。", "opts": ["A.にもかかわらず", "B.であるにもかかわらず", "C.をにもかかわらず", "D.のにもかかわらず"], "ans": "B", "exp": "名词「初心者」+「にもかかわらず」时需要加「である」成为「であるにもかかわらず」"}, {"q": "体調が悪い____、彼女は仕事を続けた。", "opts": ["A.であるにもかかわらず", "B.をにもかかわらず", "C.にもかかわらず", "D.がにもかかわらず"], "ans": "C", "exp": "形容词「体調が悪い」是普通形，直接+「にもかかわらず」"}]}, "22": {"analysis": "「～を～として」表示将某事物设定为特定的立场、身份或角色进行行动。核心语义是「指定・定位」，强调主观的设定和安排。「として」表示以某种身份或资格，「とした」是过去形，「とする」是意志形或客观陈述。常用于正式场合，表达明确的定位关系。", "mistakes": "❌ 彼を先生を友達として付き合う → ✅ 彼を友達として付き合う（一个句子中不能出现两个を）。❌ 日本語を勉強をテーマとして → ✅ 日本語の勉強をテーマとして（第一个名词后不能用を）", "similar": [{"form": "～にとって", "diff": "表示对某人而言的评价，不表示身份设定"}, {"form": "～という立場で", "diff": "更直接表示立场，として更抽象化"}, {"form": "～の資格で", "diff": "强调正式资格，として范围更广"}], "quiz": [{"q": "この問題____重要な課題____、みんなで話し合いましょう。", "opts": ["A. は・について", "B. を・として", "C. が・により", "D. に・によって"], "ans": "B", "exp": "表示将问题设定为重要课题的身份来讨论，用「を～として」"}, {"q": "彼女は通訳____働いている。", "opts": ["A. として", "B. について", "C. によって", "D. に対して"], "ans": "A", "exp": "表示以通译的身份工作，使用「として」"}, {"q": "安全____最優先____考えるべきだ。", "opts": ["A. が・で", "B. を・として", "C. は・に", "D. に・を"], "ans": "B", "exp": "表示将安全设定为最优先来考虑，用「を～として」"}]}, "23": {"analysis": "「～限り」表示在某种条件或范围内的限定，具有两个核心语义：①表示范围限定「在~范围内」，如「知る限り（就所知范围）」；②表示条件「只要~/除非~」，带有强烈的条件制约感。语感上比单纯的条件句更强调边界性和绝对性。", "mistakes": "易与「～間（あいだ）」混淆。❌「私がいる間、静かにしてください」→ ✅「私がいる限り、君を守る」。「間」表时间段，「限り」强调条件的绝对性和持续性。另外「でない限り」中容易遗漏「で」：❌「雨降らない限り」→ ✅「雨が降らない限り」。", "similar": [{"form": "～以上（は）", "diff": "「限り」强调范围边界，「以上」强调责任义务"}, {"form": "～間（は）", "diff": "「限り」表条件持续，「間」仅表时间段"}, {"form": "～うちに", "diff": "「限り」表条件绝对性，「うちに」表机会时机"}], "quiz": [{"q": "私が生きている____、この秘密は誰にも言わない。", "opts": ["A. 間", "B. 限り", "C. うちに", "D. 以上"], "ans": "B", "exp": "表示条件的持续性和绝对性，「生きている限り」表示只要活着这个条件持续，就会坚持某种行为"}, {"q": "彼女が____限り、このプロジェクトは成功するだろう。", "opts": ["A. 参加する", "B. 参加した", "C. 参加して", "D. 参加すれば"], "ans": "A", "exp": "「～限り」接动词辞书形，表示条件。「参加する限り」表示只要参加这个条件成立"}, {"q": "雨が降ら____限り、明日のイベントは予定通り行います。", "opts": ["A. ない", "B. なかった", "C. ず", "D. ん"], "ans": "A", "exp": "「でない限り」表示「除非~」，接动词ない形。「降らない限り」表示除非下雨，否则按计划进行"}]}, "24": {"analysis": "「～ざるを得ない」表示不情愿但被迫必须做某事的无奈心情，语感正式且带有强烈的被动色彩。与「～なければならない」相比，更强调说话人的不情愿和无可奈何的情感。多用于书面语和正式场合，表达客观情势所迫的必要性。", "mistakes": "❌ 行かざるを得ません → ✅ 行かざるを得ない（固定表达不用敬语形）；❌ するざるを得ない → ✅ せざるを得ない（する的否定形是しない，去掉ない变成し，再加ざる）", "similar": [{"form": "～なければならない", "diff": "单纯表义务，～ざるを得ない强调不情愿的被迫感"}, {"form": "～ないわけにはいかない", "diff": "强调社会责任义务，～ざるを得ない强调客观条件所迫"}, {"form": "～しかない", "diff": "表示唯一选择，～ざるを得ない强调无奈被迫的情感"}], "quiz": [{"q": "親が病気になったので、故郷に____。", "opts": ["A. 帰らざるを得ない", "B. 帰らざるを得ません", "C. 帰るざるを得ない", "D. 帰りざるを得ない"], "ans": "A", "exp": "动词否定形去掉ない加ざるを得ない，且此文法不用敬语形"}, {"q": "証拠が見つかって、彼は真実を____。", "opts": ["A. 話すざるを得ない", "B. 話さざるを得ない", "C. 話しざるを得ない", "D. 話ざるを得ない"], "ans": "B", "exp": "話す的否定形是話さない，去掉ない变成話さ，加ざるを得ない"}, {"q": "時間がないので、タクシーを____。", "opts": ["A. 使うざるを得ない", "B. 使いざるを得ない", "C. 使わざるを得ない", "D. 使えざるを得ない"], "ans": "C", "exp": "使う的否定形是使わない，去掉ない变成使わ，加ざるを得ない"}]}, "25": {"analysis": "「～というものでもない」表示对某种绝对化的观点进行否定，强调事情并非绝对如此。这个文法带有理性分析的语感，常用于反驳过于简单化的判断。与单纯的否定不同，它承认某种可能性的存在，但否定其绝对性，体现了日语中谦逊、客观的表达习惯。", "mistakes": "❌ 彼は悪い人というものでもない。→ ✅ 彼は悪い人というわけでもない。原因：描述人的性格时，用「というわけでもない」更自然。❌ 雨が降るというものでもない。→ ✅ 必ずしも雨が降るとは限らない。原因：对单纯事实的推测，不适合用此文法。", "similar": [{"form": "～というわけでもない", "diff": "语气更轻松随意，常用于日常对话中的否定"}, {"form": "～とは限らない", "diff": "更直接地表示「不一定」，没有反驳既有观点的语感"}, {"form": "必ずしも～ない", "diff": "更书面化，强调「不一定」「未必」的客观判断"}], "quiz": [{"q": "お金があれば幸せ____。", "opts": ["A. というものでもない", "B. とは限らない", "C. というわけでもない", "D. 以上都可以"], "ans": "A", "exp": "否定「金钱=幸福」这种绝对化观点，用「というものでもない」最合适"}, {"q": "今日は晴れる____ですね。", "opts": ["A. というものでもない", "B. とは限らない", "C. というわけでもない", "D. ものではない"], "ans": "B", "exp": "对天气的客观推测用「とは限らない」，不是反驳观点"}, {"q": "高学歴だからといって、仕事ができる____。", "opts": ["A. ものでもない", "B. わけでもない", "C. というものでもない", "D. とも限らない"], "ans": "C", "exp": "否定「高学历=工作能力强」的绝对化观点，「というものでもない」最恰当"}]}, "26": {"analysis": "「～はともかく」表示暂时搁置或不讨论某个方面，强调重点转向其他更重要的部分。常用于对比两个方面时，先承认一方面存在问题或不确定性，然后转向强调另一方面的情况。语感上带有「先不管这个」的意味，显得客观理性。", "mistakes": "❌ 彼の性格がともかく、仕事はよくできる → ✅ 彼の性格はともかく、仕事はよくできる（必须用「は」标示主题）；❌ 今日はともかく明日行く → ✅ 今日はともかく、明日は行く（需要逗号分隔，且后项要有对比性表述）", "similar": [{"form": "～はさておき", "diff": "更正式，多用于书面语，语气更强烈"}, {"form": "～は別として", "diff": "强调完全排除在外，不予考虑"}, {"form": "～はどうあれ", "diff": "表示无论如何，带有不在意的语感"}], "quiz": [{"q": "外見____、彼女は本当に優しい人だ。", "opts": ["A.がともかく", "B.はともかく", "C.をともかく", "D.にともかく"], "ans": "B", "exp": "「はともかく」固定用法，用「は」标示要搁置的话题"}, {"q": "お金____、時間がない。", "opts": ["A.はともかく", "B.をともかく", "C.がともかく", "D.でともかく"], "ans": "A", "exp": "表示「钱的问题先不说，时间不够」，用「はともかく」"}, {"q": "味____として、この店の雰囲気はいいですね。", "opts": ["A.がともかく", "B.をともかく", "C.はともかく", "D.でともかく"], "ans": "C", "exp": "「味はともかく（として）」表示味道先不论，重点说氛围好"}]}, "27": {"analysis": "「～かねない」表示某种不好的事情有可能发生，带有说话者的担忧或警告语气。与单纯表示可能性的表达不同，这个文法专门用于负面情况，含有「如果不注意就会...」的警示意味。常用于提醒对方注意潜在风险。", "mistakes": "❌ 天気がよくて、ピクニックに行きかねない。→ ✅ 天気がよくて、ピクニックに行くかもしれない。（かねない只用于负面情况，好事不能用） ❌ 勉強しないと、不合格にかねない。→ ✅ 勉強しないと、不合格になりかねない。（接续要用动词ます形去掉ます）", "similar": [{"form": "～おそれがある", "diff": "更正式，多用于书面语，表示客观的危险性"}, {"form": "～かもしれない", "diff": "中性表达，既可用于好事也可用于坏事，不含警告语气"}], "quiz": [{"q": "このまま無理をすると、体を____。", "opts": ["A. 壊すかもしれない", "B. 壊しかねない", "C. 壊すはずだ", "D. 壊すに違いない"], "ans": "B", "exp": "表示对健康的担忧和警告，用かねない最合适"}, {"q": "彼の態度では、みんなに____。", "opts": ["A. 嫌われかねない", "B. 嫌われるかもしれない", "C. 嫌われるはずだ", "D. 嫌われるに決まっている"], "ans": "A", "exp": "表示对人际关系的担忧，かねない含有警告意味"}, {"q": "そんな発言をすると、誤解を____。", "opts": ["A. 招くだろう", "B. 招くかもしれない", "C. 招きかねない", "D. 招くはずだ"], "ans": "C", "exp": "表示发言可能导致的负面后果，用かねない表示警告"}]}, "28": {"analysis": "「というより」表示说话人认为前面的表达不够准确，用后面更贴切的表达来修正或替换。这种修正往往是从一个角度转向另一个更深层或更准确的角度。常用于主观判断、感受描述，体现说话人的重新思考和更精确的表达。", "mistakes": "常见错误是在不需要修正的情况下使用。❌ 今日は暑いというより、とても暑いです → ✅ 今日はとても暑いです（只是程度加强，不需要用というより）。另一个错误是语序混乱：❌ 嬉しいというより悲しい → ✅ 悲しいというより嬉しい（应该是从不准确到准确的顺序）", "similar": [{"form": "～というか", "diff": "表示说话时的犹豫或寻找合适表达，不一定是修正"}, {"form": "～ではなく", "diff": "单纯否定前者肯定后者，没有「更贴切」的含义"}, {"form": "～より", "diff": "纯粹的比较，不含修正或重新表达的意思"}], "quiz": [{"q": "彼は頭がいい____、努力家だと思う。", "opts": ["A. というより", "B. といえば", "C. について", "D. として"], "ans": "A", "exp": "说话人认为「努力家」比「頭がいい」更准确地描述了他的特征"}, {"q": "この料理は美味しい____、芸術作品のようだ。", "opts": ["A. といって", "B. というより", "C. によって", "D. にとって"], "ans": "B", "exp": "从「美味しい」修正为更贴切的「芸術作品のよう」的表达"}, {"q": "今回の失敗は運が悪かった____、準備不足が原因だった。", "opts": ["A. というより", "B. といえば", "C. に対して", "D. について"], "ans": "A", "exp": "否定「運が悪い」这个说法，用「準備不足」来做更准确的分析"}]}, "29": {"analysis": "「～てはいられない」表达现在的情况不允许继续某个动作或状态，带有强烈的紧迫感和焦虑感。常用于面临危机、时间紧迫或情况严重时，强调必须立即停止当前状态去采取行动。这个文法体现了日语中对时机和情势判断的敏感性。", "mistakes": "常见错误是误用为否定推测。❌ 彼は遊んではいられないでしょう → ✅ 彼は遊んではいられない状況だ（他现在不是玩的时候）。另一个错误是与「ていられない」混用。❌ 待ってはいられない人 → ✅ 待ってはいられない状況（等不了的情况）", "similar": [{"form": "～ている場合ではない", "diff": "意思相同但更直接，「てはいられない」语感更强烈"}, {"form": "～てばかりはいられない", "diff": "强调不能只做某事，需要做其他事情"}, {"form": "～ていられない", "diff": "更口语化，「てはいられない」更正式书面"}], "quiz": [{"q": "もう時間がない。____。", "opts": ["A. のんびりしてはいけない", "B. のんびりしてはいられない", "C. のんびりしてはだめだ", "D. のんびりしてはならない"], "ans": "B", "exp": "表示现在不是悠闲的时候，有紧迫感，用「てはいられない」最合适"}, {"q": "緊急事態が発生した。____。", "opts": ["A. ここに座ってはいられない", "B. ここに座ってはいけない", "C. ここに座ってはならない", "D. ここに座ってはだめ"], "ans": "A", "exp": "紧急情况下不能继续坐着，必须行动，体现紧迫感"}, {"q": "子供が熱を出している。____。", "opts": ["A. 仕事をしてはならない", "B. 仕事をしてはだめだ", "C. 仕事をしてはいけない", "D. 仕事をしてはいられない"], "ans": "D", "exp": "孩子发烧的紧急情况下，不能继续工作，表达焦急心情"}]}, "30": {"analysis": "「つつ」是表示两个动作同时进行的书面语文法，比「ながら」更正式、文雅。常用于描述长期持续的状态或习惯性行为的并行，带有一定的文学色彩。使用时要注意两个动作的主语必须一致，且多用于描述需要平衡或兼顾的情况。", "mistakes": "❌ 本を読みつつ、音楽を聞いています → ✅ 本を読みながら、音楽を聞いています（日常会话应用「ながら」）。❌ 彼は勉強しつつ、私は料理をする → ✅ 彼は勉強しつつ、宿題もしている（主语必须一致）", "similar": [{"form": "〜ながら", "diff": "「ながら」更口语化，「つつ」更书面正式"}, {"form": "〜かたわら", "diff": "「かたわら」强调主副业关系，「つつ」单纯表示同时进行"}], "quiz": [{"q": "彼は仕事____、大学院で研究を続けている。", "opts": ["A. をしつつ", "B. をしながら", "C. をするつつ", "D. をしているつつ"], "ans": "A", "exp": "「つつ」前接动词ます形去掉ます，这里是「します」→「し」＋「つつ」"}, {"q": "伝統を____、新しい技術を取り入れていく。", "opts": ["A. 守るつつ", "B. 守りつつ", "C. 守っているつつ", "D. 守ってつつ"], "ans": "B", "exp": "「守る」的ます形是「守ります」，去掉ます后加つつ变成「守りつつ」"}, {"q": "この問題について考え____、解決策を探している。", "opts": ["A. ながら", "B. つつ", "C. かたわら", "D. として"], "ans": "B", "exp": "书面语语境下表示同时进行，「つつ」比「ながら」更适合"}]}, "31": {"analysis": "「～にわたって」表示时间或空间的广泛延续，强调从头到尾的全范围覆盖。时间上指持续很长时间，空间上指范围很广。与单纯的时间表达不同，它带有「全程贯穿」的语感，常用于正式场合。", "mistakes": "❌ 一時間にわたって会議をした → ✅ 一時間会議をした（短时间不用にわたって，应该用于较长时间）❌ 日本全国にわたって旅行に行きたい → ✅ 日本全国にわたって調査を行う（にわたって多用于正式的活动或现象，不用于个人意愿）", "similar": [{"form": "～を通じて", "diff": "を通じて侧重「通过某种手段」，にわたって侧重「时空范围的广度」"}, {"form": "～にかけて", "diff": "にかけて多指时间段的跨越，にわたって更强调全程持续性"}, {"form": "～の間", "diff": "の間是普通的时间表达，にわたって带有正式性和持续性的强调"}], "quiz": [{"q": "この問題について、三ヶ月____議論が続いている。", "opts": ["A. にわたって", "B. について", "C. に関して", "D. によって"], "ans": "A", "exp": "表示议论持续三个月的整个期间，用にわたって表示时间的延续"}, {"q": "台風の影響で、関東地方____停電が発生した。", "opts": ["A. において", "B. にわたって", "C. に対して", "D. として"], "ans": "B", "exp": "表示停电现象遍及关东地方全范围，用にわたって表示空间的广度"}, {"q": "彼は十年____研究を続けて、ついに成功した。", "opts": ["A. の間", "B. にわたって", "C. について", "D. において"], "ans": "B", "exp": "十年是较长时间，用にわたって强调研究持续了整个十年期间"}]}, "32": {"analysis": "「～から～にかけて」表示时间或地点的大致范围，强调从起点到终点的整个期间内都可能发生某事，具有持续性和不确定性的语感。与「～から～まで」不同，它不强调明确的终点，而是表示一个模糊的范围，常用于天气预报、活动期间等场合。", "mistakes": "❌ 会議は9時から12時にかけて行います → ✅ 会議は9時から12時まで行います（明确的会议时间应用「まで」）。❌ 関東地方から関西地方にかけて → ✅ 関東地方から関西地方にかけて雨が降る（地点范围后需要有具体的动作或现象）。", "similar": [{"form": "～から～まで", "diff": "「まで」表示明确的终点，「にかけて」表示模糊的范围"}, {"form": "～にわたって", "diff": "「にわたって」强调持续的状态，「にかけて」强调范围内的可能性"}], "quiz": [{"q": "今日の午後____夜にかけて、台風が接近します。", "opts": ["A. まで", "B. から", "C. には", "D. では"], "ans": "B", "exp": "「から～にかけて」的固定搭配，表示从午后到夜里的时间范围"}, {"q": "東北地方から北海道____、大雪になるでしょう。", "opts": ["A. まで", "B. について", "C. にかけて", "D. として"], "ans": "C", "exp": "表示从东北地方到北海道这个地理范围内会下大雪"}, {"q": "来週の月曜日____水曜日にかけて出張します。", "opts": ["A. に", "B. まで", "C. から", "D. では"], "ans": "C", "exp": "「から～にかけて」表示从周一到周三这段时间的出差"}]}, "33": {"analysis": "「～にともない」表示两个事物连动变化的关系，强调一方变化时另一方自然跟随变化，常用于描述社会、自然现象等客观变化。与中文「随着～」相似，但日语更强调变化的同步性和必然性，多用于正式文体。", "mistakes": "❌ 年齢にともなって、体力を強くなった → ✅ 年齢にともなって、体力が弱くなった（年龄增长通常伴随体力下降，要符合逻辑关系）", "similar": [{"form": "～につれて", "diff": "更强调渐进的过程变化"}, {"form": "～とともに", "diff": "表示同时进行，不一定有因果关系"}], "quiz": [{"q": "人口の増加____、住宅問題も深刻になっている。", "opts": ["A.にともない", "B.について", "C.に対して", "D.において"], "ans": "A", "exp": "表示人口增加与住宅问题加剧的连动关系"}, {"q": "季節の変化____、服装も変える必要がある。", "opts": ["A.によると", "B.にともなって", "C.に関して", "D.に比べて"], "ans": "B", "exp": "季节变化伴随着服装的改变，体现连动关系"}, {"q": "技術の進歩____、新しい問題も生まれてきた。", "opts": ["A.にとって", "B.に対して", "C.にともない", "D.について"], "ans": "C", "exp": "技术进步伴随新问题的产生，表示连动变化"}]}, "34": {"analysis": "「～おそれがある」是表示负面预测的书面语文法，强调某种不好的事情发生的可能性。与一般的可能性表达不同，它专门用于预测危险、灾害、损失等负面情况，语感较为正式严肃。常用于新闻报道、公告、预警等正式场合。", "mistakes": "❌ 明日は晴れるおそれがあります → ✅ 明日は晴れる可能性があります（好事不用おそれがある）\n❌ 彼が来ないおそれがあります → ✅ 彼が来ない可能性があります（一般坏事用可能性がある更自然）", "similar": [{"form": "～可能性がある", "diff": "中性表达，好事坏事都能用，比おそれがある使用范围更广"}, {"form": "～危険性がある", "diff": "更强调危险性，おそれがある涵盖范围更广包括各种负面可能"}], "quiz": [{"q": "大雨が続いているので、土砂崩れ____あります。", "opts": ["A. のおそれが", "B. の可能性が", "C. になりそうが", "D. というわけが"], "ans": "A", "exp": "土砂崩れ是自然灾害，属于负面预测，应使用おそれがある"}, {"q": "この薬を飲みすぎると、副作用____おそれがあります。", "opts": ["A. を", "B. が", "C. の", "D. に"], "ans": "C", "exp": "名词接续おそれがある时要用「名詞＋の＋おそれがある」"}, {"q": "経済状況が悪化____おそれがある。", "opts": ["A. する", "B. した", "C. して", "D. すると"], "ans": "A", "exp": "动词辞书形直接接おそれがある，悪化する是动词原形"}]}, "35": {"analysis": "「とともに」表示两个事物同时发生或共同进行，强调伴随性和同步性。既可以表示时间上的同步（随着...），也可以表示共同参与（和...一起）。在书面语中使用频率高，语感较为正式。", "mistakes": "❌ 年をとるとともに、体が弱くなった → ✅ 年をとるとともに、体が弱くなる（とともに表示持续的伴随关系，不用过去时）；❌ 友達とともに映画を見ました → ✅ 友達と映画を見ました（简单的共同行为用「と」即可，とともに过于正式）", "similar": [{"form": "につれて", "diff": "につれて更强调变化的渐进性，とともに更强调同时性"}, {"form": "に従って", "diff": "に従って强调按照某种规律变化，とともに强调伴随发生"}, {"form": "とおなじく", "diff": "とおなじく表示同样地，とともに表示一起或同时"}], "quiz": [{"q": "時代____、人々の考え方も変わっていく。", "opts": ["A. とともに", "B. につれて", "C. に従って", "D. とおなじく"], "ans": "A", "exp": "表示时代变化和人们思想变化同时发生的伴随关系"}, {"q": "社長____会議に出席する予定です。", "opts": ["A. とともに", "B. と", "C. につれて", "D. に従って"], "ans": "A", "exp": "正式场合表示和社长一起参加，用とともに更合适"}, {"q": "年齢を重ねる____、経験も豊富になる。", "opts": ["A. とおなじく", "B. に従って", "C. とともに", "D. につれて"], "ans": "C", "exp": "表示年龄增长和经验丰富同时进行的伴随关系"}]}, "36": {"analysis": "「～しだい」有两个核心用法：1）表示「一...就...」的时间关系，强调动作完成后立即进行下一个动作；2）表示「取决于...」的依存关系，说明结果由某个因素决定。这个文法带有正式的语感，多用于商务或正式场合的表达。", "mistakes": "❌ 彼が来るしだい、会議を始めます → ✅ 彼が来次第、会議を始めます（动词要用ます形去掉ます）。❌ 天気しだいで決めます → ✅ 天気次第で決めます（「で」前面不能再加助词）", "similar": [{"form": "～とすぐに", "diff": "しだい更正式，とすぐに更口语化"}, {"form": "～によって", "diff": "によって只表依存关系，しだい还可表时间先后关系"}, {"form": "～たら", "diff": "たら是一般条件，しだい强调立即性和正式性"}], "quiz": [{"q": "結果が____、すぐに連絡いたします。", "opts": ["A. 出るしだい", "B. 出次第", "C. 出たしだい", "D. 出ることしだい"], "ans": "B", "exp": "动词要用ます形去掉ます的形式，「出る」→「出」"}, {"q": "この計画の成功は資金____決まります。", "opts": ["A. 次第に", "B. 次第で", "C. 次第を", "D. 次第は"], "ans": "B", "exp": "表示依存关系时用「～次第で」的形式"}, {"q": "明日の予定は天気____変更する可能性があります。", "opts": ["A. しだいに", "B. しだいを", "C. しだいで", "D. しだいが"], "ans": "C", "exp": "「天気次第で」表示根据天气情况来决定"}]}, "38": {"analysis": "「どころではない」表示因为某种紧急或重要的状况，根本没有余裕去做某事。常用于强调当前情况的严重性，暗示有更重要、更紧急的事情需要处理。语感上带有强烈的否定和紧迫感，相当于中文的「哪有心思」「根本不是时候」。", "mistakes": "❌ 元気などころではない → ✅ 元気どころではない（名词直接接续，不需要助词）；❌ 遊ぶどころではない → ✅ 遊んでいるどころではない（动词要用进行时形式，表示持续状态）", "similar": [{"form": "どころか", "diff": "表示「不但不是A，反而是B」，是转折强调，而非表示没有余裕"}, {"form": "ばかりではない", "diff": "表示「不仅仅是」，是添加说明，不含紧迫感和无余裕的语感"}], "quiz": [{"q": "会社が倒産しそうで、旅行____。", "opts": ["A. どころか", "B. どころではない", "C. ばかりか", "D. ところだった"], "ans": "B", "exp": "公司要倒闭了，根本没有心思旅行，表示没有余裕的状况"}, {"q": "病気で入院中なので、仕事____。", "opts": ["A. するどころではない", "B. したどころではない", "C. していたどころではない", "D. しようどころではない"], "ans": "A", "exp": "动词辞书形＋どころではない是正确接续，表示没有余裕工作"}, {"q": "借金だらけで、____どころではない。", "opts": ["A. 結婚する", "B. 結婚", "C. 結婚している", "D. 結婚した"], "ans": "B", "exp": "名词直接＋どころではない，表示债务缠身，根本没有余裕结婚"}]}, "39": {"analysis": "「ものの」表示与前面的事实相反或不符合期待的结果，带有遗憾、失望等感情色彩。与普通的「けれど」相比，「ものの」更强调前后的对比反差，常用于描述努力后却没有得到预期效果的情况。语感上比较正式，多用于书面语。", "mistakes": "❌ 雨が降ったものの、出かけます → ✅ 雨が降ったけれど、出かけます（天气客观事实不用ものの）。❌ 頑張っているものの、成績がいいです → ✅ 頑張っているものの、成績が上がらない（ものの后面应该是不如意的结果）", "similar": [{"form": "～けれど/が", "diff": "ものの更强调与期待相反的失望感，けれど较中性"}, {"form": "～にもかかわらず", "diff": "にもかかわらず语气更正式强硬，ものの带有遗憾感"}, {"form": "～ながら", "diff": "ながら表示矛盾并存，ものの强调期待落空"}], "quiz": [{"q": "薬を飲んだ____、なかなか治らない。", "opts": ["A. ものの", "B. ために", "C. ばかりに", "D. わりに"], "ans": "A", "exp": "吃了药却没治好，与期待相反，用ものの表示遗憾"}, {"q": "彼は有名大学を卒業した____、今も就職できないでいる。", "opts": ["A. おかげで", "B. ものの", "C. せいで", "D. ために"], "ans": "B", "exp": "名校毕业却找不到工作，是与期待相反的结果"}, {"q": "一生懸命練習した____、試合で負けてしまった。", "opts": ["A. ために", "B. ので", "C. ものの", "D. から"], "ans": "C", "exp": "努力练习却败了比赛，表示与努力不符的失望结果"}]}, "40": {"analysis": "「〜ことに」用于强调说话人的感情或评价，表达出乎意料或令人印象深刻的情况。通常与表示感情的形容词（驚いた、嬉しい、残念な等）搭配使用，语感上带有感叹的意味。在句中起到突出后续事实的作用，增强语言的感染力。", "mistakes": "❌ 面白いことに、この映画を見ました → ✅ 面白いことに、この映画はとても人気があります（「ことに」后面应该是客观事实，不是主观行为）； ❌ 驚くことに、彼が来た → ✅ 驚いたことに、彼が来た（应该用过去式「驚いた」表示已经产生的感情）", "similar": [{"form": "〜ことには", "diff": "意思完全相同，只是「には」使语气更强调"}, {"form": "なんと", "diff": "同样表示惊讶，但「なんと」更口语化，「〜ことに」更正式"}], "quiz": [{"q": "____ことに、彼は一度も遅刻したことがない。", "opts": ["A. 驚く", "B. 驚いた", "C. 驚き", "D. 驚いている"], "ans": "B", "exp": "表示感情强调时要用过去式「驚いた」"}, {"q": "嬉しいことに、息子が____。", "opts": ["A. 勉強します", "B. 勉強している", "C. 勉強した", "D. 勉強していた"], "ans": "C", "exp": "「ことに」后通常接已发生的事实，用过去式"}, {"q": "残念なことに、今日の試合は____。", "opts": ["A. 中止になります", "B. 中止になった", "C. 中止にします", "D. 中止だった"], "ans": "B", "exp": "表示已经确定的遗憾事实，用「になった」表示状态变化"}]}, "41": {"analysis": "「～にしては」表示基于某种标准或期待的评价，但实际情况与预期不符，通常含有意外或超出预期的语感。这个文法强调的是「对～来说」的相对性评价，常用于表达正面的意外或负面的失望。语感上比「～のわりに」更强调说话人的主观判断和意外感。", "mistakes": "❌ 彼は学生にしては、お金を持ちすぎています。→ ✅ 彼は学生にしては、お金を持っています。原因：「にしては」后面不用过于夸张的表达，应该客观陈述事实。❌ 今日は暖かいにしては、コートを着ている。→ ✅ 今日は暖かいのに、コートを着ている。原因：这里应该用「のに」表示逆接，而不是用「にしては」。", "similar": [{"form": "～のわりに", "diff": "语感更客观中性，「にしては」更强调说话人的主观评价和意外感"}, {"form": "～としては", "diff": "「としては」表示立场身份，「にしては」强调基于标准的相对评价"}, {"form": "～にしても", "diff": "「にしても」表示让步假设，「にしては」是基于标准的评价判断"}], "quiz": [{"q": "彼は初心者____、とても上手に弾けますね。", "opts": ["A. にしては", "B. にしても", "C. については", "D. に対して"], "ans": "A", "exp": "表示对初心者来说超出预期的评价，用「にしては」最合适"}, {"q": "この店は安い____、味はそれほど悪くない。", "opts": ["A. としては", "B. にしては", "C. のわりに", "D. ことには"], "ans": "B", "exp": "表示基于「安い」这个标准的意外评价，「にしては」强调超出预期"}, {"q": "今年は暖冬____、雪がよく降りますね。", "opts": ["A. にしては", "B. に対して", "C. について", "D. によって"], "ans": "A", "exp": "暖冬却经常下雪，与预期不符的评价用「にしては」"}]}, "42": {"analysis": "这个文法用于表达强烈的感叹或推测某种程度，常含有同情、惊讶等情感色彩。多用于书面语或正式场合，表达说话者对某种状况程度之深的感慨。「ことだろう」语气稍温和，「ことか」语气更强烈，带有更深的感慨。", "mistakes": "❌ 何を大変なことだろう → ✅ どんなに大変なことだろう（疑问词只能用「どんなに/どれほど/いかに」等表程度的词）；❌ 嬉しいことだろう → ✅ どんなに嬉しいことだろう（必须有疑问词，不能直接用形容词）", "similar": [{"form": "～ものだ", "diff": "表示感慨或道理，不用疑问词，语气相对平缓"}, {"form": "なんて～んだろう", "diff": "口语化的感叹表达，语气更直接"}, {"form": "いかに～か", "diff": "书面语色彩更浓，多用于文学作品"}], "quiz": [{"q": "彼女は一人でその仕事を____苦労したことだろう。", "opts": ["A. どんなに", "B. 何を", "C. いつ", "D. どこで"], "ans": "A", "exp": "表示程度的感叹，只能用「どんなに」等表程度的疑问词"}, {"q": "母親を亡くした子供は____寂しい____。", "opts": ["A. どれほど...ものか", "B. どれほど...ことか", "C. なんと...だろう", "D. いかに...ものだ"], "ans": "B", "exp": "强调程度的感叹用「どれほど～ことか」最自然"}, {"q": "戦争中、人々は____辛い思いをした____。", "opts": ["A. どんなに...ものだろう", "B. いかに...ことだろう", "C. なんて...んだろう", "D. どれだけ...だろうか"], "ans": "B", "exp": "書面語的感叹表达，「いかに～ことだろう」最符合文体"}]}, "43": {"analysis": "「～さえ～ば」表示「最低限度的条件」，强调只要满足这一个条件就足够了，有时带有「只需要这一点」的语感。常用于表达理想化的想法或假设，语气中往往含有「如果能有这个就好了」的期待感。", "mistakes": "❌ 時間さえあったら、旅行に行きたい → ✅ 時間さえあれば、旅行に行きたい（连接形式错误，应该用「ば」不是「たら」）；❌ 彼さえ来れば大丈夫です → ✅ 彼が来さえすれば大丈夫です（「さえ」的位置错误，应该放在动词前）", "similar": [{"form": "～ば～ほど", "diff": "表示程度递增，而さえ～ば强调最低条件"}, {"form": "～だけで", "diff": "单纯表示充分条件，さえ～ば更强调这是唯一需要的条件"}, {"form": "～たら", "diff": "一般的假设条件，さえ～ば特指最低限度的条件"}], "quiz": [{"q": "健康____あれば、何も心配することはない。", "opts": ["A. さえ", "B. だけ", "C. ばかり", "D. しか"], "ans": "A", "exp": "表示「只要有健康这个最低条件就足够」，用「さえ」最合适"}, {"q": "彼女____来てくれれば、パーティーは成功するだろう。", "opts": ["A. だけ", "B. が来さえ", "C. でも", "D. なら"], "ans": "B", "exp": "「さえ」要放在动词「来る」之前，形成「来さえ～ば」的结构"}, {"q": "雨____降らなければ、運動会は開催できます。", "opts": ["A. さえ", "B. ばかり", "C. だけ", "D. でも"], "ans": "A", "exp": "表示「只要不下雨这个最低条件」就可以举办，否定时也用「さえ」"}]}, "44": {"analysis": "「～ようがない」表示完全没有进行某动作的方法或手段，强调客观上的不可能性和无奈感。这个文法带有强烈的无可奈何的语感，常用于描述因为缺乏必要条件而无法采取行动的情况。与单纯的「できない」相比，更强调方法手段的完全缺失。", "mistakes": "容易误用「ように」：❌ 連絡先を知らないので、連絡するようにない → ✅ 連絡先を知らないので、連絡しようがない。原因是混淆了「ように」的用法，「ようがない」是固定搭配，不能拆分。", "similar": [{"form": "～しかたがない／しようがない", "diff": "意思相近，但「しかたがない」更多表示无奈接受现状"}, {"form": "～ざるを得ない", "diff": "表示不得不做，是被迫的选择，语感正好相反"}], "quiz": [{"q": "お金がないので、海外旅行に____。", "opts": ["A. 行こうがない", "B. 行くようがない", "C. 行けようがない", "D. 行きようがない"], "ans": "D", "exp": "「行く」的ます形是「行き」，所以是「行きようがない」"}, {"q": "彼の気持ちは____。", "opts": ["A. わかりようがない", "B. わかるようがない", "C. わからようがない", "D. わかれようがない"], "ans": "A", "exp": "「わかる」的ます形是「わかり」，表示无法理解他的心情"}, {"q": "証拠がなければ、犯人を____。", "opts": ["A. 捕まえようがない", "B. 捕まるようがない", "C. 捕まりようがない", "D. 捕まえるようがない"], "ans": "C", "exp": "「捕まる」的ます形是「捕まり」，表示没有证据就无法抓到犯人"}]}, "45": {"analysis": "「あげく」表示经过长时间的过程或努力后，最终得出的结果，通常是负面或不如意的结果。这个文法强调过程的漫长和结果的令人失望，带有「费了那么多工夫，结果却...」的语感。多用于描述努力白费、事与愿违的情况。", "mistakes": "❌ 勉強したあげく、合格した。→ ✅ 勉強したあげく、不合格だった。（あげく后面通常接负面结果，不接正面结果）；❌ 明日のあげく → ✅ 長い準備のあげく（あげく前面需要表示持续性的过程，不能接单纯的时间点）", "similar": [{"form": "〜すえ（に）", "diff": "すえ更正式，可接正面结果，あげく多接负面结果"}, {"form": "〜はてに", "diff": "はて强调到了极限或尽头，あげく强调经过漫长过程"}], "quiz": [{"q": "散々迷った____、結局何も買わずに帰った。", "opts": ["A. あげく", "B. ところで", "C. ばかりに", "D. くらい"], "ans": "A", "exp": "表示经过长时间犹豫后的结果，符合あげく的用法"}, {"q": "長時間話し合った____、みんなが納得する解決策が見つかった。", "opts": ["A. あげく", "B. すえ", "C. はてに", "D. ところを"], "ans": "B", "exp": "正面结果用すえ，あげく通常接负面结果"}, {"q": "彼は色々考えた____、会社を辞めることにした。", "opts": ["A. ばかりか", "B. あげく", "C. くせに", "D. わりに"], "ans": "B", "exp": "经过思考后做出决定（通常是重大或困难的决定），符合あげく的语境"}]}, "46": {"analysis": "～ものではない表示基于道德、常识或社会规范的否定判断，强调「不应该这样做」。这是一种带有劝告、忠告性质的表达，语气比单纯的否定更加庄重，常用于长辈对晚辈、或者表达社会公认的价值观念。与禁止命令不同，它更多是基于道德层面的规劝。", "mistakes": "容易误用场景：❌ 今日は雨が降るものではない → ✅ 今日は雨が降らないだろう（描述客观事实不用此句型）；容易与～べきではない混淆：❌ 宿題をするものではない → ✅ 人をだますものではない（个人义务用べき，道德规范用もの）", "similar": [{"form": "～べきではない", "diff": "べき強调个人义务责任，もの強调社会道德常识"}, {"form": "～わけにはいかない", "diff": "わけには表示情理上做不到，もの表示道义上不应该"}], "quiz": [{"q": "年上の人に対して失礼なことを____。", "opts": ["A. するものではない", "B. するべきではない", "C. するわけにはいかない", "D. してはいけない"], "ans": "A", "exp": "对长辈失礼是违背社会常识道德的行为，用ものではない最恰当"}, {"q": "友達を____ものではない。", "opts": ["A. 信じる", "B. 裏切る", "C. 助ける", "D. 理解する"], "ans": "B", "exp": "背叛朋友在道德上是不应该的，符合ものではない的语义"}, {"q": "このような場所でタバコを____。", "opts": ["A. 吸うものではない", "B. 吸うべきではない", "C. 吸わないものだ", "D. 吸ってはならない"], "ans": "A", "exp": "在不合适场所吸烟违背社会常识，ものではない表达最自然"}]}, "47": {"analysis": "「だけ」表示程度或数量的极限，常用于「できるだけ（尽量）」和「〜した分だけ（做了多少就～多少）」的句型中。这个文法强调在某种限度范围内的最大程度，带有「充分利用」或「不浪费」的语感。", "mistakes": "❌ できるだけ早く来てください → ✅ できるだけ早く来てください（正确，但要注意だけ后不能加を等助词）；❌ 勉強しただけで合格した → ✅ 勉強した分だけ成果が出た（表示程度对应关系时要用「分だけ」）", "similar": [{"form": "～ほど", "diff": "ほど更强调程度的深浅，だけ侧重于限度范围"}, {"form": "～分", "diff": "分だけ强调对等关系，单独的分更中性"}], "quiz": [{"q": "時間が____頑張ってみます。", "opts": ["A. あるだけ", "B. あっただけ", "C. あるほど", "D. ある分"], "ans": "A", "exp": "「時間があるだけ」表示在有限时间内尽量努力"}, {"q": "努力____結果が出るものだ。", "opts": ["A. するだけ", "B. した分だけ", "C. するほど", "D. したばかり"], "ans": "B", "exp": "表示努力多少就有多少结果的对应关系，用「分だけ」"}, {"q": "____安い店を探してください。", "opts": ["A. できるだけ", "B. できた分だけ", "C. できるほど", "D. できただけ"], "ans": "A", "exp": "「できるだけ」是固定表达，表示尽量、尽可能"}]}, "48": {"analysis": "「～ばかりに」表示「仅仅因为这一个原因就导致了不好的结果」，带有遗憾、后悔的语感。与单纯的原因表达不同，它强调原因的单一性和结果的不良性，常用于反省、懊悔的语境中。这个文法隐含着「如果没有这个原因就好了」的心情。", "mistakes": "❌ 頑張ったばかりに、合格した → ✅ 頑張ったおかげで、合格した（好结果不用ばかりに，用おかげで）。❌ 雨が降るばかりに、試合が中止になった → ✅ 雨が降ったばかりに、試合が中止になった（ばかりに前必须用过去形）", "similar": [{"form": "～せいで", "diff": "せいで也表示不好结果的原因，但不强调「仅仅因为」的单一性"}, {"form": "～おかげで", "diff": "おかげで表示好结果的原因，语感完全相反"}, {"form": "～ために", "diff": "ために是中性的原因表达，不限定结果好坏"}], "quiz": [{"q": "親切心を出した____、かえって迷惑をかけてしまった。", "opts": ["A. ばかりに", "B. おかげで", "C. ために", "D. ので"], "ans": "A", "exp": "好心办坏事的遗憾情况，符合ばかりに「仅因为这个原因导致坏结果」的语义"}, {"q": "彼は正直____、損をすることが多い。", "opts": ["A. なために", "B. なばかりに", "C. だから", "D. なので"], "ans": "B", "exp": "正直这个性格导致吃亏，体现单一原因造成不利结果的遗憾"}, {"q": "一言多い____、友達を怒らせてしまった。", "opts": ["A. せいで", "B. ために", "C. ばかりに", "D. から"], "ans": "C", "exp": "多嘴一句话就惹怒朋友，强调这个单一原因导致的不好结果"}]}, "49": {"analysis": "「〜ことはない」表示客观判断某行为没有必要性，语感较为温和客观。多用于劝说或安慰场合，告诉对方无需做某事。与「〜必要はない」相比，语感更加自然口语化，常带有体贴关怀的语调。", "mistakes": "❌ 心配することはありません → ✅ 心配することはない（「ことはない」本身就含否定，不能再加「ありません」）；❌ 急ぐことはないです → ✅ 急ぐことはありません（敬语场合用「ありません」）", "similar": [{"form": "〜必要はない", "diff": "更正式书面，「ことはない」更口语自然"}, {"form": "〜には及ばない", "diff": "语感更郑重，多用于正式场合"}, {"form": "〜ことはできない", "diff": "表示能力上做不到，非必要性判断"}], "quiz": [{"q": "明日までに____ことはないよ。", "opts": ["A.急ぐ", "B.急いだ", "C.急いでいる", "D.急がない"], "ans": "A", "exp": "「ことはない」前接动词辞书形，表示没必要急"}, {"q": "そんなに____ことはありませんよ。", "opts": ["A.心配する", "B.心配した", "C.心配している", "D.心配しない"], "ans": "A", "exp": "敬语场合用「ありません」，动词用辞书形"}, {"q": "今日は____ことはない。ゆっくり休もう。", "opts": ["A.働いた", "B.働く", "C.働いている", "D.働かない"], "ans": "B", "exp": "「働くことはない」表示今天没必要工作"}]}, "50": {"analysis": "「～にくらべて」表示以某事物为基准进行比较对照，强调两者之间的差异或变化。常用于客观地描述事实差异，语感相对正式。与中文的'与...相比'、'跟...比起来'用法相似，但日语中更常用于书面语和正式场合。", "mistakes": "❌ 私にくらべて、兄は背が高いです → ✅ 私にくらべて、兄のほうが背が高いです（比较句中应该用「のほう」来明确比较对象）； ❌ 昨日にくらべて今日は寒いにくらべて雨も降っている → ✅ 昨日にくらべて今日は寒いし、雨も降っている（不能重复使用比较表达）", "similar": [{"form": "～に対して", "diff": "「に対して」更强调对立或针对性，而「にくらべて」纯粹表示比较"}, {"form": "～より", "diff": "「より」更直接表示程度差异，「にくらべて」更强调对照的过程"}], "quiz": [{"q": "他の国____、日本は地震が多い。", "opts": ["A. にくらべて", "B. について", "C. によって", "D. に関して"], "ans": "A", "exp": "表示与其他国家相比日本地震多，用比较的「にくらべて」"}, {"q": "去年の売上____、今年は20%増加した。", "opts": ["A. による", "B. にくらべて", "C. として", "D. における"], "ans": "B", "exp": "与去年的销售额进行比较，表示今年的增长情况"}, {"q": "兄____、弟のほうがよく勉強する。", "opts": ["A. にくらべて", "B. に対して", "C. において", "D. として"], "ans": "A", "exp": "比较兄弟两人的学习态度，用「にくらべて」表示对比"}]}, "51": {"analysis": "～ものか表示说话人强烈的拒绝态度和反对意志，相当于中文的「才不...呢」「绝对不会...」。这个文法带有强烈的情感色彩，常用于内心独白或愤怒、不满的语境中。口语中经常缩略为「もんか」，语气更加粗犷直接。", "mistakes": "容易与～ものだ混淆使用。❌ 学生はよく勉強するものかだ → ✅ 学生はよく勉強するものだ（学生应该好好学习）。～ものか只能表示拒绝反对，不能表示应该做的事情。", "similar": [{"form": "～はずがない", "diff": "～はずがない表示客观判断「不可能」，～ものか表示主观拒绝「才不要」"}, {"form": "～わけがない", "diff": "～わけがない强调逻辑上不可能，～ものか强调情感上的强烈拒绝"}], "quiz": [{"q": "彼に謝る____。あんなひどいことを言われたのに。", "opts": ["A. ものか", "B. はずだ", "C. ことだ", "D. ばかりだ"], "ans": "A", "exp": "表示强烈拒绝「绝对不向他道歉」，只有ものか符合语境"}, {"q": "こんな難しい問題、小学生に解ける____。", "opts": ["A. ものか", "B. はずがない", "C. ことはない", "D. ものだ"], "ans": "B", "exp": "这里是客观判断小学生不可能解出来，用はずがない而非主观拒绝的ものか"}, {"q": "あの会社にもう一度就職する____。給料が安すぎる。", "opts": ["A. つもりだ", "B. 予定だ", "C. ものか", "D. べきだ"], "ans": "C", "exp": "表示「绝对不会再去那家公司就职」的强烈拒绝态度"}]}, "52": {"analysis": "「～というものだ」表达说话人认为某事理所当然、符合常理或正义的强烈主张。常用于表达社会常识、道德准则或普世价值观，语气带有教导性和权威性。多出现在议论文、社论或长辈教导晚辈的场合。", "mistakes": "❌ 明日は雨が降るというものだ → ✅ 明日は雨が降るそうだ/でしょう（天气预报等客观事实不能用此句型）；❌ 彼は学生というものだ → ✅ 彼は学生だ（单纯的身份描述不使用此句型，需要表达价值判断）", "similar": [{"form": "～ものだ", "diff": "更广泛的感慨表达，不一定含有「理所当然」的强调"}, {"form": "～べきだ", "diff": "表示义务和应该，语气更直接，不强调「这才是真正的」"}], "quiz": [{"q": "学生は勉強に集中____。", "opts": ["A. するというものだ", "B. するものだ", "C. すべきだ", "D. するはずだ"], "ans": "A", "exp": "强调「这才是学生应有的样子」，表达理所当然的道理"}, {"q": "友達を裏切るなんて、人間として____。", "opts": ["A. してはいけないものだ", "B. するべきではないというものだ", "C. してはならないというものだ", "D. するものではない"], "ans": "C", "exp": "「～てはならないというものだ」表示从道德角度强烈否定某行为"}, {"q": "困っている人を助けるのが____。", "opts": ["A. 人情だ", "B. 人情というものだ", "C. 人情である", "D. 人情らしい"], "ans": "B", "exp": "强调「这才是真正的人情」，表达普世的道德准则"}]}, "53": {"analysis": "「～ばこそ」是强调原因理由的古典文法，比现代的「～からこそ」更加庄重正式。它强调前项是后项成立的唯一或最重要原因，常用于格言、训诫等正式场合。这个文法带有强烈的因果逻辑性，暗示「正是因为A，所以才有B」的必然关系。", "mistakes": "❌ 彼が来ればこそ、パーティーが楽しくなった → ✅ 彼が来たからこそ、パーティーが楽しくなった（过去事实用「からこそ」更自然）。❌ 雨が降ればこそ、試合が中止になる → ✅ 雨が降ったからこそ、試合が中止になった（「ばこそ」多用于积极正面的因果关系）", "similar": [{"form": "～からこそ", "diff": "现代日语，使用范围更广，可用于各种场合"}, {"form": "～てこそ", "diff": "强调条件达成后才能实现某种状态或价值"}, {"form": "～ばこそ～が", "diff": "后面常接转折，表示「正因为...但是...」"}], "quiz": [{"q": "苦労し____、今の成功がある。", "opts": ["A. ればこそ", "B. たからこそ", "C. てこそ", "D. ても"], "ans": "B", "exp": "过去的苦劳导致现在的成功，用过去形「たからこそ」更合适"}, {"q": "親の愛が____、子供は健やかに育つものだ。", "opts": ["A. あればこそ", "B. あってこそ", "C. あるからこそ", "D. あっても"], "ans": "A", "exp": "「ばこそ」用于一般性真理或格言，强调必要条件"}, {"q": "努力すればこそ____結果が出る。", "opts": ["A. 、", "B. だから", "C. ので", "D. けれど"], "ans": "A", "exp": "「ばこそ」后面直接接结果，中间用逗号分隔即可"}]}, "54": {"analysis": "「～ないことはない」是典型的双重否定表达，表示「并非不能～」，暗示虽然可能但有困难或不情愿。这个文法常用于谦虚地表达自己的能力，或者委婉地表示某事虽然可行但存在障碍。语感上比直接说「できる」更加谦逊和保守。", "mistakes": "❌ 行かないことはない → ✅ 行けないことはない（必须用可能形的ない形）；❌ 食べないことはないです → ✅ 食べられないことはありません（敬语时否定部分也要敬语化）", "similar": [{"form": "～ないでもない", "diff": "语气更轻松随意，多用于日常会话中的暧昧回答"}, {"form": "～というわけではない", "diff": "强调并非完全如此，重点在于部分否定而非能力表达"}], "quiz": [{"q": "時間があれば、手伝____。", "opts": ["A. わないことはない", "B. えないことはない", "C. うないことはない", "D. おうないことはない"], "ans": "B", "exp": "「手伝う」的可能形是「手伝える」，所以是「手伝えない」"}, {"q": "彼の気持ちが分から____が、時間がかかりそうだ。", "opts": ["A. ないことはない", "B. ないこともない", "C. なくもない", "D. なくはない"], "ans": "A", "exp": "「分からないことはない」表示能理解但需要时间，符合语境"}, {"q": "一人で全部やるのは____、でも大変だよ。", "opts": ["A. できないわけではない", "B. できないことはない", "C. できなくもない", "D. できないでもない"], "ans": "B", "exp": "「できないことはない」最自然地表达虽然可能但困难的含义"}]}, "55": {"analysis": "「わけにはいかない」表示基于道德、社会常识或责任感，某个行为在情理上无法实行。与单纯的「できない」不同，这个文法强调的是社会或道义层面的「不应该」，而非能力上的「不能够」。常用于表达违背常理、有违道德或不负责任的行为是不被允许的。", "mistakes": "❌ 雨が降っているから、外に出るわけにはいかない → ✅ 雨が降っているから、外に出られない（天气原因用「られない」）。❌ お金がないから、買うわけにはいかない → ✅ お金がないから、買えない（经济能力问题不用此文法，而是表达客观无法实现）", "similar": [{"form": "～わけにはいけない", "diff": "意思完全相同，只是「いかない」的另一种表达方式"}, {"form": "～べきではない", "diff": "强调「不应该」的义务判断，而「わけにはいかない」更强调情理上无法实行"}, {"form": "～ことはできない", "diff": "表示客观上的不可能，而「わけにはいかない」强调道德或社会层面的不允许"}], "quiz": [{"q": "彼は私の恩人だから、彼の頼みを断る____。", "opts": ["A. ことができない", "B. わけにはいかない", "C. べきではない", "D. はずがない"], "ans": "B", "exp": "基于恩情和道义，不能拒绝恩人的请求，符合「わけにはいかない」的语义"}, {"q": "一度約束したことを、簡単に____。", "opts": ["A. やめるわけにはいかない", "B. やめることにした", "C. やめたほうがいい", "D. やめざるを得ない"], "ans": "A", "exp": "一旦承诺就不能轻易放弃，这是基于信用和责任感的道德判断"}, {"q": "子供が熱を出しているのに、仕事に____。", "opts": ["A. 行くしかない", "B. 行くべきだ", "C. 行くわけにはいかない", "D. 行かなければならない"], "ans": "C", "exp": "孩子发烧时去上班在情理上说不过去，体现了道德和责任感的考量"}]}, "56": {"analysis": "「のみ」是「だけ」的书面语表达，带有更强的限定和强调语气。常用于正式文章、演讲或表达坚定意志的场合。「ただ～のみ」进一步加强了「别无选择，只有这样」的语感，带有某种悲壮或决绝的情感色彩。", "mistakes": "❌ 今日のみ雨が降っている → ✅ 今日だけ雨が降っている（日常会话中应该用「だけ」）。❌ 彼のみが来ました → ✅ 彼のみが来た（「のみ」多用于断定形，不用丁寧語）", "similar": [{"form": "～だけ", "diff": "「のみ」比「だけ」更正式，语气更强"}, {"form": "～しか～ない", "diff": "「しか～ない」表示不满足的限定，「のみ」是中性的限定"}, {"form": "～に限る", "diff": "「に限る」强调最佳选择，「のみ」强调唯一性"}], "quiz": [{"q": "この薬は医師の処方____服用できます。", "opts": ["A. によってのみ", "B. に対してのみ", "C. についてのみ", "D. に関してのみ"], "ans": "A", "exp": "「によってのみ」表示手段的限定，只有通过医生处方这一手段才能服用"}, {"q": "もう____信じるのみだ。", "opts": ["A. 彼が", "B. 彼を", "C. 彼に", "D. 彼は"], "ans": "B", "exp": "「信じる」是他動詞，宾语用「を」标示，表示只能相信他了"}, {"q": "成功への道は____。", "opts": ["A. 努力するのみだ", "B. 努力するのみです", "C. 努力しただけだ", "D. 努力するだけです"], "ans": "A", "exp": "「のみ」常用于断定形，不用丁寧語，且此处表达坚定意志"}]}, "57": {"analysis": "「～つもりで」表示以某种心理状态或假设来做事，强调主观的心理准备或态度。与「～つもりだ」(打算)不同，这里重点在于「用什么心态去做」而非「要做什么」。常用于表达谦逊、重新开始或特定心理状态下的行动。", "mistakes": "容易与「～つもりだ」混淆。❌ 明日行くつもりで準備した → ✅ 明日行くつもりで準備した（如果表达打算）或 初心者のつもりで準備した（如果表达心态）。前者是计划，后者是心理状态。", "similar": [{"form": "～つもりだ", "diff": "表示计划打算，「つもりで」表示心理状态或假设"}, {"form": "～気持ちで", "diff": "直接表达心情，「つもりで」更强调假设或心理准备"}, {"form": "～として", "diff": "表示身份立场，「つもりで」表示主观心理状态"}], "quiz": [{"q": "経験者____、新人にアドバイスをした。", "opts": ["A. つもりで", "B. つもりだ", "C. として", "D. らしく"], "ans": "A", "exp": "以经验者的心态给新人建议，表示心理状态用「つもりで」"}, {"q": "失敗した____、今度は慎重にやります。", "opts": ["A. つもりだから", "B. つもりで", "C. つもりなので", "D. つもりに"], "ans": "B", "exp": "以失败的经验为鉴，表示基于某种心理状态行动用「つもりで」"}, {"q": "学生____質問するのは恥ずかしくない。", "opts": ["A. つもりで", "B. として", "C. らしく", "D. みたいに"], "ans": "A", "exp": "以学生的心态提问，强调主观心理准备用「つもりで」"}]}, "58": {"analysis": "这个文法表示从某个特定的观点、立场或角度来判断事物。强调的是基于某种专业性、身份性或特定视角得出的看法。与单纯的「思う」不同，这里有明确的判断基准和立场色彩，常用于表达较为客观或权威的观点。", "mistakes": "❌ 学生から見ると、この授業が簡単だと思います。 → ✅ 学生から見ると、この授業は簡単だ。（から見ると后面不需要再加「と思う」，因为本身就表示观点判断）", "similar": [{"form": "～にとって", "diff": "表示对某人而言的情况，不强调判断视角"}, {"form": "～の立場から", "diff": "更直接表示立场，不含判断推测的语感"}, {"form": "～から言えば", "diff": "意思基本相同，但语感稍微更口语化"}], "quiz": [{"q": "医者____、この症状は心配ない。", "opts": ["A. から見ると", "B. にとって", "C. として", "D. によって"], "ans": "A", "exp": "表示从医生的专业角度来判断，用「から見ると」最合适"}, {"q": "外国人____、日本の文化は不思議に見える。", "opts": ["A. にとって", "B. から見ると", "C. として", "D. について"], "ans": "B", "exp": "表示从外国人的视角来看，用「から見ると」表示观察判断"}, {"q": "経済学____、この政策は効果的だと言える。", "opts": ["A. から見ると", "B. の観点から見ると", "C. から言うと", "D. 以上すべて"], "ans": "D", "exp": "这三种表达方式在此语境下都可以使用，意思相近"}]}, "59": {"analysis": "「一方で」用于表示同一事物或人的两个对立或不同的方面，强调对比性。与中文的「另一方面」「与此同时」相似，但更侧重于突出事物的两面性或矛盾性。常用于客观描述，语感较为正式，多出现在书面语或正式场合。", "mistakes": "❌ 彼は優しい一方で、時々厳しいです → ✅ 彼は優しい一方で、時々厳しい（「一方で」后面不用敬语形式，保持普通形）；❌ 今日は暑い、一方で昨日は寒かった → ✅ 今日は暑い一方で、風は涼しい（「一方で」用于同一主体的不同方面，不能用于不同时间的对比）", "similar": [{"form": "～反面", "diff": "「反面」更强调负面的对立面，「一方で」可用于任何对比"}, {"form": "～に対して", "diff": "「に対して」重在对比两个不同事物，「一方で」重在同一事物的两面性"}, {"form": "～ものの", "diff": "「ものの」表示让步转折，「一方で」单纯表示对比关系"}], "quiz": [{"q": "この町は交通が便利な____、物価が高い。", "opts": ["A. 一方で", "B. 反対に", "C. しかし", "D. そして"], "ans": "A", "exp": "表示同一事物（这个城镇）的两个不同方面的对比，用「一方で」最合适"}, {"q": "彼女は日本語が上手な____、英語はあまり話せない。", "opts": ["A. ところで", "B. 一方で", "C. それで", "D. だから"], "ans": "B", "exp": "对比同一人在不同语言方面的能力差异，「一方で」表现两面性"}, {"q": "この仕事は給料がいい____、残業が多くて大変だ。", "opts": ["A. けれど", "B. そのため", "C. 一方で", "D. つまり"], "ans": "C", "exp": "同一工作的优点和缺点形成对比，「一方で」最能体现这种两面性"}]}, "60": {"analysis": "「～ことから」表示根据某个事实或特征作为理由进行判断、命名或得出结论。与一般的理由表达不同，它强调的是基于客观事实的逻辑推导，常用于说明命名由来、判断依据等正式场合。语感上比较客观、理性。", "mistakes": "❌ 雨が降ったことから、試合が中止になった → ✅ 雨が降ったので、試合が中止になった（单纯的因果关系用「ので」）；❌ 彼が来ないことから、パーティーをやめよう → ✅ 彼が来ないから、パーティーをやめよう（主观决定用「から」更自然）", "similar": [{"form": "～ため（に）", "diff": "「ため」表示目的或原因，语感更直接；「ことから」更强调基于事实的推论"}, {"form": "～ので", "diff": "「ので」是一般的客观理由；「ことから」特指基于某个事实特征的推导"}], "quiz": [{"q": "彼女の声が美しい____、「歌姫」と呼ばれている。", "opts": ["A. ので", "B. ことから", "C. ために", "D. によって"], "ans": "B", "exp": "基于声音美丽这个特征而得到称呼，用「ことから」表示命名依据"}, {"q": "この花は朝に咲く____、「朝顔」という名前がある。", "opts": ["A. から", "B. ので", "C. ことから", "D. ため"], "ans": "C", "exp": "说明花朵命名的依据，基于「朝に咲く」这个特征"}, {"q": "経験が豊富である____、彼はリーダーに選ばれた。", "opts": ["A. ことから", "B. ので", "C. ために", "D. によって"], "ans": "A", "exp": "基于经验丰富这个客观事实作为选择的依据"}]}, "61": {"analysis": "「のみならず」是书面语表达，相当于口语的「だけでなく」，用于强调不仅限于前项，还要追加更重要或意外的后项。常用于正式文章、演讲等场合，语感较为庄重严肃。使用时往往暗示后项比前项更重要或更值得关注。", "mistakes": "❌ 彼は優秀のみならず、親切だ → ✅ 彼は優秀であるのみならず、親切でもある（形容詞後需要加「である」）；❌ 今日のみならず明日も雨が降る → ✅ 今日のみならず明日も雨が降るだろう（后句也应使用相应的敬語或书面語形式）", "similar": [{"form": "だけでなく", "diff": "口语表达，「のみならず」是其书面语形式"}, {"form": "ばかりでなく", "diff": "也表示追加，但「ばかりでなく」语感更强调前项的程度深"}, {"form": "に加えて", "diff": "单纯表示追加，没有「のみならず」那种递进强调的语感"}], "quiz": [{"q": "この薬は効果が高い____、副作用も少ない。", "opts": ["A. のみならず", "B. ことならず", "C. ものならず", "D. ところならず"], "ans": "A", "exp": "「のみならず」表示不仅前项成立，后项也成立的递进关系"}, {"q": "彼女は美しい____、頭もいい。", "opts": ["A. のみなって", "B. のみならず", "C. のみなくて", "D. のみでなく"], "ans": "B", "exp": "形容詞連体形+のみならず是正确接续形式"}, {"q": "日本語____、中国語も話せます。", "opts": ["A. のみならず", "B. のみなって", "C. のことならず", "D. のもとならず"], "ans": "A", "exp": "名詞直接+のみならず表示「不仅日语，连中文也会说」"}]}, "62": {"analysis": "「といった」是典型的例示表现，用于列举几个具体例子来代表某一类别，含有「等等」「之类的」的语感。常用于举出同类事物中的代表性例子，让听者联想到其他同类事物。语感比较正式，多用于书面语或正式场合。", "mistakes": "❌ 映画や音楽といった好きです。→ ✅ 映画や音楽といった娯楽が好きです。原因：といった后面必须接名词，不能直接接形容词或动词", "similar": [{"form": "～など", "diff": "など更口语化，といった更正式且强调例示性质"}, {"form": "～をはじめとして", "diff": "をはじめとして以某个代表性事物为首，といった是平等列举"}], "quiz": [{"q": "彼は数学や物理____科目が得意だ。", "opts": ["A. など", "B. といった", "C. について", "D. に関して"], "ans": "B", "exp": "といった用于列举具体例子来代表某类别，这里举例说明理科科目"}, {"q": "会社では営業や経理____部署で働いている人が多い。", "opts": ["A. という", "B. などの", "C. といった", "D. として"], "ans": "C", "exp": "といった适合列举同类事物的代表例子，这里列举公司的不同部门"}, {"q": "桜や梅____花を見るのが好きです。", "opts": ["A. といって", "B. といった", "C. による", "D. として"], "ans": "B", "exp": "といった用于举例列举，桜や梅是花的具体例子"}]}, "63": {"analysis": "「～にしたがって/につれて」表示两个事物同步变化的关系，强调A变化时B也相应变化。这个文法带有客观描述的语感，多用于描述自然规律、普遍现象或渐进性变化。与单纯的时间推移不同，它强调的是因果关联性和同步性。", "mistakes": "❌ 勉強するにしたがって、成績がよくなった。→ ✅ 勉強するにつれて、成績がよくなった。（一次性完成的动作不用にしたがって）❌ 雨が降るにつれて、気温が上がった。→ ✅ 雨が降るにつれて、気温が下がった。（要符合逻辑的因果关系）", "similar": [{"form": "～とともに", "diff": "更强调伴随性，可用于抽象概念，语感更正式"}, {"form": "～につき", "diff": "表示比例关系，多用于价格、数量等具体数值变化"}], "quiz": [{"q": "時代が変わる____、人々の考え方も変化していく。", "opts": ["A. につれて", "B. について", "C. に対して", "D. に関して"], "ans": "A", "exp": "表示时代变化与人们思想变化的同步关系，用につれて"}, {"q": "練習を重ねる____、だんだん上手になってきた。", "opts": ["A. に対して", "B. にしたがって", "C. について", "D. に関して"], "ans": "B", "exp": "练习的累积与技能提高呈同步变化关系"}, {"q": "物価が上がる____、生活が苦しくなる。", "opts": ["A. について", "B. に対して", "C. につれて", "D. によって"], "ans": "C", "exp": "物价上涨与生活困难程度呈正比例同步变化"}]}, "64": {"analysis": "「～得る/得ない」表示某种情况发生的可能性存在或不存在，语感偏书面语和正式场合。与「かもしれない」不同，它更强调逻辑上的可能性判断，常用于分析、推理或否定不合理的情况。肯定形「得る」使用频率较低，否定形「得ない」更为常见。", "mistakes": "❌ そんなことは得ないです → ✅ そんなことはあり得ません（敬语场合用「あり得ません」而非「得ないです」）；❌ 雨が降り得るかもしれない → ✅ 雨が降り得る（不要与「かもしれない」重复使用，语义冗余）", "similar": [{"form": "～かもしれない", "diff": "「得る」更强调逻辑可能性，「かもしれない」更强调主观推测"}, {"form": "～可能性がある", "diff": "「可能性がある」是直接表述，「得る」是通过动词变化表达可能性"}, {"form": "～恐れがある", "diff": "「恐れがある」专指不好的可能性，「得る」可好可坏"}], "quiz": [{"q": "このような状況では、事故が____。", "opts": ["A. 起こり得る", "B. 起こってある", "C. 起こりそうだ", "D. 起こるはずだ"], "ans": "A", "exp": "表示事故发生的可能性存在，用「起こり得る」最合适"}, {"q": "彼がそんな嘘をつくなんて____。", "opts": ["A. あるかもしれない", "B. あり得ない", "C. ありそうもない", "D. あるわけない"], "ans": "B", "exp": "强调逻辑上不可能，「あり得ない」是固定表达"}, {"q": "技術の進歩により、将来そのようなことも____だろう。", "opts": ["A. 可能になり得る", "B. 可能にあり得る", "C. 可能であり得る", "D. 可能としてあり得る"], "ans": "C", "exp": "「可能である」+「あり得る」的组合，表示成为可能的可能性"}]}, "65": {"analysis": "「～に反して」表示结果与预期、期待、规定等完全相反或违背。这个文法强调的是现实情况与原本的设想或规则产生了对立性的偏离。常用于描述意外的结果或违反某种标准的行为，语感上带有「意想不到」或「违背常理」的意味。", "mistakes": "中国学习者常错误地在所有「相反」情况下都使用此文法。❌ 彼の意見に反して、私は賛成だ → ✅ 彼の意見に対して、私は賛成だ（单纯的意见不同不用「に反して」，应该用「に対して」）。另一个错误是混淆接续形式：❌ 予想を反して → ✅ 予想に反して（必须用「に反して」的形式）。", "similar": [{"form": "～に逆らって", "diff": "更强调主观的反抗和对抗行为，多用于人的意志行为"}, {"form": "～とは逆に", "diff": "单纯表示方向或内容的相反，不含违背预期的意味"}, {"form": "～に関わらず", "diff": "表示不受某种条件影响，强调无关性而非相反性"}], "quiz": [{"q": "医者の忠告____、彼はタバコをやめなかった。", "opts": ["A. に対して", "B. に反して", "C. について", "D. による"], "ans": "B", "exp": "违背了医生的忠告，表示与建议相反的行为，用「に反して」"}, {"q": "皆の期待____、新商品は売れなかった。", "opts": ["A. に反して", "B. に関して", "C. に向けて", "D. に基づいて"], "ans": "A", "exp": "结果与大家的期待相反，表示违背期望的结果"}, {"q": "常識____、この植物は冬に花を咲かせる。", "opts": ["A. に対して", "B. について", "C. に反して", "D. に関わらず"], "ans": "C", "exp": "违背常识的现象，表示与一般认知相反的情况"}]}, "66": {"analysis": "「～に関して」是正式的书面语表达，用于引出讨论话题或内容范围，语感比「について」更庄重、更适合正式场合。常用于论文、报告、会议等正式文体中，表示围绕某个主题进行论述或说明。", "mistakes": "❌ 友達に関して話した → ✅ 友達について話した（个人话题用について更自然）；❌ この件に関してはどう思う？ → ✅ この件についてはどう思う？（日常会话中について更合适）", "similar": [{"form": "～について", "diff": "について更口语化，适用范围更广，日常会话中常用"}, {"form": "～に関連して", "diff": "に関連して强调相关性和关联性，而に関して仅表示话题范围"}, {"form": "～をめぐって", "diff": "をめぐって暗示围绕某话题有争议或复杂情况"}], "quiz": [{"q": "会社の経営____、重要な決定を下した。", "opts": ["A. について", "B. に関して", "C. として", "D. において"], "ans": "B", "exp": "正式的商务场合讨论经营问题，用に関して更合适"}, {"q": "教育制度____論文を書いている。", "opts": ["A. に関する", "B. に関して", "C. について", "D. に対する"], "ans": "A", "exp": "修饰名词「論文」需要用連体形「に関する」"}, {"q": "昨日の映画____、君はどう思った？", "opts": ["A. に関して", "B. に関する", "C. について", "D. に対して"], "ans": "C", "exp": "日常会话中询问感想，用について比に関して更自然"}]}, "67": {"analysis": "「～反面」表示同一事物具有相对或矛盾的两个方面，强调事物的双面性。与中文的「另一方面」不同，这个文法必须是同一主体的正反两面特征，带有客观分析的语感，常用于论述文和说明文中。", "mistakes": "❌ 彼は優しい反面、私は厳しい。→ ✅ 彼は優しい反面、時々厳しい。（「反面」前后必须是同一主体，不能是不同的人或事物进行对比）", "similar": [{"form": "～一方で", "diff": "可以用于不同主体的对比，使用范围更广"}, {"form": "～ものの", "diff": "表示逆接转折，不强调双面性而是转折关系"}], "quiz": [{"q": "この薬は効果がある____、副作用もある。", "opts": ["A. 反面", "B. ために", "C. ところで", "D. けれど"], "ans": "A", "exp": "表示药物的正面效果和负面副作用这两个方面，符合同一事物双面性的特点"}, {"q": "スマートフォンは便利な____、依存症になる危険もある。", "opts": ["A. 一方", "B. 反面", "C. 場合", "D. はず"], "ans": "B", "exp": "智能手机的便利性和成瘾危险性是同一事物的两面性，用「反面」最合适"}, {"q": "彼は真面目な____、ユーモアもある。", "opts": ["A. ので", "B. のに", "C. 反面", "D. ばかり"], "ans": "C", "exp": "同一个人既认真又有幽默感，体现了人格的两面性特征"}]}, "68": {"analysis": "「～上」表示从某个特定的观点、立场或专业领域来看待问题，相当于中文的'在...方面'、'从...角度'。这是书面语表达，常用于正式场合，带有客观分析的语感。多用于讨论问题的不同层面，如法律上、道德上、技术上等专业领域的观点。", "mistakes": "❌ 時間上に遅れました → ✅ 時間的に遅れました（表示时间方面的延迟应用「時間的に」）。❌ 経済上を考える → ✅ 経済上考える（「～上」后面不需要を，直接接动词）", "similar": [{"form": "～的（てき）に", "diff": "「～的に」更偏重性质特征，「～上」更强调观点立场"}, {"form": "～において", "diff": "「～において」表示场所场面，「～上」表示观点领域"}, {"form": "～に関して", "diff": "「～に関して」表示关于某事，「～上」表示从某角度看"}], "quiz": [{"q": "理論____は正しいが、実際には難しい。", "opts": ["A. 上", "B. 的に", "C. において", "D. として"], "ans": "A", "exp": "从理论角度来看，应用表示观点的「～上」"}, {"q": "安全____の問題で、この計画は中止になった。", "opts": ["A. として", "B. 上", "C. 的", "D. において"], "ans": "B", "exp": "从安全方面考虑，用「～上」表示观点领域"}, {"q": "技術____は可能だが、コスト____は問題がある。", "opts": ["A. 上、的に", "B. 的に、上", "C. 上、上", "D. において、として"], "ans": "C", "exp": "两个都是表示观点角度，技术上、成本上都用「～上」"}]}, "69": {"analysis": "「つつある」表示某种变化或状态正在持续进行中，强调的是一个渐进的过程，常用于描述社会现象、自然变化等较为正式或严肃的话题。这个文法带有书面语色彩，比「〜ている」更强调变化的进行性和持续性。", "mistakes": "❌ 日本語を勉強しつつある → ✅ 日本語を勉強している（「つつある」不用于表示一般的持续动作，而是用于表示变化过程）；❌ 経済が悪くなりつつある → ✅ 経済が悪化しつつある（应该使用表示变化的动词）", "similar": [{"form": "〜ている", "diff": "「ている」表示一般的持续状态，「つつある」强调变化的进行过程"}, {"form": "〜てきている", "diff": "「てきている」强调从过去到现在的变化，「つつある」强调当前正在进行的变化过程"}, {"form": "〜ばかりだ", "diff": "「ばかりだ」表示变化只朝一个方向发展，「つつある」更中性地表示变化进行中"}], "quiz": [{"q": "最近、若者の読書離れが____。", "opts": ["A. 進んでいる", "B. 進みつつある", "C. 進んでくる", "D. 進むところだ"], "ans": "B", "exp": "表示社会现象正在逐渐发展变化，用「つつある」最合适"}, {"q": "彼は毎日日本語を____。", "opts": ["A. 勉強しつつある", "B. 勉強している", "C. 勉強してくる", "D. 勉強するところだ"], "ans": "B", "exp": "表示日常持续的学习行为，用「ている」而不是「つつある」"}, {"q": "この地域の人口は____。", "opts": ["A. 減っている", "B. 減ってくる", "C. 減少しつつある", "D. 減るばかりだ"], "ans": "C", "exp": "人口减少是一个渐进的变化过程，用「減少しつつある」最能表现这种持续进行的变化"}]}, "70": {"analysis": "「〜に限らず」表示不仅仅限于某个范围，还包括其他情况，用于扩大话题的适用范围。这个文法带有强调普遍性的语感，常用于说明某种情况或规则适用于更广泛的对象。与「〜だけでなく」相比，「〜に限らず」更正式，多用于书面语或正式场合。", "mistakes": "❌ 学生に限らず、先生たちも勉強している → ✅ 学生に限らず、先生も勉強している（「〜に限らず」后面通常用单数形式）；❌ 日本に限らずに、韓国も行きたい → ✅ 日本に限らず、韓国も行きたい（不能加「に」）", "similar": [{"form": "〜だけでなく", "diff": "「〜に限らず」更正式，多用于书面语；「〜だけでなく」更口语化"}, {"form": "〜はもちろん", "diff": "「〜はもちろん」强调理所当然；「〜に限らず」强调扩大范围"}, {"form": "〜のみならず", "diff": "「〜のみならず」更文语化，书面色彩更浓"}], "quiz": [{"q": "大人____、子供も楽しめるイベントです。", "opts": ["A. に限らず", "B. に限って", "C. に限り", "D. に限る"], "ans": "A", "exp": "表示「不限于大人」，扩大适用范围，用「に限らず」"}, {"q": "この問題は日本____、世界中で起きている。", "opts": ["A. に限って", "B. に限らず", "C. に限り", "D. だけに限らず"], "ans": "B", "exp": "表示「不仅仅是日本」，扩大到世界范围，用「に限らず」"}, {"q": "平日____、土日も営業しております。", "opts": ["A. に限って", "B. に限り", "C. に限らず", "D. を限らず"], "ans": "C", "exp": "表示「不限于平日」，土日也营业，用「に限らず」扩大营业范围"}]}, "71": {"analysis": "「お見えになる」是「来る」的尊敬语表现，用于对他人的到访表示敬意。该表达方式含有恭敬地告知或报告某人到来的语感，常用于正式场合、商务环境或服务业中。与一般的尊敬语不同，这个表达带有特别庄重的敬意，体现了对来访者身份地位的尊重。", "mistakes": "❌ 私がお見えになりました → ✅ 私が参りました（不能对自己使用尊敬语）；❌ 友達がお見えになった → ✅ 友達が来た（对朋友不需要用如此正式的尊敬语，显得过于生硬）", "similar": [{"form": "いらっしゃる", "diff": "同样是「来る」的尊敬语，但「お見えになる」更加正式庄重"}, {"form": "お越しになる", "diff": "也表示「来る」的尊敬语，但「お見えになる」多用于到达现场的报告"}], "quiz": [{"q": "社長が会議室に____。", "opts": ["A. お見えになりました", "B. 来ました", "C. 参りました", "D. いました"], "ans": "A", "exp": "对社长这样的上级要使用尊敬语「お見えになる」"}, {"q": "お客様が____ので、すぐに案内してください。", "opts": ["A. 来たから", "B. お見えになった", "C. 参った", "D. いらした"], "ans": "B", "exp": "对客人要使用尊敬语，「お見えになる」最适合商务场合"}, {"q": "明日、私が____ます。", "opts": ["A. お見えになり", "B. いらっしゃい", "C. 参り", "D. 来"], "ans": "C", "exp": "说自己要用谦譲語「参る」，不能用尊敬語"}]}, "72": {"analysis": "「～願えますでしょうか」是极其正式的敬语表达，比「お願いします」更加礼貌。多用于商务场合、服务业或对地位较高的人的请求。语感上带有恭敬和谦逊的色彩，是日本社会中体现上下级关系的重要表达方式。", "mistakes": "❌ お名前を書いて願えますでしょうか → ✅ お名前をご記入願えますでしょうか（应使用敬语动词「ご記入」而非普通动词）。❌ 手伝って願えますでしょうか → ✅ お手伝い願えますでしょうか（应将动词名词化后使用）", "similar": [{"form": "～ていただけますでしょうか", "diff": "同样礼貌，但语感稍微直接一些，使用频率更高"}, {"form": "～てくださいませんでしょうか", "diff": "礼貌程度相当，但语感上更偏向于期待对方的好意"}], "quiz": [{"q": "会議資料の準備を____。", "opts": ["A. 願えますでしょうか", "B. お願いできますでしょうか", "C. ご準備願えますでしょうか", "D. 準備して願えますでしょうか"], "ans": "C", "exp": "名词接续时需要加「ご」等敬語前缀，形成「ご準備願えますでしょうか」"}, {"q": "恐れ入りますが、こちらに____。", "opts": ["A. 書いて願えますでしょうか", "B. ご記入願えますでしょうか", "C. 書く願えますでしょうか", "D. お書き願えますでしょうか"], "ans": "B", "exp": "「書く」的敬语形式是「ご記入」，应使用敬语动词"}, {"q": "少々お時間を____。", "opts": ["A. いただいて願えますでしょうか", "B. もらって願えますでしょうか", "C. 願えますでしょうか", "D. ください願えますでしょうか"], "ans": "C", "exp": "名词「お時間」可以直接接「を願えますでしょうか」，无需动词"}]}, "73": {"analysis": "「申し上げたい」是「申し上げる」的意志形，表达谦逊地想要对上级或尊敬的对象传达某事的愿望。这是典型的谦让语表现，常用于正式场合、商务交流或表达敬意时。语感非常正式且带有强烈的敬语色彩，体现说话人的谦逊态度。", "mistakes": "❌ 友達にお礼を申し上げたいです → ✅ 友達にお礼を言いたいです（对朋友不需要用谦让语，显得过分客气且不自然）。另一个常见错误是接续形式：❌ 申し上げたいです → ✅ 申し上げたいと思います（通常与「と思います」搭配使用）", "similar": [{"form": "～させていただきたい", "diff": "更加客气，但有时显得过度谦逊，「申し上げたい」更适合传达信息时使用"}, {"form": "～と存じます", "diff": "表达想法或认知的谦让语，而「申し上げたい」专门用于想要传达或告知某事"}], "quiz": [{"q": "部長に報告を____と思います。", "opts": ["A. 申し上げたい", "B. 言いたい", "C. 話したい", "D. 伝えたい"], "ans": "A", "exp": "对上级报告时应使用谦让语「申し上げたい」表示敬意"}, {"q": "この度は貴重なお時間をいただき、心より感謝を____。", "opts": ["A. 言いたいです", "B. 申し上げたいです", "C. 申し上げたく存じます", "D. 話したいです"], "ans": "C", "exp": "正式场合表达感谢时，「申し上げたく存じます」是最恰当的谦让语表现"}, {"q": "友人に相談を____と思っています。", "opts": ["A. 申し上げたい", "B. したい", "C. 申したい", "D. 言いたい"], "ans": "B", "exp": "对朋友说话不需要谦让语，用普通的「したい」即可"}]}, "74": {"analysis": "「～ばと思います」是一种非常委婉客气的表达方式，常用于商务场合或正式场合中提出希望或建议。这个文法带有「もしよろしければ」的语感，表达说话人的谦逊态度，避免给对方造成压力。相比直接说「してください」，这种表达更加间接和礼貌。", "mistakes": "❌ 明日来てくれればと思います。→ ✅ 明日いらしていただければと思います。（敬语使用不当，对方的动作应用敬语）\n❌ 早く決めればと思います。→ ✅ お早めにご決定いただければと思います。（语气过于直接，缺乏委婉性）", "similar": [{"form": "～ていただきたいと思います", "diff": "更直接地表达希望，礼貌程度稍低一些"}, {"form": "～ばいかがでしょうか", "diff": "疑问形式的建议，更加委婉，但语气稍微强一些"}], "quiz": [{"q": "お忙しいとは思いますが、お時間のあるときに____。", "opts": ["A. 連絡してくれればと思います", "B. ご連絡いただければと思います", "C. 連絡すればと思います", "D. 連絡したらと思います"], "ans": "B", "exp": "对方的动作要用敬语「いただく」，这是商务敬语的基本用法"}, {"q": "この件について、もう一度____と思います。", "opts": ["A. 考えれば", "B. 考えていただければ", "C. ご検討いただければ", "D. 検討すれば"], "ans": "C", "exp": "「検討」比「考える」更正式，加上「ご」和「いただく」的敬语形式最合适"}, {"q": "資料を____と思っております。", "opts": ["A. 送れば", "B. お送りすれば", "C. 送っていただければ", "D. お送りさせていただければ"], "ans": "D", "exp": "自己的动作用谦让语「させていただく」，表示谦逊地希望为对方做某事"}]}, "75": {"analysis": "「につきまして」是「について」的敬語形式，常用于商务文书、正式通知等场合，表示「关于~」的意思。相比普通的「について」，它带有更强的敬意和正式感，多用于向客户、上司等需要表示敬意的对象说明某个话题或事项。语感上非常正式、礼貌，是商务日语的典型表现。", "mistakes": "中国学习者容易在日常会话中过度使用：❌ 明日の予定につきまして、話しましょう → ✅ 明日の予定について話しましょう（日常对话用普通形式即可）。另一个错误是接续不当：❌ 忙しいにつきまして → ✅ 忙しいことにつきまして（形容词需要加「こと」）", "similar": [{"form": "について", "diff": "普通表现，につきまして是其敬語形式"}, {"form": "に関しまして", "diff": "同样是 るわけだ（正确，但更自然的表达是「病気のことがわかるわけだ」）", "similar": [{"form": "はずだ", "diff": "はずだ是推测或期待，わけだ是基于事实的必然结论"}, {"form": "ということだ", "diff": "ということだ更侧重传达信息，わけだ更侧重表达理解和接受"}, {"form": "のも当然だ", "diff": "のも当然だ直接表示理所当然，わけだ带有恍然大悟的语感"}], "quiz": [{"q": "彼は毎日5時間も勉強している。成績が良い____。", "opts": ["A. はずだ", "B. わけだ", "C. だろう", "D. かもしれない"], "ans": "B", "exp": "根据「毎日5時間勉強」这个已知事实，得出「成績が良い」是理所当然的结论"}, {"q": "A：どうして田中さんは今日来ないんですか。B：風邪をひいているらしいです。A：それで来ない____。", "opts": ["A. だろう", "B. にちがいない", "C. わけですね", "D. はずです"], "ans": "C", "exp": "听到解释后表示理解和接受，「わけですね」表达恍然大悟的语感"}, {"q": "息子は東京大学に合格した。一生懸命勉強した____だ。", "opts": ["A. わけ", "B. はず", "C. もの", "D. こと"], "ans": "A", "exp": "看到好结果后回想原因，表示「原来如此，难怪能考上」的理解"}]}, "81": {"analysis": "「～どころか」表示强烈的否定和对比，强调实际情况远远超出预期，往往带有意外或夸张的语感。用于否定前项的程度，同时强调后项的程度更甚，常用于表达「非但不是A，反而是更甚的B」的语义结构。", "mistakes": "❌ 今日は暖かいどころか、とても暑いです。→ ✅ 今日は暖かいどころか、とても寒いです。「どころか」前后必须是对立或程度递进关系，不能是同方向的程度差异。", "similar": [{"form": "～はおろか", "diff": "语感更正式，多用于书面语，强调连最基本的都做不到"}, {"form": "～というより", "diff": "表示修正说法，语感较温和，不强调意外性"}], "quiz": [{"q": "彼は日本語が話せない____、読むこともできない。", "opts": ["A. どころか", "B. というより", "C. に関して", "D. について"], "ans": "A", "exp": "强调「非但不会说，连读都不会」的递进对比关系"}, {"q": "この問題は簡単____、とても難しくて解けなかった。", "opts": ["A. に対して", "B. どころか", "C. として", "D. によって"], "ans": "B", "exp": "表示「别说简单了，反而很难」的强烈对比"}, {"q": "今月は節約する____、いつもより多く使ってしまった。", "opts": ["A. ために", "B. ところで", "C. どころか", "D. に関して"], "ans": "C", "exp": "强调「非但没节约，反而花得更多」的意外结果"}]}, "82": {"analysis": "「〜ようでは」表示对某种状况的批评、警告或担忧，含有「如果是这样的话就有问题」的强烈语感。常与「だめだ/いけない/まだまだだ」等消极评价词搭配使用。语调带有说话人的不满或担心情绪，多用于上级对下级、长辈对晚辈的场合。", "mistakes": "❌ 彼は優秀なようでは、心配だ → ✅ 彼がこんなに優秀でないようでは、心配だ。「ようでは」不能用于肯定评价，只能用于表示问题或不足的状况。", "similar": [{"form": "〜ようなら", "diff": "「ようなら」语气较温和，「ようでは」更强调批评警告"}, {"form": "〜では", "diff": "「では」单纯表示条件，「ようでは」含有批评不满的感情色彩"}], "quiz": [{"q": "時間に遅れる____、社会人として失格だ。", "opts": ["A. ようでは", "B. ようなら", "C. ようだと", "D. ようにも"], "ans": "A", "exp": "批评迟到行为，「ようでは」表示强烈的批评语气"}, {"q": "この程度の仕事ができない____、昇進は無理だろう。", "opts": ["A. ようだと", "B. ようでは", "C. ようにも", "D. ようとも"], "ans": "B", "exp": "对工作能力不足的警告，使用批评语气的「ようでは」"}, {"q": "彼女はとても優秀____、将来が楽しみだ。", "opts": ["A. なようでは", "B. だようでは", "C. なので", "D. なようでは"], "ans": "C", "exp": "这是肯定评价，不能使用「ようでは」，应该用「ので」表示原因"}]}, "83": {"analysis": "「～ぶって」表示故意装出某种样子或态度，但实际并非如此，带有明显的批判色彩。这个文法强调的是「虚假的表现」和「做作的行为」，说话者对这种行为持负面评价。常用于批评他人装腔作势、矫揉造作的行为。", "mistakes": "❌ 彼は優しいぶっている。→ ✅ 彼は優しいぶっている。但更自然的是：彼は優しそうなふりをしている。容易把「ぶって」当成中性词使用，实际上它含有强烈批判意味，多用于负面评价的场合。", "similar": [{"form": "～ふりをする", "diff": "中性表达，单纯表示假装，不含批判色彩"}, {"form": "～がる", "diff": "表示表现出某种感情或状态，但不含虚假装作的意思"}, {"form": "～めく", "diff": "表示呈现某种气氛或样子，通常是自然呈现，非故意装作"}], "quiz": [{"q": "あの人はお金持ち____、高級品ばかり買っている。", "opts": ["A. ぶって", "B. ふりで", "C. がって", "D. めいて"], "ans": "A", "exp": "「ぶって」表示装出有钱人的样子，含批判意味，符合语境"}, {"q": "彼女は何も知らない____、実は全部聞いていた。", "opts": ["A. ように", "B. ふうに", "C. ふりをして", "D. ぶって"], "ans": "C", "exp": "这里是中性的假装，没有批判色彩，用「ふりをして」更合适"}, {"q": "新人なのに、ベテラン____仕事をしている。", "opts": ["A. らしく", "B. ぶって", "C. のように", "D. として"], "ans": "B", "exp": "新人装作老手的样子，含有批判做作的意思，用「ぶって」"}]}, "84": {"analysis": "「～に限って」表示在某种特定情况下才发生某种现象，常含有讽刺或遗憾的语感。多用于描述令人意外的特例情况，特别是不好的事情偏偏在不该发生的时候发生。这个文法带有强烈的主观感情色彩，体现说话人的无奈或讽刺心情。", "mistakes": "❌ 今日に限って雨が降った。→ ✅ よりによって今日雨が降った。原因：「に限って」用于反复发生的现象中的特例，不适合描述单纯的一次性事件。❌ 彼に限ってそんなことをするはずがない。→ ✅ 彼に限ってそんなことをするわけがない。原因：信頼用法时常用「わけがない」等断定表现。", "similar": [{"form": "～に限り", "diff": "正式书面语，表示限定范围，无讽刺语感"}, {"form": "よりによって～", "diff": "强调时机的不巧，语气更强烈"}, {"form": "～だけに", "diff": "表示正因为某种特殊性质而产生的结果"}], "quiz": [{"q": "急いでいるとき____、エレベーターが故障している。", "opts": ["A.に限って", "B.に限り", "C.だけに", "D.によって"], "ans": "A", "exp": "表示偏偏在着急时电梯坏了，含讽刺语感，用「に限って」"}, {"q": "彼____そんな失礼なことを言うはずがない。", "opts": ["A.に限り", "B.に限って", "C.だけに", "D.について"], "ans": "B", "exp": "表示对某人的信赖，认为他不会做那种事，用「に限って」"}, {"q": "このサービスは会員____提供いたします。", "opts": ["A.に限って", "B.に限り", "C.だけに", "D.によって"], "ans": "B", "exp": "正式限定范围的表达，无感情色彩，用「に限り」"}]}, "85": {"analysis": "「～ことだ」是表示忠告和建议的文法，语气比较强烈，带有「这样做比较好」的含义。多用于长辈对晚辈、上级对下级的场合，或者表达说话人的强烈建议。与单纯的「～べきだ」相比，语感更加亲切和具体。", "mistakes": "❌ 試験に合格するべきことだ → ✅ 試験に合格することだ（不能与「べき」重复使用）；❌ 早く寝ていることだ → ✅ 早く寝ることだ（动词て形不能直接接「ことだ」）", "similar": [{"form": "～べきだ", "diff": "「べきだ」更正式严肃，「ことだ」更亲切温和"}, {"form": "～たらどうか", "diff": "「たらどうか」是建议尝试，「ことだ」是强调应该这样做"}, {"form": "～といい", "diff": "「といい」表示希望，「ことだ」表示确信的建议"}], "quiz": [{"q": "風邪を早く治すには、よく____ことだ。", "opts": ["A. 寝て", "B. 寝る", "C. 寝た", "D. 寝れば"], "ans": "B", "exp": "「ことだ」前面接动词辞书形，所以用「寝る」"}, {"q": "そんなに心配____ことだ。きっとうまくいくよ。", "opts": ["A. する", "B. した", "C. しない", "D. して"], "ans": "C", "exp": "根据语境「不要担心」，应该用否定形「しない」"}, {"q": "留学したいなら、今から____ことだ。", "opts": ["A. 準備している", "B. 準備する", "C. 準備した", "D. 準備すべき"], "ans": "B", "exp": "「ことだ」接动词辞书形，且不与「べき」重复使用"}]}, "86": {"analysis": "「AというA」は「Aという名前のもの全て」を表す強調表現で、「凡是A的都～」という意味になります。単なる全部ではなく、その範疇に属するもの一つ残らず全てを強調する語感があります。話し手の徹底的な行動や状況を表現する際によく使われ、やや誇張的なニュアンスを含みます。", "mistakes": "❌ 本という本を全部読んだ（という省略） → ✅ 本という本を全部読んだ 中国人学習者は「という」を省略しがちですが、この文法では必須です。また、❌ 友達という友達に電話をかけました → ✅ 友達という友達に電話をかけた 丁寧語を使うと不自然になりやすく、普通形で使うのが一般的です。", "similar": [{"form": "Aという名前のA", "diff": "具体的な名前を持つものを指すが、「AというA」は同カテゴリー全体を指す"}, {"form": "AでもA", "diff": "「どんなAでも」の意味で、選択の幅を表すが、「AというA」は全部を尽くす意味"}], "quiz": [{"q": "彼は薬____薬を試してみたが、効かなかった。", "opts": ["A. という", "B. での", "C. による", "D. からの"], "ans": "A", "exp": "「薬という薬」で「ありとあらゆる薬」という意味になる"}, {"q": "あの人は病気____病気にかかったことがある。", "opts": ["A. での", "B. という", "C. による", "D. としての"], "ans": "B", "exp": "「病気という病気」で「あらゆる病気」を強調している"}, {"q": "この地域では花____花が美しく咲いている。", "opts": ["A. からの", "B. での", "C. による", "D. という"], "ans": "D", "exp": "「花という花」で「ありとあらゆる花」という意味を表す"}]}, "87": {"analysis": "表示「差一点就要发生某种不好的事情」，带有庆幸的语气。常用于回顾刚刚避免的危险或麻烦情况，强调「险些」「差点」的惊险感。多用于口语，表达说话人的后怕心情。", "mistakes": "❌ 危なくて事故になったところだった → ✅ 危なくて事故になるところだった（必须用动词辞书形+ところだった）；❌ もう少しで遅刻したところだった → ✅ もう少しで遅刻するところだった（过去式+ところだった是错误的）", "similar": [{"form": "～そうになった", "diff": "更强调动作即将发生的瞬间感，～ところだった更强调回顾性的庆幸"}, {"form": "～かけた", "diff": "表示动作进行到一半就停止，～ところだった强调完全没有发生但很危险"}], "quiz": [{"q": "階段で転んで、大けがを____ところだった。", "opts": ["A.する", "B.した", "C.している", "D.していた"], "ans": "A", "exp": "～ところだった前必须用动词辞书形，表示差点发生"}, {"q": "財布を忘れて、恥ずかしい思いを____ところでした。", "opts": ["A.する", "B.した", "C.している", "D.していた"], "ans": "A", "exp": "动词辞书形+ところだった的固定用法，表示险些发生"}, {"q": "彼の話を信じて、だまされる____だった。", "opts": ["A.こと", "B.もの", "C.ところ", "D.はず"], "ans": "C", "exp": "だまされるところだった表示差点被骗，是固定搭配"}]}, "88": {"analysis": "「～くらいなら」表达一种消极的选择倾向，说话者对前项感到厌恶或不愿接受，宁可选择后项。这个文法带有强烈的情感色彩，常用于表达「与其做某件不情愿的事，不如选择其他方式」的心理。语感上比较激烈，适用于表达强烈拒绝或厌恶的场合。", "mistakes": "❌ 勝つくらいなら、負ける方がいい。→ ✅ 負けるくらいなら、戦わない方がましだ。原因：前后逻辑矛盾，应该是厌恶的事情在前面。❌ 死ぬくらいなら、生きるくらいなら → ✅ 死ぬくらいなら、何でもする。原因：不能两个都用くらいなら，后面应该是具体的选择。", "similar": [{"form": "～より", "diff": "より是客观比较，くらいなら带有强烈的厌恶感和消极色彩"}, {"form": "～ぐらいなら", "diff": "意思完全相同，只是くらい的另一种写法"}, {"form": "それなら", "diff": "それなら是「既然那样」的意思，没有消极选择的含义"}], "quiz": [{"q": "こんなにつらい思いをする____、最初から何もしない方がよかった。", "opts": ["A. くらいなら", "B. ばかりか", "C. につれて", "D. とともに"], "ans": "A", "exp": "表达「与其承受痛苦，不如一开始什么都不做」的消极选择"}, {"q": "彼に謝る____、この仕事を辞める。", "opts": ["A. かわりに", "B. くらいなら", "C. おかげで", "D. に対して"], "ans": "B", "exp": "表达「与其向他道歉，宁可辞职」的强烈厌恶感"}, {"q": "一人で寂しく食事をする____、____。", "opts": ["A. くらいなら、食べない方がましだ", "B. より、楽しい", "C. ので、嬉しい", "D. けれど、美味しい"], "ans": "A", "exp": "くらいなら后面常接「～方がましだ」表达消极选择"}]}, "89": {"analysis": "「まし」表示在两个不好的选择中，选择相对较好的一个，带有「两害相权取其轻」的语感。这是一种消极比较，暗示两个选择都不理想，但其中一个稍微好一些。常用于表达无奈或妥协的心情。", "mistakes": "容易与积极比较混淆。❌ 彼の方が私よりましだ（他比我好）→ ✅ 彼の方が私よりいい。「まし」不用于一般的优劣比较，只用于消极的「两害相权」情况。", "similar": [{"form": "〜より〜の方がいい", "diff": "「いい」是积极比较，「まし」是消极比较（两害相权）"}, {"form": "〜というより〜", "diff": "「というより」是修正说法，「まし」是在不好选择中择其轻"}], "quiz": [{"q": "失業するよりも、給料が安くても働いている____。", "opts": ["A. 方がいい", "B. 方がまし", "C. 方が良い", "D. 方が大切"], "ans": "B", "exp": "在失业和低薪工作这两个不理想选择中择其轻，用「まし」"}, {"q": "嘘をつき続けるよりも、正直に話した____だ。", "opts": ["A. 方がまし", "B. 方がいい", "C. ほうがよい", "D. 方が大事"], "ans": "A", "exp": "继续说谎和坦白都会带来痛苦，但坦白相对好些，属于消极比较"}, {"q": "一人でいるよりも、嫌いな人とでも一緒にいる____。", "opts": ["A. 方がよい", "B. 方がいい", "C. 方がまし", "D. 方が楽しい"], "ans": "C", "exp": "独自一人和与讨厌的人在一起都不舒服，但后者稍微好一些的消极比较"}]}, "90": {"analysis": "「～ものがある」用于表达说话者对某事物所产生的强烈感受或印象，强调这种感觉是客观存在且不容忽视的。常用于评价作品、表演、人物等，带有一种认可和赞赏的语感。这个文法不是简单的「ある」存在句，而是对内在品质或特征的深层感知。", "mistakes": "❌ 彼の話は面白ものがある → ✅ 彼の話には面白いものがある（必须用「には」，且形容词要用连体形）；❌ この映画を見るものがある → ✅ この映画には見るべきものがある（不能直接用动词原形，需要适当的修饰）", "similar": [{"form": "～ところがある", "diff": "更侧重于人的性格特点，而「ものがある」多用于事物的品质"}, {"form": "～感じがする", "diff": "表示主观感受，而「ものがある」强调客观存在的品质"}], "quiz": [{"q": "この小説には読者を____ものがある。", "opts": ["A. 引きつける", "B. 引きつけた", "C. 引きつけて", "D. 引きつけ"], "ans": "A", "exp": "「ものがある」前面用普通形（连体形），动词用原形"}, {"q": "彼女の歌声____心を打つものがある。", "opts": ["A. が", "B. を", "C. には", "D. で"], "ans": "C", "exp": "「～には～ものがある」是固定搭配，用「には」表示对象"}, {"q": "この絵____美しいものがある。", "opts": ["A. は", "B. が", "C. を", "D. には"], "ans": "D", "exp": "表示评价对象时必须用「には」，不能用「は」或「が」"}]}, "91": {"analysis": "「まい」是表示否定推测或否定意志的文语文法，具有较强的文语色彩。作为否定推测时，表示说话人认为某事不太可能发生；作为否定意志时，表示坚决不做某事的决心。这个文法在现代日语中使用频率不高，多见于文学作品或正式场合。", "mistakes": "❌ 彼は来ないまい → ✅ 彼は来るまい（まい本身就表否定，不能和ない重复使用）；❌ 食べるまい → ✅ 食べまい（一段动词去る加まい，不是直接加まい）", "similar": [{"form": "～ないだろう", "diff": "まい更文语化，ないだろう更口语化日常"}, {"form": "～つもりはない", "diff": "つもりはない只表意志，まい可表推测也可表意志"}], "quiz": [{"q": "雨が降っているから、彼は____。", "opts": ["A. 来ないまい", "B. 来るまい", "C. 来まい", "D. 来ませんまい"], "ans": "B", "exp": "まい本身表否定，动词用肯定形，五段动词直接加まい"}, {"q": "このような失敗は二度と____。", "opts": ["A. するまい", "B. しないまい", "C. すまい", "D. しませんまい"], "ans": "C", "exp": "する的まい形是すまい，表示绝不再犯同样错误的决心"}, {"q": "彼女はもうあの店で____だろう。", "opts": ["A. 買い物しまい", "B. 買い物するまい", "C. 買い物すまい", "D. 買い物をしまい"], "ans": "B", "exp": "复合动词買い物する的まい形是買い物するまい"}]}, "92": {"analysis": "「～につけ」表达每当发生某事时必然产生的情感反应，具有很强的反复性和必然性。与「たびに」不同，它更侧重于内心的感受和情感的反复涌现，常用于描述看到、听到、想起某事时内心的固定反应。这个文法带有一定的文语性，多用于正式或文学性表达。", "mistakes": "❌ 雨が降るにつけ、傘を持って行く → ✅ 雨が降るたびに、傘を持って行く（につけ用于情感反应，不用于具体行动）；❌ 彼の写真を見につけて、悲しくなる → ✅ 彼の写真を見るにつけ、悲しくなる（动词要用辞书形，不需要て形）", "similar": [{"form": "〜たびに", "diff": "たびに侧重客观的反复发生，につけ强调主观情感的反复涌现"}, {"form": "〜と", "diff": "と表示条件或发现，につけ专门表达情感的反复感受"}], "quiz": [{"q": "昔の友人の話を聞く____、学生時代を思い出してしまう。", "opts": ["A. につけ", "B. ために", "C. ことで", "D. として"], "ans": "A", "exp": "表示每当听到老朋友的消息就会想起学生时代，是情感的反复涌现"}, {"q": "息子の成長を見る____見る____、時の流れの速さを感じる。", "opts": ["A. たびに〜たびに", "B. につけ〜につけ
