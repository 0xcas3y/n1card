{"analysis": "「～げ」表示从外表观察到的印象或样子，强调通过视觉等感官感受到的表面特征。与「～そう」不同，「～げ」更侧重于描述人的表情、神态、举止等可见的外在表现，常用于文学性表达中，给人一种生动的画面感。", "mistakes": "❌ 彼は嬉しげです → ✅ 彼は嬉しげな様子です（「～げ」后面需要接「な」+名词或「に」+动词，不能直接做谓语）；❌ 雨が降りげです → ✅ 雨が降りそうです（「～げ」不用于客观事物的推测，应该用「～そう」）", "similar": [{"form": "～そう", "diff": "「～そう」表示推测可能性，「～げ」只描述外观印象"}, {"form": "～らしい", "diff": "「～らしい」基于信息推测，「～げ」基于直接观察的外表"}], "quiz": [{"q": "彼女は____歩いている。", "opts": ["A. 急ぎげに", "B. 急ぐげに", "C. 急いげに", "D. 急ぎそうに"], "ans": "A", "exp": "形容词语干「急ぎ」+「げに」的形式正确"}, {"q": "子供たちは____遊んでいる。", "opts": ["A. 楽しげに", "B. 楽しそげに", "C. 楽しいげに", "D. 楽しみげに"], "ans": "A", "exp": "形容词「楽しい」的语干是「楽し」，所以是「楽しげに」"}, {"q": "彼は____表情で答えた。", "opts": ["A. 困るげな", "B. 困りげな", "C. 困ったげな", "D. 困っげな"], "ans": "B", "exp": "动词「困る」的ます形语干「困り」+「げな」"}]}, "96": {"analysis": "「～やら～やら」表示列举多个不确定的事物或行为，带有「等等」的语感，暗示还有其他类似的事情。常用于描述繁忙、复杂或令人困扰的情况，语调略带抱怨或感叹。与「～とか～とか」相比，「～やら～やら」更正式，多用于书面语或正式场合。", "mistakes": "❌ 昨日は買い物やら映画を見るやらした。→ ✅ 昨日は買い物やら映画を見るやらで忙しかった。（「やら～やら」后面需要有总结性的表述，不能直接接「した」）", "similar": [{"form": "～とか～とか", "diff": "更口语化，日常会话中使用频率更高"}, {"form": "～だの～だの", "diff": "语气更强烈，带有明显的不满或抱怨色彩"}, {"form": "～たり～たり", "diff": "表示动作的反复或交替，不含不确定的语感"}], "quiz": [{"q": "試験の準備____宿題____で、今日は徹夜になりそうだ。", "opts": ["A. やら...やら", "B. とか...とか", "C. たり...たり", "D. だの...だの"], "ans": "A", "exp": "列举考试准备和作业等多项任务，「やら～やら」最适合表达这种忙碌状态"}, {"q": "子供が熱を出す____仕事が忙しい____で、最近ストレスがたまっている。", "opts": ["A. たり...たり", "B. やら...やら", "C. とか...とか", "D. し...し"], "ans": "B", "exp": "列举孩子发烧、工作忙碌等令人困扰的事情，用「やら～やら」表达压力状态"}, {"q": "彼女は歌____踊り____、本当に才能があると思う。", "opts": ["A. やら...やら", "B. とか...とか", "C. も...も", "D. だの...だの"], "ans": "A", "exp": "列举唱歌、跳舞等多项才能，「やら～やら」表示「等等」的含义最合适"}]}, "97": {"analysis": "「～かと思うと」表示前一个动作或状态刚刚发生，紧接着就发生了意想不到的变化，强调变化的迅速性和意外性。这个文法常用于描述自然现象、人的行为等快速转换的情况，给人一种「还没反应过来就变了」的语感。", "mistakes": "❌ 彼は来るかと思うと、帰った。→ ✅ 彼は来たかと思うと、帰った。（必须用た形，不能用辞書形）；❌ 雨が降ったかと思うと、一時間後に晴れた。→ ✅ 雨が降ったかと思うと、すぐに晴れた。（强调的是紧接着发生，不能有明显时间间隔）", "similar": [{"form": "～たとたん（に）", "diff": "更强调「瞬间、立刻」的时间概念，不强调意外性"}, {"form": "～や否や", "diff": "书面语表达，强调「一...就...」，语感更正式"}, {"form": "～かと思ったら", "diff": "意思完全相同，只是语尾变化，可互换使用"}], "quiz": [{"q": "子供は泣き____、急に笑い出した。", "opts": ["A. そうかと思うと", "B. たかと思うと", "C. るかと思うと", "D. ているかと思うと"], "ans": "B", "exp": "「～かと思うと」前面必须接動詞た形，表示刚发生完就紧接着发生变化"}, {"q": "電車が駅に着いた____、すぐに発車した。", "opts": ["A. かと思うと", "B. ところで", "C. あとで", "D. まえに"], "ans": "A", "exp": "表示到站后立刻发车这种快速转换，「かと思うと」最符合语境"}, {"q": "彼は怒った____、今度は謝り始めた。", "opts": ["A. から", "B. ので", "C. かと思うと", "D. けれど"], "ans": "C", "exp": "从生气到道歉的快速情绪转换，体现了意外性和迅速性"}]}, "98": {"analysis": "「～にほかならない」是强调断言的表达方式，用于明确断定某事物的本质或原因。表达说话人对判断的强烈确信，含有排除其他可能性的语感。常用于正式场合或书面语，语气庄重，具有不容置疑的态度。", "mistakes": "❌ これは事実にほかならないです → ✅ これは事実にほかならない（「にほかならない」本身就是断定表达，不需要再加です）；❌ 彼が来るにほかならない → ✅ 彼が来ることにほかならない（动词需要加「こと」才能接续）", "similar": [{"form": "～に違いない", "diff": "「に違いない」表示推测确信，而「にほかならない」是断定强调"}, {"form": "～というものだ", "diff": "「というものだ」表示应当如此，而「にほかならない」强调就是这样"}], "quiz": [{"q": "彼の失敗は、準備不足____。", "opts": ["A. にほかならない", "B. にちがいない", "C. というものだ", "D. ことになる"], "ans": "A", "exp": "强调断定失败的原因就是准备不足，用「にほかならない」"}, {"q": "今回の勝利は、チーム全員が協力した____にほかならない。", "opts": ["A. の", "B. こと", "C. もの", "D. ため"], "ans": "B", "exp": "动词「協力した」需要用「こと」名词化后才能接续「にほかならない」"}, {"q": "この問題が解決できたのは、先生のおかげ____。", "opts": ["A. にほかならない", "B. にすぎない", "C. にかぎらない", "D. にかかわらず"], "ans": "A", "exp": "强调断定问题解决的原因就是老师的帮助，用「にほかならない」"}]}, "99": {"analysis": "「にすぎない」表示对某事物的程度或重要性进行限定和弱化，强调「仅仅如此而已，没有更多」的语感。常用于谦逊地描述自己的能力、成就，或客观地评价事物的规模、程度，带有「不值一提」的含义。多用于书面语和正式场合。", "mistakes": "❌ 彼は学生だけにすぎない → ✅ 彼は学生にすぎない（「だけ」和「にすぎない」不能同时使用，意思重复）。❌ それは冗談にすぎないでした → ✅ それは冗談にすぎませんでした（「にすぎない」的过去式是「にすぎませんでした」）", "similar": [{"form": "～だけだ", "diff": "「だけだ」更口语化，「にすぎない」更书面正式"}, {"form": "～のみだ", "diff": "「のみだ」更加文语色彩浓厚，「にすぎない」带有轻视的语感"}, {"form": "～ばかりだ", "diff": "「ばかりだ」强调「只是」，「にすぎない」强调「程度不高」"}], "quiz": [{"q": "私の話は参考____。もっと専門家の意見を聞いてください。", "opts": ["A. にすぎません", "B. だけです", "C. ばかりです", "D. のみです"], "ans": "A", "exp": "谦逊地说自己的话仅供参考，程度不高，用「にすぎない」最合适"}, {"q": "今回の成功は____。本当の勝負はこれからだ。", "opts": ["A. 始まりだけだ", "B. 始まりにすぎない", "C. 始まりばかりだ", "D. 始まりのみだ"], "ans": "B", "exp": "强调这次成功只是开始，程度有限，「始まりにすぎない」表达最恰当"}, {"q": "彼の言葉は冗談____、真に受けないでください。", "opts": ["A. にすぎませんから", "B. だけですから", "C. ばかりですから", "D. のみですから"], "ans": "A", "exp": "说明他的话只是玩笑而已，不值得认真对待，「にすぎない」最符合语境"}]}, "100": {"analysis": "「〜上に」表示在前述事实的基础上，进一步添加另一个要素，具有累加和强调的意味。与中文的「不仅...而且...」相似，但日语的语感更偏重于「在...基础上还...」。前后两个要素通常都是正面或负面的，形成递进关系，强调情况的严重程度或优秀程度。", "mistakes": "❌ 彼は優しい上に、でも時々厳しい → ✅ 彼は優しい上に、責任感も強い（前后要素应保持同向性，不能用转折）；❌ 雨が降った上に、風も吹いている → ✅ 雨が降っている上に、風も強い（前项要用持续性表达，后项要与前项在时态上协调）", "similar": [{"form": "〜ばかりか", "diff": "语气更强烈，表示出乎意料的程度"}, {"form": "〜のみならず", "diff": "更加书面语，多用于正式场合"}, {"form": "〜だけでなく", "diff": "最基础的累加表达，语气较温和"}], "quiz": [{"q": "この料理は美味しい____、値段も安い。", "opts": ["A. 上に", "B. ために", "C. ことに", "D. ように"], "ans": "A", "exp": "表示累加关系，在美味的基础上价格还便宜"}, {"q": "彼は遅刻した____、宿題も忘れた。", "opts": ["A. けれど", "B. 上に", "C. ので", "D. ながら"], "ans": "B", "exp": "两个都是负面事实的累加，迟到的基础上还忘了作业"}, {"q": "今日は暑い____、湿度も高くて大変だ。", "opts": ["A. から", "B. のに", "C. 上に", "D. ほど"], "ans": "C", "exp": "天气热的基础上湿度还高，表示情况的累加恶化"}]}, "101": {"analysis": "「～といっても」表示修正或限制前面的说法，强调实际情况与字面意思有差异。常用于谦虚表达或纠正他人可能产生的误解，语感上带有「但是实际上...」的转折意味。使用时前半句通常是别人的评价或一般认知，后半句是说话人想要澄清的真实情况。", "mistakes": "❌ 日本語が上手といっても、まだN2に合格した。→ ✅ 日本語が上手といっても、まだN2に合格していない。容易误用为肯定句，实际上后半句应该是限制或否定的内容。❌ 忙しいといっても、とても忙しいです。→ ✅ 忙しいといっても、それほどでもない。后半句应该是对前半句的修正限制，不是加强。", "similar": [{"form": "～とはいえ", "diff": "更书面，常用于承认某事实但提出相反观点"}, {"form": "～ものの", "diff": "表示逆接，前后对比更强烈，不含修正说法的意味"}], "quiz": [{"q": "彼は金持ち____、普通のサラリーマンです。", "opts": ["A. といっても", "B. とはいえ", "C. というのに", "D. にしても"], "ans": "A", "exp": "修正「金持ち」这一说法，说明实际只是普通上班族"}, {"q": "料理ができる____、カップラーメンを作るくらいだ。", "opts": ["A. ものの", "B. といっても", "C. としても", "D. からには"], "ans": "B", "exp": "限制「料理ができる」的程度，实际只会做泡面"}, {"q": "新人____、もう3年も働いています。", "opts": ["A. といっても", "B. にしても", "C. だとしても", "D. であっても"], "ans": "A", "exp": "修正「新人」的说法，澄清已经工作3年了"}]}, "102": {"analysis": "「〜に限る」表示说话人根据经验或常识，断定某种选择是最好的、最理想的。常用于给出建议或表达个人坚定的看法，带有强烈的推荐语气。多用于日常会话中分享生活智慧或经验之谈。", "mistakes": "❌ 病気の時は病院に行くことに限る → ✅ 病気の時は病院に行くに限る（「こと」是多余的，直接用动词辞书形接续）；❌ 夏はやはりビールに限ります → ✅ 夏はやはりビールに限る（此文法通常以简体形式出现，不用敬语形）", "similar": [{"form": "〜にこしたことはない", "diff": "语气更委婉客观，「に限る」更主观断定"}, {"form": "〜べきだ", "diff": "「べきだ」强调义务责任，「に限る」强调最佳选择"}], "quiz": [{"q": "夏の暑い日は、冷たい飲み物を飲む____。", "opts": ["A. に限る", "B. べきだ", "C. ことにする", "D. わけにはいかない"], "ans": "A", "exp": "表示根据经验认为这是最好的选择，用「に限る」最合适"}, {"q": "健康のためには、規則正しい生活を____。", "opts": ["A. に限る", "B. するに限る", "C. することに限る", "D. するべきに限る"], "ans": "B", "exp": "动词辞书形直接接「に限る」，不需要「こと」"}, {"q": "海外旅行では、現地の料理を食べる____。", "opts": ["A. ほかない", "B. に決まっている", "C. に限る", "D. に相違ない"], "ans": "C", "exp": "表达说话人认为这是最好的选择，符合「に限る」的用法"}]}, "103": {"analysis": "「～だけあって」表示结果符合某种名声、评价或身份，含有「果然如所期待的那样」的认同感。强调因为具备某种特殊身份、能力或条件，所以出现相应的优秀结果，带有佩服、赞叹的语感。多用于积极正面的评价场合。", "mistakes": "❌ 初心者だけあって、上手に弾けた。→ ✅ ベテランだけあって、上手に弾けた。（だけあって用于正面评价，不能用于贬低身份）", "similar": [{"form": "～だけに", "diff": "だけに强调「正因为～所以～」的因果关系，だけあって强调「不愧是～」的认同感"}, {"form": "～というだけあって", "diff": "というだけあって更强调传言、评判的真实性"}], "quiz": [{"q": "有名店____、料理の味は格別だった。", "opts": ["A.だけあって", "B.だけに", "C.ばかりに", "D.ことに"], "ans": "A", "exp": "强调「不愧是有名店」，结果符合名声"}, {"q": "彼は天才____言われているが、実際はそうでもない。", "opts": ["A.だけあって", "B.だけに", "C.と", "D.として"], "ans": "C", "exp": "此处不是表示认同，而是「被称为」的意思，用と"}, {"q": "さすが料理人____、包丁さばきが見事だ。", "opts": ["A.だけに", "B.だけあって", "C.として", "D.ばかりに"], "ans": "B", "exp": "「不愧是料理人」，表示对其技艺的认同和赞叹"}]}, "104": {"analysis": "「～にしろ～にしろ」表示无论哪种情况结果都相同，强调两个对立的选项最终导向同一结论。常用于表达决心或客观陈述，语感较为正式。与「～ても～ても」相比，更强调两种情况的对等性和最终结果的统一性。", "mistakes": "❌ 雨が降るにしろ晴れにしろ、試合をします。→ ✅ 雨が降るにしろ晴れるにしろ、試合をします。（两个部分的词性和形式必须对应一致）；❌ 行くにしろ行かないにしろでも、連絡してください。→ ✅ 行くにしろ行かないにしろ、連絡してください。（不能和「でも」重复使用）", "similar": [{"form": "～にせよ～にせよ", "diff": "意思完全相同，但「にせよ」更加书面正式"}, {"form": "～ても～ても", "diff": "「ても」强调让步，「にしろ」更强调两种情况的对等性"}, {"form": "～であれ～であれ", "diff": "更加文语化，多用于书面语，语感更庄重"}], "quiz": [{"q": "彼が来る____来ない____、パーティーは予定通り行います。", "opts": ["A. にしろ...にしろ", "B. にしても...にしても", "C. としても...としても", "D. といっても...といっても"], "ans": "A", "exp": "表示无论来不来，聚会都按计划进行，两种对立情况结果相同"}, {"q": "この仕事は簡単____難しい____、最後までやり遂げるつもりです。", "opts": ["A. でも...でも", "B. にしろ...にしろ", "C. だとしても...だとしても", "D. といえば...といえば"], "ans": "B", "exp": "表达无论工作简单还是困难，都要做到最后的决心"}, {"q": "賛成する____反対する____、理由をはっきり言ってください。", "opts": ["A. なら...なら", "B. ばかりか...ばかりか", "C. にしろ...にしろ", "D. ところで...ところで"], "ans": "C", "exp": "要求无论赞成还是反对，都要说明清楚理由，体现两种情况的对等要求"}]}, "105": {"analysis": "「～とか」表示传闻，相比「～そうだ」更随意、口语化，常带有不太确定或不太在意的语感。多用于日常会话中转述听来的消息，语调较为轻松。这个用法体现了日语中对信息来源和确定性的细致区分。", "mistakes": "❌ 昨日雨が降るとか言っていました → ✅ 昨日雨が降るとか言っていた（过去传闻不用敬语形式）；❌ 先生がテストは難しいとかおっしゃいました → ✅ 先生がテストは難しいそうです（对上级传达的信息用「そうです」更合适）", "similar": [{"form": "～そうだ（伝聞）", "diff": "「そうだ」更正式，「とか」更口语随意"}, {"form": "～って", "diff": "「って」更随意简略，「とか」稍显含蓄"}], "quiz": [{"q": "田中さんが来月結婚する____聞いたけど、本当かな。", "opts": ["A. とか", "B. らしい", "C. ようだ", "D. みたい"], "ans": "A", "exp": "表示不确定的传闻信息，「とか」最合适"}, {"q": "あの映画、つまらない____。見に行くのやめよう。", "opts": ["A. そうだ", "B. とか", "C. らしい", "D. みたいだ"], "ans": "B", "exp": "口语中表示听来的不确定评价，「とか」符合语境"}, {"q": "新しいレストランができた____、今度行ってみない？", "opts": ["A. という", "B. とか", "C. そうな", "D. ような"], "ans": "B", "exp": "日常会话中转述听到的消息，「とか」最自然"}]}, "106": {"analysis": "「～にそって」表示严格按照某个方针、计划、基准或路线进行，强调忠实遵循、不偏离的语感。常用于正式场合，特别是工作、学习中涉及计划执行、方针贯彻的语境。与单纯的「に従って」相比，更强调「沿着」的空间感和连续性。", "mistakes": "❌ 友達の意見にそって決めた → ✅ 友達の意見に従って決めた（个人意见用「に従って」，「にそって」多用于正式的方针、计划等）; ❌ 川にそった歩いた → ✅ 川にそって歩いた（「にそって」本身就是副词性，不需要过去式）", "similar": [{"form": "～に従って", "diff": "更广泛，可用于人的指示和自然规律，「にそって」多限于方针计划"}, {"form": "～に基づいて", "diff": "强调以某事为根据基础，「にそって」更强调沿着路线进行的过程感"}], "quiz": [{"q": "会社の方針____、新しい制度を導入する。", "opts": ["A. にそって", "B. について", "C. に対して", "D. において"], "ans": "A", "exp": "按照公司方针执行，用「にそって」表示严格遵循"}, {"q": "海岸線____道路が続いている。", "opts": ["A. に従って", "B. にそって", "C. に基づいて", "D. によって"], "ans": "B", "exp": "沿着海岸线的道路，表示空间上的沿着用「にそって」"}, {"q": "予算____計画を見直さなければならない。", "opts": ["A. にそって", "B. に応じて", "C. に関して", "D. に比べて"], "ans": "B", "exp": "根据预算调整计划，表示相应变化用「に応じて」更合适"}]}, "107": {"analysis": "「～にかけては」表示在某个特定领域或方面具有突出的能力或自信，带有强烈的自豪感。这个文法强调说话者在该领域的专长，常用于自夸或赞美他人的特定技能。语感上比较正式，多用于书面语或郑重的场合。", "mistakes": "❌ 勉強にかけては、苦手です → ✅ 勉強は苦手です（「にかけては」不能用于表达不擅长，只用于擅长的方面）", "similar": [{"form": "～に関しては", "diff": "单纯表示「关于~」，没有擅长的含义"}, {"form": "～については", "diff": "表示「关于~这一点」，中性表达，无擅长意味"}, {"form": "～といえば", "diff": "表示「说到~」，可用于各种话题转换，不限于擅长领域"}], "quiz": [{"q": "彼は楽器の演奏____、プロ級の腕前だ。", "opts": ["A. にかけては", "B. については", "C. に関して", "D. といえば"], "ans": "A", "exp": "表示在演奏方面的突出能力，用「にかけては」最合适"}, {"q": "スポーツ____全然だめですが、読書は好きです。", "opts": ["A. にかけては", "B. については", "C. に関しては", "D. は"], "ans": "D", "exp": "表达不擅长时不能用「にかけては」，用简单的「は」即可"}, {"q": "彼女は英語の発音____、ネイティブ並みだ。", "opts": ["A. については", "B. に関して", "C. にかけては", "D. といえば"], "ans": "C", "exp": "强调在英语发音方面的卓越能力，「にかけては」表达擅长之意"}]}, "108": {"analysis": "「〜ないことには」表示必要的前提条件，强调「不先做A就无法实现B」的逻辑关系。语感上带有强烈的必然性，常用于表达客观的因果关系。多用于口语和书面语，语调比单纯的「〜なければ」更加强调前提条件的重要性。", "mistakes": "易错点：❌「やってみなければ、わからない。」→ ✅「やってみないことには、わからない。」。前者仅表假设，后者强调必要前提；❌「読んでないことには理解できない。」→ ✅「読まないことには理解できない。」。要用動詞ない形去掉「い」后接続。", "similar": [{"form": "〜なければ/〜なくては", "diff": "仅表假设条件，语气较轻"}, {"form": "〜ずには", "diff": "书面语较多，表示「不得不」的意思"}, {"form": "〜なしには", "diff": "更强调「缺少某物就不行」的意思"}], "quiz": [{"q": "実際に使って____、この機械の便利さはわからない。", "opts": ["A.みなければ", "B.みないことには", "C.みるなら", "D.みても"], "ans": "B", "exp": "强调「不实际使用就无法了解便利性」这一必要前提条件，用「みないことには」"}, {"q": "彼に直接____、本当のことは聞けないだろう。", "opts": ["A.会わないことには", "B.会えば", "C.会っても", "D.会うなら"], "ans": "A", "exp": "表示「不直接见面就无法听到真话」的必要条件，用「会わないことには」"}, {"q": "やって____、結果はわからない。", "opts": ["A.みれば", "B.みても", "C.みないことには", "D.みるには"], "ans": "C", "exp": "强调「不去尝试就不知道结果」的必要前提，用「やってみないことには」"}]}, "109": {"analysis": "「～がち」表示某种不好的倾向或习惯，带有消极的语感。与「やすい」不同，「がち」更强调这种倾向是无意识的、自然发生的，且多用于负面情况。常用于描述健康问题、性格缺点、生活习惯等消极方面。", "mistakes": "❌ 彼は成功しがちです → ✅ 彼は成功しやすいです（「がち」不用于积极的事情）；❌ 病気になりがちになる → ✅ 病気になりがちだ（「がち」本身就含有「なる」的意思，不需重复）", "similar": [{"form": "～やすい", "diff": "「やすい」中性，可用于正面；「がち」只用于负面倾向"}, {"form": "～きらいがある", "diff": "「きらいがある」更正式，多用于书面；「がち」更口语化"}, {"form": "～傾向がある", "diff": "「傾向がある」客观描述；「がち」带有说话人的主观感受"}], "quiz": [{"q": "最近、風邪を____。", "opts": ["A. ひきがち", "B. ひくがち", "C. ひきがちだ", "D. ひくがちだ"], "ans": "A", "exp": "动词+がち时用ます形去掉ます，「ひく」的ます形是「ひきます」"}, {"q": "彼は____性格だ。", "opts": ["A. 明るくがちな", "B. 暗くがちな", "C. 内向きがちな", "D. 内気がちな"], "ans": "D", "exp": "「がち」用于负面性格，且形容词词干+がち，「内気」是名词可直接+がち"}, {"q": "この店は値段が____。", "opts": ["A. 安くがちです", "B. 高めがちです", "C. 高くがちです", "D. 高がちです"], "ans": "C", "exp": "い形容词去い+く+がち，「高い」变成「高く」+がち"}]}, "110": {"analysis": "「つつも」表达明知某事却仍然做相反行为的内心矛盾状态，带有强烈的逆接语感。这是书面语色彩很浓的文法，常用于描述内心纠葛、道德冲突等复杂心理。与「ながら」相比，「つつも」更强调内心的挣扎和无奈感。", "mistakes": "❌ 忙しいつつも、手伝いに行きました。→ ✅ 忙しいと知りつつも、手伝いに行きました。（「つつも」不能直接接形容词）❌ 危険だつつも、登山を続けた。→ ✅ 危険だと分かりつつも、登山を続けた。（需要用「と分かる/知る」等动词形式）", "similar": [{"form": "～ながらも", "diff": "语感较轻，可用于口语，不一定有内心矛盾"}, {"form": "～とはいえ", "diff": "承认前项事实但提出相反观点，不强调内心纠葛"}, {"form": "～ものの", "diff": "单纯的逆接，没有内心矛盾的含义"}], "quiz": [{"q": "体に悪いと____、ついタバコを吸ってしまう。", "opts": ["A. 知りつつも", "B. 知りながら", "C. 知っているので", "D. 知っていても"], "ans": "A", "exp": "表达内心矛盾的逆接用「つつも」最合适"}, {"q": "時間がないと分かり____、完璧を目指してしまう。", "opts": ["A. つつ", "B. つつも", "C. つつある", "D. つつ"], "ans": "B", "exp": "「つつも」表达明知时间不够却追求完美的内心矛盾"}, {"q": "彼の気持ちを____、断ることができなかった。", "opts": ["A. 理解しつつも", "B. 理解するつつも", "C. 理解つつも", "D. 理解していつつも"], "ans": "A", "exp": "动词ます形去掉ます接つつも，「理解し」是正确形式"}]}, "111": {"analysis": "「としたら/としても」表示假设或让步假设，相当于「だとしたら/だとしても」的简化形。「としたら」强调假设条件下的推论，「としても」则表示让步，即使某条件成立也不影响结论。常用于表达对未确定事实的推测或对既定条件的让步态度，语感较为正式。", "mistakes": "易与「たら」混淆。❌雨が降ったら、行きません → ✅雨が降るとしたら、どうしますか（としたら用于假设推测，たら用于确定条件）; ❌彼が来るとしたら、準備します → ✅彼が来るとしても、準備は必要です（としても表让步，不是条件准备）", "similar": [{"form": "～たら", "diff": "たら是确定条件，としたら是假设推测"}, {"form": "～ても", "diff": "ても是既定事实的让步，としても是假设条件的让步"}, {"form": "～なら", "diff": "なら强调条件选择，としたら强调假设推论"}], "quiz": [{"q": "彼が本当のことを言って____、信じられない。", "opts": ["A. いたら", "B. いるとしても", "C. いたとしても", "D. いるなら"], "ans": "C", "exp": "「言っていたとしても」表示对过去事实的让步假设，即使他说的是真话，也难以置信"}, {"q": "もし宝くじに当たる____、何に使いますか。", "opts": ["A. としたら", "B. としても", "C. たら", "D. なら"], "ans": "A", "exp": "「当たるとしたら」表示对未来可能性的假设推测，询问假设条件下的行动"}, {"q": "時間がない____、やらなければならない。", "opts": ["A. としたら", "B. としても", "C. だったら", "D. のに"], "ans": "B", "exp": "「時間がないとしても」表示让步，即使没有时间也必须做，强调意志坚定"}]}, "112": {"analysis": "「次第で/次第だ」表示结果完全依赖于某个因素，强调决定性的影响力。「次第で」用于表示「根据~来决定」，常用于假设或一般性说明；「次第だ」则用于说明已发生事情的原因经过，带有「就是因为~」的语感。这个文法体现了日语中因果关系的明确表达。", "mistakes": "❌ 天気次第だから、ピクニックに行きます → ✅ 天気次第で、ピクニックに行くかどうか決めます。原因：次第だ用于说明经过，不能用于表示将来的决定条件。❌ 勉強した次第で、合格できる → ✅ 勉強次第で、合格できる。原因：表示条件时用名词+次第で，不用た形。", "similar": [{"form": "～によって", "diff": "によって更客观中性，次第で更强调完全依赖性"}, {"form": "～に応じて", "diff": "に応じて强调相应调整，次第で强调决定性影响"}, {"form": "～いかんで", "diff": "いかんで更正式书面，次第で使用范围更广"}], "quiz": [{"q": "この計画の成功は、チーム全員の協力____。", "opts": ["A. 次第で決まる", "B. 次第だ", "C. 次第に決まる", "D. 次第で決める"], "ans": "A", "exp": "表示成功取决于合作这个条件，用「次第で」表示依存关系"}, {"q": "遅刻したのは、電車が遅れた____。", "opts": ["A. 次第で", "B. 次第だった", "C. 次第に", "D. 次第である"], "ans": "B", "exp": "说明迟到的原因经过，用「次第だった」表示过去的情况说明"}, {"q": "給料は経験と能力____上がっていく。", "opts": ["A. 次第だ", "B. 次第で", "C. 次第に", "D. 次第では"], "ans": "B", "exp": "表示工资根据经验和能力来决定，用「次第で」表示依存条件"}]}, "113": {"analysis": "「一方」表示某种变化或状态持续朝着同一方向发展，没有停止或改善的迹象，常带有负面或令人担忧的语感。与中文的「越来越」相比，「一方」更强调变化的单向性和持续性，暗示情况难以逆转。多用于描述不良状况的恶化。", "mistakes": "❌ 彼の成績はよくなる一方だ → ✅ 彼の成績は悪くなる一方だ。「一方」通常用于负面变化，表示好转时更自然的说法是「ますます良くなる」。另一个常见错误是时态混用：❌ 物価が上がった一方だ → ✅ 物価が上がる一方だ，应使用动词辞书形。", "similar": [{"form": "ますます", "diff": "可用于正面和负面变化，「一方」主要用于负面变化"}, {"form": "どんどん", "diff": "强调速度快，「一方」强调持续性和不可逆性"}], "quiz": [{"q": "最近、環境問題は深刻になる＿＿＿だ。", "opts": ["A. 一方", "B. 反面", "C. 一面", "D. 方面"], "ans": "A", "exp": "表示环境问题持续恶化，用「一方」表示负面变化的持续"}, {"q": "彼女の人気は高まる＿＿＿で、仕事の依頼が絶えない。", "opts": ["A. 反面", "B. 一方", "C. 一面", "D. 方向"], "ans": "B", "exp": "表示人气持续上升，虽是正面但符合「一方」的持续性特征"}, {"q": "会社の業績は＿＿＿一方で、社員のボーナスもカットされた。", "opts": ["A. 悪くなる", "B. 悪くなった", "C. 悪くなって", "D. 悪くなり"], "ans": "A", "exp": "「一方」前面必须用动词辞书形，表示业绩持续恶化"}]}, "114": {"analysis": "「～に先立って」是表示时间顺序的正式文法，强调在某个重要事件之前预先进行的准备行为。多用于商务、官方场合，带有郑重、正式的语感。与单纯的时间先后不同，它暗示后续行为的重要性和预备行为的必要性。", "mistakes": "❌ 明日の試験に先立って、今日勉強します → ✅ 明日の試験の前に、今日勉強します（个人日常行为不用此文法，应用「前に」）；❌ 会議に先立ち、資料を読みました → ✅ 会議に先立って、資料を準備しました（「に先立って」后面应该是为后续事件做的准备行为，不是个人学习行为）", "similar": [{"form": "～を前にして", "diff": "更强调面临重大事件时的心理状态或紧张感"}, {"form": "～に際して", "diff": "强调在特定时机、场合采取的行动，不一定有时间先后关系"}, {"form": "～に当たって", "diff": "侧重开始某事时的决心或注意事项，时间概念较弱"}], "quiz": [{"q": "新商品の発表____、マーケティング調査を実施した。", "opts": ["A. に先立って", "B. を前にして", "C. に際して", "D. によって"], "ans": "A", "exp": "发表前进行的准备工作，用「に先立って」最合适"}, {"q": "オリンピック____、各国の選手が続々と到着している。", "opts": ["A. に先立ち", "B. を前にして", "C. に当たって", "D. に関して"], "ans": "B", "exp": "面临奥运会这一重大事件，「を前にして」更恰当"}, {"q": "式典の開始____、会場の準備が整った。", "opts": ["A. に対して", "B. について", "C. に先立って", "D. に関して"], "ans": "C", "exp": "式典开始前的准备工作，典型的「に先立って」用法"}]}, "115": {"analysis": "「～にこたえて」表示积极响应某种期待、要求或需求，强调主动迎合对方的愿望。与单纯的「応える」不同，这个文法带有更强的意志性和主动性，常用于正式场合或商务语境。使用时要注意，前接的名词通常是积极正面的期待或要求。", "mistakes": "❌ 批判にこたえて改善した → ✅ 批判に応じて改善した（批判是负面的，不用にこたえて）；❌ 顧客のにこたえてサービスを向上させた → ✅ 顧客の要望にこたえてサービスを向上させた（必须有具体的期待・要求名词）", "similar": [{"form": "～に応じて", "diff": "応じて更中性，可用于各种情况；にこたえて专用于积极回应期待"}, {"form": "～を受けて", "diff": "受けて强调接受影响后的行动；にこたえて强调主动满足对方期待"}], "quiz": [{"q": "お客様の____、新商品を開発しました。", "opts": ["A. 苦情にこたえて", "B. 要望にこたえて", "C. 批判にこたえて", "D. 不満にこたえて"], "ans": "B", "exp": "にこたえて只用于积极正面的期待要求，要望是正面的"}, {"q": "市民の声____、公園を増やすことにしました。", "opts": ["A. によって", "B. を通じて", "C. にこたえて", "D. に対して"], "ans": "C", "exp": "市民の声（期待）に積極的に响应，用にこたえて最合适"}, {"q": "会社は従業員の____、働き方を改善した。", "opts": ["A. 希望にこたえて", "B. 文句にこたえて", "C. 愚痴にこたえて", "D. 怒りにこたえて"], "ans": "A", "exp": "希望是正面期待，适合用にこたえて；其他都是负面情感"}]}, "116": {"analysis": "「てならない」表达内心涌起的强烈情感，是无法抑制的自然感情。常用于表达担心、怀念、痛苦等负面情绪，也可用于积极情感如兴奋、高兴。这个文法强调情感的自发性和持续性，带有「忍不住」「不由得」的语感，比单纯的形容词表达更具有情感的强烈性。", "mistakes": "❌ 今日は楽しくてならない。→ ✅ 今日は楽しくてたまらない。（表达积极情感时多用「たまらない」）；❌ 彼のことを心配してならない。→ ✅ 彼のことが心配でならない。（应该用「が」标示主语，不能用动词连用形）", "similar": [{"form": "～てたまらない", "diff": "多用于积极情感或欲望，てならない多用于负面情感"}, {"form": "～てしょうがない/しようがない", "diff": "更口语化，表达程度不如てならない强烈"}, {"form": "～でしかたがない", "diff": "书面语，语感更正式，常用于心理描写"}], "quiz": [{"q": "故郷のことが懐かし____。", "opts": ["A. くてならない", "B. いてたまらない", "C. くてしょうがない", "D. いでならない"], "ans": "A", "exp": "形容词く形+てならない，表达对故乡强烈的怀念之情"}, {"q": "子供の将来が____でならない。", "opts": ["A. 心配して", "B. 心配に", "C. 心配", "D. 心配だ"], "ans": "C", "exp": "名词+でならない的形式，心配作为名词使用"}, {"q": "あの映画を見て、感動し____。", "opts": ["A. てならない", "B. てたまらない", "C. ないでならない", "D. てしかたがない"], "ans": "A", "exp": "动词て形+ならない，表达看电影后内心涌起的强烈感动"}]}, "117": {"analysis": "「～ものなら」有两种用法：1）表达难以实现的强烈愿望，常与「できる」等可能动词连用，带有「如果真的能够...就好了」的假设语气；2）表示警告或威胁，多用「～しようものなら」形式，意为「要是敢...的话」。两种用法都带有强烈的假定色彩，第一种表达遗憾或渴望，第二种表达严厉警告。", "mistakes": "易错点：混淆两种用法的语境。❌ 遅刻しようものなら、許してあげる。→ ✅ 遅刻しようものなら、許さない。（警告用法应表达负面后果）；❌ 会えるものなら会いたいが、無理だろう。→ ✅ 会えるものなら会いたいが、もう無理だ。（愿望用法需要明确表达实现困难）", "similar": [{"form": "～ばいいのに", "diff": "表达对现实的不满或遗憾，语气较温和"}, {"form": "～たらどうか", "diff": "提出建议或忠告，不含假设的不可能性"}, {"form": "～ようものなら", "diff": "完全相同，是～ものなら的变体形式"}], "quiz": [{"q": "昔に戻れる____、あの時の選択を変えたい。", "opts": ["A. ものなら", "B. ものの", "C. ものだから", "D. ものを"], "ans": "A", "exp": "表达难以实现的愿望，用「～ものなら」"}, {"q": "彼がそんなことを言おう____、二度と話をしない。", "opts": ["A. ものの", "B. ものなら", "C. ものだ", "D. ものか"], "ans": "B", "exp": "「言おうものなら」表示警告，如果敢说那样的话就..."}, {"q": "時間が____、もっとゆっくり話したいのですが。", "opts": ["A. あるものを", "B. あるものの", "C. あるものなら", "D. あるものだ"], "ans": "C", "exp": "表达「如果有时间的话」这种难以实现的愿望"}]}, "118": {"analysis": "「〜か〜まいか」表达内心的犹豫和迷惑，用于纠结是否要做某事的情况。语感较为正式，常用于书面语或正式场合。「まい」是古典语否定推量助动词，现代日语中主要保留在这个固定表达中。", "mistakes": "❌ 食べようか食べないまいか → ✅ 食べようか食べまいか（「まい」本身就是否定，不能再加「ない」）; ❌ するかしまいかを迷っている → ✅ しようかするまいかを迷っている（前半必须用意向形）", "similar": [{"form": "〜かどうか", "diff": "单纯表示是否，没有犹豫迷惑的语感，更中性客观"}, {"form": "〜ようかと思う", "diff": "表示想要做某事的想法，没有纠结犹豫的含义"}], "quiz": [{"q": "転職____ずっと悩んでいる。", "opts": ["A. しようかしないまいか", "B. しようかするまいか", "C. するかしまいか", "D. するかしないまいか"], "ans": "B", "exp": "前半用意向形「しようか」，后半用辞書形+まいか「するまいか」的固定搭配"}, {"q": "彼に本当のことを____、一晩中考えた。", "opts": ["A. 言うか言わまいか", "B. 言おうか言うまいか", "C. 言うか言うまいか", "D. 言おうか言わまいか"], "ans": "B", "exp": "「言おうか（意向形）＋言うまいか（辞書形+まいか）」が正しい形"}, {"q": "この仕事を____、まだ決められない。", "opts": ["A. 受けようか受けまいか", "B. 受けるか受けないか", "C. 受けようかどうか", "D. 受けるかもしれない"], "ans": "A", "exp": "犹豫迷惑的语感を表すには「〜か〜まいか」が最適"}]}, "119": {"analysis": "「〜末（に）」表示经过长时间的过程或反复的行为后得出的最终结果或决定。强调过程的艰难、长久或反复性，带有「终于」「最终」的语感。多用于正式场合，表达慎重的决定或重要的结果。", "mistakes": "❌ 簡単に考えた末に決めた → ✅ 散々考えた末に決めた（「末に」前需要体现过程的长久性或反复性，不能用于简单、短暂的行为）", "similar": [{"form": "〜あげく（に）", "diff": "「あげく」多含负面结果的语感，而「末に」中性"}, {"form": "〜結果", "diff": "「結果」单纯表示结果，「末に」强调经历的过程"}], "quiz": [{"q": "長い間悩んだ____、転職することを決意した。", "opts": ["A. 結果", "B. 末に", "C. ために", "D. ところで"], "ans": "B", "exp": "强调经过长时间烦恼后的最终决定，用「末に」最合适"}, {"q": "何度も話し合った____、やっと合意に達した。", "opts": ["A. あとで", "B. 末に", "C. ので", "D. ばかり"], "ans": "B", "exp": "「何度も話し合った」体现了反复的过程，用「末に」表示最终结果"}, {"q": "10年間の研究の____、新しい薬を開発することができた。", "opts": ["A. 末に", "B. 間に", "C. うちに", "D. 最中に"], "ans": "A", "exp": "「10年間の研究」是长期过程，用「末に」表示最终取得的成果"}]}, "120": {"analysis": "「たとえ～ても」表示极端假设的让步条件，即使在最不利的情况下也不改变结论。与一般的「～ても」相比，「たとえ」加强了假设的极端性和说话者意志的坚定性。常用于表达决心、信念或不变的态度，语感较为郑重和强烈。", "mistakes": "❌ たとえ雨が降るでも、行きます → ✅ たとえ雨が降っても、行きます（动词要用て形+も，不能直接用でも）；❌ たとえ学生でても → ✅ たとえ学生でも（名词+でも时不需要て）", "similar": [{"form": "いくら～ても", "diff": "更强调程度的极端性，多用于数量、程度"}, {"form": "どんなに～ても", "diff": "强调方式或状态的多样性"}, {"form": "～にしても", "diff": "表示让步认可，语感更客观冷静"}], "quiz": [{"q": "彼は____お金がなくても、友達を助ける人だ。", "opts": ["A. たとえ", "B. もし", "C. きっと", "D. やはり"], "ans": "A", "exp": "表示即使在极端情况下也不改变态度，用「たとえ」最合适"}, {"q": "____どんな困難があっても、最後までやり遂げるつもりです。", "opts": ["A. もしも", "B. たとえ", "C. きっと", "D. やっぱり"], "ans": "B", "exp": "强调决心和意志的坚定性，「たとえ」表达最强的让步假设"}, {"q": "たとえ一人____、この計画を続けます。", "opts": ["A. でも", "B. ても", "C. なら", "D. から"], "ans": "A", "exp": "「一人」是名词，应该用「でも」，不能用「ても」"}]}, "121": {"analysis": "「～がたい」表示某事在客观上难以实现或主观上难以接受，常用于抽象概念和心理层面的困难。与「～にくい」相比，「～がたい」更正式，带有书面语色彩，常用于表达道德、情感、理解等方面的困难。多用于否定评价或表达说话人的困惑、不满等情感。", "mistakes": "常见错误是与「～にくい」混用。❌ この問題は解きがたいです → ✅ この問題は解きにくいです（纯粹的技术困难用「にくい」）。「がたい」更适合：❌ 彼の言葉は信じにくい → ✅ 彼の言葉は信じがたい（表示难以相信某事的真实性）。", "similar": [{"form": "～にくい", "diff": "「にくい」表示物理或技术上的困难，「がたい」表示心理或道德上的困难"}, {"form": "～かねる", "diff": "「かねる」表示因立场或情况而不能做某事，「がたい」表示本质上难以做到"}], "quiz": [{"q": "彼の説明は複雑で、理解____。", "opts": ["A. しがたい", "B. しにくい", "C. しかねる", "D. できがたい"], "ans": "A", "exp": "理解という抽象的な行為の困難さを表すため「しがたい」が適切"}, {"q": "そんな失礼な態度は許____ものではない。", "opts": ["A. しにくい", "B. しがたい", "C. しかねる", "D. さない"], "ans": "B", "exp": "道德的に受け入れ難いという意味で「しがたい」を使用"}, {"q": "この小さな文字は____読める。", "opts": ["A. 読みがたく", "B. 読みにくく", "C. 読みかねて", "D. 読めがたく"], "ans": "B", "exp": "物理的な見づらさを表すため「読みにくい」が適切"}]}, "122": {"analysis": "「～もかまわず」表示完全不在乎或无视某种情况，通常用于描述因强烈情感或紧急状况而忽视周围环境的行为。这个文法带有强烈的感情色彩，暗示行为者已经顾不上常识或礼貌。多用于书面语或正式场合，语感偏硬。", "mistakes": "❌ 雨もかまわず散歩した → ✅ 雨もかまわず散歩に出かけた。中国学习者容易误用在不需要强调「无视」语感的普通情况下，但此文法专用于表达强烈的不顾一切的情感。", "similar": [{"form": "～を問わず", "diff": "「を問わず」表示不问条件，较客观；「もかまわず」表示主观上不在乎，带感情色彩"}, {"form": "～にもかかわらず", "diff": "「にもかかわらず」表示「尽管如此」，是逆接；「もかまわず」表示「不管不顾」，强调无视"}], "quiz": [{"q": "彼は体調の悪さ____、最後まで試合に出場した。", "opts": ["A. もかまわず", "B. を問わず", "C. にもかかわらず", "D. といえども"], "ans": "A", "exp": "表示不顾身体状况，体现了强烈的不在乎态度，用「もかまわず」最合适"}, {"q": "母は世間の目____、息子を必死に守った。", "opts": ["A. を問わず", "B. もかまわず", "C. にもかかわらず", "D. をものともせず"], "ans": "B", "exp": "「世間の目もかまわず」是固定表达，表示不在乎别人的眼光"}, {"q": "彼女は危険____、一人で山に登った。", "opts": ["A. もかまわず", "B. を顧みず", "C. といえども", "D. を問わず"], "ans": "A", "exp": "表示不顾危险，强调主观上的无视态度，「もかまわず」最符合语境"}]}, "123": {"analysis": "「あまり」表示由于某种感情或状态过于强烈，导致出现超出常规的行为或状态。这个文法强调的是感情的极度性和由此产生的意外结果。多用于书面语，语感较为正式，常见于描述强烈的喜悦、悲伤、愤怒等情感导致的非理性行为。", "mistakes": "❌ 忙しいあまり、食事を忘れた → ✅ 忙しさのあまり、食事を忘れた（形容词要先变成名词形「忙しさ」再接あまり）。另一个常见错误是把「あまり」当作普通的「太~了」来用，实际上它专门用于描述感情过度导致的异常状态。", "similar": [{"form": "～すぎて", "diff": "あまり更强调感情的极度性和结果的意外性，すぎて只是单纯表示程度过度"}, {"form": "～ばかりに", "diff": "ばかりに强调原因导致不好的结果，あまり不限定结果的好坏，更注重感情的强烈程度"}], "quiz": [{"q": "彼は怒り____、机を叩いた。", "opts": ["A. すぎて", "B. のあまり", "C. ばかりに", "D. によって"], "ans": "B", "exp": "怒りという感情が強すぎて異常な行動を起こしたので「のあまり」が適切"}, {"q": "驚き____、声も出なかった。", "opts": ["A. のために", "B. によって", "C. のあまり", "D. について"], "ans": "C", "exp": "驚きの感情が強すぎて声が出ないという異常な状態になったので「のあまり」"}, {"q": "心配し____、一晩中眠れなかった。", "opts": ["A. たあまり", "B. すぎて", "C. のあまり", "D. ばかりに"], "ans": "A", "exp": "動詞の場合は「た形＋あまり」の形を使う"}]}, "124": {"analysis": "「～を込めて」表示将某种心情、感情或意图融入到行动中，强调用心、认真地做某事。常用于表达诚意、用心程度，带有积极正面的语感。多用于书面语和正式场合，体现说话人对某事的重视和投入。", "mistakes": [{"error": "❌ 怒りを込めて、優しく話した → ✅ 愛情を込めて、優しく話した", "reason": "「を込めて」通常不与负面情感搭配，多表达积极正面的心意"}, {"error": "❌ 心を込んで、料理を作った → ✅ 心を込めて、料理を作った", "reason": "固定搭配是「を込めて」，不能说成「を込んで」"}], "similar": [{"form": "～を含めて", "diff": "表示「包含」的意思，不涉及感情投入"}, {"form": "～気持ちで", "diff": "只表示心情状态，不强调将感情融入行动中"}, {"form": "～をもって", "diff": "更正式，多用于表示手段、方法或时间点"}], "quiz": [{"q": "母は____、私のためにセーターを編んでくれた。", "opts": ["A. 愛情を込めて", "B. 愛情を含めて", "C. 愛情をもって", "D. 愛情で込めて"], "ans": "A", "exp": "表示将爱意融入编织行为中，用「愛情を込めて」最自然"}, {"q": "彼は____、新しい会社を設立した。", "opts": ["A. 希望を込んで", "B. 希望を込めて", "C. 希望と込めて", "D. 希望に込めて"], "ans": "B", "exp": "「希望を込めて」是固定搭配，表示满怀希望地做某事"}, {"q": "____、この作品を完成させました。", "opts": ["A. 全力を込めて", "B. 全力を含めて", "C. 全力をもって", "D. 全力と込めて"], "ans": "A", "exp": "表示全力投入到作品完成中，用「全力を込めて」表达用心程度"}]}, "125": {"analysis": "「ぬく」表示克服困难坚持到最后的强烈意志，强调过程艰难但最终完成。它不是简单的持续，而是带有「突破困难」「坚持不懈」的积极语感。常用于体力、精神上需要坚持的场面，如运动、学习、工作等。", "mistakes": "❌ 毎日日本語を勉強しぬいた → ✅ 毎日日本語を勉強し続けた（日常习惯用続ける）；❌ 病気を治しぬいた → ✅ 病気に打ち勝った（治愈疾病不用ぬく，用打ち勝つ等）", "similar": [{"form": "～続ける", "diff": "单纯表示持续，没有克服困难的含义"}, {"form": "～とおす", "diff": "强调从头到尾完整进行，不一定有困难"}], "quiz": [{"q": "彼は最後まで自分の意見を____。", "opts": ["A. 言いぬいた", "B. 言い続けた", "C. 言っていた", "D. 言い終わった"], "ans": "A", "exp": "坚持自己意见需要克服压力，用「ぬく」表示坚持到底"}, {"q": "この小説を一晩で____のは大変だった。", "opts": ["A. 読みぬく", "B. 読みとおす", "C. 読み続ける", "D. 読んでいる"], "ans": "B", "exp": "一晚读完小说强调完整阅读，用「とおす」更合适"}, {"q": "厳しい訓練を____、ついに試合に勝った。", "opts": ["A. やりとおして", "B. やり続けて", "C. やりぬいて", "D. やっていて"], "ans": "C", "exp": "严格训练很困难，需要坚持克服，用「ぬく」最合适"}]}, "126": {"analysis": "～ものだ（社会常識）表示社会公认的常识、道理或教训，带有说话者对普遍真理的确信感。多用于陈述人生经验、社会准则，语感偏正式。与～はずだ不同，更强调社会共识而非逻辑推理。", "mistakes": "❌ 私は毎日勉強するものだ（个人习惯不用此句型）→ ✅ 学生は毎日勉強するものだ。此句型表达的是社会常识，不能用于个人特定行为。", "similar": [{"form": "～べきだ", "diff": "べきだ表示义务责任，ものだ表示自然常理"}, {"form": "～はずだ", "diff": "はずだ基于逻辑推理，ものだ基于社会共识"}], "quiz": [{"q": "人間は年を取ると、体力が____。", "opts": ["A.落ちるべきだ", "B.落ちるものだ", "C.落ちるはずだ", "D.落ちるに違いない"], "ans": "B", "exp": "表示年龄增长体力下降是自然常理，用ものだ最合适"}, {"q": "子供は親の言うことを____。", "opts": ["A.聞くものだ", "B.聞くべきだ", "C.聞くはずだ", "D.聞くに決まっている"], "ans": "A", "exp": "表示孩子听父母话是社会常识，虽然べきだ也可以，但ものだ更强调这是自然道理"}, {"q": "努力すれば必ず____。", "opts": ["A.報われるものだ", "B.報われるべきだ", "C.報われるわけだ", "D.報われることだ"], "ans": "A", "exp": "努力就会有回报是人生教训和社会常识，用ものだ表达这种普遍真理"}]}, "127": {"analysis": "「～をめぐって」表示以某个话题或问题为中心展开讨论、争论或对立。多用于正式场合，带有冲突性或争议性的语感。常与「議論」「対立」「争い」等词搭配，强调围绕核心问题产生的各种意见分歧。", "mistakes": "❌ 彼をめぐって話しました → ✅ 彼のことについて話しました（谈论某人的事情不用をめぐって，应该用について）；❌ 旅行をめぐって計画した → ✅ 旅行について計画した（单纯的计划讨论不含争议性，不适用をめぐって）", "similar": [{"form": "～について", "diff": "について是中性的「关于」，をめぐって则暗示争议或复杂讨论"}, {"form": "～に関して", "diff": "に関して更正式但中性，をめぐって强调围绕话题的对立或争论"}], "quiz": [{"q": "環境問題____、世界各国で議論が続いている。", "opts": ["A. について", "B. をめぐって", "C. に対して", "D. によって"], "ans": "B", "exp": "世界各国的持续议论暗示存在不同观点和争议，用をめぐって最合适"}, {"q": "遺産相続____兄弟が対立している。", "opts": ["A. に関して", "B. について", "C. をめぐって", "D. において"], "ans": "C", "exp": "遗产继承问题导致兄弟对立，明显是争议性话题，用をめぐって"}, {"q": "新しい法案____与党と野党の間で激しい____が行われた。", "opts": ["A. をめぐって...討論", "B. について...相談", "C. に対して...説明", "D. において...発表"], "ans": "A", "exp": "与党和野党之间的激烈讨论，明显是围绕法案的争议性讨论"}]}, "128": {"analysis": "「わけだ」表示对前述内容进行理性分析后得出的结论或确认，带有「原来如此、那就是说」的语感。它不是单纯的推测，而是基于已知信息的合理解释或确认。常用于恍然大悟的场面，表达说话者对事态的理解和认知。", "mistakes": "❌ 明日は雨が降るわけだ（明天要下雨） → ✅ 明日は雨が降るようだ（明天好像要下雨）。わけだ不用于单纯推测未来，应该用推测表达。❌ 彼は学生だわけです → ✅ 彼は学生なわけです。な形容词和名词后接「なわけだ」不是「だわけだ」。", "similar": [{"form": "〜はずだ", "diff": "はずだ表示理论上的当然结果，わけだ表示对现状的合理解释"}, {"form": "〜ということだ", "diff": "ということだ更正式客观，わけだ带有个人理解确认的语感"}, {"form": "〜のだ", "diff": "のだ强调理由说明，わけだ侧重结论确认"}], "quiz": [{"q": "A：どうして田中さんは今日休んでいるの？ B：風邪をひいている____。", "opts": ["A. わけだ", "B. はずだ", "C. そうだ", "D. らしい"], "ans": "A", "exp": "B在确认田中休息的原因，用わけだ表示「原来是因为感冒」的理解确认"}, {"q": "この計算が正しければ、利益は去年の2倍になる____。", "opts": ["A. ようだ", "B. わけだ", "C. だろう", "D. みたいだ"], "ans": "B", "exp": "基于计算结果得出的合理结论，用わけだ表示「那就是说利润会翻倍」"}, {"q": "彼女は毎日12時間も勉強している。それで成績がいい____。", "opts": ["A. そうだ", "B. ようだ", "C. わけだ", "D. らしい"], "ans": "C", "exp": "对她成绩好这一现象的合理解释确认，わけだ表示「原来如此，难怪成绩好」"}]}, "129": {"analysis": "「～にあたって」是正式场合使用的文法，表示在重要的转折点或特殊时刻。与普通的「とき」不同，它强调该时刻的重要性和正式性，常用于开业、就职、毕业等人生重要节点。语感庄重，多出现在演讲、致辞、正式文件中。", "mistakes": "❌ 友達と会うにあたって、服を選んだ → ✅ 友達と会うとき、服を選んだ（见朋友这种日常场合不用「にあたって」）。❌ 卒業するにあたり、先生に挨拶した → ✅ 卒業するにあたって、先生に挨拶した（「にあたり」多用于书面语，口语中用「にあたって」）", "similar": [{"form": "～に際して", "diff": "更加正式，多用于官方文件和极其正式的场合"}, {"form": "～を機に", "diff": "强调以某事为契机，重点在利用机会做某事"}], "quiz": [{"q": "会社を設立する____、資金を集めた。", "opts": ["A. にあたって", "B. について", "C. によって", "D. に対して"], "ans": "A", "exp": "设立公司是重要时刻，用「にあたって」表示在此重要时刻"}, {"q": "海外赴任する____、家族と相談した。", "opts": ["A. に関して", "B. にあたって", "C. に関わって", "D. に向かって"], "ans": "B", "exp": "海外赴任是人生重要转折点，用「にあたって」表示在此重要时刻"}, {"q": "新学期を始める____、新しい目標を決めた。", "opts": ["A. に対して", "B. について", "C. によって", "D. にあたって"], "ans": "D", "exp": "新学期开始是重要时刻，用「にあたって」表示在此重要节点"}]}, "130": {"analysis": "「に加えて」表示在已有条件基础上再追加新的要素，强调累积性的叠加。与中文「除了...还有」「在...基础上还」含义相同，常用于描述多重困难或优势的叠加情况。使用时前项通常是已知或既定的情况，后项是新增加的内容。", "mistakes": "❌ 彼は頭がいいに加えて、運動も得意です → ✅ 彼は頭がいいのに加えて、運動も得意です（「である」的连体形「の」不可省略）；❌ 雨に加えて風が吹く → ✅ 雨に加えて風も吹く（后项常用「も」「まで」「さえ」等副助词强调追加）", "similar": [{"form": "～上に", "diff": "「上に」语感更正式，多用于书面语，而「に加えて」口语书面语都常用"}, {"form": "～ばかりか", "diff": "「ばかりか」含有「不仅如此」的递进语感，而「に加えて」纯粹表示累加"}], "quiz": [{"q": "台風____大雨も降ってきた。", "opts": ["A. に加えて", "B. によって", "C. について", "D. に対して"], "ans": "A", "exp": "表示台风之外还追加了大雨，符合累加的语义"}, {"q": "仕事が忙しい____、家事もしなければならない。", "opts": ["A. につれて", "B. に加えて", "C. に関して", "D. に比べて"], "ans": "B", "exp": "工作忙碌的基础上还要追加做家务，表示负担的累积"}, {"q": "彼女は美しい____、頭もいい。", "opts": ["A. のに加えて", "B. ことに加えて", "C. に加えて", "D. A和C都可以"], "ans": "D", "exp": "形容词可以用「い形容词+のに加えて」或「名词化+に加えて」两种形式"}]}, "131": {"analysis": "「～としても」表示逆接假设，即使前项成立，后项的结果或判断也不会改变。与单纯的假设不同，这个文法带有强烈的「让步」语感，说话人承认前项可能性的同时，强调后项立场的坚定性。常用于表达决心、价值观或不变的态度。", "mistakes": "❌ 雨が降るとしても、ピクニックに行きましょう → ✅ 雨が降ったとしても、ピクニックに行きましょう。原因：「としても」前必须用过去形，表示假设的既定事实。", "similar": [{"form": "～たって", "diff": "「たって」更口语化，语气更强烈，多用于日常会话"}, {"form": "～にしても", "diff": "「にしても」除了逆接假设外，还可表示「无论哪种情况」的意思"}], "quiz": [{"q": "どんなに忙しい____、家族との時間は大切にしたい。", "opts": ["A. としても", "B. だとしても", "C. たとしても", "D. のとしても"], "ans": "A", "exp": "形容词词干直接接「としても」，不需要「だ」或「た」"}, {"q": "彼が反対____、この計画を進めるつもりです。", "opts": ["A. するとしても", "B. したとしても", "C. することとしても", "D. するのとしても"], "ans": "B", "exp": "动词用过去形+「としても」，表示假设的既定状态"}, {"q": "お金がない____、友達の結婚式には出席します。", "opts": ["A. としても", "B. だとしても", "C. なくとも", "D. いないとしても"], "ans": "A", "exp": "い形容词否定形「ない」直接接「としても」"}]}, "132": {"analysis": "「に基づいて」和「をもとに」都表示以某事物为依据或基准进行判断、行动。核心语义是强调有明确的根据和依据，常用于正式场合和书面语。「に基づいて」更偏向于严格按照既定标准执行，「をもとに」则偏向于以某事为参考基础进行创造或发展。", "mistakes": "❌ データに基づいた意見を言います → ✅ データに基づいて意見を言います（「に基づいて」是副词用法，不能直接修饰名词）； ❌ 法律をもとに基づいて判断する → ✅ 法律に基づいて判断する（不能重复使用两个表示依据的表达）", "similar": [{"form": "～によって", "diff": "「によって」表示手段方法，「に基づいて」强调依据根据"}, {"form": "～によると", "diff": "「によると」表示信息来源，「に基づいて」表示行动依据"}, {"form": "～を参考にして", "diff": "「を参考にして」只是参考，「をもとに」是以此为基础"}], "quiz": [{"q": "この企画は市場調査の結果____作られました。", "opts": ["A. によると", "B. をもとに", "C. について", "D. に対して"], "ans": "B", "exp": "表示以市场调查结果为基础制作企划，用「をもとに」"}, {"q": "法律____、この行為は違法だと判断されました。", "opts": ["A. をもとに", "B. について", "C. に基づいて", "D. によると"], "ans": "C", "exp": "法律判断需要严格按照条文执行，用「に基づいて」"}, {"q": "経験____新しいシステムを開発しています。", "opts": ["A. に基づいて", "B. をもとに", "C. によると", "D. について"], "ans": "B", "exp": "以经验为基础开发新系统，用「をもとに」表示参考发展"}]}, "133": {"analysis": "「～てこそ」表示「只有做了某事才能达到某种结果」，强调前项是后项成立的必要条件。这个文法带有强烈的强调语气，常用于表达人生哲理、经验之谈等场合。语感上比单纯的条件句更有力度，暗示这是唯一的途径或最重要的条件。", "mistakes": "容易与「～ば」混淆使用。❌ 勉強すれば、合格してこそできる → ✅ 勉強してこそ、合格できる（只有学习才能合格）。「てこそ」不能与其他条件句重复使用，它本身就表示充分的条件关系。", "similar": [{"form": "～ばこそ", "diff": "接续不同，「ばこそ」接动词假定形，语气更强烈"}, {"form": "～からこそ", "diff": "「からこそ」表示「正因为～所以」，强调原因而非条件"}], "quiz": [{"q": "苦労____、人の気持ちがわかるようになる。", "opts": ["A. すれば", "B. してこそ", "C. したら", "D. するなら"], "ans": "B", "exp": "强调只有经历苦难才能理解他人，用「してこそ」表示必要条件"}, {"q": "本当の友達は、困った時に助けて____わかるものだ。", "opts": ["A. くれてこそ", "B. くれたら", "C. くれれば", "D. くれるなら"], "ans": "A", "exp": "强调只有在困难时帮助才能看出真正的朋友，「てこそ」强调这是唯一标准"}, {"q": "毎日練習____、上達するものです。", "opts": ["A. すると", "B. すれば", "C. してこそ", "D. したら"], "ans": "C", "exp": "强调只有每天练习才能进步，「してこそ」强调这是必要且充分的条件"}]}};

.fbtn:hover,.fbtn.on{background:#fff;border-color:#fff}

/* progress */
.prog-wrap{padding:6px 18px 4px;background:rgba(255,255,255,.1)}
.prog-info{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.prog-lbl{font-size:11px;font-weight:700;color:rgba(255,255,255,.85)}
.prog-stats{display:flex;gap:12px;font-size:11px;font-weight:700;color:rgba(255,255,255,.85)}
.prog-track{height:3px;background:rgba(255,255,255,.25);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:rgba(255,255,255,.8);border-radius:2px;transition:width .35s}

/* stats bar (grid) */
.sbar{display:flex;gap:14px;padding:8px 18px 2px;font-size:12px;color:rgba(255,255,255,.8);font-weight:600}

/* ═══ CARD STAGE ═══ */
.cstage{display:none;flex:1;align-items:flex-start;justify-content:center;padding:14px 18px 84px;overflow:visible}
.cstage.on{display:flex}
.fcard{width:100%;max-width:700px;background:#fff;border-radius:22px;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,.13);animation:cIn .22s ease}
@keyframes cIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.aL{animation:sL .18s ease forwards}
.aR{animation:sR .18s ease forwards}
@keyframes sL{to{opacity:0;transform:translateX(-50px)}}
@keyframes sR{to{opacity:0;transform:translateX(50px)}}

/* card head */
.chead{background:var(--ybg);padding:20px 24px 16px;border-bottom:2px dashed var(--mm);display:flex;align-items:flex-start;gap:14px;position:relative}
.cnum{color:#fff;font-size:11px;font-weight:900;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
.chead-info{flex:1}
.chead-row{display:flex;align-items:center;gap:8px;flex:1;flex-wrap:nowrap}

.c-gram{font-size:26px;font-weight:900;color:var(--navy);line-height:1.18}
.c-gram .hl{color:var(--red)}
.ctags{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;align-items:center}
.ctag{font-size:10px;font-weight:700;padding:2px 8px;border-radius:5px}
.cdiff{font-size:14px;letter-spacing:2px;color:#f5b942}
.cbtns{display:flex;gap:8px;align-items:flex-start;flex-shrink:0}
.cact{width:40px;height:40px;border-radius:12px;border:1.5px solid #e0e0e0;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:20px;transition:all .15s}
.cact:hover{border-color:var(--mint);transform:scale(1.06)}
.cact.fav{background:#fff9e6;border-color:#f5c518}
.cact.mst{background:var(--ml);border-color:var(--mint)}
.mst-rib{display:none;position:absolute;top:16px;right:110px;background:var(--ml);color:var(--mint);border:1.5px solid var(--mint);border-radius:20px;padding:3px 12px;font-size:11px;font-weight:900}
.mst-rib.on{display:block}

/* card body */
.cbody{padding:20px 24px 22px;display:flex;flex-direction:column;gap:12px}
.slbl{font-size:10px;font-weight:900;color:var(--mint);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:5px}
.c-meaning{font-size:15px;font-weight:700;color:var(--tx);line-height:1.65}
.c-mzh{font-size:13px;color:var(--gr);margin-top:4px}
.c-pat{background:var(--ml);border:1.5px solid var(--mm);border-radius:12px;padding:11px 15px;font-size:14px;font-weight:700;color:var(--navy);line-height:1.6}
.c-pat .gram{color:var(--red);font-weight:900}

/* ─── FURIGANA SYSTEM ─── */
.furi-wrap{display:flex;flex-wrap:wrap;align-items:flex-end;gap:0;line-height:2.8;font-size:15px}
.fw{display:inline-flex;flex-direction:column;align-items:center;margin:0 1px;border-radius:5px;padding:1px 3px 2px;cursor:default;position:relative}
.fw:hover{opacity:.72}
.fr{font-size:9.5px;line-height:1;color:#999;min-height:12px;text-align:center;white-space:nowrap;font-weight:400}
.ft{font-size:14px;font-weight:700;line-height:1.18;white-space:nowrap;border-radius:4px;padding:1px 3px}
.fpunc{display:inline-flex;flex-direction:column;align-items:center;margin-left:-2px}.fpunc .fr{min-height:12px;font-size:9.5px;line-height:1;display:block}.fpunc .ft{font-size:16px;font-weight:700;color:var(--tx);line-height:1.2;padding:1px 0}
/* grammar highlight */
.fw.isG .ft{color:var(--red)!important;background:rgba(232,70,74,.1)!important;font-weight:900}
.fw.isG .fr{color:var(--red)}
/* POS colors */
.pN .ft{color:var(--pnt);background:var(--pn)}
.pV .ft{color:var(--pvt);background:var(--pv)}
.pA .ft{color:var(--pat);background:var(--pa)}
.pD .ft{color:var(--padt);background:var(--pad)}
.pP .ft{color:var(--ppt);background:var(--pp)}
.pC .ft{color:var(--pct);background:var(--pc)}
.pX .ft{color:var(--pxt);background:var(--px)}
/* plain (not yet analyzed) */
.plain-ex{font-size:14px;font-weight:700;color:var(--tx);line-height:1.58}
.plain-ex .hl{color:var(--red);font-weight:900}

/* POS legend */
.pos-legend{display:none;gap:6px;flex-wrap:wrap;padding:8px 12px;background:#f8f8f8;border-radius:8px}
.pleg{display:flex;align-items:center;gap:3px;font-size:10.5px;font-weight:700}
.pleg-dot{width:9px;height:9px;border-radius:2px}

/* analyze btn */
.ana-btn{background:linear-gradient(135deg,#6dc9a8,#10ac84);color:#fff;border:none;border-radius:10px;padding:8px 16px;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;display:none;align-items:center;gap:6px;transition:opacity .15s}
.ana-btn:hover{opacity:.88}
.ana-btn:disabled{opacity:.45;cursor:wait}
.spin{display:inline-block;width:12px;height:12px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}

/* example blocks */
.exb{border-radius:12px;padding:12px 14px 8px;border:1.5px solid #eee;margin-bottom:8px;cursor:pointer;transition:border-color .16s ease,background-color .16s ease,box-shadow .16s ease}
.exb.main{background:#fafafa;border-color:#eee}
.exb.sub{background:#fafafa}
.ex-zh{font-size:11px;color:var(--gr);margin-top:4px;line-height:1.45;opacity:.76}
.exb.playing{border-color:var(--mint);background:var(--ml);box-shadow:0 0 0 2px rgba(109,201,168,.14)}

/* AI gen */
.ai-btn{border:none;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;font-family:inherit;font-size:12px;font-weight:700;padding:8px 16px;border-radius:10px;cursor:pointer;display:none;align-items:center;gap:6px;transition:opacity .15s}
.ai-btn:hover{opacity:.88}
.ai-btn:disabled{opacity:.45;cursor:wait}
.ai-res{background:var(--ml);border-radius:10px;padding:12px 14px;font-size:13px;line-height:1.8;color:#345;display:none;border:1.5px solid var(--mm)}
.ai-res.on{display:block}

/* bottom nav */
.bnav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #eee;padding:10px 20px;display:flex;align-items:center;justify-content:center;gap:10px;z-index:60;box-shadow:0 -4px 20px rgba(0,0,0,.07)}
.nbtn{width:50px;height:50px;border-radius:14px;border:1.5px solid #e0e0e0;background:#f7f7f7;color:var(--navy);font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s;user-select:none;font-weight:900}
.nbtn:hover{background:var(--ml);border-color:var(--mint);color:var(--mint)}
.nbtn:active{transform:scale(.9)}
.nbtn:disabled{opacity:.3;cursor:default;pointer-events:none}
.nctr{background:#f5f5f5;border:1px solid #eee;border-radius:10px;padding:8px 20px;font-size:15px;font-weight:900;color:var(--navy);min-width:100px;text-align:center;flex-shrink:0}
.nctr sub{font-size:11px;font-weight:400;color:var(--gr)}
.nextra{display:flex;gap:6px}
.nxbtn{border:1px solid #e0e0e0;background:#f7f7f7;color:var(--gr);font-family:inherit;font-size:11px;font-weight:700;padding:5px 12px;border-radius:20px;cursor:pointer;transition:all .12s}
.nxbtn:hover{border-color:var(--mint);color:var(--mint)}

/* ═══ GRID STAGE ═══ */
.gstage{display:none}
.gstage.on{display:block}
.srch-wrap{padding:12px 18px 0}
.srch{width:100%;max-width:560px;padding:9px 18px;border-radius:30px;border:none;background:rgba(255,255,255,.92);font-family:inherit;font-size:14px;color:var(--navy);box-shadow:0 2px 10px rgba(0,0,0,.08);outline:none}
.srch:focus{background:#fff}
.srch::placeholder{color:#aaa}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:18px;padding:16px 18px 80px;max-width:1400px;margin:0 auto}
.gc{background:#fff;border-radius:16px;overflow:hidden;box-shadow:var(--sh);transition:transform .2s,box-shadow .2s;display:flex;flex-direction:column}
.gc:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(0,0,0,.13)}
.gch{background:var(--ybg);border-bottom:2px dashed var(--mm);padding:10px 16px 9px;display:flex;align-items:center;gap:8px;cursor:pointer}
.gnum{color:#fff;font-size:10px;font-weight:900;min-width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.gt{font-size:17px;font-weight:900;color:var(--navy);flex:1;line-height:1.3}
.gt .hl{color:var(--red)}
.gd{font-size:12px;color:#f5b942;letter-spacing:1px;flex-shrink:0}
.gtag{font-size:9px;padding:2px 6px;border-radius:4px;font-weight:700;white-space:nowrap}
.gea{padding:13px 16px 10px;background:var(--cream)}
.gejp{font-size:15px;font-weight:700;color:var(--tx);line-height:1.7}
.gejp .hl{color:var(--red);font-weight:900}
.gezh{font-size:11.5px;color:var(--gr);margin-top:3px;line-height:1.5}
.gi{padding:7px 16px;display:flex;flex-direction:column;gap:5px}
.gmb{background:var(--ml);border-left:3px solid var(--mint);border-radius:0 7px 7px 0;padding:6px 11px;font-size:12px;color:#456}
.gmb .lb{font-size:9px;font-weight:900;color:var(--mint);letter-spacing:1px;text-transform:uppercase;display:block;margin-bottom:2px}
.gpb{background:#fff;border:1.5px solid var(--mm);border-radius:7px;padding:6px 11px;font-size:12px;color:var(--navy)}
.gpb .lb{font-size:9px;font-weight:900;color:var(--gr);letter-spacing:1px;text-transform:uppercase;display:block;margin-bottom:2px}
.gpb code{font-family:inherit;font-weight:700}
.gpb code .gram{color:var(--red);font-weight:900}
.gmt{padding:5px 16px;background:none;border:none;font-family:inherit;font-size:11px;color:var(--mint);font-weight:700;cursor:pointer;display:flex;align-items:center;gap:3px;width:100%;text-align:left}
.gme{display:none;padding:3px 16px 13px;flex-direction:column;gap:5px}
.gme.on{display:flex}
.gei{font-size:11.5px;color:#555;line-height:1.6;padding:5px 11px;background:#f5f5f5;border-radius:7px}
.gei .gm{color:var(--red);font-weight:900}
.gei .tr{font-size:10.5px;color:var(--gr);display:block;margin-top:1px}
.empty{grid-column:1/-1;text-align:center;padding:60px 20px;color:rgba(255,255,255,.7);font-size:16px}

/* modal */
.mov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center;padding:20px}
.mov.on{display:flex}
.mo{background:#fff;border-radius:18px;max-width:500px;width:100%;max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.25)}
.moh{background:var(--ybg);border-bottom:2px dashed var(--mm);padding:14px 18px;display:flex;align-items:center;gap:10px}
.moc{margin-left:auto;background:none;border:none;font-size:22px;cursor:pointer;color:var(--gr);line-height:1;padding:0 4px}
.mob{padding:14px 18px 22px;display:flex;flex-direction:column;gap:10px}
.mex{font-size:17px;font-weight:700;line-height:1.8;color:var(--tx)}
.mex .hl{color:var(--red);font-weight:900}
.mo::-webkit-scrollbar{width:4px}
.mo::-webkit-scrollbar-thumb{background:var(--mm);border-radius:4px}

/* ─── POS TOOLTIP ─── */
.pos-tip{position:fixed;z-index:99999;background:#2a3f6e;color:#fff;border-radius:8px;padding:4px 10px;font-size:11px;font-weight:700;pointer-events:none;display:none;white-space:nowrap}

/* ─── KANJI POPUP ─── */
.kpop{position:fixed;z-index:99999;background:#fff;border-radius:14px;box-shadow:0 8px 32px rgba(0,0,0,.2);padding:14px 16px;max-width:250px;min-width:170px;border:2px solid var(--mm);display:none;font-family:'M PLUS Rounded 1c',sans-serif;pointer-events:none}
.kpop.on{display:block}
.kw{font-size:24px;font-weight:900;color:var(--navy);line-height:1.2;margin-bottom:2px}
.kr{font-size:14px;color:var(--mint);font-weight:700;letter-spacing:1px}
.kro{font-size:11px;color:#aaa;margin-bottom:5px}
.km{font-size:13px;color:#456;line-height:1.5;border-top:1px solid #eee;padding-top:7px;margin-top:4px}
.ks{pointer-events:all;margin-top:9px;width:100%;background:var(--mint);color:#fff;border:none;border-radius:9px;padding:7px;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer}
.ks:hover{background:#5ab89a}
.ks.sv{background:#f5a030}
.kld{font-size:12px;color:#aaa;padding:8px 0;text-align:center}
.kword{cursor:pointer;border-bottom:1.5px dotted var(--mm);border-radius:2px;padding:0 1px;display:inline}
.kword:hover{background:var(--ml)}

/* ─── NOTEBOOK ─── */
.nb-fab{position:fixed;bottom:80px;right:18px;z-index:300;background:var(--navy);color:#fff;width:50px;height:50px;border-radius:50%;border:none;font-size:20px;cursor:pointer;box-shadow:0 4px 18px rgba(0,0,0,.22);display:flex;align-items:center;justify-content:center;transition:transform .15s}
.nb-fab:hover{transform:scale(1.08)}
.nb-cnt{position:absolute;top:-2px;right:-2px;background:var(--red);color:#fff;font-size:10px;font-weight:900;min-width:18px;height:18px;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 4px}
.nb-panel{position:fixed;top:0;right:-360px;width:340px;max-width:95vw;height:100vh;background:#fff;z-index:400;box-shadow:-4px 0 24px rgba(0,0,0,.12);transition:right .25s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;font-family:'M PLUS Rounded 1c',sans-serif}
.nb-panel.on{right:0}
.nb-hd{background:var(--navy);color:#fff;padding:16px 18px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.nb-ht{font-size:16px;font-weight:900;flex:1}
.nb-xb{background:none;border:none;color:#fff;font-size:20px;cursor:pointer;padding:0 4px;opacity:.8}
.nb-xb:hover{opacity:1}
.nb-tb{padding:10px 14px;border-bottom:1px solid #eee;display:flex;gap:8px;align-items:center;flex-shrink:0}
.nb-si{flex:1;padding:6px 12px;border-radius:20px;border:1.5px solid var(--mm);font-family:inherit;font-size:12px;outline:none;color:var(--navy)}
.nb-si:focus{border-color:var(--mint)}
.nb-cl{background:none;border:1.5px solid #ddd;color:#888;border-radius:8px;padding:5px 10px;font-family:inherit;font-size:11px;cursor:pointer}
.nb-cl:hover{border-color:var(--red);color:var(--red)}
.nb-list{flex:1;overflow-y:auto;padding:8px 0}
.nb-list::-webkit-scrollbar{width:4px}
.nb-list::-webkit-scrollbar-thumb{background:var(--mm);border-radius:4px}
.nbi{padding:10px 16px;border-bottom:1px solid #f0f0f0;display:flex;align-items:flex-start;gap:10px}
.nbi:hover{background:#f8fffe}
.nbw{font-size:20px;font-weight:900;color:var(--navy);min-width:44px}
.nbinfo{flex:1;min-width:0}
.nbr{font-size:12px;color:var(--mint);font-weight:700}
.nbm{font-size:11.5px;color:#555;line-height:1.5;margin-top:2px}
.nba{display:flex;gap:4px;margin-top:5px;flex-wrap:wrap}
.nbt{background:none;border:1px solid var(--mm);color:var(--mint);border-radius:6px;padding:2px 8px;font-size:10px;cursor:pointer;font-family:inherit}
.nbt:hover{background:var(--ml)}
.nbd{background:none;border:1px solid #f0b0b0;color:#e88;border-radius:6px;padding:2px 8px;font-size:10px;cursor:pointer;font-family:inherit}
.nbd:hover{background:#fff0f0}
.nbdt{font-size:9px;color:#ccc;margin-top:3px}
.nblv{font-size:9px;padding:1px 5px;border-radius:3px;font-weight:700}
.nb-empty{text-align:center;padding:40px 20px;color:#bbb;font-size:14px}
.nb-ft{padding:12px 16px;border-top:1px solid #eee;font-size:11px;color:#aaa;text-align:center;flex-shrink:0}
.nb-ov{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:350;display:none}
.nb-ov.on{display:block}

/* ─── CONFIG MODAL ─── */
.cfg-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;align-items:center;justify-content:center;padding:20px}
.cfg-ov.on{display:flex}
.cfg-mo{background:#fff;border-radius:18px;max-width:440px;width:100%;padding:24px;box-shadow:0 20px 60px rgba(0,0,0,.25)}
.cfg-mo h3{font-size:17px;font-weight:900;color:var(--navy);margin-bottom:16px}
.cfg-mo label{font-size:12px;font-weight:700;color:var(--gr);display:block;margin-bottom:4px;margin-top:12px}
.cfg-mo input{width:100%;padding:9px 14px;border-radius:10px;border:1.5px solid #ddd;font-family:inherit;font-size:13px;color:var(--navy);outline:none}
.cfg-mo input:focus{border-color:var(--mint)}
.cfg-row{display:flex;gap:8px;margin-top:16px}
.cfg-save{flex:1;background:var(--mint);color:#fff;border:none;border-radius:10px;padding:10px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer}
.cfg-save:hover{background:#5ab89a}
.cfg-cancel{background:none;border:1.5px solid #ddd;border-radius:10px;padding:10px 16px;font-family:inherit;font-size:13px;cursor:pointer;color:var(--gr)}
.cfg-hint{font-size:11px;color:#aaa;line-height:1.5;margin-top:8px}
.cfg-status{font-size:12px;margin-top:8px;padding:8px 12px;border-radius:8px;display:none}
.cfg-status.ok{background:#e8f5e9;color:#2e7d32;display:block}
.cfg-status.err{background:#ffebee;color:#c62828;display:block}

@media(max-width:600px){
  .grid{grid-template-columns:1fr;padding:10px 12px 82px}
  .c-gram{font-size:20px}
  .cbody{padding:14px 16px 18px;gap:10px}
  .bnav{padding:6px 10px}
  .nbtn{width:40px;height:40px;font-size:18px}
  .nextra{display:none}
  .topbar{padding:7px 10px;gap:7px}
  .tb-title{font-size:12px}
  .cnt-badge{display:none}
  .lvl-badge{font-size:9px;padding:3px 6px}
  .lvl-badge span{font-size:13px}
  .cfg-btn{padding:4px 7px;font-size:10px}
  .ft{font-size:13px}
  .plain-ex{font-size:14px;line-height:1.5}
  .exb{padding:10px 12px 8px}
  .ex-zh{font-size:10px}
}
/* ─── FLIP BUTTON & BACK PANEL ─── */
.flip-btn{width:100%;margin-top:14px;padding:11px;border-radius:12px;border:1.5px dashed var(--mm);background:var(--ml);color:var(--mint);font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s}
.flip-btn:hover:not(:disabled){background:var(--mint);color:#fff;border-style:solid}
.flip-btn:disabled{opacity:.4;cursor:default}
.fcard-back-panel{background:#fff;border-radius:22px;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,.13);width:100%;max-width:700px}
.back-header{background:var(--ybg);border-bottom:2px dashed var(--mm);padding:14px 20px;display:flex;align-items:center;gap:12px}
.flip-back-btn{border:none;background:rgba(0,0,0,.07);border-radius:8px;padding:5px 12px;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;color:var(--navy)}
.flip-back-btn:hover{background:rgba(0,0,0,.12)}
.back-title{font-size:14px;font-weight:900;color:var(--navy)}
.back-body{padding:18px 20px 24px;display:flex;flex-direction:column;gap:14px;max-height:70vh;overflow-y:auto}
.back-section{display:flex;flex-direction:column;gap:7px}
.back-label{font-size:10px;font-weight:900;letter-spacing:2px;color:var(--mint);text-transform:uppercase}
.back-analysis{font-size:13px;line-height:1.85;color:#345;background:var(--ml);border-left:3px solid var(--mint);border-radius:0 8px 8px 0;padding:10px 14px}
.back-mistakes{font-size:12.5px;line-height:1.9;color:#456;background:#fff9f0;border-left:3px solid #f5a030;border-radius:0 8px 8px 0;padding:10px 14px}
.back-similar{display:flex;flex-direction:column;gap:6px}
.similar-item{display:flex;gap:8px;font-size:12.5px;line-height:1.6;padding:5px 0;border-bottom:1px solid #f0f0f0}
.similar-item:last-child{border-bottom:none}
.similar-form{font-weight:900;color:var(--navy);white-space:nowrap;min-width:fit-content}
.similar-diff{color:var(--gr)}
.quiz-item{background:#f8f8f8;border-radius:12px;padding:13px 15px;border:1.5px solid #eee}
.quiz-q{font-size:13px;font-weight:700;color:var(--navy);margin-bottom:10px;line-height:1.6}
.quiz-opts{display:flex;flex-direction:column;gap:5px}
.quiz-opt{font-size:12.5px;padding:7px 11px;border-radius:8px;cursor:pointer;border:1.5px solid #e0e0e0;background:#fff;color:#456;transition:all .15s;text-align:left;font-family:inherit;width:100%}
.quiz-opt:hover:not(.correct):not(.wrong){border-color:var(--mint);background:var(--ml)}
.quiz-opt.correct{background:#e8f8f3;border-color:var(--mint);color:var(--mint);font-weight:900}
.quiz-opt.wrong{background:#fef0f0;border-color:#e84a4a;color:#c0392b}
.quiz-exp{font-size:11.5px;color:#666;margin-top:7px;padding:7px 10px;background:#efefef;border-radius:7px;display:none;line-height:1.6}
.quiz-exp.show{display:block}
.no-back{text-align:center;padding:40px 20px;color:var(--gr);font-size:13px}

    this.level    = cfg.level;

    this.G        = cfg.grammar;
    this.fgs      = cfg.filterGroups || [];
    this.label    = cfg.levelLabel || cfg.level;

    this.view     = 'card';
    this.filter   = 'all';
    this.search   = '';
    this.curMod   = null;
    this.deck     = [...this.G];
    this.cur      = 0;
    this.kCache   = {};
    this.kCur     = null;
    // per-card furigana cache  { cardId: [{text,reading,pos,isGram},...] }
    // 从 localStorage 加载已分析的注音缓存
    this._furiKey = 'jlpt_furi_' + (cfg.level || 'XX');
    try { this.furiCache = JSON.parse(localStorage.getItem(this._furiKey) || '{}'); }
    catch { this.furiCache = {}; }

    try { this.cs = JSON.parse(localStorage.getItem(CARD_ST_KEY) || '{}'); }
    catch { this.cs = {}; }
    if (!this.cs.favs)     this.cs.favs = {};
    if (!this.cs.mastered) this.cs.mastered = {};

    const s = document.createElement('style');
    s.textContent = SHARED_CSS;
    document.head.insertBefore(s, document.head.firstChild);
    document.body.style.background = this.bg;

    this._buildHTML();
    this._bind();
    this._setView('card');
    this._updateNbCount();
    if (window.speechSynthesis)
      window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
  }

  /* ── API call helper ── */
  async _api(messages, maxTokens = 1000) {
    const key   = localStorage.getItem(APIKEY_KEY) || '';
    const proxy = localStorage.getItem(PROXY_KEY)  || '';
    const url   = proxy ? proxy.replace(/\/$/, '') + '/api/claude'
                        : 'https://api.anthropic.com/v1/messages';
    const headers = { 'Content-Type': 'application/json' };
    if (!proxy && key) headers['x-api-key'] = key;

    const r = await fetch(url, {
      method: 'POST',
      headers,
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: maxTokens,
        messages
      })
    });
    if (!r.ok) {
      const t = await r.text();
      throw new Error(`API ${r.status}: ${t.slice(0,120)}`);
    }
    return r.json();
  }

  /* ─────────── BIND ─────────── */

    document.getElementById('cfgBtn').addEventListener('click', () => this._openCfg());
    document.getElementById('cfgSave').addEventListener('click', () => this._saveCfg());
    document.getElementById('cfgCancel').addEventListener('click', () => this._closeCfg());
    document.getElementById('cfgOv').addEventListener('click', e => { if (e.target===document.getElementById('cfgOv')) this._closeCfg(); });
    // filter
    document.getElementById('fbar').addEventListener('click', e => {
      const b = e.target.closest('.fbtn'); if (!b) return;
      document.querySelectorAll('.fbtn').forEach(x=>x.classList.remove('on'));
      b.classList.add('on');
      this.filter = b.dataset.f;
      this.deck = this._fDeck();
      this.cur = 0;
      if (this.view === 'card') this._renderCard();
      else this._renderGrid();
    });
    // card nav
    document.getElementById('prevBtn').addEventListener('click', () => this._go(-1));
    document.getElementById('nextBtn').addEventListener('click', () => this._go(1));
    this._initSwipe();
    document.getElementById('shuffleBtn').addEventListener('click', () => {
      this._hideBack();
      this._shuffle();
    });
    document.getElementById('rndBtn').addEventListener('click', () => {
      this._hideBack();
      this.cur=Math.floor(Math.random()*this.deck.length);
      this._renderCard();
    });
    document.addEventListener('keydown', e => {
      if (['INPUT','TEXTAREA'].includes(document.activeElement.tagName)) return;
      if (e.key==='ArrowLeft'||e.key==='a') this._go(-1);
      if (e.key==='ArrowRight'||e.key==='d') this._go(1);
      if (e.key==='f'||e.key==='F') this._toggleFav();
      if (e.key==='m'||e.key==='M') this._toggleMst();
    });
    document.getElementById('cStar').addEventListener('click', () => this._toggleFav());
    document.getElementById('cCheck').addEventListener('click', () => this._toggleMst());
    document.addEventListener('click', e => {
      const ex = e.target.closest('.exb[data-speak]');
      if (!ex) return;
      if (e.target.closest('.fw,.kword,button,input')) return;
      this._playExample(ex, ex.dataset.speak || '');

  /* ─────────── VIEW ─────────── */
  _setView(v) {
    this.view = v;
    document.getElementById('vCard').classList.toggle('on', v==='card');
    document.getElementById('vGrid').classList.toggle('on', v==='grid');
    document.getElementById('cstage').classList.toggle('on', v==='card');
    document.getElementById('gstage').classList.toggle('on', v==='grid');
    document.getElementById('progWrap').style.display = 'none';
    document.getElementById('fbar').style.display = v==='card'?'none':'flex';
    document.getElementById('bnav').style.display = v==='card'?'flex':'none';
    (document.getElementById('tbSub')||{textContent:''}).textContent = v==='card'
      ? '← → 键切换 ｜ F:收藏 M:已掌握'
      : '点击查看详情 ｜ 点击汉字查词';
    this.deck = this._fDeck();
    this.cur = 0;
    if (v==='card') this._renderCard();
    else this._renderGrid();
  }

  /* ─────────── FILTER ─────────── */
  _fDeck() {
    let arr = this.G;
    if (this.filter==='fav') arr=arr.filter(g=>this.cs.favs[g.id]);
    else if (this.filter==='unmastered') arr=arr.filter(g=>!this.cs.mastered[g.id]);
    else if (this.filter.startsWith('★')) arr=arr.filter(g=>g.d===this.filter);
    else if (this.filter!=='all') arr=arr.filter(g=>g.cat===this.filter);
    return arr;
  }
  _matchS(g) {
    if(!this.search)return true;
    const q=this.search.toLowerCase();
    return g.t.includes(q)||g.m.includes(q)||g.mz.includes(q)||g.e.includes(q)||g.ez.includes(q);
  }

  /* ─────────── CARD RENDER ─────────── */
  _renderCard(dir) {
    const g = this.deck[this.cur];
    if (!g) {
      document.getElementById('fcard').innerHTML='<div style="padding:60px;text-align:center;color:#aaa;font-size:16px">没有相关语法</div>';
      return;
    }
    const card = document.getElementById('fcard');
    const render = () => {
      if (!(document.getElementById('cNum'))) return;
      (document.getElementById('cNum')||{textContent:''}).textContent = g.id;
      document.getElementById('cGram').innerHTML = `～<span class="hl">${g.hl}</span>`;
      (document.getElementById('cMean')||{textContent:''}).textContent = g.m;
      (document.getElementById('cMzh')||{textContent:''}).textContent = g.mz;
      document.getElementById('cPat').innerHTML = g.p;

      const grp = this.fgs.find(x=>x.key===g.cat);
      document.getElementById('cTags').innerHTML =
        (grp?`<span class="ctag" style="background:${grp.color||'#e8f0ff'};color:${grp.fg||'#3a5bc7'}">${grp.label}</span>`:'') +
        `<span class="cdiff">${g.d}</span>`;

      const fav=!!this.cs.favs[g.id], mst=!!this.cs.mastered[g.id];
      (document.getElementById('cStar')||{textContent:''}).textContent=fav?'⭐':'☆';
      document.getElementById('cStar').className='cact'+(fav?' fav':'');
      (document.getElementById('cCheck')||{textContent:''}).textContent=mst?'✅':'◯';
      document.getElementById('cCheck').className='cact'+(mst?' mst':'');
      document.getElementById('mstRib').className='mst-rib'+(mst?' on':'');

      // Render examples
      // 优先用内置注音（已批量生成写入HTML的）
      const builtin = g.furi || null;
      const cached  = this.furiCache[g.id] || builtin;
      if (cached) {
        // 同步到内存cache（方便后续切换卡片不重读）
        if (!this.furiCache[g.id] && builtin) this.furiCache[g.id] = builtin;
        this._renderFuri(g, cached);
      } else {
        this._renderPlain(g);
      }

      // AI reset

      // Progress
      const pct=((this.cur+1)/this.deck.length*100).toFixed(1);
      (document.getElementById('navIdx')||{textContent:''}).textContent=this.cur+1;
      (document.getElementById('navTot')||{textContent:''}).textContent=this.deck.length;
      document.getElementById('prevBtn').disabled=this.cur===0;
      (document.getElementById('nextBtn')||{disabled:false}).disabled=this.cur===this.deck.length-1;
      this._renderBack(g);
    };

    if (dir) {
      card.classList.add(dir==='L'?'aL':'aR');
      setTimeout(()=>{ card.classList.remove('aL','aR'); render(); }, 160);
    } else { render(); }
  }

  /* render plain (no furigana yet) */
  _renderPlain(g) {
    (document.getElementById('posLegend')||{style:{}}).style.display='none';
    (document.getElementById('anaBtn')||{style:{}}).style.display='none';
    const allEx = [{j:g.eh,z:g.ez,main:true},...g.ex.map(e=>({j:e.j,z:e.z}))];
    document.getElementById('cExList').innerHTML = allEx.map(ex => {
      const plain = ex.j.replace(/<[^>]*>/g,'');
      const safe = plain.replace(/"/g,'&quot;');
      return `<div class="exb ${ex.main?'main':'sub'}" data-speak="${safe}">
        <div class="plain-ex">${ex.j}</div>
        <div class="ex-zh">${ex.z}</div>
      </div>`;
    }).join('');
    setTimeout(()=>{const el=document.getElementById('cExList');if(el){delete el.dataset.kw;el.querySelectorAll('[data-kw]').forEach(x=>delete x.dataset.kw);this._wrapKanji(el);}},80);
  }

  /* render with furigana tokens */
  _renderFuri(g, tokenSets) {
    (document.getElementById('posLegend')||{style:{}}).style.display='flex';
    const allEx = [{j:g.eh,z:g.ez,main:true},...g.ex.map(e=>({j:e.j,z:e.z}))];
    const listEl = document.getElementById('cExList');
    listEl.innerHTML='';

    allEx.forEach((ex,i) => {
      const toks = tokenSets[i];
      const plain = ex.j.replace(/<[^>]*>/g,'').replace(/'/g,"\\'");
      const div = document.createElement('div');
      div.className = 'exb '+(ex.main?'main':'sub');

      const furiDiv = document.createElement('div');
      furiDiv.className='furi-wrap';

            const POS_LBL={noun:'名詞',verb:'動詞',adj:'形容詞',adv:'副詞',part:'助詞',conj:'接续詞',aux:'助動詞'};
            const lbl = t.isGram ? '🔴 文法ポイント' : (POS_LBL[t.pos]||t.pos);

    });

  _initSwipe() {
    const el = document.getElementById('fcard');
    if (!el) return;
    let startX = 0, startY = 0;
    el.addEventListener('touchstart', e => {
      startX = e.touches[0].clientX;
      startY = e.touches[0].clientY;
    }, {passive: true});
    el.addEventListener('touchend', e => {
      const dx = e.changedTouches[0].clientX - startX;
      const dy = e.changedTouches[0].clientY - startY;
      if (Math.abs(dx) < 40 || Math.abs(dy) > Math.abs(dx)) return;
      if (dx < 0) this._go(1);
      else this._go(-1);
    }, {passive: true});
  }

  _playExample(el,text) {
    if(!window.speechSynthesis || !text) return;
    document.querySelectorAll('.exb.playing').forEach(x => x.classList.remove('playing'));
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'ja-JP';
    u.rate = 1.0;
    const vs = window.speechSynthesis.getVoices();
    const jp = vs.find(v => v.lang === 'ja-JP') || vs.find(v => v.lang && v.lang.startsWith('ja'));

    this._playingExample = el;
    el.classList.add('playing');
    const clear = () => {
      if (this._playingExample === el) this._playingExample = null;
      el.classList.remove('playing');
    };
    u.onend = clear;
    u.onerror = clear;
    window.speechSynthesis.speak(u);
  }

  speak(text,rate) {
    if(!window.speechSynthesis)return;
    document.querySelectorAll('.exb.playing').forEach(x => x.classList.remove('playing'));
    this._playingExample = null;
    window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    u.lang='ja-JP'; u.rate=rate||1.0;
    const vs=window.speechSynthesis.getVoices();
    const jp=vs.find(v=>v.lang==='ja-JP')||vs.find(v=>v.lang.startsWith('ja'));
    if(jp)u.voice=jp;
    window.speechSynthesis.speak(u);
  }

  /* ─────────── AI GEN ─────────── */

  /* ─────────── KANJI WRAP (grid/modal only) ─────────── */
  _wrapKanji(root) {
    if(!root||root.dataset?.kw)return;
    root.dataset.kw='1';
    const walker=document.createTreeWalker(root,NodeFilter.SHOW_TEXT,{
      acceptNode(n){
        const p=n.parentNode;
        if(!p)return NodeFilter.FILTER_REJECT;
        const tag=p.tagName?.toUpperCase();
        if(['BUTTON','INPUT','SCRIPT','STYLE'].includes(tag))return NodeFilter.FILTER_REJECT;
        if(p.classList?.contains('kword'))return NodeFilter.FILTER_REJECT;
        if(!/[一-龯ぁ-ゖァ-ヺー]/.test(n.textContent))return NodeFilter.FILTER_REJECT;
        return NodeFilter.FILTER_ACCEPT;
      }
    });
    const nodes=[]; let n;
    while(n=walker.nextNode())nodes.push(n);
    nodes.forEach(tn=>{
      const parent=tn.parentNode; if(!parent)return;
      const parts=tn.textContent.split(/([一-龯ぁ-ゖァ-ヺーａ-ｚＡ-Ｚ０-９]+)/);
      if(parts.length<=1)return;
      const frag=document.createDocumentFragment();
      parts.forEach(part=>{
        if(!part)return;
        if(/[一-龯ぁ-ゖァ-ヺー]/.test(part)){
          const sp=document.createElement('span');
          sp.className='kword'; sp.textContent=part;
          sp.addEventListener('click',ev=>{ev.stopPropagation();ev.preventDefault();this._lookupWord(part,ev);});
          frag.appendChild(sp);
        } else { frag.appendChild(document.createTextNode(part)); }
      });
      try{parent.replaceChild(frag,tn);}catch{}
    });
  }

  _lemmatize(word) {
    // 常见活用形 → 原形
    const rules = [
      // 动词て形
      [/って$/, 'う'], [/いて$/, 'く'], [/いで$/, 'ぐ'], [/して$/, 'す'],
      [/んで$/, 'ぬ'], [/んで$/, 'ぶ'], [/んで$/, 'む'], [/って$/, 'つ'],
      [/って$/, 'る'], [/えて$/, 'える'], [/いて$/, 'いる'],
      // 动词ます形
      [/います$/, 'う'], [/きます$/, 'く'], [/ぎます$/, 'ぐ'], [/します$/, 'す'],
      [/ちます$/, 'つ'], [/にます$/, 'ぬ'], [/びます$/, 'ぶ'], [/みます$/, 'む'],
      [/ります$/, 'る'], [/えます$/, 'える'], [/ます$/, 'る'],
      // 动词た形
      [/った$/, 'う'], [/いた$/, 'く'], [/いだ$/, 'ぐ'], [/した$/, 'す'],
      [/った$/, 'つ'], [/んだ$/, 'ぬ'], [/んだ$/, 'ぶ'], [/んだ$/, 'む'],
      [/りた$/, 'る'], [/た$/, 'る'],
      // 动词ない形
      [/わない$/, 'う'], [/かない$/, 'く'], [/がない$/, 'ぐ'], [/さない$/, 'す'],
      [/たない$/, 'つ'], [/なない$/, 'ぬ'], [/ばない$/, 'ぶ'], [/まない$/, 'む'],
      [/らない$/, 'る'], [/ない$/, 'る'],
      // 动词过去/礼貌否定
      [/いました$/, 'う'], [/きました$/, 'く'], [/りました$/, 'る'],
      [/いません$/, 'う'], [/きません$/, 'く'], [/りません$/, 'る'],
      [/ませんでした$/, 'る'], [/ました$/, 'る'], [/ません$/, 'る'],
      // い形容词活用
      [/くない$/, 'い'], [/かった$/, 'い'], [/くて$/, 'い'], [/ければ$/, 'い'],
      [/く$/, 'い'],
    ];
    let w = word;
    for (const [pat, rep] of rules) {
      if (pat.test(w)) {
        const candidate = w.replace(pat, rep);
        if (candidate !== w && candidate.length >= 1) {
          return candidate;
        }
      }
    }
    return word;
  }
  async _lookupWord(word,e) {
    const pop=document.getElementById('kpop');
    this._posPopup(e,pop);
    pop.style.display='block'; pop.classList.add('on'); pop.style.pointerEvents='none';
    document.getElementById('kld').style.display='block';
    document.getElementById('kld').textContent='查询中...';
    document.getElementById('kcnt').style.display='none';
    this.kCur=null;
    if(this.kCache[word]){this._showKanji(this.kCache[word],word);return;}

    // 词形还原：去掉活用后缀，尝试查原形
    const normalize = (w) => {
      const suffixes = [
        // 动词活用
        ['します','する'],['しました','する'],['しています','する'],['してください','する'],
        ['しない','する'],['しなかった','する'],['できます','できる'],['できません','できる'],
        ['います','いる'],['いました','いる'],['いません','いる'],
        ['あります','ある'],['ありました','ある'],['ありません','ある'],
        ['ました','る'],['ません','る'],['ます','る'],
        ['った','つ'],['って','つ'],['いた','く'],['いて','く'],
        ['いだ','ぐ'],['いで','ぐ'],['した','す'],['して','す'],
        ['んだ','ぬ'],['んで','ぬ'],['んだ','む'],['んで','む'],
        ['んだ','ぶ'],['んで','ぶ'],['った','る'],['って','る'],
        ['ない','る'],['なかった','る'],['れた','る'],['られた','る'],
        ['せた','る'],['させた','る'],['られる','る'],['させる','る'],
        ['てしまった','る'],['てしまう','う'],
        ['ている','る'],['ていた','る'],['ていない','る'],
        ['てある','る'],['ておく','く'],['てみる','る'],
        // 形容词活用
        ['くなる','い'],['くない','い'],['くて','い'],['かった','い'],
        ['くなった','い'],['くなかった','い'],
        // 名词化
        ['さ','い'],['み','い'],
      ];
      for(const [suf, rep] of suffixes){
        if(w.endsWith(suf) && w.length > suf.length){
          const stem = w.slice(0, -suf.length);
          const candidates = [stem+rep, stem+'う', stem+'く', stem+'ぐ', stem+'す', stem+'つ', stem+'ぬ', stem+'ぶ', stem+'む', stem+'る'];
          for(const c of candidates){
            if(LOCAL_DICT[c]) return LOCAL_DICT[c];
          }
          // 返回词干本身
          if(LOCAL_DICT[stem]) return LOCAL_DICT[stem];
        }
      }
      return null;
    };

    // 1. 直接查
    let entry = LOCAL_DICT[word];
    
    // 2. 词形还原查
    if(!entry) entry = normalize(word);
    
    // 3. 去掉最后1-3个字再查（处理复合词）
    if(!entry && word.length > 2){
      for(let i=1; i<=Math.min(3, word.length-1); i++){
        const stem = word.slice(0,-i);
        if(LOCAL_DICT[stem]){ entry = LOCAL_DICT[stem]; break; }
      }
    }

    if(entry){
      const [reading,pos,meaning]=entry.split('|');
      const info={reading:reading||word,pos:pos||'',meaning:meaning||'—'};
      this.kCache[word]=info;
      this._showKanji(info,word);
      return;
    }

    // 4. 本地查不到，调 AI（需要 API Key）
    const key=localStorage.getItem('jlpt_api_key')||'';
    const proxy=localStorage.getItem('jlpt_proxy_url')||'';
    if(!key && !proxy){
      const info={reading:'—',pos:'',meaning:'设置 API Key 后可在线查词'};
      this.kCache[word]=info;
      this._showKanji(info,word);
      return;
    }

    try{
      let result;
      const prompt = '查询日语单词「'+lookupWord+'」，只返回JSON不要其他内容：{"reading":"假名读音","pos":"词性如名词/动词/形容词等","meaning":"中文释义3-6字"}';

      if(proxy && (proxy.includes('siliconflow') || proxy.includes('openai') || proxy.includes('localhost') || proxy.includes('192.168'))){
        const url=proxy.replace(/\/$/,'')+'/v1/chat/completions';
        const r=await fetch(url,{
          method:'POST',
          headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},
          body:JSON.stringify({model:'Qwen/Qwen2.5-7B-Instruct',max_tokens:80,messages:[{role:'user',content:prompt}]})
        });
        if(!r.ok) throw new Error('HTTP '+r.status);
        const d=await r.json();
        const text=d.choices?.[0]?.message?.content||'';
        const m=text.match(/\{[^}]+\}/);
        if(!m) throw new Error('解析失败');
        result=JSON.parse(m[0]);
      } else {
        const url=proxy?proxy.replace(/\/$/,'')+'/api/claude':'https://api.anthropic.com/v1/messages';
        const headers={'Content-Type':'application/json'};
        if(!proxy) headers['x-api-key']=key;
        const r=await fetch(url,{method:'POST',headers,
          body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:80,messages:[{role:'user',content:prompt}]})
        });
        if(!r.ok) throw new Error('HTTP '+r.status);
        const d=await r.json();
        const text=d.content?.[0]?.text||'';
        const m=text.match(/\{[^}]+\}/);
        if(!m) throw new Error('解析失败');
        result=JSON.parse(m[0]);
      }

      const info={reading:result.reading||'—',pos:result.pos||'',meaning:result.meaning||'—'};
      this.kCache[word]=info;
      this._showKanji(info,word);
    }catch(err){
      const info={reading:'—',pos:'',meaning:'查询失败'};
      this.kCache[word]=info;
      this._showKanji(info,word);
    }
  }
  _posPopup(e,pop){
    const vw=window.innerWidth,vh=window.innerHeight;
    if(!e||e.clientX===undefined){
      pop.style.left=Math.max(8,vw/2-125)+'px';
      pop.style.top=Math.max(8,vh/2-100)+'px';
      return;
    }
    let x=e.clientX+14,y=e.clientY+14;
    if(x+250>vw-8)x=e.clientX-258;
    if(y+200>vh-8)y=e.clientY-208;
    if(x<8)x=8; if(y<8)y=8;
    pop.style.left=x+'px'; pop.style.top=y+'px';
  }
  _showKanji(info,word){
    this.kCur={word,...info};
    document.getElementById('kld').style.display='none';
    document.getElementById('kcnt').style.display='block';
    document.getElementById('kw').textContent=word;
    document.getElementById('kr').textContent=info.reading||'—';
    document.getElementById('kro').textContent=info.romaji||'';
    document.getElementById('km').innerHTML=(info.pos?`<span style="background:#e8f0ff;color:#3a5bc7;border-radius:3px;padding:1px 6px;font-size:10px;font-weight:700;margin-right:5px">${info.pos}</span>`:'')+( info.meaning||'');
    const saved=this._loadNb().some(x=>x.word===word);
    const btn=document.getElementById('ks');
    const spkBtn=document.getElementById('kspeak'); if(spkBtn) spkBtn.onclick=()=>this.speak(word,1.0);
    btn.textContent=saved?'✅ 已添加':'📚 加入单词本';
    btn.className='ks'+(saved?' sv':'');
    document.getElementById('kpop').style.pointerEvents='all';
  }
  _saveFromPopup(){
    if(!this.kCur)return;
    this._addToNb({...this.kCur,level:this.level});
    document.getElementById('ks').textContent='✅ 已添加';
    document.getElementById('ks').className='ks sv';
  }

  /* ─────────── NOTEBOOK ─────────── */
  _loadNb(){try{return JSON.parse(localStorage.getItem(NB_KEY)||'[]');}catch{return[];}}
  _saveNb(items){localStorage.setItem(NB_KEY,JSON.stringify(items));this._updateNbCount();}
  _updateNbCount(){const n=this._loadNb().length;document.getElementById('nbCnt').textContent=n;document.getElementById('nbHC').textContent=`${n}词`;}
  _addToNb(entry){const nb=this._loadNb();if(nb.some(x=>x.word===entry.word))return;nb.unshift({...entry,date:new Date().toLocaleDateString('ja-JP')});this._saveNb(nb);this._renderNb();}
  _openNb(){document.getElementById('nbPanel').classList.add('on');document.getElementById('nbOv').classList.add('on');document.body.style.overflow='hidden';this._renderNb();}
  _closeNb(){document.getElementById('nbPanel').classList.remove('on');document.getElementById('nbOv').classList.remove('on');document.body.style.overflow='';}
  _removeFromNb(w){this._saveNb(this._loadNb().filter(x=>x.word!==w));this._renderNb();}
  _renderNb(){
    const nb=this._loadNb();
    const q=(document.getElementById('nbSi')?.value||'').toLowerCase();
    const fl=q?nb.filter(x=>x.word.includes(q)||x.reading?.includes(q)||x.meaning?.toLowerCase().includes(q)):nb;
    this._updateNbCount();
    const lc={N5:'#f39c12',N4:'#54a0ff',N3:'#a855f7',N2:'#10ac84',N1:'#ee5a24'};
    const list=document.getElementById('nbList');
    if(!fl.length){list.innerHTML=`<div class="nb-empty">${nb.length===0?'📖 まだ単語がありません<br><span style="font-size:12px">例文の漢字をクリックして追加！</span>':'🔍 見つかりません'}</div>`;return;}
    list.innerHTML=fl.map(item=>`
    <div class="nbi">
      <div class="nbw">${item.word}</div>
      <div class="nbinfo">
        <div class="nbr">${item.reading||''}${item.romaji?`<span style="color:#ccc;margin:0 4px">·</span><span style="color:#aaa;font-weight:400">${item.romaji}</span>`:''}</div>
        <div class="nbm">${item.pos?`<span style="background:#e8f0ff;color:#3a5bc7;border-radius:3px;padding:0 5px;font-size:10px;font-weight:700;margin-right:4px">${item.pos}</span>`:''}${item.meaning||''}</div>
        <div class="nba">
          <button class="nbt" onclick="app.speak('${item.word.replace(/'/g,"\\'")}',1.0)">🔊</button>
          <button class="nbt" onclick="app.speak('${item.word.replace(/'/g,"\\'")}',0.6)">🐢</button>
          ${item.level?`<span class="nblv" style="background:${lc[item.level]||'#888'}22;color:${lc[item.level]||'#888'}">${item.level}</span>`:''}
          <button class="nbd" onclick="app._removeFromNb('${item.word.replace(/'/g,"\\'")}')">✕ 删除</button>
        </div>
        <div class="nbdt">添加日期: ${item.date||''}</div>
      </div>
    </div>`).join('');
  }

  /* ─────────── CONFIG (API Key / Proxy) ─────────── */
  _openCfg(){
    document.getElementById('cfgKey').value=localStorage.getItem(APIKEY_KEY)||'';
    document.getElementById('cfgProxy').value=localStorage.getItem(PROXY_KEY)||'';
    document.getElementById('cfgStatus').style.display='none';
    document.getElementById('cfgOv').classList.add('on');
  }
  _closeCfg(){document.getElementById('cfgOv').classList.remove('on');}
  _saveCfg(){
    const key=document.getElementById('cfgKey').value.trim();
    const proxy=document.getElementById('cfgProxy').value.trim();
    if(key)localStorage.setItem(APIKEY_KEY,key);else localStorage.removeItem(APIKEY_KEY);
    if(proxy)localStorage.setItem(PROXY_KEY,proxy);else localStorage.removeItem(PROXY_KEY);
    const st=document.getElementById('cfgStatus');
    st.className='cfg-status ok'; st.textContent='✅ 设置已保存！';
    setTimeout(()=>this._closeCfg(),1200);
  }
}

</script>
