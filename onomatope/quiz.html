<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>测验 · オノマトペ</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%; background: #08090d; color: #fff;
      font-family: "Hiragino Sans", "Yu Gothic", "PingFang SC", -apple-system, sans-serif;
      overscroll-behavior: none;
    }
    body {
      position: relative;
      overflow-x: hidden;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 50% 12%, rgba(242,76,92,0.22), transparent 30%),
        radial-gradient(circle at 18% 64%, rgba(0,210,255,0.13), transparent 24%),
        linear-gradient(135deg, rgba(255,255,255,0.05) 0 1px, transparent 1px 14px),
        linear-gradient(165deg, #07080c 0%, #151018 45%, #050607 100%);
      background-size: auto, auto, 18px 18px, auto;
      pointer-events: none;
      z-index: 0;
    }
    body::after {
      content: "";
      position: fixed;
      inset: auto -20% -18% -20%;
      height: 42vh;
      background: radial-gradient(ellipse at center, rgba(255,78,88,0.22), transparent 62%);
      filter: blur(10px);
      pointer-events: none;
      z-index: 0;
    }
    #app {
      min-height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 20px 40px;
      max-width: 480px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    /* Back link */
    .back-link {
      align-self: flex-start;
      margin-top: 16px;
      font-size: 13px;
      color: rgba(255,255,255,0.45);
      text-decoration: none;
    }
    .top-row {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    #bgm-toggle {
      margin-top: 16px;
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 999px;
      padding: 6px 12px;
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.72);
      font-family: inherit;
      font-size: 12px;
      cursor: pointer;
    }
    #bgm-toggle.active {
      color: #fff;
      border-color: rgba(0,210,255,0.45);
      box-shadow: 0 0 16px rgba(0,210,255,0.16);
    }

    /* Battle HUD */
    #battle-hud {
      width: 100%;
      display: grid;
      grid-template-columns: minmax(112px, 0.9fr) minmax(0, 1.4fr);
      gap: 10px;
      margin-top: 14px;
    }
    .battle-panel {
      min-height: 72px;
      background: linear-gradient(180deg, rgba(255,255,255,0.1), rgba(255,255,255,0.04));
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 14px;
      padding: 10px;
      box-shadow: 0 10px 28px rgba(0,0,0,0.28), inset 0 0 0 1px rgba(255,255,255,0.04);
      backdrop-filter: blur(10px);
    }
    .battle-kicker {
      color: rgba(255,255,255,0.5);
      font-size: 10px;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      margin-bottom: 7px;
    }
    #life-row {
      display: flex;
      gap: 5px;
      min-height: 24px;
      align-items: center;
    }
    .life-drop {
      display: inline-flex;
      width: 20px;
      height: 20px;
      align-items: center;
      justify-content: center;
      filter: drop-shadow(0 0 8px rgba(255,64,82,0.6));
      transition: transform 0.18s, opacity 0.18s, filter 0.18s;
    }
    .life-drop.lost {
      opacity: 0.22;
      transform: scale(0.78);
      filter: grayscale(1);
    }
    .boss-card {
      display: grid;
      grid-template-columns: 54px minmax(0, 1fr);
      gap: 10px;
      align-items: center;
    }
    .boss-avatar {
      width: 54px;
      height: 54px;
      border-radius: 14px;
      object-fit: cover;
      border: 1px solid rgba(255,255,255,0.22);
      box-shadow: 0 0 20px rgba(255,78,88,0.28);
    }
    .boss-name {
      font-size: 13px;
      font-weight: 800;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 7px;
    }
    #boss-bar {
      height: 10px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(70,12,18,0.82);
      border: 1px solid rgba(255,255,255,0.09);
    }
    #boss-bar-fill {
      height: 100%;
      width: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #ff3858, #ffb347);
      box-shadow: 0 0 14px rgba(255,64,82,0.55);
      transition: width 0.28s ease-out;
    }
    #battle-feedback {
      min-height: 22px;
      margin-top: 10px;
      font-size: 13px;
      font-weight: 800;
      text-align: center;
      letter-spacing: 0.6px;
      opacity: 0;
      transform: translateY(-4px);
    }
    #battle-feedback.show { animation: battle-pop 0.9s ease-out forwards; }
    #battle-feedback.good { color: #75e6c7; text-shadow: 0 0 16px rgba(117,230,199,0.28); }
    #battle-feedback.bad { color: #ff9ca8; text-shadow: 0 0 16px rgba(255,56,88,0.35); }

    /* Progress bar */
    #progress-wrap {
      width: 100%; height: 3px;
      background: rgba(255,255,255,0.1);
      border-radius: 999px;
      margin: 14px 0 0;
      flex-shrink: 0;
    }
    #progress-fill {
      height: 100%;
      background: rgba(255,255,255,0.5);
      border-radius: 999px;
      transition: width 0.3s ease;
    }

    /* Labels */
    #type-label {
      margin-top: 10px;
      font-size: 11px;
      opacity: 0.35;
      letter-spacing: 1.5px;
      align-self: flex-start;
    }
    #progress-label {
      margin-top: 6px;
      font-size: 12px;
      opacity: 0.38;
      align-self: flex-end;
    }

    /* Word area */
    #word-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 16px 0 14px;
      gap: 10px;
    }
    #word-area.boss-hit { animation: boss-hit 0.36s ease-out; }
    #word-area.player-hit { animation: player-hit 0.38s ease-out; }
    #current-word {
      font-size: clamp(44px, 12vw, 72px);
      font-weight: 800;
      letter-spacing: 3px;
      text-align: center;
      line-height: 1.1;
      text-shadow: 0 0 24px rgba(255,255,255,0.18), 4px 5px 0 rgba(0,0,0,0.35);
    }
    #word-image-wrap {
      width: 100%;
      max-height: 180px;
      border-radius: 14px;
      overflow: hidden;
      background: rgba(255,255,255,0.06);
      display: none;
      cursor: pointer;
    }
    #word-image-wrap img {
      width: 100%; height: 100%;
      object-fit: cover;
      pointer-events: none;
      display: block;
    }
    #word-sentence {
      font-size: 14px;
      line-height: 1.55;
      opacity: 0.82;
      text-align: center;
      display: none;
    }

    /* TF definition */
    #tf-area {
      width: 100%;
      background: rgba(255,255,255,0.06);
      border: 1.5px solid rgba(255,255,255,0.12);
      border-radius: 16px;
      padding: 16px 18px;
      display: none;
    }
    #tf-label {
      font-size: 11px;
      opacity: 0.45;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }
    #tf-definition {
      font-size: 15px;
      line-height: 1.6;
    }
    #tf-correct-hint {
      margin-top: 10px;
      font-size: 13px;
      color: #4FB89E;
      display: none;
    }

    /* Options */
    #options {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 9px;
    }
    .opt-btn {
      width: 100%;
      padding: 14px 18px;
      background: rgba(10,12,18,0.76);
      border: 1.5px solid rgba(255,255,255,0.14);
      border-radius: 14px;
      color: #fff;
      font-family: inherit;
      font-size: 14px;
      line-height: 1.5;
      text-align: left;
      cursor: pointer;
      transition: background 0.1s, border-color 0.1s;
      box-shadow: 0 8px 20px rgba(0,0,0,0.22);
      backdrop-filter: blur(8px);
    }
    .opt-btn:active { background: rgba(255,255,255,0.14); }
    .opt-btn.correct { background: rgba(79,184,158,0.25); border-color: #4FB89E; }
    .opt-btn.wrong   { background: rgba(220,80,80,0.22);  border-color: rgba(220,80,80,0.6); }
    .opt-btn.hint    { background: rgba(79,184,158,0.12); border-color: rgba(79,184,158,0.4); }
    .opt-btn.disabled { pointer-events: none; }

    /* TF buttons */
    #tf-buttons {
      width: 100%;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      display: none;
    }
    .tf-btn {
      padding: 18px;
      border-radius: 14px;
      border: 1.5px solid rgba(255,255,255,0.14);
      background: rgba(10,12,18,0.76);
      color: #fff;
      font-family: inherit;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.1s;
      box-shadow: 0 8px 20px rgba(0,0,0,0.22);
    }
    .tf-btn:active { background: rgba(255,255,255,0.14); }
    .tf-btn.correct { background: rgba(79,184,158,0.25); border-color: #4FB89E; }
    .tf-btn.wrong   { background: rgba(220,80,80,0.22);  border-color: rgba(220,80,80,0.6); }
    .tf-btn.disabled { pointer-events: none; }

    /* Result screen */
    #result-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      width: 100%;
      text-align: center;
      gap: 12px;
      padding: 20px 0;
    }
    .result-emoji { font-size: 52px; }
    .result-title { font-size: 22px; font-weight: 700; }
    .result-score { font-size: 40px; font-weight: 800; letter-spacing: 2px; }
    .result-sub   { font-size: 14px; opacity: 0.55; line-height: 1.7; }
    .result-actions { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; margin-top: 8px; }
    .result-btn {
      padding: 12px 28px;
      border-radius: 999px;
      font-family: inherit;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      border: none;
    }
    .btn-primary { background: #4FB89E; color: #fff; }
    .btn-secondary { background: rgba(255,255,255,0.1); color: #fff; border: 1.5px solid rgba(255,255,255,0.2); }

    /* Round transition */
    #round-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      width: 100%;
      text-align: center;
      gap: 14px;
    }
    .round-emoji { font-size: 52px; }
    .round-title { font-size: 22px; font-weight: 700; }
    .round-sub   { font-size: 14px; opacity: 0.6; line-height: 1.7; max-width: 280px; }
    .round-btn {
      margin-top: 8px;
      padding: 13px 32px;
      border-radius: 999px;
      font-family: inherit;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      background: #4FB89E;
      color: #fff;
    }
    @keyframes battle-pop {
      0% { opacity: 0; transform: translateY(8px) scale(0.98); }
      16% { opacity: 1; transform: translateY(0) scale(1); }
      78% { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-8px) scale(0.98); }
    }
    @keyframes boss-hit {
      0% { transform: translateX(0) scale(1); filter: brightness(1); }
      35% { transform: translateX(8px) scale(0.99); filter: brightness(1.45); }
      70% { transform: translateX(-4px) scale(1.01); }
      100% { transform: translateX(0) scale(1); filter: brightness(1); }
    }
    @keyframes player-hit {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-9px); }
      42% { transform: translateX(8px); }
      64% { transform: translateX(-5px); }
    }
  </style>
</head>
<body>
<div id="app">
  <div class="top-row">
    <a class="back-link" href="index.html">← 返回</a>
    <button id="bgm-toggle" type="button">BGM OFF</button>
  </div>

  <div id="battle-hud">
    <div class="battle-panel">
      <div class="battle-kicker">challenger hp</div>
      <div id="life-row"></div>
    </div>
    <div class="battle-panel boss-card">
      <img class="boss-avatar" src="assets/boss-memory-beast.png" alt="">
      <div>
        <div class="battle-kicker">boss</div>
        <div class="boss-name">オノマトペ記憶獣</div>
        <div id="boss-bar"><div id="boss-bar-fill"></div></div>
      </div>
    </div>
  </div>
  <div id="battle-feedback" aria-live="polite"></div>

  <div id="progress-wrap"><div id="progress-fill" style="width:0%"></div></div>
  <div id="type-label"></div>
  <div id="progress-label"></div>

  <div id="word-area">
    <div id="current-word">—</div>
    <div id="word-image-wrap"><img id="word-image" src="" alt=""></div>
    <div id="word-sentence"></div>
    <audio id="word-audio" preload="auto" style="display:none"></audio>
    <div id="tf-area">
      <div id="tf-label">这个解释正确吗？</div>
      <div id="tf-definition"></div>
      <div id="tf-correct-hint"></div>
    </div>
  </div>

  <div id="options"></div>
  <div id="tf-buttons">
    <button class="tf-btn" id="tf-yes">✓ 对</button>
    <button class="tf-btn" id="tf-no">✗ 错</button>
  </div>

  <div id="result-screen"></div>
  <div id="round-screen"></div>
</div>

<script>
// ── Constants ─────────────────────────────────────────────
const DAY_SIZE   = 20;
const REVIEW_MAX = 15;
const FINAL_N    = 50;
const PASS = { r1: 0.8, r2: 0.9, review: 0.7, final: 0.8 };

// ── URL params ────────────────────────────────────────────
const params = new URLSearchParams(location.search);
const TYPE = params.get('type') || 'complete';
const DAY  = parseInt(params.get('day') || '1', 10);

// ── SRS (shared data format with app.js) ─────────────────
const SRS = {
  _key(cardId) { return `onomatope:d${Math.ceil(cardId / DAY_SIZE)}:progress`; },
  _raw(cardId) {
    try { return JSON.parse(localStorage.getItem(this._key(cardId)) || '{}'); }
    catch { return {}; }
  },
  grade(cardId, quality) {  // quality: 1=wrong, 4=correct
    const store = this._raw(cardId);
    let { n = 0, ef = 2.5, interval = 0 } = store[cardId] || {};
    if (quality >= 3) {
      if (n === 0)      interval = 1;
      else if (n === 1) interval = 6;
      else              interval = Math.round(interval * ef);
      n++;
      ef = Math.max(1.3, ef + 0.1 - (5 - quality) * (0.08 + (5 - quality) * 0.02));
    } else {
      n = 0; interval = 1;
    }
    store[cardId] = { n, ef, interval, due: Date.now() + interval * 86400000 };
    localStorage.setItem(this._key(cardId), JSON.stringify(store));
  },
  isDue(cardId) {
    const s = this._raw(cardId)[cardId];
    return s && s.due <= Date.now();
  }
};

// ── Question builders ─────────────────────────────────────
function makeMC(card, pool, showHints) {
  const correct = card.meanings[0];
  const opts = shuffle(
    [correct, ...shuffle(pool.filter(c => c.id !== card.id && c.meanings[0]))
      .slice(0, 3).map(c => c.meanings[0])]
  );
  return { type: 'mc', card, correct, opts, showHints };
}

function makeTF(card, pool, showHints) {
  const isCorrectDef = Math.random() > 0.5;
  const definition = isCorrectDef
    ? card.meanings[0]
    : (shuffle(pool.filter(c => c.id !== card.id && c.meanings[0]))[0]?.meanings[0] || card.meanings[0]);
  return { type: 'tf', card, isCorrectDef, definition, showHints };
}

function buildQuestions(cards, pool, showHints, mixTF = false) {
  return shuffle([...cards]).map(c =>
    mixTF && Math.random() > 0.5 ? makeTF(c, pool, showHints) : makeMC(c, pool, showHints)
  );
}

function shuffle(a) {
  const arr = [...a];
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// ── Quiz state ────────────────────────────────────────────
let allCards   = [];
let queue      = [];
let qIndex     = 0;
let initCount  = 0;
let correct    = 0;
let attempted  = new Set();  // card IDs graded this session
let isLocked   = false;
let round      = 1;
let lives      = 4;
const MAX_LIVES = 4;
let bgmCtx = null;
let bgmOn = false;
let _bgmLoopId = null;

// ── Init ──────────────────────────────────────────────────
async function init() {
  const res  = await fetch('data/cards.json');
  const data = await res.json();
  allCards   = data.cards;

  if (TYPE === 'complete') startComplete(1);
  else if (TYPE === 'review') startReview();
  else if (TYPE === 'final')  startFinal();
}

function startComplete(r, keepLives = false) {
  round = r;
  if (!keepLives) resetBattle();
  const dayCards = allCards.slice((DAY - 1) * DAY_SIZE, DAY * DAY_SIZE);
  if (r === 1) {
    queue = buildQuestions(dayCards, allCards, false, false); // MC only, no hints
    setTypeLabel(`通关测验 · 第 ${DAY} 天 · 第一轮`);
  } else {
    queue = buildQuestions(dayCards, allCards, true, true);  // MC+TF, with hints
    setTypeLabel(`通关测验 · 第 ${DAY} 天 · 第二轮`);
  }
  resetRound();
}

function startReview() {
  resetBattle();
  const todaySet  = new Set(allCards.slice((DAY - 1) * DAY_SIZE, DAY * DAY_SIZE).map(c => c.id));
  let pool = allCards.filter(c => !todaySet.has(c.id) && SRS.isDue(c.id))
    .sort((a, b) => {
      const da = JSON.parse(localStorage.getItem(SRS._key(a.id)) || '{}')[a.id]?.due || 0;
      const db = JSON.parse(localStorage.getItem(SRS._key(b.id)) || '{}')[b.id]?.due || 0;
      return da - db;
    })
    .slice(0, REVIEW_MAX);

  // Fallback: use yesterday's cards if nothing is due
  if (pool.length === 0) {
    pool = allCards.slice((DAY - 1) * DAY_SIZE, DAY * DAY_SIZE);
  }

  queue = buildQuestions(pool, allCards, true, true);
  setTypeLabel(`复习测验 · 解锁第 ${DAY + 1} 天`);
  resetRound();
}

function startFinal() {
  resetBattle();
  const sample = shuffle([...allCards]).slice(0, FINAL_N);
  queue = buildQuestions(sample, allCards, true, true);
  setTypeLabel('全掌握最终测验');
  resetRound();
}

function resetRound() {
  qIndex    = 0;
  initCount = queue.length;
  correct   = 0;
  attempted = new Set();
  isLocked  = false;
  showQuizUI();
  updateBattleHUD();
  render();
}

// ── Render question ───────────────────────────────────────
function render() {
  if (qIndex >= queue.length) { checkEnd(); return; }

  const q = queue[qIndex];
  isLocked = false;

  updateProgress();
  updateBattleHUD();
  renderWordArea(q);

  if (q.type === 'mc') renderMC(q);
  else renderTF(q);
}

function renderWordArea(q) {
  const card   = q.card;
  const ex0    = card.examples?.[0] || null;
  const hasImg = q.showHints && ex0?.image;
  const hasAud = q.showHints && ex0?.audio;
  const hasSen = q.showHints && q.type === 'mc' && ex0?.jp;

  document.getElementById('current-word').textContent = card.word;

  const imgWrap = document.getElementById('word-image-wrap');
  const img     = document.getElementById('word-image');
  if (hasImg) {
    img.src = ex0.image;
    imgWrap.style.display = 'block';
    imgWrap.onclick = () => playAudio(ex0?.audio, card.word);
  } else {
    imgWrap.style.display = 'none';
  }

  const senEl = document.getElementById('word-sentence');
  if (hasSen) {
    senEl.textContent = ex0.jp;
    senEl.style.display = 'block';
  } else {
    senEl.style.display = 'none';
  }

  const audio = document.getElementById('word-audio');
  if (hasAud) {
    audio.src = ex0.audio;
    audio.play().catch(() => tts(card.word));
  } else if (q.showHints) {
    tts(card.word);
  }

  // hide TF area by default
  document.getElementById('tf-area').style.display = 'none';
  document.getElementById('tf-correct-hint').style.display = 'none';
}

function renderMC(q) {
  document.getElementById('tf-buttons').style.display = 'none';
  const box = document.getElementById('options');
  box.style.display = 'flex';
  box.innerHTML = '';
  q.opts.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.textContent = opt;
    btn.addEventListener('click', () => answerMC(opt, btn, q));
    box.appendChild(btn);
  });
}

function renderTF(q) {
  document.getElementById('options').style.display = 'none';
  document.getElementById('options').innerHTML = '';

  const tfArea = document.getElementById('tf-area');
  document.getElementById('tf-definition').textContent = q.definition;
  document.getElementById('tf-correct-hint').style.display = 'none';
  tfArea.style.display = 'block';

  const btns = document.getElementById('tf-buttons');
  btns.style.display = 'grid';
  const yes = document.getElementById('tf-yes');
  const no  = document.getElementById('tf-no');
  yes.className = 'tf-btn';
  no.className  = 'tf-btn';
  yes.onclick = () => answerTF(true, q);
  no.onclick  = () => answerTF(false, q);
}

// ── Answer handlers ───────────────────────────────────────
function answerMC(opt, btn, q) {
  if (isLocked) return;
  isLocked = true;

  const isCorrect = opt === q.correct;
  const isFirst   = !attempted.has(q.card.id);

  gradeCard(q.card.id, isCorrect, isFirst);
  applyBattleResult(isCorrect);

  document.querySelectorAll('.opt-btn').forEach(b => {
    b.classList.add('disabled');
    if (b.textContent === q.correct) b.classList.add(isCorrect ? 'correct' : 'hint');
  });
  if (!isCorrect) btn.classList.add('wrong');
  else btn.classList.add('correct');

  if (!isCorrect && TYPE === 'review') requeueFlipped(q);

  setTimeout(() => {
    if (lives <= 0) showGameOver();
    else advance();
  }, isCorrect ? 650 : 1100);
}

function answerTF(userSaysCorrect, q) {
  if (isLocked) return;
  isLocked = true;

  const isCorrect = userSaysCorrect === q.isCorrectDef;
  const isFirst   = !attempted.has(q.card.id);

  gradeCard(q.card.id, isCorrect, isFirst);
  applyBattleResult(isCorrect);

  const yes = document.getElementById('tf-yes');
  const no  = document.getElementById('tf-no');
  yes.classList.add('disabled');
  no.classList.add('disabled');

  // Highlight which answer was right
  if (q.isCorrectDef) yes.classList.add(isCorrect ? 'correct' : 'hint');
  else                 no.classList.add(isCorrect  ? 'correct' : 'hint');
  if (!isCorrect) (userSaysCorrect ? yes : no).classList.add('wrong');

  // Show correct meaning if definition was wrong and user said 对
  if (!isCorrect && userSaysCorrect && !q.isCorrectDef) {
    const hint = document.getElementById('tf-correct-hint');
    hint.textContent = `正确解释：${q.card.meanings[0]}`;
    hint.style.display = 'block';
  }

  if (!isCorrect && TYPE === 'review') requeueFlipped(q);

  setTimeout(() => {
    if (lives <= 0) showGameOver();
    else advance();
  }, isCorrect ? 650 : 1200);
}

function gradeCard(cardId, isCorrect, isFirst) {
  if (isFirst) {
    attempted.add(cardId);
    if (isCorrect) correct++;
    SRS.grade(cardId, isCorrect ? 4 : 1);
  }
}

function requeueFlipped(q) {
  const flipped = q.type === 'mc'
    ? makeTF(q.card, allCards, true)
    : makeMC(q.card, allCards, true);
  queue.push(flipped);
}

function advance() {
  qIndex++;
  render();
}

// ── End of round ──────────────────────────────────────────
function checkEnd() {
  const pct = initCount > 0 ? correct / initCount : 0;

  if (TYPE === 'complete') checkCompleteEnd(pct);
  else if (TYPE === 'review') checkReviewEnd(pct);
  else if (TYPE === 'final') checkFinalEnd(pct);
}

function checkCompleteEnd(pct) {
  const pctDisp = Math.round(pct * 100);

  if (round === 1) {
    if (pct >= PASS.r1) {
      showRoundScreen(
        '🎯', `第一轮通过！${pctDisp}%`,
        '答对 ' + correct + ' / ' + initCount + '\n接下来会加入图片、音频和判断题，继续！',
        '开始第二轮 →',
        () => startComplete(2, true)
      );
    } else {
      showResult(false, pctDisp, correct, initCount,
        `未达到 80%，再来一次！`,
        [{ label: '🔄 重试第一轮', action: () => startComplete(1) },
         { label: '← 返回', secondary: true, action: () => location.href = 'index.html' }]
      );
    }
  } else {
    if (pct >= PASS.r2) {
      localStorage.setItem(`onomatope:d${DAY}:quiz-complete`, '1');
      showResult(true, pctDisp, correct, initCount,
        `第 ${DAY} 天通关！明天做复习测验后可解锁第 ${DAY + 1} 天`,
        [{ label: '返回主页', action: () => location.href = 'index.html' }]
      );
    } else {
      showResult(false, pctDisp, correct, initCount,
        `未达到 90%，再来一次！`,
        [{ label: '🔄 重试第二轮', action: () => startComplete(2) },
         { label: '重试第一轮', secondary: true, action: () => startComplete(1) }]
      );
    }
  }
}

function checkReviewEnd(pct) {
  const pctDisp = Math.round(pct * 100);
  if (pct >= PASS.review) {
    localStorage.setItem(`onomatope:d${DAY}:quiz-review`, '1');
    showResult(true, pctDisp, correct, initCount,
      `复习通过！第 ${DAY + 1} 天已解锁`,
      [{ label: `开始第 ${DAY + 1} 天 →`, action: () => location.href = `viewer.html?day=${DAY + 1}` },
       { label: '返回主页', secondary: true, action: () => location.href = 'index.html' }]
    );
  } else {
    showResult(false, pctDisp, correct, initCount,
      `未达到 70%，再来一次！`,
      [{ label: '🔄 再试', action: () => startReview() },
       { label: '返回主页', secondary: true, action: () => location.href = 'index.html' }]
    );
  }
}

function checkFinalEnd(pct) {
  const pctDisp = Math.round(pct * 100);
  if (pct >= PASS.final) {
    localStorage.setItem('onomatope:final-complete', '1');
    showResult(true, pctDisp, correct, initCount,
      '全掌握达成！SRS 复习将持续跟进',
      [{ label: '返回主页', action: () => location.href = 'index.html' }]
    );
  } else {
    showResult(false, pctDisp, correct, initCount,
      `未达到 80%，继续加油！`,
      [{ label: '🔄 再战', action: () => startFinal() },
       { label: '返回主页', secondary: true, action: () => location.href = 'index.html' }]
    );
  }
}

// ── UI helpers ────────────────────────────────────────────
function showQuizUI() {
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('round-screen').style.display  = 'none';
  document.getElementById('battle-hud').style.display    = 'grid';
  document.getElementById('battle-feedback').style.display = 'block';
  document.getElementById('progress-wrap').style.display = 'block';
  document.getElementById('type-label').style.display    = 'block';
  document.getElementById('progress-label').style.display = 'block';
  document.getElementById('word-area').style.display     = '';
  document.getElementById('options').style.display       = 'flex';
}

function showRoundScreen(emoji, title, sub, btnLabel, action) {
  hideQuizUI();
  const el = document.getElementById('round-screen');
  el.style.display = 'flex';
  el.innerHTML = `
    <div class="round-emoji">${emoji}</div>
    <div class="round-title">${title}</div>
    <div class="round-sub">${sub.replace(/\n/g, '<br>')}</div>
    <button class="round-btn">${btnLabel}</button>
  `;
  el.querySelector('.round-btn').onclick = action;
}

function showResult(passed, pct, got, total, sub, actions) {
  hideQuizUI();
  const el = document.getElementById('result-screen');
  el.style.display = 'flex';
  const emoji = passed ? (pct === 100 ? '🎉' : '✅') : '💪';
  const actHTML = actions.map(a =>
    `<button class="result-btn ${a.secondary ? 'btn-secondary' : 'btn-primary'}" data-action="${a.label}">${a.label}</button>`
  ).join('');
  el.innerHTML = `
    <div class="result-emoji">${emoji}</div>
    <div class="result-title">${passed ? '通过！' : '未通过'}</div>
    <div class="result-score">${got} / ${total}</div>
    <div class="result-sub">${pct}% · ${sub}</div>
    <div class="result-actions">${actHTML}</div>
  `;
  actions.forEach(a => {
    el.querySelector(`[data-action="${a.label}"]`).onclick = a.action;
  });
}

function hideQuizUI() {
  document.getElementById('battle-hud').style.display = 'none';
  document.getElementById('battle-feedback').style.display = 'none';
  document.getElementById('progress-wrap').style.display = 'none';
  document.getElementById('type-label').style.display = 'none';
  document.getElementById('progress-label').style.display = 'none';
  document.getElementById('word-area').style.display  = 'none';
  document.getElementById('options').style.display    = 'none';
  document.getElementById('tf-buttons').style.display = 'none';
}

function updateProgress() {
  const shown = Math.min(qIndex + 1, initCount);
  const pct   = initCount > 0 ? (qIndex / initCount * 100).toFixed(0) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-label').textContent =
    `第 ${shown} 题 / ${initCount} · 命中 ${correct}`;
}

function setTypeLabel(text) {
  document.getElementById('type-label').textContent = text.toUpperCase();
}

// ── Battle shell ─────────────────────────────────────────
function resetBattle() {
  lives = MAX_LIVES;
}

function updateBattleHUD() {
  const lifeRow = document.getElementById('life-row');
  if (lifeRow) {
    lifeRow.innerHTML = Array.from({ length: MAX_LIVES }, (_, i) =>
      `<span class="life-drop ${i < lives ? '' : 'lost'}">🩸</span>`
    ).join('');
  }

  const bossMax = Math.max(1, initCount);
  const bossHp = Math.max(0, bossMax - correct);
  const bossPct = Math.max(0, Math.round((bossHp / bossMax) * 100));
  const bossFill = document.getElementById('boss-bar-fill');
  if (bossFill) bossFill.style.width = bossPct + '%';
}

function applyBattleResult(isCorrect) {
  const wordArea = document.getElementById('word-area');
  const feedback = document.getElementById('battle-feedback');
  if (!isCorrect) lives = Math.max(0, lives - 1);
  updateBattleHUD();

  wordArea.classList.remove('boss-hit', 'player-hit');
  void wordArea.offsetWidth;
  wordArea.classList.add(isCorrect ? 'boss-hit' : 'player-hit');

  feedback.className = '';
  feedback.textContent = isCorrect
    ? '命中！Boss HP 下降'
    : `受击！剩余 ${lives} 滴血`;
  feedback.classList.add(isCorrect ? 'good' : 'bad', 'show');
}

function showGameOver() {
  const pct = initCount > 0 ? Math.round(correct / initCount * 100) : 0;
  showResult(false, pct, correct, initCount,
    '血量耗尽，错了 4 次，需要重新挑战。',
    [{ label: '重新挑战', action: () => restartCurrentBattle() },
     { label: '返回主页', secondary: true, action: () => location.href = 'index.html' }]
  );
}

function restartCurrentBattle() {
  if (TYPE === 'complete') startComplete(1);
  else if (TYPE === 'review') startReview();
  else startFinal();
}

function setupBgm() {
  const btn = document.getElementById('bgm-toggle');
  btn.onclick = () => {
    if (bgmOn) stopBgm();
    else startBgm();
  };
}

function startBgm() {
  const AudioContext = window.AudioContext || window.webkitAudioContext;
  if (!AudioContext) return;
  if (!bgmCtx) bgmCtx = new AudioContext();
  bgmOn = true;
  const btn = document.getElementById('bgm-toggle');
  btn.textContent = 'BGM ON';
  btn.classList.add('active');
  _bgmLoop(bgmCtx.currentTime + 0.05);
}

function stopBgm() {
  bgmOn = false;
  clearTimeout(_bgmLoopId);
  _bgmLoopId = null;
  const btn = document.getElementById('bgm-toggle');
  btn.textContent = 'BGM OFF';
  btn.classList.remove('active');
}

function _bgmLoop(t0) {
  if (!bgmOn) return;
  const ctx = bgmCtx;

  const BPM = 168;
  const S   = 60 / BPM / 4;   // 16th-note seconds
  const STEPS = 32;            // 2 bars × 16

  const Hz = {
    E2:82.4, A2:110, C3:130.8, E3:164.8, G3:196,
    A3:220,  C4:261.6, D4:293.7, E4:329.6, G4:392, A4:440,
    C5:523.3, D5:587.3
  };

  const master = ctx.createGain();
  master.gain.value = 0.38;
  master.connect(ctx.destination);

  function tone(type, freq, vol, t, dur) {
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.type = type;
    o.frequency.value = freq;
    g.gain.setValueAtTime(vol, t);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    o.connect(g).connect(master);
    o.start(t); o.stop(t + dur + 0.01);
  }

  // ── melody (square wave) ──────────────────────────────────
  const melody = [
    [0,'A4',1],[2,'C5',1],[3,'A4',1],[4,'G4',2],
    [6,'E4',2],[8,'A4',3],
    [12,'D4',1],[13,'E4',1],[14,'G4',2],
    [16,'A4',2],[19,'G4',1],
    [20,'E4',2],[22,'D4',2],
    [24,'E4',2],[26,'G4',2],[28,'A4',4]
  ];
  melody.forEach(([step, note, dur]) =>
    tone('square', Hz[note], 0.09, t0 + step*S, dur*S*0.82));

  // ── bass (sawtooth) ───────────────────────────────────────
  const bass = [
    [0,'A2',4],[4,'A2',4],[8,'E2',4],[12,'E2',4],
    [16,'A2',4],[20,'C3',4],[24,'G3',4],[28,'E3',4]
  ];
  bass.forEach(([step, note, dur]) =>
    tone('sawtooth', Hz[note], 0.13, t0 + step*S, dur*S*0.75));

  // ── kick: beats 1 & 3 ────────────────────────────────────
  [0, 8, 16, 24].forEach(step => {
    const t = t0 + step * S;
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.type = 'sine';
    o.frequency.setValueAtTime(160, t);
    o.frequency.exponentialRampToValueAtTime(35, t + 0.12);
    g.gain.setValueAtTime(0.55, t);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.16);
    o.connect(g).connect(master);
    o.start(t); o.stop(t + 0.18);
  });

  // ── snare: beats 2 & 4 ───────────────────────────────────
  [4, 12, 20, 28].forEach(step => {
    const t = t0 + step * S;
    const buf = ctx.createBuffer(1, Math.floor(ctx.sampleRate * 0.12), ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
    const src = ctx.createBufferSource();
    const g   = ctx.createGain();
    const filt = ctx.createBiquadFilter();
    filt.type = 'bandpass'; filt.frequency.value = 1800; filt.Q.value = 0.7;
    src.buffer = buf;
    g.gain.setValueAtTime(0.18, t);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.12);
    src.connect(filt).connect(g).connect(master);
    src.start(t);
  });

  // ── hi-hat: every 8th note ────────────────────────────────
  for (let i = 0; i < STEPS / 2; i++) {
    const t = t0 + i * S * 2;
    const buf = ctx.createBuffer(1, Math.floor(ctx.sampleRate * 0.04), ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let j = 0; j < d.length; j++) d[j] = Math.random() * 2 - 1;
    const src = ctx.createBufferSource();
    const g   = ctx.createGain();
    const filt = ctx.createBiquadFilter();
    filt.type = 'highpass'; filt.frequency.value = 7000;
    src.buffer = buf;
    g.gain.setValueAtTime(0.05, t);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.04);
    src.connect(filt).connect(g).connect(master);
    src.start(t);
  }

  // ── loop ──────────────────────────────────────────────────
  const loopDur = STEPS * S;
  _bgmLoopId = setTimeout(() => _bgmLoop(t0 + loopDur), (loopDur - 0.15) * 1000);
}

// ── Audio ─────────────────────────────────────────────────
let _currentAudio = null;
function playAudio(src, word) {
  if (_currentAudio) { _currentAudio.pause(); _currentAudio = null; }
  if (src) {
    const a = new Audio(src);
    _currentAudio = a;
    a.play().catch(() => tts(word));
  } else tts(word);
}

function tts(word) {
  if (!('speechSynthesis' in window)) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(word);
  u.lang = 'ja-JP';
  const v = speechSynthesis.getVoices().find(v => v.lang.startsWith('ja'));
  if (v) u.voice = v;
  u.rate = 0.9;
  speechSynthesis.speak(u);
}

// ── Start ─────────────────────────────────────────────────
setupBgm();
init().catch(() => {
  document.getElementById('current-word').textContent = '加载失败';
});
</script>
