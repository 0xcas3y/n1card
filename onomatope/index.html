  <script>
    (function () {
      document.querySelectorAll('.btn-progress-fill[data-gyou]').forEach(function (el) {
        var gyou = el.dataset.gyou;
        var total = parseInt(el.dataset.total, 10) || 1;
        try {
          var p = JSON.parse(localStorage.getItem('onomatope:' + gyou + ':progress') || '{}');
          var known = Object.values(p).filter(function (v) { return v.status === 'known'; }).length;
          if (known > 0) el.style.width = Math.round(known / total * 100) + '%';
        } catch (e) {}
      });
    })();
  </script>
