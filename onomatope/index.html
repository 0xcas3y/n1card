<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>15天全掌握 · オノマトペ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=14">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
</head>
<body>
  <div class="hub">
    <a class="back-link" href="../">← 返回动词主页</a>

    <h1 class="hub-title">
      <span class="hub-title-jp">オノマトペ</span>
      <span class="hub-title-cn">15天全掌握</span>
    </h1>
    <p class="subtitle">选一天开始刷卡 · 完成后解锁下一天</p>

    <div id="day-list" class="level-list">
      <div style="opacity:0.4;padding:20px 0;font-size:14px;">加载中…</div>
    </div>

    <div class="footer">
      <span class="footer-pill">点词发音</span>
      <span class="footer-pill">双击翻面</span>
      <span class="footer-pill">向左 难</span>
      <span class="footer-pill">向右 易</span>
      <span class="footer-pill">向上划 返回</span>
      <span class="footer-divider"></span>
      <span class="footer-pill">共 284 词</span>
      <span class="footer-pill">Immersion Kit + YouTube</span>
    </div>
  </div>

  <script>
  const DAY_SIZE = 20;
  const DAY_COLORS = ['lv-a','lv-ka','lv-sa','lv-ta','lv-na','lv-ha','lv-ma','lv-ya','lv-ra','lv-wa','lv-a','lv-sa','lv-ta','lv-ha','lv-ma'];

  async function init() {
    const res = await fetch('data/cards.json');
    const data = await res.json();
    const cards = data.cards;
    const totalDays = Math.ceil(cards.length / DAY_SIZE);

    // Compute progress for each day
    const days = [];
    for (let d = 1; d <= totalDays; d++) {
      const dayCards = cards.slice((d - 1) * DAY_SIZE, d * DAY_SIZE);
      const prog = JSON.parse(localStorage.getItem('onomatope:d' + d + ':progress') || '{}');
      const reviewed = dayCards.filter(c => prog[c.id] !== undefined).length;
      days.push({ day: d, total: dayCards.length, reviewed, done: reviewed === dayCards.length });
    }

    const list = document.getElementById('day-list');
    list.innerHTML = '';

    days.forEach(function(dp, i) {
      var quizComplete = localStorage.getItem('onomatope:d' + dp.day + ':quiz-complete') === '1';
      var prevQuizComplete = i === 0 || localStorage.getItem('onomatope:d' + (dp.day - 1) + ':quiz-complete') === '1';
      var reviewDone = i === 0 || localStorage.getItem('onomatope:d' + (dp.day - 1) + ':quiz-review') === '1';

      // Fully unlocked: prev day quiz-complete passed AND review done
      var unlocked = i === 0 || (prevQuizComplete && reviewDone);
      // Needs review quiz: prev quiz-complete done but review not yet done
      var needsReview = i > 0 && prevQuizComplete && !reviewDone;
      // Needs completion quiz: cards done but quiz not yet done
      var needsQuiz = dp.done && !quizComplete;

      var pct = dp.total > 0 ? Math.round(dp.reviewed / dp.total * 100) : 0;
      var color = DAY_COLORS[i % DAY_COLORS.length];

      var el = document.createElement(unlocked || needsReview ? 'a' : 'div');
      el.className = 'level-btn ' + color + (unlocked || needsReview ? '' : ' disabled');

      var href, statusText, arrow;
      if (needsReview) {
        href = 'quiz.html?day=' + (dp.day - 1) + '&type=review';
        statusText = '📝 复习上一天后解锁';
        arrow = '›';
      } else if (!unlocked) {
        href = null;
        statusText = '🔒 完成第 ' + (dp.day - 1) + ' 天后解锁';
        arrow = '';
      } else if (quizComplete) {
        href = 'viewer.html?day=' + dp.day;
        statusText = dp.done ? '✅ 已完成' : (dp.reviewed > 0 ? dp.reviewed + ' / ' + dp.total + ' 已学' : dp.total + ' 词');
        arrow = '›';
      } else if (needsQuiz) {
        href = 'quiz.html?day=' + dp.day + '&type=complete';
        statusText = '📝 做选择题完成当天';
        arrow = '›';
      } else {
        href = 'viewer.html?day=' + dp.day;
        statusText = dp.reviewed > 0 ? dp.reviewed + ' / ' + dp.total + ' 已学' : dp.total + ' 词';
        arrow = '›';
      }

      if (href) el.href = href;

      el.innerHTML =
        '<span class="lv">第 ' + dp.day + ' 天</span>' +
        '<span class="meta"><span class="count"></span>' + statusText + '</span>' +
        '<span class="arrow">' + arrow + '</span>' +
        '<div class="btn-progress"><div class="btn-progress-fill" style="width:' + pct + '%"></div></div>';

      list.appendChild(el);
    });
  }

  init().catch(function() {
    document.getElementById('day-list').innerHTML =
      '<div style="opacity:0.4;padding:20px 0;font-size:14px;">加载失败，请刷新</div>';
  });
  </script>
</body>
</html>
