<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>15天全掌握 · オノマトペ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=13">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
</head>
<body>
  <div class="hub">
    <a class="back-link" href="../">← 返回动词主页</a>

    <h1 class="hub-title">
      <span class="hub-title-jp">オノマトペ</span>
      <span class="hub-title-cn">15天全掌握</span>
    </h1>
    <p class="subtitle">选一天开始刷卡 · 完成后解锁下一天</p>

    <div id="day-list" class="level-list">
      <div style="opacity:0.4;padding:20px 0;font-size:14px;">加载中…</div>
    </div>

    <div class="footer">
      <span class="footer-pill">点词发音</span>
      <span class="footer-pill">双击翻面</span>
      <span class="footer-pill">向左 难</span>
      <span class="footer-pill">向右 易</span>
      <span class="footer-pill">向上划 返回</span>
      <span class="footer-divider"></span>
      <span class="footer-pill">共 284 词</span>
      <span class="footer-pill">Immersion Kit + YouTube</span>
    </div>
  </div>

  <script>
  const DAY_SIZE = 20;
  const DAY_COLORS = ['lv-a','lv-ka','lv-sa','lv-ta','lv-na','lv-ha','lv-ma','lv-ya','lv-ra','lv-wa','lv-a','lv-sa','lv-ta','lv-ha','lv-ma'];

  async function init() {
    const res = await fetch('data/cards.json');
    const data = await res.json();
    const cards = data.cards;
    const totalDays = Math.ceil(cards.length / DAY_SIZE);

    // Compute progress for each day
    const days = [];
    for (let d = 1; d <= totalDays; d++) {
      const dayCards = cards.slice((d - 1) * DAY_SIZE, d * DAY_SIZE);
      const prog = JSON.parse(localStorage.getItem('onomatope:d' + d + ':progress') || '{}');
      const reviewed = dayCards.filter(c => prog[c.id] !== undefined).length;
      days.push({ day: d, total: dayCards.length, reviewed, done: reviewed === dayCards.length });
    }

    const list = document.getElementById('day-list');
    list.innerHTML = '';

    days.forEach(function(dp, i) {
      const unlocked = i === 0 || days[i - 1].done;
      const pct = dp.total > 0 ? Math.round(dp.reviewed / dp.total * 100) : 0;
      const color = DAY_COLORS[i % DAY_COLORS.length];
      const tag = unlocked ? 'a' : 'div';
      const el = document.createElement(tag);
      el.className = 'level-btn ' + color + (unlocked ? '' : ' disabled');
      if (unlocked) el.href = 'viewer.html?day=' + dp.day;

      var statusText = unlocked
        ? (dp.done ? '已完成 ✓' : (dp.reviewed > 0 ? dp.reviewed + ' / ' + dp.total + ' 已学' : dp.total + ' 词'))
        : '🔒 完成第 ' + (dp.day - 1) + ' 天后解锁';

      el.innerHTML =
        '<span class="lv">第 ' + dp.day + ' 天</span>' +
        '<span class="meta"><span class="count">' + (unlocked && !dp.done ? dp.total + ' 词' : '') + '</span>' + statusText + '</span>' +
        '<span class="arrow">' + (unlocked ? '›' : '') + '</span>' +
        '<div class="btn-progress"><div class="btn-progress-fill" style="width:' + pct + '%"></div></div>';

      list.appendChild(el);
    });
  }

  init().catch(function() {
    document.getElementById('day-list').innerHTML =
      '<div style="opacity:0.4;padding:20px 0;font-size:14px;">加载失败，请刷新</div>';
  });
  </script>
</body>
</html>
