<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>オノマトペ大魔王に挑む！</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      min-height: 100%;
      font-family: "Hiragino Sans", "Yu Gothic", "PingFang SC", -apple-system, sans-serif;
      background: #0e0b1a;
      overscroll-behavior: none;
    }
    .page { max-width: 480px; margin: 0 auto; }

    /* ── Hero ── */
    .hero {
      position: relative;
      width: 100%;
      background: linear-gradient(180deg, #1a0d30 0%, #120920 60%, #0e0b1a 100%);
      padding-bottom: 10px;
      overflow: hidden;
    }
    /* subtle purple radial glow behind character */
    .hero::before {
      content: '';
      position: absolute;
      top: -30px; left: 50%; transform: translateX(-50%);
      width: 360px; height: 360px;
      background: radial-gradient(circle, rgba(120,60,200,0.35) 0%, transparent 70%);
      pointer-events: none;
    }
    .hero-back {
      position: absolute; top: 14px; left: 16px;
      font-size: 13px; color: rgba(180,150,240,0.5);
      text-decoration: none; z-index: 2;
    }
    .hero-img {
      width: 100%; display: block; position: relative; z-index: 1;
    }
    /* ── Stage list ── */
    .stage-list {
      padding: 16px 14px 0;
      display: flex; flex-direction: column; gap: 10px;
    }

    /* Active card */
    .card-a {
      display: flex; align-items: center; gap: 14px;
      padding: 15px 15px;
      border-radius: 16px;
      background: linear-gradient(135deg, #1e1035 0%, #180d2a 100%);
      border: 1.5px solid rgba(160,100,255,0.55);
      box-shadow: 0 0 12px rgba(130,70,220,0.2), inset 0 0 20px rgba(100,50,180,0.08);
      text-decoration: none; transition: transform 0.1s;
    }
    .card-a:active { transform: scale(0.98); }

    /* Locked card */
    .card-l {
      display: flex; align-items: center; gap: 14px;
      padding: 15px 15px;
      border-radius: 16px;
      background: #111018;
      border: 1px solid rgba(255,255,255,0.06);
      pointer-events: none;
    }

    /* ── Badge ── */
    .badge {
      width: 50px; height: 50px; border-radius: 50%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      flex-shrink: 0; position: relative;
      gap: 1px;
    }
    .badge-a {
      border: 1.5px solid rgba(180,120,255,0.7);
      background: rgba(120,60,200,0.15);
      box-shadow: 0 0 10px rgba(140,70,240,0.3), 0 0 0 4px rgba(120,60,200,0.08);
    }
    .badge-a::before {
      content: '♛';
      font-size: 10px;
      color: rgba(200,160,255,0.7);
      line-height: 1;
    }
    .badge-a .num { font-size: 14px; font-weight: 800; color: #c8a0ff; line-height: 1; }

    .badge-l {
      border: 1.5px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.03);
    }
    .badge-l::before {
      content: '♛';
      font-size: 10px;
      color: rgba(255,255,255,0.18);
      line-height: 1;
    }
    .badge-l .num { font-size: 14px; font-weight: 700; color: rgba(255,255,255,0.22); line-height: 1; }

    /* ── Stage info ── */
    .stage-info { flex: 1; min-width: 0; }
    .title-a { font-size: 19px; font-weight: 700; color: #f0eaff; letter-spacing: 1.5px; }
    .title-l { font-size: 19px; font-weight: 600; color: rgba(255,255,255,0.22); letter-spacing: 1.5px; }
    .sub-a   { font-size: 12px; margin-top: 3px; color: rgba(200,170,255,0.6); }
    .sub-l   { font-size: 12px; margin-top: 3px; color: rgba(255,255,255,0.2); }

    /* Dot progress */
    .dots { display: flex; gap: 4px; margin-top: 7px; flex-wrap: wrap; }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(160,100,255,0.18); }
    .dot.on { background: #a060ff; box-shadow: 0 0 4px rgba(160,100,255,0.6); }

    /* Arrow */
    .arr-a { font-size: 20px; color: rgba(180,130,255,0.6); flex-shrink: 0; }
    .arr-l  { font-size: 15px; color: rgba(255,255,255,0.12); flex-shrink: 0; }

    /* ── Chest ── */
    .chest-section {
      padding: 32px 16px 56px;
      display: flex; flex-direction: column; align-items: center; gap: 12px;
      position: relative; overflow: hidden;
    }
    /* rune circle glow behind chest */
    .chest-section::before {
      content: '';
      position: absolute;
      bottom: 40px; left: 50%; transform: translateX(-50%);
      width: 260px; height: 80px;
      background: radial-gradient(ellipse, rgba(120,60,200,0.3) 0%, transparent 70%);
      pointer-events: none;
    }
    .chest-label {
      font-size: 12px; color: rgba(180,140,255,0.6);
      letter-spacing: 1.5px; text-align: center; position: relative; z-index: 1;
    }
    .chest-img {
      width: 178px; height: 178px; object-fit: contain; position: relative; z-index: 1;
      border-radius: 24px;
      box-shadow: 0 18px 44px rgba(0,0,0,0.42);
    }
    .chest-img.locked-img { opacity: 0.92; filter: saturate(0.95); }
    @keyframes glow {
      0%,100% { filter: drop-shadow(0 0 18px rgba(160,100,255,0.5)); }
      50%      { filter: drop-shadow(0 0 40px rgba(180,120,255,0.9)); }
    }
    .chest-img.open-img { animation: glow 2.5s ease-in-out infinite; }

    .chest-btn {
      display: inline-block; padding: 13px 30px;
      background: linear-gradient(135deg, #8040d0, #5020a0);
      color: #f0e6ff; border: none; border-radius: 999px;
      font-family: inherit; font-size: 14px; font-weight: 700;
      cursor: pointer; text-decoration: none; position: relative; z-index: 1;
      box-shadow: 0 0 20px rgba(120,60,200,0.4);
    }
    .chest-btn.dim {
      background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.18);
      border: 1px solid rgba(255,255,255,0.08); pointer-events: none;
      box-shadow: none;
    }
    .loading { color: rgba(180,150,240,0.35); padding: 24px 0; font-size: 14px; text-align: center; }
  </style>
</head>
<body>
<div class="page">

  <!-- Hero -->
  <div class="hero">
    <a class="hero-back" href="../">← 返回</a>
    <img class="hero-img" src="assets/hero-cropped.png" alt="大魔王"
         onerror="this.style.display='none';this.nextElementSibling.style.height='220px'">
    <div style="height:0"></div>
  </div>

  <!-- Stages -->
  <div class="stage-list" id="stage-list">
    <div class="loading">加载中…</div>
  </div>

  <!-- Chest -->
  <div class="chest-section" id="chest-section"></div>

</div>
<script>
var DAY_SIZE = 20;

async function init() {
  var resp  = await fetch('data/cards.json');
  var data  = await resp.json();
  var cards = data.cards;
  var total = Math.ceil(cards.length / DAY_SIZE);

  var days = [];
  for (var i = 0; i < total; i++) {
    var d  = i + 1;
    var dc = cards.slice(i * DAY_SIZE, d * DAY_SIZE);
    var pg = JSON.parse(localStorage.getItem('onomatope:d' + d + ':progress') || '{}');
    var rv = dc.filter(function(c) { return pg[c.id] !== undefined; }).length;
    days.push({ day: d, total: dc.length, reviewed: rv, done: rv === dc.length });
  }

  var list = document.getElementById('stage-list');
  list.innerHTML = '';

  for (var i = 0; i < days.length; i++) {
    var dp = days[i];
    var quizDone = localStorage.getItem('onomatope:d' + dp.day + ':quiz-complete') === '1';
    var prevQuiz = i === 0 || localStorage.getItem('onomatope:d' + (dp.day-1) + ':quiz-complete') === '1';
    var revDone  = i === 0 || localStorage.getItem('onomatope:d' + (dp.day-1) + ':quiz-review') === '1';
    var unlocked  = i === 0 || (prevQuiz && revDone);
    var needsRev  = i > 0 && prevQuiz && !revDone;
    var needsQuiz = dp.done && !quizDone;
    var num = String(dp.day).padStart(2, '0');

    var active, href, sub, arrow;
    if (needsRev) {
      active = true;
      href = 'quiz.html?day=' + (dp.day-1) + '&type=review';
      sub  = '📝 复习第 ' + (dp.day-1) + ' 関后解锁';
      arrow = '›';
    } else if (!unlocked) {
      active = false;
      href = null;
      sub  = '🔒 第 ' + (dp.day-1) + ' 関をクリアで解放';
      arrow = '🔒';
    } else if (quizDone) {
      active = true;
      href = 'viewer.html?day=' + dp.day;
      sub  = dp.done ? '✅ 已通关' : dp.total + ' 词';
      arrow = '›';
    } else if (needsQuiz) {
      active = true;
      href = 'quiz.html?day=' + dp.day + '&type=complete';
      sub  = '📝 学完！挑战通关测验';
      arrow = '›';
    } else {
      active = true;
      href = 'viewer.html?day=' + dp.day;
      sub  = dp.total + ' 词';
      arrow = '›';
    }

    var dots = '';
    if (active) {
      for (var k = 0; k < dp.total; k++)
        dots += '<div class="dot' + (k < dp.reviewed ? ' on' : '') + '"></div>';
      dots = '<div class="dots">' + dots + '</div>';
    }

    var el = document.createElement(href ? 'a' : 'div');
    el.className = active ? 'card-a' : 'card-l';
    if (href) el.href = href;
    el.innerHTML =
      '<div class="badge ' + (active ? 'badge-a' : 'badge-l') + '">' +
        '<div class="num">' + num + '</div>' +
      '</div>' +
      '<div class="stage-info">' +
        '<div class="' + (active ? 'title-a' : 'title-l') + '">第 ' + dp.day + ' 関</div>' +
        '<div class="' + (active ? 'sub-a' : 'sub-l') + '">' + sub + '</div>' +
        dots +
      '</div>' +
      '<div class="' + (active ? 'arr-a' : 'arr-l') + '">' + arrow + '</div>';
    list.appendChild(el);
  }

  // Chest
  var last      = days[days.length - 1];
  var allDone   = days.every(function(d) { return d.done; });
  var lastQuiz  = localStorage.getItem('onomatope:d' + last.day + ':quiz-complete') === '1';
  var finalDone = localStorage.getItem('onomatope:final-complete') === '1';
  var open      = allDone && lastQuiz;
  var now = Date.now(), due = 0;
  cards.forEach(function(c) {
    try {
      var p = JSON.parse(localStorage.getItem('onomatope:d' + Math.ceil(c.id / DAY_SIZE) + ':progress') || '{}');
      if (p[c.id] && p[c.id].due <= now) due++;
    } catch(e) {}
  });

  var label = open
    ? (finalDone ? '✨ 全掌握已达成' : '→ 全 15 関を制覇！宝箱を開けよう！ ←')
    : '→ 全 15 関を制覇して宝箱を開けよう！ ←';
  var btn = '';
  if (open && !finalDone)
    btn = '<a class="chest-btn" href="quiz.html?type=final">开启宝箱！挑战最终测验</a>';
  else if (finalDone && due > 0)
    btn = '<a class="chest-btn" href="quiz.html?type=review&day=' + last.day + '">📅 今日复习 ' + due + ' 词</a>';
  else if (!open)
    btn = '<div class="chest-btn dim">🔒 宝箱未解锁</div>';

  document.getElementById('chest-section').innerHTML =
    '<div class="chest-label">' + label + '</div>' +
    '<img class="chest-img ' + (open ? 'open-img' : 'locked-img') + '" src="assets/' +
      (open ? 'chest-open-dark.png' : 'chest-locked-dark.png') + '" alt="宝箱">' +
    btn;
}

init().catch(function(e) {
  document.getElementById('stage-list').innerHTML =
    '<div class="loading">加载失败：' + e.message + '</div>';
});
</script>
</body>
</html>
